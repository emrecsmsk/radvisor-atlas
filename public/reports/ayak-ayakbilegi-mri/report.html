<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ayak & Ayak Bileği MRI Karar Destek Sistemi</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#0f1923;--card:#152232;--card2:#1a2d42;--accent:#00bfa5;--accent2:#26a69a;--accentDim:rgba(0,191,165,0.15);--accentGlow:rgba(0,191,165,0.4);--txt:#e0e0e0;--txt2:#90a4ae;--border:#263850;--danger:#ef5350;--warn:#ffa726;--success:#66bb6a;--info:#42a5f5}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',Tahoma,sans-serif;min-height:100vh}
.app-header{background:linear-gradient(135deg,#0a1628 0%,#152232 50%,#0d2137 100%);border-bottom:2px solid var(--accent);padding:18px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.app-header h1{font-size:1.3rem;color:var(--accent);font-weight:700;letter-spacing:0.5px}
.app-header .subtitle{font-size:0.8rem;color:var(--txt2)}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#009688);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:#fff;flex-shrink:0}
.progress-bar{display:flex;align-items:center;gap:2px;padding:10px 24px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.progress-bar::-webkit-scrollbar{height:4px}
.progress-bar::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.prog-step{min-width:10px;height:6px;border-radius:3px;background:var(--border);flex:1;transition:all 0.3s}
.prog-step.active{background:var(--accent);box-shadow:0 0 8px var(--accentGlow)}
.prog-step.done{background:var(--accent2)}
.prog-step.loop{background:#ff9800}
.prog-step.loop.active{background:#ff9800;box-shadow:0 0 8px rgba(255,152,0,0.5)}
.main-content{max-width:900px;margin:0 auto;padding:20px}
.step-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.step-title{font-size:1.15rem;color:var(--accent);margin-bottom:6px;font-weight:700;display:flex;align-items:center;gap:10px}
.step-num{background:var(--accent);color:#000;font-size:0.75rem;font-weight:800;padding:3px 9px;border-radius:20px;min-width:28px;text-align:center}
.step-desc{font-size:0.82rem;color:var(--txt2);margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:0.85rem;color:var(--accent2);margin-bottom:6px;font-weight:600}
.form-group input[type=text],.form-group input[type=number],.form-group select,.form-group textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--txt);font-size:0.9rem;outline:none;transition:border 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:70px;resize:vertical}
.radio-group,.check-group{display:flex;flex-wrap:wrap;gap:8px}
.radio-btn,.check-btn{padding:8px 16px;background:var(--card2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:0.83rem;color:var(--txt2);transition:all 0.2s;user-select:none}
.radio-btn:hover,.check-btn:hover{border-color:var(--accent);color:var(--txt)}
.radio-btn.selected{background:var(--accentDim);border-color:var(--accent);color:var(--accent);font-weight:600}
.check-btn.selected{background:var(--accentDim);border-color:var(--accent);color:var(--accent);font-weight:600}
.grade-btn{padding:10px 14px;background:var(--card2);border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:0.82rem;color:var(--txt2);transition:all 0.2s;text-align:center;min-width:70px}
.grade-btn.selected{background:var(--accentDim);border-color:var(--accent);color:var(--accent);font-weight:700}
.grade-btn:hover{border-color:var(--accent2)}
.nav-bar{display:flex;gap:12px;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.nav-btn{padding:11px 28px;border:none;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s}
.nav-btn.prev{background:var(--card2);color:var(--txt2);border:1px solid var(--border)}
.nav-btn.prev:hover{background:var(--border);color:var(--txt)}
.nav-btn.next{background:linear-gradient(135deg,var(--accent),#009688);color:#000}
.nav-btn.next:hover{box-shadow:0 4px 16px var(--accentGlow)}
.nav-btn:disabled{opacity:0.35;cursor:not-allowed}
.section-divider{border:none;border-top:1px dashed var(--border);margin:16px 0}
.info-box{background:rgba(0,191,165,0.08);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:0.82rem;color:var(--txt2)}
.warn-box{background:rgba(255,167,38,0.1);border-left:3px solid var(--warn);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:0.82rem;color:var(--warn)}
.lesion-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#ff9800,#f57c00);color:#000;font-size:0.75rem;font-weight:800;padding:4px 12px;border-radius:20px}
.lesion-list{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.lesion-chip{padding:6px 14px;background:var(--card2);border:1px solid #ff9800;border-radius:20px;font-size:0.8rem;color:#ff9800;cursor:pointer;transition:all 0.2s}
.lesion-chip:hover{background:rgba(255,152,0,0.15)}
.lesion-chip.active{background:rgba(255,152,0,0.2);font-weight:700}
/* REPORT STYLES */
.report-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;overflow-y:auto;padding:20px}
.report-sheet{max-width:800px;margin:0 auto;background:#fff;color:#1a1a1a;border-radius:8px;padding:0;font-family:'Segoe UI',sans-serif;font-size:11pt;line-height:1.5}
.report-header-band{background:linear-gradient(135deg,#00796b,#00bfa5);color:#fff;padding:20px 30px;border-radius:8px 8px 0 0}
.report-header-band h2{font-size:15pt;margin-bottom:4px}
.report-header-band .rh-sub{font-size:9pt;opacity:0.85}
.report-body{padding:24px 30px}
.report-section{margin-bottom:14px}
.report-section-title{font-size:10pt;font-weight:700;color:#00796b;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid #00796b;padding-bottom:4px;margin-bottom:8px}
.report-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10pt}
.report-table th{background:#e0f2f1;color:#00796b;padding:7px 10px;text-align:left;font-weight:700;border:1px solid #b2dfdb;font-size:9pt}
.report-table td{padding:6px 10px;border:1px solid #e0e0e0;vertical-align:top}
.report-table tr:nth-child(even) td{background:#f5f5f5}
.report-table tr:nth-child(odd) td{background:#fff}
.yorum-box{background:linear-gradient(135deg,#e0f7fa,#b2ebf2);border:2px solid #00897b;border-radius:8px;padding:14px 18px;margin:12px 0}
.yorum-box h4{color:#00695c;font-size:10pt;margin-bottom:6px}
.yorum-box p,.yorum-box ul{font-size:10pt;color:#1a1a1a;margin:4px 0}
.diff-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:9.5pt}
.diff-table th{background:#00796b;color:#fff;padding:7px 10px;text-align:left;font-size:8.5pt;text-transform:uppercase}
.diff-table td{padding:6px 10px;border:1px solid #e0e0e0}
.diff-table tr:nth-child(even) td{background:#f5f5f5}
.diff-table tr:nth-child(odd) td{background:#fafafa}
.score-high{color:#c62828;font-weight:700}
.score-med{color:#ef6c00;font-weight:600}
.score-low{color:#2e7d32}
.report-actions{display:flex;gap:10px;justify-content:center;padding:16px;position:sticky;top:0;z-index:10}
.report-actions button{padding:10px 24px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.btn-print{background:#00796b;color:#fff}
.btn-copy{background:#0288d1;color:#fff}
.btn-html{background:#7b1fa2;color:#fff}
.btn-close{background:#c62828;color:#fff}
.finding-normal{color:#388e3c}
.finding-abnormal{color:#d32f2f;font-weight:600}
.inline-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.cond-block{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px;animation:fadeIn 0.3s}
.sub-label{font-size:0.78rem;color:var(--txt2);margin-bottom:4px}
@media print{
.report-actions{display:none!important}
.report-overlay{position:static;background:#fff;padding:0}
.report-sheet{box-shadow:none;border-radius:0}
}
@media(max-width:640px){
.main-content{padding:12px}
.step-card{padding:18px}
.radio-group,.check-group{gap:6px}
.radio-btn,.check-btn{padding:6px 12px;font-size:0.78rem}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useMemo,useRef,useEffect} = React;

/* ═══════════════════════ DATA ═══════════════════════ */
const STEPS=[
{id:'hasta',title:'Hasta Bilgileri',icon:'📋'},

const PATHOLOGY_DB=[

{id:'stress_fx',name:'Stres Kırığı / Reaksiyonu',cat:'Kemik',keys:['bone_edema','fracture','periosteal_rx']},
{id:'plantar_fasc',name:'Plantar Fasiit',cat:'Yumuşak Doku',keys:['plantar_fascia','pf_thickness','pf_signal','heel_edema']},
{id:'plantar_fibr',name:'Plantar Fibroma',cat:'Yumuşak Doku',keys:['plantar_fibroma']},
{id:'tarsal_coal',name:'Tarsal Koalisyon',cat:'Kemik',keys:['coalition','coalition_type']},
{id:'avn',name:'Avasküler Nekroz',cat:'Kemik',keys:['avn_present','avn_loc','bone_edema']},
{id:'morton',name:'Morton Nöroması',cat:'Nöral',keys:['morton_present','morton_space']},
{id:'tarsal_tunnel',name:'Tarsal Tünel Sendromu',cat:'Nöral',keys:['tarsal_tunnel_finding','tibial_nerve']},
{id:'sinus_tarsi',name:'Sinus Tarsi Sendromu',cat:'Eklem',keys:['sinus_tarsi','subtalar_effusion','atfl']},
{id:'bone_tumor',name:'Kemik Tümörü / Metastaz',cat:'Kemik',keys:['bone_lesion','bone_edema']},
{id:'pvns',name:'PVNS / Dev Hücreli Tümör',cat:'Sinoviyal',keys:['synovial_thick','blooming','tibiotalar_effusion']},
{id:'ganglion',name:'Ganglion Kisti',cat:'Yumuşak Doku',keys:['ganglion_present']},
{id:'osteomyelit',name:'Osteomiyelit / Enfeksiyon',cat:'Enfeksiyon',keys:['bone_edema','cortical_irreg','soft_tissue_inflam','enhancement_pattern']},
{id:'synovitis',name:'Sinovit / Efüzyon',cat:'Sinoviyal',keys:['tibiotalar_effusion','synovial_thick','subtalar_effusion']},
{id:'plantar_plate',name:'Plantar Plak Yaralanması',cat:'Yumuşak Doku',keys:['plantar_plate_status']},
{id:'retrocal_burs',name:'Retrokalkaneal Bursit',cat:'Yumuşak Doku',keys:['retrocal_bursit','haglund']}
];

const TENDON_GRADES=['Normal','Tendinoz','Parsiyel yırtık','Komplet rüptür'];
const TENDON_GRADES_EXT=['Normal','Tendinoz','Parsiyel yırtık','Komplet rüptür','Longitudinal split'];
const LIG_GRADES=['Normal','Sprain (Grade I)','Parsiyel yırtık (Grade II)','Komplet yırtık (Grade III)','Kronik kalınlaşma'];
const SIGNAL_OPTS=['Hipointens','İzointens','Hiperintens','Heterojen'];
const ENH_OPTS=['Yok','Homojen','Heterojen','Rim (periferal)','Lineer','Nodüler'];
const MARGIN_OPTS=['Düzgün','Lobüle','İrregüler','İnfiltratif'];
const BONE_SITES=['Talus','Kalkaneus','Naviküler','Kuboid','Küneiform (medial)','Küneiform (orta)','Küneiform (lateral)','1. Metatars','2. Metatars','3. Metatars','4. Metatars','5. Metatars','Sesamoid','Falankslar','Tibia distali','Fibula distali'];
const LESION_SITES=['Achilles bölgesi','Medial malleol','Lateral malleol','Plantar bölge','Sinus tarsi','Tarsal tünel','Forefoot dorsal','Forefoot plantar','Midfoot','Hindfoot','Intermetatarsal aralık','Subkutan doku','İntraosseöz','Eklem içi','Tendon kılıfı'];
const CARTILAGE_GRADES=['Normal','Grade I — Sinyal artışı (yüzey sağlam)','Grade II — Yüzeyel defekt (<50%)','Grade III — Derin defekt (>50%)','Grade IV — Tam kat defekt / subkondral kemik açık'];

function initData(){return{
hasta_ad:'',hasta_id:'',hasta_yas:'',hasta_cinsiyet:'',tarih:new Date().toISOString().slice(0,10),
klinik_endikasyon:[],klinik_taraf:'',klinik_sure:'',klinik_travma:'',klinik_notu:'',
sekanslar:[],alan_gucu:'1.5T',kontrast:'',
kemik_dizilim:'Normal',dizilim_detay:[],kemik_ilik:'Normal',ilik_pattern:'',ilik_lokalizasyon:[],fracture:'Yok',fracture_loc:'',fracture_type:'',bone_contusion:'Yok',contusion_loc:'',periosteal_rx:'Yok',
achilles_morph:'Normal',achilles_loc:'',achilles_kalinlik:'',achilles_signal:'',haglund:'Yok',retrocal_bursit:'Yok',paratenon:'Normal',
tibpost_morph:'Normal',tibpost_loc:'',tibpost_signal:'',accessory_nav:'Yok',
pb_morph:'Normal',pl_morph:'Normal',peroneal_sublux:'Yok',spr_status:'İntakt',peroneal_tub:'Normal',
tibant_morph:'Normal',fhl_morph:'Normal',fhl_os_trigonum:'Yok',fdl_morph:'Normal',extensor_morph:'Normal',
atfl:'Normal',cfl:'Normal',ptfl:'Normal',
deltoid_sup:'Normal',deltoid_deep:'Normal',
spring_lig:'Normal',lisfranc_lig:'Normal',bifurcate_lig:'Normal',midfoot_edema:'Yok',
tibiotalar_effusion:'Yok',synovial_thick:'Yok',cartilage_grade:'Normal',ocd_present:'Yok',ocd_loc:'',ocd_size:'',ocd_stability:'',ocd_class:'',loose_body:'Yok',
subtalar_effusion:'Yok',subtalar_cartilage:'Normal',sinus_tarsi:'Normal',coalition:'Yok',coalition_type:'',coalition_loc:'',
plantar_fascia:'Normal',pf_thickness:'',pf_signal:'',pf_loc:'',plantar_fibroma:'Yok',fibroma_size:'',plantar_plate_status:'Normal',pp_loc:'',heel_edema:'Yok',
tarsal_tunnel_finding:'Normal',tibial_nerve:'Normal',morton_present:'Yok',morton_space:'',morton_size:'',baxter_nerve:'Normal',
soft_tissue_inflam:'Yok',blooming:'Yok',ganglion_present:'Yok',bone_lesion:'Yok',cortical_irreg:'Yok',enhancement_pattern:'',avn_present:'Yok',avn_loc:'',
has_lesion:'Hayır',lesions:[],currentLesionIdx:-1,
ek_effusion_detail:'',ek_subkutan:'Yok',ek_incidental:'',ek_freetext:''
}}
function initLesion(){return{
loc:'',loc_detail:'',size_ap:'',size_tr:'',size_cc:'',morph:'',margin:'',
t1:'',t2:'',stir:'',dwi:'',t2star:'',
enh:'',enh_detail:'',
env_invasion:'Yok',env_edema:'Yok',env_displacement:'Yok',env_bone:'Yok',
extra_calc:'Yok',extra_hemorrhage:'Yok',extra_necrosis:'Yok',extra_fat:'Yok',extra_flow_void:'Yok',extra_note:''
}}

/* ═══════════════════════ SCORING ENGINE ═══════════════════════ */
function computeScores(d){
const sc={};
PATHOLOGY_DB.forEach(p=>{
let s=0,max=0;
// Tendon pathologies
if(p.id==='achilles_tend'){
max=30;
if(d.achilles_morph==='Tendinoz')s+=8;
if(d.achilles_morph==='Parsiyel yırtık')s+=15;
if(d.achilles_morph==='Komplet rüptür')s+=25;
if(d.retrocal_bursit!=='Yok')s+=3;
if(d.paratenon!=='Normal')s+=2;
}
else if(p.id==='tib_post_dysf'){
max=28;
if(d.tibpost_morph==='Tendinoz')s+=8;
if(d.tibpost_morph==='Parsiyel yırtık')s+=14;
if(d.tibpost_morph==='Komplet rüptür')s+=22;
if(d.tibpost_morph==='Longitudinal split')s+=16;
if(d.accessory_nav!=='Yok')s+=4;
if(d.spring_lig!=='Normal')s+=2;
}
else if(p.id==='peroneal_path'){
max=30;
if(d.pb_morph!=='Normal')s+=(['Tendinoz','Parsiyel yırtık','Komplet rüptür','Longitudinal split'].indexOf(d.pb_morph)+1)*4;
if(d.pl_morph!=='Normal')s+=(['Tendinoz','Parsiyel yırtık','Komplet rüptür','Longitudinal split'].indexOf(d.pl_morph)+1)*4;
if(d.peroneal_sublux!=='Yok')s+=6;
if(d.spr_status!=='İntakt')s+=4;
if(d.peroneal_tub!=='Normal')s+=2;
}
else if(p.id==='lat_lig_inj'){
max=30;
['atfl','cfl','ptfl'].forEach(k=>{
const v=d[k];
if(v==='Sprain (Grade I)')s+=3;
else if(v==='Parsiyel yırtık (Grade II)')s+=7;
else if(v==='Komplet yırtık (Grade III)')s+=10;
else if(v==='Kronik kalınlaşma')s+=4;
});
}
else if(p.id==='deltoid_inj'){
max=20;
['deltoid_sup','deltoid_deep'].forEach(k=>{
const v=d[k];
if(v==='Sprain (Grade I)')s+=3;
else if(v==='Parsiyel yırtık (Grade II)')s+=6;
else if(v==='Komplet yırtık (Grade III)')s+=10;
});
}
else if(p.id==='spring_inj'){
max=18;
const v=d.spring_lig;
if(v==='Sprain (Grade I)')s+=4;
else if(v==='Parsiyel yırtık (Grade II)')s+=10;
else if(v==='Komplet yırtık (Grade III)')s+=16;
if(d.tibpost_morph!=='Normal')s+=2;
}
else if(p.id==='lisfranc_inj'){
max=20;
const v=d.lisfranc_lig;
if(v==='Sprain (Grade I)')s+=4;
else if(v==='Parsiyel yırtık (Grade II)')s+=10;
else if(v==='Komplet yırtık (Grade III)')s+=16;
if(d.midfoot_edema!=='Yok')s+=4;
}
else if(p.id==='ocd_talus'){
max=30;
if(d.ocd_present!=='Yok')s+=18;
if(d.cartilage_grade!=='Normal')s+=(['','Grade I','Grade II','Grade III','Grade IV'].indexOf(d.cartilage_grade.split(' ')[0])||0)*2;
if(d.tibiotalar_effusion!=='Yok')s+=3;
if(d.bone_contusion!=='Yok')s+=2;
}
else if(p.id==='stress_fx'){
max=25;
if(d.fracture!=='Yok')s+=12;
if(d.bone_contusion!=='Yok')s+=5;
if(d.periosteal_rx!=='Yok')s+=5;
if(d.kemik_ilik!=='Normal')s+=3;
}
else if(p.id==='plantar_fasc'){
max=25;
const v=d.plantar_fascia;
if(v==='Kalınlaşma')s+=8;
else if(v==='Parsiyel yırtık')s+=14;
else if(v==='Komplet yırtık')s+=20;
if(d.heel_edema!=='Yok')s+=5;
}
else if(p.id==='plantar_fibr'){
max=15;
if(d.plantar_fibroma!=='Yok')s+=15;
}
else if(p.id==='tarsal_coal'){
max=18;
if(d.coalition!=='Yok')s+=18;
}
else if(p.id==='avn'){
max=22;
if(d.avn_present!=='Yok')s+=18;
if(d.kemik_ilik!=='Normal')s+=4;
}
else if(p.id==='morton'){
max=16;
if(d.morton_present!=='Yok')s+=16;
}
else if(p.id==='tarsal_tunnel'){
max=18;
const v=d.tarsal_tunnel_finding;
if(v==='Yer kaplayan lezyon')s+=10;
else if(v==='Sinir kompresyonu')s+=14;
if(d.tibial_nerve!=='Normal')s+=4;
}
else if(p.id==='sinus_tarsi'){
max=20;
const v=d.sinus_tarsi;
if(v==='Ödem')s+=8;
else if(v==='Fibrozis')s+=12;
else if(v==='Kitle')s+=6;
if(d.subtalar_effusion!=='Yok')s+=4;
if(d.atfl!=='Normal')s+=4;
}
else if(p.id==='bone_tumor'){
max=20;
if(d.bone_lesion!=='Yok')s+=10;
if(d.cortical_irreg!=='Yok')s+=5;
if(d.kemik_ilik!=='Normal')s+=3;
if(d.periosteal_rx!=='Yok')s+=2;
}
else if(p.id==='pvns'){
max=22;
if(d.synovial_thick!=='Yok')s+=6;
if(d.blooming!=='Yok')s+=10;
if(d.tibiotalar_effusion!=='Yok')s+=3;
if(d.subtalar_effusion!=='Yok')s+=3;
}
else if(p.id==='ganglion'){
max=12;
if(d.ganglion_present!=='Yok')s+=12;
}
else if(p.id==='osteomyelit'){
max=28;
if(d.kemik_ilik!=='Normal')s+=6;
if(d.cortical_irreg!=='Yok')s+=6;
if(d.soft_tissue_inflam!=='Yok')s+=6;
if(d.bone_contusion!=='Yok')s+=4;
if(d.periosteal_rx!=='Yok')s+=4;
if(d.enhancement_pattern&&d.enhancement_pattern!=='Yok')s+=2;
}
else if(p.id==='synovitis'){
max=18;
if(d.tibiotalar_effusion!=='Yok')s+=(['','Minimal','Orta','Belirgin'].indexOf(d.tibiotalar_effusion)||0)*3;
if(d.synovial_thick!=='Yok')s+=6;
if(d.subtalar_effusion!=='Yok')s+=3;
}
else if(p.id==='plantar_plate'){
max=14;
const v=d.plantar_plate_status;
if(v==='Parsiyel yırtık')s+=10;
else if(v==='Komplet yırtık')s+=14;
}
else if(p.id==='retrocal_burs'){
max=16;
if(d.retrocal_bursit!=='Yok')s+=10;
if(d.haglund!=='Yok')s+=6;
}
const pct=max>0?Math.min(100,Math.round(s/max*100)):0;
sc[p.id]={score:s,max,pct};
});
return sc;
}

/* ═══════════════════════ COMPONENTS ═══════════════════════ */
function RadioGroup({options,value,onChange,cols}){
return(<div className="radio-group" style={cols?{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`}:{}}>
{options.map(o=>{
const label=typeof o==='string'?o:o.label;
const val=typeof o==='string'?o:o.value;
return <div key={val} className={`radio-btn${value===val?' selected':''}`} onClick={()=>onChange(val)}>{label}</div>
})}
</div>);
}
function CheckGroup({options,values=[],onChange,cols}){
const toggle=v=>{
const next=values.includes(v)?values.filter(x=>x!==v):[...values,v];
onChange(next);
};
return(<div className="check-group" style={cols?{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`}:{}}>
{options.map(o=>{
const label=typeof o==='string'?o:o.label;
const val=typeof o==='string'?o:o.value;
return <div key={val} className={`check-btn${values.includes(val)?' selected':''}`} onClick={()=>toggle(val)}>{label}</div>
})}
</div>);
}
function Field({label,children}){return <div className="form-group"><label>{label}</label>{children}</div>}

/* ═══════════════════════ REPORT GENERATOR ═══════════════════════ */
function generateReportHTML(d,scores){
const N='Normal', nf=(v,label)=>v&&v!==N&&v!=='Yok'&&v!=='Hayır'?`<span class="finding-abnormal">${label||''}: ${v}</span>`:`<span class="finding-normal">${label||''}: ${v||N}</span>`;
const row=(label,val,cls)=>`<tr><td style="width:40%;font-weight:600;color:#37474f">${label}</td><td class="${cls||''}">${val}</td></tr>`;
const abnRow=(label,val)=>row(label,val,val===N||val==='Yok'?'finding-normal':'finding-abnormal');
const sec=(title,content)=>`<div class="report-section"><div class="report-section-title">${title}</div>${content}</div>`;

let h='';
// Header
h+=`<div class="report-header-band"><h2>AYAK & AYAK BİLEĞİ MRG — YAPILANDIRILMIŞ RAPOR</h2><div class="rh-sub">${d.hasta_ad?d.hasta_ad+' | ':''}${d.hasta_id?'Protokol: '+d.hasta_id+' | ':''}${d.tarih} | ${d.klinik_taraf||''} Ayak/Ayak Bileği</div></div>`;
h+='<div class="report-body">';

// Patient & Clinical
h+=sec('HASTA & KLİNİK BİLGİ',`<table class="report-table">
${row('Hasta',`${d.hasta_ad||'-'}, ${d.hasta_yas||'-'} yaş, ${d.hasta_cinsiyet||'-'}`)}
${row('Endikasyon',d.klinik_endikasyon.join(', ')||'-')}
${row('Taraf',d.klinik_taraf||'-')}
${row('Semptom Süresi',d.klinik_sure||'-')}
${row('Travma',d.klinik_travma||'-')}
${d.klinik_notu?row('Not',d.klinik_notu):''}
</table>`);

// Technique
h+=sec('TEKNİK',`<table class="report-table">
${row('Alan Gücü',d.alan_gucu)}
${row('Sekanslar',d.sekanslar.join(', ')||'-')}
${row('IV Kontrast',d.kontrast||'-')}
</table>`);

// Bone
const boneFindings=[];
if(d.kemik_dizilim!=='Normal')boneFindings.push('Dizilim: '+d.kemik_dizilim+(d.dizilim_detay.length?' ('+d.dizilim_detay.join(', ')+')':''));
if(d.kemik_ilik!=='Normal')boneFindings.push('İlik sinyali: '+d.ilik_pattern+(d.ilik_lokalizasyon.length?' — '+d.ilik_lokalizasyon.join(', '):''));
if(d.fracture!=='Yok')boneFindings.push('Kırık: '+d.fracture+(d.fracture_loc?' — '+d.fracture_loc:'')+(d.fracture_type?' ('+d.fracture_type+')':''));
if(d.bone_contusion==='Var')boneFindings.push('Kemik kontüzyonu: '+d.contusion_loc);
if(d.periosteal_rx==='Var')boneFindings.push('Periosteal reaksiyon mevcut');
h+=sec('KEMİK YAPILAR & İLİK',`<table class="report-table">
${abnRow('Dizilim',d.kemik_dizilim)}
${d.kemik_dizilim!=='Normal'?row('Detay',d.dizilim_detay.join(', ')||'-'):''}
${abnRow('Kemik İliği',d.kemik_ilik)}
${d.kemik_ilik!=='Normal'?row('Patern / Yer',d.ilik_pattern+' — '+(d.ilik_lokalizasyon.join(', ')||'-')):''}
${abnRow('Kırık',d.fracture)}
${d.fracture!=='Yok'?row('Kırık Detay',d.fracture_loc+' '+d.fracture_type):''}
${abnRow('Kemik Kontüzyonu',d.bone_contusion==='Var'?d.contusion_loc:'Yok')}
${abnRow('Periosteal Reaksiyon',d.periosteal_rx)}
</table>`);

// Tendons
h+=sec('TENDON DEĞERLENDİRMESİ',`<table class="report-table">
<tr><th colspan="2">AŞİL TENDONU</th></tr>
${abnRow('Morfoloji',d.achilles_morph)}
${d.achilles_morph!==N?row('Lokalizasyon',d.achilles_loc||'-'):''}
${d.achilles_morph!==N?row('Kalınlık',d.achilles_kalinlik?d.achilles_kalinlik+' mm':'-'):''}
${d.achilles_morph!==N?row('Sinyal',d.achilles_signal||'-'):''}
${abnRow('Haglund',d.haglund)}
${abnRow('Retrokalkaneal Bursit',d.retrocal_bursit)}
${abnRow('Paratenon',d.paratenon)}
<tr><th colspan="2">TİBİALİS POSTERİOR</th></tr>
${abnRow('Morfoloji',d.tibpost_morph)}
${d.tibpost_morph!==N?row('Lokalizasyon',d.tibpost_loc||'-'):''}
${abnRow('Aksesuar Naviküler',d.accessory_nav)}
<tr><th colspan="2">PERONEAL TENDONLAR</th></tr>
${abnRow('Peroneus Brevis',d.pb_morph)}
${abnRow('Peroneus Longus',d.pl_morph)}
${abnRow('Subluksasyon',d.peroneal_sublux)}
${abnRow('SPR',d.spr_status)}
${abnRow('Peroneal Tüberkül',d.peroneal_tub)}

${abnRow('FHL',d.fhl_morph)}

${abnRow('FDL',d.fdl_morph)}
${abnRow('Ekstansörler',d.extensor_morph)}

// Ligaments
h+=sec('LİGAMAN DEĞERLENDİRMESİ',`<table class="report-table">

${abnRow('ATFL',d.atfl)}
${abnRow('CFL',d.cfl)}
${abnRow('PTFL',d.ptfl)}

${abnRow('Spring Ligaman',d.spring_lig)}

${d.lisfranc_lig!==N?abnRow('Midfoot Ödemi',d.midfoot_edema):''}
${abnRow('Bifurkat Ligaman',d.bifurcate_lig)}
</table>`);

// Joints
h+=sec('EKLEM DEĞERLENDİRMESİ',`<table class="report-table">
<tr><th colspan="2">TİBİOTALAR EKLEM</th></tr>
${abnRow('Efüzyon',d.tibiotalar_effusion)}
${abnRow('Sinoviyal Kalınlaşma',d.synovial_thick)}
${abnRow('Kıkırdak',d.cartilage_grade)}
${abnRow('OKL',d.ocd_present)}

${d.ocd_present==='Var'?row('OKL Stabilite',d.ocd_stability||'-'):''}
${d.ocd_present==='Var'?row('OKL Evre',d.ocd_class||'-'):''}
${abnRow('Serbest Cisim',d.loose_body)}
<tr><th colspan="2">SUBTALAR EKLEM & SİNUS TARSİ</th></tr>
${abnRow('Subtalar Efüzyon',d.subtalar_effusion)}
${abnRow('Subtalar Kıkırdak',d.subtalar_cartilage)}
${abnRow('Sinus Tarsi',d.sinus_tarsi)}
${abnRow('Tarsal Koalisyon',d.coalition)}
${d.coalition==='Var'?row('Tip / Yer',d.coalition_type+' — '+d.coalition_loc):''}
</table>`);

// Plantar
h+=sec('PLANTAR YAPILAR',`<table class="report-table">
${abnRow('Plantar Fasya',d.plantar_fascia)}
${d.plantar_fascia!==N?row('Kalınlık',d.pf_thickness?d.pf_thickness+' mm':'-'):''}
${d.plantar_fascia!==N?row('Sinyal',d.pf_signal||'-'):''}
${d.plantar_fascia!==N?row('Bölge',d.pf_loc||'-'):''}

${d.plantar_fibroma==='Var'?row('Boyut',d.fibroma_size?d.fibroma_size+' mm':'-'):''}

${d.plantar_plate_status!==N&&d.plantar_plate_status!=='Değerlendirilemedi'?row('MTP',d.pp_loc||'-'):''}

// Neural
h+=sec('NÖRAL YAPILAR',`<table class="report-table">
${abnRow('Tarsal Tünel',d.tarsal_tunnel_finding)}
${abnRow('Tibial Sinir',d.tibial_nerve)}
${abnRow('Morton Nöroması',d.morton_present)}
${d.morton_present==='Var'?row('Web Aralığı',d.morton_space||'-'):''}
${d.morton_present==='Var'?row('Boyut',d.morton_size?d.morton_size+' mm':'-'):''}
${abnRow('Baxter Siniri',d.baxter_nerve)}

// Soft tissue / misc

${abnRow('Yumuşak Doku İnflamasyonu',d.soft_tissue_inflam)}
${abnRow('Blooming (T2*)',d.blooming)}
${abnRow('Ganglion Kisti',d.ganglion_present)}

${d.ek_incidental?row('İnsidental',d.ek_incidental):''}
${d.ek_freetext?row('Ek Not',d.ek_freetext):''}

// Lesions
if(d.lesions.length>0){
let lt='';
d.lesions.forEach((l,i)=>{

if(d.tibpost_morph!==N)abnormals.push(`Tibialis posterior: ${d.tibpost_morph}`);
if(d.pb_morph!==N||d.pl_morph!==N)abnormals.push(`Peroneal tendonlar: PB-${d.pb_morph}, PL-${d.pl_morph}`);
if(d.atfl!==N||d.cfl!==N||d.ptfl!==N)abnormals.push(`Lateral ligaman: ATFL-${d.atfl}, CFL-${d.cfl}, PTFL-${d.ptfl}`);
if(d.deltoid_sup!==N||d.deltoid_deep!==N)abnormals.push(`Deltoid ligaman: Yüzeyel-${d.deltoid_sup}, Derin-${d.deltoid_deep}`);
if(d.spring_lig!==N)abnormals.push(`Spring ligaman: ${d.spring_lig}`);
if(d.lisfranc_lig!==N)abnormals.push(`Lisfranc: ${d.lisfranc_lig}`);
if(d.ocd_present==='Var')abnormals.push(`Talus OKL: ${d.ocd_loc||''}, ${d.ocd_stability||''}, ${d.ocd_class||''}`);
if(d.fracture!=='Yok')abnormals.push(`Kırık: ${d.fracture} — ${d.fracture_loc||''}`);
if(d.plantar_fascia!==N)abnormals.push(`Plantar fasya: ${d.plantar_fascia}`);
if(d.plantar_fibroma!=='Yok')abnormals.push(`Plantar fibroma (${d.fibroma_size||'?'} mm)`);
if(d.coalition==='Var')abnormals.push(`Tarsal koalisyon: ${d.coalition_type} — ${d.coalition_loc}`);
if(d.avn_present==='Var')abnormals.push(`AVN: ${d.avn_loc}`);
if(d.morton_present==='Var')abnormals.push(`Morton nöroması: ${d.morton_space} aralık`);
if(d.sinus_tarsi!=='Normal (yağ sinyali)')abnormals.push(`Sinus tarsi: ${d.sinus_tarsi}`);
if(d.tarsal_tunnel_finding!==N)abnormals.push(`Tarsal tünel: ${d.tarsal_tunnel_finding}`);
if(d.ganglion_present!=='Yok')abnormals.push('Ganglion kisti');
if(d.bone_lesion!=='Yok')abnormals.push('Kemik lezyonu — tümör şüphesi');

h+=`<div class="yorum-box"><h4>YORUM</h4>`;
if(abnormals.length===0){
h+=`<p>Ayak/ayak bileği MRG incelemesinde belirgin patolojik bulgu saptanmamıştır.</p>`;
}else{
h+=`<p><strong>Tespit edilen başlıca bulgular:</strong></p><ul>${abnormals.map(a=>'<li>'+a+'</li>').join('')}</ul>`;
if(d.fracture!=='Yok')h+=`<p><strong>⚠️ Kırık:</strong> ${d.fracture} — ${d.fracture_loc||''} ${d.fracture_type||''} — Klinik korelasyon ve gerekirse BT önerilir.</p>`;
if(d.ocd_present==='Var')h+=`<p><strong>⚠️ OKL:</strong> ${d.ocd_loc||''} yerleşimli osteokondral lezyon — ${d.ocd_stability||''} — Evreleme ve tedavi planlaması için ortopedi konsültasyonu önerilir.</p>`;
if(d.avn_present==='Var')h+=`<p><strong>⚠️ AVN:</strong> ${d.avn_loc||''} — Evre tayini ve takip için klinik korelasyon önerilir.</p>`;
if(d.bone_lesion!=='Yok')h+=`<p><strong>⚠️ Kemik lezyonu:</strong> Malignite ayırıcı tanıda düşünülmelidir — biyopsi ve/veya ileri tetkik önerilir.</p>`;
}
h+=`</div>`;

// Differential Diagnosis
const scored=Object.entries(scores).filter(([k,v])=>v.pct>0).sort((a,b)=>b[1].pct-a[1].pct);
if(scored.length>0){
let dt=`<table class="diff-table"><tr><th>Sıra</th><th>Patoloji</th><th>Kategori</th><th>Skor</th><th>Olasılık</th></tr>`;
scored.forEach(([id,v],i)=>{
const p=PATHOLOGY_DB.find(x=>x.id===id);
const cls=v.pct>=60?'score-high':v.pct>=30?'score-med':'score-low';
dt+=`<tr><td>${i+1}</td><td>${p?p.name:id}</td><td>${p?p.cat:''}</td><td class="${cls}">${v.pct}%</td><td class="${cls}">${v.pct>=60?'YÜKSEK':v.pct>=30?'ORTA':'DÜŞÜK'}</td></tr>`;
});
dt+='</table>';
h+=sec('AYIRICI TANI',dt);
}

h+='</div>';
return h;
}

/* ═══════════════════════ MAIN APP ═══════════════════════ */
function App(){
const [step,setStep]=useState(0);
const [data,setData]=useState(initData);
const [showReport,setShowReport]=useState(false);
const reportRef=useRef(null);

const u=useCallback((k,v)=>setData(prev=>({...prev,[k]:v})),[]);
const ul=useCallback((k,v)=>{
setData(prev=>{
const ls=[...prev.lesions];
const idx=prev.currentLesionIdx;
if(idx>=0&&idx<ls.length){ls[idx]={...ls[idx],[k]:v};}
return{...prev,lesions:ls};
});
},[]);

const curLes=data.currentLesionIdx>=0&&data.currentLesionIdx<data.lesions.length?data.lesions[data.currentLesionIdx]:null;
const scores=useMemo(()=>computeScores(data),[data]);
const isLoop=step>=LOOP_START&&step<=LOOP_END;

const goNext=useCallback(()=>{
if(step===LOOP_START-1){// preLoop
if(data.has_lesion==='Evet'){
// Start new lesion
const newLes=initLesion();
setData(prev=>({...prev,lesions:[...prev.lesions,newLes],currentLesionIdx:prev.lesions.length}));
setStep(LOOP_START);
}else{
setStep(LOOP_END+1);// skip to ek
}
}else if(step===LOOP_END){// loopSum → ask for more or exit
// handled by buttons in LoopSum
}else if(step>=LOOP_START&&step<LOOP_END){
setStep(step+1);
}else{
setStep(step+1);
}
},[step,data]);

const goPrev=useCallback(()=>{
if(step===LOOP_START&&data.currentLesionIdx>=0){
// Going back from first loop step: if idx===0, go to preLoop; else go to loopSum of previous
if(data.currentLesionIdx===0){
setData(prev=>({...prev,currentLesionIdx:-1}));
setStep(LOOP_START-1);
}else{
setData(prev=>({...prev,currentLesionIdx:prev.currentLesionIdx-1}));
setStep(LOOP_END);
}
}else if(step===LOOP_END+1){
// Coming back from ek: go to preLoop if no lesions, else loopSum of last
if(data.lesions.length>0){
setData(prev=>({...prev,currentLesionIdx:prev.lesions.length-1}));
setStep(LOOP_END);
}else{
setStep(LOOP_START-1);
}
}else if(step>0){
setStep(step-1);
}
},[step,data]);

const addAnotherLesion=()=>{
const newLes=initLesion();
setData(prev=>({...prev,lesions:[...prev.lesions,newLes],currentLesionIdx:prev.lesions.length}));
setStep(LOOP_START);
};
const finishLesions=()=>{
setData(prev=>({...prev,currentLesionIdx:-1}));
setStep(LOOP_END+1);
};

const renderStep=()=>{
const sid=STEPS[step]?.id;
switch(sid){
case 'hasta':return <StepHasta d={data} u={u}/>;
case 'klinik':return <StepKlinik d={data} u={u}/>;
case 'teknik':return <StepTeknik d={data} u={u}/>;
case 'kemik':return <StepKemik d={data} u={u}/>;
case 'asil':return <StepAchilles d={data} u={u}/>;
case 'tibPost':return <StepTibPost d={data} u={u}/>;
case 'peroneal':return <StepPeroneal d={data} u={u}/>;
case 'digerTendon':return <StepDigerTendon d={data} u={u}/>;
case 'lateral':return <StepLateral d={data} u={u}/>;
case 'deltoid':return <StepDeltoid d={data} u={u}/>;
case 'spring':return <StepSpring d={data} u={u}/>;
case 'tibiotalar':return <StepTibiotalar d={data} u={u}/>;
case 'subtalar':return <StepSubtalar d={data} u={u}/>;
case 'plantar':return <StepPlantar d={data} u={u}/>;
case 'tarsal':return <StepTarsal d={data} u={u}/>;
case 'preLoop':return <StepPreLoop d={data} u={u}/>;
case 'loopLoc':return curLes?<LoopLoc les={curLes} ul={ul}/>:null;
case 'loopSize':return curLes?<LoopSize les={curLes} ul={ul}/>:null;
case 'loopSignal':return curLes?<LoopSignal les={curLes} ul={ul}/>:null;
case 'loopContrast':return curLes?<LoopContrast les={curLes} ul={ul}/>:null;
case 'loopEnv':return curLes?<LoopEnv les={curLes} ul={ul}/>:null;
case 'loopExtra':return curLes?<LoopExtra les={curLes} ul={ul}/>:null;
case 'loopSum':return curLes?<LoopSum les={curLes} idx={data.currentLesionIdx}/>:null;
case 'ek':return <StepEk d={data} u={u}/>;
case 'rapor':return null;
default:return <div>Bilinmeyen adım</div>;
}
};

// Report view
if(showReport){
const rhtml=generateReportHTML(data,scores);
return(<div className="report-overlay">
<div className="report-actions">
<button className="btn-print" onClick={()=>window.print()}>🖨️ Yazdır</button>
<button className="btn-copy" onClick={()=>{
const el=reportRef.current;
if(el){
const range=document.createRange();range.selectNodeContents(el);
const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
document.execCommand('copy');sel.removeAllRanges();
alert('Rapor panoya kopyalandı!');
}
}}>📋 Kopyala</button>
<button className="btn-html" onClick={()=>{
const blob=new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Rapor</title><style>${document.querySelector('style').textContent}</style></head><body style="background:#fff">${rhtml}</body></html>`],{type:'text/html'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=url;a.download=`AyakMRI_${data.hasta_ad||'rapor'}_${data.tarih}.html`;
a.click();URL.revokeObjectURL(url);
}}>💾 HTML İndir</button>
<button className="btn-close" onClick={()=>setShowReport(false)}>✕ Kapat</button>
</div>
<div className="report-sheet" ref={reportRef} dangerouslySetInnerHTML={{__html:rhtml}}/>
</div>);
}

const isLastStep=step===STEPS.length-1;
const isRaporStep=STEPS[step]?.id==='rapor';

return(<div>
<div className="app-header">
<div className="logo-icon">AA</div>
<div><h1>Ayak & Ayak Bileği MRI Karar Destek Sistemi</h1><div className="subtitle">Yapılandırılmış Raporlama & Ayırıcı Tanı • v1.0</div></div>
</div>
<div className="progress-bar">
{STEPS.map((s,i)=><div key={i} className={`prog-step${i===step?' active':''}${i<step?' done':''}${s.loop?' loop':''}`}/>)}
</div>
<div className="main-content">
<div className="step-card">
<div className="step-title">
<span className="step-num">{step+1}/{STEPS.length}</span>
{STEPS[step]?.icon} {STEPS[step]?.title}
{isLoop&&data.currentLesionIdx>=0&&<span className="lesion-badge">Lezyon {data.currentLesionIdx+1}</span>}
</div>
<div className="step-desc">
{isLoop?'Lezyon karakterizasyonu — her lezyon için 7 alt adım':
STEPS[step]?.id==='rapor'?'Tüm veriler toplanmıştır. Raporu oluşturun.':''}
</div>
{isRaporStep?
<div>
<div style={{textAlign:'center',padding:'30px 0'}}>
<div style={{fontSize:'3rem',marginBottom:16}}>📄</div>
<h3 style={{color:'var(--accent)',marginBottom:12}}>Rapor Oluşturmaya Hazır</h3>
<p style={{color:'var(--txt2)',marginBottom:8}}>Toplam {Object.values(scores).filter(v=>v.pct>0).length} olası patoloji tespit edildi.</p>
{data.lesions.length>0&&<p style={{color:'#ff9800'}}>{data.lesions.length} adet fokal lezyon kaydedildi.</p>}
<button className="nav-btn next" style={{marginTop:20,fontSize:'1rem',padding:'14px 40px'}} onClick={()=>setShowReport(true)}>📄 Raporu Oluştur</button>
</div>
</div>
:renderStep()}
<div className="nav-bar">
<button className="nav-btn prev" onClick={goPrev} disabled={step===0}>← Geri</button>
{STEPS[step]?.id==='loopSum'?
<div style={{display:'flex',gap:10}}>
<button className="nav-btn next" style={{background:'linear-gradient(135deg,#ff9800,#f57c00)'}} onClick={addAnotherLesion}>+ Yeni Lezyon</button>
<button className="nav-btn next" onClick={finishLesions}>Lezyonları Bitir →</button>
</div>
:!isRaporStep&&<button className="nav-btn next" onClick={goNext} disabled={isLastStep}>İleri →</button>
}
</div>
</div>
</div>
</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
