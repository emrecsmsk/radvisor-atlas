<title>El & El Bileği MRI Değerlendirme</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e14;--surface:#111822;--card:#19202b;--border:#2a3444;--accent:#00b4d8;--accentDark:#0077b6;--accentGlow:rgba(0,180,216,0.15);--text:#e0e6ed;--textDim:#8899aa;--danger:#ef4444;--warn:#f59e0b;--success:#22c55e;--purple:#a78bfa;--radius:10px}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app-header{background:linear-gradient(135deg,#0d1520,#12202e);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px}
.app-header .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accentDark));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff}
.app-header h1{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.app-header .sub{font-size:11px;color:var(--textDim);margin-top:2px}
.wizard-bar{display:flex;align-items:center;gap:4px;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:nowrap}
.wz-dot{width:28px;height:28px;min-width:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border);color:var(--textDim);cursor:pointer;transition:all .2s}
.wz-dot.active{border-color:var(--accent);background:var(--accentGlow);color:var(--accent)}
.wz-dot.done{border-color:var(--success);background:rgba(34,197,94,.12);color:var(--success)}
.wz-line{width:12px;height:2px;background:var(--border);flex-shrink:0}
.main-area{max-width:900px;margin:0 auto;padding:20px}
.step-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.step-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.step-sub{font-size:12px;color:var(--textDim);margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--textDim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field select,.field input[type="text"],.field input[type="number"],.field textarea{width:100%;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border .2s}
.field select:focus,.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>.field{flex:1;min-width:140px}
.chk-group{display:flex;flex-wrap:wrap;gap:6px}
.chk-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--textDim);font-size:12px;cursor:pointer;transition:all .2s;user-select:none}
.chk-btn.on{border-color:var(--accent);background:var(--accentGlow);color:var(--accent);font-weight:600}
.chk-btn:hover{border-color:var(--accent)}
.radio-group{display:flex;flex-wrap:wrap;gap:6px}
.radio-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--textDim);font-size:12px;cursor:pointer;transition:all .2s}
.radio-btn.on{border-color:var(--accent);background:var(--accentGlow);color:var(--accent);font-weight:600}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.btn{padding:10px 22px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accentDark));color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--textDim)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-warn{background:var(--warn);color:#000}
.section-hdr{font-size:13px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:6px;margin:18px 0 12px}
.lesion-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;background:var(--accentGlow);border:1px solid var(--accent);color:var(--accent);margin:4px}
.lesion-list{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.dx-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:6px;background:var(--surface);border:1px solid var(--border)}
.dx-bar{height:8px;border-radius:4px;transition:width .4s}
.dx-pct{font-size:13px;font-weight:700;min-width:48px;text-align:right}
.dx-name{font-size:13px;flex:1}
.report-box{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:0;max-height:60vh;overflow-y:auto;color:var(--text)}
.rpt-header{background:linear-gradient(135deg,#0d1520,#162030);padding:14px 18px;border-bottom:2px solid var(--accent);text-align:center}
.rpt-header h2{font-size:15px;color:var(--accent);margin-bottom:4px;letter-spacing:.5px}
.rpt-header .rpt-meta{font-size:11px;color:var(--textDim);line-height:1.6}
.rpt-section{border:1px solid var(--border);border-radius:8px;margin:10px;overflow:hidden}
.rpt-section-title{background:linear-gradient(90deg,rgba(0,180,216,.15),transparent);padding:8px 14px;font-size:12px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);letter-spacing:.3px}
.rpt-row{display:flex;padding:5px 14px;font-size:12px;line-height:1.5;border-bottom:1px solid rgba(42,52,68,.4)}
.rpt-row:last-child{border-bottom:none}
.rpt-row:nth-child(odd){background:rgba(17,24,34,.6)}
.rpt-row:nth-child(even){background:rgba(25,32,43,.8)}
.rpt-label{min-width:160px;max-width:200px;color:var(--textDim);font-weight:600;flex-shrink:0;padding-right:8px}
.rpt-val{flex:1;color:var(--text)}
.rpt-val.patolojik{color:var(--warn);font-weight:600}
.rpt-val.danger{color:var(--danger);font-weight:700}
.rpt-dx-row{display:flex;align-items:center;padding:6px 14px;font-size:12px;border-bottom:1px solid rgba(42,52,68,.4)}
.rpt-dx-row:nth-child(odd){background:rgba(17,24,34,.6)}
.rpt-dx-row:nth-child(even){background:rgba(25,32,43,.8)}
.rpt-dx-bar{height:6px;border-radius:3px;margin-left:8px}
.rpt-conclusion{margin:10px;padding:12px 16px;background:rgba(0,180,216,.08);border:1px solid rgba(0,180,216,.25);border-radius:8px;font-size:12px;line-height:1.7;color:var(--text)}
.copy-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-left:6px}
.badge-red{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3)}
.badge-green{background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3)}
.info-box{background:rgba(0,180,216,.08);border:1px solid rgba(0,180,216,.25);border-radius:8px;padding:12px;font-size:12px;color:var(--accent);margin:10px 0}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;width:100%;max-width:780px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.overlay-top{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.overlay-body{flex:1;overflow-y:auto;padding:0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;animation:fadeUp .3s}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>

const mkL=()=>({loc:"",size:"",t1:"",t2:"",stir:"",dwi:"",adc:"",contrast:"",margin:"",content:"",notes:""});

function computeDx(s){
const tags=new Set();
/* — Kemik — */
if(s.radius.fractureLine!=="Yok") tags.add("radFxLine");
if(s.radius.odem!=="Yok"){tags.add("radOdem");tags.add("boneEdema");tags.add("T2bright")}
if(s.radius.cortex!=="Normal") tags.add("radKorteksIrreg");
if(s.radius.signal!=="Normal"){tags.add("T1dark")}
if(s.ulna.stiloidFx!=="Yok"){tags.add("ulnStiloidFx");tags.add("ulnStiloidOdem")}
if(s.ulna.odem!=="Yok"){tags.add("boneEdema");tags.add("T2bright")}

const cp=s.carpalProx;
if(cp.scaphoid_fx!=="Yok"){tags.add("scaphoidFx");tags.add("scaphoidOdem");tags.add("scaphoidLine");tags.add("T1dark");tags.add("T2bright")}
if(cp.scaphoid_avn!=="Yok"){tags.add("scaphoidAVN");tags.add("scaphoidT1dark");tags.add("scaphoidKontrast")}
if(cp.scaphoid_odem!=="Yok"){tags.add("scaphoidOdem");tags.add("boneEdema")}
if(cp.lunate_signal!=="Normal"){tags.add("lunatT1dark");tags.add("T1dark")}
if(cp.lunate_odem!=="Yok"){tags.add("lunatOdem");tags.add("boneEdema")}
if(cp.lunate_collapse!=="Yok"){tags.add("lunatCollapse");tags.add("lunatAVN")}
if(cp.lunate_fragman!=="Yok"){tags.add("lunatFragman");tags.add("lunatAVN")}
if(cp.triquetrum_odem!=="Yok"){tags.add("boneEdema")}
if(cp.pisiform_odem!=="Yok"){tags.add("boneEdema")}

const cd=s.carpalDist;
if(cd.hamate_hookFx!=="Yok"){tags.add("hamatumHookFx");tags.add("hamatumOdem")}
if(cd.hamate_odem!=="Yok"){tags.add("hamatumOdem");tags.add("boneEdema")}

if(s.metacarp.fracture!=="Yok"){tags.add("metacarpFx");tags.add("metacarpOdem")}
if(s.metacarp.odem!=="Yok"){tags.add("boneEdema")}

/* — TFCC — */
if(s.tfcc.tear!=="Yok"){tags.add("tfccTear");tags.add("tfccSignalInc");tags.add("tfccMorfoAnml")}
if(s.tfcc.signal!=="Normal") tags.add("tfccSignalInc");
if(s.tfcc.morph!=="Normal") tags.add("tfccMorfoAnml");
if(s.tfcc.palmerClass) tags.add("tfccPalmer");
if(s.tfcc.disc!=="Normal") tags.add("tfccDegen");

/* — Ligamentler — */
if(s.slLig.integrity!=="İntakt"){tags.add("slTear");tags.add("slSignal")}
if(s.slLig.gap!=="Yok"){tags.add("slGap");tags.add("dlsiWiden")}
if(s.slLig.signal!=="Normal") tags.add("slSignal");
if(s.ltLig.integrity!=="İntakt"){tags.add("ltTear");tags.add("ltSignal")}
if(s.ltLig.gap!=="Yok") tags.add("ltGap");
if(s.extrLig.dorsal!=="Normal"||s.extrLig.volar!=="Normal"){tags.add("extrLigTear");tags.add("extrLigSignal")}

/* — DRUJ — */
if(s.druj.congruity!=="Normal") tags.add("drujInstab");
if(s.druj.subluxation!=="Yok") tags.add("drujSubluks");
if(s.druj.effusion!=="Yok") tags.add("drujEffusion");
if(s.druj.widening!=="Yok") tags.add("drujWidening");

/* — Tendonlar — */
if(s.flexor.teno!=="Yok"){tags.add("flexorTeno");tags.add("flexorFluid");tags.add("flexorThicken")}
if(s.flexor.fluid!=="Yok"){tags.add("flexorFluid");tags.add("carpalTunnelFluid")}
if(s.flexor.tear==="Parsiyel"){tags.add("flexorPartialTear");tags.add("flexorSignalInc");tags.add("flexorThinning")}
if(s.flexor.tear==="Komplet"){tags.add("flexorCompleteTear");tags.add("flexorGap");tags.add("flexorRetraction")}
if(s.extensor.comp1Teno!=="Yok"){tags.add("deQuervain");tags.add("comp1Teno");tags.add("comp1Fluid");tags.add("comp1Thicken")}
if(s.extensor.teno!=="Yok"){tags.add("extensorTeno");tags.add("extFluid");tags.add("extThicken")}
if(s.extensor.tear==="Parsiyel"){tags.add("extPartialTear");tags.add("extSignalInc");tags.add("extThinning")}
if(s.extensor.tear==="Komplet"){tags.add("extCompleteTear");tags.add("extGap");tags.add("extRetraction")}

/* — Karpal Tünel & Sinir — */
if(s.flexor.carpalTunnel!=="Normal") tags.add("carpalTunnel");
if(s.flexor.medianNerve!=="Normal"){tags.add("medianNerveEnlarge");tags.add("medianSignalInc")}
if(s.flexor.medianFlat!=="Yok") tags.add("medianFlat");
if(s.flexor.retinac!=="Normal") tags.add("retinacBow");
if(s.neural.ulnarNerveGuyon!=="Normal"){tags.add("guyonCanal");tags.add("ulnarNerveEnlarge");tags.add("ulnarNerveSignal")}

/* — Eklem & Sinovya — */
if(s.joints.synovialEnhance!=="Yok"){tags.add("synovialEnhance")}
if(s.joints.pannus!=="Yok"){tags.add("pannus");tags.add("raArthritis")}
if(s.joints.erosion!=="Yok"){tags.add("erosion")}
if(s.joints.looseBodies!=="Yok"){tags.add("looseBodies");tags.add("synovialChond")}
if(s.joints.cartilage!=="Normal") tags.add("cartilageDefect");
if(s.joints.osteophyte!=="Yok"){tags.add("osteophyte");tags.add("oa")}
if(s.joints.cmc1!=="Normal"){tags.add("cmc1oa");tags.add("oa")}
const multiJ=[s.joints.mcpJoints,s.joints.pipJoints,s.joints.dipJoints].filter(j=>j!=="Normal").length;
if(multiJ>=2){tags.add("multiJoint");tags.add("symmetric")}
if(s.joints.dipJoints!=="Normal"){tags.add("dipJoint")}

/* — Yumuşak Doku — */
if(s.extra.dupuytren!=="Yok"){tags.add("dupuytren");tags.add("palmarNodule");tags.add("palmarFascia");tags.add("T2dark")}
if(s.extra.palmarFascia!=="Normal") tags.add("palmarFascia");

/* — Klinik — */
if(s.clin.symptoms.includes("Travma")) tags.add("travma");
if(s.clin.symptoms.includes("Gece ağrısı")) tags.add("nightPain");
if(s.clin.symptoms.includes("Radial ağrı")) tags.add("radialPain");
if(s.clin.symptoms.includes("Ulnar ağrı")) tags.add("ulnarPain");
if(s.clin.symptoms.includes("Ateş")) tags.add("fever");
if(s.clin.history.includes("RA")) tags.add("raArthritis");
if(s.clin.history.includes("Gut")) tags.add("gout");
if(s.clin.history.includes("Psöriazis")){tags.add("psoriatic");tags.add("nailChange")}
if(s.clin.history.includes("DM")||s.clin.history.includes("Travma öyküsü")) tags.add("travmaHx");
const age=parseInt(s.clin.age);
if(age>0&&age<40) tags.add("yas_genc");
if(age>=50) tags.add("kronik");

/* — Lezyonlar — */
s.lesions.forEach(l=>{
if(l.t1==="Hiperintens"){tags.add("T1bright");tags.add("fatSignal")}
if(l.t1==="Hipointens") tags.add("T1dark");
if(l.t1==="İzointens") tags.add("T1iso");
if(l.t1==="Heterojen") tags.add("T1variable");
if(l.t2==="Hiperintens") tags.add("T2bright");
if(l.t2==="Hipointens"){tags.add("T2low");tags.add("T2dark")}
if(l.t2==="Heterojen") tags.add("T2heterogen");
if(l.stir==="Hiperintens") tags.add("STIRbright");
if(l.contrast==="Yoğun"){tags.add("enhance");tags.add("intenseEnhance")}
if(l.contrast==="Halkasal"){tags.add("ringEnhance");tags.add("enhance")}
if(l.contrast==="Yok"||l.contrast==="Minimal") tags.add("noEnhance");
if(l.contrast==="Baskılanıyor") tags.add("fatSat_suppress");
if(l.margin==="Düzgün"){tags.add("wellDefined")}
if(l.margin==="Lobüle"){tags.add("lobulated")}
if(l.content==="Kistik"){tags.add("cystT2bright");tags.add("cystT1dark")}
if(l.content==="Solid"){tags.add("solidMass")}
if(l.content==="Yağlı"){tags.add("fatSignal");tags.add("T1bright");tags.add("fatSat_suppress")}
if(l.loc&&l.loc.toLowerCase().includes("dorsal")) tags.add("dorsalWrist");
if(l.loc&&l.loc.toLowerCase().includes("volar")){tags.add("volarWrist");tags.add("volarMass")}
if(l.loc&&l.loc.toLowerCase().includes("subungual")){tags.add("subungual");tags.add("smallLesion")}
if(l.loc&&l.loc.toLowerCase().includes("palmar")){tags.add("palmarNodule");tags.add("volarMass")}
if(l.loc&&l.loc.toLowerCase().includes("intraosseöz")){tags.add("intraosseous")}
if(l.loc&&l.loc.toLowerCase().includes("subkutan")){tags.add("subcutaneous")}
if(l.dwi==="Kısıtlılık var") tags.add("diffuzOdem");
});

/* — Ulnar varyans — */
if(s.joints.radiocarpalEffusion!=="Yok"&&s.tfcc.disc!=="Normal"&&cp.lunate_odem!=="Yok"){
tags.add("ulnarImpaction");tags.add("ulnarPlusVar");tags.add("lunatChondral");
}

/* ── Compute scores ── */
const results=[];
LESION_DB.forEach(dx=>{
let score=0,maxScore=0;
dx.keys.forEach(k=>{
const w=W[k]||4;
maxScore+=w;
if(tags.has(k)) score+=w;
});
/* DWI/ADC/Kontrast bonuses from lesions */
s.lesions.forEach(l=>{
if(l.dwi==="Kısıtlılık var") score+=DWI_W;
maxScore+=DWI_W;
if(l.adc==="Düşük") score+=ADC_W; 
maxScore+=ADC_W;
if(l.contrast&&l.contrast!=="Yok") score+=KONTRAST_W;
maxScore+=KONTRAST_W;
});
if(maxScore===0) return;
const pct=Math.min(100,Math.round(score/maxScore*100));
if(pct>=5) results.push({...dx,pct});
});
results.sort((a,b)=>b.pct-a.pct);
return results.slice(0,15);
}

function App(){
const [step,setStep]=useState(0);
const [s,setS]=useState(mkS);
const [currentLesionIdx,setCurrentLesionIdx]=useState(-1);
const [currentLesion,setCurrentLesion]=useState(mkL);
const [toast,setToast]=useState("");
const [done,setDone]=useState(new Set());

const upd=(section,field,val)=>setS(p=>({...p,[section]:{...p[section],[field]:val}}));
const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2000)};

const addLesion=()=>{setCurrentLesion(mkL());setCurrentLesionIdx(s.lesions.length)};
const editLesion=(i)=>{setCurrentLesion({...s.lesions[i]});setCurrentLesionIdx(i)};
const finalizeLesion=()=>{
if(!currentLesion.loc){showToast("Lokalizasyon gerekli!");return}
setS(p=>{const ls=[...p.lesions];
if(currentLesionIdx<p.lesions.length) ls[currentLesionIdx]=currentLesion;
else ls.push(currentLesion);
return{...p,lesions:ls}});
setCurrentLesionIdx(-1);setCurrentLesion(mkL());showToast("Lezyon kaydedildi");
};
const removeLesion=(i)=>{setS(p=>({...p,lesions:p.lesions.filter((_,j)=>j!==i)}));showToast("Lezyon silindi")};
const updL=(f,v)=>setCurrentLesion(p=>({...p,[f]:v}));

const goNext=()=>{
/* lesion loop skip when idx===-1 */
if(step===13&&currentLesionIdx===-1){
setDone(p=>{const n=new Set(p);n.add(step);return n});
setStep(step+1);return;
}
setDone(p=>{const n=new Set(p);n.add(step);return n});
setStep(Math.min(STEPS.length-1,step+1));
};
const goPrev=()=>{
/* from post-loop step go to pre-loop, not into loop */
if(step===14&&currentLesionIdx!==-1){setCurrentLesionIdx(-1);setCurrentLesion(mkL())}
setStep(Math.max(0,step-1));
};

const dx=useMemo(()=>computeDx(s),[s]);

const isP=(v,normals)=>{const n=normals||["Normal","Yok","İntakt",""];return !n.includes(v)};

/* ── Plain text for clipboard ── */
const genPlainReport=()=>{
const c=s.clin,t=s.tech,cp=s.carpalProx,cd=s.carpalDist;
const L=(lbl,val)=>lbl+": "+val;
let r=`EL VE EL BİLEĞİ MRG İNCELEME RAPORU\n${"═".repeat(48)}\n`;
r+=`Tarih: ${new Date().toLocaleDateString("tr-TR")}\n`;
r+=`Hasta: ${c.age} yaş, ${c.sex}, ${c.side} el bileği\n`;
r+=`Endikasyon: ${c.indication||c.symptoms.join(", ")||"—"}\n`;
r+=`Teknik: ${t.magnet}, ${t.coil}, ${t.sequences.join("/")}, ${t.plane}, Kontrast: ${t.contrast}\n\n`;
r+=`BULGULAR\n${"─".repeat(48)}\n\n`;
r+=`■ KEMİK YAPILAR\n`;
r+=`  ${L("Radius Korteks",s.radius.cortex)}, ${L("Sinyal",s.radius.signal)}, ${L("Ödem",s.radius.odem)}\n`;
if(s.radius.fractureLine!=="Yok") r+=`  Kırık Hattı: ${s.radius.fractureLine}\n`;
r+=`  ${L("Ulna Sinyal",s.ulna.signal)}, ${L("Stiloid",s.ulna.stiloid)}, ${L("Stiloid Kırığı",s.ulna.stiloidFx)}\n`;
r+=`  ${L("Skafoid",cp.scaphoid_signal)}, ${L("Morfoloji",cp.scaphoid_morph)}, ${L("Ödem",cp.scaphoid_odem)}\n`;
if(cp.scaphoid_fx!=="Yok") r+=`  Skafoid Kırık: ${cp.scaphoid_fx}\n`;
if(cp.scaphoid_avn!=="Yok") r+=`  Skafoid AVN: ${cp.scaphoid_avn}\n`;
r+=`  ${L("Lunat",cp.lunate_signal)}, ${L("Morfoloji",cp.lunate_morph)}, ${L("Ödem",cp.lunate_odem)}\n`;
if(cp.lunate_collapse!=="Yok") r+=`  Lunat Kollaps: ${cp.lunate_collapse}\n`;
r+=`  ${L("Trikuetrum",cp.triquetrum_signal)}, ${L("Pisiform",cp.pisiform_signal)}\n`;
r+=`  ${L("Trapezium",cd.trapezium_signal)}, ${L("Trapezoid",cd.trapezoid_signal)}, ${L("Kapitat",cd.capitate_signal)}\n`;
r+=`  ${L("Hamat",cd.hamate_signal)}, ${L("Kanca",cd.hamate_hook)}\n`;
if(cd.hamate_hookFx!=="Yok") r+=`  Kanca Kırığı: ${cd.hamate_hookFx}\n`;
r+=`  ${L("Metakarp/Falanks Sinyal",s.metacarp.signal)}, ${L("Kırık",s.metacarp.fracture)}\n\n`;
r+=`■ TFCC\n`;
r+=`  ${L("Morfoloji",s.tfcc.morph)}, ${L("Sinyal",s.tfcc.signal)}, ${L("Yırtık",s.tfcc.tear)}\n`;
if(s.tfcc.tear!=="Yok") r+=`  ${L("Tip",s.tfcc.tearType)}, ${L("Lok.",s.tfcc.tearLoc)}${s.tfcc.palmerClass?(", Palmer: "+s.tfcc.palmerClass):""}\n`;
r+=`  ${L("Disk",s.tfcc.disc)}\n\n`;
r+=`■ LİGAMENTLER\n`;
r+=`  SL: ${s.slLig.integrity}, ${L("Sinyal",s.slLig.signal)}, ${L("Gap",s.slLig.gap)}\n`;
r+=`  LT: ${s.ltLig.integrity}, ${L("Sinyal",s.ltLig.signal)}, ${L("Gap",s.ltLig.gap)}\n`;
r+=`  Ekstrinsik: ${L("Dorsal",s.extrLig.dorsal)}, ${L("Volar",s.extrLig.volar)}\n\n`;
r+=`■ DRUJ\n`;
r+=`  ${L("Kongrüite",s.druj.congruity)}, ${L("Subluksasyon",s.druj.subluxation)}, ${L("Efüzyon",s.druj.effusion)}\n\n`;
r+=`■ FLEKSÖR TENDONLAR & KARPAL TÜNEL\n`;
r+=`  ${L("FDS",s.flexor.fds)}, ${L("FDP",s.flexor.fdp)}, ${L("FPL",s.flexor.fpl)}\n`;
r+=`  ${L("Tenosinovit",s.flexor.teno)}, ${L("Sıvı",s.flexor.fluid)}\n`;
if(s.flexor.tear!=="Yok") r+=`  Yırtık: ${s.flexor.tear} — ${s.flexor.tearDetail}\n`;
r+=`  ${L("Karpal Tünel",s.flexor.carpalTunnel)}, ${L("Median Sinir",s.flexor.medianNerve)}${s.flexor.medianSize?(", AP: "+s.flexor.medianSize+"mm"):""}\n`;
r+=`  ${L("Retinakulum",s.flexor.retinac)}\n\n`;
r+=`■ EKSTANSÖR TENDONLAR\n`;
r+=`  1.K: ${s.extensor.comp1}${s.extensor.comp1Teno!=="Yok"?" (De Quervain: "+s.extensor.comp1Teno+")":""}, 2.K: ${s.extensor.comp2}, 3.K: ${s.extensor.comp3}\n`;
r+=`  4.K: ${s.extensor.comp4}, 5.K: ${s.extensor.comp5}, 6.K: ${s.extensor.comp6}\n`;
if(s.extensor.tear!=="Yok") r+=`  Yırtık: ${s.extensor.tear} — ${s.extensor.tearDetail}\n`;
r+=`\n■ EKLEMLER & SİNOVYA\n`;
r+=`  ${L("Radiokarpal",s.joints.radiocarpal)}, ${L("Efüzyon",s.joints.radiocarpalEffusion)}\n`;
r+=`  ${L("Midkarpal",s.joints.midcarpal)}, ${L("CMC-1",s.joints.cmc1)}\n`;
r+=`  ${L("MCP",s.joints.mcpJoints)}, ${L("PIP",s.joints.pipJoints)}, ${L("DIP",s.joints.dipJoints)}\n`;
r+=`  ${L("Sinovyum",s.joints.synovium)}, ${L("Kontrastlanma",s.joints.synovialEnhance)}, ${L("Pannus",s.joints.pannus)}\n`;
r+=`  ${L("Erozyon",s.joints.erosion)}${s.joints.erosionLoc?(", "+s.joints.erosionLoc):""}\n`;
r+=`  ${L("Serbest Cisim",s.joints.looseBodies)}, ${L("Kıkırdak",s.joints.cartilage)}, ${L("Osteofit",s.joints.osteophyte)}\n\n`;
if(s.lesions.length>0){r+=`■ LEZYONLAR\n`;s.lesions.forEach((l,i)=>{r+=`  Lezyon #${i+1}: ${l.loc} (${l.size||"—"})\n    T1:${l.t1||"—"} T2:${l.t2||"—"} STIR:${l.stir||"—"} DWI:${l.dwi||"—"} ADC:${l.adc||"—"}\n    Kontrast:${l.contrast||"—"} Sınır:${l.margin||"—"} İçerik:${l.content||"—"}\n`});r+=`\n`}
r+=`■ VASKÜLER & NÖRAL\n`;
r+=`  ${L("Radial A.",s.vascular.radialArt)}, ${L("Ulnar A.",s.vascular.ulnarArt)}, ${L("Palmar Arkus",s.vascular.palmarArch)}\n`;
r+=`  ${L("Median N.",s.neural.medianNerve)}, ${L("Ulnar N.",s.neural.ulnarNerve)}, ${L("Guyon",s.neural.ulnarNerveGuyon)}\n\n`;
r+=`■ EK BULGULAR\n`;
r+=`  ${L("Cilt/YD",s.extra.skinSoftTissue)}, ${L("Palmar Fasya",s.extra.palmarFascia)}, ${L("Dupuytren",s.extra.dupuytren)}\n\n`;
r+=`AYIRICI TANI\n${"─".repeat(48)}\n`;
if(dx.length===0) r+=`  Belirgin patolojik bulgu saptanmamıştır.\n`;
else dx.forEach((d,i)=>{r+=`  ${i+1}. ${d.name} — %${d.pct}\n`});
r+=`\nSONUÇ\n${"─".repeat(48)}\n`;
if(dx.length>0) r+=dx.slice(0,3).map((d,i)=>`${i+1}. ${d.name} (%${d.pct}) ile uyumlu bulgular.`).join("\n")+"\n";
else r+=`İncelenen el ve el bileğinde belirgin patolojik sinyal değişikliği veya yapısal anomali saptanmamıştır.\n`;
r+=`\nKlinik korelasyon önerilir.\n`;
return r;
};

const [showOverlay,setShowOverlay]=useState(false);
const overlayRef=useRef(null);

const copyReport=()=>{
const r=genPlainReport();
if(navigator.clipboard&&navigator.clipboard.writeText){
navigator.clipboard.writeText(r).then(()=>showToast("Rapor kopyalandı!")).catch(()=>setShowOverlay(true));
}else{setShowOverlay(true)}
};
const downloadReport=()=>{
try{
const r=genPlainReport();
const blob=new Blob(["\uFEFF"+r],{type:"text/plain;charset=utf-8"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");a.href=url;a.download="el_bilek_mri_rapor.txt";
document.body.appendChild(a);a.click();document.body.removeChild(a);
setTimeout(()=>URL.revokeObjectURL(url),100);
showToast("İndirildi!");
}catch(e){setShowOverlay(true)}
};
const selectAllOverlay=()=>{
if(overlayRef.current){overlayRef.current.select();overlayRef.current.focus();showToast("Tümü seçildi — Ctrl+C ile kopyalayın")}
};

<F label="İçerik"><Radio options={["Kistik","Solid","Mikst","Yağlı","Kalsifik","Hemorajik"]} value={currentLesion.content} onChange={v=>updL("content",v)}/></F>
</div>
<F label="Not"><Txt value={currentLesion.notes} onChange={v=>updL("notes",v)} placeholder="Ek özellikler, hemosiderin, septasyon vb."/></F>
<div style={{display:"flex",gap:8,marginTop:10}}>
<button className="btn btn-success" onClick={finalizeLesion}>Lezyonu Kaydet</button>
<button className="btn btn-outline" onClick={()=>{setCurrentLesionIdx(-1);setCurrentLesion(mkL())}}>İptal</button>
</div>
</div>
}
</div>);

case 14: return(<div>
<div className="step-title">🩸 Vasküler & Nöral Yapılar</div>
<div className="step-sub">Arterler, venler ve periferik sinirler</div>
<div className="section-hdr">Vasküler</div>
<div className="row">
<F label="Radial Arter"><Radio options={["Normal","Tromboz","Anevrizma","Pseudoanevrizma"]} value={s.vascular.radialArt} onChange={v=>upd("vascular","radialArt",v)}/></F>
<F label="Ulnar Arter"><Radio options={["Normal","Tromboz","Anevrizma","Hypothenar hammer"]} value={s.vascular.ulnarArt} onChange={v=>upd("vascular","ulnarArt",v)}/></F>
</div>
<div className="row">
<F label="Palmar Arkus"><Radio options={["Normal","İnkomplet","Anormal"]} value={s.vascular.palmarArch} onChange={v=>upd("vascular","palmarArch",v)}/></F>
<F label="Venöz Yapılar"><Radio options={["Normal","Dilate","Tromboz","Variköz"]} value={s.vascular.veins} onChange={v=>upd("vascular","veins",v)}/></F>
</div>
<F label="Vasküler Not"><Txt value={s.vascular.notes} onChange={v=>upd("vascular","notes",v)}/></F>

<div className="section-hdr">Nöral</div>
<div className="row">
<F label="Median Sinir (bilek)"><Radio options={["Normal","Genişlemiş","Sinyal artmış","Komprese"]} value={s.neural.medianNerve} onChange={v=>upd("neural","medianNerve",v)}/></F>
<F label="Ulnar Sinir (bilek)"><Radio options={["Normal","Genişlemiş","Sinyal artmış"]} value={s.neural.ulnarNerve} onChange={v=>upd("neural","ulnarNerve",v)}/></F>
</div>
<div className="row">
<F label="Ulnar Sinir (Guyon)"><Radio options={["Normal","Komprese","Kitle basısı","Ganglion basısı"]} value={s.neural.ulnarNerveGuyon} onChange={v=>upd("neural","ulnarNerveGuyon",v)}/></F>
<F label="Radial Sinir"><Radio options={["Normal","Anormal"]} value={s.neural.radialNerve} onChange={v=>upd("neural","radialNerve",v)}/></F>
</div>
<F label="Nöral Not"><Txt value={s.neural.notes} onChange={v=>upd("neural","notes",v)}/></F>
</div>);

case 15: return(<div>
<div className="step-title">📋 Ek Bulgular</div>
<div className="step-sub">Yumuşak doku, subkutan alan, palmar fasya, diğer</div>
<div className="row">
<F label="Cilt / Yumuşak Doku"><Radio options={["Normal","Ödem","Kalınlaşma","Kitle"]} value={s.extra.skinSoftTissue} onChange={v=>upd("extra","skinSoftTissue",v)}/></F>
<F label="Subkutan Doku"><Radio options={["Normal","Ödem","Nodül","Kitle"]} value={s.extra.subcutaneous} onChange={v=>upd("extra","subcutaneous",v)}/></F>
</div>
<div className="row">
<F label="Palmar Fasya"><Radio options={["Normal","Kalınlaşmış","Nodüler","Kontraktür"]} value={s.extra.palmarFascia} onChange={v=>upd("extra","palmarFascia",v)}/></F>
<F label="Dupuytren"><Radio options={["Yok","Erken evre","İleri evre"]} value={s.extra.dupuytren} onChange={v=>upd("extra","dupuytren",v)}/></F>
</div>
<F label="Lenf Nodları"><Radio options={["Normal","Reaktif","Patolojik"]} value={s.extra.lymph} onChange={v=>upd("extra","lymph",v)}/></F>
<F label="Diğer"><Txt value={s.extra.other} onChange={v=>upd("extra","other",v)} placeholder="Ek not veya bulgular"/></F>
</div>);

case 16: return(<div>
<div className="step-title">📊 Ayırıcı Tanı & Rapor</div>
<div className="step-sub">Ağırlıklı skorlama ile hesaplanmış olasılıklar ve kutulu zebra rapor</div>
<div className="section-hdr">Ayırıcı Tanı Skorları</div>
{dx.length===0?<div className="info-box">Belirgin patolojik bulgu saptanmadı — rapor normal olarak oluşturulacaktır.</div>:
dx.map((d,i)=>{
const color=d.pct>=60?"var(--danger)":d.pct>=30?"var(--warn)":"var(--success)";
const badge=d.pct>=60?"YÜK":d.pct>=30?"ORT":"DÜŞ";
const badgeCls=d.pct>=60?"badge-red":d.pct>=30?"badge-yellow":"badge-green";
return(<div key={d.id} className="dx-row">
<div className="dx-pct" style={{color}}> %{d.pct}</div>
<div className="dx-name">{d.name}<span className={`badge ${badgeCls}`}>{badge}</span></div>
<div style={{width:120}}><div className="dx-bar" style={{width:`${d.pct}%`,background:color}}/></div>
</div>);
})}
<div className="section-hdr">Yapılandırılmış Rapor — Kutulu Zebra Format</div>
<div className="report-box">{genReportJSX()}</div>
<div className="copy-actions">
<button className="btn btn-primary" onClick={copyReport}>📋 Düz Metin Kopyala</button>
<button className="btn btn-success" onClick={downloadReport}>💾 İndir (.txt)</button>
<button className="btn btn-warn" onClick={()=>setShowOverlay(true)}>📄 Raporu Aç (Seç & Kopyala)</button>
</div>
</div>);

default: return null;
}};

/* ── Overlay Component ── */
const ReportOverlay=()=>{
if(!showOverlay) return null;
const r=genPlainReport();
return(<div className="overlay-bg" onClick={e=>{if(e.target===e.currentTarget)setShowOverlay(false)}}>
<div className="overlay-box">
<div className="overlay-top">
<span style={{fontWeight:700,color:"var(--accent)"}}>Düz Metin Rapor — Seç & Kopyala</span>
<div style={{display:"flex",gap:8}}>
<button className="btn btn-primary" onClick={selectAllOverlay} style={{padding:"6px 14px",fontSize:12}}>Tümünü Seç</button>
<button className="btn btn-outline" onClick={()=>setShowOverlay(false)} style={{padding:"6px 14px",fontSize:12}}>✕ Kapat</button>
</div>
</div>
<div className="overlay-body" style={{padding:0}}>
<textarea ref={overlayRef} readOnly value={r} style={{width:"100%",minHeight:500,padding:16,background:"#0d1117",color:"var(--text)",border:"none",fontFamily:"'Courier New',monospace",fontSize:12,lineHeight:1.7,resize:"none",outline:"none"}} onClick={e=>e.target.select()}/>
</div>
</div>
</div>);
};

return(<div>
<div className="app-header">
<div className="logo">EB</div>
<div><h1>El & El Bileği MRI Değerlendirme</h1><div className="sub">Kemik • Ligament • Tendon • Eklem • Kitle • Sinir — 35 Patoloji Skorlama</div></div>
</div>
<div className="wizard-bar">
{STEPS.map((label,i)=>(<React.Fragment key={i}>
{i>0&&<div className="wz-line"/>}
<div className={`wz-dot${step===i?" active":""}${done.has(i)&&step!==i?" done":""}`}
onClick={()=>setStep(i)} title={label}>{i+1}</div>
</React.Fragment>))}
</div>
<div className="main-area">
<div className="step-card">
{renderStep()}
<div className="nav-bar">
<button className="btn btn-outline" onClick={goPrev} disabled={step===0}>← Geri</button>
<span style={{fontSize:12,color:"var(--textDim)"}}>{step+1} / {STEPS.length} — {STEPS[step]}</span>
<button className="btn btn-primary" onClick={goNext} disabled={step===STEPS.length-1}>İleri →</button>
</div>
</div>
</div>
{toast&&<div className="toast">{toast}</div>}
<ReportOverlay/>
</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
