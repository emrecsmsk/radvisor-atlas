<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spine MR Karar Destek Sistemi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--accent:#7b2ff7;--accent2:#9d4edd;--text:#e0e0e0;--text2:#a0a0b0;--border:#2a2a4a;--success:#2ecc71;--warn:#f39c12;--danger:#e74c3c;--row1:#1a1a2e;--row2:#1e2240}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:18px 24px;text-align:center;border-bottom:2px solid var(--accent)}
.header h1{font-size:1.4em;color:#fff;letter-spacing:1px}
.container{max-width:920px;margin:0 auto;padding:16px}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:4px;margin:12px 0;flex-wrap:wrap}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:.3s}
.step-dot.active{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.step-dot.done{background:var(--success)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin:12px 0}
.card h2{color:var(--accent2);font-size:1.1em;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px}
.card h3{color:var(--warn);font-size:.95em;margin:10px 0 8px}
.card h4{color:var(--text2);font-size:.85em;margin:8px 0 6px}
.radio-group,.check-group{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.radio-group label,.check-group label{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 16px;cursor:pointer;transition:.2s;font-size:.88em;display:flex;align-items:center;gap:6px}
.radio-group label:hover,.check-group label:hover{border-color:var(--accent)}
.radio-group label:has(input:checked),.check-group label:has(input:checked){border-color:var(--accent);background:rgba(123,47,247,.12)}
.radio-group input:checked+span{color:var(--accent2);font-weight:600}
.check-group input:checked+span{color:var(--accent2);font-weight:600}
input[type=radio],input[type=checkbox]{accent-color:var(--accent)}
.input-row{display:flex;gap:10px;align-items:center;margin:8px 0;flex-wrap:wrap}
.input-row label{font-size:.85em;color:var(--text2);min-width:70px}
.num-input,.text-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:.9em}
.num-input{width:80px}
.text-input{width:200px}
.num-input:focus,.text-input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:.88em}
textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);width:100%;font-size:.88em;resize:vertical;min-height:50px}
.nav-row{display:flex;justify-content:space-between;margin-top:16px;gap:10px}
.btn{padding:10px 24px;border:none;border-radius:6px;cursor:pointer;font-size:.9em;font-weight:600;transition:.2s}
.btn-prev{background:var(--border);color:var(--text)}
.btn-next{background:var(--accent);color:#fff}
.btn-next:hover{background:var(--accent2)}
.btn-prev:hover{background:#3a3a5a}
.btn-add{background:var(--success);color:#fff;padding:8px 18px}
.btn-add:hover{background:#27ae60}
.btn-del{background:var(--danger);color:#fff;padding:6px 14px;font-size:.8em}
.btn-del:hover{background:#c0392b}
.btn-report{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:12px 32px;font-size:1em}
.signal-panel{display:grid;grid-template-columns:100px repeat(3,1fr);gap:1px;background:var(--border);border-radius:6px;overflow:hidden;margin:10px 0;font-size:.82em}
.signal-panel .sh{background:#2a2a5a;padding:7px;text-align:center;font-weight:600;color:var(--accent2)}
.signal-panel .sc{background:var(--bg);padding:5px 3px;text-align:center}
.signal-panel .sc label{background:transparent;border:none;padding:2px;font-size:.82em}
.items-list{margin:10px 0}
.item-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:6px 0;display:flex;justify-content:space-between;align-items:center}
.item-card .info{font-size:.83em;color:var(--text2)}
.item-card .info strong{color:var(--text)}
.hidden{display:none!important}
.sep{border:none;border-top:1px solid var(--border);margin:12px 0}
.note{font-size:.8em;color:var(--text2);margin:6px 0;font-style:italic}
/* Report */
.report-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;overflow-y:auto;display:none}
.report-overlay.show{display:block}
.report-sheet{background:#fff;color:#000;max-width:820px;margin:20px auto;padding:40px;border-radius:4px;font-family:'Times New Roman',serif;font-size:11.5pt;line-height:1.5}
.report-sheet h1{font-size:14pt;text-align:center;border-bottom:2px solid #333;padding-bottom:8px;margin-bottom:12px}
.report-sheet h2{font-size:12pt;margin:14px 0 6px;color:#333;border-left:3px solid #7b2ff7;padding-left:8px}
.report-sheet h3{font-size:11pt;margin:10px 0 4px;color:#555}
.report-sheet table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10pt}
.report-sheet th{background:#e8e0f0;padding:5px 8px;border:1px solid #999;text-align:left;font-size:10pt}
.report-sheet td{padding:4px 8px;border:1px solid #ccc}
.report-sheet tr:nth-child(odd) td{background:#f9f9f9}
.report-sheet tr:nth-child(even) td{background:#f0eef5}
.report-sheet .yorum{background:#f5f0ff;border:1px solid #ccc;border-radius:4px;padding:10px;margin:8px 0;font-style:italic}
.toolbar{position:sticky;top:0;background:#333;padding:10px;display:flex;gap:10px;justify-content:center;z-index:10000;border-radius:0 0 8px 8px}
.toolbar .btn{padding:8px 18px;font-size:.85em}
.btn-print{background:#2196F3;color:#fff}
.btn-copy{background:#4CAF50;color:#fff}
.btn-close{background:#f44336;color:#fff}
.dx-row{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:10pt}
.dx-row .dx-name{width:200px;text-align:right;font-size:9pt}
.dx-row .dx-bar-wrap{flex:1;background:#eee;border-radius:3px;height:16px;overflow:hidden}
.dx-row .dx-bar{height:100%;border-radius:3px}
.dx-row .dx-pct{width:42px;font-size:9pt;font-weight:600}
@media print{.toolbar{display:none}.report-overlay{position:static;background:#fff}.report-sheet{margin:0;padding:20px;box-shadow:none}}
@media(max-width:600px){.signal-panel{grid-template-columns:80px repeat(3,1fr);font-size:.72em}.radio-group label,.check-group label{padding:6px 10px;font-size:.78em}.card{padding:14px}}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>
</head>

const D = {
  segments: [],

  diskler: [],       // [{seviye,segment,pfirrmann,herniTip,annulerYirtik,stenozSantral,stenozForaminalSag,stenozForaminalSol,sinirKokuSag,sinirKokuSol,notlar}]

let currentStep = 0;
let currentVertIdx = -1;
let currentDiscIdx = -1;
let currentLezIdx = -1;

/* ═══════════════════════════════════════════
   STEPS
   ═══════════════════════════════════════════ */
const STEPS = [
  {id:'segment',title:'İnceleme Bölgesi'},
  {id:'alignment',title:'Sagittal Alignment'},
  {id:'vertebra_list',title:'Vertebra Bulguları'},
  {id:'disk_list',title:'Disk Bulguları'},
  {id:'kanal_kord',title:'Spinal Kanal & Kord'},
  {id:'dejeneratif_ek',title:'Dejeneratif Ek Bulgular'},
  {id:'lezyon_list',title:'Lezyon / Patoloji'},
  {id:'ek_notlar',title:'Ek Notlar'},
  {id:'rapor',title:'Rapor Oluştur'}
];

function render() {
  const app = document.getElementById('app');
  const step = STEPS[currentStep];
  let dots = STEPS.map((s,i)=>`<div class="step-dot ${i<currentStep?'done':''} ${i===currentStep?'active':''}"></div>`).join('');
  let h = `<div class="step-indicator">${dots}</div><div class="card"><h2>${step.title}</h2>`;

  switch(step.id) {
    case 'segment': h += rSegment(); break;
    case 'alignment': h += rAlignment(); break;
    case 'vertebra_list': h += rVertList(); break;
    case 'disk_list': h += rDiscList(); break;
    case 'kanal_kord': h += rKanalKord(); break;
    case 'dejeneratif_ek': h += rDejenEk(); break;
    case 'lezyon_list': h += rLezyonList(); break;
    case 'ek_notlar': h += rEkNot(); break;
    case 'rapor': h += `<p class="note">Tüm veriler girildi. Rapor oluşturmak için aşağıdaki butona tıklayın.</p>`; break;
  }

  h += `<div class="nav-row">`;
  h += currentStep>0?`<button class="btn btn-prev" onclick="goPrev()">← Geri</button>`:`<div></div>`;
  h += step.id==='rapor'?`<button class="btn btn-report" onclick="genReport()">📄 Rapor Oluştur</button>`:`<button class="btn btn-next" onclick="goNext()">İleri →</button>`;
  h += `</div></div>`;
  app.innerHTML = h;
}

function goNext(){ save(); if(currentStep<STEPS.length-1){currentStep++;render();} }
function goPrev(){ save(); if(currentStep>0){currentStep--;render();} }

/* ═══════════════════════════════════════════

   ═══════════════════════════════════════════ */
function save(){
  const s = STEPS[currentStep];
  switch(s.id){
    case 'segment':{
      D.segments=[];
      document.querySelectorAll('input[name="seg"]:checked').forEach(c=>D.segments.push(c.value));
      break;
    }
    case 'alignment':{
      D.alignment = gr('align');
      D.alignmentNot = gv('alignNot');
      break;
    }
    case 'kanal_kord':{
      D.segments.forEach(seg=>{
        D.kanalStenoz[seg] = gr('kanal_'+seg);
      });
      D.kordBulgu = gr('kord');
      D.kordMiyelopatiSeviye = gv('miyelopatiSeviye');
      D.kordNotlar = gv('kordNot');
      break;
    }
    case 'dejeneratif_ek': break; // saved inline
    case 'ek_notlar': D.ekNotlar = gv('ekNot'); break;
  }
}

function gr(n){const e=document.querySelector(`input[name="${n}"]:checked`);return e?e.value:'';}
function gv(id){const e=document.getElementById(id);return e?e.value:'';}

function rg(name,opts,sel){
  return `<div class="radio-group">${opts.map(o=>`<label><input type="radio" name="${name}" value="${o.v}" ${sel===o.v?'checked':''}><span>${o.l}</span></label>`).join('')}</div>`;
}
function cg(name,opts,selArr){
  return `<div class="check-group">${opts.map(o=>`<label><input type="checkbox" name="${name}" value="${o.v}" ${selArr.includes(o.v)?'checked':''}><span>${o.l}</span></label>`).join('')}</div>`;
}
function sigPanel(pfx,sig){
  const seqs=[{k:'t1',l:'T1A'},{k:'t2',l:'T2A'},{k:'stir',l:'STIR'},{k:'dwi',l:'DWI'}];
  const opts=[{v:'hipointens',l:'Hipo'},{v:'hiperintens',l:'Hiper'},{v:'izointens',l:'İzo'}];
  let h=`<div class="signal-panel"><div class="sh">Sekans</div><div class="sh">Hipo</div><div class="sh">Hiper</div><div class="sh">İzo</div>`;
  seqs.forEach(s=>{
    h+=`<div class="sh">${s.l}</div>`;
    opts.forEach(o=>{h+=`<div class="sc"><label><input type="radio" name="${pfx}${s.k}" value="${o.v}" ${(sig&&sig[s.k]===o.v)?'checked':''}></label></div>`;});
  });
  return h+`</div>`;
}
function getSig(pfx){return{t1:gr(pfx+'t1'),t2:gr(pfx+'t2'),stir:gr(pfx+'stir'),dwi:gr(pfx+'dwi')};}
function sigTxt(sig){
  if(!sig)return'-';
  const m={hipointens:'hipo',hiperintens:'hiper',izointens:'izo'};
  let r=[];
  if(sig.t1)r.push('T1:'+m[sig.t1]);
  if(sig.t2)r.push('T2:'+m[sig.t2]);
  if(sig.stir)r.push('STIR:'+m[sig.stir]);
  if(sig.dwi)r.push('DWI:'+m[sig.dwi]);
  return r.join(', ')||'-';
}

/* ═══════════════════════════════════════════
   DIFFERENTIAL DIAGNOSIS SCORING
   ═══════════════════════════════════════════ */
function scoreLezyon(lez){
  let candidates = PATHO_DB;
  if(lez.lokasyon) candidates = candidates.filter(p=>p.loc===lez.lokasyon);
  if(lez.kategori) candidates = candidates.filter(p=>p.cat===lez.kategori);
  if(candidates.length===0) candidates = PATHO_DB; // fallback

  const results=[];
  candidates.forEach(p=>{
    let score=0,max=0;
    // T1
    if(lez.signal.t1){max+=2;if(mSig(lez.signal.t1,p.t1))score+=2;else if(p.t1==='degisken')score+=1;}
    // T2
    if(lez.signal.t2){max+=3;if(mSig(lez.signal.t2,p.t2))score+=3;else if(p.t2==='degisken'||p.t2==='heterojen')score+=1;}
    // STIR
    if(lez.signal.stir){max+=2;if(mSig(lez.signal.stir,p.stir))score+=2;else if(p.stir==='degisken')score+=1;}
    // DWI
    if(lez.signal.dwi){max+=2;
      if(lez.signal.dwi==='hiperintens'&&(p.dwi.includes('restriksiyon')||p.dwi==='hiperintens'))score+=2;
      else if(lez.signal.dwi==='hipointens'&&(p.dwi==='yok'))score+=2;
      else if(p.dwi==='degisken')score+=1;
    }
    // IVKM
    if(lez.ivkmGuc){max+=3;
      if(mIVKM(lez.ivkmGuc,p.kontrast))score+=3;
      else if(p.kontrast==='degisken')score+=1.5;
    }
    // Location bonus
    if(lez.lokasyon&&p.loc===lez.lokasyon){max+=1;score+=1;}
    const pct=max>0?Math.round(score/max*100):0;
    results.push({name:p.name,pct});
  });
  results.sort((a,b)=>b.pct-a.pct);
  return results;
}
function mSig(user,path){
  if(!user||!path)return false;
  if(path.includes(user))return true;
  if(user==='hiperintens'&&(path==='cok_hiperintens'||path==='hiperintens'))return true;
  if(user==='hipointens'&&path==='hipointens')return true;
  if(user==='izointens'&&path.includes('izointens'))return true;
  return false;
}
function mIVKM(g,pk){
  if(g==='guclu'&&(pk.includes('guclu')||pk==='var'||pk==='homojen_guclu'||pk==='nidus_kontrast'))return true;
  if(g==='orta'&&(pk==='var'||pk==='heterojen'||pk.includes('orta')))return true;
  if(g==='zayif'&&(pk==='var'||pk==='heterojen'||pk==='rim'||pk==='periferal'))return true;
  if(g==='minimal'&&(pk==='minimal'||pk==='rim'))return true;
  if(g==='yok'&&(pk==='yok'))return true;
  return false;
}

  // Vertebralar
  if(D.vertebralar.length>0){
    h+=`<h2>VERTEBRA BULGULARI</h2><table><tr><th>Seviye</th><th>Yükseklik Kaybı</th><th>Fraktür</th><th>Modic</th><th>Sinyal</th><th>Not</th></tr>`;
    D.vertebralar.forEach(v=>{
      const ykMap={yok:'Yok',hafif:'Hafif (<25%)',orta:'Orta (25-50%)',siddetli:'Şiddetli (>50%)'};
      h+=`<tr><td><b>${v.seviye}</b></td><td>${ykMap[v.yukseklikKaybi]||'-'}</td><td>${v.fraktur==='var'?fxLabel(v.frakturTip):'Yok'}</td><td>${v.modic!=='0'?'Tip '+v.modic:'-'}</td><td>${sigTxt(v.sinyal)}</td><td>${v.notlar||'-'}</td></tr>`;
    });
    h+=`</table>`;
  }

  // Diskler
  if(D.diskler.length>0){
    h+=`<h2>DİSK BULGULARI</h2><table><tr><th>Seviye</th><th>Pfirrmann</th><th>Herniasyon</th><th>Annüler Yırtık</th><th>Santral Stenoz</th><th>Foraminal St.</th><th>Sinir Kökü</th></tr>`;
    D.diskler.forEach(d=>{
      const ht=HERNI_TIPLERI.find(x=>x.v===d.herniTip);
      let forStr='';
      if(d.stenozForaminalSag&&d.stenozForaminalSag!=='yok')forStr+=`Sağ:${d.stenozForaminalSag} `;
      if(d.stenozForaminalSol&&d.stenozForaminalSol!=='yok')forStr+=`Sol:${d.stenozForaminalSol}`;
      let skStr='';
      if(d.sinirKokuSag)skStr+=`Sağ:${d.sinirKokuSag} `;
      if(d.sinirKokuSol)skStr+=`Sol:${d.sinirKokuSol}`;
      h+=`<tr><td><b>${d.seviye}</b></td><td>${d.pfirrmann||'-'}</td><td>${ht?ht.l:(d.herniTip==='yok'?'Yok':'-')}</td><td>${d.annulerYirtik==='var'?'Var':'Yok'}</td><td>${d.stenozSantral!=='yok'?d.stenozSantral:'-'}</td><td>${forStr||'-'}</td><td>${skStr||'-'}</td></tr>`;
    });
    h+=`</table>`;
  }

  // Kanal & Kord
  h+=`<h2>SPİNAL KANAL & KORD</h2><table>`;
  D.segments.forEach(seg=>{
    const st=D.kanalStenoz[seg];
    if(st&&st!=='yok')h+=rr(SEGMENTS[seg]+' Kanal Stenozu',st);
  });
  const kordMap={normal:'Normal',miyelopati:'Miyelopati sinyal değişikliği',lezyon:'İntramedüller lezyon'};
  h+=rr('Spinal Kord',kordMap[D.kordBulgu]||'Normal');
  if(D.kordBulgu==='miyelopati'&&D.kordMiyelopatiSeviye)h+=rr('Miyelopati Seviyesi',D.kordMiyelopatiSeviye);
  if(D.kordNotlar)h+=rr('Kord Notu',D.kordNotlar);
  h+=`</table>`;

  // Dejeneratif ek
  if(D.fasetArtroz.length||D.ligFlavumHipertrofi.length||D.spondilolistezis.length){
    h+=`<h2>DEJENERATİF EK BULGULAR</h2><table>`;
    if(D.fasetArtroz.length)h+=rr('Faset Artroz',D.fasetArtroz.map(f=>f.seviye+' '+f.taraf).join(', '));
    if(D.ligFlavumHipertrofi.length)h+=rr('Lig. Flavum Hipertrofisi',D.ligFlavumHipertrofi.join(', '));
    D.spondilolistezis.forEach(s=>{h+=rr('Spondilolistezis',`${s.seviye} — Grade ${s.derece} (${s.tip})`);});
    h+=`</table>`;
  }

  // Lezyonlar + Differential
  if(D.lezyonlar.length>0){
    h+=`<h2>LEZYONLAR / PATOLOJİLER</h2>`;
    D.lezyonlar.forEach((l,i)=>{
      const katLbl=LEZYON_KATEGORILERI.find(c=>c.v===l.kategori)?.l||'';
      const lokLbl=TUMOR_LOK.find(t=>t.v===l.lokasyon)?.l||'';
      h+=`<table><tr><th colspan="2">${l.isim||'Lezyon '+(i+1)} ${katLbl?'('+katLbl+')':''}</th></tr>`;
      h+=rr('Seviye',l.seviye||'-');
      h+=rr('Lokasyon',lokLbl||'-');
      if(l.boyut)h+=rr('Boyut',l.boyut+' mm');
      h+=rr('Sinyal',sigTxt(l.signal));
      if(l.ivkmGuc){
        const ivkmMap={guclu:'Güçlü',orta:'Orta',zayif:'Zayıf',minimal:'Minimal',yok:'Yok'};
        h+=rr('IVKM',`${l.ivkmPat==='homojen'?'Homojen':(l.ivkmPat==='rim'?'Rim/Periferal':'Heterojen')} — ${ivkmMap[l.ivkmGuc]||''}`);
      }
      if(l.notlar)h+=rr('Not',l.notlar);
      h+=`</table>`;

      // Differential
      const dx=scoreLezyon(l).filter(d=>d.pct>0).slice(0,8);
      if(dx.length){
        h+=`<div class="yorum"><b>YORUM — Ayırıcı Tanı:</b></div>`;
        h+=dxBars(dx);
      }
    });
  }

  // MR Ayırıcı Tanı Kuralları
  h+=`<h2>SPİNAL MR AYIRICI TANI REHBERİ</h2><div class="yorum">
    <b>Vertebral Sinyal:</b> T1 hipo + STIR hiper → Akut patoloji (fraktür, enfeksiyon, tümör) | T1 hiper → Yağlı dejenerasyon, hemanjiom, subakut kanama<br>
    <b>Disk vs Endplate:</b> Endplate destrüksiyonu + disk tutulumu → Enfeksiyon | Endplate intakt + yükseklik kaybı → Osteoporotik Fx<br>
    <b>İntramedüller:</b> Santral + homojen kontrast → Ependimom | Eksantrik + heterojen → Astrositom | Güçlü nodüler + flow void → Hemanjioblastom<br>
    <b>İntradural-Ekstramedüller:</b> İzointens + güçlü homojen + dural tail → Meningiom | T2 çok hiper + dumbbell → Schwannom<br>
    <b>Vertebral Çökme:</b> Konveks posterior + pedikül tutulumu → Malign | Retropulsiyon yok + posterior intakt → Benign<br>
    <b>Enfeksiyon:</b> Spondilodiskit → Komşu 2 vertebra + disk | TB → Skip lezyon + paravertebral abse + disk korunabilir
  </div>`;

  if(D.ekNotlar)h+=`<h2>EK NOTLAR</h2><p>${D.ekNotlar}</p>`;

  sh.innerHTML=h;
  document.getElementById('reportOverlay').classList.add('show');
}

function rr(l,v){return `<tr><td style="width:180px;font-weight:600;background:#f0eef5">${l}</td><td>${v}</td></tr>`;}
function dxBars(dx){
  const cols=['#7b2ff7','#9d4edd','#c77dff','#e0aaff','#f0d0ff','#d4a8e8','#b07cc6','#8e5ea2'];
  return dx.map((d,i)=>`<div class="dx-row"><span class="dx-name">${d.name}</span><div class="dx-bar-wrap"><div class="dx-bar" style="width:${d.pct}%;background:${cols[i%cols.length]}"></div></div><span class="dx-pct">%${d.pct}</span></div>`).join('');
}

function closeReport(){document.getElementById('reportOverlay').classList.remove('show');}
function copyReport(){
  const s=document.getElementById('reportSheet');const r=document.createRange();r.selectNodeContents(s);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);document.execCommand('copy');sel.removeAllRanges();alert('Rapor panoya kopyalandı!');
}

/* INIT */
render();
</script>
