<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MR Ürografi — Multilezyon Karar Destek Sistemi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>

  :root{
    --bg: #0f0e17;
    --bg-2: #151422;
    --card: #1a1925;
    --card-2: #20202f;
    --border: #2a2a3d;
    --border-2: #353549;
    --text: #f0eeff;
    --text-dim: #a8a6c8;
    --text-faint: #6e6b8f;
    --accent: #06b6d4;     /* cyan — ürin sinyali */
    --accent-2: #0891b2;
    --accent-3: #22d3ee;
    --teal: #14b8a6;
    --warn: #f59e0b;
    --danger: #ef4444;
    --ok: #10b981;
    --violet: #8b5cf6;
    --grad: linear-gradient(135deg, #06b6d4 0%, #14b8a6 55%, #8b5cf6 100%);
    --grad-soft: linear-gradient(135deg, rgba(6,182,212,.18), rgba(139,92,246,.12));
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(6,182,212,.08), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(139,92,246,.07), transparent 60%),
      var(--bg);
  }
  #root{min-height:100vh}
  .app{max-width:1200px;margin:0 auto;padding:28px 24px 60px}
  .hdr{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{
    width:52px;height:52px;border-radius:14px;
    background:var(--grad);
    display:grid;place-items:center;
    box-shadow:0 10px 30px -10px rgba(6,182,212,.55);
    position:relative;overflow:hidden;
  }
  .logo::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 20%, rgba(255,255,255,.35), transparent 55%)}
  .logo svg{position:relative;z-index:2}
  .brand h1{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:.3px;line-height:1}
  .brand h1 span{color:var(--accent-3)}
  .brand p{color:var(--text-dim);font-size:12.5px;margin-top:4px;letter-spacing:.4px;text-transform:uppercase}
  .hdr-right{display:flex;align-items:center;gap:10px}
  .badge{
    font-size:11px;letter-spacing:.8px;text-transform:uppercase;
    padding:6px 10px;border-radius:999px;border:1px solid var(--border-2);
    background:var(--card-2);color:var(--text-dim)
  }
  .badge.active{background:rgba(6,182,212,.12);border-color:rgba(6,182,212,.35);color:var(--accent-3)}

  .stepbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:18px 0 22px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px}
  .dot{
    width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
    font-size:11px;font-weight:600;color:var(--text-faint);
    border:1px solid var(--border-2);background:var(--bg-2);cursor:pointer;
    transition:all .18s ease;
  }
  .dot.done{background:rgba(6,182,212,.15);border-color:rgba(6,182,212,.45);color:var(--accent-3)}
  .dot.active{background:var(--grad);border-color:transparent;color:#08121a;box-shadow:0 0 0 4px rgba(6,182,212,.18)}
  .dot:hover{transform:translateY(-1px)}
  .conn{flex:1;height:2px;min-width:8px;background:var(--border);border-radius:2px}
  .conn.done{background:linear-gradient(90deg,var(--accent),var(--teal))}

  .card{
    background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:28px 28px 24px;animation:fadeIn .35s ease;
    box-shadow:0 20px 50px -30px rgba(0,0,0,.6);
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card h2{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;letter-spacing:.2px;margin-bottom:4px;color:var(--text)}
  .card .sub{color:var(--text-dim);font-size:13.5px;margin-bottom:20px}

  .grid{display:grid;gap:10px}
  .grid.c2{grid-template-columns:repeat(2,1fr)}
  .grid.c3{grid-template-columns:repeat(3,1fr)}
  .grid.c4{grid-template-columns:repeat(4,1fr)}
  @media (max-width:720px){.grid.c2,.grid.c3,.grid.c4{grid-template-columns:1fr}}

  .opt{
    display:flex;align-items:center;gap:10px;padding:13px 14px;
    background:var(--card-2);border:1px solid var(--border);border-radius:12px;
    cursor:pointer;transition:all .15s ease;font-size:14px;color:var(--text);
    user-select:none;
  }
  .opt:hover{border-color:var(--border-2);background:#252535}
  .opt.sel{
    background:linear-gradient(135deg, rgba(6,182,212,.16), rgba(20,184,166,.08));
    border-color:rgba(6,182,212,.55);
    box-shadow:inset 0 0 0 1px rgba(6,182,212,.25);
  }
  .opt .ck{
    width:18px;height:18px;border-radius:6px;border:1.5px solid var(--border-2);
    display:grid;place-items:center;flex-shrink:0;transition:all .15s
  }
  .opt.sel .ck{background:var(--accent);border-color:var(--accent);color:#08121a}
  .opt .ck svg{width:12px;height:12px;opacity:0}
  .opt.sel .ck svg{opacity:1}
  .opt .lbl{flex:1}
  .opt .hint{color:var(--text-faint);font-size:12px}

  .inp{
    width:100%;padding:11px 14px;background:var(--card-2);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;
    transition:border .15s
  }
  .inp:focus{border-color:var(--accent)}
  label.fl{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}

  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:10px;flex-wrap:wrap}
  .btn{
    padding:11px 20px;border-radius:12px;border:1px solid var(--border-2);
    background:var(--card-2);color:var(--text);font-weight:600;font-size:14px;
    cursor:pointer;transition:all .15s;font-family:inherit;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn:hover{background:#252535;transform:translateY(-1px)}
  .btn.prim{
    background:var(--grad);border-color:transparent;color:#08121a;
    box-shadow:0 10px 24px -10px rgba(6,182,212,.6)
  }
  .btn.prim:hover{filter:brightness(1.05)}
  .btn.ghost{background:transparent}
  .btn.danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#fca5a5}
  .btn.sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* Loop summary & chips */
  .chip{
    display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
    font-size:11.5px;font-weight:500;background:var(--card-2);border:1px solid var(--border-2);color:var(--text-dim);
  }
  .chip.cy{background:rgba(6,182,212,.13);border-color:rgba(6,182,212,.4);color:var(--accent-3)}
  .chip.tl{background:rgba(20,184,166,.13);border-color:rgba(20,184,166,.4);color:#5eead4}
  .chip.vl{background:rgba(139,92,246,.13);border-color:rgba(139,92,246,.4);color:#c4b5fd}
  .chip.wn{background:rgba(245,158,11,.13);border-color:rgba(245,158,11,.4);color:#fcd34d}
  .chip.dn{background:rgba(239,68,68,.13);border-color:rgba(239,68,68,.4);color:#fca5a5}

  .lesCard{
    padding:14px 16px;background:var(--card-2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px
  }
  .lesHdr{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
  .lesHdr b{font-family:'Syne',sans-serif;font-size:14.5px;letter-spacing:.2px}

  /* Report (kutulu zebra) */
  .rpt{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin-top:8px}
  .rpt h3{font-family:'Syne',sans-serif;font-size:18px;margin-bottom:14px;letter-spacing:.3px}
  .RptSection{
    border:1px solid var(--border-2);border-radius:14px;margin-bottom:14px;overflow:hidden;
    background:var(--bg-2);
  }
  .RptSection .sh{
    background:linear-gradient(135deg, rgba(6,182,212,.2), rgba(20,184,166,.12), rgba(139,92,246,.15));
    padding:10px 14px;font-family:'Syne',sans-serif;font-weight:700;font-size:13.5px;
    letter-spacing:1.2px;text-transform:uppercase;
    border-bottom:1px solid var(--border-2);color:var(--text)
  }
  .RptSection .sb{padding:4px 0}
  .RptRow{display:grid;grid-template-columns:210px 1fr;gap:12px;padding:8px 14px;font-size:13.5px;line-height:1.55}
  .RptRow:nth-child(odd){background:rgba(255,255,255,.02)}
  .RptRow .k{color:var(--text-dim);font-weight:500}
  .RptRow .v{color:var(--text)}
  .pat{color:#fda4af;font-weight:600}
  .inline-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .empty{padding:14px;color:var(--text-faint);font-size:13px;text-align:center}

  .prob-bar{display:flex;align-items:center;gap:10px;padding:8px 14px}
  .prob-bar:nth-child(odd){background:rgba(255,255,255,.02)}
  .prob-bar .pn{flex:1;font-size:13.5px}
  .prob-bar .pv{
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:var(--accent-3);
    min-width:54px;text-align:right
  }
  .pb-track{height:6px;flex:1.3;background:var(--bg-2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
  .pb-fill{height:100%;background:var(--grad);border-radius:3px;transition:width .6s ease}

  .callout{
    padding:12px 14px;border-radius:12px;font-size:13.5px;line-height:1.55;
    background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.28);color:var(--text);margin:6px 0
  }
  .callout.wn{background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.3)}
  .callout.dn{background:rgba(239,68,68,.09);border-color:rgba(239,68,68,.3)}

  .exportRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

  .overlayWrap{position:fixed;inset:0;background:rgba(8,8,16,.82);z-index:50;display:grid;place-items:center;padding:20px}
  .overlayBox{width:min(860px,100%);background:var(--card);border:1px solid var(--border-2);border-radius:16px;padding:18px}
  .overlayBox textarea{
    width:100%;height:60vh;background:var(--bg-2);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;line-height:1.55;outline:none;resize:vertical;
  }
  .overlayHdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .overlayHdr h4{font-family:'Syne',sans-serif;font-size:16px}

  .footer{margin-top:22px;text-align:center;color:var(--text-faint);font-size:11.5px;letter-spacing:.6px}

  /* scrollbar */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#2e2e44;border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:#3c3c58}

/* Loading indicator */
.__boot{position:fixed;inset:0;display:grid;place-items:center;background:#0f0e17;color:#06b6d4;font-family:'IBM Plex Sans',system-ui,sans-serif;z-index:999}
.__boot .box{text-align:center}
.__boot .spinner{width:42px;height:42px;border:3px solid #2a2a3d;border-top-color:#06b6d4;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.__boot p{color:#a8a6c8;font-size:13.5px;letter-spacing:.5px}
.__boot h3{font-family:'Syne',sans-serif;color:#22d3ee;margin-bottom:6px}
.__err{color:#fda4af !important}
.__err .spinner{border-top-color:#ef4444}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>
</head>

    }
  }[_loc];

  var BH = document.getElementById('__bh');
  var BP = document.getElementById('__bp');
  var BOOT = document.getElementById('__boot');
  /* apply locale to static boot text */
  if(BH) BH.textContent = BH.getAttribute('data-i18n-' + _loc) || BH.textContent;
  if(BP) BP.textContent = BP.getAttribute('data-i18n-' + _loc) || BP.textContent;

    if(BH) BH.textContent = h;

  function hideBoot(){ if(BOOT) BOOT.style.display='none'; }
  function showError(title, detail){
    setMsg(title, detail, true);

  function loadScript(primary, fallback, name, cb){
    setMsg(_BL.loading, name + ' (jsdelivr)');

      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  }

  function boot(){

          'ReactDOM',
          function(){
            try{
              setMsg(_BL.loading, _BL.preparing);
              // Execute the precompiled app
              window.__runApp();
              setTimeout(hideBoot, 80);
            }catch(e){
              showError(_BL.app_error, (e && e.message) || String(e));
              console.error('App init error:', e);
            }
          }
        );
      }
    );
