<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRCP Karar Destek Sistemi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
@font-face{font-family:'Sys';src:local('Segoe UI'),local('Helvetica Neue'),local('Arial');}
:root{
  --bg:#0f0e17;--surface:#1a1a2e;--surface2:#16213e;--border:#2a2a4a;
  --purple:#7f5af0;--purple2:#a78bfa;--purple3:#c4b5fd;--purpledim:#4c3a99;
  --green:#2ee89a;--red:#ff6b6b;--orange:#ffa94d;--yellow:#ffe066;--cyan:#67e8f9;
  --text:#e8e6f0;--text2:#a09cb0;--text3:#706c80;
  --radius:10px;
}
body{font-family:'Sys',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#0f0e17 100%);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.header-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--purple),var(--purple2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.header-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:.3px;}
.header-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.progress-bar{background:var(--surface);padding:12px 24px;border-bottom:1px solid var(--border);}
.progress-track{height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple2));border-radius:4px;transition:width .4s ease;}
.progress-label{font-size:11px;color:var(--text3);margin-top:6px;text-align:right;}
.wizard{max-width:760px;margin:0 auto;padding:24px 20px 120px;}
.step{display:none;animation:fadeUp .35s ease;}
.step.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.step-badge{display:inline-flex;align-items:center;gap:6px;background:var(--purpledim);color:var(--purple3);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase;}
.step-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;}
.step-desc{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.opt-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.opt-group-label{font-size:12px;font-weight:600;color:var(--purple2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.opt{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;}
.opt:hover{border-color:var(--purple);background:var(--surface2);}
.opt.selected{border-color:var(--purple);background:rgba(127,90,240,.12);box-shadow:0 0 0 1px var(--purple);}
.opt-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.opt.selected .opt-radio{border-color:var(--purple);background:var(--purple);}
.opt.selected .opt-radio::after{content:'';width:7px;height:7px;background:#fff;border-radius:50%;}
.opt-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;color:transparent;}
.opt.selected .opt-check{border-color:var(--purple);background:var(--purple);color:#fff;}
.opt-text{font-size:14px;color:var(--text);line-height:1.4;}
.opt-hint{font-size:11px;color:var(--text3);margin-top:2px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--purple2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field select,.field textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--purple);}
.field textarea{resize:vertical;min-height:60px;}
.field select option{background:var(--surface);color:var(--text);}
.inline-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.inline-fields-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,14,23,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:14px 24px;display:flex;justify-content:center;gap:12px;z-index:100;}
.btn{padding:12px 28px;border-radius:var(--radius);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .2s;letter-spacing:.3px;}
.btn-prev{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
.btn-prev:hover{background:var(--surface2);color:var(--text);}
.btn-next{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 4px 15px rgba(127,90,240,.3);}
.btn-next:hover{box-shadow:0 4px 20px rgba(127,90,240,.5);transform:translateY(-1px);}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-green{background:linear-gradient(135deg,#1a9d6c,var(--green));color:#000;font-weight:700;}
.btn-green:hover{box-shadow:0 4px 20px rgba(46,232,154,.4);transform:translateY(-1px);}
.btn-orange{background:linear-gradient(135deg,#e67e22,var(--orange));color:#000;font-weight:700;}
.btn-orange:hover{box-shadow:0 4px 20px rgba(255,169,77,.4);transform:translateY(-1px);}

/* LESION CARDS */
.lez-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.lez-card h4{font-size:14px;color:var(--purple2);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.lez-card .lez-detail{font-size:12px;color:var(--text2);line-height:1.6;}
.lez-card .lez-badge{background:var(--purpledim);color:var(--purple3);font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;}
.lez-actions{display:flex;gap:8px;margin-top:10px;}
.lez-actions button{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;}
.lez-actions button:hover{border-color:var(--purple);color:var(--text);}
.lez-actions button.del{border-color:var(--red);color:var(--red);}
.lez-actions button.del:hover{background:rgba(255,107,107,.15);}

/* WARNING BOX */
.warn-box{background:rgba(255,169,77,.1);border:1px solid var(--orange);border-radius:var(--radius);padding:12px 16px;margin:12px 0;font-size:13px;color:var(--orange);}
.warn-box.danger{background:rgba(255,107,107,.1);border-color:var(--red);color:var(--red);}
.info-box{background:rgba(103,232,249,.08);border:1px solid var(--cyan);border-radius:var(--radius);padding:12px 16px;margin:12px 0;font-size:13px;color:var(--cyan);line-height:1.5;}

/* RESULT */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.result-card h3{font-size:16px;color:var(--purple2);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.dx-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.dx-row:last-child{border-bottom:none;}
.dx-row:nth-child(odd){background:rgba(127,90,240,.03);}
.dx-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.dx-rank.r1{background:var(--green);color:#000;}
.dx-rank.r2{background:var(--yellow);color:#000;}
.dx-rank.r3{background:var(--orange);color:#000;}
.dx-rank.rn{background:var(--border);color:var(--text2);}
.dx-name{flex:1;font-size:14px;font-weight:600;color:var(--text);}
.dx-pct{font-size:14px;font-weight:700;min-width:50px;text-align:right;}
.dx-bar-wrap{width:120px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;flex-shrink:0;}
.dx-bar{height:100%;border-radius:4px;transition:width .6s ease;}
.report-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;}
.report-table th{text-align:left;padding:8px 10px;background:var(--purpledim);color:var(--purple3);font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
.report-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;}
.report-table tr:nth-child(even) td{background:rgba(127,90,240,.03);}
.yorum-block{background:rgba(46,232,154,.08);border-left:3px solid var(--green);padding:14px 16px;border-radius:0 var(--radius) var(--radius) 0;margin-top:14px;font-size:13px;color:var(--text);line-height:1.6;}
.yorum-label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}

/* PRINT OVERLAY */
.print-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,.85);overflow-y:auto;}
.print-overlay.show{display:block;}
.print-toolbar{position:sticky;top:0;background:#1a1a2e;padding:10px 20px;display:flex;gap:10px;justify-content:flex-end;z-index:2;border-bottom:1px solid #333;}
.print-toolbar button{padding:8px 18px;border-radius:6px;border:1px solid #555;background:#2a2a4a;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;}
.print-toolbar button:hover{background:#3a3a6a;}
.print-sheet{max-width:800px;margin:20px auto;background:#fff;color:#000;padding:50px 60px;min-height:600px;font-size:13px;line-height:1.6;}
.print-sheet h1{font-size:18px;margin-bottom:4px;color:#1a1a2e;}
.print-sheet h2{font-size:14px;color:#555;font-weight:400;margin-bottom:16px;}
.print-sheet h3{font-size:13px;color:#7f5af0;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px;}
.print-sheet table{width:100%;border-collapse:collapse;margin:10px 0;}
.print-sheet th{background:#f0eef5;text-align:left;padding:6px 8px;font-size:11px;border:1px solid #ddd;}
.print-sheet td{padding:6px 8px;border:1px solid #ddd;font-size:12px;}
.print-sheet tr:nth-child(even) td{background:#faf9fd;}
.print-sheet .yorum-print{background:#f0faf5;border-left:3px solid #2ee89a;padding:10px 14px;margin:12px 0;font-size:12px;}
.print-sheet .warn-print{background:#fff5f0;border-left:3px solid #ff6b6b;padding:10px 14px;margin:12px 0;font-size:12px;color:#c0392b;}
.print-sheet .footer{margin-top:30px;border-top:1px solid #ddd;padding-top:10px;font-size:10px;color:#888;text-align:center;}
@media(max-width:600px){
  .wizard{padding:16px 14px 120px;}
  .step-title{font-size:18px;}
  .inline-fields{grid-template-columns:1fr;}
  .inline-fields-3{grid-template-columns:1fr;}
  .dx-bar-wrap{width:80px;}
  .print-sheet{padding:30px 20px;}
}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>

// ==================== LOOP CONSTANTS ====================
const LEZYON_GATE = 16;
const LOOP_START = 17;
const LOOP_END = 23;
const RESULT_STEP = 24;
// Conditional skip: kistik detay step
const KISTIK_DETAY_STEP = 20;

// ==================== STATE ====================
let currentStep = 0;
const answers = {};
let lezyonlar = [];
let currentLezIdx = -1;
let currentLez = {};

// ==================== DATA STORE HELPER ====================
function getStore() {
  return STEPS[currentStep]?.loop ? currentLez : answers;
}

// ==================== RENDER ====================
function renderStep(idx) {
  const s = STEPS[idx];
  const wiz = document.getElementById('wizard');
  const store = s.loop ? currentLez : answers;
  const isLoop = s.loop === true;

  let badge = '';
  if (isLoop && currentLezIdx >= 0) {
    const loopStep = idx - LOOP_START + 1;
    const loopTotal = LOOP_END - LOOP_START + 1;
    badge = T.badge_lezyon(currentLezIdx + 1, loopStep, loopTotal);
  } else {
    badge = T.badge_step(idx + 1, STEPS.length);
  }

  let html = `<div class="step active">
    <div class="step-badge">${badge}</div>
    <div class="step-title">${s.title}</div>
    <div class="step-desc">${s.desc}</div>`;

  if (s.type === 'form') {
    html += renderFormFields(s.fields, store);
  } else if (s.type === 'radio') {
    html += renderRadioOptions(s, store);
  } else if (s.type === 'check') {
    html += renderCheckOptions(s, store);
  } else if (s.type === 'form_mixed') {
    html += renderFormMixed(s, store);
  } else if (s.type === 'lezyon_fin') {
    html += renderLezyonFinalize();
  } else if (s.type === 'result') {
    html += renderResult();
  }

  html += `</div>`;
  wiz.innerHTML = html;
  updateNav();
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderFormFields(fields, store) {
  let html = '';
  fields.forEach(f => {
    const val = (store[f.id] !== undefined) ? store[f.id] : '';
    html += `<div class="field"><label>${f.label}</label>`;
    if (f.kind === 'text') html += `<input type="text" id="f_${f.id}" value="${val}" placeholder="${f.placeholder||''}" onchange="setVal('${f.id}',this.value)">`;
    else if (f.kind === 'number') html += `<input type="number" id="f_${f.id}" value="${val}" placeholder="${f.placeholder||''}" onchange="setVal('${f.id}',this.value)">`;
    else if (f.kind === 'textarea') html += `<textarea id="f_${f.id}" placeholder="${f.placeholder||''}" onchange="setVal('${f.id}',this.value)">${val}</textarea>`;
    else if (f.kind === 'select') {
      html += `<select id="f_${f.id}" onchange="setVal('${f.id}',this.value)">`;
      f.options.forEach(o => html += `<option value="${o.v}" ${val===o.v?'selected':''}>${o.t}</option>`);
      html += `</select>`;
    }
    html += `</div>`;
  });
  return html;
}

function renderRadioOptions(s, store) {
  let html = `<div class="opt-group">`;
  s.options.forEach(o => {
    const sel = store[s.qid] === o.v ? 'selected' : '';
    html += `<div class="opt ${sel}" onclick="selectRadio('${s.qid}','${o.v}',this)">
      <div class="opt-radio"></div>
      <div><div class="opt-text">${o.t}</div>${o.h?`<div class="opt-hint">${o.h}</div>`:''}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderCheckOptions(s, store) {
  let html = `<div class="opt-group">`;
  const selected = store[s.qid] || [];
  s.options.forEach(o => {
    const sel = selected.includes(o.v) ? 'selected' : '';
    html += `<div class="opt ${sel}" onclick="toggleCheck('${s.qid}','${o.v}',this)">
      <div class="opt-check">✓</div>
      <div><div class="opt-text">${o.t}</div>${o.h?`<div class="opt-hint">${o.h}</div>`:''}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderFormMixed(s, store) {
  let html = '';
  // Radio question 1
  if (s.radioQ) {
    html += `<div class="opt-group-label">${s.radioQ.label}</div><div class="opt-group">`;
    s.radioQ.options.forEach(o => {
      const sel = store[s.radioQ.id] === o.v ? 'selected' : '';
      html += `<div class="opt ${sel}" onclick="selectRadio('${s.radioQ.id}','${o.v}',this)">
        <div class="opt-radio"></div>
        <div><div class="opt-text">${o.t}</div>${o.h?`<div class="opt-hint">${o.h}</div>`:''}</div>
      </div>`;
    });
    html += `</div>`;
  }
  // Radio question 2
  if (s.radioQ2) {
    html += `<div style="margin-top:20px"><div class="opt-group-label">${s.radioQ2.label}</div><div class="opt-group">`;
    s.radioQ2.options.forEach(o => {
      const sel = store[s.radioQ2.id] === o.v ? 'selected' : '';
      html += `<div class="opt ${sel}" onclick="selectRadio('${s.radioQ2.id}','${o.v}',this)">
        <div class="opt-radio"></div>
        <div><div class="opt-text">${o.t}</div>${o.h?`<div class="opt-hint">${o.h}</div>`:''}</div>
      </div>`;
    });
    html += `</div></div>`;
  }
  // Extra fields
  if (s.extraFields) {
    html += `<div style="margin-top:16px">`;
    html += renderFormFields(s.extraFields, store);
    html += `</div>`;
  }
  return html;
}

// ==================== LEZYON FINALIZE RENDER ====================
function renderLezyonFinalize() {
  let html = '';

  // Current lesion summary
  html += `<div class="lez-card" style="border-color:var(--purple)">
    <h4><span class="lez-badge">${T.lezyon_mevcut}</span> ${RV_LOCALE==='en'?'Lesion':'Lezyon'} ${currentLezIdx + 1}</h4>
    <div class="lez-detail">${formatLezyonSummary(currentLez)}</div>
  </div>`;

  // IPMN Risk Assessment
  const riskAssessment = computeLezyonRiskLevel(currentLez);
  if (riskAssessment.level !== 'none') {
    const cls = riskAssessment.level === 'high_risk' ? 'danger' : '';
    html += `<div class="warn-box ${cls}"><strong>${riskAssessment.label}:</strong> ${riskAssessment.detail}</div>`;
  }

  // Existing lezyonlar
  if (lezyonlar.length > 0) {
    html += `<div style="margin-top:16px"><div class="opt-group-label">${T.lezyon_onceki}</div>`;
    lezyonlar.forEach((lez, i) => {
      html += `<div class="lez-card">
        <h4><span class="lez-badge">#${i+1}</span> ${getLezLokText(lez)}</h4>
        <div class="lez-detail">${formatLezyonSummary(lez)}</div>
        <div class="lez-actions">
          <button onclick="editLezyon(${i})">${T.lezyon_duzenle}</button>
          <button class="del" onclick="deleteLezyon(${i})">${T.lezyon_sil}</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Action buttons
  html += `<div style="display:flex;gap:12px;margin-top:24px;flex-wrap:wrap">
    <button class="btn btn-green" onclick="addAnotherLezyon()">${T.lezyon_ekle}</button>
    <button class="btn btn-next" onclick="finishLezyonlar()">${T.lezyon_tamamla}</button>
  </div>`;

  return html;
}

function formatLezyonSummary(lez) {
  let parts = [];
  // Lokalizasyon
  parts.push(`<strong>${T.fmt_lokalizasyon}:</strong> ${getLezLokText(lez)}`);
  // Boyut
  let dims = [];
  if (lez.lez_boyut1) dims.push(lez.lez_boyut1);
  if (lez.lez_boyut2) dims.push(lez.lez_boyut2);
  if (lez.lez_boyut3) dims.push(lez.lez_boyut3);
  if (dims.length > 0) parts.push(`<strong>${T.fmt_boyut}:</strong> ${dims.join(' x ')} mm`);
  // İç yapı
  if (lez.lez_ic_yapi) parts.push(`<strong>${T.fmt_ic_yapi}:</strong> ${T['ic_'+lez.lez_ic_yapi]||lez.lez_ic_yapi}`);
  // Morfoloji
  const morfItems = lez.lez_morfoloji || [];
  if (morfItems.length > 0) {
    parts.push(`<strong>${T.fmt_morfoloji}:</strong> ${morfItems.map(m=>T['morf_'+m]||m).join(', ')}`);
  }
  // Kistik detay
  const kistItems = lez.lez_kistik_detay || [];
  if (kistItems.length > 0) {
    parts.push(`<strong>${T.fmt_kistik_detay}:</strong> ${kistItems.map(k=>T['kist_'+k]||k).join(', ')}`);
  }
  // Kanal bağlantısı
  if (lez.lez_kanal_baglanti) parts.push(`<strong>${T.fmt_kanal_baglanti}:</strong> ${T['kanal_'+lez.lez_kanal_baglanti]||lez.lez_kanal_baglanti}`);
  // IPMN
  if (lez.lez_ipmn_tip && lez.lez_ipmn_tip !== 'ipmn_yok') parts.push(`<strong>${T.fmt_ipmn}:</strong> ${T['ipmn_'+lez.lez_ipmn_tip]||lez.lez_ipmn_tip}`);
  // Risk
  const riskItems = lez.lez_risk || [];
  if (riskItems.length > 0) {
    const hrs = riskItems.filter(r => r.startsWith('hrs_'));
    const wf = riskItems.filter(r => r.startsWith('wf_'));
    const mal = riskItems.filter(r => r.startsWith('mal_'));
    const finding = RV_LOCALE==='en'?'finding(s)':'bulgu';
    if (hrs.length > 0) parts.push(`<strong style="color:var(--red)">${T.fmt_hrs}:</strong> ${hrs.length} ${finding}`);
    if (wf.length > 0) parts.push(`<strong style="color:var(--orange)">${T.fmt_wf}:</strong> ${wf.length} ${finding}`);
    if (mal.length > 0) parts.push(`<strong style="color:var(--red)">${T.fmt_mal}:</strong> ${mal.length} ${finding}`);
  }
  return parts.join('<br>');
}

function getLezLokText(lez) {
  return T['lok_'+lez.lez_lokalizasyon] || lez.lez_lokalizasyon || T.fmt_belirtilmemis;
}

function computeLezyonRiskLevel(lez) {
  const risk = lez.lez_risk || [];
  const hrs = risk.filter(r => r.startsWith('hrs_'));
  const wf = risk.filter(r => r.startsWith('wf_'));
  if (hrs.length > 0) {
    return {level:'high_risk', label:T.risk_high_label, detail:T.risk_high_detail};
  }
  if (wf.length >= 2) {
    return {level:'worrisome', label:T.risk_wf_multi_label, detail:T.risk_wf_multi_detail(wf.length)};
  }
  if (wf.length === 1) {
    return {level:'worrisome', label:T.risk_wf_label, detail:T.risk_wf_detail};
  }
  return {level:'none', label:'', detail:''};
}

// ==================== INTERACTIONS ====================
function setVal(id, val) {
  const store = getStore();
  store[id] = val;
}

function selectRadio(qid, val, el) {
  const store = getStore();
  store[qid] = val;
  el.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleCheck(qid, val, el) {
  const store = getStore();
  if (!store[qid]) store[qid] = [];
  const idx = store[qid].indexOf(val);
  if (idx >= 0) { store[qid].splice(idx, 1); el.classList.remove('selected'); }
  else { store[qid].push(val); el.classList.add('selected'); }
}

// ==================== LEZYON LOOP FUNCTIONS ====================
function startNewLezyon() {
  currentLez = {};
  currentLezIdx = lezyonlar.length;
}

function finalizeLezyon() {
  // FIX PART 1: Save current and reset idx
  if (currentLezIdx >= 0 && Object.keys(currentLez).length > 0) {
    if (currentLezIdx < lezyonlar.length) {
      lezyonlar[currentLezIdx] = {...currentLez};
    } else {
      lezyonlar.push({...currentLez});
    }
  }
  currentLezIdx = -1;
  currentLez = {};
}

function addAnotherLezyon() {
  // Save current
  if (currentLezIdx >= 0 && Object.keys(currentLez).length > 0) {
    if (currentLezIdx < lezyonlar.length) {
      lezyonlar[currentLezIdx] = {...currentLez};
    } else {
      lezyonlar.push({...currentLez});
    }
  }
  // Start new
  startNewLezyon();
  currentStep = LOOP_START;
  renderStep(currentStep);
}

function finishLezyonlar() {
  finalizeLezyon();
  currentStep = RESULT_STEP;
  renderStep(currentStep);
}

function editLezyon(idx) {
  // Save current first
  if (currentLezIdx >= 0 && Object.keys(currentLez).length > 0) {
    if (currentLezIdx < lezyonlar.length) {
      lezyonlar[currentLezIdx] = {...currentLez};
    } else {
      lezyonlar.push({...currentLez});
    }
  }
  currentLezIdx = idx;
  currentLez = {...lezyonlar[idx]};
  currentStep = LOOP_START;
  renderStep(currentStep);
}

function deleteLezyon(idx) {
  if (!confirm(T.lezyon_sil_confirm(idx+1))) return;
  lezyonlar.splice(idx, 1);
  renderStep(currentStep);
}

// ==================== NAVIGATION ====================
function updateNav() {
  document.getElementById('btnPrev').style.display = currentStep === 0 ? 'none' : '';
  const btn = document.getElementById('btnNext');
  if (currentStep === RESULT_STEP) {
    btn.textContent = T.btn_report;
    btn.onclick = () => openPrint();
  } else if (currentStep === LOOP_END) {
    // Hide default next in finalize (has its own buttons)
    btn.style.display = 'none';
    return;
  } else {
    btn.textContent = T.btn_next;
    btn.onclick = () => goNext();
  }
  btn.style.display = '';
}

function updateProgress() {
  const total = STEPS.length;
  const pct = ((currentStep + 1) / total) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  let label = T.progress_step(currentStep + 1, total);
  if (STEPS[currentStep]?.loop && currentLezIdx >= 0) {
    label = T.progress_lezyon(currentLezIdx+1, currentStep - LOOP_START + 1, LOOP_END - LOOP_START + 1);
  }
  document.getElementById('progLabel').textContent = label;
}

function goNext() {
  // FIX PART 2: From LEZYON_GATE
  if (currentStep === LEZYON_GATE) {
    if (answers.lezyon_var === 'evet') {
      if (currentLezIdx === -1) {
        // Start first lesion
        startNewLezyon();
      }
      currentStep = LOOP_START;
      renderStep(currentStep);
      return;
    } else {
      // Skip loop entirely
      currentStep = RESULT_STEP;
      renderStep(currentStep);
      return;
    }
  }

  // Conditional skip: if solid → skip kistik detay
  if (currentStep === KISTIK_DETAY_STEP - 1) {
    // We're at lezyon_morfoloji (step 19), check if we need kistik detay
    const icYapi = currentLez.lez_ic_yapi;
    if (icYapi === 'solid' || icYapi === 'predominantly_solid') {
      // Skip kistik detay step
      currentStep = KISTIK_DETAY_STEP + 1;
      renderStep(currentStep);
      return;
    }
  }

  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStep(currentStep);
  }
}

function goPrev() {
  // FIX PART 3: From RESULT_STEP → go to LEZYON_GATE, not into loop
  if (currentStep === RESULT_STEP) {
    currentStep = LEZYON_GATE;
    renderStep(currentStep);
    return;
  }

  // From LOOP_START → go to LEZYON_GATE
  if (currentStep === LOOP_START) {
    currentStep = LEZYON_GATE;
    renderStep(currentStep);
    return;
  }

  // Conditional skip back: from kanal step, if solid → skip kistik detay
  if (currentStep === KISTIK_DETAY_STEP + 1) {
    const icYapi = currentLez.lez_ic_yapi;
    if (icYapi === 'solid' || icYapi === 'predominantly_solid') {
      currentStep = KISTIK_DETAY_STEP - 1;
      renderStep(currentStep);
      return;
    }
  }

  if (currentStep > 0) {
    currentStep--;
    renderStep(currentStep);
  }
}

// ==================== SCORING ====================
function computeScores() {
  const scores = {};
  const maxScores = {};
  PATHOLOGIES.forEach(p => { scores[p.id] = 0; maxScores[p.id] = 0; });

  // === GENERAL CRITERIA SCORING ===
  PATHOLOGIES.forEach(p => {
    const crit = CRITERIA[p.id];
    if (!crit) return;
    Object.keys(crit).forEach(qid => {
      const c = crit[qid];
      maxScores[p.id] += c.w;
      const ans = answers[qid];
      if (!ans || c.vals.length === 0) return;
      if (Array.isArray(ans)) {
        if (ans.some(a => c.vals.includes(a))) scores[p.id] += c.w;
      } else {
        if (c.vals.includes(ans)) scores[p.id] += c.w;
      }
    });
  });

  // === BONUS: Dilatasyon & Obstrüksiyon ===
  const dil = answers.dilatasyon;
  const obs = answers.obstruksiyon;
  if (dil === 'her_ikisi' && obs === 'distal') { scores.pankreas_basi += 2; maxScores.pankreas_basi += 2; }
  if (obs === 'proksimal') { scores.klatskin += 2; maxScores.klatskin += 2; }
  if (dil === 'segmental' || obs === 'multipl') { scores.psk += 2; maxScores.psk += 2; }
  if (dil === 'yok') {
    ['koledok_tasi','kolanjiyokarsinom','klatskin','pankreas_basi','ampulla_vater','akut_kolanjit'].forEach(id => {
      scores[id] = Math.max(0, scores[id] - 2);
    });
  }

  // === BONUS: Kanal çapları ===
  const cbd = parseFloat(answers.koledok_cap) || 0;
  const wpd = parseFloat(answers.pankreas_kanal_cap) || 0;
  if (cbd >= 10) {
    ['koledok_tasi','kolanjiyokarsinom','klatskin','pankreas_basi','ampulla_vater','akut_kolanjit'].forEach(id => {
      scores[id] += 2; maxScores[id] += 2;
    });
  } else if (cbd >= 7) {
    ['koledok_tasi','kolanjiyokarsinom','pankreas_basi','ampulla_vater','akut_kolanjit'].forEach(id => {
      scores[id] += 1; maxScores[id] += 1;
    });
  }
  if (wpd >= 10) {
    scores.ipmn_main += 3; maxScores.ipmn_main += 3;
    scores.pankreas_basi += 3; maxScores.pankreas_basi += 3;
  } else if (wpd >= 5) {
    scores.ipmn_main += 2; maxScores.ipmn_main += 2;
    scores.pankreas_basi += 3; maxScores.pankreas_basi += 3;
    scores.ampulla_vater += 1; maxScores.ampulla_vater += 1;
  } else if (wpd >= 3) {
    scores.pankreas_basi += 1; maxScores.pankreas_basi += 1;
  }
  if (cbd >= 7 && wpd >= 3) {
    scores.pankreas_basi += 2; maxScores.pankreas_basi += 2;
    scores.ampulla_vater += 1; maxScores.ampulla_vater += 1;
  }

  // === BONUS: Safra Kesesi ===
  const skGen = answers.sk_genel;
  const skIcerik = answers.sk_icerik || [];
  const skDuvar = answers.sk_duvar || [];
  const ihDet = answers.ihsy_detay || [];

  if (skGen === 'sk_mevcut_degil') {
    ['kolelityazis','akut_kolesistit','kronik_kolesistit','amfizematoz','adenomyomatoz','sk_polip','sk_karsinom','ksantogranulom','sk_debris','porselen_sk'].forEach(id => { scores[id] = 0; });
    if (ihDet.includes('ihsy_hava')) { scores.pnomobilia += 2; maxScores.pnomobilia += 2; }
  }
  if (skGen === 'sk_distendu' && skDuvar.includes('sk_duvar_kalin') && skDuvar.includes('sk_perikolesistik_sivi')) {
    scores.akut_kolesistit += 3; maxScores.akut_kolesistit += 3;
  }
  if (skDuvar.includes('sk_hava_duvar') || skIcerik.includes('sk_hava_lumen')) {
    scores.amfizematoz += 3; maxScores.amfizematoz += 3;
  }
  if (skDuvar.includes('sk_duvar_irregüler') && skDuvar.includes('sk_kc_invazyon')) {
    scores.sk_karsinom += 3; maxScores.sk_karsinom += 3;
  }
  if (skIcerik.includes('sk_polip_buyuk')) {
    scores.sk_karsinom += 2; maxScores.sk_karsinom += 2;
  }
  if (skDuvar.includes('sk_pearl_necklace') || skDuvar.includes('sk_ras_sinusleri')) {
    scores.adenomyomatoz += 3; maxScores.adenomyomatoz += 3;
  }

  // === BONUS: İntrahepatik ===
  if (ihDet.includes('ihsy_sakkuler') && ihDet.includes('ihsy_central_dot')) {
    scores.caroli += 3; maxScores.caroli += 3;
  }
  if (ihDet.includes('ihsy_tas') && ihDet.includes('ihsy_dilate')) {
    scores.hepatolitiazis += 2; maxScores.hepatolitiazis += 2;
    scores.rekurren_kolanjit += 2; maxScores.rekurren_kolanjit += 2;
  }
  if (ihDet.includes('ihsy_uzun_segment')) {
    scores.iga_kolanjiopati += 3; maxScores.iga_kolanjiopati += 3;
  }
  if (ihDet.includes('ihsy_beading') || ihDet.includes('ihsy_multifokal_daralma')) {
    scores.psk += 2; maxScores.psk += 2;
  }
  if (ihDet.includes('ihsy_hava') || ihDet.includes('ihsy_hava_santral')) {
    scores.pnomobilia += 3; maxScores.pnomobilia += 3;
  }

  // ============================================================
  // === LEZYON LOOP SCORING ===
  // ============================================================
  lezyonlar.forEach(lez => {
    const icYapi = lez.lez_ic_yapi || '';
    const morf = lez.lez_morfoloji || [];
    const kistik = lez.lez_kistik_detay || [];
    const kanal = lez.lez_kanal_baglanti || '';
    const ipmnTip = lez.lez_ipmn_tip || '';
    const risk = lez.lez_risk || [];
    const lok = lez.lez_lokalizasyon || '';
    const boyut = parseFloat(lez.lez_boyut1) || 0;
    const anaKanalCap = parseFloat(lez.lez_ana_kanal_genislik) || 0;
    const yandalCap = parseFloat(lez.lez_yandal_cap) || 0;

    const isCystic = ['predominantly_cystic','uniloküler_kistik','multiloküler_kistik','mikrokistik','tubüler_kistik','mixed'].includes(icYapi);
    const isPancreatic = lok.startsWith('pankreas') || lok === 'periampuller';

    // --- IPMN Scoring ---
    if (ipmnTip === 'md_ipmn') {
      scores.ipmn_main += 8; maxScores.ipmn_main += 8;
      if (anaKanalCap >= 10) { scores.ipmn_main += 3; maxScores.ipmn_main += 3; }
      else if (anaKanalCap >= 5) { scores.ipmn_main += 2; maxScores.ipmn_main += 2; }
    }
    if (ipmnTip === 'bd_ipmn') {
      scores.ipmn_branch += 8; maxScores.ipmn_branch += 8;
      if (yandalCap >= 30 || boyut >= 30) { scores.ipmn_branch += 2; maxScores.ipmn_branch += 2; }
    }
    if (ipmnTip === 'mixed_ipmn') {
      scores.ipmn_mixed += 8; maxScores.ipmn_mixed += 8;
      scores.ipmn_main += 3; maxScores.ipmn_main += 3;
      scores.ipmn_branch += 3; maxScores.ipmn_branch += 3;
    }
    if (ipmnTip === 'ipnb_lezyon') {
      scores.ipnb += 5; maxScores.ipnb += 5;
    }

    // --- MCN: kistik, kapsüllü, kanal bağlantısı yok, gövde/kuyruk, kadın ---
    if (isCystic && isPancreatic) {
      const isMcnLoc = (lok === 'pankreas_govde' || lok === 'pankreas_kuyruk');
      const noConnection = (kanal === 'baglanti_yok');
      maxScores.mcn += 10;
      if (isMcnLoc) scores.mcn += 2;
      if (noConnection) scores.mcn += 3;
      if (morf.includes('kapsul_var')) scores.mcn += 2;
      if (kistik.includes('kalin_duvar')) scores.mcn += 1;
      if (kistik.includes('musinos_icerik')) scores.mcn += 2;
      if (kistik.includes('kalsifikasyon_periferal')) scores.mcn += 2;
      if (kistik.includes('septasyon_yok') || kistik.includes('ince_septasyon')) scores.mcn += 1;
      // Kadın bonus
      if (answers.cinsiyet === 'K') { scores.mcn += 1; maxScores.mcn += 1; }
    }

    // --- SCN: mikrokistik, santral skar, kalsifikasyon, kanal bağlantısı yok ---
    if (isCystic && isPancreatic) {
      maxScores.scn += 10;
      if (icYapi === 'mikrokistik') scores.scn += 4;
      if (morf.includes('santral_skar')) scores.scn += 3;
      if (kistik.includes('kalsifikasyon_santral')) scores.scn += 2;
      if (kanal === 'baglanti_yok') scores.scn += 2;
      if (kistik.includes('seros_icerik')) scores.scn += 1;
      if (morf.includes('kontur_lobule')) scores.scn += 1;
    }

    // --- SPN: miks solid-kistik, kapsüllü, kanama, genç kadın, gövde/kuyruk ---
    if (isPancreatic && (icYapi === 'mixed' || icYapi === 'predominantly_solid' || icYapi === 'predominantly_cystic')) {
      maxScores.spn += 10;
      if (morf.includes('kapsul_var')) scores.spn += 3;
      if (morf.includes('kanama_ic')) scores.spn += 3;
      if (lok === 'pankreas_govde' || lok === 'pankreas_kuyruk') scores.spn += 1;
      if (morf.includes('kontur_duzgun') || morf.includes('kontur_lobule')) scores.spn += 1;
      if (morf.includes('heterojen')) scores.spn += 1;
      if (answers.cinsiyet === 'K') { scores.spn += 1; maxScores.spn += 1; }
      const yas = parseInt(answers.yas) || 0;
      if (yas > 0 && yas < 40) { scores.spn += 2; maxScores.spn += 2; }
    }

    // --- pNET: solid, hipervasküler, iyi sınırlı ---
    if (isPancreatic && (icYapi === 'solid' || icYapi === 'predominantly_solid')) {
      maxScores.pnet += 10;
      if (morf.includes('kontur_duzgun')) scores.pnet += 2;
      if (morf.includes('homojen')) scores.pnet += 2;
      if (morf.includes('kapsul_var')) scores.pnet += 1;
      if (boyut > 0 && boyut <= 20) scores.pnet += 1;
      // Hipervasküler → arterial erken kontrast
      if (answers.arterial === 'erken_kontrast') scores.pnet += 3;
      if (answers.dwi === 'restriksiyon' || answers.dwi === 'belirgin_restriksiyon') scores.pnet += 1;
    }

    // --- Pankreas Adenoca (Fokal) ---
    if (isPancreatic && (icYapi === 'solid' || icYapi === 'predominantly_solid')) {
      maxScores.pankreas_adenoca_fokal += 10;
      if (lok === 'pankreas_bas' || lok === 'pankreas_uncinat') scores.pankreas_adenoca_fokal += 2;
      if (morf.includes('kontur_irregüler') || morf.includes('kontur_spikule')) scores.pankreas_adenoca_fokal += 2;
      if (morf.includes('heterojen')) scores.pankreas_adenoca_fokal += 1;
      if (morf.includes('vaskuler_invazyon')) scores.pankreas_adenoca_fokal += 2;
      if (morf.includes('upstream_dilatasyon')) scores.pankreas_adenoca_fokal += 2;
      if (morf.includes('upstream_atrofi')) scores.pankreas_adenoca_fokal += 1;
      if (morf.includes('lenfadenopati_lez')) scores.pankreas_adenoca_fokal += 1;
      if (answers.arterial === 'hipovaskular') scores.pankreas_adenoca_fokal += 2;
    }

    // --- Psödokist ---
    if (isCystic && isPancreatic && (icYapi === 'uniloküler_kistik' || icYapi === 'predominantly_cystic')) {
      maxScores.psodokist += 6;
      if (morf.includes('kapsul_var')) scores.psodokist += 1;
      if (kistik.includes('debris_icerik')) scores.psodokist += 2;
      if (kanal === 'baglanti_var') scores.psodokist += 2;
      if (kistik.includes('ince_duvar')) scores.psodokist += 1;
    }

    // --- Otoimmün Pankreatit ---
    if (isPancreatic && icYapi === 'solid') {
      maxScores.otoimmun_pankreatit += 8;
      if (morf.includes('kontur_duzgun')) scores.otoimmun_pankreatit += 1;
      if (boyut >= 30) scores.otoimmun_pankreatit += 1; // diffüz büyüme
      if (morf.includes('kapsul_var')) scores.otoimmun_pankreatit += 2; // capsule-like rim
      if (morf.includes('upstream_dilatasyon')) scores.otoimmun_pankreatit += 1;
    }

    // --- Kronik Pankreatit ---
    if (isPancreatic) {
      maxScores.kronik_pankreatit += 6;
      if (kistik.includes('kalsifikasyon_santral') || kistik.includes('kalsifikasyon_septa') || morf.includes('kalsifikasyon')) scores.kronik_pankreatit += 2;
      if (morf.includes('upstream_dilatasyon')) scores.kronik_pankreatit += 2;
      if (icYapi === 'predominantly_cystic' || icYapi === 'uniloküler_kistik') scores.kronik_pankreatit += 1; // psödokist varyantı
    }

    // --- Risk-based boost ---
    const hrs = risk.filter(r => r.startsWith('hrs_'));
    const wf = risk.filter(r => r.startsWith('wf_'));
    const mal = risk.filter(r => r.startsWith('mal_'));

    // High-risk stigmata boost IPMN malignancy association
    if (hrs.length > 0 && (ipmnTip === 'md_ipmn' || ipmnTip === 'bd_ipmn' || ipmnTip === 'mixed_ipmn')) {
      // Increase malign category association
      scores.pankreas_adenoca_fokal += hrs.length * 2;
      maxScores.pankreas_adenoca_fokal += hrs.length * 2;
    }

    // Enhancing mural nodule → IPMN with invasion risk
    if (kistik.includes('mural_nodul_kontrast')) {
      if (ipmnTip === 'bd_ipmn') { scores.ipmn_branch += 2; maxScores.ipmn_branch += 2; }
      if (ipmnTip === 'md_ipmn') { scores.ipmn_main += 2; maxScores.ipmn_main += 2; }
      scores.mcn += 1; maxScores.mcn += 1;
    }

    // General malignity features
    if (mal.includes('mal_invazyon') || mal.includes('mal_metastaz')) {
      ['pankreas_adenoca_fokal','kolanjiyokarsinom','sk_karsinom','metastaz'].forEach(id => {
        scores[id] += 2; maxScores[id] += 2;
      });
    }
  });

  // === No lezyonlar → reduce lesion-specific pathologies ===
  if (lezyonlar.length === 0) {
    ['ipmn_main','ipmn_branch','ipmn_mixed','mcn','scn','spn','pnet','pankreas_adenoca_fokal','otoimmun_pankreatit','kronik_pankreatit'].forEach(id => {
      // Don't show if no lesion was entered (keep at 0 or minimal)
      if (maxScores[id] === 0) maxScores[id] = 1; // avoid divide by zero
    });
  }

  const results = PATHOLOGIES.map(p => {
    const max = maxScores[p.id] || 1;
    const pct = Math.round((scores[p.id] / max) * 100);
    return { ...p, score: scores[p.id], max, pct: Math.min(pct, 100) };
  }).sort((a, b) => b.pct - a.pct);

  return results;
}

// ==================== RESULT RENDER ====================
function renderResult() {
  const results = computeScores();
  const topPct = results[0]?.pct || 1;

  let html = `<div class="result-card"><h3>${T.result_dx_title}</h3>`;
  const filtered = results.filter(r => r.pct > 0);
  if (filtered.length === 0) {
    html += `<div style="color:var(--text3);padding:12px 0;">${T.result_no_finding}</div>`;
  }
  filtered.forEach((r, i) => {
    const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
    const barColor = i === 0 ? 'var(--green)' : i === 1 ? 'var(--yellow)' : i === 2 ? 'var(--orange)' : 'var(--border)';
    const barW = Math.max(4, (r.pct / Math.max(topPct, 1)) * 100);
    const pctColor = r.pct >= 60 ? 'var(--green)' : r.pct >= 40 ? 'var(--yellow)' : r.pct >= 20 ? 'var(--orange)' : 'var(--text3)';
    html += `<div class="dx-row">
      <div class="dx-rank ${rc}">${i + 1}</div>
      <div class="dx-name">${r.name}<br><span style="font-size:11px;color:var(--text3);font-weight:400">${r.category}</span></div>
      <div class="dx-bar-wrap"><div class="dx-bar" style="width:${barW}%;background:${barColor}"></div></div>
      <div class="dx-pct" style="color:${pctColor}">%${r.pct}</div>
    </div>`;
  });
  html += `</div>`;

  // Lezyon özeti
  if (lezyonlar.length > 0) {
    html += `<div class="result-card"><h3>${T.result_lezyonlar_title(lezyonlar.length)}</h3>`;
    lezyonlar.forEach((lez, i) => {
      const riskLevel = computeLezyonRiskLevel(lez);
      html += `<div class="lez-card">
        <h4><span class="lez-badge">#${i+1}</span> ${getLezLokText(lez)}</h4>
        <div class="lez-detail">${formatLezyonSummary(lez)}</div>`;
      if (riskLevel.level !== 'none') {
        const cls = riskLevel.level === 'high_risk' ? 'danger' : '';
        html += `<div class="warn-box ${cls}" style="margin-top:8px"><strong>${riskLevel.label}:</strong> ${riskLevel.detail}</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  // Bulgular tablosu
  html += `<div class="result-card"><h3>${T.result_bulgular_title}</h3><table class="report-table">
    <tr><th>${T.print_parametre}</th><th>${T.print_bulgu}</th></tr>`;
  const labelMap = {
    dilatasyon:T.label_dilatasyon,obstruksiyon:T.label_obstruksiyon,
    t1:T.label_t1,t2:T.label_t2,chemical:T.label_chemical,
    dwi:T.label_dwi,adc:T.label_adc,arterial:T.label_arterial,portal:T.label_portal,ek:T.label_ek,
    ihsy_detay:T.label_ihsy_detay,sk_genel:T.label_sk_genel,
    sk_duvar:T.label_sk_duvar,sk_icerik:T.label_sk_icerik
  };
  ['dilatasyon','obstruksiyon','t1','t2','chemical','dwi','adc','arterial','portal','ek','ihsy_detay','sk_genel','sk_duvar','sk_icerik'].forEach(k => {
    const val = answers[k];
    if (!val || (Array.isArray(val) && val.length === 0)) return;
    let display = '';
    const step = STEPS.find(s => s.qid === k);
    if (step) {
      if (Array.isArray(val)) {
        display = val.map(v => { const o = step.options.find(op => op.v === v); return o ? o.t : v; }).join(', ');
      } else {
        const o = step.options.find(op => op.v === val);
        display = o ? o.t : val;
      }
    }
    html += `<tr><td style="font-weight:600;color:var(--purple2)">${labelMap[k]||k}</td><td>${display}</td></tr>`;
    if (k === 'dilatasyon') {
      if (answers.koledok_cap) {
        let lokTxt='';if(answers.koledok_lokasyon){const ls=STEPS.find(s=>s.id==='kanal_caplari');if(ls){const lf=ls.fields.find(f=>f.id==='koledok_lokasyon');if(lf){const lo=lf.options.find(o=>o.v===answers.koledok_lokasyon);if(lo)lokTxt=' ('+lo.t+')';}}}
        html += `<tr><td style="font-weight:600;color:var(--purple2)">${T.label_koledok_cap}</td><td>${answers.koledok_cap} mm${lokTxt}</td></tr>`;
      }
      if (answers.pankreas_kanal_cap) {
        let lokTxt='';if(answers.pankreas_kanal_lokasyon){const ls=STEPS.find(s=>s.id==='kanal_caplari');if(ls){const lf=ls.fields.find(f=>f.id==='pankreas_kanal_lokasyon');if(lf){const lo=lf.options.find(o=>o.v===answers.pankreas_kanal_lokasyon);if(lo)lokTxt=' ('+lo.t+')';}}}
        html += `<tr><td style="font-weight:600;color:var(--purple2)">${T.label_pankreas_kanal_cap}</td><td>${answers.pankreas_kanal_cap} mm${lokTxt}</td></tr>`;
      }
      if (answers.intrahepatik_cap) html += `<tr><td style="font-weight:600;color:var(--purple2)">${T.label_intrahepatik_cap}</td><td>${answers.intrahepatik_cap} mm</td></tr>`;
    }
  });
  html += `</table></div>`;

  // YORUM
  const top3 = results.filter(r => r.pct > 0).slice(0, 3);
  html += `<div class="result-card">`;
  html += `<div class="yorum-block"><div class="yorum-label">${T.result_yorum_label}</div>`;
  if (top3[0] && top3[0].pct > 0) {
    html += T.yorum_en_yuksek(top3[0].name, top3[0].pct);
    if (top3[1] && top3[1].pct > 20) html += T.yorum_ayirici(top3[1].name, top3[1].pct);
    if (top3[2] && top3[2].pct > 20) html += T.yorum_ve(top3[2].name, top3[2].pct);
    if ((top3[1] && top3[1].pct > 20) || (top3[2] && top3[2].pct > 20)) html += T.yorum_dusunulmeli;
    // SK
    const skTop = results.filter(r => r.category === 'Safra Kesesi' && r.pct >= 30);
    if (skTop.length > 0) html += T.yorum_sk(skTop.map(r => r.name + ' (%' + r.pct + ')').join(', '));
    // Malign uyarı
    const malTop = top3.filter(r => (r.category === 'Malign' || r.category === 'Pankreatik Neoplazi') && r.pct >= 30);
    if (malTop.length > 0) html += T.yorum_malignite(malTop.map(r => r.name).join(', '));
    // IPMN yorum
    const ipmnTop = results.filter(r => r.category === 'Pankreatik Kistik' && r.pct >= 30);
    if (ipmnTop.length > 0) html += T.yorum_kistik(ipmnTop.map(r => r.name + ' (%' + r.pct + ')').join(', '));
    // Lezyon risk yorumu
    lezyonlar.forEach((lez, i) => {
      const riskLevel = computeLezyonRiskLevel(lez);
      if (riskLevel.level === 'high_risk') {
        html += T.yorum_lezyon_hr(i+1, riskLevel.detail);
      } else if (riskLevel.level === 'worrisome') {
        html += T.yorum_lezyon_wf(i+1, riskLevel.detail);
      }
    });
    html += `<br>${T.yorum_klinik}`;
  } else {
    html += T.result_no_finding;
  }
  html += `</div></div>`;

  // Export buttons
  html += `<div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap">
    <button class="btn btn-next" onclick="openPrint()">${T.result_yorum_btn}</button>
  </div>`;

  return html;
}

// ==================== PRINT / EXPORT ====================
function openPrint() {
  const results = computeScores();
  const top3 = results.slice(0, 3);
  const now = new Date().toLocaleDateString(T.date_locale);

  let h = `<h1>${T.print_title}</h1><h2>${T.print_olusturulma(now)}</h2>`;

  // Hasta bilgileri
  if (answers.hasta_adi || answers.yas || answers.cinsiyet) {
    h += `<h3>${T.print_hasta_bilgi}</h3><table>`;
    if (answers.hasta_adi) h += `<tr><th>${T.print_hasta}</th><td>${answers.hasta_adi}</td></tr>`;
    if (answers.yas) h += `<tr><th>${T.print_yas}</th><td>${answers.yas}</td></tr>`;
    if (answers.cinsiyet) h += `<tr><th>${T.print_cinsiyet}</th><td>${answers.cinsiyet === 'E' ? T.print_cinsiyet_e : T.print_cinsiyet_k}</td></tr>`;
    const endStep = STEPS[0].fields.find(f => f.id === 'endikasyon');
    if (answers.endikasyon && endStep) {
      const eo = endStep.options.find(o => o.v === answers.endikasyon);
      h += `<tr><th>${T.print_endikasyon}</th><td>${eo ? eo.t : answers.endikasyon}</td></tr>`;
    }
    if (answers.not) h += `<tr><th>${T.print_klinik_not}</th><td>${answers.not}</td></tr>`;
    h += `</table>`;
  }

  // Bulgular
  h += `<h3>${T.print_sinyal}</h3><table><tr><th>${T.print_parametre}</th><th>${T.print_bulgu}</th></tr>`;
  const labelMap = {
    dilatasyon:T.label_dilatasyon,obstruksiyon:T.label_obstruksiyon,
    t1:T.label_t1,t2:T.label_t2,chemical:T.label_chemical,
    dwi:T.label_dwi,adc:T.label_adc,arterial:T.label_arterial,portal:T.label_portal,ek:T.label_ek,
    ihsy_detay:T.label_ihsy_detay,sk_genel:T.label_sk_genel,
    sk_duvar:T.label_sk_duvar,sk_icerik:T.label_sk_icerik
  };
  ['dilatasyon','obstruksiyon','t1','t2','chemical','dwi','adc','arterial','portal','ek','ihsy_detay','sk_genel','sk_duvar','sk_icerik'].forEach(k => {
    const val = answers[k];
    if (!val || (Array.isArray(val) && val.length === 0)) return;
    let display = '';
    const step = STEPS.find(s => s.qid === k);
    if (step) {
      if (Array.isArray(val)) {
        display = val.map(v => { const o = step.options.find(op => op.v === v); return o ? o.t : v; }).join(', ');
      } else {
        const o = step.options.find(op => op.v === val);
        display = o ? o.t : val;
      }
    }
    h += `<tr><td><strong>${labelMap[k]||k}</strong></td><td>${display}</td></tr>`;
    if (k === 'dilatasyon') {
      if (answers.koledok_cap) {
        let lokTxt='';if(answers.koledok_lokasyon){const ls=STEPS.find(s=>s.id==='kanal_caplari');if(ls){const lf=ls.fields.find(f=>f.id==='koledok_lokasyon');if(lf){const lo=lf.options.find(o=>o.v===answers.koledok_lokasyon);if(lo)lokTxt=' ('+lo.t+')';}}}
        h += `<tr><td><strong>${T.label_koledok_cap}</strong></td><td>${answers.koledok_cap} mm${lokTxt}</td></tr>`;
      }
      if (answers.pankreas_kanal_cap) {
        let lokTxt='';if(answers.pankreas_kanal_lokasyon){const ls=STEPS.find(s=>s.id==='kanal_caplari');if(ls){const lf=ls.fields.find(f=>f.id==='pankreas_kanal_lokasyon');if(lf){const lo=lf.options.find(o=>o.v===answers.pankreas_kanal_lokasyon);if(lo)lokTxt=' ('+lo.t+')';}}}
        h += `<tr><td><strong>${T.label_pankreas_kanal_cap}</strong></td><td>${answers.pankreas_kanal_cap} mm${lokTxt}</td></tr>`;
      }
      if (answers.intrahepatik_cap) h += `<tr><td><strong>${T.label_intrahepatik_cap}</strong></td><td>${answers.intrahepatik_cap} mm</td></tr>`;
    }
  });
  h += `</table>`;

  // ======= LEZYON DETAYLARI =======
  if (lezyonlar.length > 0) {
    h += `<h3>${T.print_fokal(lezyonlar.length)}</h3>`;
    lezyonlar.forEach((lez, i) => {
      h += `<table><tr><th colspan="2" style="background:#e8e0ff;color:#4c3a99">${RV_LOCALE==='en'?'Lesion':'Lezyon'} ${i+1} — ${getLezLokText(lez)}</th></tr>`;
      // Lokalizasyon
      h += `<tr><td><strong>${T.print_lokalizasyon}</strong></td><td>${getLezLokText(lez)}</td></tr>`;
      // Boyut
      let dims = [];
      if (lez.lez_boyut1) dims.push(lez.lez_boyut1);
      if (lez.lez_boyut2) dims.push(lez.lez_boyut2);
      if (lez.lez_boyut3) dims.push(lez.lez_boyut3);
      if (dims.length > 0) h += `<tr><td><strong>${T.print_boyut}</strong></td><td>${dims.join(' x ')} mm</td></tr>`;
      // İç yapı
      if (lez.lez_ic_yapi) h += `<tr><td><strong>${T.print_ic_yapi}</strong></td><td>${T['ic_'+lez.lez_ic_yapi+'_print']||T['ic_'+lez.lez_ic_yapi]||lez.lez_ic_yapi}</td></tr>`;
      // Morfoloji
      const morf = lez.lez_morfoloji || [];
      if (morf.length > 0) {
        h += `<tr><td><strong>${T.print_morfoloji}</strong></td><td>${morf.map(m=>T['morf_'+m+'_print']||T['morf_'+m]||m).join(', ')}</td></tr>`;
      }
      // Kistik detay
      const kist = lez.lez_kistik_detay || [];
      if (kist.length > 0) {
        h += `<tr><td><strong>${T.print_kistik_detay}</strong></td><td>${kist.map(k=>T['kist_'+k+'_print']||T['kist_'+k]||k).join(', ')}</td></tr>`;
      }
      // Kanal bağlantısı
      if (lez.lez_kanal_baglanti) h += `<tr><td><strong>${T.print_kanal_baglanti}</strong></td><td>${T['kanal_'+lez.lez_kanal_baglanti+'_print']||lez.lez_kanal_baglanti}</td></tr>`;
      // IPMN
      if (lez.lez_ipmn_tip && lez.lez_ipmn_tip !== 'ipmn_yok') h += `<tr><td><strong>${T.print_ipmn_tip}</strong></td><td>${T['ipmn_'+lez.lez_ipmn_tip+'_print']||T['ipmn_'+lez.lez_ipmn_tip]||lez.lez_ipmn_tip}</td></tr>`;
      if (lez.lez_ana_kanal_genislik) h += `<tr><td><strong>${T.print_ana_kanal}</strong></td><td>${lez.lez_ana_kanal_genislik} mm</td></tr>`;
      if (lez.lez_yandal_cap) h += `<tr><td><strong>${T.print_yandal}</strong></td><td>${lez.lez_yandal_cap} mm</td></tr>`;
      // Risk
      const risk = lez.lez_risk || [];
      const hrs = risk.filter(r => r.startsWith('hrs_'));
      const wf = risk.filter(r => r.startsWith('wf_'));
      const mal = risk.filter(r => r.startsWith('mal_'));
      const riskStep = STEPS.find(s => s.id === 'lezyon_risk');
      if (hrs.length > 0) {
        const hrsTexts = hrs.map(v => { const o = riskStep?.options?.find(op => op.v === v); return o ? o.t.replace('⚠ ','').replace(' — HIGH RISK','') : v; });
        h += `<tr><td><strong style="color:#c0392b">${T.print_hrs_label}</strong></td><td style="color:#c0392b">${hrsTexts.join(', ')}</td></tr>`;
      }
      if (wf.length > 0) {
        const wfTexts = wf.map(v => { const o = riskStep?.options?.find(op => op.v === v); return o ? o.t : v; });
        h += `<tr><td><strong style="color:#e67e22">${T.print_wf_label}</strong></td><td style="color:#e67e22">${wfTexts.join(', ')}</td></tr>`;
      }
      if (mal.length > 0) {
        const malTexts = mal.map(v => { const o = riskStep?.options?.find(op => op.v === v); return o ? o.t : v; });
        h += `<tr><td><strong style="color:#c0392b">${T.print_mal_label}</strong></td><td style="color:#c0392b">${malTexts.join(', ')}</td></tr>`;
      }
      h += `</table>`;

      // Risk assessment box
      const riskLevel = computeLezyonRiskLevel(lez);
      if (riskLevel.level === 'high_risk') {
        h += `<div class="warn-print"><strong>${riskLevel.label}:</strong> ${riskLevel.detail}</div>`;
      } else if (riskLevel.level === 'worrisome') {
        h += `<div style="background:#fff8f0;border-left:3px solid #e67e22;padding:10px 14px;margin:8px 0;font-size:12px;color:#e67e22"><strong>${riskLevel.label}:</strong> ${riskLevel.detail}</div>`;
      }
    });
  }

  // Diferansiyel tanı
  const filteredPrint = results.filter(r => r.pct > 0);
  h += `<h3>${T.print_dx_title}</h3><table><tr><th>${T.print_dx_num}</th><th>${T.print_dx_patoloji}</th><th>${T.print_dx_kategori}</th><th>${T.print_dx_uyum}</th></tr>`;
  filteredPrint.forEach((r, i) => {
    const style = r.pct >= 60 ? 'font-weight:bold;color:#1a9d6c' : r.pct >= 40 ? 'color:#e67e22' : '';
    h += `<tr><td>${i + 1}</td><td style="${style}">${r.name}</td><td>${r.category}</td><td>%${r.pct}</td></tr>`;
  });
  h += `</table>`;

  // Yorum
  h += `<div class="yorum-print"><strong>${T.print_yorum_label}:</strong> `;
  if (top3[0] && top3[0].pct > 0) {
    h += T.print_yorum_en_yuksek(top3[0].name, top3[0].pct);
    if (top3[1] && top3[1].pct > 20) h += T.print_yorum_ayirici(top3[1].name, top3[1].pct);
    if (top3[2] && top3[2].pct > 20) h += T.print_yorum_ve(top3[2].name, top3[2].pct);
    if ((top3[1] && top3[1].pct > 20) || (top3[2] && top3[2].pct > 20)) h += T.print_yorum_dusunulmeli;
    const skTopP = results.filter(r => r.category === 'Safra Kesesi' && r.pct >= 30);
    if (skTopP.length > 0) h += T.print_yorum_sk(skTopP.map(r => r.name + ' (%' + r.pct + ')').join(', '));
    const malTopP = filteredPrint.filter(r => (r.category === 'Malign' || r.category === 'Pankreatik Neoplazi') && r.pct >= 30);
    if (malTopP.length > 0) h += T.print_yorum_mal(malTopP.map(r => r.name).join(', '));
    const ipmnTopP = results.filter(r => r.category === 'Pankreatik Kistik' && r.pct >= 30);
    if (ipmnTopP.length > 0) h += T.print_yorum_kistik(ipmnTopP.map(r => r.name + ' (%' + r.pct + ')').join(', '));
    // Lezyon risk yorumu
    lezyonlar.forEach((lez, i) => {
      const rl = computeLezyonRiskLevel(lez);
      if (rl.level !== 'none') h += T.print_yorum_lezyon(i+1, getLezLokText(lez), rl.label, rl.detail);
    });
    h += T.print_yorum_klinik;
  }
  h += `</div>`;

  h += `<div class="footer">${T.print_footer}</div>`;

  document.getElementById('printSheet').innerHTML = h;
  document.getElementById('printOverlay').classList.add('show');
}

function closePrint() { document.getElementById('printOverlay').classList.remove('show'); }
function doPrint() { window.print(); }
function doCopy() {
  try {
    const sheet = document.getElementById('printSheet');
    const range = document.createRange();
    range.selectNodeContents(sheet);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    alert(T.alert_copied);
  } catch(e) { alert(T.alert_copy_fail); }
}
function doDownloadHTML() {
  try {
    const sheet = document.getElementById('printSheet');
    const htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>MRCP Rapor</title>
    <style>body{font-family:Arial,sans-serif;max-width:800px;margin:20px auto;padding:20px;font-size:13px;line-height:1.6;}
    table{width:100%;border-collapse:collapse;margin:10px 0;}th{background:#f0eef5;text-align:left;padding:6px 8px;font-size:11px;border:1px solid #ddd;}
    td{padding:6px 8px;border:1px solid #ddd;font-size:12px;}tr:nth-child(even) td{background:#faf9fd;}
    h1{font-size:18px;color:#1a1a2e;}h2{font-size:14px;color:#555;font-weight:400;}h3{font-size:13px;color:#7f5af0;margin:16px 0 8px;text-transform:uppercase;}
    .yorum-print{background:#f0faf5;border-left:3px solid #2ee89a;padding:10px 14px;margin:12px 0;font-size:12px;}
    .warn-print{background:#fff5f0;border-left:3px solid #ff6b6b;padding:10px 14px;margin:12px 0;font-size:12px;color:#c0392b;}
    .footer{margin-top:30px;border-top:1px solid #ddd;padding-top:10px;font-size:10px;color:#888;text-align:center;}</style></head><body>${sheet.innerHTML}</body></html>`;
    const blob = new Blob([htmlContent], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'MRCP_Rapor.html'; a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert(T.alert_download_fail(e.message)); }
}
