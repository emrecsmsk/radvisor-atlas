// ─── PI-RADS CALCULATION ───
function calcPIRADS(lesion) {
    const { zone, t2Score, dwiScore, dce } = lesion;
    let pirads = 1;
    const dcePositive = dce === "positive";
    if (zone === "PZ") {
        // PZ: DWI dominant
        pirads = dwiScore;
        if (dwiScore === 3 && dcePositive) {
            pirads = 4; // upgrade
        }
    }
    else if (zone === "TZ" || zone === "CZ") {
        // TZ: T2 dominant
        pirads = t2Score;
        if (t2Score === 3 && dwiScore >= 5) {
            pirads = 4; // upgrade
        }
    }
    else {
        // AFS: DWI dominant like PZ
        pirads = dwiScore;
        if (dwiScore === 3 && dcePositive) {
            pirads = 4;
        }
    }
    return Math.min(pirads, 5);
}
function piradsText(score) {
    const texts = {

        3: "Orta (Belirsiz) – Klinik anlamlı kanser olasılığı belirsiz",
        4: "Yüksek – Klinik anlamlı kanser olma olasılığı yüksek",
        5: "Çok yüksek – Klinik anlamlı kanser olma olasılığı çok yüksek"
    };
    return texts[score] || "";
}
