<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MR Enterografi Değerlendirme Sistemi</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#0f0e17;
    --bg-2:#1a1826;
    --bg-3:#221f2f;
    --panel:#1e1b2d;
    --panel-2:#262337;
    --border:#312d43;
    --text:#e4e1ed;
    --text-dim:#b4afc4;
    --text-mute:#7a7591;
    --accent:#fb923c;
    --accent-2:#f97316;
    --accent-dark:#c2410c;
    --accent-glow:rgba(251,146,60,0.15);
    --purple:#a78bfa;
    --purple-2:#8b5cf6;
    --teal:#14b8a6;
    --red:#ef4444;
    --green:#22c55e;
    --yellow:#eab308;
    --blue:#3b82f6;
    --shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.55;
    min-height:100vh;
    background-image:
      radial-gradient(ellipse at top left,rgba(251,146,60,0.05),transparent 50%),
      radial-gradient(ellipse at bottom right,rgba(167,139,250,0.05),transparent 50%);
  }
  .container{max-width:1240px;margin:0 auto;padding:24px}
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;margin-bottom:20px;
    background:linear-gradient(135deg,var(--bg-2),var(--panel));
    border:1px solid var(--border);border-radius:14px;
    box-shadow:var(--shadow);
  }
  header h1{
    font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;
    background:linear-gradient(135deg,var(--accent),var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  header .sub{font-size:0.78rem;color:var(--text-mute);margin-top:3px}
  .badge{
    padding:4px 11px;border-radius:20px;font-size:0.72rem;font-weight:600;
    background:var(--accent-glow);color:var(--accent);
    border:1px solid rgba(251,146,60,0.3);
  }
  .step-indicator{
    display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;
  }
  .step-dot{
    height:6px;flex:1;min-width:22px;border-radius:3px;
    background:var(--bg-3);transition:all 0.3s;
  }
  .step-dot.active{background:linear-gradient(90deg,var(--accent),var(--accent-2));box-shadow:0 0 12px var(--accent-glow)}
  .step-dot.done{background:var(--accent-dark);opacity:0.6}
  .card{
    background:linear-gradient(180deg,var(--panel),var(--bg-2));
    border:1px solid var(--border);border-radius:14px;
    padding:26px;margin-bottom:16px;
    box-shadow:var(--shadow);
    animation:fadeIn 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }
  .step-title{
    font-size:1.12rem;font-weight:700;margin-bottom:4px;
    display:flex;align-items:center;gap:10px;
  }
  .step-title .num{
    min-width:30px;height:30px;border-radius:8px;display:inline-flex;
    align-items:center;justify-content:center;font-size:0.78rem;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff;font-weight:800;box-shadow:0 2px 8px var(--accent-glow);
  }
  .step-subtitle{font-size:0.85rem;color:var(--text-mute);margin-bottom:18px;margin-left:40px}
  .section{margin-bottom:22px}
  .section-hdr{
    font-size:0.88rem;font-weight:700;color:var(--accent);
    margin-bottom:10px;letter-spacing:0.02em;text-transform:uppercase;
    display:flex;align-items:center;gap:8px;
  }
  .section-hdr::before{
    content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;
  }
  .grid{display:grid;gap:10px}
  .grid-2{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .grid-3{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .grid-4{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .btn-opt{
    padding:11px 14px;border:1px solid var(--border);border-radius:9px;
    background:var(--bg-3);color:var(--text-dim);cursor:pointer;
    font-size:0.87rem;font-family:inherit;transition:all 0.18s;
    text-align:left;font-weight:500;
  }
  .btn-opt:hover{border-color:var(--accent);color:var(--text);background:var(--panel-2)}
  .btn-opt.selected{
    background:linear-gradient(135deg,var(--accent-glow),rgba(251,146,60,0.05));
    border-color:var(--accent);color:var(--text);
    box-shadow:0 0 0 1px var(--accent),0 4px 14px var(--accent-glow);
  }
  .btn-opt .tag{font-size:0.7rem;color:var(--text-mute);margin-top:3px;display:block}
  .btn-opt.selected .tag{color:var(--accent)}
  .input, textarea, select{
    width:100%;padding:10px 13px;background:var(--bg-3);
    border:1px solid var(--border);border-radius:8px;color:var(--text);
    font-family:inherit;font-size:0.9rem;transition:all 0.2s;
  }
  .input:focus, textarea:focus, select:focus{
    outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-glow);
  }
  textarea{resize:vertical;min-height:70px;font-family:inherit}
  .label{display:block;font-size:0.82rem;font-weight:600;color:var(--text-dim);margin-bottom:6px}
  .hint{font-size:0.74rem;color:var(--text-mute);margin-top:5px;font-style:italic}
  .nav{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:18px 24px;background:var(--bg-2);
    border:1px solid var(--border);border-radius:12px;
    margin-top:20px;
  }
  .btn{
    padding:10px 20px;border-radius:8px;border:none;cursor:pointer;
    font-family:inherit;font-size:0.88rem;font-weight:600;
    transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff;box-shadow:0 4px 14px var(--accent-glow);
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(251,146,60,0.35)}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:var(--accent)}
  .btn-purple{background:linear-gradient(135deg,var(--purple),var(--purple-2));color:#fff}
  .btn-danger{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.35)}
  .btn-success{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
  .info-box{
    background:rgba(167,139,250,0.08);border-left:3px solid var(--purple);
    padding:12px 16px;border-radius:8px;margin:10px 0;font-size:0.85rem;
  }
  .warn-box{
    background:rgba(234,179,8,0.08);border-left:3px solid var(--yellow);
    padding:12px 16px;border-radius:8px;margin:10px 0;font-size:0.85rem;
  }
  .danger-box{
    background:rgba(239,68,68,0.08);border-left:3px solid var(--red);
    padding:12px 16px;border-radius:8px;margin:10px 0;font-size:0.85rem;
  }
  .lesion-chip{
    display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
    background:var(--accent-glow);border:1px solid rgba(251,146,60,0.3);
    border-radius:16px;font-size:0.78rem;color:var(--accent);font-weight:600;
  }
  .lesion-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .lesion-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;background:var(--bg-3);
    border:1px solid var(--border);border-radius:9px;
  }
  .lesion-row:hover{border-color:var(--accent)}
  .diff-table{width:100%;border-collapse:collapse;margin-top:10px}
  .diff-table tr{border-bottom:1px solid var(--border)}
  .diff-table tr:nth-child(even){background:var(--bg-3)}
  .diff-table td{padding:9px 12px;font-size:0.85rem}
  .diff-table td:first-child{font-weight:600;width:60%}
  .diff-bar{
    height:16px;border-radius:4px;background:var(--bg-3);
    position:relative;overflow:hidden;
  }
  .diff-bar-fill{
    position:absolute;top:0;left:0;height:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent-dark));
    border-radius:4px;transition:width 0.5s;
  }
  .diff-pct{font-weight:700;color:var(--accent);width:55px;text-align:right}
  .summary-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;margin-bottom:16px;
  }
  .summary-card{
    padding:14px;background:var(--bg-3);border:1px solid var(--border);
    border-radius:10px;
  }
  .summary-card .k{font-size:0.72rem;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:5px}
  .summary-card .v{font-size:0.95rem;font-weight:600;color:var(--text)}
  /* Report overlay */
  .rpt-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.8);
    backdrop-filter:blur(4px);z-index:9999;
    overflow-y:auto;padding:20px;
    animation:fadeIn 0.25s;
  }
  .rpt-container{
    max-width:900px;margin:20px auto;
    background:#fff;color:#222;border-radius:14px;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  .rpt-toolbar{
    display:flex;gap:10px;padding:14px 24px;
    background:#f9fafb;border-bottom:1px solid #e5e7eb;
    position:sticky;top:0;z-index:10;
  }
  .rpt-body{padding:32px 40px;background:#fff;color:#1a1a1a}
  .rpt-body h2{font-size:1.3rem;margin:0 0 4px 0;color:#0f0e17;letter-spacing:-0.01em}
  .rpt-body .meta{color:#666;font-size:0.82rem;margin-bottom:22px;border-bottom:2px solid #f97316;padding-bottom:10px}
  .rpt-body h3{
    color:#ea580c;font-size:0.98rem;margin:20px 0 8px 0;
    padding-bottom:4px;border-bottom:1px solid #fed7aa;text-transform:uppercase;letter-spacing:0.03em;
  }
  .rpt-body table{width:100%;border-collapse:collapse;margin:8px 0 14px 0;font-size:0.87rem}
  .rpt-body table td{padding:7px 12px;vertical-align:top}
  .rpt-body table tr:nth-child(even){background:#f9fafb}
  .rpt-body table td:first-child{font-weight:600;width:32%;color:#374151}
  .rpt-body .yorum{
    background:#f0fdf4;border-left:4px solid #16a34a;
    padding:12px 16px;margin:14px 0;border-radius:6px;font-size:0.88rem;
  }
  .rpt-body .yorum-t{font-weight:700;color:#166534;margin-bottom:4px;font-size:0.82rem;text-transform:uppercase;letter-spacing:0.04em}
  .rpt-body ul{margin:6px 0 10px 22px}
  .rpt-body .conc{
    background:#fff7ed;border:1px solid #fdba74;border-radius:8px;
    padding:16px;margin:16px 0;
  }
  .rpt-body .conc-t{font-weight:700;color:#c2410c;margin-bottom:6px;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.04em}
  @media print{
    body *{visibility:hidden}
    .rpt-container, .rpt-container *{visibility:visible}
    .rpt-toolbar{display:none}
    .rpt-overlay{position:static;background:#fff;padding:0}
    .rpt-container{box-shadow:none;margin:0;max-width:100%}
  }
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .chip-mini{
    padding:3px 9px;background:var(--bg-3);border:1px solid var(--border);
    border-radius:10px;font-size:0.72rem;color:var(--text-dim);
  }
  .chip-mini.on{background:var(--accent-glow);border-color:var(--accent);color:var(--accent)}
  .accordion-hdr{
    background:var(--bg-3);padding:10px 14px;border-radius:8px;
    cursor:pointer;display:flex;justify-content:space-between;align-items:center;
    font-size:0.85rem;font-weight:600;margin-bottom:8px;
  }
  .toggle-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>

/* ============================================================
   SCORING ENGINE
   ============================================================ */
function scoreDifferential(selectedFeatures){
  // selectedFeatures: Set of strings
  const scored = PATHOLOGIES.map(p=>{
    let score = 0;
    let maxPossible = 0;
    // positive features
    for(const [k,w] of Object.entries(p.pos||{})){
      maxPossible += w;
      if(selectedFeatures.has(k)) score += w;
    }
    // negative features
    for(const [k,w] of Object.entries(p.neg||{})){
      if(selectedFeatures.has(k)) score += w; // w is negative
    }
    if(maxPossible === 0) return {id:p.id, name:p.name, cat:p.cat, pct:0, raw:0};
    // top-N-feature normalization to avoid bias by DB size
    // use top 8 highest weights as the denominator
    const weights = Object.values(p.pos||{}).sort((a,b)=>b-a);
    const topWeightSum = weights.slice(0,8).reduce((a,b)=>a+b,0);
    const denom = topWeightSum || maxPossible;
    const pct = Math.max(0, Math.min(100, Math.round((score/denom)*100)));
    return {id:p.id, name:p.name, cat:p.cat, pct, raw:score};
  });
  return scored.sort((a,b)=>b.pct - a.pct);
}

/* ============================================================

   ============================================================ */
const TOTAL_STEPS = 11;
// Lesion loop occupies steps 5..9
const PRE_LOOP_STEP = 4;   // step number before loop
const LOOP_START = 5;
const LOOP_END = 9;
const POST_LOOP_STEP = 10;

function App(){
  const [step, setStep] = useState(1);
  const [currentIdx, setCurrentIdx] = useState(-1);
  const [lesions, setLesions] = useState([]);
  const [showReport, setShowReport] = useState(false);
  
  // Global data (non-lesion)
  const [global, setGlobal] = useState({
    // Clinical & quality
    indikasyon:'',
    klinikNote:'',
    immunsupresif:false,
    knownMalignancy:false,
    knownMalignancyType:'',
    nsaidUse:false,
    anticoagulant:false,
    radyoterapi:false,
    biyopsi:false,
    oralContrast:'',
    distention:'',
    artefakt:'',
    antispasmodic:false,
    ivContrast:true,
    // Anatomic survey - flags per segment
    mide:'normal',
    duodenum:'normal',
    jejunum:'normal',
    ileum:'normal',
    terminal_ileum:'normal',
    iliocecal:'normal',
    cecum:'normal',
    kolon:'normal',
    apendiks:'normal',
    rektum:'normal',
    extraFindings: new Set(),
    complications: new Set(),
    solidOrgans:'',
    vaskuler:'',
    pelvisBulgu:'',
    clinicalFlags: new Set(), // orogenital, malabs, carcinoid_sx, etc.
    // Decision
    patolojiVarMi:null, // true | false | suspect
  });
  
  function updateGlobal(patch){
    setGlobal(prev => ({...prev, ...patch}));
  }
  function toggleExtraFinding(id){
    setGlobal(prev=>{
      const n = new Set(prev.extraFindings);
      n.has(id) ? n.delete(id) : n.add(id);
      return {...prev, extraFindings:n};
    });
  }
  function toggleComplication(id){
    setGlobal(prev=>{
      const n = new Set(prev.complications);
      n.has(id) ? n.delete(id) : n.add(id);
      return {...prev, complications:n};
    });
  }
  function toggleClinicalFlag(id){
    setGlobal(prev=>{
      const n = new Set(prev.clinicalFlags);
      n.has(id) ? n.delete(id) : n.add(id);
      return {...prev, clinicalFlags:n};
    });
  }

  /* ====================
     LESION CRUD
     ==================== */
  function createLesion(){
    return {
      id: 'L'+Date.now()+Math.floor(Math.random()*1000),
      name:'',
      location:[], // array of location tags
      locationFreeText:'',
      length:'', // short/medium/long/diffuse
      lengthCm:'',
      distribution:'', // focal/segmental/skip/continuous/multifocal/diffuse
      wallThick:'', // mild/moderate/marked/aneurysmal/normal
      wallMeasurement:'',
      wallPattern:'', // concentric/eccentric/circumferential
      t2Signal:'', // edema/intermediate/hypointense/heterogeneous/normal
      dwiRestriction:'', // yes/no/mild
      adcValue:'',
      enhancementPattern:'', // stratified/homogeneous/mucosal/heterogeneous/target/peripheral/none/reduced/delayed/absent
      enhancementDegree:'', // mild/moderate/intense/absent
      lumen:'', // normal/stenosis/mild-sten/dilat/aneurysmal/prestenotic
      mucosa: new Set(), // cobblestone, aphthous, deep ulcer, granular, pseudopolyp, nodular, smooth, diaphragm
      mesFindings: new Set(), // comb, fibrofat, mesentery mass, radiating strands, etc.
      lymphNodes:'', // reactive/bulky/necrotic/calcified/none
      lapLocationNote:'',
      complications: new Set(),
      specificFlags: new Set(), // T1 hyperintense (hematoma), exophytic (GIST), aneurysmal dilat (lymphoma), fold reversal (celiac), hidebound (scleroderma), caseation (TB), etc.
      notes:'',
    };
  }
  
  function addLesionAndStartLoop(){
    const l = createLesion();
    setLesions(prev => [...prev, l]);
    setCurrentIdx(lesions.length);
    setStep(LOOP_START);
  }
  function addAnotherLesion(){
    const l = createLesion();
    setLesions(prev => [...prev, l]);
    setCurrentIdx(lesions.length);
    setStep(LOOP_START);
  }
  function updateLesion(idx, patch){
    setLesions(prev => prev.map((l,i)=> i===idx ? {...l, ...patch} : l));
  }
  function toggleLesionSet(idx, field, id){
    setLesions(prev => prev.map((l,i)=>{
      if(i!==idx) return l;
      const n = new Set(l[field]);
      n.has(id) ? n.delete(id) : n.add(id);
      return {...l, [field]:n};
    }));
  }
  function deleteLesion(idx){
    setLesions(prev => prev.filter((_,i)=>i!==idx));
    if(currentIdx === idx) setCurrentIdx(-1);
  }
  
  /* ====================
     MANDATORY 3-PART LOOP FIX
     ==================== */
  function finalizeLesions(){
    setCurrentIdx(-1);
    setStep(POST_LOOP_STEP);
  }
  function goNext(){
    if(step === PRE_LOOP_STEP){
      // If no lesions yet & user selected "yok" -> skip loop
      if(global.patolojiVarMi === false){
        setCurrentIdx(-1);
        setStep(POST_LOOP_STEP);
        return;
      }
      // If lesions present OR user wants to add first lesion
      if(lesions.length === 0){
        addLesionAndStartLoop();
        return;
      }
      // lesions exist -> open first lesion at loop start
      setCurrentIdx(0);
      setStep(LOOP_START);
      return;
    }
    if(step >= LOOP_START && step < LOOP_END){
      setStep(step+1);
      return;
    }
    if(step === LOOP_END){
      // end of one lesion's detail; ask user next
      // handled via UI "Add another" or "Finish"; auto-advance to POST_LOOP
      finalizeLesions();
      return;
    }
    if(step < TOTAL_STEPS) setStep(step+1);
  }
  function goPrev(){
    if(step === POST_LOOP_STEP){
      // skip loop, go back to pre-loop
      setCurrentIdx(-1);
      setStep(PRE_LOOP_STEP);
      return;
    }
    if(step > LOOP_START && step <= LOOP_END){
      setStep(step-1);
      return;
    }
    if(step === LOOP_START){
      setStep(PRE_LOOP_STEP);
      setCurrentIdx(-1);
      return;
    }
    if(step > 1) setStep(step-1);
  }
  
  /* ====================
     FEATURE BUILDER FOR SCORING
     ==================== */
  function buildFeaturesForLesion(lesion){
    const feat = new Set();
    // location
    for(const loc of lesion.location){
      feat.add(loc);
    }
    // length
    if(lesion.length === 'short') feat.add('length_short');
    if(lesion.length === 'medium') feat.add('length_medium');
    if(lesion.length === 'long') feat.add('length_long');
    if(lesion.length === 'diffuse') feat.add('length_diffuse');
    // distribution
    if(lesion.distribution) feat.add('dist_'+lesion.distribution);
    // wall
    if(lesion.wallThick === 'mild') feat.add('wall_mild');
    if(lesion.wallThick === 'moderate') feat.add('wall_moderate');
    if(lesion.wallThick === 'marked') feat.add('wall_marked');
    if(lesion.wallThick === 'aneurysmal') feat.add('aneurysmal_dilat');
    if(lesion.wallPattern === 'concentric') feat.add('wall_concentric');
    if(lesion.wallPattern === 'eccentric') feat.add('wall_eccentric');
    if(lesion.wallPattern === 'circumferential') feat.add('wall_circumferential');
    // T2
    if(lesion.t2Signal === 'edema') feat.add('t2_edema');
    if(lesion.t2Signal === 'intermediate') feat.add('t2_intermediate');
    if(lesion.t2Signal === 'hypointense') feat.add('t2_hypointense_wall');
    if(lesion.t2Signal === 'heterogeneous') feat.add('t2_heterogeneous');
    // DWI
    if(lesion.dwiRestriction === 'yes') feat.add('dwi_restrict');
    if(lesion.dwiRestriction === 'no') feat.add('dwi_no_restrict');
    // Enhancement
    if(lesion.enhancementPattern) feat.add('enh_'+lesion.enhancementPattern);
    if(lesion.enhancementDegree === 'mild') feat.add('enh_mild');
    if(lesion.enhancementDegree === 'moderate') feat.add('enh_moderate');
    if(lesion.enhancementDegree === 'intense') feat.add('enh_intense');
    if(lesion.enhancementDegree === 'absent') feat.add('enh_absent');
    // Lumen
    if(lesion.lumen === 'stenosis') feat.add('lumen_sten');
    if(lesion.lumen === 'mildstenosis') feat.add('lumen_mildsten');
    if(lesion.lumen === 'prestenotic') { feat.add('prestenotic'); feat.add('lumen_sten'); }
    if(lesion.lumen === 'dilatation') feat.add('small_bowel_dilat');
    if(lesion.lumen === 'aneurysmal') feat.add('aneurysmal_dilat');
    if(lesion.lumen === 'annular') { feat.add('annular_stenosis'); feat.add('shouldering'); feat.add('lumen_sten'); }
    // Mucosa
    lesion.mucosa.forEach(m => feat.add(m));
    // Mesentery
    lesion.mesFindings.forEach(m => feat.add(m));
    // Lymph nodes
    if(lesion.lymphNodes === 'reactive') feat.add('lap_reactive');
    if(lesion.lymphNodes === 'bulky') { feat.add('lap_bulky'); feat.add('mes_lap_bulky'); }
    if(lesion.lymphNodes === 'necrotic') feat.add('lap_necrotic');
    if(lesion.lymphNodes === 'calcified') feat.add('lap_calcified');
    if(lesion.lymphNodes === 'conglomerate') feat.add('mes_conglomerate_lap');
    if(lesion.lymphNodes === 'moderate') feat.add('lap_moderate');
    // Complications
    lesion.complications.forEach(c => feat.add(c));
    // Specific flags
    lesion.specificFlags.forEach(f => feat.add(f));
    // Merge global extra findings
    global.extraFindings.forEach(e => feat.add(e));
    global.complications.forEach(c => feat.add(c));
    // Clinical flags
    global.clinicalFlags.forEach(c => feat.add(c));
    if(global.immunsupresif) feat.add('clinical_immunosupp');
    if(global.knownMalignancy) feat.add('clinical_known_malignancy');
    if(global.nsaidUse) feat.add('clinical_nsaid');
    if(global.anticoagulant) feat.add('clinical_anticoag');
    if(global.radyoterapi) { feat.add('clinical_radiotherapy'); feat.add('radiation_field'); }
    return feat;
  }
  
  function diffForLesion(lesion){
    const feats = buildFeaturesForLesion(lesion);
    return scoreDifferential(feats).slice(0, 10);
  }
  
  const currentLesion = currentIdx >= 0 && currentIdx < lesions.length ? lesions[currentIdx] : null;
  
  /* ====================
     RENDER STEPS
     ==================== */
  function renderStep(){
    if(step === 1) return <Step1 global={global} upd={updateGlobal} />;
    if(step === 2) return <Step2 global={global} upd={updateGlobal} />;
    if(step === 3) return <Step3 global={global} upd={updateGlobal}
      toggleExtra={toggleExtraFinding} toggleCx={toggleComplication}
      toggleClin={toggleClinicalFlag} />;
    if(step === 4) return <Step4Decision global={global} upd={updateGlobal}
      lesions={lesions} onAddFirst={addLesionAndStartLoop} onDeleteLesion={deleteLesion} />;
    if(step === 5) return <LesionStepA lesion={currentLesion} idx={currentIdx}
      upd={(p)=>updateLesion(currentIdx,p)} toggleSet={(f,id)=>toggleLesionSet(currentIdx,f,id)} />;
    if(step === 6) return <LesionStepB lesion={currentLesion} idx={currentIdx}
      upd={(p)=>updateLesion(currentIdx,p)} toggleSet={(f,id)=>toggleLesionSet(currentIdx,f,id)} />;
    if(step === 7) return <LesionStepC lesion={currentLesion} idx={currentIdx}
      upd={(p)=>updateLesion(currentIdx,p)} toggleSet={(f,id)=>toggleLesionSet(currentIdx,f,id)} />;
    if(step === 8) return <LesionStepD lesion={currentLesion} idx={currentIdx}
      upd={(p)=>updateLesion(currentIdx,p)} toggleSet={(f,id)=>toggleLesionSet(currentIdx,f,id)} />;
    if(step === 9) return <LesionStepE lesion={currentLesion} idx={currentIdx}
      diff={currentLesion ? diffForLesion(currentLesion) : []}
      onAddAnother={addAnotherLesion} onFinalize={finalizeLesions}
      lesions={lesions} />;
    if(step === 10) return <Step10Summary global={global} lesions={lesions}
      diffFn={diffForLesion} upd={updateGlobal} />;
    if(step === 11) return <Step11Review global={global} lesions={lesions}
      diffFn={diffForLesion} onShowReport={()=>setShowReport(true)} />;
    return null;
  }
  
  return (
    <div className="container">
      <header>
        <div>
          <h1>MR Enterografi Değerlendirme Sistemi</h1>
          <div className="sub">Structured multilezyon yorumu • 35+ patolojili ağırlıklı ayırıcı tanı skorlaması</div>
        </div>
        <span className="badge">v1.0</span>
      </header>
      <div className="step-indicator">
        {Array.from({length:TOTAL_STEPS}).map((_,i)=>(
          <div key={i} className={
            'step-dot '+(step===i+1?'active':(step>i+1?'done':''))
          } />
        ))}
      </div>
      <div style={{marginBottom:8,fontSize:'0.78rem',color:'var(--text-mute)',display:'flex',justifyContent:'space-between'}}>
        <span>Adım {step} / {TOTAL_STEPS}</span>
        {currentIdx >= 0 && <span>Lezyon #{currentIdx+1}</span>}
        {lesions.length > 0 && <span>Toplam lezyon: {lesions.length}</span>}
      </div>
      {renderStep()}
      <div className="nav">
        <button className="btn btn-ghost" onClick={goPrev} disabled={step===1}>‹ Geri</button>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          {step >=2 && step <=3 && <span style={{fontSize:'0.78rem',color:'var(--text-mute)'}}>Tarama aşaması</span>}
          {step === POST_LOOP_STEP && <span style={{fontSize:'0.78rem',color:'var(--text-mute)'}}>Özet aşama</span>}
        </div>
        {step < TOTAL_STEPS && step !== LOOP_END && (
          <button className="btn btn-primary" onClick={goNext}>
            İleri ›
          </button>
        )}
        {step === TOTAL_STEPS && (
          <button className="btn btn-success" onClick={()=>setShowReport(true)}>
            Raporu Görüntüle →
          </button>
        )}
      </div>
      {showReport && (
        <ReportOverlay global={global} lesions={lesions} diffFn={diffForLesion}
          onClose={()=>setShowReport(false)} />
      )}
    </div>
  );
}

/* ============================================================
   STEP 10: GLOBAL SUMMARY / CONCLUSION
   ============================================================ */
function Step10Summary({global, lesions, diffFn, upd}){
  // Aggregate differential from all lesions
  const aggDiff = useMemo(()=>{
    if(lesions.length === 0) return [];
    const sumMap = {};
    lesions.forEach(l=>{
      const d = diffFn(l);
      d.forEach(row=>{
        if(!sumMap[row.id]) sumMap[row.id] = {...row, pct:0, count:0};
        sumMap[row.id].pct += row.pct;
        sumMap[row.id].count += 1;
      });
    });
    const arr = Object.values(sumMap).map(r=>({
      ...r,
      pct: Math.round(r.pct / r.count)
    }));
    return arr.sort((a,b)=>b.pct-a.pct).slice(0,10);
  }, [lesions]);
  
  return (
    <div className="card">
      <div className="step-title"><span className="num">10</span>Genel Özet ve Ayırıcı Tanı</div>
      <div className="step-subtitle">Tüm lezyonların kombine analizi ve klinik sonuç</div>
      
      <div className="summary-grid">
        <div className="summary-card">
          <div className="k">Toplam Lezyon</div>
          <div className="v">{lesions.length}</div>
        </div>
        <div className="summary-card">
          <div className="k">Klinik Endikasyon</div>
          <div className="v" style={{fontSize:'0.85rem'}}>{global.indikasyon || '—'}</div>
        </div>
        <div className="summary-card">
          <div className="k">Ekstra Bulgu Sayısı</div>
          <div className="v">{global.extraFindings.size}</div>
        </div>
        <div className="summary-card">
          <div className="k">Komplikasyon</div>
          <div className="v">{global.complications.size + lesions.reduce((a,l)=>a+l.complications.size,0)}</div>
        </div>
      </div>
      
      {lesions.length > 0 && (
        <div className="section">
          <div className="section-hdr">Kombine Ayırıcı Tanı (tüm lezyonların ortalaması)</div>
          <table className="diff-table">
            <tbody>
              {aggDiff.map(d=>(
                <tr key={d.id}>
                  <td><strong>{d.name}</strong> <span style={{fontSize:'0.72rem',color:'var(--text-mute)'}}>({d.cat})</span></td>
                  <td style={{width:'35%'}}>
                    <div className="diff-bar"><div className="diff-bar-fill" style={{width:d.pct+'%'}}></div></div>
                  </td>
                  <td className="diff-pct">{d.pct}%</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      
      <div className="section">
        <div className="section-hdr">Rapor Sonuç Notu (radyolog değerlendirmesi)</div>
        <textarea className="input" style={{minHeight:120}}
          placeholder="Örn: Terminal ileal Crohn hastalığı ile uyumlu aktif inflamatuar bulgular izlenmektedir. Penetran komplikasyon mevcut değil..."
          value={global.sonucNote || ''}
          onChange={e=>upd({sonucNote:e.target.value})} />
      </div>
    </div>
  );
}

  mesenteric_edema:'mezenterik ödem',
  omentum_focal_mass:'omentumda fokal kitle', fat_stranding_omental:'omental yağ stranding',
  triangular_shape:'üçgen şekilli kitle', central_dot_sign:'central dot sign',
  hyperattenuating_rim:'hiperdens kenar', fat_density_mass:'yağ dansiteli kitle',

  t1_hyperintense_fat:'T1 hiperintens yağ', t1_hyperintense_wall:'T1 hiperintens duvar',
  t2_hyperintense:'T2 hiperintens', fat_suppression:'yağ baskılamada kayıp',
  t2_hypointense:'T2 hipointens', t2_hypointense_fibrosis:'T2 hipointens fibrotik odak',
  target_sign:'target sign', sausage_mass:'sosis şekli kitle',
  bowel_in_bowel:'barsak-içinde-barsak', mes_fat_within:'kitle içinde mezenter yağı',

  intussusception_transient:'geçici invajinasyon', fecalization:'feces işareti',

  clinical_orogenital:'orogenital ülser öyküsü',

  clinical_carcinoid_syndrome:'karsinoid sendrom semptomları',
  clinical_celiac_history:'çölyak öyküsü',
  clinical_posttransplant:'posttransplant durum',
  clinical_scleroderma:'bilinen skleroderma',
  clinical_igg4:'IgG4-ilişkili hastalık öyküsü',
  clinical_fap:'FAP/familyal polipozis',
  clinical_pigmentation:'mukokutanöz pigmentasyon',
  clinical_female_repro:'reprodüktif dönem kadın',
  cyclical_sx:'siklik semptomlar',
  clinical_hpylori:'H. pylori pozitif',
  clinical_allergy:'atopi/eozinofili',
  endemic:'endemik bölge',
  post_gastric_bypass:'gastrik bypass öyküsü',
  clinical_hypercoag:'hiperkoagülabilite',
};
function lbl(id){ return LABELS[id] || id; }

/* ============================================================
   REPORT OVERLAY
   ============================================================ */
function ReportOverlay({global, lesions, diffFn, onClose}){
  const rptRef = useRef(null);
  const now = new Date();
  const tarih = now.toLocaleDateString('tr-TR') + ' ' + now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  
  // Aggregate diff
  const aggDiff = useMemo(()=>{
    if(lesions.length === 0) return [];
    const sumMap = {};
    lesions.forEach(l=>{
      const d = diffFn(l);
      d.forEach(row=>{
        if(!sumMap[row.id]) sumMap[row.id] = {...row, pct:0, count:0};
        sumMap[row.id].pct += row.pct;
        sumMap[row.id].count += 1;
      });
    });
    const arr = Object.values(sumMap).map(r=>({
      ...r, pct: Math.round(r.pct / r.count)
    }));
    return arr.sort((a,b)=>b.pct-a.pct).slice(0,8);
  }, [lesions]);
  
  function lesionMuscosaList(l){
    return Array.from(l.mucosa).map(lbl).filter(Boolean).join(', ') || '—';
  }
  function lesionMesList(l){
    return Array.from(l.mesFindings).map(lbl).filter(Boolean).join(', ') || '—';
  }
  function lesionCxList(l){
    return Array.from(l.complications).map(lbl).filter(Boolean).join(', ') || 'Yok';
  }
  function lesionSpecificList(l){
    return Array.from(l.specificFlags).map(lbl).filter(Boolean).join(', ') || '—';
  }
  function lesionLocText(l){
    if(l.locationFreeText) return l.locationFreeText;
    return l.location.map(lbl).join(', ') || '—';
  }
  const walT = (v)=>({mild:'hafif (3–5 mm)',moderate:'orta (5–10 mm)',marked:'belirgin (>10 mm)',aneurysmal:'anevrizmal dilatasyon'})[v]||'normal (<3 mm)';
  const distT = (v)=>({focal:'fokal',segmental:'segmental',skip:'skip/atlamalı',continuous:'kontinü',multifocal:'multifokal',diffuse:'diffüz',multiple:'multiple ayrık'})[v]||'—';
  const lenT = (v)=>({short:'kısa (<5 cm)',medium:'orta (5–10 cm)',long:'uzun (>10 cm)',diffuse:'diffüz'})[v]||'—';
  const t2T = (v)=>({edema:'ödem (hiperintens, aktif)',intermediate:'intermediyer',hypointense:'hipointens (fibrotik)',heterogeneous:'heterojen',normal:'normal'})[v]||'—';
  const dwiT = (v)=>({yes:'belirgin restriksiyon',mild:'hafif restriksiyon',no:'restriksiyon yok'})[v]||'—';
  const enhP = (v)=>({stratified:'mural stratifikasyon',target:'target',homogeneous:'homojen',mucosal:'mukozal',heterogeneous:'heterojen',peripheral:'periferik',delayed:'geç',reduced:'azalmış',absent:'yok',none:'değerlendirilemedi'})[v]||'—';
  const enhD = (v)=>({mild:'hafif',moderate:'orta',intense:'belirgin',absent:'yok'})[v]||'—';
  const lumT = (v)=>({mildstenosis:'hafif luminal daralma',stenosis:'belirgin stenoz',prestenotic:'stenoz + prestenotik dilatasyon',annular:'annüler stenoz (+shouldering)',dilatation:'dilatasyon',aneurysmal:'anevrizmal dilatasyon'})[v]||'normal';
  const wallPat = (v)=>({concentric:'konsantrik',eccentric:'ekzantrik',circumferential:'sirkumferensiyal'})[v]||'—';
  const lapT = (v)=>({reactive:'reaktif küçük LAP',moderate:'orta boy LAP',bulky:'bulky LAP (>1.5 cm)',necrotic:'nekrotik santrali LAP',calcified:'kalsifiye LAP',conglomerate:'konglomere LAP'})[v]||'normal';
  
  function handlePrint(){ window.print(); }
  function handleCopyRich(){
    if(!rptRef.current) return;
    const html = rptRef.current.innerHTML;
    const text = rptRef.current.innerText;
    try{
      if(navigator.clipboard && window.ClipboardItem){
        const blob = new Blob([html],{type:'text/html'});
        const textBlob = new Blob([text],{type:'text/plain'});
        navigator.clipboard.write([new ClipboardItem({'text/html':blob,'text/plain':textBlob})])
          .then(()=>alert('Rapor panoya kopyalandı (zengin metin).'))
          .catch(()=>{ navigator.clipboard.writeText(text); alert('Düz metin olarak panoya kopyalandı.'); });
      } else {
        navigator.clipboard.writeText(text);
        alert('Düz metin olarak panoya kopyalandı.');
      }
    }catch(e){
      alert('Kopyalama başarısız: '+e.message);
    }
  }
  function handleDownloadHTML(){
    if(!rptRef.current) return;
    const html = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>MR Enterografi Raporu</title>
    <style>
    body{font-family:Arial,sans-serif;max-width:900px;margin:20px auto;padding:30px;color:#222}
    h2{color:#0f0e17;border-bottom:2px solid #f97316;padding-bottom:8px}
    h3{color:#ea580c;margin-top:22px;border-bottom:1px solid #fed7aa;padding-bottom:4px;text-transform:uppercase;font-size:1rem}
    table{width:100%;border-collapse:collapse;margin:8px 0}
    td{padding:7px 12px;vertical-align:top}
    tr:nth-child(even){background:#f9fafb}
    td:first-child{font-weight:600;width:32%}
    .yorum{background:#f0fdf4;border-left:4px solid #16a34a;padding:12px 16px;margin:14px 0;border-radius:6px}
    .yorum-t{font-weight:700;color:#166534;margin-bottom:4px;text-transform:uppercase;font-size:0.82rem}
    .conc{background:#fff7ed;border:1px solid #fdba74;border-radius:8px;padding:16px;margin:16px 0}
    .conc-t{font-weight:700;color:#c2410c;margin-bottom:6px;text-transform:uppercase}
    ul{margin:6px 0 10px 22px}
    .meta{color:#666;font-size:0.82rem;margin-bottom:22px}
    </style></head><body>`+ rptRef.current.innerHTML +'</body></html>';
    const blob = new Blob([html],{type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'MR_Enterografi_Raporu_'+now.toISOString().slice(0,10)+'.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  
  return (
    <div className="rpt-overlay" onClick={(e)=>{ if(e.target.classList.contains('rpt-overlay')) onClose(); }}>
      <div className="rpt-container" onClick={e=>e.stopPropagation()}>
        <div className="rpt-toolbar">
          <button className="btn btn-primary" onClick={handlePrint}>🖨 Yazdır / PDF</button>
          <button className="btn btn-purple" onClick={handleCopyRich}>📋 Kopyala (zengin)</button>
          <button className="btn btn-ghost" onClick={handleDownloadHTML}>⬇ HTML İndir</button>
          <div style={{flex:1}}></div>
          <button className="btn btn-danger" onClick={onClose}>✕ Kapat</button>
        </div>
        <div className="rpt-body" ref={rptRef}>
          <h2>MR ENTEROGRAFİ RAPORU</h2>
          <div className="meta">Rapor tarihi: {tarih}</div>
          
          <h3>Klinik Bilgi</h3>
          <table>
            <tbody>
              <tr><td>Endikasyon</td><td>{global.indikasyon || '—'}</td></tr>
              {global.klinikNote && <tr><td>Ek klinik</td><td>{global.klinikNote}</td></tr>}
              {(global.immunsupresif || global.knownMalignancy || global.nsaidUse || global.anticoagulant || global.radyoterapi) && (
                <tr><td>Risk faktörleri</td><td>
                  {[
                    global.immunsupresif && 'immünsüpresyon',
                    global.knownMalignancy && ('bilinen malignite'+(global.knownMalignancyType?' ('+global.knownMalignancyType+')':'')),
                    global.nsaidUse && 'kronik NSAID kullanımı',
                    global.anticoagulant && 'antikoagülan kullanımı',
                    global.radyoterapi && 'pelvik/abdominal radyoterapi öyküsü',
                  ].filter(Boolean).join(', ')}
                </td></tr>
              )}
              {global.clinicalFlags.size > 0 && (
                <tr><td>Klinik işaretçiler</td><td>{Array.from(global.clinicalFlags).map(lbl).join(', ')}</td></tr>
              )}
            </tbody>
          </table>
          
          <h3>İnceleme Tekniği</h3>
          <table>
            <tbody>
              <tr><td>Oral kontrast</td><td>{global.oralContrast || '—'}</td></tr>
              <tr><td>Barsak distansiyonu</td><td>{global.distention || '—'}</td></tr>
              <tr><td>Hareket artefaktı</td><td>{global.artefakt || '—'}</td></tr>
              <tr><td>Antispasmotik</td><td>{global.antispasmodic ? 'Verildi' : 'Verilmedi'}</td></tr>
              <tr><td>IV Gd kontrast</td><td>{global.ivContrast ? 'Verildi (pre/post serileri alındı)' : 'Verilmedi'}</td></tr>
              <tr><td>Sekanslar</td><td>Koronal ve aksiyel T2 HASTE, T2 yağ baskılı, DWI (b 50-800), cine MRI, pre/post IV kontrast sonrası T1 VIBE/LAVA (erken ve geç fazlar)</td></tr>
            </tbody>
          </table>
          
          <h3>BULGULAR</h3>
          
          <h3 style={{fontSize:'0.9rem',color:'#374151',borderBottom:'none',textTransform:'none',letterSpacing:0}}>Anatomik Segment Taraması</h3>
          <table>
            <tbody>
              <tr><td>Mide</td><td>{global.mide}</td></tr>
              <tr><td>Duodenum</td><td>{global.duodenum}</td></tr>
              <tr><td>Jejunum</td><td>{global.jejunum}</td></tr>
              <tr><td>İleum</td><td>{global.ileum}</td></tr>
              <tr><td>Terminal ileum</td><td>{global.terminal_ileum}</td></tr>
              <tr><td>İleoçekal valv</td><td>{global.iliocecal}</td></tr>
              <tr><td>Çekum</td><td>{global.cecum}</td></tr>
              <tr><td>Kolon (diğer)</td><td>{global.kolon}</td></tr>
              <tr><td>Apendiks</td><td>{global.apendiks}</td></tr>
              <tr><td>Rektum</td><td>{global.rektum}</td></tr>
            </tbody>
          </table>
          
          {lesions.length > 0 && lesions.map((l,i)=>{
            const diff = diffFn(l);
            return (
              <div key={l.id}>
                <h3>Lezyon {i+1} {l.name ? '— '+l.name : ''}</h3>
                <table>
                  <tbody>
                    <tr><td>Lokalizasyon</td><td>{lesionLocText(l)}</td></tr>
                    <tr><td>Uzunluk</td><td>{l.lengthCm ? l.lengthCm+' — ' : ''}{lenT(l.length)}</td></tr>
                    <tr><td>Dağılım</td><td>{distT(l.distribution)}</td></tr>
                    <tr><td>Duvar kalınlığı</td><td>{l.wallMeasurement ? l.wallMeasurement+' — ' : ''}{walT(l.wallThick)}</td></tr>
                    {l.wallPattern && <tr><td>Duvar paterni</td><td>{wallPat(l.wallPattern)}</td></tr>}
                    <tr><td>T2 sinyali (duvar)</td><td>{t2T(l.t2Signal)}</td></tr>
                    <tr><td>DWI</td><td>{dwiT(l.dwiRestriction)}{l.adcValue?' (ADC: '+l.adcValue+' ×10⁻³ mm²/sn)':''}</td></tr>
                    <tr><td>Kontrastlanma</td><td>{enhP(l.enhancementPattern)}{l.enhancementDegree?', '+enhD(l.enhancementDegree)+' derece':''}</td></tr>
                    <tr><td>Lümen</td><td>{lumT(l.lumen)}</td></tr>
                    <tr><td>Mukozal bulgular</td><td>{lesionMuscosaList(l)}</td></tr>
                    {Array.from(l.specificFlags).length > 0 && (
                      <tr><td>Özel morfolojik işaretçiler</td><td>{lesionSpecificList(l)}</td></tr>
                    )}
                    <tr><td>Mezenter bulguları</td><td>{lesionMesList(l)}</td></tr>
                    <tr><td>Lenf nodları</td><td>{lapT(l.lymphNodes)}{l.lapLocationNote?' — '+l.lapLocationNote:''}</td></tr>
                    <tr><td>Komplikasyonlar</td><td>{lesionCxList(l)}</td></tr>
                    {l.notes && <tr><td>Ek not</td><td>{l.notes}</td></tr>}
                  </tbody>
                </table>
                
                <div className="yorum">
                  <div className="yorum-t">YORUM — Lezyon {i+1} Ayırıcı Tanı</div>
                  <ul>
                    {diff.slice(0,5).map(d=>(
                      <li key={d.id}><strong>{d.name}</strong> ({d.pct}%) — {d.cat}</li>
                    ))}
                  </ul>
                </div>
              </div>
            );
          })}
          
          {lesions.length === 0 && global.patolojiVarMi === false && (
            <div className="yorum">
              <div className="yorum-t">YORUM — Normal MR Enterografi</div>
              İncelenen ince barsak segmentlerinde patolojik duvar kalınlaşması, anormal kontrastlanma, 
              stenoz, fistül, abse veya mezenter patolojisi izlenmemiştir.
            </div>
          )}
          
          {(global.extraFindings.size > 0 || global.complications.size > 0) && (
            <>
              <h3>Ekstraintestinal Bulgular</h3>
              <table>
                <tbody>
                  {global.extraFindings.size > 0 && (
                    <tr><td>Mezenter / LAP / Peritoneum / Vasküler</td>
                      <td>{Array.from(global.extraFindings).map(lbl).join(', ')}</td></tr>
                  )}
                  {global.complications.size > 0 && (
                    <tr><td>Sistemik komplikasyonlar</td>
                      <td>{Array.from(global.complications).map(lbl).join(', ')}</td></tr>
                  )}
                </tbody>
              </table>
            </>
          )}
          
          {(global.solidOrgans || global.pelvisBulgu) && (
            <>
              <h3>Solid Organlar / Pelvis</h3>
              <table>
                <tbody>
                  {global.solidOrgans && <tr><td>Karın içi organlar</td><td style={{whiteSpace:'pre-wrap'}}>{global.solidOrgans}</td></tr>}
                  {global.pelvisBulgu && <tr><td>Pelvis</td><td style={{whiteSpace:'pre-wrap'}}>{global.pelvisBulgu}</td></tr>}
                </tbody>
              </table>
            </>
          )}
          
          {lesions.length > 0 && aggDiff.length > 0 && (
            <>
              <h3>Kombine Ayırıcı Tanı</h3>
              <table>
                <tbody>
                  {aggDiff.map(d=>(
                    <tr key={d.id}>
                      <td>{d.name}</td>
                      <td>{d.pct}% ({d.cat})</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </>
          )}
          
          <div className="conc">
            <div className="conc-t">SONUÇ</div>
            {global.sonucNote ? (
              <div style={{whiteSpace:'pre-wrap'}}>{global.sonucNote}</div>
            ) : (
              lesions.length === 0 && global.patolojiVarMi === false ? (
                'Normal MR enterografi incelemesi. Klinik endikasyona yönelik ek değerlendirme gerekirse klinisyenle korelasyon önerilir.'
              ) : (
                lesions.length > 0 && aggDiff.length > 0 ? (
                  <>
                    Tanımlanan bulgular göz önüne alındığında en olası ayırıcı tanı <strong>{aggDiff[0].name}</strong> ({aggDiff[0].pct}%) 
                    olup, {aggDiff.slice(1,3).map(d=>d.name).join(' ve ')} da ayırıcı tanıda akılda tutulmalıdır. 
                    Klinik, laboratuvar ve gerektiğinde endoskopik/histopatolojik korelasyon önerilir.
                  </>
                ) : 'Sonuç notu girilmedi.'
              )
            )}
          </div>
          
          <div style={{marginTop:30,paddingTop:14,borderTop:'1px solid #e5e7eb',fontSize:'0.78rem',color:'#6b7280'}}>
            Bu rapor MR enterografi structured reporting şablonu ile oluşturulmuştur. Ağırlıklı ayırıcı tanı 
            algoritması klinik karar destek amacıyla kullanılmakta olup klinisyenin değerlendirmesinin yerine geçmez.
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   MOUNT
   ============================================================ */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
