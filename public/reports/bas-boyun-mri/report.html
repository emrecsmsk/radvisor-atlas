<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baş-Boyun MRI Karar Destek</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#22223a;--purple:#9b59b6;--purpled:#7d3c98;--purplel:#c39bd3;--green:#27ae60;--greend:#1e8449;--red:#e74c3c;--yellow:#f1c40f;--orange:#e67e22;--blue:#3498db;--text:#e8e8f0;--textm:#b0b0c8;--textd:#707090;--border:#2a2a44;--white:#fff;--shadow:0 4px 24px rgba(0,0,0,.4)}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.container{max-width:900px;margin:0 auto;padding:16px}
header{text-align:center;padding:24px 0 16px;border-bottom:2px solid var(--purple)}
header h1{font-size:1.6em;color:var(--purplel);letter-spacing:1px}
header p{color:var(--textm);font-size:.85em;margin-top:4px}

/* Progress */
.progress-bar{display:flex;align-items:center;gap:4px;margin:20px 0 16px;flex-wrap:wrap}
.prog-step{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7em;font-weight:700;background:var(--card2);color:var(--textd);border:2px solid var(--border);cursor:pointer;transition:.2s}
.prog-step.active{background:var(--purple);color:#fff;border-color:var(--purplel)}
.prog-step.done{background:var(--greend);color:#fff;border-color:var(--green)}
.prog-line{flex:1;min-width:8px;height:2px;background:var(--border)}

/* Card */
.step-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:var(--shadow);display:none}
.step-card.active{display:block}
.step-title{font-size:1.15em;color:var(--purplel);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.step-title span{color:var(--textd);font-size:.8em;margin-left:8px}

/* Inputs */
.form-group{margin-bottom:14px}
.form-group label{display:block;color:var(--textm);font-size:.85em;margin-bottom:6px;font-weight:600}
.form-group input[type=text],.form-group input[type=number],.form-group select{width:100%;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9em}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--purple)}

.radio-grid,.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.radio-opt,.check-opt{padding:10px 14px;background:var(--card2);border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:.2s;font-size:.85em;display:flex;align-items:center;gap:8px}
.radio-opt:hover,.check-opt:hover{border-color:var(--purpled)}
.radio-opt.selected{border-color:var(--purple);background:rgba(155,89,182,.15)}
.check-opt.selected{border-color:var(--purple);background:rgba(155,89,182,.15)}
.radio-opt .dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--textd);flex-shrink:0}
.radio-opt.selected .dot{border-color:var(--purple);background:var(--purple);box-shadow:inset 0 0 0 3px var(--card2)}
.check-opt .cbox{width:16px;height:16px;border-radius:4px;border:2px solid var(--textd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7em}
.check-opt.selected .cbox{border-color:var(--purple);background:var(--purple);color:#fff}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:.9em;font-weight:600;cursor:pointer;transition:.2s}
.btn-prev{background:var(--card2);color:var(--textm);border:1px solid var(--border)}
.btn-prev:hover{border-color:var(--purple)}
.btn-next{background:var(--purple);color:#fff}
.btn-next:hover{background:var(--purpled)}
.btn-next:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:8px 16px;font-size:.8em}

/* Results */
.diff-list{margin-top:12px}
.diff-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;margin-bottom:6px;background:var(--card2);border-left:4px solid var(--textd)}
.diff-item.high{border-left-color:var(--red)}
.diff-item.med{border-left-color:var(--orange)}
.diff-item.low{border-left-color:var(--blue)}
.diff-rank{font-weight:800;font-size:1.1em;color:var(--textm);min-width:28px;text-align:center}
.diff-name{flex:1;font-weight:600}
.diff-score{font-weight:700;font-size:.95em;min-width:50px;text-align:right}
.diff-bar-wrap{width:120px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.diff-bar{height:100%;border-radius:4px;transition:width .6s}
.diff-detail{font-size:.78em;color:var(--textm);margin-top:4px}
.diff-body{flex:1}

.pathology-detail{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:16px}
.pathology-detail h3{color:var(--purplel);margin-bottom:10px}
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.pd-row{display:flex;gap:8px;font-size:.85em}
.pd-label{color:var(--textm);min-width:100px}
.pd-val{color:var(--text);font-weight:600}

/* Report */
.report-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:9999;overflow-y:auto}
.report-overlay.show{display:block}
.report-sheet{max-width:800px;margin:30px auto;background:#fff;color:#222;padding:40px;border-radius:8px;font-size:13px;line-height:1.6}
.report-sheet h2{text-align:center;color:#4a0e78;font-size:1.3em;margin-bottom:4px}
.report-sheet .r-sub{text-align:center;color:#666;font-size:.85em;margin-bottom:16px}
.report-sheet table{width:100%;border-collapse:collapse;margin:12px 0}
.report-sheet th{background:#4a0e78;color:#fff;padding:6px 10px;text-align:left;font-size:.85em}
.report-sheet td{padding:5px 10px;border-bottom:1px solid #ddd;font-size:.84em}
.report-sheet tr:nth-child(even){background:#f3eef8}
.report-sheet .yorum{background:#f0faf4;border-left:4px solid #27ae60;padding:10px 14px;margin:12px 0;border-radius:4px;font-size:.88em}
.report-sheet .yorum b{color:#1e8449}
.report-toolbar{position:sticky;top:0;background:#333;padding:8px 16px;display:flex;gap:8px;justify-content:flex-end;border-radius:8px 8px 0 0;z-index:10000}
.report-toolbar .btn{font-size:.8em;padding:6px 14px}
.btn-print{background:#27ae60;color:#fff}
.btn-copy{background:#3498db;color:#fff}
.btn-close{background:#e74c3c;color:#fff}

.match-tag{display:inline-block;font-size:.7em;padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:400}
.match-tag.hit{background:rgba(39,174,96,.2);color:#2ecc71}
.match-tag.miss{background:rgba(231,76,60,.15);color:#e74c3c}

@media(max-width:600px){
  .radio-grid,.check-grid{grid-template-columns:1fr}
  .diff-bar-wrap{width:60px}
  .pd-grid{grid-template-columns:1fr}
  .report-sheet{padding:20px;margin:10px}
}
@media print{
  body{background:#fff}
  .container,.progress-bar,.step-card,.btn-row,header{display:none!important}
  .report-overlay{position:static;background:none}
  .report-toolbar{display:none!important}
  .report-sheet{margin:0;box-shadow:none;border-radius:0}
}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>
</head>
<body>

<div class="container">
  <header>
    <h1 data-i18n-tr="&#127973; Baş–Boyun MRI Karar Destek Sistemi" data-i18n-en="&#127973; Head and Neck MRI Decision Support System"></h1>
    <p data-i18n-tr="50 patoloji &bull; Ağırlıklı diferansiyel skorlama &bull; Yapısal rapor" data-i18n-en="50 pathologies &bull; Weighted differential scoring &bull; Structured report"></p>
  </header>

  <div class="progress-bar" id="progBar"></div>

  <!-- S0: Hasta Bilgisi -->
  <div class="step-card active" id="step0">
    <div class="step-title"><span data-i18n-tr="Hasta Bilgileri" data-i18n-en="Patient Information"></span> <span data-i18n-tr="Adım 1/12" data-i18n-en="Step 1/12"></span></div>
    <div class="form-group"><label data-i18n-tr="Hasta Adı / ID" data-i18n-en="Patient Name / ID"></label><input type="text" id="pName" data-i18n-tr-placeholder="Opsiyonel" data-i18n-en-placeholder="Optional"></div>
    <div class="form-group"><label data-i18n-tr="Yaş" data-i18n-en="Age"></label><input type="number" id="pAge" min="0" max="120" data-i18n-tr-placeholder="Yaş" data-i18n-en-placeholder="Age"></div>
    <div class="form-group"><label data-i18n-tr="Cinsiyet" data-i18n-en="Sex"></label>
      <div class="radio-grid" data-name="pSex">
        <div class="radio-opt" data-val="Erkek"><span class="dot"></span><span data-i18n-tr="Erkek" data-i18n-en="Male"></span></div>
        <div class="radio-opt" data-val="Kadın"><span class="dot"></span><span data-i18n-tr="Kadın" data-i18n-en="Female"></span></div>
        <div class="radio-opt" data-val="Çocuk"><span class="dot"></span><span data-i18n-tr="Çocuk (&lt;18)" data-i18n-en="Child (&lt;18)"></span></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-next" onclick="goNext()" data-i18n-tr="İleri &#9654;" data-i18n-en="Next &#9654;"></button></div>
  </div>

  <!-- S1: Lokalizasyon -->
  <div class="step-card" id="step1">
    <div class="step-title"><span data-i18n-tr="Lezyon Lokalizasyonu" data-i18n-en="Lesion Localization"></span> <span data-i18n-tr="Adım 2/12" data-i18n-en="Step 2/12"></span></div>
    <div class="form-group"><label data-i18n-tr="Primer lokalizasyon seçiniz" data-i18n-en="Select primary localization"></label>
      <div class="radio-grid" data-name="loc">
        <div class="radio-opt" data-val="boyun"><span class="dot"></span><span data-i18n-tr="Boyun (genel)" data-i18n-en="Neck (general)"></span></div>
        <div class="radio-opt" data-val="parotis"><span class="dot"></span><span data-i18n-tr="Parotis / Tükürük Bezi" data-i18n-en="Parotid / Salivary Gland"></span></div>
        <div class="radio-opt" data-val="tiroid"><span class="dot"></span><span data-i18n-tr="Tiroid" data-i18n-en="Thyroid"></span></div>
        <div class="radio-opt" data-val="nazal"><span class="dot"></span><span data-i18n-tr="Nazal Kavite / Sinüs" data-i18n-en="Nasal Cavity / Sinus"></span></div>
        <div class="radio-opt" data-val="orbita"><span class="dot"></span><span data-i18n-tr="Orbita" data-i18n-en="Orbit"></span></div>
        <div class="radio-opt" data-val="larenks"><span class="dot"></span><span data-i18n-tr="Larenks" data-i18n-en="Larynx"></span></div>
        <div class="radio-opt" data-val="nazofarenks"><span class="dot"></span><span data-i18n-tr="Nazofarenks" data-i18n-en="Nasopharynx"></span></div>
        <div class="radio-opt" data-val="orofarenks"><span class="dot"></span><span data-i18n-tr="Orofarenks" data-i18n-en="Oropharynx"></span></div>
        <div class="radio-opt" data-val="hipofarenks"><span class="dot"></span><span data-i18n-tr="Hipofarenks" data-i18n-en="Hypopharynx"></span></div>
        <div class="radio-opt" data-val="sublingual"><span class="dot"></span><span data-i18n-tr="Sublingual / Ağız Tabanı" data-i18n-en="Sublingual / Floor of Mouth"></span></div>
        <div class="radio-opt" data-val="vaskuler"><span class="dot"></span><span data-i18n-tr="Vasküler / Paragangliom" data-i18n-en="Vascular / Paraganglioma"></span></div>
        <div class="radio-opt" data-val="sinir"><span class="dot"></span><span data-i18n-tr="Sinir Kılıfı" data-i18n-en="Nerve Sheath"></span></div>
        <div class="radio-opt" data-val="diger"><span class="dot"></span><span data-i18n-tr="Diğer / Yaygın" data-i18n-en="Other / Diffuse"></span></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-prev" onclick="goPrev()" data-i18n-tr="&#9664; Geri" data-i18n-en="&#9664; Back"></button><button class="btn btn-next" onclick="goNext()" data-i18n-tr="İleri &#9654;" data-i18n-en="Next &#9654;"></button></div>
  </div>

  <!-- S2: Taraf -->
  <div class="step-card" id="stepSide">
    <div class="step-title"><span data-i18n-tr="Lezyon Tarafı" data-i18n-en="Lesion Side"></span> <span data-i18n-tr="Adım 3/12" data-i18n-en="Step 3/12"></span></div>
    <div class="form-group"><label data-i18n-tr="Lezyon hangi tarafta?" data-i18n-en="Which side is the lesion on?"></label>
      <div class="radio-grid" data-name="side">
        <div class="radio-opt" data-val="Sağ"><span class="dot"></span><span data-i18n-tr="Sağ" data-i18n-en="Right"></span></div>
        <div class="radio-opt" data-val="Sol"><span class="dot"></span><span data-i18n-tr="Sol" data-i18n-en="Left"></span></div>
        <div class="radio-opt" data-val="Bilateral"><span class="dot"></span><span data-i18n-tr="Bilateral" data-i18n-en="Bilateral"></span></div>
        <div class="radio-opt" data-val="Orta hat"><span class="dot"></span><span data-i18n-tr="Orta hat" data-i18n-en="Midline"></span></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-prev" onclick="goPrev()" data-i18n-tr="&#9664; Geri" data-i18n-en="&#9664; Back"></button><button class="btn btn-next" onclick="goNext()" data-i18n-tr="İleri &#9654;" data-i18n-en="Next &#9654;"></button></div>
  </div>

  <!-- S3: Boyutlar -->
  <div class="step-card" id="stepDims">
    <div class="step-title"><span data-i18n-tr="Lezyon Boyutları" data-i18n-en="Lesion Dimensions"></span> <span data-i18n-tr="Adım 4/12" data-i18n-en="Step 4/12"></span></div>
    <div class="form-group"><label data-i18n-tr="En büyük aks (mm)" data-i18n-en="Longest axis (mm)"></label>
      <input type="number" id="dim1" min="1" max="300" data-i18n-tr-placeholder="Örn: 25" data-i18n-en-placeholder="e.g. 25" oninput="vals.dim1=this.value?parseFloat(this.value):null" style="max-width:160px">
    </div>
    <div class="form-group" style="margin-top:12px"><label data-i18n-tr="İkinci aks (mm)" data-i18n-en="Second axis (mm)"></label>
      <input type="number" id="dim2" min="1" max="300" data-i18n-tr-placeholder="Örn: 18" data-i18n-en-placeholder="e.g. 18" oninput="vals.dim2=this.value?parseFloat(this.value):null" style="max-width:160px">
    </div>
    <div class="btn-row"><button class="btn btn-prev" onclick="goPrev()" data-i18n-tr="&#9664; Geri" data-i18n-en="&#9664; Back"></button><button class="btn btn-next" onclick="goNext()" data-i18n-tr="İleri &#9654;" data-i18n-en="Next &#9654;"></button></div>
  </div>

  <!-- S4: Kontur -->
  <div class="step-card" id="stepContour">
    <div class="step-title"><span data-i18n-tr="Lezyon Konturu" data-i18n-en="Lesion Contour"></span> <span data-i18n-tr="Adım 5/12" data-i18n-en="Step 5/12"></span></div>
    <div class="form-group"><label data-i18n-tr="Kontur özelliği" data-i18n-en="Contour characteristic"></label>
      <div class="radio-grid" data-name="contour">
        <div class="radio-opt" data-val="Düzenli"><span class="dot"></span><span data-i18n-tr="Düzenli" data-i18n-en="Well-defined"></span></div>
        <div class="radio-opt" data-val="Düzensiz"><span class="dot"></span><span data-i18n-tr="Düzensiz" data-i18n-en="Irregular"></span></div>
        <div class="radio-opt" data-val="Lobüle"><span class="dot"></span><span data-i18n-tr="Lobüle" data-i18n-en="Lobulated"></span></div>
        <div class="radio-opt" data-val="Silik"><span class="dot"></span><span data-i18n-tr="Silik / Belirsiz" data-i18n-en="Ill-defined / Indistinct"></span></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-prev" onclick="goPrev()" data-i18n-tr="&#9664; Geri" data-i18n-en="&#9664; Back"></button><button class="btn btn-next" onclick="goNext()" data-i18n-tr="İleri &#9654;" data-i18n-en="Next &#9654;"></button></div>
  </div>

  <!-- S5: İç Yapı -->
  <div class="step-card" id="stepInner">
    <div class="step-title"><span data-i18n-tr="İç Yapı" data-i18n-en="Internal Structure"></span> <span data-i18n-tr="Adım 6/12" data-i18n-en="Step 6/12"></span></div>
    <div class="form-group"><label data-i18n-tr="Lezyonun iç yapısı" data-i18n-en="Internal structure of the lesion"></label>
      <div class="radio-grid" data-name="inner">
        <div class="radio-opt" data-val="Homojen"><span class="dot"></span><span data-i18n-tr="Homojen" data-i18n-en="Homogeneous"></span></div>
        <div class="radio-opt" data-val="Heterojen"><span class="dot"></span><span data-i18n-tr="Heterojen" data-i18n-en="Heterogeneous"></span></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-prev" onclick="goPrev()" data-i18n-tr="&#9664; Geri" data-i18n-en="&#9664; Back"></button><button class="btn btn-next" onclick="goNext()" data-i18n-tr="İleri &#9654;" data-i18n-en="Next &#9654;"></button></div>
  </div>

  <!-- S6: T1 -->
  <div class="step-card" id="step2">
    <div class="step-title"><span data-i18n-tr="T1 Ağırlıklı Sinyal" data-i18n-en="T1-Weighted Signal"></span> <span data-i18n-tr="Adım 7/12" data-i18n-en="Step 7/12"></span></div>
    <div class="form-group"><label data-i18n-tr="T1 sinyal intensitesi" data-i18n-en="T1 signal intensity"></label>
      <div class="radio-grid" data-name="t1">
        <div class="radio-opt" data-val="Hipo"><span class="dot"></span><span data-i18n-tr="Hipointens" data-i18n-en="Hypointense"></span></div>
        <div class="radio-opt" data-val="İzointens"><span class="dot"></span><span data-i18n-tr="İzointens" data-i18n-en="Isointense"></span></div>
        <div class="radio-opt" data-val="Hiper"><span class="dot"></span><span data-i18n-tr="Hiperintens" data-i18n-en="Hyperintense"></span></div>
        <div class="radio-opt" data-val="Heterojen"><span class="dot"></span><span data-i18n-tr="Heterojen" data-i18n-en="Heterogeneous"></span></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-prev" onclick="goPrev()" data-i18n-tr="&#9664; Geri" data-i18n-en="&#9664; Back"></button><button class="btn btn-next" onclick="goNext()" data-i18n-tr="İleri &#9654;" data-i18n-en="Next &#9654;"></button></div>
  </div>

  <!-- S3: T2 -->
  <div class="step-card" id="step3">
    <div class="step-title"><span data-i18n-tr="T2 Ağırlıklı Sinyal" data-i18n-en="T2-Weighted Signal"></span> <span data-i18n-tr="Adım 8/12" data-i18n-en="Step 8/12"></span></div>
    <div class="form-group"><label data-i18n-tr="T2 sinyal intensitesi" data-i18n-en="T2 signal intensity"></label>
      <div class="radio-grid" data-name="t2">
        <div class="radio-opt" data-val="Çok hipo"><span class="dot"></span><span data-i18n-tr="Çok Hipointens" data-i18n-en="Markedly Hypointense"></span></div>
        <div class="radio-opt" data-val="Hipo"><span class="dot"></span><span data-i18n-tr="Hipointens" data-i18n-en="Hypointense"></span></div>
        <div class="radio-opt" data-val="İzointens"><span class="dot"></span><span data-i18n-tr="İzointens" data-i18n-en="Isointense"></span></div>
        <div class="radio-opt" data-val="İzohiper"><span class="dot"></span><span data-i18n-tr="İzo-Hiperintens" data-i18n-en="Iso-Hyperintense"></span></div>
        <div class="radio-opt" data-val="Hiper"><span class="dot"></span><span data-i18n-tr="Hiperintens" data-i18n-en="Hyperintense"></span></div>
        <div class="radio-opt" data-val="Çok hiper"><span class="dot"></span><span data-i18n-tr="Çok Hiperintens" data-i18n-en="Markedly Hyperintense"></span></div>
        <div class="radio-opt" data-val="Heterojen"><span class="dot"></span><span data-i18n-tr="Heterojen" data-i18n-en="Heterogeneous"></span></div>
        <div class="radio-opt" data-val="Değişken"><span class="dot"></span><span data-i18n-tr="Değişken" data-i18n-en="Variable"></span></div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-prev" onclick="goPrev()" data-i18n-tr="&#9664; Geri" data-i18n-en="&#9664; Back"></button><button class="btn btn-next" onclick="goNext()" data-i18n-tr="İleri &#9654;" data-i18n-en="Next &#9654;"></button></div>
  </div>

  <!-- S4: DWI -->
  <div class="step-card" id="step4">
    <div class="step-title"><span data-i18n-tr="Difüzyon Ağırlıklı Görüntüleme (DWI)" data-i18n-en="Diffusion-Weighted Imaging (DWI)"></span> <span data-i18n-tr="Adım 9/12" data-i18n-en="Step 9/12"></span></div>
    <div class="form-group"><label data-i18n-tr="DWI bulgusu" data-i18n-en="DWI finding"></label>

// Helper: get locale-aware name/key from DB entry
function dbName(p){ return RV_LOCALE === 'en' ? p.name_en : p.name; }
function dbKey(p){ return RV_LOCALE === 'en' ? p.key_en : p.key; }

// ===== STEP ORDER =====
const STEP_ORDER = ['step0','step1','stepSide','stepDims','stepContour','stepInner','step2','step3','step4','step5','step6','step7'];
const STEP_TOTAL = STEP_ORDER.length; // 12

// ===== STATE =====
let cur = 0;
let lesions = [];
const vals = {};

// ===== I18N BOOT =====
function applyI18n(){
  // text nodes on elements with data-i18n-tr / data-i18n-en
  document.querySelectorAll('[data-i18n-tr]').forEach(el=>{
    el.textContent = RV_LOCALE === 'en'
      ? (el.getAttribute('data-i18n-en') || el.getAttribute('data-i18n-tr'))
      : el.getAttribute('data-i18n-tr');
  });
  // placeholder attributes
  const pAttr = RV_LOCALE === 'en' ? 'data-i18n-en-placeholder' : 'data-i18n-tr-placeholder';
  document.querySelectorAll('[data-i18n-tr-placeholder]').forEach(el=>{
    const v = el.getAttribute(pAttr) || el.getAttribute('data-i18n-tr-placeholder');
    if(v) el.setAttribute('placeholder', v);
  });
}

// ===== INIT =====
function init(){
  applyI18n();
  buildProg(0);
  // radio clicks — covers all radio-grids including new ones
  document.querySelectorAll('.radio-grid').forEach(g=>{
    const name = g.dataset.name;
    g.querySelectorAll('.radio-opt').forEach(o=>{
      o.addEventListener('click',()=>{
        g.querySelectorAll('.radio-opt').forEach(x=>x.classList.remove('selected'));
        o.classList.add('selected');
        vals[name] = o.dataset.val;
      });
    });
  });
  // check clicks
  document.querySelectorAll('.check-grid').forEach(g=>{
    const name = g.dataset.name;
    vals[name] = [];
    g.querySelectorAll('.check-opt').forEach(o=>{
      o.addEventListener('click',()=>{
        o.classList.toggle('selected');
        vals[name] = [...g.querySelectorAll('.check-opt.selected')].map(x=>x.dataset.val);
      });
    });
  });
  showStep(0);
}

function buildProg(activeIdx){
  const bar = document.getElementById('progBar');
  bar.innerHTML = '';
  for(let i=0;i<STEP_TOTAL;i++){
    if(i>0){const ln=document.createElement('div');ln.className='prog-line';bar.appendChild(ln);}
    const s=document.createElement('div');
    s.className='prog-step'+(i===activeIdx?' active':i<activeIdx?' done':'');
    s.textContent=i+1;
    s.onclick=()=>{if(i<activeIdx)showStep(i)};
    bar.appendChild(s);
  }
}

function showStep(n){
  cur=n;
  document.querySelectorAll('.step-card').forEach(c=>c.classList.remove('active'));
  if(n<STEP_TOTAL){
    document.getElementById(STEP_ORDER[n]).classList.add('active');
    buildProg(n);
  } else {
    // results
    document.getElementById('step8').classList.add('active');
    buildProg(STEP_TOTAL);
  }
}

function showAskMoreStep(){
  document.querySelectorAll('.step-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('stepAskMore').classList.add('active');
  buildProg(STEP_TOTAL);
}

function goNext(){showStep(cur+1)}
function goPrev(){if(cur>0)showStep(cur-1)}

// ===== LESION LOOP =====
function saveLesion(){
  const label = RV_LOCALE === 'en' ? `Lesion ${lesions.length+1}` : `Lezyon ${lesions.length+1}`;
  lesions.push({
    label,
    data: {
      ...vals,
      features: vals.features ? [...vals.features] : []
    }
  });
  const last = lesions[lesions.length-1];
  const el = document.getElementById('stepAskMore');
  const dimTxt = last.data.dim1!=null ? `${last.data.dim1}${last.data.dim2!=null?' × '+last.data.dim2:''}  mm` : '—';
  el.innerHTML = `
    <div class="step-title" style="color:var(--green)">${T.saved_title(last.label)}</div>
    <p style="color:var(--textm);font-size:.88em;margin-bottom:6px">
      <b>${T.saved_loc}:</b> ${locLabel(last.data.loc)} &nbsp;|&nbsp;
      <b>${T.saved_side}:</b> ${sideLabel(last.data.side)} &nbsp;|&nbsp;
      <b>${T.saved_dims}:</b> ${dimTxt} &nbsp;|&nbsp;
      <b>${T.saved_contour}:</b> ${contourLabel(last.data.contour)||'—'} &nbsp;|&nbsp;
      <b>${T.saved_inner}:</b> ${innerLabel(last.data.inner)||'—'}
    </p>
    <p style="color:var(--textd);font-size:.82em;margin-bottom:18px">${T.saved_total(lesions.length)}</p>
    <p style="font-size:1rem;margin-bottom:14px">${T.ask_more}</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-next" onclick="addAnotherLesion()" style="flex:1;min-width:180px">${T.btn_add}</button>
      <button class="btn btn-prev" onclick="finalizeLesions()" style="flex:1;min-width:180px;border-color:var(--green);color:var(--green)">${T.btn_finalize}</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-prev" onclick="editLastLesion()">${T.btn_edit}</button>
    </div>
  `;
  showAskMoreStep();
}

function addAnotherLesion(){
  // Clear only lesion-specific vals (keep patient info)
  const keepSex = vals.pSex;
  ['loc','side','dim1','dim2','contour','inner','t1','t2','dwi','adc','ce'].forEach(k=>delete vals[k]);
  vals.features = [];
  vals.pSex = keepSex;
  // Clear UI selections (skip patient fields)
  document.querySelectorAll('#stepSide .radio-opt.selected,#stepContour .radio-opt.selected,#stepInner .radio-opt.selected,#step1 .radio-opt.selected,#step2 .radio-opt.selected,#step3 .radio-opt.selected,#step4 .radio-opt.selected,#step5 .radio-opt.selected,#step6 .radio-opt.selected').forEach(o=>o.classList.remove('selected'));
  document.querySelectorAll('.check-opt.selected').forEach(o=>o.classList.remove('selected'));
  document.getElementById('dim1').value='';
  document.getElementById('dim2').value='';
  showStep(1); // Go to lokalizasyon, skip hasta bilgisi
}

function editLastLesion(){
  if(lesions.length>0){
    const last = lesions.pop();
    Object.keys(vals).forEach(k=>{ if(!['pSex'].includes(k)) delete vals[k]; });
    Object.assign(vals, last.data);
    showStep(STEP_TOTAL-1); // go to ek özellikler (last wizard step)
  }
}

function finalizeLesions(){
  calcResults();
}

// ===== SCORING ENGINE =====
function matchSignal(userVal, dbVal){
  if(!userVal||!dbVal) return 0;
  const u=userVal.toLowerCase(), d=dbVal.toLowerCase();
  if(u===d) return 1;
  if(d.includes('hiper')&&u.includes('hiper')) return 0.8;
  if(d.includes('hipo')&&u.includes('hipo')) return 0.8;
  if(d==='hafif hiper'&&u==='hiper') return 0.6;
  if(d==='çok hiper'&&u==='hiper') return 0.7;
  if(d==='çok hipo'&&u==='hipo') return 0.7;
  if(d==='izohiper'&&(u==='hiper'||u==='izointens')) return 0.5;
  if(d.includes('heterojen')&&u.includes('heterojen')) return 1;
  if(d==='değişken') return 0.3;
  if((d==='var'||d==='belirgin')&&(u==='var'||u==='belirgin')) return 1;
  if((d==='çok belirgin'||d==='çok')&&(u==='çok belirgin'||u==='çok')) return 1;
  if(d==='hafif'&&u==='hafif') return 1;
  if(d==='var'&&u==='hafif') return 0.4;
  if(d==='hafif'&&u==='var') return 0.4;
  if(d==='yok'&&u==='yok') return 1;
  if(d==='hafif düşük'&&u==='düşük') return 0.6;
  if(d==='düşük'&&u==='hafif düşük') return 0.6;
  if(d==='çok düşük'&&u==='düşük') return 0.7;
  if(d==='güçlü'&&u==='yoğun') return 0.9;
  if(d==='yoğun'&&u==='güçlü') return 0.9;
  if(d==='nodüler'&&u==='heterojen') return 0.4;
  return 0;
}

function calcLesionScores(data){
  const loc=data.loc||'diger';
  const t1=data.t1||'';
  const t2=data.t2||'';
  const dwi=data.dwi||'';
  const adc=data.adc||'';
  const ce=data.ce||'';
  const feats=data.features||[];
  const age=parseInt(document.getElementById('pAge').value)||40;
  const sex=vals.pSex||'';

  const results=DB.map(p=>{
    let score=0, maxScore=0, details=[];
    maxScore+=3;
    const locMatch = p.loc.includes(loc)||p.loc.includes('diger');
    if(locMatch){score+=3;details.push({k:T.label_loc,v:'✓',hit:true});}
    else{details.push({k:T.label_loc,v:'✗',hit:false});}
    maxScore+=2;
    const t1s=matchSignal(t1,p.t1);
    score+=t1s*2;details.push({k:'T1',v:p.t1,hit:t1s>=0.5});
    maxScore+=2;
    const t2s=matchSignal(t2,p.t2);
    score+=t2s*2;details.push({k:'T2',v:p.t2,hit:t2s>=0.5});
    maxScore+=2;
    const ds=matchSignal(dwi,p.dwi);
    score+=ds*2;details.push({k:'DWI',v:p.dwi,hit:ds>=0.5});
    maxScore+=2;
    const as=matchSignal(adc,p.adc);
    score+=as*2;details.push({k:'ADC',v:p.adc,hit:as>=0.5});
    maxScore+=2;
    const cs=matchSignal(ce,p.ce);
    score+=cs*2;details.push({k:T.label_contrast,v:p.ce,hit:cs>=0.5});
    let featScore=0,featMax=0;
    if(feats.length>0){
      feats.forEach(f=>{
        featMax+=1.5;
        if(p.feats.includes(f)){featScore+=1.5;details.push({k:f,v:'✓',hit:true});}
        else{details.push({k:f,v:'✗',hit:false});}
      });
    }
    maxScore+=Math.max(featMax,1.5);
    score+=featScore;
    if(sex==='Çocuk'||age<18){if(p.feats.includes('cocuk'))score+=1.5;}
    const pct=maxScore>0?Math.round((score/maxScore)*100):0;
    return {path:p,score,maxScore,pct,details};
  });
  results.sort((a,b)=>b.pct-a.pct);
  return results.filter(r=>r.pct>15);
}

function calcResults(){
  const all = lesions.length>0 ? lesions : [{label: RV_LOCALE==='en'?'Lesion 1':'Lezyon 1', data:{...vals,features:vals.features||[]}}];
  window._lesionResults = all.map(les=>({
    label: les.label,
    data: les.data,
    results: calcLesionScores(les.data).slice(0,15)
  }));
  renderAllResults(window._lesionResults);
  showStep(STEP_TOTAL);
}

    const d=les.data;

    if(allRes.length>1){
      html+=`<div style="margin:${li>0?'24px':0} 0 10px;padding:8px 14px;background:rgba(155,89,182,.15);border-left:3px solid var(--purple);border-radius:0 8px 8px 0;font-weight:700;color:var(--purplel)">
        🔵 ${les.label}
        <span style="font-weight:400;font-size:.8em;color:var(--textm);margin-left:10px">${locLabel(d.loc)} | ${sideLabel(d.side)} | ${dimTxt} | ${T.label_contour}: ${contourLabel(d.contour)||'—'} | ${T.label_inner}: ${innerLabel(d.inner)||'—'}</span>
      </div>`;
    } else {
      html+=`<div style="margin-bottom:10px;font-size:.85em;color:var(--textm)">
        <b>${T.label_side}:</b> ${sideLabel(d.side)||'—'} &nbsp;|&nbsp;
        <b>${T.label_dims}:</b> ${dimTxt} &nbsp;|&nbsp;
        <b>${T.label_contour}:</b> ${contourLabel(d.contour)||'—'} &nbsp;|&nbsp;
        <b>${T.label_inner}:</b> ${innerLabel(d.inner)||'—'}
      </div>`;
    }
    if(!res.length){html+=`<p style="color:var(--textm)">${T.noMatch}</p>`;return;}
    const topScore=res[0].pct;
    html+='<div class="diff-list">';
    res.forEach((r,i)=>{
      const cls=r.pct>=70?'high':r.pct>=45?'med':'low';
      const color=r.pct>=70?'var(--red)':r.pct>=45?'var(--orange)':'var(--blue)';
      const barW=topScore>0?Math.round((r.pct/topScore)*100):0;
      const matchTags=r.details.filter(d=>d.hit).map(d=>`<span class="match-tag hit">${d.k}</span>`).join('');
      html+=`<div class="diff-item ${cls}" onclick="showPathDetail(${r.path.id})" style="cursor:pointer">
        <div class="diff-rank">${i+1}</div>
        <div class="diff-body">
          <div class="diff-name">${dbName(r.path)}</div>
          <div class="diff-detail">${dbKey(r.path)} ${matchTags}</div>
        </div>
        <div class="diff-score" style="color:${color}">${r.pct}%</div>
        <div class="diff-bar-wrap"><div class="diff-bar" style="width:${barW}%;background:${color}"></div></div>
      </div>`;
    });
    html+='</div>';
  });
  html+='<div id="pathDetailBox"></div>';
  area.innerHTML=html;
}

function showPathDetail(id){
  const p=DB.find(x=>x.id===id);
  if(!p)return;
  const box=document.getElementById('pathDetailBox');
  box.innerHTML=`<div class="pathology-detail">
    <h3>${dbName(p)}</h3>
    <div class="pd-grid">
      <div class="pd-row"><span class="pd-label">${T.label_pd_t1}</span><span class="pd-val">${p.t1}</span></div>
      <div class="pd-row"><span class="pd-label">${T.label_pd_t2}</span><span class="pd-val">${p.t2}</span></div>
      <div class="pd-row"><span class="pd-label">${T.label_pd_dwi}</span><span class="pd-val">${p.dwi}</span></div>
      <div class="pd-row"><span class="pd-label">${T.label_pd_adc}</span><span class="pd-val">${p.adc}</span></div>
      <div class="pd-row"><span class="pd-label">${T.label_pd_contrast}</span><span class="pd-val">${p.ce}</span></div>
      <div class="pd-row"><span class="pd-label">${T.label_pd_key}</span><span class="pd-val">${dbKey(p)}</span></div>
      <div class="pd-row"><span class="pd-label">${T.label_pd_loc}</span><span class="pd-val">${p.loc.map(v=>locLabel(v)).join(', ')}</span></div>
    </div>
  </div>`;
  box.scrollIntoView({behavior:'smooth'});
}

// ===== REPORT =====
function showReport(){
  const allRes=window._lesionResults||[];
  const pName=document.getElementById('pName').value||'—';
  const pAge=document.getElementById('pAge').value||'—';
  const pSex=vals.pSex||'—';
  const dateLocale = RV_LOCALE === 'en' ? 'en-US' : 'tr-TR';
  const now=new Date().toLocaleString(dateLocale);

  let html=`<h2>${T.headerTitle}</h2>
    <div class="r-sub">${now} | ${pName} | ${T.headerSub_age}: ${pAge} | ${T.headerSub_sex}: ${pSex}</div>`;

  allRes.forEach((les,li)=>{
    const d=les.data;
    const top5=les.results.slice(0,5);
    const leader=top5[0];
    const dimTxt=d.dim1!=null?`${d.dim1}${d.dim2!=null?' × '+d.dim2:''} mm`:'—';

    if(allRes.length>1){
      html+=`<h3 style="color:#4a0e78;margin:${li>0?'24px':16}px 0 6px;padding:6px 10px;background:#f3eef8;border-radius:4px">🔵 ${les.label}</h3>`;
    }

    html+=`<h3 style="color:#4a0e78;margin:12px 0 6px">${T.lesionSummary}</h3>
    <table><tbody>
      <tr><td style="font-weight:600">${T.label_loc}</td><td>${locLabel(d.loc)}</td></tr>
      <tr><td style="font-weight:600">${T.label_side}</td><td>${sideLabel(d.side)||'—'}</td></tr>
      <tr><td style="font-weight:600">${T.label_dims}</td><td>${dimTxt}</td></tr>
      <tr><td style="font-weight:600">${T.label_contour}</td><td>${contourLabel(d.contour)||'—'}</td></tr>
      <tr><td style="font-weight:600">${T.label_inner}</td><td>${innerLabel(d.inner)||'—'}</td></tr>
      <tr><td style="font-weight:600">${T.label_t1}</td><td>${d.t1||'—'}</td></tr>
      <tr><td style="font-weight:600">${T.label_t2}</td><td>${d.t2||'—'}</td></tr>
      <tr><td style="font-weight:600">${T.label_dwi}</td><td>${d.dwi||'—'}</td></tr>
      <tr><td style="font-weight:600">${T.label_adc}</td><td>${d.adc||'—'}</td></tr>
      <tr><td style="font-weight:600">${T.label_contrast}</td><td>${d.ce||'—'}</td></tr>
      <tr><td style="font-weight:600">${T.label_features}</td><td>${(d.features||[]).join(', ')||'—'}</td></tr>
    </tbody></table>`;

    const rows=top5.map((r,i)=>`<tr><td style="font-weight:700">${i+1}</td><td>${dbName(r.path)}</td><td>${r.pct}%</td><td>${dbKey(r.path)}</td></tr>`).join('');
    html+=`<h3 style="color:#4a0e78;margin:12px 0 6px">${T.diffDiag}</h3>
    <table><thead><tr><th>${T.col_no}</th><th>${T.col_pathology}</th><th>${T.col_score}</th><th>${T.col_key}</th></tr></thead><tbody>${rows}</tbody></table>`;

    let yorum='';
    if(leader){
      const conf=leader.pct>=70?T.confidence_high:leader.pct>=45?T.confidence_mid:T.confidence_low;
      yorum=T.yorum_sentence(les.label, dbName(leader.path), leader.pct, conf, dimTxt, contourLabel(d.contour)||'—', innerLabel(d.inner)||'—', dbKey(leader.path));
      if(top5.length>1){
        yorum+=T.yorum_diff(top5.slice(1).map(r=>dbName(r.path)).join(', '));
      }
    }
    if(yorum) html+=`<div class="yorum"><b>${T.yorum_prefix}:</b> ${yorum}</div>`;
  });

  html+=`<p style="font-size:.75em;color:#999;margin-top:20px;text-align:center">${T.disclaimer}</p>`;

  document.getElementById('reportSheet').innerHTML=html;
  document.getElementById('reportOverlay').classList.add('show');
}

function closeReport(){document.getElementById('reportOverlay').classList.remove('show')}

function copyReport(){
  const sheet=document.getElementById('reportSheet');
  const range=document.createRange();
  range.selectNodeContents(sheet);
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try{document.execCommand('copy');alert(T.copy_ok);}
  catch(e){alert(T.copy_fail);}
  sel.removeAllRanges();
}

init();
</script>
