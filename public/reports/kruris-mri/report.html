<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kruris MRI Karar Destek Sistemi</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#0f0e17;
    --panel:#17162a;
    --panel-2:#1d1b35;
    --border:#2d2a4a;
    --accent:#a78bfa;      /* mor */
    --accent-2:#8b5cf6;
    --accent-3:#c4b5fd;
    --kruris:#f472b6;      /* kruris vurgusu */
    --text:#e7e5f3;
    --text-dim:#a9a6c2;
    --good:#22c55e;
    --warn:#f59e0b;
    --bad:#ef4444;
    --info:#38bdf8;
    --table-alt:#1a1930;
    --yorum:#0d2818;
    --yorum-border:#22c55e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;min-height:100vh}
  a{color:var(--accent-3)}
  .wrap{max-width:1280px;margin:0 auto;padding:20px}
  .title{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .title h1{font-size:24px;margin:0;background:linear-gradient(135deg,var(--accent),var(--kruris));-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700}
  .title .badge{background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);font-size:12px;padding:3px 10px;border-radius:999px}
  .subtitle{color:var(--text-dim);margin-bottom:22px;font-size:13px}
  .stepper{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
  .stepper .pill{font-size:11px;padding:5px 10px;border-radius:999px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .15s}
  .stepper .pill.active{background:linear-gradient(135deg,var(--accent-2),var(--kruris));color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(167,139,250,.3)}
  .stepper .pill.done{background:var(--panel-2);color:var(--accent-3);border-color:var(--accent)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 4px 18px rgba(0,0,0,.25);animation:fadeIn .35s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card h2{margin:0 0 4px 0;font-size:18px;color:var(--accent-3)}
  .card .hint{color:var(--text-dim);font-size:12.5px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:720px){.grid-2,.grid-3{grid-template-columns:1fr}}
  label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:4px}
  input[type=text],input[type=number],select,textarea{width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13.5px;outline:none;font-family:inherit}
  textarea{min-height:70px;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(167,139,250,.2)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .chip{background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:6px 11px;border-radius:8px;font-size:12.5px;cursor:pointer;transition:all .12s;user-select:none}
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:linear-gradient(135deg,var(--accent-2),var(--kruris));border-color:transparent;color:#fff}
  .chip.small{padding:4px 9px;font-size:11.5px}
  .section{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .section h3{margin:0 0 10px 0;font-size:14px;color:var(--kruris);letter-spacing:.4px;text-transform:uppercase}
  .section h4{margin:14px 0 8px 0;font-size:13px;color:var(--accent-3)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btnbar{display:flex;justify-content:space-between;gap:10px;margin-top:20px;flex-wrap:wrap}
  .btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:10px;cursor:pointer;font-size:13.5px;transition:all .15s;font-family:inherit}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:linear-gradient(135deg,var(--accent-2),var(--kruris));border-color:transparent;color:#fff;font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent}
  .btn.danger{border-color:var(--bad);color:#fca5a5}
  .btn.small{padding:6px 12px;font-size:12px}
  .kv{display:grid;grid-template-columns:200px 1fr;gap:8px 14px}
  .kv .k{color:var(--text-dim);font-size:12.5px}
  .kv .v{color:var(--text);font-size:13px}
  .lesionlist{display:flex;flex-direction:column;gap:8px}
  .lesioncard{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .lesioncard .ltag{background:var(--accent-2);color:#fff;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
  .ddx{display:flex;flex-direction:column;gap:8px}
  .ddxrow{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
  .ddxrow .head{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .ddxrow .name{font-weight:600;color:var(--text)}
  .ddxrow .prob{font-variant-numeric:tabular-nums;color:var(--accent-3);font-weight:600}
  .bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--kruris))}
  .alert{border-left:4px solid var(--warn);background:#2a1d0b;padding:10px 14px;border-radius:6px;color:#fde68a;font-size:13px;margin-bottom:10px}
  .alert.info{border-color:var(--info);background:#0b2030;color:#bae6fd}
  .alert.bad{border-color:var(--bad);background:#2a0d0d;color:#fecaca}
  /* Rapor */
  .report{background:#fff;color:#111;padding:28px;border-radius:10px;font-family:'Times New Roman',serif;font-size:13px;line-height:1.5}
  .report h1{font-size:18px;text-align:center;margin:0 0 4px 0;letter-spacing:1px}
  .report h2{font-size:14px;margin:18px 0 6px 0;border-bottom:2px solid #111;padding-bottom:3px;color:#111}
  .report table{width:100%;border-collapse:collapse;margin:6px 0}
  .report th,.report td{padding:6px 9px;border:1px solid #ccc;text-align:left;vertical-align:top;font-size:12.5px}
  .report th{background:#e9ebf2}
  .report tr:nth-child(even) td{background:#f5f6fa}
  .report .yorum{background:#e8f5e9;border-left:5px solid #2e7d32;padding:10px 14px;margin:12px 0;border-radius:2px}
  .report .yorum b{color:#1b5e20}
  .report .kutu{border:1.5px solid #111;padding:10px 14px;margin:10px 0;border-radius:3px;background:#fafbff}
  .report .meta{font-size:11px;color:#666;text-align:right;margin-top:10px}
  .report ul{margin:4px 0 4px 18px;padding:0}
  .progress{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:16px}
  .progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--kruris));transition:width .3s}
  details{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-top:8px}
  details summary{cursor:pointer;font-size:12.5px;color:var(--accent-3);user-select:none}
  .muted{color:var(--text-dim);font-size:12px}
  .tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);margin-left:6px}
  .tag.good{background:#0d2818;border-color:#22c55e;color:#86efac}
  .tag.warn{background:#2a1d0b;border-color:#f59e0b;color:#fde68a}
  .tag.bad{background:#2a0d0d;border-color:#ef4444;color:#fecaca}
  hr.sep{border:0;border-top:1px dashed var(--border);margin:14px 0}
  .fieldgrid{display:grid;grid-template-columns:180px 1fr;gap:8px 12px;align-items:start}
  @media(max-width:720px){.fieldgrid{grid-template-columns:1fr}}
  .compartment-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .compartment-head .dot{width:10px;height:10px;border-radius:99px;background:var(--kruris)}
  .compartment-head .name{font-size:13px;color:var(--kruris);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .muscle-block{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
  .muscle-block .mn{font-size:13px;color:var(--accent-3);font-weight:600;margin-bottom:6px}
  @media print{
    body{background:#fff}
    .noprint{display:none !important}
    .wrap{max-width:100%;padding:0}
    .report{box-shadow:none;padding:0}
  }
</style>
</head>

/* ============================================================
   UI HELPERS
============================================================ */
const Chip = ({active, onClick, children, small}) => (
  <div className={`chip${active?' active':''}${small?' small':''}`} onClick={onClick}>{children}</div>
);

const ChipGroup = ({value, options, onChange, multi}) => (
  <div className="chips">
    {options.map(opt=>{
      const v = typeof opt==='string'?opt:opt.v;
      const lbl = typeof opt==='string'?opt:opt.l;
      const active = multi ? (value||[]).includes(v) : value===v;
      return <Chip key={v} active={active} onClick={()=>{
        if(multi){
          const arr=value||[];
          onChange(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);
        } else onChange(active?'':v);
      }}>{lbl}</Chip>;
    })}
  </div>
);

const Field = ({label, children})=>(
  <div><label>{label}</label>{children}</div>
);

/* ============================================================
   DDx MOTOR — weighted scoring
============================================================ */
function computeDDx(state){
  // Lezyonlardan featureları topla
  const feats = new Set();
  const addF = f => f && feats.add(f);
  
  // Klinik
  if((state.klinik_semptom||[]).includes('Akut travma')) addF('trauma_acute');
  if((state.klinik_semptom||[]).includes('Subakut travma')) addF('trauma_subacute');
  if((state.klinik_semptom||[]).includes('Ateş')) addF('fever');
  if((state.klinik_semptom||[]).includes('Kladikasyo')) addF('claudication');
  if((state.klinik_semptom||[]).includes('Düşük ayak (foot drop)')) addF('foot_drop');
  if((state.klinik_semptom||[]).includes('Egzersiz sonrası ağrı')) addF('exercise_pain');
  if((state.klinik_semptom||[]).includes('Gece ağrısı (NSAID yanıtı)')) addF('night_pain_nsaid');
  if((state.klinik_semptom||[]).includes('Eritem')) addF('erythema');
  if((state.sistemik||[]).includes('Diabetes Mellitus')) addF('dm_history');
  if((state.sistemik||[]).includes('NF1')) addF('nf1_history');
  if((state.sistemik||[]).includes('Bilinen malignite')) addF('known_primary');
  if(state.sport==='aktif') addF('runner'), addF('athlete'), addF('young_athlete');
  const yas = parseInt(state.yas||'0');
  if(yas && yas<25) addF('young');
  if(yas>=20 && yas<45) addF('young_adult');
  if(yas>60) addF('elderly');
  if(yas>=18) addF('skeletal_mature');
  if(yas>=35 && yas<=60) addF('middle_age');
  
  // Kas bulguları
  const anyMuscle = [state.ta,state.edl,state.ehl,state.pt_tertius,state.pl,state.pb,
    state.gastroc_med,state.gastroc_lat,state.soleus,state.plantaris,
    state.tp,state.fdl,state.fhl,state.popliteus];
  const edemMuscles = anyMuscle.filter(m=>m.durum==='edem');
  const yirtikMuscles = anyMuscle.filter(m=>m.durum==='parsiyel' || m.durum==='komplet');
  if(edemMuscles.length>=1) addF('t2_high');
  if(edemMuscles.length>=3) addF('multi_compart_edema'), addF('muscle_edema_mult');
  if(yirtikMuscles.find(m=>m.durum==='parsiyel')) addF('partial_fiber_disruption');
  if(yirtikMuscles.find(m=>m.durum==='komplet')) addF('complete_disruption'), addF('muscle_retraction');
  if(yirtikMuscles.find(m=>m.yirtik && m.yirtik.includes('MTJ'))) addF('mtj');
  if(state.tennisleg_fluid==='Var') addF('medgastroc_soleus_fluid');
  if(state.plantaris.durum==='komplet' || state.plantaris.yirtik==='Grade III (komplet)') addF('plantaris_absent'), addF('fluid_between_soleus');
  if((state.ek_bulgular||'').toLowerCase().includes('apse') || yirtikMuscles.find(m=>m.durum==='kitle')) addF('muscle_mass');
  
  // Fasya
  if(state.fasial_defekt==='Var') addF('fascial_defect'), addF('muscle_protrusion');
  if(state.fasial_kalinlasma==='Var') addF('fascial_thickening');
  const fasyaList = [state.ant_fasya,state.lat_fasya,state.post_sup_fasya,state.post_derin_fasya];
  if(fasyaList.find(x=>x==='Gerilim/kompartman şüphesi')) addF('diffuse_compart_edema'), addF('fascial_tension');
  if(state.cilt==='Kalınlaşmış') addF('skin_thickening');
  if(state.subkutan==='Diffüz ödem (selülit paterni)') addF('subcut_edema_diffuse'), addF('subcut_edema');
  if(fasyaList.find(x=>x==='Nekrotizan fasiit şüphesi')) addF('deep_fascial_fluid'), addF('multiple_compart'), addF('rapid_progression'), addF('systemic'), addF('gas');
  
  // Kemik
  if(state.tibia_medulla==='T2 hiperintens (ödem)' || state.tibia_medulla==='Yaygın sinyal değişikliği') addF('marrow_t2_high');
  if(state.tibia_medulla==='T1 hipointens (replase)') addF('marrow_t1_low'), addF('marrow_replacement');
  if(state.tibia_periost==='Periosteal ödem') addF('periosteal_edema');
  if(state.tibia_periost==='Lamele periosteal reaksiyon') addF('lamellated_periost');
  if(state.tibia_periost==='Sunburst paterni') addF('sunburst');
  if(state.tibia_periost==='Codman üçgeni') addF('codman');
  if(state.tibia_kortex==='Yırtık/disrupsiyon') addF('cortical_disruption');
  if(state.tibia_kortex==='Kalınlaşmış') addF('cortical_thickening');
  if(state.tibia_stress==='Var') addF('periosteal_edema'), addF('marrow_edema'), addF('posteromedial_tibia');
  if(state.tibia_fraktur==='Var') addF('fracture_line');
  if(state.tibia_fraktur==='Yok (sadece ödem)') addF('no_fracture_line'), addF('mild_marrow');
  if(state.tibia_lezyon==='Permeativ') addF('permeative');
  if(state.tibia_lezyon==='Ekspansil-litik') addF('bubbly_lytic');
  if(state.tibia_lezyon==='Eksantrik kortikal') addF('eccentric_cortical');
  if(state.tibia_lezyon==='Grund-glass / rind') addF('ground_glass'), addF('rind_sign'), addF('no_edema');
  if(state.tibia_lezyon==='Metaepifizeal lezyon') addF('metaepiphyseal');
  if(state.tibia_lezyon==='Anterior kortekse dayalı') addF('anterior_tibia_cortex');
  if(state.tibia_lezyon==='Kaba trabeküle + kortikal kalınlaşma') addF('coarse_trabeculae'), addF('bone_expansion'), addF('cortical_thickening');
  if(state.fibula_lezyon==='Permeativ') addF('permeative');
  if(state.tibia_lezyon==='Multifokal' || state.fibula_lezyon==='Multifokal') addF('multifocal');
  
  // Vasküler
  if(state.dvt==='Var') addF('dilated_vein'), addF('t1_iso_t2_hyper_thrombus'), addF('perivascular_edema'), addF('non_compressible'), addF('lower_extremity');
  if(state.yuzeyel_tromb==='Var') addF('superficial_vein_thrombus'), addF('cord_like');
  if(state.arter_aciklama && state.arter_aciklama.toLowerCase().includes('psödoanevrizma')) addF('pulsatile_mass'), addF('flow_void'), addF('trauma_history');
  if(state.arter_aciklama && state.arter_aciklama.toLowerCase().includes('popliteal')) addF('medial_head_gastroc_anom'), addF('arterial_compression');
  
  // Sinir
  if(state.peroneal_common_n==='Kalınlaşmış/T2 hiperintens') addF('fibular_head_level'), addF('nerve_enlarged_t2'), addF('denervation_edema_ant_lat');
  if(state.tibial_n==='Medial malleol posteriorunda etkilenmiş') addF('tibial_nerve_medial_mall'), addF('distal_crus');
  
  // Lezyonlardan
  (state.lesions||[]).forEach(L=>{
    if(L.t1==='Hiperintens (yağ)') addF('fat_signal');
    if(L.t1==='Hipointens') addF('t1_iso_t2_hyper_thrombus');
    if(L.t2==='Hiperintens') addF('t2_high');
    if(L.t2==='Çok hiperintens (su benzeri)') addF('t2_very_high'), addF('t2_hyperint_lobulated');
    if(L.t2==='Heterojen') addF('t2_heterogen');
    if(L.t2==='Target sign (çift halka)') addF('t2_target');
    if(L.dwi==='Kısıtlanma var') addF('dwi_restrict');
    if(L.adc==='Düşük') addF('adc_low');
    if(L.kontrast==='Belirgin') addF('enhancement'), addF('diffuse_enhancement'), addF('enhancement_strong');
    if(L.kontrast_patern==='Rim/halka') addF('rim_enhancement');
    if(L.kontrast_patern==='Nodüler periferik') addF('nodular_enhancement'), addF('enhancement_peripheral');
    if(L.kontrast==='Yok/minimal') addF('no_enhancement'), addF('mild_enhancement'), addF('no_central_enhancement');
    if(L.morphology==='Fuziform (sinir boyunca)') addF('along_nerve'), addF('fusiform');
    if(L.morphology==='Serpijinöz') addF('serpiginous');
    if(L.morphology==='İnfiltratif') addF('infiltrative');
    if(L.morphology==='Zonal (periferik mineralizasyon)') addF('zonal_pattern'), addF('peripheral_rim');
    if((L.features||[]).includes('Flow void')) addF('flow_voids'), addF('high_flow'), addF('nidus');
    if((L.features||[]).includes('Flebolit')) addF('phleboliths'), addF('slow_flow'), addF('no_flow_voids');
    if((L.features||[]).includes('Yağ overgrowth')) addF('fat_overgrowth');
    if((L.features||[]).includes('Kalın/nodüler septa')) addF('fat_with_thick_septa');
    if((L.features||[]).includes('İnce septa')) addF('no_thick_septa'), addF('homogeneous');
    if((L.features||[]).includes('Sıvı-sıvı seviyesi')) addF('fluid_levels');
    if((L.features||[]).includes('Triple sign')) addF('triple_sign');
    if((L.features||[]).includes('Kalsifikasyon')) addF('calcifications'), addF('matrix_mineral');
    if((L.features||[]).includes('Flebolit / kemik yapı')) addF('phleboliths');
    if((L.features||[]).includes('Hemoraji/sinyal varyasyonu')) addF('variable_signal');
    if((L.features||[]).includes('Rim T2 low (kronik hematom)')) addF('rim_t2_low_chronic');
    if((L.features||[]).includes('Fibröz/low T2 bantlar')) addF('low_t2_bands');
    if((L.features||[]).includes('Nekroz')) addF('necrosis');
    if((L.features||[]).includes('Eklem komşuluğu')) addF('near_joint');
    if((L.features||[]).includes('Derin yerleşim')) addF('deep');
    if((L.features||[]).includes('İntramusküler')) addF('intramuscular');
    if((L.features||[]).includes('Popliteal fossaya uzanım')) addF('fluid_tracking_popliteal'), addF('posterior_calf');
    if((L.features||[]).includes('Diyafiz yerleşimi')) addF('diaphysis');
    if((L.features||[]).includes('Metafiz yerleşimi')) addF('metaphysis');
    if((L.features||[]).includes('Küçük nidus + sklerotik rim')) addF('small_nidus'), addF('peri_nidus_edema');
    if((L.features||[]).includes('Sklerotik kenar')) addF('sclerotic_rim');
    if((L.features||[]).includes('Subkondral')) addF('subchondral');
    if((L.features||[]).includes('Lobüle + kondroid matriks')) addF('medullary_lobulated'), addF('chondroid_matrix');
    if((L.features||[]).includes('Hızlı büyüme')) addF('rapid_growth');
    if(L.margins==='Keskin/iyi sınırlı') addF('well_defined');
    
    const sz = Math.max(parseFloat(L.boyut_ap||0), parseFloat(L.boyut_ml||0), parseFloat(L.boyut_cc||0));
    if(sz>0 && sz<2) addF('fluid_small');
    if(sz>=2 && sz<5) addF('fluid_mod');
    if(sz>=5) addF('size_large'), addF('muscle_mass'), addF('soft_tissue_mass_large'), addF('soft_tissue_ext'), addF('hematoma');
  });
  
  // Her patoloji için skor
  const scored = PATHOLOGIES.map(p=>{
    let total=0, maxPossible=0, matched=[];
    Object.entries(p.weights).forEach(([k,w])=>{
      maxPossible += w;
      if(feats.has(k)){ total += w; matched.push(k); }
    });
    const pct = maxPossible>0 ? Math.round((total/maxPossible)*100) : 0;
    return {...p, score:total, maxPossible, pct, matched};
  });
  
  return scored.filter(s=>s.score>0).sort((a,b)=>b.score-a.score).slice(0,10);
}

function buildReportRows(state){
  const rows = [];
  const add=(k,v)=>{ if(v) rows.push({k,v}); };

  add('Hasta', `${state.ad_soyad||'-'} (${state.yas||'-'} / ${state.cinsiyet||'-'})`);
  add('Taraf', state.taraf);

}

function compartmentFindings(state){
  const sections = [];
  const muscleFind = (label, m)=>{
    if(!m || m.durum==='normal') return null;
    const parts=[];
    if(m.durum==='edem') parts.push(`T2 hiperintens ödem (${m.edem||'hafif'})`);
    if(m.yirtik && m.yirtik!=='Yok') parts.push(m.yirtik);
    if(m.atrofi && m.atrofi!=='Yok') parts.push(`atrofi: ${m.atrofi}`);
    if(m.mtj && m.mtj!=='İntakt') parts.push(`MTJ: ${m.mtj}`);
    if(m.durum==='kitle') parts.push('lezyon mevcut');
    return parts.length? `${label}: ${parts.join(', ')}.` : null;
  };
  
  // Anterior
  const ant=[
    muscleFind('Tibialis anterior', state.ta),
    muscleFind('Ekstensör digitorum longus', state.edl),
    muscleFind('Ekstensör hallucis longus', state.ehl),
    muscleFind('Peroneus tertius', state.pt_tertius),
  ].filter(Boolean);
  if(state.ant_fasya && state.ant_fasya!=='Normal') ant.push(`Anterior kompartman fasyası: ${state.ant_fasya}.`);
  if(ant.length===0) ant.push('Anterior kompartman kasları, fasya ve miyotendinöz yapıları doğal sinyal ve morfolojide izlendi.');
  sections.push({title:'ANTERİOR KOMPARTMAN', items:ant});
  
  // Lateral
  const lat=[
    muscleFind('Peroneus longus', state.pl),
    muscleFind('Peroneus brevis', state.pb),
  ].filter(Boolean);
  if(state.lat_fasya && state.lat_fasya!=='Normal') lat.push(`Lateral kompartman fasyası: ${state.lat_fasya}.`);
  if(lat.length===0) lat.push('Lateral kompartman kasları ve fasyası olağan sinyal özelliğindedir.');
  sections.push({title:'LATERAL KOMPARTMAN', items:lat});
  
  // Posterior yüzeyel
  const psup=[
    muscleFind('Gastroknemius — medial baş', state.gastroc_med),
    muscleFind('Gastroknemius — lateral baş', state.gastroc_lat),
    muscleFind('Soleus', state.soleus),
    muscleFind('Plantaris', state.plantaris),
  ].filter(Boolean);
  if(state.tennisleg_fluid==='Var') psup.push('Medial gastroknemius–soleus aralığında sıvı koleksiyonu (tennis-leg paterni).');
  if(state.post_sup_fasya && state.post_sup_fasya!=='Normal') psup.push(`Posterior yüzeyel fasya: ${state.post_sup_fasya}.`);
  if(psup.length===0) psup.push('Posterior yüzeyel kompartman (gastroknemius medial/lateral baş, soleus, plantaris) olağandır.');
  sections.push({title:'POSTERİOR YÜZEYEL KOMPARTMAN', items:psup});
  
  // Posterior derin
  const pderin=[
    muscleFind('Tibialis posterior', state.tp),
    muscleFind('Fleksör digitorum longus', state.fdl),
    muscleFind('Fleksör hallucis longus', state.fhl),
    muscleFind('Popliteus', state.popliteus),
  ].filter(Boolean);
  if(state.post_derin_fasya && state.post_derin_fasya!=='Normal') pderin.push(`Posterior derin fasya: ${state.post_derin_fasya}.`);
  if(pderin.length===0) pderin.push('Posterior derin kompartman kasları olağan sinyal-morfolojide.');
  sections.push({title:'POSTERİOR DERİN KOMPARTMAN', items:pderin});
  
  return sections;
}

/* ============================================================
   ANA APP
============================================================ */
function App(){
  const [s,setS] = useState(initState());
  const [stepIdx,setStepIdx] = useState(0);
  const reportRef = useRef(null);
  
  const upd = (patch)=>setS(prev=>({...prev,...patch}));
  
  const step = STEPS[stepIdx].key;
  const progress = Math.round(((stepIdx+1)/STEPS.length)*100);
  
  // 3-parça lezyon loop düzeltmesi
  const goNext = ()=>{
    // Pre-loop'ten loop'a atlama: lezyon_var === "Hayır" ise loop'u atla
    if(step==='lezyonPre'){
      if(s.lezyon_var==='Hayır' || !s.lezyon_var){
        // lezyon adımını ve lezyon detayını atla
        setStepIdx(STEPS.findIndex(x=>x.key==='ddx'));
        return;
      }
      // Lezyon var → ilk lezyonu ekle (yoksa)
      if((s.lesions||[]).length===0){
        const nl = emptyLesion();
        setS(prev=>({...prev, lesions:[nl], currentIdx:0}));
      } else {
        setS(prev=>({...prev, currentIdx:0}));
      }
      setStepIdx(STEPS.findIndex(x=>x.key==='lezyon'));
      return;
    }
    setStepIdx(Math.min(stepIdx+1, STEPS.length-1));
  };
  
  const goPrev = ()=>{
    // Post-loop'tan pre-loop'a dönüş: DDx'ten geri → lezyonPre (loop'u atla)
    if(step==='ddx'){
      setStepIdx(STEPS.findIndex(x=>x.key==='lezyonPre'));
      return;
    }
    setStepIdx(Math.max(0, stepIdx-1));
  };
  
  const addLesion = ()=>{
    const nl = emptyLesion();
    setS(prev=>({...prev, lesions:[...(prev.lesions||[]), nl], currentIdx:(prev.lesions||[]).length}));
  };
  
  const removeLesion = (i)=>{
    const newLes = s.lesions.filter((_,idx)=>idx!==i);
    const newIdx = newLes.length===0 ? -1 : Math.min(s.currentIdx, newLes.length-1);
    setS(prev=>({...prev, lesions:newLes, currentIdx:newIdx}));
  };
  
  const updateCurrentLesion = (patch)=>{
    setS(prev=>{
      const newLes=[...prev.lesions];
      newLes[prev.currentIdx] = {...newLes[prev.currentIdx], ...patch};
      return {...prev, lesions:newLes};
    });
  };
  
  const finalizeLesionStep = ()=>{
    // 3-parça düzeltme: finalize → currentIdx = -1
    setS(prev=>({...prev, currentIdx:-1}));
    setStepIdx(STEPS.findIndex(x=>x.key==='ddx'));
  };
  
  const ddx = useMemo(()=>computeDDx(s),[s]);
  
  /* ---------- ADIM ÖLÇÜLERİ ---------- */
  const renderPatient = ()=>(
    <div className="card">
      <h2>Hasta ve Klinik Bilgiler</h2>
      <div className="hint">Kruris MR incelemesi için demografik bilgiler ve klinik öykü.</div>
      <div className="grid">
        <Field label="Ad Soyad"><input type="text" value={s.ad_soyad} onChange={e=>upd({ad_soyad:e.target.value})}/></Field>
        <Field label="Yaş"><input type="number" value={s.yas} onChange={e=>upd({yas:e.target.value})}/></Field>
        <Field label="Cinsiyet"><ChipGroup value={s.cinsiyet} options={['Kadın','Erkek']} onChange={v=>upd({cinsiyet:v})}/></Field>
        <Field label="Taraf"><ChipGroup value={s.taraf} options={['Sağ','Sol','Bilateral']} onChange={v=>upd({taraf:v})}/></Field>
        <Field label="Protokol No"><input type="text" value={s.protokol_no} onChange={e=>upd({protokol_no:e.target.value})}/></Field>
      </div>

            {idx>0 && <button className="btn small" onClick={()=>setS(prev=>({...prev, currentIdx:idx-1}))}>« Önceki lezyon</button>}
            {idx<s.lesions.length-1 && <button className="btn small" onClick={()=>setS(prev=>({...prev, currentIdx:idx+1}))}>Sonraki lezyon »</button>}
            <button className="btn primary" onClick={finalizeLesionStep}>Lezyonları bitir → DDx</button>
          </div>
        </div>
        
        {s.lesions.length>0 && (
          <>
            <hr className="sep"/>
            <div className="muted" style={{marginBottom:6}}>Tanımlı lezyonlar:</div>
            <div className="lesionlist">
              {s.lesions.map((L2,i)=>(
                <div key={L2.id} className={`lesioncard${i===idx?' active':''}`} style={i===idx?{borderColor:'var(--accent)'}:{}}>
                  <div><span className="ltag">#{i+1}</span> <b style={{marginLeft:8}}>{L2.ad||'(isimsiz)'}</b> <span className="muted">— {L2.origin||'köken?'}, {L2.localization||'?'}</span></div>
                  <button className="btn small" onClick={()=>setS(prev=>({...prev, currentIdx:i}))}>Aç</button>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    );
  };
  
  const renderDDx = ()=>(
    <div className="card">
      <h2>Weighted DDx Motoru</h2>
      <div className="hint">Klinik, kompartman bulguları, kemik/sinir/damar bulguları ve lezyon özellikleri DWI×18 / ADC×16 / kontrast×14 / T2×12 ağırlıklarıyla skorlanır. İlk 10 olasılık aşağıda listelenir.</div>
      {ddx.length===0 ? <div className="alert info">Henüz ayırıcı tanıyı şekillendirecek anlamlı bulgu yok. Önceki adımlarda bulgu girerseniz skorlar buraya yansır.</div> :
        <div className="ddx">
          {ddx.map((d,i)=>(
            <div key={d.id} className="ddxrow">
              <div className="head">
                <div><b style={{color:i===0?'var(--kruris)':'var(--text)'}}>#{i+1} {d.name}</b> <span className="muted">— {d.category}</span></div>
                <div className="prob">{d.score} puan · %{d.pct}</div>
              </div>
              <div className="bar"><span style={{width:`${Math.min(100,d.pct)}%`}}/></div>
              <details>
                <summary>Eşleşen özellikler ({d.matched.length})</summary>
                <div className="muted" style={{marginTop:6,fontSize:11.5}}>{d.matched.join(', ')}</div>
              </details>
            </div>
          ))}
        </div>
      }
    </div>
  );
  
  const renderEk = ()=>(
    <div className="card">
      <h2>Ek Bulgular ve Öneriler</h2>
      <div className="hint">Yukarıdakilere girmediğiniz bulgular ve klinik öneri/ek inceleme tavsiyeleri.</div>
      <Field label="Ek bulgular"><textarea value={s.ek_bulgular} onChange={e=>upd({ek_bulgular:e.target.value})} placeholder="Diz ekleminde efüzyon, Baker kisti vb..."/></Field>
      <Field label="Öneri / Ek inceleme"><textarea value={s.oneri} onChange={e=>upd({oneri:e.target.value})} placeholder="Kontrollü MR, MR anjiyografi, BT, biyopsi önerisi..."/></Field>
    </div>
  );
  
  /* ---------- RAPOR ---------- */
  const renderReport = ()=>{
    const headerRows = buildReportRows(s);
    const sections = compartmentFindings(s);
    const kemikItems = [];
    if(s.tibia_medulla && s.tibia_medulla!=='Normal') kemikItems.push(`Tibia medüller sinyal: ${s.tibia_medulla}.`);
    if(s.tibia_kortex && s.tibia_kortex!=='İntakt') kemikItems.push(`Tibia korteksi: ${s.tibia_kortex}.`);
    if(s.tibia_periost && s.tibia_periost!=='Normal') kemikItems.push(`Tibia periost reaksiyonu: ${s.tibia_periost}.`);
    if(s.tibia_stress==='Var') kemikItems.push('Tibiada stres reaksiyonu izlenmektedir.');
    if(s.tibia_fraktur==='Var') kemikItems.push('Tibiada akut fraktür hattı mevcuttur.');
    if(s.tibia_lezyon && s.tibia_lezyon!=='Yok') kemikItems.push(`Tibiada kemik lezyonu: ${s.tibia_lezyon}${s.tibia_aciklama?` – ${s.tibia_aciklama}`:''}.`);
    if(s.fibula_medulla && s.fibula_medulla!=='Normal') kemikItems.push(`Fibula medüller sinyal: ${s.fibula_medulla}.`);
    if(s.fibula_kortex && s.fibula_kortex!=='İntakt') kemikItems.push(`Fibula korteksi: ${s.fibula_kortex}.`);
    if(s.fibula_fraktur && s.fibula_fraktur!=='Yok') kemikItems.push(`Fibula: ${s.fibula_fraktur}.`);
    if(s.fibula_lezyon && s.fibula_lezyon!=='Yok') kemikItems.push(`Fibulada kemik lezyonu: ${s.fibula_lezyon}${s.fibula_aciklama?` – ${s.fibula_aciklama}`:''}.`);
    if(kemikItems.length===0) kemikItems.push('Tibia ve fibulada medüller sinyal, korteks ve periost olağandır.');
    
    // Vasküler
    const vasItems = [];
    if(s.ata && s.ata!=='Açık/normal') vasItems.push(`Anterior tibial arter: ${s.ata}.`);
    if(s.atp && s.atp!=='Açık/normal') vasItems.push(`Posterior tibial arter: ${s.atp}.`);
    if(s.peroneal_a && s.peroneal_a!=='Açık/normal') vasItems.push(`Peroneal arter: ${s.peroneal_a}.`);
    if(s.dvt==='Var') vasItems.push(`DVT: (+) ${(s.dvt_lokasyon||[]).join(', ')}.`);
    if(s.yuzeyel_tromb==='Var') vasItems.push('Yüzeyel tromboflebit bulguları izlendi.');
    if(s.arter_aciklama) vasItems.push(s.arter_aciklama);
    if(s.ven_aciklama) vasItems.push(s.ven_aciklama);
    if(vasItems.length===0) vasItems.push('Anterior tibial, posterior tibial ve peroneal arterler açık; derin venöz sistem normal kalibrede ve tromboze değildir.');
    
    // Sinir
    const sinirItems=[];
    if(s.tibial_n && s.tibial_n!=='Normal') sinirItems.push(`Tibial sinir: ${s.tibial_n}.`);
    if(s.peroneal_common_n && s.peroneal_common_n!=='Normal') sinirItems.push(`Common peroneal sinir: ${s.peroneal_common_n}.`);
    if(s.peroneal_deep_n && s.peroneal_deep_n!=='Normal') sinirItems.push(`Deep peroneal sinir: ${s.peroneal_deep_n}.`);
    if(s.peroneal_superf_n && s.peroneal_superf_n!=='Normal') sinirItems.push(`Superficial peroneal sinir: ${s.peroneal_superf_n}.`);
    if(s.sural_n && s.sural_n!=='Normal') sinirItems.push(`Sural sinir: ${s.sural_n}.`);
    if(s.saphenous_n && s.saphenous_n!=='Normal') sinirItems.push(`Safen sinir: ${s.saphenous_n}.`);
    if(s.sinir_aciklama) sinirItems.push(s.sinir_aciklama);
    if(sinirItems.length===0) sinirItems.push('İncelenen periferik sinir yapıları (tibial, common/deep/superficial peroneal, sural, safen) olağan kaliber ve sinyal özelliğindedir.');
    
    // Fasya / subkutan
    const fasyaItems=[];
    if(s.cilt && s.cilt!=='Normal') fasyaItems.push(`Cilt: ${s.cilt}.`);
    if(s.subkutan && s.subkutan!=='Normal') fasyaItems.push(`Subkutan doku: ${s.subkutan}.`);
    if(s.fasial_defekt==='Var') fasyaItems.push('Fasiyal defekt / kas hernisi izlendi.');
    if(s.fasial_kalinlasma==='Var') fasyaItems.push('Kronik fasiyal kalınlaşma mevcut.');
    if(fasyaItems.length===0) fasyaItems.push('Cilt, subkutan doku ve fasiyal yapılar olağandır.');
    
    // Lezyon tablosu
    const lesionRows = (s.lesions||[]).map((L,i)=>{
      const sz = [L.boyut_ap,L.boyut_ml,L.boyut_cc].filter(x=>x).join(' × ');
      return {
        no:i+1,
        ad:L.ad||`Lezyon ${i+1}`,
        loc:`${L.compartment||'?'} / ${L.localization||'?'}${L.side?` (${L.side})`:''}`,
        origin:L.origin||'-',
        boyut:sz?`${sz} mm`:'-',
        t1:L.t1||'-', t2:L.t2||'-',
        dwi_adc: `${L.dwi||'-'}${L.adc?` / ADC ${L.adc}`:''}${L.adc_value?` (${L.adc_value})`:''}`,
        kontrast: `${L.kontrast||'-'}${L.kontrast_patern?` (${L.kontrast_patern})`:''}`,
        morf: [L.morphology,L.margins].filter(Boolean).join(', ')||'-',
        notes: L.notes||''
      };
    });
    
    // Ana tanı / YORUM
    const top = ddx[0];
    const yorum = top ? 
      `Bulgular ağırlıklı skorlama modelinde ${top.name.toUpperCase()} lehine değerlendirilmiştir (%${top.pct}).${ddx[1]?` İkincil olarak ${ddx[1].name} ayırıcı tanıda yer almaktadır.`:''}`
      : 'Kruris MR incelemesinde patolojik bulgu saptanmamıştır.';
    
    return (
      <div className="card">
        <h2>Rapor</h2>
        <div className="hint">Aşağıdaki raporu yazdırabilir, PDF'e kaydedebilir, panoya kopyalayabilir veya HTML dosyası olarak indirebilirsiniz.</div>
        <div className="row noprint" style={{marginBottom:14,flexWrap:'wrap'}}>
          <button className="btn" onClick={doPrint}>🖨 Yazdır / PDF</button>
          <button className="btn" onClick={doCopyRich}>📋 Panoya kopyala (zengin metin)</button>
          <button className="btn" onClick={doDownloadHtml}>⬇ HTML indir</button>
          <button className="btn" onClick={doCopyText}>Düz metin kopyala</button>
        </div>
        
        <div className="report" ref={reportRef} id="KRURIS_RAPOR">
          <h1>KRURİS MR İNCELEMESİ</h1>
          <table>
            <tbody>
              {headerRows.map((r,i)=><tr key={i}><th style={{width:180}}>{r.k}</th><td>{r.v}</td></tr>)}
            </tbody>
          </table>
          
          <h2>Klinik</h2>
          <div className="kutu">
            {(s.klinik_semptom||[]).length>0 && <div><b>Semptomlar:</b> {s.klinik_semptom.join(', ')}.</div>}
            {s.kronisite && <div><b>Süre:</b> {s.kronisite}.</div>}
            {s.travma && <div><b>Travma:</b> {s.travma}.</div>}
            {s.sport && <div><b>Sportif aktivite:</b> {s.sport}.</div>}
            {(s.sistemik||[]).length>0 && <div><b>Komorbid:</b> {s.sistemik.join(', ')}.</div>}
            {s.klinik_not && <div><b>Not:</b> {s.klinik_not}</div>}
          </div>
          
          {sections.map((sec,i)=>(
            <React.Fragment key={i}>
              <h2>{sec.title}</h2>
              <table>
                <tbody>
                  {sec.items.map((x,j)=><tr key={j}><td>{x}</td></tr>)}
                </tbody>
              </table>
            </React.Fragment>
          ))}
          
          <h2>CİLT · SUBKUTAN · FASYA</h2>
          <table><tbody>{fasyaItems.map((x,j)=><tr key={j}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>KEMİK YAPILAR (TİBİA – FİBULA)</h2>
          <table><tbody>{kemikItems.map((x,j)=><tr key={j}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>VASKÜLER YAPILAR</h2>
          <table><tbody>{vasItems.map((x,j)=><tr key={j}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>PERİFERİK SİNİRLER</h2>
          <table><tbody>{sinirItems.map((x,j)=><tr key={j}><td>{x}</td></tr>)}</tbody></table>
          
          {lesionRows.length>0 && <>
            <h2>LEZYON LİSTESİ</h2>
            <table>
              <thead>
                <tr>
                  <th>#</th><th>Ad / Köken</th><th>Yerleşim</th><th>Boyut</th>
                  <th>T1 / T2</th><th>DWI · ADC</th><th>Kontrast</th><th>Morfoloji</th>
                </tr>
              </thead>
              <tbody>
                {lesionRows.map(r=>(
                  <tr key={r.no}>
                    <td>{r.no}</td>
                    <td><b>{r.ad}</b><br/><span style={{fontSize:11,color:'#666'}}>{r.origin}</span></td>
                    <td>{r.loc}</td>
                    <td>{r.boyut}</td>
                    <td>{r.t1} / {r.t2}</td>
                    <td>{r.dwi_adc}</td>
                    <td>{r.kontrast}</td>
                    <td>{r.morf}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </>}
          
          {ddx.length>0 && <>
            <h2>AYIRICI TANI (WEIGHTED)</h2>
            <table>
              <thead><tr><th>#</th><th>Patoloji</th><th>Kategori</th><th>Puan</th><th>Olasılık</th></tr></thead>
              <tbody>
                {ddx.slice(0,5).map((d,i)=>(
                  <tr key={d.id}><td>{i+1}</td><td><b>{d.name}</b></td><td>{d.category}</td><td>{d.score}</td><td>%{d.pct}</td></tr>
                ))}
              </tbody>
            </table>
          </>}
          
          <div className="yorum">
            <b>YORUM:</b> {yorum}
            {s.oneri && <div style={{marginTop:6}}><b>Öneri:</b> {s.oneri}</div>}
            {s.ek_bulgular && <div style={{marginTop:6}}><b>Ek bulgular:</b> {s.ek_bulgular}</div>}
          </div>
          
          <div className="meta">Rapor tarihi: {new Date().toLocaleDateString('tr-TR')} — Kruris MR Karar Destek Sistemi</div>
        </div>
      </div>
    );
  };
  
  /* ============================================================
     EXPORT — inline DOM overlay / print, rich-text clipboard, HTML
  ============================================================ */
  const doPrint = ()=>{
    const rep = reportRef.current;
    if(!rep) return;
    const overlay = document.createElement('div');
    overlay.id='__print_overlay__';
    overlay.style.cssText='position:fixed;inset:0;background:#fff;z-index:99999;overflow:auto;padding:24px';
    const close=document.createElement('button');
    close.textContent='Kapat';
    close.className='noprint';
    close.style.cssText='position:fixed;top:12px;right:12px;padding:8px 14px;background:#ef4444;color:#fff;border:0;border-radius:6px;cursor:pointer;z-index:100000';
    close.onclick=()=>document.body.removeChild(overlay);
    overlay.appendChild(close);
    const cl = rep.cloneNode(true);
    cl.style.maxWidth='900px';
    cl.style.margin='0 auto';
    overlay.appendChild(cl);
    document.body.appendChild(overlay);
    setTimeout(()=>{window.print();},300);
  };
  
  const doCopyText = async ()=>{
    const rep = reportRef.current;
    if(!rep) return;
    try{
      await navigator.clipboard.writeText(rep.innerText);
      alert('Düz metin olarak panoya kopyalandı.');
    }catch(e){ alert('Kopyalama başarısız: '+e.message); }
  };
  
  const doCopyRich = async ()=>{
    const rep = reportRef.current;
    if(!rep) return;
    try{
      const html = rep.outerHTML;
      const blob = new Blob([html], {type:'text/html'});
      const tblob = new Blob([rep.innerText], {type:'text/plain'});
      await navigator.clipboard.write([
        new ClipboardItem({'text/html':blob, 'text/plain':tblob})
      ]);
      alert('Zengin metin (tablolarıyla) panoya kopyalandı. Word/Outlook\'a yapıştırabilirsiniz.');
    }catch(e){
      // fallback
      try{
        const sel = window.getSelection();
        sel.removeAllRanges();
        const rng = document.createRange();
        rng.selectNodeContents(rep);
        sel.addRange(rng);
        document.execCommand('copy');
        sel.removeAllRanges();
        alert('Zengin metin panoya kopyalandı (fallback).');
      }catch(e2){ alert('Kopyalama başarısız: '+e2.message); }
    }
  };
  
  const doDownloadHtml = ()=>{
    const rep = reportRef.current;
    if(!rep) return;
    const css = document.querySelector('style').innerHTML;
    const content = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Kruris MR Rapor</title><style>body{background:#fff;font-family:'Times New Roman',serif;margin:24px}${css}</style></head><body>${rep.outerHTML}</body></html>`;
    const blob = new Blob([content], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`kruris_mr_rapor_${Date.now()}.html`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);}, 200);
  };
  
  /* ---------- RENDER ---------- */
  let body=null;
  switch(step){
    case 'patient': body=renderPatient(); break;
    case 'protokol': body=renderProtokol(); break;
    case 'ant': body=renderAnt(); break;
    case 'lat': body=renderLat(); break;
    case 'psup': body=renderPsup(); break;
    case 'pderin': body=renderPderin(); break;
    case 'fasya': body=renderFasya(); break;
    case 'tibia': body=renderTibia(); break;
    case 'fibula': body=renderFibula(); break;
    case 'arter': body=renderArter(); break;
    case 'ven': body=renderVen(); break;
    case 'sinir': body=renderSinir(); break;
    case 'lezyonPre': body=renderLezyonPre(); break;
    case 'lezyon': body=renderLezyon(); break;
    case 'ddx': body=renderDDx(); break;
    case 'ek': body=renderEk(); break;
    case 'report': body=renderReport(); break;
    default: body=<div className="card">Bilinmeyen adım</div>;
  }
  
  return (
    <div className="wrap">
      <div className="title">
        <h1>🦵 Kruris MR Karar Destek Sistemi</h1>
        <span className="badge">Tibia • Fibula • 4 Kompartman • NV Yapılar</span>
      </div>
      <div className="subtitle">Kompartman bazlı MRI sorgulaması · multilezyon tanı · weighted DDx motoru · zebra + YORUM kutulu rapor</div>
      
      <div className="progress noprint"><span style={{width:`${progress}%`}}/></div>
      <div className="stepper noprint">
        {STEPS.map((st,i)=>(
          <div key={st.key} className={`pill${i===stepIdx?' active':''}${i<stepIdx?' done':''}`} onClick={()=>setStepIdx(i)}>
            {i+1}. {st.label}
          </div>
        ))}
      </div>
      
      {body}
      
      <div className="btnbar noprint">
        <button className="btn ghost" onClick={goPrev} disabled={stepIdx===0}>« Önceki</button>
        <div className="row">
          <span className="muted">Adım {stepIdx+1} / {STEPS.length}</span>
          {step!=='report' && <button className="btn primary" onClick={goNext}>Sonraki »</button>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
