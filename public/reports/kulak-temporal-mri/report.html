<title>Kulak ve Temporal Kemik MRI Karar Destek</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0e17;--surface:#1a1a2e;--surface2:#16213e;--border:#2a2a4a;--accent:#e07020;--accent2:#c45e18;--accent-light:#f0a060;--text:#e0e0e0;--text2:#9e9e9e;--green:#2ecc71;--red:#e74c3c;--orange:#f39c12;--yellow:#f1c40f;--blue:#3498db;--cyan:#00bcd4;--purple:#7f5af0;--purple-light:#a78bfa}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.app-header{width:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);padding:14px 20px;text-align:center;border-bottom:2px solid var(--accent)}
.app-header h1{font-size:1.2em;color:var(--accent-light);letter-spacing:1px}
.app-header p{font-size:.78em;color:var(--text2);margin-top:3px}
.wizard-container{width:100%;max-width:820px;padding:16px;flex:1}
.progress-bar{width:100%;height:6px;background:var(--surface);border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:3px;transition:width .3s}
.side-badge{display:inline-block;background:var(--accent);color:#fff;font-size:.75em;padding:3px 10px;border-radius:10px;margin-bottom:10px}
.lesion-badge{display:inline-block;background:var(--purple);color:#fff;font-size:.72em;padding:2px 8px;border-radius:10px;margin-left:6px}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:none}
.step-card.active{display:block}
.step-title{font-size:1.05em;font-weight:700;color:var(--accent-light);margin-bottom:14px}
.step-subtitle{font-size:.82em;color:var(--text2);margin-bottom:12px}
.field-group{margin-bottom:16px;padding:12px;background:rgba(224,112,32,.04);border:1px solid rgba(224,112,32,.12);border-radius:8px}
.field-label{font-size:.82em;font-weight:600;color:var(--accent-light);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.opt-grid{display:grid;gap:8px}
.opt-grid.cols2{grid-template-columns:1fr 1fr}
.opt-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.opt-grid.cols4{grid-template-columns:1fr 1fr 1fr 1fr}
.opt-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.84em;cursor:pointer;text-align:left;transition:all .2s}
.opt-btn:hover{border-color:var(--accent);background:#1e2a4a}
.opt-btn.selected{border-color:var(--accent);background:rgba(224,112,32,.15);color:#fff}
.opt-btn.selected::before{content:'✓ ';color:var(--accent-light)}
.free-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.86em;resize:vertical;min-height:38px;font-family:inherit}
.free-input:focus{outline:none;border-color:var(--accent)}
.num-input{width:90px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:.86em;text-align:center}
.num-input:focus{outline:none;border-color:var(--accent)}
.size-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.size-row label{font-size:.78em;color:var(--text2);min-width:30px}
.nav-row{display:flex;justify-content:space-between;margin-top:18px;gap:10px}
.nav-btn{padding:10px 28px;border:none;border-radius:8px;font-size:.88em;font-weight:600;cursor:pointer;transition:all .2s}
.nav-btn.prev{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.nav-btn.prev:hover{border-color:var(--accent)}
.nav-btn.next{background:var(--accent);color:#fff}
.nav-btn.next:hover{background:var(--accent2)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.diag-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.diag-name{width:220px;font-size:.83em;text-align:right;flex-shrink:0}
.diag-track{flex:1;height:22px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.diag-fill{height:100%;border-radius:4px;transition:width .6s ease}
.diag-pct{width:50px;font-size:.82em;font-weight:700;text-align:right;flex-shrink:0}
.report-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);justify-content:center;align-items:flex-start;overflow-y:auto;padding:20px}
.report-overlay.show{display:flex}
.report-sheet{background:#fff;color:#1a1a1a;width:210mm;min-height:297mm;padding:25mm 20mm;font-size:11pt;line-height:1.55;font-family:'Times New Roman',serif;position:relative}
.report-sheet h2{text-align:center;font-size:13pt;margin-bottom:12px;border-bottom:2px solid #333;padding-bottom:6px}
.report-sheet h3{font-size:11.5pt;margin:14px 0 6px;color:#222;border-bottom:1px solid #ccc;padding-bottom:3px}
.report-sheet h4{font-size:10.5pt;margin:10px 0 4px;color:#333}
.report-sheet table{width:100%;border-collapse:collapse;margin:8px 0}
.report-sheet th,.report-sheet td{border:1px solid #999;padding:4px 8px;font-size:10pt;text-align:left}
.report-sheet th{background:#e8e8e8;font-weight:700}
.report-sheet tr:nth-child(even){background:#f5f5f5}
.report-yorum{background:#f0f0ff;border-left:4px solid #5544aa;padding:10px 14px;margin:12px 0;font-size:10.5pt}
.report-toolbar{position:sticky;top:0;background:#333;padding:8px 16px;display:flex;gap:10px;border-radius:0 0 8px 8px;z-index:10}
.report-toolbar button{padding:7px 18px;border:none;border-radius:5px;font-size:.82em;font-weight:600;cursor:pointer;color:#fff}
.rpt-print{background:#2ecc71}
.rpt-copy{background:#3498db}
.rpt-dl{background:#f39c12}
.rpt-close{background:#e74c3c}
.side-ask-card{background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:24px;text-align:center}
.side-ask-card h3{color:var(--accent-light);margin-bottom:14px;font-size:1.05em}
.side-ask-btns{display:flex;gap:12px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.side-ask-btns button{padding:12px 26px;border:none;border-radius:8px;font-size:.9em;font-weight:700;cursor:pointer}
.side-ask-btns .yes{background:var(--accent);color:#fff}
.side-ask-btns .no{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.ek-check{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;color:var(--text);font-family:inherit;font-size:inherit;text-align:left;width:100%}
.ek-check:hover{border-color:var(--accent)}
.ek-check.checked{border-color:var(--accent);background:rgba(224,112,32,.12)}
.ek-check input{display:none}
.ek-check span{font-size:.84em}
.ek-box{font-size:1.1em;color:var(--text2);flex-shrink:0}
.ek-check.checked .ek-box{color:var(--accent-light)}
.section-label{font-size:.78em;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px;font-weight:600}
.lesion-summary{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:6px 0;font-size:.82em;display:flex;justify-content:space-between;align-items:center}
.lesion-summary .ls-info{color:var(--text)}
.lesion-summary .ls-del{background:var(--red);color:#fff;border:none;border-radius:4px;padding:4px 10px;font-size:.78em;cursor:pointer}
.cond-detail{margin-top:8px}
.cond-detail textarea{margin-top:4px}
.info-note{font-size:.78em;color:var(--text2);background:rgba(52,152,219,.08);border:1px solid rgba(52,152,219,.2);border-radius:6px;padding:8px 12px;margin-bottom:12px}
@media print{.report-toolbar{display:none}.report-overlay{background:#fff}.report-sheet{padding:15mm}}
@media(max-width:600px){.opt-grid.cols2,.opt-grid.cols3,.opt-grid.cols4{grid-template-columns:1fr}.diag-name{width:120px;font-size:.76em}.report-sheet{width:100%;padding:10mm}.size-row{flex-direction:column;align-items:flex-start}}

// =====================================================
// RENDERING
// =====================================================
function render(){
  const area = document.getElementById('stepArea');
  if(phase==='selectMode'){renderModeSelect(area);updateProgress(0);return}
  if(phase==='askOtherSide'){renderAskOtherSide(area);return}
  if(phase==='done'){renderResults(area);return}
  renderWizardStep(area);
  // Progress calculation
  let pct = 0;
  if(currentStep <= LESION_PRE) pct = (currentStep / TOTAL_BASE) * 100;
  else if(currentStep >= LESION_START && currentStep <= LESION_END) pct = ((LESION_PRE + 1 + (currentStep - LESION_START)) / TOTAL_BASE) * 100;
  else if(currentStep === LESION_POST) pct = ((LESION_POST) / TOTAL_BASE) * 100;
  else pct = (currentStep / TOTAL_BASE) * 100;
  updateProgress(Math.min(pct, 100));
}

function updateProgress(pct){document.getElementById('progressFill').style.width=pct+'%'}
function sideLabel(s){return s==='sag'?T.sagKulak:T.solKulak}

// Mode select
function renderModeSelect(area){
  area.innerHTML=`
  <div class="step-card active">
    <div class="step-title">${T.modeTitle}</div>
    <div class="step-subtitle">${T.modeSub}</div>
    <div class="opt-grid cols3">
      <button class="opt-btn" onclick="selectMode('sag')">${T.modeSag}</button>
      <button class="opt-btn" onclick="selectMode('sol')">${T.modeSol}</button>
      <button class="opt-btn" onclick="selectMode('bilateral')">${T.modeBilateral}</button>
    </div>
  </div>`;
}

function selectMode(m){
  mode=m;
  if(m==='bilateral'){currentSide='sag'}else{currentSide=m}
  sides[currentSide]=initSideData();
  currentStep=0;currentLesionIdx=-1;phase='wizard';render();
}

// Ask other side
function renderAskOtherSide(area){
  const otherSide=currentSide==='sag'?'sol':'sag';
  area.innerHTML=`
  <div class="side-ask-card">
    <h3>${sideLabel(currentSide)}${T.otherSideDone}</h3>
    <p style="color:var(--text2);font-size:.88em;margin-top:6px">${sideLabel(otherSide)}${T.otherSideQ}</p>
    <div class="side-ask-btns">
      <button class="yes" onclick="startOtherSide()">${T.otherSideYes}${sideLabel(otherSide)}</button>
      <button class="no" onclick="skipOtherSide()">${T.otherSideNo}</button>
    </div>
  </div>`;
}

function startOtherSide(){
  const otherSide=currentSide==='sag'?'sol':'sag';
  currentSide=otherSide;
  sides[currentSide]=initSideData();
  currentStep=0;currentLesionIdx=-1;phase='wizard';render();
}
function skipOtherSide(){phase='done';render()}

// =====================================================
// WIZARD STEP RENDERER
// =====================================================
function renderWizardStep(area){
  const d=sides[currentSide];
  let html=`<div class="side-badge">${sideLabel(currentSide)}</div>`;
  if(currentLesionIdx>=0 && currentStep>=LESION_START && currentStep<=LESION_END){
    html+=`<span class="lesion-badge">${T.lesionBadge} ${currentLesionIdx+1}${T.lesionOf}${d.lezyonlar.length}</span>`;
  }
  html+=`<div class="step-card active">`;

  switch(currentStep){
    case 0: html+=stepEndikasyon(d);break;
    case 1: html+=stepDisKulak(d);break;
    case 2: html+=stepOrtaKulak(d);break;
    case 3: html+=stepMastoid(d);break;
    case 4: html+=stepIcKulak(d);break;
    case 5: html+=stepIAC(d);break;
    case 6: html+=stepCPA(d);break;
    case 7: html+=stepYumusakDoku(d);break;
    case 8: html+=stepLezyonPre(d);break;
    // Lesion loop
    case 9: html+=stepLezyonLokBoyut(d);break;
    case 10: html+=stepLezyonMorfoloji(d);break;
    case 11: html+=stepLezyonT1T2(d);break;
    case 12: html+=stepLezyonFlairOP(d);break;
    case 13: html+=stepLezyonDWI(d);break;
    case 14: html+=stepLezyonKontrast(d);break;
    case 15: html+=stepLezyonInvazyon(d);break;
    case 16: html+=stepLezyonPost(d);break;
    case 17: html+=stepEkBulgular(d);break;
    case 18: html+=stepDiagnosis(d);break;
  }

  // Navigation
  html+=`<div class="nav-row">`;
  if(currentStep>0) html+=`<button class="nav-btn prev" onclick="goPrev()">${T.back}</button>`;
  else html+=`<span></span>`;

  if(currentStep===LESION_PRE){
    // no next if not answered
  } else if(currentStep===LESION_POST){
    // handled in step
  } else if(currentStep===DIAG_STEP){
    html+=`<button class="nav-btn next" onclick="finishSide()">${T.finish}</button>`;
  } else {
    html+=`<button class="nav-btn next" onclick="goNext()">${T.next}</button>`;
  }
  html+=`</div></div>`;
  area.innerHTML=html;
}

function stepLezyonPre(d){
  let h=`<div class="step-title">${stepNum(9)} — ${T.s8Title}</div>
  <div class="step-subtitle">${T.s8Sub}</div>`;

  // Show existing lesions
  if(d.lezyonlar.length>0){
    h+=`<div class="section-label">${T.s8Defined}</div>`;
    d.lezyonlar.forEach((lz,i)=>{
      const locStr = lz.lokalizasyonlar.join(', ')||T.s8LocNone;
      const sizeStr = [lz.boyutAP,lz.boyutML,lz.boyutCC].filter(x=>x).join('×')||T.s8SizeNone;
      h+=`<div class="lesion-summary">
        <div class="ls-info"><strong>${T.s8LezyonN} ${i+1}:</strong> ${locStr} — ${sizeStr} mm — ${lz.kontur||'?'} kontür</div>
        <button class="ls-del" onclick="deleteLesion(${i})">${T.s8Del}</button>
      </div>`;
    });
  }

  h+=`<div style="margin-top:16px" class="opt-grid cols2">
    <button class="opt-btn" style="text-align:center;padding:14px;font-weight:600;color:var(--green);border-color:var(--green)" onclick="addNewLesion()">${T.s8AddNew}</button>
    <button class="opt-btn" style="text-align:center;padding:14px" onclick="skipLesions()">${T.s8Skip}</button>
  </div>`;
  return h;
}

function addNewLesion(){
  const d=sides[currentSide];
  d.lezyonlar.push(initLesion());
  currentLesionIdx = d.lezyonlar.length - 1;
  currentStep = LESION_START;
  render();
}

function deleteLesion(idx){
  const d=sides[currentSide];
  d.lezyonlar.splice(idx,1);
  render();
}

function skipLesions(){
  currentLesionIdx = -1;
  currentStep = EK_STEP;
  render();
}

function addAnotherLesion(){
  saveLesionInputs();
  const d=sides[currentSide];
  d.lezyonlar.push(initLesion());
  currentLesionIdx = d.lezyonlar.length - 1;
  currentStep = LESION_START;
  render();
}

function finishLesions(){
  saveLesionInputs();
  currentLesionIdx = -1; // 3-part fix: reset idx
  currentStep = EK_STEP;
  render();
}

function stepDiagnosis(d){
  calculateScores(d);
  const sorted=[...d.scores].sort((a,b)=>b.score-a.score);
  const maxScore=Math.max(sorted[0]?.score||1,1);
  let h=`<div class="step-title">${T.s18Title}</div>
  <div class="step-subtitle">${sideLabel(currentSide)} — Kapsamlı analiz sonucu olasılık sıralaması</div>`;

  sorted.forEach(s=>{
    if(s.score<=0) return;
    const pct=Math.min(Math.round(s.score/maxScore*100),100);
    const color=pct>=70?'var(--green)':pct>=40?'var(--orange)':'var(--blue)';
    h+=`<div class="diag-bar">
      <div class="diag-name">${s.name}</div>
      <div class="diag-track"><div class="diag-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="diag-pct" style="color:${color}">${pct}%</div>
    </div>`;
  });

  // Key features for top 3
  const top3=sorted.slice(0,3).filter(s=>s.score>0);
  if(top3.length){
    h+=`<div class="section-label" style="margin-top:18px">${T.s18KeyLabel}</div>`;
    top3.forEach(s=>{
      const p=PATHOLOGIES.find(x=>x.name===s.name);
      if(p) h+=`<div style="font-size:.82em;color:var(--text2);padding:4px 0">• <strong style="color:var(--accent-light)">${p.name}:</strong> ${p.keyFeature}</div>`;
    });
  }

  // Lesion-specific match details
  if(d.lezyonlar.length>0){
    h+=`<div class="section-label" style="margin-top:12px">${T.s18LesionLabel}</div>`;
    d.lezyonlar.forEach((lz,i)=>{
      h+=`<div style="font-size:.8em;color:var(--text2);padding:2px 0"><strong>${T.lesionBadge} ${i+1}</strong> (${lz.lokalizasyonlar.join(', ')||'—'}): T1=${lz.t1||'—'}, T2=${lz.t2||'—'}, DWI=${lz.dwi||'—'}, Kontur=${lz.kontur||'—'}</div>`;
    });
  }
  return h;
}

// =====================================================
// SCORING ENGINE (Enhanced)
// =====================================================
function calculateScores(d){
  // Use first lesion for primary scoring, or anatomy-only if no lesions
  const lz = d.lezyonlar.length>0 ? d.lezyonlar[0] : null;

  d.scores = PATHOLOGIES.map(p=>{
    let score = 0;

    // === LESION-BASED SCORING (if lesion exists) ===
    if(lz){
      // T1 (weight 3)
      if(lz.t1 && matchSig(lz.t1, p.t1)) score += 3;
      else if(lz.t1 && p.t1 && !matchSig(lz.t1, p.t1) && p.t1!=='Değişken') score -= 1;

      // T2 (weight 3)
      if(lz.t2 && matchSig(lz.t2, p.t2)) score += 3;
      else if(lz.t2 && p.t2 && !matchSig(lz.t2, p.t2) && p.t2!=='Değişken') score -= 1;

      // FLAIR (weight 3)
      if(lz.flair && lz.flair!=='Değerlendirilmedi'){
        if(matchSig(lz.flair, p.flair)) score += 3;
        else if(p.flair && !matchSig(lz.flair, p.flair)) score -= 1;
      }

      // Out-phase (weight 4 — very discriminative for lipom)
      if(lz.outphase && lz.outphase!=='Değerlendirilmedi'){
        if(lz.outphase==='Sinyal kaybı' && p.outphase==='Sinyal kaybı') score += 5;
        else if(lz.outphase==='Değişmez' && p.outphase==='Değişmez') score += 1;
        else if(lz.outphase==='Sinyal kaybı' && p.outphase!=='Sinyal kaybı') score -= 3;
      }

      // DWI (weight 5 — key discriminator)
      if(lz.dwi && lz.dwi!=='Değerlendirilmedi'){
        if(matchSig(lz.dwi, p.dwi)) score += 5;
        else if(lz.dwi==='Belirgin restriksiyon' && p.dwi==='Restriksiyon yok') score -= 4;
        else if(lz.dwi==='Restriksiyon yok' && p.dwi==='Belirgin restriksiyon') score -= 4;
      }

      // ADC (weight 3)
      if(lz.adc && matchSig(lz.adc, p.adc)) score += 3;

      // Arterial (weight 5)
      if(lz.arterial && lz.arterial!=='Kontrastsız inceleme'){
        if(matchSig(lz.arterial, p.arterial)) score += 5;
        else if(lz.arterial && lz.arterial!==p.arterial && p.arterial!=='Değişken') score -= 1;
      }

      // Venöz (weight 3)
      if(lz.venoz && lz.venoz!=='Kontrastsız inceleme'){
        if(matchSig(lz.venoz, p.venoz)) score += 3;
        else if(lz.venoz==='Yok' && p.venoz && p.venoz.includes('Persistan')) score -= 2;
        else if(lz.venoz==='Persistan' && p.venoz==='Yok') score -= 2;
      }

      // Enhancement pattern (weight 3)
      if(lz.enhPattern && lz.enhPattern!=='Kontrastsız inceleme' && lz.enhPattern!=='Yok'){
        if(matchSig(lz.enhPattern, p.enhPattern)) score += 3;
        else if(p.enhPattern==='Yok' && lz.enhPattern!=='Yok') score -= 2;
      } else if(lz.enhPattern==='Yok' && p.enhPattern && p.enhPattern!=='Yok') {
        score -= 2;
      }

      // Location (weight 2)
      if(lz.lokalizasyonlar.length>0){
        const locMatch = lz.lokalizasyonlar.some(l=>p.locations.some(pl=>l.includes(pl)||pl.includes(l)));
        if(locMatch) score += 3;
        else score -= 1;
      }

      // Morphology bonus
      if(lz.kontur && p.kontur && p.kontur!=='N/A'){
        if(lz.kontur===p.kontur) score += 2;
        else if(lz.kontur==='İrregüler' && p.kontur==='Düzgün') score -= 1;
      }
      if(lz.sinir && p.sinir && p.sinir!=='N/A'){
        if(lz.sinir===p.sinir) score += 1;
      }

      // Invasion correlation
      if(lz.invazyonlar.length>0 && p.invazyon && p.invazyon.length>0){
        const invMatch = lz.invazyonlar.filter(inv=>p.invazyon.some(pi=>inv.includes(pi)||pi.includes(inv)));
        score += invMatch.length * 2;
      }
    }

    // === ANATOMY-BASED SCORING (always applies) ===
    if(p.anatomyClues){
      // Kemikçik destrüksiyonu
      if(p.anatomyClues.kemikçik==='destrüksiyon'){
        if(d.ortaKulakKemikçik && d.ortaKulakKemikçik.includes('Destrüksiyon')) score += 3;
      }
      // Mastoid pnömatizasyon
      if(p.anatomyClues.mastoidPnomatizasyon){
        if(p.anatomyClues.mastoidPnomatizasyon==='azalmış' && d.mastoidPnomatizasyon && (d.mastoidPnomatizasyon.includes('Azalmış')||d.mastoidPnomatizasyon.includes('Sklerotik'))) score += 2;
        if(p.anatomyClues.mastoidPnomatizasyon==='sklerotik' && d.mastoidPnomatizasyon && d.mastoidPnomatizasyon.includes('Sklerotik')) score += 3;
      }
      // Mastoid sıvı
      if(p.anatomyClues.mastoidSivi==='mevcut' && d.mastoidSivi && d.mastoidSivi!=='Yok') score += 3;
      // Orta kulak havalanma
      if(p.anatomyClues.ortaKulakHavalanma){
        if(p.anatomyClues.ortaKulakHavalanma==='sıvı' && d.ortaKulakHavalanma && d.ortaKulakHavalanma.includes('Sıvı')) score += 2;
        if(p.anatomyClues.ortaKulakHavalanma==='yumuşak doku' && d.ortaKulakHavalanma && d.ortaKulakHavalanma.includes('Yumuşak doku')) score += 2;
      }
      // İç kulak
      if(p.anatomyClues.koklea==='anormal' && d.koklea && d.koklea!=='Normal') score += 2;
      if(p.anatomyClues.vestibul==='anormal' && d.vestibul && d.vestibul!=='Normal') score += 2;
      if(p.anatomyClues.ssk==='anormal' && d.ssk && d.ssk!=='Normal') score += 2;
      // IAC
      if(p.anatomyClues.iacGenislik==='genişlemiş' && d.iacGenislik==='Genişlemiş') score += 3;
      if(p.anatomyClues.sinirKompleks==='kitle' && d.sinirKompleks && d.sinirKompleks.includes('Kitle')) score += 3;
      if(p.anatomyClues.sinirKompleks==='kalınlaşmış' && d.sinirKompleks && d.sinirKompleks.includes('Kalınlaşmış')) score += 2;
      // Dış kulak
      if(p.anatomyClues.disKulak==='kitle' && d.disKulak && d.disKulak.includes('Kitle')) score += 2;
    }

    // Ek bulgular correlation
    if(d.ekBulgular.length>0){
      d.ekBulgular.forEach(eb=>{
        if(p.invazyon && p.invazyon.some(pi=>eb.includes(pi)||pi.includes(eb))) score += 1;
        // Specific matches
        if(eb==='Mastoid efüzyon' && (p.id==='akut_otomastoidit'||p.id==='kronik_otomastoidit')) score += 2;
        else if(eb==='Kemik destrüksiyonu' && (p.id==='kolesteatom'||p.id==='metastaz'||p.id==='scc'||p.id==='langerhans')) score += 2;
        else if(eb==='Ossikül erozyonu' && p.id==='kolesteatom') score += 3;
        else if(eb==='Dural tail işareti' && p.id==='meningiom') score += 4;
        else if(eb==='Flow void yapılar' && p.id==='paraganglioma') score += 3;
        else if(eb==='Sigmoid sinüs trombozu' && p.id==='akut_otomastoidit') score += 2;
        else if(eb==='Labirent fistülü' && p.id==='kolesteatom') score += 3;
        else if(eb==='Tegmen defekti' && p.id==='kolesteatom') score += 2;
        else if(eb==='Fasiyal sinir tutulumu' && p.id==='fasiyal_schwannoma') score += 3;
      });
    }

    // Multi-lesion bonus: if >1 lesion, check additional lesions
    if(d.lezyonlar.length>1){
      for(let i=1;i<d.lezyonlar.length;i++){
        const lz2=d.lezyonlar[i];
        if(lz2.lokalizasyonlar.some(l=>p.locations.some(pl=>l.includes(pl)||pl.includes(l)))) score += 1;
      }
    }

    return {name:p.name, score:Math.max(score,0)};
  });
}

function matchSig(user, path){
  if(!user||!path) return false;
  const u=user.toLowerCase(), p=path.toLowerCase();
  if(u===p) return true;
  if(p.includes('değişken')) return true;
  // Partial matching
  if(u.includes('hiperintens') && p.includes('hiperintens')) return true;
  if(u.includes('hipointens') && p.includes('hipointens')) return true;
  if(u.includes('izointens') && p.includes('izointens')) return true;
  if(u.includes(p)||p.includes(u)) return true;
  return false;
}

// =====================================================
// HELPER FUNCTIONS
// =====================================================
function escQ(s){return s.replace(/'/g,"\\'")}

function mkRadio(label, current, field){
  const sel = current===label?'selected':'';
  return `<button class="opt-btn ${sel}" onclick="selectField(this,'${escQ(field)}','${escQ(label)}')">${label}</button>`;
}

function mkRadioLesion(label, current, field){
  const sel = current===label?'selected':'';
  return `<button class="opt-btn ${sel}" onclick="selectLesionField(this,'${escQ(field)}','${escQ(label)}')">${label}</button>`;
}

// =====================================================
// INTERACTIONS
// =====================================================
function selectField(btn, field, val){
  sides[currentSide][field]=val;
  btn.parentElement.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function selectLesionField(btn, field, val){
  if(currentLesionIdx>=0){
    sides[currentSide].lezyonlar[currentLesionIdx][field]=val;
  }
  btn.parentElement.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function toggleLesionLoc(btn, loc){
  if(currentLesionIdx<0) return;
  const lz=getLesion();
  const i=lz.lokalizasyonlar.indexOf(loc);
  if(i>=0){lz.lokalizasyonlar.splice(i,1);btn.classList.remove('selected')}
  else{lz.lokalizasyonlar.push(loc);btn.classList.add('selected')}
}

function toggleLesionInv(btn, val){
  if(currentLesionIdx<0) return;
  const lz=getLesion();
  const i=lz.invazyonlar.indexOf(val);
  const box=btn.querySelector('.ek-box');
  if(i>=0){lz.invazyonlar.splice(i,1);btn.classList.remove('checked');if(box)box.textContent='☐'}
  else{lz.invazyonlar.push(val);btn.classList.add('checked');if(box)box.textContent='☑'}
}

function toggleEk(btn, val){
  const d=sides[currentSide];
  const i=d.ekBulgular.indexOf(val);
  const box=btn.querySelector('.ek-box');
  if(i>=0){d.ekBulgular.splice(i,1);btn.classList.remove('checked');if(box)box.textContent='☐'}
  else{d.ekBulgular.push(val);btn.classList.add('checked');if(box)box.textContent='☑'}
}

// =====================================================
// SAVE INPUTS & NAVIGATION
// =====================================================
function saveCurrentInputs(){
  const d=sides[currentSide];
  // Anatomy text fields
  const fieldMap = {
    0: [['inp_endikasyon','endikasyon']],
    1: [['inp_disKulakNot','disKulakNot']],
    2: [['inp_kemikçikHangi','ortaKulakKemikçikHangi'],['inp_ortaKulakKitleNot','ortaKulakKitleNot']],
    3: [['inp_mastoidNot','mastoidNot']],
    4: [['inp_kokleaNot','kokleaNot'],['inp_vestibulNot','vestibulNot'],['inp_sskNot','sskNot'],['inp_icKulakAnomaliNot','icKulakAnomaliNot']],
    5: [['inp_sinirKompleksNot','sinirKompleksNot'],['inp_iacKitleNot','iacKitleNot']],
    6: [['inp_cpaPatolojiNot','cpaPatolojiNot']],
    7: [['inp_yumusakDokuNot','yumusakDokuNot']],
    17: [['inp_eknot','ekNot']]
  };
  if(fieldMap[currentStep]){
    fieldMap[currentStep].forEach(([elId,key])=>{
      const el=document.getElementById(elId);
      if(el) d[key]=el.value;
    });
  }
}

function saveLesionInputs(){
  if(currentLesionIdx<0) return;
  const lz=getLesion();
  if(!lz) return;
  // Size fields
  const apEl=document.getElementById('inp_boyutAP');
  const mlEl=document.getElementById('inp_boyutML');
  const ccEl=document.getElementById('inp_boyutCC');
  if(apEl) lz.boyutAP=apEl.value;
  if(mlEl) lz.boyutML=mlEl.value;
  if(ccEl) lz.boyutCC=ccEl.value;
  // Contrast note
  const knEl=document.getElementById('inp_kontrastNot');
  if(knEl) lz.kontrastNot=knEl.value;
  // Lesion note
  const lnEl=document.getElementById('inp_lezyonNot');
  if(lnEl) lz.lezyonNot=lnEl.value;
}

function goNext(){
  saveCurrentInputs();
  if(currentStep>=LESION_START && currentStep<=LESION_END){
    saveLesionInputs();
  }

  // 3-part fix: goNext from pre-loop step
  if(currentStep===LESION_PRE && currentLesionIdx===-1){
    // No lesion added, skip loop entirely
    currentStep=EK_STEP;
    render();return;
  }

  if(currentStep===LESION_END){
    // Go to post-loop
    saveLesionInputs();
    currentStep=LESION_POST;
    render();return;
  }

  if(currentStep<DIAG_STEP){
    currentStep++;
    render();
  }
}

function goPrev(){
  saveCurrentInputs();
  if(currentStep>=LESION_START && currentStep<=LESION_END){
    saveLesionInputs();
  }

  // 3-part fix: goPrev from post-loop returns to pre-loop
  if(currentStep===LESION_POST){
    currentStep=LESION_PRE;
    currentLesionIdx=-1;
    render();return;
  }

  // goPrev from EK_STEP
  if(currentStep===EK_STEP){
    const d=sides[currentSide];
    if(d.lezyonlar.length>0){
      // Go back to post-loop
      currentLesionIdx = d.lezyonlar.length-1;
      currentStep=LESION_POST;
    } else {
      currentStep=LESION_PRE;
    }
    render();return;
  }

  // goPrev from first lesion step → back to pre-loop
  if(currentStep===LESION_START){
    currentStep=LESION_PRE;
    currentLesionIdx=-1;
    render();return;
  }

  if(currentStep>0){
    currentStep--;
    render();
  }
}

function finishSide(){
  saveCurrentInputs();
  calculateScores(sides[currentSide]);
  if(mode==='bilateral' && !sides[currentSide==='sag'?'sol':'sag']){
    phase='askOtherSide';render();
  } else {
    phase='done';render();
  }
}

function resetAll(){mode=null;currentSide=null;sides={};currentStep=0;currentLesionIdx=-1;phase='selectMode';render()}

// =====================================================
// RESULTS VIEW
// =====================================================
function renderResults(area){
  updateProgress(100);
  let html='';
  const availableSides=Object.keys(sides);
  availableSides.forEach(s=>{
    const d=sides[s];
    if(!d.scores) calculateScores(d);
    const sorted=[...d.scores].sort((a,b)=>b.score-a.score);
    const maxScore=Math.max(sorted[0]?.score||1,1);
    html+=`<div class="step-card active" style="margin-bottom:14px">
    <div class="side-badge">${sideLabel(s)}</div>
    <div class="step-title">${T.resTitle}</div>`;
    sorted.forEach(sc=>{
      if(sc.score<=0) return;
      const pct=Math.min(Math.round(sc.score/maxScore*100),100);
      const color=pct>=70?'var(--green)':pct>=40?'var(--orange)':'var(--blue)';
      html+=`<div class="diag-bar">
        <div class="diag-name">${sc.name}</div>
        <div class="diag-track"><div class="diag-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="diag-pct" style="color:${color}">${pct}%</div>
      </div>`;
    });
    // Key features
    const top3=sorted.slice(0,3).filter(x=>x.score>0);
    if(top3.length){
      html+=`<div class="section-label" style="margin-top:12px">${T.resKeyLabel}</div>`;
      top3.forEach(sc=>{
        const p=PATHOLOGIES.find(x=>x.name===sc.name);
        if(p) html+=`<div style="font-size:.8em;color:var(--text2);padding:3px 0">• <strong style="color:var(--accent-light)">${p.name}:</strong> ${p.keyFeature}</div>`;
      });
    }
    html+=`</div>`;
  });

  // Non-examined side note
  if(mode!=='bilateral'||availableSides.length===1){
    const missSide=availableSides[0]==='sag'?'sol':'sag';
    if(!sides[missSide]){
      html+=`<div class="step-card active" style="margin-bottom:14px;border-color:var(--border)">
        <div class="side-badge" style="background:var(--surface2)">${sideLabel(missSide)}</div>
        <p style="color:var(--text2);font-size:.86em">${T.notAssessed}</p>
      </div>`;
    }
  }

  html+=`<div class="nav-row" style="justify-content:center;gap:12px;flex-wrap:wrap">
    <button class="nav-btn next" onclick="showReport()">${T.resShowReport}</button>
    <button class="nav-btn prev" onclick="resetAll()">${T.resNewScan}</button>
  </div>`;
  area.innerHTML=html;
}

// =====================================================
// REPORT GENERATOR
// =====================================================
function showReport(){
  const sheet=document.getElementById('reportSheet');
  let h=`<h2>${T.rptH2}</h2>`;
  const availableSides=Object.keys(sides);

  availableSides.forEach(s=>{
    const d=sides[s];
    if(!d.scores) calculateScores(d);
    const sorted=[...d.scores].sort((a,b)=>b.score-a.score).filter(x=>x.score>0);
    const maxS=Math.max(sorted[0]?.score||1,1);

    h+=`<h3 style="margin-top:16px;font-size:12pt;color:#222;border-bottom:2px solid #333;padding-bottom:4px">${sideLabel(s).toUpperCase()}</h3>`;
    if(d.endikasyon) h+=`<p><strong>${T.rptKlinik}:</strong> ${d.endikasyon}</p>`;

    // === ANATOMICAL FINDINGS ===
    h+=`<h4>${T.rptAnatomik}</h4>`;
    h+=`<table>
    <tr><th style="width:40%">${T.rptYapi}</th><th>${T.rptBulgu}</th></tr>
    <tr><td>${T.rptDisKulak}</td><td>${d.disKulak||T.rptNaValue}${d.disKulakNot?' — '+d.disKulakNot:''}</td></tr>
    <tr><td>${T.rptOrtaHav}</td><td>${d.ortaKulakHavalanma||T.rptNaValue}</td></tr>
    <tr><td>${T.rptOrtaKemik}</td><td>${d.ortaKulakKemikçik||T.rptNaValue}${d.ortaKulakKemikçikHangi?' ('+d.ortaKulakKemikçikHangi+')':''}</td></tr>
    <tr><td>${T.rptOrtaKitle}</td><td>${d.ortaKulakKitle||T.rptNaValue}${d.ortaKulakKitleNot?' — '+d.ortaKulakKitleNot:''}</td></tr>
    <tr><td>${T.rptMastoidPno}</td><td>${d.mastoidPnomatizasyon||T.rptNaValue}</td></tr>
    <tr><td>${T.rptMastoidSivi}</td><td>${d.mastoidSivi||T.rptNaValue}${d.mastoidNot?' — '+d.mastoidNot:''}</td></tr>
    <tr><td>${T.rptKoklea}</td><td>${d.koklea||T.rptNaValue}${d.kokleaNot?' — '+d.kokleaNot:''}</td></tr>
    <tr><td>${T.rptVestibul}</td><td>${d.vestibul||T.rptNaValue}${d.vestibulNot?' — '+d.vestibulNot:''}</td></tr>
    <tr><td>${T.rptSSK}</td><td>${d.ssk||T.rptNaValue}${d.sskNot?' — '+d.sskNot:''}</td></tr>
    <tr><td>${T.rptIcKulakAnomali}</td><td>${d.icKulakAnomali||T.rptNaValue}${d.icKulakAnomaliNot?' — '+d.icKulakAnomaliNot:''}</td></tr>
    <tr><td>${T.rptIACGenislik}</td><td>${d.iacGenislik||T.rptNaValue}</td></tr>
    <tr><td>${T.rptSinirKompleks}</td><td>${d.sinirKompleks||T.rptNaValue}${d.sinirKompleksNot?' — '+d.sinirKompleksNot:''}</td></tr>
    <tr><td>${T.rptIACKitle}</td><td>${d.iacKitle||T.rptNaValue}${d.iacKitleNot?' — '+d.iacKitleNot:''}</td></tr>
    <tr><td>${T.rptCPA}</td><td>${d.cpaPatoloji||T.rptNaValue}${d.cpaPatolojiNot?' — '+d.cpaPatolojiNot:''}</td></tr>
    <tr><td>${T.rptYumusak}</td><td>${d.yumusakDoku||T.rptNaValue}${d.yumusakDokuNot?' — '+d.yumusakDokuNot:''}</td></tr>
    </table>`;

    // === LESION DETAILS ===
    if(d.lezyonlar.length>0){
      h+=`<h4>${T.rptLezyonTitle}</h4>`;
      d.lezyonlar.forEach((lz,i)=>{
        const sizeStr=[lz.boyutAP&&`AP: ${lz.boyutAP}`,lz.boyutML&&`ML: ${lz.boyutML}`,lz.boyutCC&&`CC: ${lz.boyutCC}`].filter(Boolean).join(', ')||T.rptInvYok;
        h+=`<p style="margin-top:8px;font-weight:700;font-size:10.5pt">${T.rptLezyonN} ${i+1}</p>`;
        h+=`<table>
        <tr><th style="width:40%">${T.rptParam}</th><th>${T.rptBulgu}</th></tr>
        <tr><td>${T.rptLok}</td><td>${lz.lokalizasyonlar.join(', ')||'—'}</td></tr>
        <tr><td>${T.rptBoyutMm}</td><td>${sizeStr}</td></tr>
        <tr><td>${T.rptKontur}</td><td>${lz.kontur||'—'}</td></tr>
        <tr><td>${T.rptSinir}</td><td>${lz.sinir||'—'}</td></tr>
        <tr><td>${T.rptSekil}</td><td>${lz.sekil||'—'}</td></tr>
        <tr><td>${T.rptInternal}</td><td>${lz.homojenite||'—'}</td></tr>
        <tr><td>${T.rptT1}</td><td>${lz.t1||'—'} ${lz.t1Homo?'('+lz.t1Homo+')':''}</td></tr>
        <tr><td>${T.rptT2}</td><td>${lz.t2||'—'} ${lz.t2Homo?'('+lz.t2Homo+')':''}</td></tr>
        <tr><td>${T.rptFlair}</td><td>${lz.flair||'—'}</td></tr>
        <tr><td>${T.rptOutphase}</td><td>${lz.outphase||'—'}</td></tr>
        <tr><td>${T.rptDWI}</td><td>${lz.dwi||'—'}</td></tr>
        <tr><td>${T.rptADC}</td><td>${lz.adc||'—'}</td></tr>
        <tr><td>${T.rptArterial}</td><td>${lz.arterial||'—'}</td></tr>
        <tr><td>${T.rptVenoz}</td><td>${lz.venoz||'—'}</td></tr>
        <tr><td>${T.rptEnhPat}</td><td>${lz.enhPattern||'—'}</td></tr>
        ${lz.kontrastNot?`<tr><td>${T.rptKontNot}</td><td>${lz.kontrastNot}</td></tr>`:''}
        <tr><td>${T.rptInvazyon}</td><td>${lz.invazyonlar.join(', ')||T.rptInvYok}</td></tr>
        ${lz.lezyonNot?`<tr><td>${T.rptLezyonNot}</td><td>${lz.lezyonNot}</td></tr>`:''}
        </table>`;
      });
    } else {
      h+=`<p style="margin-top:8px"><em>${T.rptNoLesion}</em></p>`;
    }

    // Ek bulgular
    if(d.ekBulgular.length>0 || d.ekNot){
      h+=`<h4>${T.rptEkBulgular}</h4>`;
      if(d.ekBulgular.length>0) h+=`<p>${d.ekBulgular.join(', ')}</p>`;
      if(d.ekNot) h+=`<p>${d.ekNot}</p>`;
    }

    // Differential diagnosis table
    h+=`<h4>${T.rptAyirici}</h4>`;
    h+=`<table><tr><th>${T.rptTani}</th><th>${T.rptUyumSkoru}</th></tr>`;
    sorted.forEach(sc=>{
      const pct=Math.min(Math.round(sc.score/maxS*100),100);
      h+=`<tr><td>${sc.name}</td><td>${pct}%</td></tr>`;
    });
    h+=`</table>`;

    // YORUM / IMPRESSION
    const top=sorted[0];
    if(top){
      const p=PATHOLOGIES.find(x=>x.name===top.name);
      h+=`<div class="report-yorum"><strong>${T.rptYorumLabel} (${sideLabel(s)}):</strong><br>`;
      h+=`${T.rptYorumText1}<strong>${top.name}</strong>${T.rptYorumText2}`;
      if(p) h+=`<br>${T.rptKeyFeature}${p.keyFeature}.`;
      if(sorted.length>1){
        h+=`<br>${T.rptDiffText}`;
        h+=sorted.slice(1,4).map(x=>`<strong>${x.name}</strong> (%${Math.min(Math.round(x.score/maxS*100),100)})`).join(', ');
        h+=`${T.rptDiffTextEnd}`;
      }
      // Anatomy-specific comments
      const anatComments=[];
      if(d.ortaKulakKemikçik && d.ortaKulakKemikçik.includes('Destrüksiyon')) anatComments.push(T.rptAnatomikComm[0][1]);
      if(d.mastoidSivi && d.mastoidSivi!=='Yok') anatComments.push(T.rptAnatomikComm[1][1]);
      if(d.mastoidPnomatizasyon && d.mastoidPnomatizasyon.includes('Sklerotik')) anatComments.push(T.rptAnatomikComm[2][1]);
      if(d.iacGenislik==='Genişlemiş') anatComments.push(T.rptAnatomikComm[3][1]);
      if(d.koklea && d.koklea!=='Normal') anatComments.push(T.rptAnatomikComm[4][1]);
      if(anatComments.length>0){
        h+=`<br><br>${T.rptAddAnat}${anatComments.join('. ')}.`;
      }
      if(d.lezyonlar.length>1){
        h+=`<br><br>${T.rptMultiLesion}${d.lezyonlar.length}${T.rptMultiLesion2}`;
      }
      h+=`<br><br><em>${T.rptCorr}</em>`;
      h+=`</div>`;
    }
  });

  // Non-examined side
  const missSide=availableSides[0]==='sag'?'sol':'sag';
  if(!sides[missSide]){
    h+=`<p style="margin-top:10px"><strong>${sideLabel(missSide)}:</strong> ${T.rptNotExamined}</p>`;
  }

  h+=`<p style="margin-top:18px;font-size:9pt;color:#888;text-align:center">${T.rptFooter}</p>`;
  sheet.innerHTML=h;
  document.getElementById('reportOverlay').classList.add('show');
}

function closeReport(){document.getElementById('reportOverlay').classList.remove('show')}

function copyReport(){
  const sheet=document.getElementById('reportSheet');
  const range=document.createRange();
  range.selectNodeContents(sheet);
  const sel=window.getSelection();
  sel.removeAllRanges();sel.addRange(range);
  try{document.execCommand('copy');alert(T.rptCopyOk);}
  catch(e){alert(T.rptCopyFail)}
  sel.removeAllRanges();
}

function downloadReport(){
  const sheet=document.getElementById('reportSheet');
  const htmlContent=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${T.rptDownloadTitle}</title>
  <style>body{font-family:'Times New Roman',serif;font-size:11pt;line-height:1.6;padding:20mm;color:#1a1a1a}
  h2{text-align:center;border-bottom:2px solid #333;padding-bottom:6px}h3{border-bottom:1px solid #ccc;padding-bottom:3px}
  h4{margin:10px 0 4px}table{width:100%;border-collapse:collapse;margin:8px 0}th,td{border:1px solid #999;padding:4px 8px;font-size:10pt}
  th{background:#e8e8e8;font-weight:700}tr:nth-child(even){background:#f5f5f5}
  .report-yorum{background:#f0f0ff;border-left:4px solid #5544aa;padding:10px 14px;margin:12px 0}</style></head>
  <body>${sheet.innerHTML}</body></html>`;
  const blob=new Blob([htmlContent],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='temporal-mri-rapor.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
