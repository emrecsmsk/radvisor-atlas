<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kardiyak MR — Karar Destek Sistemi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/[email protected]/babel.min.js"></script>
<style>
:root{
  --bg:#0f0e17;
  --bg2:#161524;
  --bg3:#1d1b2e;
  --card:#1a1828;
  --card2:#221f33;
  --line:#2a2740;
  --line2:#363152;
  --txt:#f1ecff;
  --txt2:#c9c2e5;
  --mut:#8b85a8;
  --acc:#dc2626;
  --acc2:#f43f5e;
  --acc3:#fb7185;
  --acc4:#fda4af;
  --ok:#10b981;
  --warn:#f59e0b;
  --bad:#ef4444;
  --info:#38bdf8;
  --zebraA:#1a1828;
  --zebraB:#201d30;
  --pathRow:#2a1520;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh}
body{background:radial-gradient(1200px 600px at 20% -10%,#2a0f1a 0%,transparent 60%),radial-gradient(900px 500px at 120% 10%,#1a0a18 0%,transparent 60%),var(--bg);padding:24px 16px}
.app{max-width:1180px;margin:0 auto}

.header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;background:linear-gradient(135deg,#1a0f1a 0%,#2a0f1f 100%);border:1px solid var(--line2);border-radius:14px;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--acc) 0%,var(--acc2) 100%);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:22px;letter-spacing:-1px;box-shadow:0 4px 16px rgba(220,38,38,.4)}
.ttl{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.3px}
.sub{color:var(--mut);font-size:12px;margin-top:2px}
.headerRight{display:flex;gap:10px}
.iconBtn{background:var(--card2);border:1px solid var(--line2);color:var(--txt2);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;font-family:'IBM Plex Sans'}
.iconBtn:hover{background:var(--line2);color:var(--txt)}

.progressWrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px}
.stepDots{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.stepDot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;background:var(--bg3);color:var(--mut);border:1px solid var(--line);cursor:pointer;transition:all .2s}
.stepDot.active{background:linear-gradient(135deg,var(--acc) 0%,var(--acc2) 100%);color:#fff;border-color:transparent;box-shadow:0 0 0 3px rgba(220,38,38,.2)}
.stepDot.done{background:var(--acc2);color:#fff;border-color:transparent}
.stepDot.loop{background:rgba(251,113,133,.15);border-color:var(--acc3);color:var(--acc3)}
.stepLbl{color:var(--mut);font-size:12px;display:flex;justify-content:space-between}
.stepLbl strong{color:var(--txt)}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;animation:fadeIn .35s cubic-bezier(.16,1,.3,1)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.stepTtl{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.3px}
.stepDesc{color:var(--mut);font-size:13px;margin-bottom:20px}

.opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-bottom:20px}
.opt{background:var(--card2);border:1.5px solid var(--line2);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .18s;position:relative;user-select:none}
.opt:hover{border-color:var(--acc3);background:var(--bg3)}
.opt.sel{background:linear-gradient(135deg,rgba(220,38,38,.15) 0%,rgba(244,63,94,.12) 100%);border-color:var(--acc2);box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.opt.sel::after{content:"✓";position:absolute;top:10px;right:12px;color:var(--acc3);font-weight:700;font-size:14px}
.optLbl{font-size:14px;font-weight:500;color:var(--txt)}
.optSub{color:var(--mut);font-size:11px;margin-top:4px}

.input,.select{width:100%;background:var(--bg3);border:1.5px solid var(--line2);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:14px;font-family:'IBM Plex Sans'}
.input:focus,.select:focus{outline:none;border-color:var(--acc2)}
.inputRow{display:grid;gap:12px}
.inputField{display:flex;flex-direction:column;gap:6px}
.inputField label{color:var(--txt2);font-size:12px;font-weight:500}
.inputField .hint{color:var(--mut);font-size:11px}
.inputGrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.inputGrid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.inputGrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media (max-width:700px){.inputGrid2,.inputGrid3,.inputGrid4{grid-template-columns:1fr}}

.nav{display:flex;justify-content:space-between;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.btn{padding:11px 22px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'IBM Plex Sans';border:none;letter-spacing:.2px}
.btn.pri{background:linear-gradient(135deg,var(--acc) 0%,var(--acc2) 100%);color:#fff;box-shadow:0 4px 14px rgba(220,38,38,.25)}
.btn.pri:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(220,38,38,.35)}
.btn.sec{background:var(--card2);color:var(--txt2);border:1px solid var(--line2)}
.btn.sec:hover{background:var(--bg3);color:var(--txt)}
.btn.dng{background:rgba(239,68,68,.15);color:var(--bad);border:1px solid rgba(239,68,68,.3)}
.btn.dng:hover{background:rgba(239,68,68,.25)}
.btn:disabled{opacity:.4;cursor:not-allowed}

.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.3px}
.b-red{background:rgba(239,68,68,.2);color:#fca5a5}
.b-green{background:rgba(16,185,129,.2);color:#6ee7b7}
.b-amber{background:rgba(245,158,11,.2);color:#fcd34d}
.b-blue{background:rgba(56,189,248,.2);color:#7dd3fc}
.b-purple{background:rgba(168,85,247,.2);color:#c4b5fd}
.b-pink{background:rgba(244,63,94,.2);color:var(--acc4)}

.lesionList{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.lesionItem{background:var(--card2);border:1px solid var(--line2);border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center}
.lesionItem .meta{font-size:12px;color:var(--mut);margin-top:2px}

.progressBar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.progressBar > div{height:100%;background:linear-gradient(90deg,var(--acc) 0%,var(--acc2) 100%);transition:width .4s}

.pathRow{display:grid;grid-template-columns:1fr 80px 100px;gap:12px;padding:10px 14px;border-radius:8px;align-items:center;transition:all .2s}
.pathRow:nth-child(odd){background:var(--zebraA)}
.pathRow:nth-child(even){background:var(--zebraB)}
.pathRow.top{background:linear-gradient(90deg,rgba(220,38,38,.15) 0%,rgba(244,63,94,.08) 100%);border-left:3px solid var(--acc2)}
.pathName{font-size:13px;font-weight:500}
.pathScore{font-family:'IBM Plex Mono';font-size:12px;color:var(--acc3);text-align:right;font-weight:600}

/* ========== KUTULU ZEBRA RAPOR ========== */
.rpt{background:#0b0a14;border:1px solid var(--line);border-radius:12px;padding:22px;font-family:'IBM Plex Mono','Courier New',monospace;font-size:12.5px;line-height:1.75;color:#e8e3ff;margin-top:14px;max-height:640px;overflow-y:auto}
.RptSection{border:1px solid var(--line2);border-radius:10px;margin-bottom:14px;overflow:hidden}
.RptHeader{background:linear-gradient(90deg,var(--acc) 0%,var(--acc2) 100%);color:#fff;padding:9px 14px;font-family:'IBM Plex Sans';font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.RptBody{background:var(--card)}
.RptRow{display:grid;grid-template-columns:minmax(220px,40%) 1fr;gap:18px;padding:7px 14px;border-bottom:1px solid rgba(54,49,82,.4)}
.RptRow:last-child{border-bottom:none}
.RptRow:nth-child(odd){background:#171526}
.RptRow:nth-child(even){background:#1d1b2e}
.RptRow .k{color:var(--mut);font-size:12px}
.RptRow .v{color:var(--txt);font-size:12.5px}
.RptRow .v.patolojik{color:#fca5a5;font-weight:600}
.RptRow .v.emphasize{color:#fcd34d}
.RptPara{padding:10px 14px;background:#171526;color:var(--txt);font-size:12.5px;line-height:1.7}
.RptPara.ozet{background:linear-gradient(90deg,rgba(220,38,38,.1) 0%,rgba(244,63,94,.05) 100%);border-left:3px solid var(--acc2);padding:12px 16px;font-style:italic}

.exportBar{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.exportBar .btn{flex:1;min-width:140px}

.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:9999;padding:24px}
.overlay.show{display:flex;align-items:center;justify-content:center}
.overlayInner{background:var(--card);border:1px solid var(--line2);border-radius:12px;padding:20px;max-width:880px;width:100%;max-height:88vh;display:flex;flex-direction:column;gap:12px}
.overlayInner textarea{flex:1;width:100%;background:#0b0a14;color:var(--txt);border:1px solid var(--line2);border-radius:8px;padding:14px;font-family:'IBM Plex Mono';font-size:12px;line-height:1.65;resize:none;min-height:480px}
.overlayRow{display:flex;gap:8px;justify-content:space-between;align-items:center}
.overlayRow .hint{color:var(--mut);font-size:12px}

.alert{background:linear-gradient(90deg,rgba(251,113,133,.12) 0%,rgba(220,38,38,.06) 100%);border:1px solid rgba(251,113,133,.3);border-radius:9px;padding:12px 14px;color:var(--acc4);font-size:12.5px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.alert strong{color:var(--acc4);font-weight:600}
.infoBox{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.25);border-radius:9px;padding:12px 14px;color:#bae6fd;font-size:12.5px;margin-bottom:14px}

.loopHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:10px 14px;background:linear-gradient(90deg,rgba(251,113,133,.08) 0%,transparent 100%);border-left:3px solid var(--acc3);border-radius:6px}
.loopHeader .ttl{font-family:'Syne',sans-serif;font-weight:600;font-size:14px;color:var(--acc3)}

.tiny{font-size:11px;color:var(--mut);margin-top:4px}
.mono{font-family:'IBM Plex Mono';color:var(--acc4)}
</style>
