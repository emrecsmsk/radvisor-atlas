<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbita MRI Karar Destek Sistemi</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#0f0e17;
    --panel:#17162a;
    --panel-2:#1d1b35;
    --border:#2d2a4a;
    --accent:#a78bfa;
    --accent-2:#8b5cf6;
    --accent-3:#c4b5fd;
    --orbita:#22d3ee;
    --text:#e7e5f3;
    --text-dim:#a9a6c2;
    --good:#22c55e;
    --warn:#f59e0b;
    --bad:#ef4444;
    --info:#38bdf8;
    --table-alt:#1a1930;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;min-height:100vh}
  .wrap{max-width:1280px;margin:0 auto;padding:20px}
  .title{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .title h1{font-size:24px;margin:0;background:linear-gradient(135deg,var(--accent),var(--orbita));-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700}
  .title .badge{background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);font-size:12px;padding:3px 10px;border-radius:999px}
  .subtitle{color:var(--text-dim);margin-bottom:22px;font-size:13px}
  .stepper{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
  .stepper .pill{font-size:11px;padding:5px 10px;border-radius:999px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .15s}
  .stepper .pill.active{background:linear-gradient(135deg,var(--accent-2),var(--orbita));color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(34,211,238,.3)}
  .stepper .pill.done{background:var(--panel-2);color:var(--accent-3);border-color:var(--accent)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 4px 18px rgba(0,0,0,.25);animation:fadeIn .35s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card h2{margin:0 0 4px 0;font-size:18px;color:var(--accent-3)}
  .card .hint{color:var(--text-dim);font-size:12.5px;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:720px){.grid-2,.grid-3{grid-template-columns:1fr}}
  label{display:block;font-size:12.5px;color:var(--text-dim);margin-bottom:4px}
  input[type=text],input[type=number],select,textarea{width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13.5px;outline:none;font-family:inherit}
  textarea{min-height:70px;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--orbita);box-shadow:0 0 0 2px rgba(34,211,238,.2)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .chip{background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:6px 11px;border-radius:8px;font-size:12.5px;cursor:pointer;transition:all .12s;user-select:none}
  .chip:hover{border-color:var(--orbita)}
  .chip.active{background:linear-gradient(135deg,var(--accent-2),var(--orbita));border-color:transparent;color:#fff}
  .chip.small{padding:4px 9px;font-size:11.5px}
  .section{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
  .section h3{margin:0 0 10px 0;font-size:14px;color:var(--orbita);letter-spacing:.4px;text-transform:uppercase}
  .section h4{margin:14px 0 8px 0;font-size:13px;color:var(--accent-3)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btnbar{display:flex;justify-content:space-between;gap:10px;margin-top:20px;flex-wrap:wrap}
  .btn{background:var(--panel-2);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:10px;cursor:pointer;font-size:13.5px;transition:all .15s;font-family:inherit}
  .btn:hover{border-color:var(--orbita)}
  .btn.primary{background:linear-gradient(135deg,var(--accent-2),var(--orbita));border-color:transparent;color:#fff;font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent}
  .btn.danger{border-color:var(--bad);color:#fca5a5}
  .btn.small{padding:6px 12px;font-size:12px}
  .kv{display:grid;grid-template-columns:200px 1fr;gap:8px 14px}
  .kv .k{color:var(--text-dim);font-size:12.5px}
  .kv .v{color:var(--text);font-size:13px}
  .lesionlist{display:flex;flex-direction:column;gap:8px}
  .lesioncard{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .lesioncard .ltag{background:var(--accent-2);color:#fff;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600}
  .ddx{display:flex;flex-direction:column;gap:8px}
  .ddxrow{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
  .ddxrow .head{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .ddxrow .name{font-weight:600;color:var(--text)}
  .ddxrow .prob{font-variant-numeric:tabular-nums;color:var(--accent-3);font-weight:600}
  .bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--orbita))}
  .alert{border-left:4px solid var(--warn);background:#2a1d0b;padding:10px 14px;border-radius:6px;color:#fde68a;font-size:13px;margin-bottom:10px}
  .alert.info{border-color:var(--info);background:#0b2030;color:#bae6fd}
  .alert.bad{border-color:var(--bad);background:#2a0d0d;color:#fecaca}
  /* Rapor */
  .report{background:#fff;color:#111;padding:28px;border-radius:10px;font-family:'Times New Roman',serif;font-size:13px;line-height:1.5}
  .report h1{font-size:18px;text-align:center;margin:0 0 4px 0;letter-spacing:1px}
  .report h2{font-size:14px;margin:18px 0 6px 0;border-bottom:2px solid #111;padding-bottom:3px;color:#111}
  .report table{width:100%;border-collapse:collapse;margin:6px 0}
  .report th,.report td{padding:6px 9px;border:1px solid #ccc;text-align:left;vertical-align:top;font-size:12.5px}
  .report th{background:#e9ebf2}
  .report tr:nth-child(even) td{background:#f5f6fa}
  .report .yorum{background:#e8f5e9;border-left:5px solid #2e7d32;padding:10px 14px;margin:12px 0;border-radius:2px}
  .report .yorum b{color:#1b5e20}
  .report .kutu{border:1.5px solid #111;padding:10px 14px;margin:10px 0;border-radius:3px;background:#fafbff}
  .report .meta{font-size:11px;color:#666;text-align:right;margin-top:10px}
  .progress{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:16px}
  .progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--orbita));transition:width .3s}
  details{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-top:8px}
  details summary{cursor:pointer;font-size:12.5px;color:var(--accent-3);user-select:none}
  .muted{color:var(--text-dim);font-size:12px}
  hr.sep{border:0;border-top:1px dashed var(--border);margin:14px 0}
  .fieldgrid{display:grid;grid-template-columns:180px 1fr;gap:8px 12px;align-items:start}
  @media(max-width:720px){.fieldgrid{grid-template-columns:1fr}}
  /* Bilateral card */
  .bilat{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
  @media(max-width:720px){.bilat{grid-template-columns:1fr}}
  .eye-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .eye-box.right{border-left:4px solid var(--orbita)}
  .eye-box.left{border-left:4px solid var(--accent)}
  .eye-box .eye-title{font-size:13px;font-weight:700;letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
  .eye-box.right .eye-title{color:var(--orbita)}
  .eye-box.left .eye-title{color:var(--accent-3)}
  .muscle-row{display:grid;grid-template-columns:1fr 80px 1fr;gap:6px;align-items:center;margin-bottom:6px}
  .muscle-row label{margin-bottom:0;font-size:12px}
  .muscle-row .lbl{color:var(--text-dim);font-size:12px}
  .muscle-row input{padding:5px 8px;font-size:12px;text-align:center}
  .thickness-warn{color:var(--warn);font-size:11px;margin-top:4px}
  @media print{
    body{background:#fff}
    .noprint{display:none !important}
    .wrap{max-width:100%;padding:0}
    .report{box-shadow:none;padding:0}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo, useEffect, useRef} = React;

/* ============================================================

/* ============================================================
   UI HELPERS
============================================================ */
const Chip = ({active, onClick, children, small}) => (
  <div className={`chip${active?' active':''}${small?' small':''}`} onClick={onClick}>{children}</div>
);

const ChipGroup = ({value, options, onChange, multi}) => (
  <div className="chips">
    {options.map(opt=>{
      const v = typeof opt==='string'?opt:opt.v;
      const lbl = typeof opt==='string'?opt:opt.l;
      const active = multi ? (value||[]).includes(v) : value===v;
      return <Chip key={v} active={active} onClick={()=>{
        if(multi){
          const arr=value||[];
          onChange(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);
        } else onChange(active?'':v);
      }}>{lbl}</Chip>;
    })}
  </div>
);

const Field = ({label, children})=>(
  <div><label>{label}</label>{children}</div>
);

/* Bulbus - bir göz için değerlendirme */
const EyeBulbus = ({side, data, setData})=>(
  <div className={`eye-box ${side==='R'?'right':'left'}`}>
    <div className="eye-title">{side==='R'?'SAĞ BULBUS':'SOL BULBUS'}</div>
    <div className="fieldgrid">
      <div className="k muted">Aksiyel uzunluk (mm)</div>
      <input type="number" step="0.1" value={data.length} onChange={e=>setData({...data, length:e.target.value})} placeholder="22–24.5 (ortalama)"/>
      <div className="k muted">Boyut</div>
      <ChipGroup value={data.size} options={['Normal','Küçük (mikroftalmi/phthisis)','Büyük (miyopik, buftalmi)']} onChange={v=>setData({...data, size:v})}/>
      <div className="k muted">Şekil</div>
      <ChipGroup value={data.shape} options={['Normal','Stafilom (fokal dışa çıkıntı)','Koloboma','Deforme (rüptür)']} onChange={v=>setData({...data, shape:v})}/>
      <div className="k muted">Vitreus sinyali</div>
      <ChipGroup value={data.vitreous} options={['Homojen sıvı','T1 hiperintens (hemoraji)','T2 düşük (retinoblastoma/endoftalmi)','Heterojen','Yabancı cisim/artefakt']} onChange={v=>setData({...data, vitreous:v})}/>
      <div className="k muted">Lens</div>
      <ChipGroup value={data.lens} options={['Normal','Dislokasyon','Katarakt/hipointens','Aphakia','Yoklinik (psödofakik)']} onChange={v=>setData({...data, lens:v})}/>
      <div className="k muted">Retina</div>
      <ChipGroup value={data.retina} options={['Normal','V-şekli dekolman','Lineer membran','Subretinal sıvı','Kalınlaşma/tümör']} onChange={v=>setData({...data, retina:v})}/>
      <div className="k muted">Uvea/Koroid</div>
      <ChipGroup value={data.uvea} options={['Normal','Kalınlaşma','Kitle (T1 hiper / T2 hipo – melanin)','Efüzyon']} onChange={v=>setData({...data, uvea:v})}/>
      <div className="k muted">İntraoküler kalsifikasyon</div>

/* ============================================================
   DDx MOTORU
============================================================ */
function computeDDx(state){
  const feats = new Set();
  const addF = f => f && feats.add(f);
  
  // Klinik
  const sem = state.klinik_semptom||[];
  if(sem.includes('Proptoz')) addF('proptosis');
  if(sem.includes('Ağrı')) addF('painful');
  if(sem.includes('Ateş')) addF('fever');
  if(sem.includes('Görme kaybı')) addF('vision_loss');
  if(sem.includes('Akut görme kaybı')) addF('sudden_vision_loss');
  if(sem.includes('Diplopi')) addF('diplopia');
  if(sem.includes('Lökokori')) addF('leukocoria');
  if(sem.includes('Kemozis')) addF('chemosis');
  if(sem.includes('Penetran travma')) addF('trauma_history'), addF('post_penetrating');
  if(sem.includes('Künt travma')) addF('trauma_history');
  if(sem.includes('Sinüzit öyküsü')) addF('sinusitis_adjacent');
  if(sem.includes('Steroid yanıtı')) addF('steroid_response');
  if(sem.includes('Valsalva ile artış')) addF('valsalva_enlargement');
  if(sem.includes('Geçirilmiş göz cerrahisi')) addF('post_surgery_history');
  
  const sist = state.sistemik||[];
  if(sist.includes('Hipertiroidi/Graves')) addF('hyperthyroid');
  if(sist.includes('NF1')) addF('nf1');
  if(sist.includes('MS/demyelinizan')) addF('ms_history');
  if(sist.includes('Bilinen malignite')) addF('known_malignancy');
  if(sist.includes('IgG4 hastalığı')) addF('systemic_igg4');
  if(sist.includes('Sarkoidoz')) addF('systemic_sarcoid');
  if(sist.includes('Diabetes Mellitus')) addF('diabetes');
  
  const yas = parseInt(state.yas||'0');
  if(yas && yas<3) addF('child_under3');
  if(yas && yas<18) addF('child'), addF('child_young');
  if(yas>=18 && yas<40) addF('young_adult'), addF('adult');
  if(yas>=40 && yas<65) addF('adult');
  if(yas>=30 && yas<=55) addF('female_mid_age');
  if(yas>65) addF('elderly'), addF('adult');
  if(yas>20 && state.cinsiyet==='Kadın') addF('adult_female');
  
  // EOM paternler
  const eoms = [
    ['ir', state.ir_R, state.ir_L],
    ['mr', state.mr_R, state.mr_L],
    ['sr', state.sr_R, state.sr_L],
    ['lr', state.lr_R, state.lr_L],
    ['so', state.so_R, state.so_L],
  ];
  let bilatEomThick=0, unilatEomThick=0;
  let inferior_medial=0, sup_lat=0;
  eoms.forEach(([n,r,l])=>{
    const R = parseFloat(r)>4.5, L = parseFloat(l)>4.5;
    if(R && L) bilatEomThick++;
    else if(R || L) unilatEomThick++;
    if(R||L){
      if(n==='ir'||n==='mr') inferior_medial++;
      if(n==='sr'||n==='lr') sup_lat++;
    }
  });
  if(bilatEomThick>=2) addF('bilateral_eom');
  if(unilatEomThick>=1 && bilatEomThick<=1) addF('unilateral_eom');
  if(inferior_medial>=1 && inferior_medial>=sup_lat) addF('inferior_medial_pattern');
  if(state.eom_tendon==='Tendon korunmuş (belly involvement)') addF('tendon_spared');
  if(state.eom_tendon==='Tendon tutulumu (+)') addF('tendon_involved');
  if(state.eom_signal==='T2 düşük (fibrozis)') addF('t2_low_fibrosis');
  if(state.eom_enhancement==='Belirgin tutulum') addF('enhancement');
  if(state.eom_pattern==='Kitle gibi kas infiltrasyonu') addF('eom_mass');
  
  // Proptoz
  const pr = parseFloat(state.proptoz_R||0), pl = parseFloat(state.proptoz_L||0);
  if(pr>21 || pl>21) addF('proptosis');
  
  // Retroorbital yağ
  if(state.fat_R==='Artmış' || state.fat_L==='Artmış') addF('retroorbital_fat_prolif');
  if(state.fat_infiltration==='Postseptal yağ strandingi') addF('postseptal_edema'), addF('fat_stranding');
  if(state.fat_infiltration==='Preseptal yumuşak doku ödemi') addF('preseptal_edema'), addF('eyelid_swelling');
  
  // Optik sinir
  if(state.on_signal==='T2 hiperintens') addF('nerve_t2_high'), addF('t2_high_nerve');
  if(state.on_enhancement==='Tutulum (+)') addF('nerve_enhancement');
  if(state.on_enhancement==='Tram-track paterni') addF('tram_track'), addF('strong_enhancement'), addF('perineural'), addF('tubular_thickening');
  if(state.on_R==='Fuziform kalınlaşma' || state.on_L==='Fuziform kalınlaşma') addF('fusiform_nerve_enlargement');
  if(state.on_course==='Kink/ektazi') addF('kink_dural_ectasia');
  if(parseFloat(state.on_thickness_R)>5 || parseFloat(state.on_thickness_L)>5) addF('tubular_thickening');
  
  // Lakrimal bez
  if(state.lac_R==='Büyük (kitle)' || state.lac_L==='Büyük (kitle)') addF('lacrimal_enlarged'), addF('lacrimal_mass');
  if(state.lac_bilateral_finding==='Bilateral büyüme') addF('bilateral_lacrimal'), addF('bilateral_possible');
  if(state.lac_enhancement==='Heterojen') addF('heterogenous_enhancement');
  
  // Kemik / duvarlar
  if(state.fracture==='Var') addF('bone_disruption'), addF('trauma_history');
  const fw = state.fracture_wall||[];
  if(fw.includes('İnferior (floor)')) addF('inferior_floor');
  if(fw.includes('Medial (lamina papyracea)')) addF('medial_lamina');
  if(state.herniation==='Var') addF('herniation');
  if(state.bone_lesion==='Hiperostoz') addF('hyperostosis'), addF('en_plaque');
  if(state.bone_lesion==='Ground-glass') addF('ground_glass_bone'), addF('bone_expansion'), addF('no_destruction');
  if(state.bone_lesion==='Litik/destrüktif') addF('bone_destruction'), addF('bone_lesion');
  if(state.bone_lesion==='Erozyon + kitle') addF('bone_destruction'), addF('orbit_invasion');
  
  // Vasküler
  if(state.soph_vein_R==='Dilate' || state.soph_vein_L==='Dilate') addF('superior_ophthalmic_v_dilated');
  if(state.cav_sinus==='Genişlemiş') addF('cavernous_sinus_enlarged');
  if(state.vascular_note && state.vascular_note.toLowerCase().includes('flow void')) addF('flow_voids');
  
  // Sinüsler
  if(state.sinus_status==='Komşu sinüzit') addF('sinusitis_adjacent');
  if(state.sinus_status==='Sinüs kitle/mukosel') addF('sinus_expansion'), addF('sinus_mass_primary'), addF('frontal_ethmoid');
  
  // Bulbus
  const bR = state.bulbus_R, bL = state.bulbus_L;
  [bR,bL].forEach(b=>{
    if(!b) return;
    if(b.size==='Küçük (mikroftalmi/phthisis)') addF('globe_small'), addF('deformed_globe'), addF('volume_loss');
    if(b.shape==='Deforme (rüptür)') addF('globe_deformity'), addF('volume_loss');
    if(b.shape==='Stafilom (fokal dışa çıkıntı)' || b.shape==='Koloboma') addF('focal_outpouching'), addF('congenital'), addF('posterior_globe');
    if(b.vitreous==='T2 düşük (retinoblastoma/endoftalmi)') addF('vitreous_t2_low'), addF('t2_low');
    if(b.vitreous==='T1 hiperintens (hemoraji)') addF('vitreous_t1_high'), addF('vitreous_t2_variable');
    if(b.vitreous==='Yabancı cisim/artefakt') addF('signal_void_metallic'), addF('artifact');
    if(b.retina==='V-şekli dekolman') addF('v_shape_subretinal');
    if(b.retina==='Lineer membran') addF('linear_membrane');
    if(b.retina==='Subretinal sıvı') addF('retinal_detachment_assoc');
    if(b.retina==='Kalınlaşma/tümör') addF('intraocular_mass'), addF('globe_choroid_mass');
    if(b.uvea==='Kitle (T1 hiper / T2 hipo – melanin)') addF('t1_high_melanin'), addF('t2_low_melanin'), addF('mushroom_shape'), addF('intraocular_mass');
    if(b.uvea==='Kalınlaşma') addF('uveal_thickening');
    if(b.calcif==='Var') addF('calcification_intraocular');
  });
  if(state.vision_status==='Akut kaybı var') addF('sudden_vision_loss'), addF('vision_loss');
  if(state.vision_status==='Kronik azalmış') addF('vision_loss');
  
  // Lezyonlardan
  (state.lesions||[]).forEach(L=>{
    if(L.t1==='Hiperintens (yağ)') addF('fat_signal'), addF('t1_high_fat');
    if(L.t1==='Hiperintens (melanin/hemoraji)') addF('t1_high_melanin');
    if(L.t2==='Çok hiperintens (su)') addF('t2_very_high'), addF('t2_high');
    if(L.t2==='Hiperintens') addF('t2_high');
    if(L.t2==='Düşük (melanin/fibröz)') addF('t2_low'), addF('t2_low_fibrosis'), addF('t2_low_melanin');
    if(L.t2==='Target sign') addF('t2_target');
    if(L.dwi==='Kısıtlanma var') addF('dwi_restrict');
    if(L.adc==='Düşük') addF('adc_low');
    if(L.kontrast==='Belirgin') addF('enhancement');
    if(L.kontrast==='Progresif dolum') addF('progressive_enhancement');
    if(L.kontrast==='Hızlı yoğun') addF('rapid_enhancement');
    if(L.kontrast==='Yok/minimal') addF('no_enhancement'), addF('no_enhancement_variable');
    if(L.kontrast_patern==='Rim/halka') addF('rim_enhancement');
    if(L.kontrast_patern==='Homojen') addF('homogeneous');
    if(L.kontrast_patern==='Heterojen') addF('heterogenous_enhancement');
    if(L.compartment==='İntrakonal') addF('intraconal');
    if(L.compartment==='Ekstrakonal') addF('extraconal'), addF('extraconal_mass');
    if(L.compartment==='Preseptal') addF('eyelid_extraconal');
    if(L.compartment==='Lakrimal fossa') addF('lacrimal_mass');
    if(L.localization==='Superolateral') addF('superotemporal');
    if(L.localization==='Superior') addF('superior_orbit'), addF('superior_medial');
    if(L.localization==='Medial') addF('medial_wall_location'), addF('superior_medial');
    if(L.localization==='İnferior') addF('inferior_floor');
    if(L.localization==='Lateral') addF('lateral_orbit');
    if(L.margins==='Keskin/iyi sınırlı') addF('well_defined');
    if(L.margins==='İnfiltratif') addF('infiltrative');
    if(L.morphology==='Fuziform (sinir boyunca)') addF('along_nerve_branch'), addF('fusiform');
    if((L.features||[]).includes('Flow void')) addF('flow_voids'), addF('high_flow');
    if((L.features||[]).includes('Flebolit')) addF('phleboliths');
    if((L.features||[]).includes('Sıvı-sıvı seviyesi')) addF('fluid_levels'), addF('multiloculated'), addF('hemorrhage');
    if((L.features||[]).includes('Kalsifikasyon')) addF('calcification');
    if((L.features||[]).includes('Yapıları gibi şekillenen (molding)')) addF('molds_to_structure');
    if((L.features||[]).includes('Hızlı büyüme')) addF('rapid_growth');
    if((L.features||[]).includes('Kemik invazyonu/destrüksiyon')) addF('bone_destruction');
    if((L.features||[]).includes('İnfraorbital sinir büyümesi')) addF('infraorbital_nerve_enlarged');
    if((L.features||[]).includes('Perinöral yayılım')) addF('perineural_spread'), addF('perineural');
    if((L.features||[]).includes('Çoklu bağ dokusu/septalı')) addF('multiloculated');
    
    const sz = Math.max(parseFloat(L.boyut_ap||0),parseFloat(L.boyut_ml||0),parseFloat(L.boyut_cc||0));
    if(sz>=2) addF('extraocular_mass');
  });
  
  // Globe-displacing heuristic
  if(feats.has('rim_enhancement') && feats.has('sinusitis_adjacent')) addF('displacing_globe'), addF('globe_enhancement');
  if(feats.has('vitreous_t2_low') && feats.has('post_surgery_history')) addF('globe_enhancement');
  
  // MS kontekstinde optik nevrit
  if(feats.has('ms_history') && feats.has('nerve_t2_high')) addF('nerve_enhancement');
  
  // Unilateral
  if((feats.has('unilateral_eom') || parseFloat(state.on_thickness_R)>5 || parseFloat(state.on_thickness_L)>5) && !feats.has('bilateral_eom')) addF('unilateral');
  
  // Skorlama
  const scored = PATHOLOGIES.map(p=>{
    let total=0, maxPossible=0, matched=[];
    Object.entries(p.weights).forEach(([k,w])=>{
      maxPossible += w;
      if(feats.has(k)){ total += w; matched.push(k); }
    });
    const pct = maxPossible>0 ? Math.round((total/maxPossible)*100) : 0;
    return {...p, score:total, maxPossible, pct, matched};
  });
  return scored.filter(s=>s.score>0).sort((a,b)=>b.score-a.score).slice(0,10);
}

/* ============================================================
   ANA APP
============================================================ */
function App(){
  const [s,setS] = useState(initState());
  const [stepIdx,setStepIdx] = useState(0);
  const reportRef = useRef(null);
  
  const upd = (patch)=>setS(prev=>({...prev,...patch}));
  const step = STEPS[stepIdx].key;
  const progress = Math.round(((stepIdx+1)/STEPS.length)*100);
  
  // 3-parça lezyon loop düzeltmesi
  const goNext = ()=>{
    if(step==='lezyonPre'){
      if(s.lezyon_var==='Hayır' || !s.lezyon_var){
        setStepIdx(STEPS.findIndex(x=>x.key==='ddx'));
        return;
      }
      if((s.lesions||[]).length===0){
        const nl = emptyLesion();
        setS(prev=>({...prev, lesions:[nl], currentIdx:0}));
      } else {
        setS(prev=>({...prev, currentIdx:0}));
      }
      setStepIdx(STEPS.findIndex(x=>x.key==='lezyon'));
      return;
    }
    setStepIdx(Math.min(stepIdx+1, STEPS.length-1));
  };
  
  const goPrev = ()=>{
    if(step==='ddx'){
      setStepIdx(STEPS.findIndex(x=>x.key==='lezyonPre'));
      return;
    }
    setStepIdx(Math.max(0, stepIdx-1));
  };
  
  const addLesion = ()=>{
    const nl = emptyLesion();
    setS(prev=>({...prev, lesions:[...(prev.lesions||[]), nl], currentIdx:(prev.lesions||[]).length}));
  };
  
  const removeLesion = (i)=>{
    const newLes = s.lesions.filter((_,idx)=>idx!==i);
    const newIdx = newLes.length===0 ? -1 : Math.min(s.currentIdx, newLes.length-1);
    setS(prev=>({...prev, lesions:newLes, currentIdx:newIdx}));
  };
  
  const updateCurrentLesion = (patch)=>{
    setS(prev=>{
      const newLes=[...prev.lesions];
      newLes[prev.currentIdx] = {...newLes[prev.currentIdx], ...patch};
      return {...prev, lesions:newLes};
    });
  };
  
  const finalizeLesionStep = ()=>{
    setS(prev=>({...prev, currentIdx:-1}));
    setStepIdx(STEPS.findIndex(x=>x.key==='ddx'));
  };
  
  const ddx = useMemo(()=>computeDDx(s),[s]);
  
  /* ============ ADIMLAR ============ */
  const renderPatient = ()=>(
    <div className="card">
      <h2>Hasta ve Klinik Bilgiler</h2>

        <Field label="Ad Soyad"><input type="text" value={s.ad_soyad} onChange={e=>upd({ad_soyad:e.target.value})}/></Field>
        <Field label="Yaş"><input type="number" value={s.yas} onChange={e=>upd({yas:e.target.value})}/></Field>
        <Field label="Cinsiyet"><ChipGroup value={s.cinsiyet} options={['Kadın','Erkek']} onChange={v=>upd({cinsiyet:v})}/></Field>
        <Field label="Taraf"><ChipGroup value={s.taraf} options={['Sağ','Sol','Bilateral']} onChange={v=>upd({taraf:v})}/></Field>
        <Field label="Protokol No"><input type="text" value={s.protokol_no} onChange={e=>upd({protokol_no:e.target.value})}/></Field>
      </div>
      <hr className="sep"/>
      <Field label="Klinik Semptom (çoklu)">
        <ChipGroup multi value={s.klinik_semptom} options={[
          'Proptoz','Ağrı','Ateş','Görme kaybı','Akut görme kaybı','Diplopi','Lökokori','Kemozis',
          'Künt travma','Penetran travma','Sinüzit öyküsü','Eyelid şişliği','Epifora','Kısıtlı göz hareketi',
          'Steroid yanıtı','Valsalva ile artış','Geçirilmiş göz cerrahisi'
        ]} onChange={v=>upd({klinik_semptom:v})}/>
      </Field>
      <div className="grid" style={{marginTop:10}}>
        <Field label="Kronisite"><ChipGroup value={s.kronisite} options={['Akut (<72 sa)','Subakut (3 gün–3 hafta)','Kronik (>3 hafta)','Konjenital']} onChange={v=>upd({kronisite:v})}/></Field>
        <Field label="Görme durumu"><ChipGroup value={s.vision_status} options={['Normal','Kronik azalmış','Akut kaybı var']} onChange={v=>upd({vision_status:v})}/></Field>
      </div>
      <Field label="Sistemik / komorbid (çoklu)">
        <ChipGroup multi value={s.sistemik} options={[

          'Sarkoidoz','Diabetes Mellitus','İmmünosupresyon','Koagülopati'

        <Field label="Kontrastlanma"><ChipGroup value={s.on_enhancement} options={['Yok','Tutulum (+)','Tram-track paterni','Fuziform diffüz']} onChange={v=>upd({on_enhancement:v})}/></Field>

        </div>
        <div className="eye-box left">
          <div className="eye-title">SOL LAKRİMAL BEZ</div>
          <Field label="Boyut"><ChipGroup value={s.lac_L} options={['Normal','Hafif büyük','Büyük (kitle)','Atrofik']} onChange={v=>upd({lac_L:v})}/></Field>
        </div>
      </div>
      <div className="grid">

        <Field label="Kontrastlanma"><ChipGroup value={s.lac_enhancement} options={['Normal','Homojen','Heterojen','Periferik rim']} onChange={v=>upd({lac_enhancement:v})}/></Field>

      </div>

        <Field label="Medial duvar"><ChipGroup value={s.wall_medial} options={['İntakt','Fraktür','İnflamasyon','Mukosel basısı']} onChange={v=>upd({wall_medial:v})}/></Field>

        <Field label="Taban (floor)"><ChipGroup value={s.wall_floor} options={['İntakt','Fraktür','Blow-out','Maksiller sinüs kaynaklı itilme']} onChange={v=>upd({wall_floor:v})}/></Field>

      ]} onChange={v=>upd({sinus_status:v})}/></Field>

      <h2>Lezyon Kontrolü</h2>
      <Field label="Diskret lezyon / kitle var mı?">

  const renderLezyon = ()=>{
    const idx = s.currentIdx;
    if(idx<0 || !s.lesions[idx]) return <div className="card"><div className="alert bad">Lezyon bulunamadı.</div></div>;

      <div className="card">

        <div className="hint">Her lezyonu ayrıntılı karakterize edin.</div>
        <div className="grid-2">
          <Field label="Lezyon adı/etiketi"><input type="text" value={L.ad} onChange={e=>updateCurrentLesion({ad:e.target.value})} placeholder="örn. L1 – intrakonal kitle"/></Field>
          <Field label="Köken doku"><ChipGroup value={L.origin} options={['Kas','Sinir','Damar','Lakrimal bez','Yağ dokusu','Bulbus/intraoküler','Kemik','Subkutan','Kitle (spesifik değil)']} onChange={v=>updateCurrentLesion({origin:v})}/></Field>
          <Field label="Kompartman"><ChipGroup value={L.compartment} options={['İntrakonal','Ekstrakonal','Konikal','Preseptal','Lakrimal fossa','İntraoküler','Kemik/duvar']} onChange={v=>updateCurrentLesion({compartment:v})}/></Field>
          <Field label="Lokalizasyon (saat yönü)"><ChipGroup value={L.localization} options={['Superior','İnferior','Medial','Lateral','Superomedial','Superolateral','İnferomedial','İnferolateral','Santral']} onChange={v=>updateCurrentLesion({localization:v})}/></Field>
          <Field label="Taraf"><ChipGroup value={L.side} options={['Sağ','Sol','Bilateral']} onChange={v=>updateCurrentLesion({side:v})}/></Field>

          <Field label="Transvers"><input type="number" value={L.boyut_ml} onChange={e=>updateCurrentLesion({boyut_ml:e.target.value})}/></Field>
          <Field label="Kraniokaudal"><input type="number" value={L.boyut_cc} onChange={e=>updateCurrentLesion({boyut_cc:e.target.value})}/></Field>

        <hr className="sep"/>

        <div className="grid-2">
          <Field label="T1"><ChipGroup value={L.t1} options={['Hipointens','İzointens','Hiperintens (yağ)','Hiperintens (melanin/hemoraji)','Heterojen']} onChange={v=>updateCurrentLesion({t1:v})}/></Field>
          <Field label="T2"><ChipGroup value={L.t2} options={['Hipointens','İzointens','Hiperintens','Çok hiperintens (su)','Düşük (melanin/fibröz)','Heterojen','Target sign']} onChange={v=>updateCurrentLesion({t2:v})}/></Field>
          <Field label="DWI (b1000)"><ChipGroup value={L.dwi} options={['Kısıtlanma yok','Kısıtlanma var','Değerlendirilemedi']} onChange={v=>updateCurrentLesion({dwi:v})}/></Field>
          <Field label="ADC"><ChipGroup value={L.adc} options={['Yüksek','Orta','Düşük','Değerlendirilemedi']} onChange={v=>updateCurrentLesion({adc:v})}/></Field>

        </div>
        <hr className="sep"/>

          <Field label="Morfoloji"><ChipGroup value={L.morphology} options={['Yuvarlak/oval','Lobüle','Fuziform (sinir boyunca)','İnfiltratif','İrregüler','Mushroom']} onChange={v=>updateCurrentLesion({morphology:v})}/></Field>
          <Field label="Sınırlar"><ChipGroup value={L.margins} options={['Keskin/iyi sınırlı','Düzensiz','İnfiltratif','Kapsüllü']} onChange={v=>updateCurrentLesion({margins:v})}/></Field>

      <h2>Weighted DDx Motoru</h2>
      <div className="hint">Klinik + anatomik kompartman bulguları + EOM paternleri + optik sinir + lezyon özellikleri ağırlıklı skorlanır.</div>
      {ddx.length===0 ? <div className="alert info">Henüz ayırıcı tanıyı şekillendirecek anlamlı bulgu yok.</div> :
        <div className="ddx">
          {ddx.map((d,i)=>(
            <div key={d.id} className="ddxrow">
              <div className="head">
                <div><b style={{color:i===0?'var(--orbita)':'var(--text)'}}>#{i+1} {d.name}</b> <span className="muted">— {d.category}</span></div>
                <div className="prob">{d.score} puan · %{d.pct}</div>
              </div>
              <div className="bar"><span style={{width:`${Math.min(100,d.pct)}%`}}/></div>
              <details><summary>Eşleşen özellikler ({d.matched.length})</summary>
                <div className="muted" style={{marginTop:6,fontSize:11.5}}>{d.matched.join(', ')}</div>
              </details>
            </div>
          ))}
        </div>
      }
    </div>
  );
  
  const renderEk = ()=>(
    <div className="card">
      <h2>Ek Bulgular ve Öneriler</h2>
      <Field label="Ek bulgular"><textarea value={s.ek_bulgular} onChange={e=>upd({ek_bulgular:e.target.value})} placeholder="İntrakranyal uzanım, komşu yapılarda patoloji..."/></Field>
      <Field label="Öneri / Ek inceleme"><textarea value={s.oneri} onChange={e=>upd({oneri:e.target.value})} placeholder="Orbital BT, MR anjiyografi, oftalmoloji konsültasyonu, biyopsi..."/></Field>
    </div>
  );
  
  /* ============ RAPOR ============ */
  const renderReport = ()=>{
    // Başlık
    const header = [];
    header.push({k:'Hasta', v:`${s.ad_soyad||'-'} (${s.yas||'-'} / ${s.cinsiyet||'-'})`});
    header.push({k:'Taraf', v:s.taraf||'-'});
    header.push({k:'İnceleme', v:'Orbita MR'});
    header.push({k:'Sekanslar', v:(s.sekanslar||[]).join(', ')});
    header.push({k:'IV Kontrast', v:s.kontrast_var==='Evet'?`Verildi (${s.kontrast_madde||'Gd-bazlı'})`:'Verilmedi'});
    
    // Bulbus
    const bulbus = [];
    const bdesc = (b, sd)=>{
      const parts=[];
      if(b.length) parts.push(`aksiyel uzunluk ${b.length} mm`);
      if(b.size && b.size!=='Normal') parts.push(b.size);
      if(b.shape && b.shape!=='Normal') parts.push(`şekil: ${b.shape}`);
      if(b.vitreous && b.vitreous!=='Homojen sıvı') parts.push(`vitreus: ${b.vitreous}`);
      if(b.lens && b.lens!=='Normal') parts.push(`lens: ${b.lens}`);
      if(b.retina && b.retina!=='Normal') parts.push(`retina: ${b.retina}`);
      if(b.uvea && b.uvea!=='Normal') parts.push(`uvea: ${b.uvea}`);
      if(b.calcif==='Var') parts.push('intraoküler kalsifikasyon (+)');
      if(parts.length) return `${sd} bulbus: ${parts.join('; ')}.`;
      return `${sd} bulbus olağan boyut, şekil, sinyal özelliğindedir.`;
    };
    bulbus.push(bdesc(s.bulbus_R, 'Sağ'));
    bulbus.push(bdesc(s.bulbus_L, 'Sol'));
    
    // Proptoz
    const proptoz = [];
    if(s.proptoz_R) proptoz.push(`Sağ: ${s.proptoz_R} mm${parseFloat(s.proptoz_R)>23?' (belirgin proptoz)':parseFloat(s.proptoz_R)>21?' (sınırda)':''}`);
    if(s.proptoz_L) proptoz.push(`Sol: ${s.proptoz_L} mm${parseFloat(s.proptoz_L)>23?' (belirgin proptoz)':parseFloat(s.proptoz_L)>21?' (sınırda)':''}`);
    if(s.proptoz_note) proptoz.push(s.proptoz_note);
    if(proptoz.length===0) proptoz.push('Bilateral proptoz ölçümleri normal sınırlardadır (≤21 mm).');
    
    // EOM tablosu
    const eomRows = [
      ['Inferior rectus', s.ir_R, s.ir_L],
      ['Medial rectus', s.mr_R, s.mr_L],
      ['Superior rectus', s.sr_R, s.sr_L],
      ['Lateral rectus', s.lr_R, s.lr_L],
      ['Superior oblique', s.so_R, s.so_L],
      ['Levator palpebrae', s.lps_R, s.lps_L],
    ];
    const eomNotes = [];
    if(s.eom_pattern && s.eom_pattern!=='Yok') eomNotes.push(`Kalınlaşma paterni: ${s.eom_pattern}`);
    if(s.eom_tendon) eomNotes.push(`Tendon: ${s.eom_tendon}`);
    if(s.eom_signal && s.eom_signal!=='Normal') eomNotes.push(`Sinyal: ${s.eom_signal}`);
    if(s.eom_enhancement && s.eom_enhancement!=='Yok/minimal') eomNotes.push(`Kontrastlanma: ${s.eom_enhancement}`);
    
    // Retroorbital yağ
    const fatItems = [];
    if(s.fat_R && s.fat_R!=='Normal') fatItems.push(`Sağ retroorbital yağ: ${s.fat_R}.`);
    if(s.fat_L && s.fat_L!=='Normal') fatItems.push(`Sol retroorbital yağ: ${s.fat_L}.`);
    if(s.fat_infiltration && s.fat_infiltration!=='Yok') fatItems.push(`İnfiltrasyon: ${s.fat_infiltration}.`);
    if(s.fat_mass && s.fat_mass!=='Yok') fatItems.push(`Yağ içinde kitle: ${s.fat_mass}.`);
    if(fatItems.length===0) fatItems.push('Retroorbital yağ dokusu olağan sinyal ve volümdedir.');
    
    // Optik sinir
    const onItems = [];
    const ondesc = (a, thk, sd)=>{
      const parts=[];
      if(a && a!=='Normal') parts.push(a);
      if(thk) parts.push(`çap ${thk} mm`);
      if(parts.length) return `${sd} optik sinir: ${parts.join(', ')}.`;
      return null;
    };
    const onR = ondesc(s.on_R, s.on_thickness_R, 'Sağ'); if(onR) onItems.push(onR);
    const onL = ondesc(s.on_L, s.on_thickness_L, 'Sol'); if(onL) onItems.push(onL);
    if(s.on_signal && s.on_signal!=='Normal') onItems.push(`Sinyal: ${s.on_signal}.`);
    if(s.on_enhancement && s.on_enhancement!=='Yok') onItems.push(`Kontrastlanma: ${s.on_enhancement}.`);
    if(s.on_sheath && s.on_sheath!=='Normal') onItems.push(`Kılıf: ${s.on_sheath}.`);
    if(s.on_course && s.on_course!=='Düz') onItems.push(`Seyir: ${s.on_course}.`);
    if(onItems.length===0) onItems.push('Bilateral optik sinirler olağan kaliber, sinyal ve seyir özelliğindedir; kılıfları doğaldır.');
    
    // Lakrimal bez
    const lacItems = [];
    if(s.lac_R && s.lac_R!=='Normal') lacItems.push(`Sağ lakrimal bez: ${s.lac_R}.`);
    if(s.lac_L && s.lac_L!=='Normal') lacItems.push(`Sol lakrimal bez: ${s.lac_L}.`);
    if(s.lac_signal && s.lac_signal!=='Normal') lacItems.push(`Sinyal: ${s.lac_signal}.`);
    if(s.lac_enhancement && s.lac_enhancement!=='Normal') lacItems.push(`Kontrastlanma: ${s.lac_enhancement}.`);
    if(s.lac_bilateral_finding && s.lac_bilateral_finding!=='Yok') lacItems.push(s.lac_bilateral_finding);
    if(lacItems.length===0) lacItems.push('Bilateral lakrimal bezler normal boyut ve sinyal özelliğindedir.');
    
    // Kemik
    const kItems = [];
    if(s.wall_medial && s.wall_medial!=='İntakt') kItems.push(`Medial duvar: ${s.wall_medial}.`);
    if(s.wall_lateral && s.wall_lateral!=='İntakt') kItems.push(`Lateral duvar: ${s.wall_lateral}.`);
    if(s.wall_roof && s.wall_roof!=='İntakt') kItems.push(`Tavan: ${s.wall_roof}.`);
    if(s.wall_floor && s.wall_floor!=='İntakt') kItems.push(`Taban: ${s.wall_floor}.`);
    if(s.fracture==='Var') kItems.push(`Fraktür (+): ${(s.fracture_wall||[]).join(', ')}.`);
    if(s.herniation && s.herniation!=='Yok') kItems.push(`Herniasyon: ${s.herniation}.`);
    if(s.bone_lesion && s.bone_lesion!=='Yok') kItems.push(`Kemik lezyonu: ${s.bone_lesion}.`);
    if(kItems.length===0) kItems.push('Orbital duvarlar intakttır; kemik lezyonu saptanmadı.');
    
    // Vasküler
    const vItems = [];
    if(s.soph_vein_R && s.soph_vein_R!=='Normal') vItems.push(`Sağ süperior oftalmik ven: ${s.soph_vein_R}.`);
    if(s.soph_vein_L && s.soph_vein_L!=='Normal') vItems.push(`Sol süperior oftalmik ven: ${s.soph_vein_L}.`);
    if(s.cav_sinus && s.cav_sinus!=='Normal') vItems.push(`Kavernöz sinüs: ${s.cav_sinus}.`);
    if(s.vascular_note) vItems.push(s.vascular_note);
    if(vItems.length===0) vItems.push('İzlenen vasküler yapılar olağandır.');
    
    // Sinüsler
    const sinusItem = s.sinus_status==='Normal'?'Paranazal sinüslerde patolojik bulgu saptanmadı.':
                      s.sinus_status?`Paranazal sinüs bulgusu: ${s.sinus_status}.`:'Paranazal sinüsler değerlendirilmedi.';
    
    // Lezyonlar
    const lesionRows = (s.lesions||[]).map((L,i)=>{
      const sz = [L.boyut_ap,L.boyut_ml,L.boyut_cc].filter(x=>x).join(' × ');
      return {
        no:i+1,
        ad:L.ad||`Lezyon ${i+1}`,
        loc:`${L.compartment||'?'}/${L.localization||'?'}${L.side?` (${L.side})`:''}`,
        origin:L.origin||'-',
        boyut:sz?`${sz} mm`:'-',
        sinyal:`T1: ${L.t1||'-'} | T2: ${L.t2||'-'}`,
        dwi_adc: `${L.dwi||'-'}${L.adc?` / ADC ${L.adc}`:''}${L.adc_value?` (${L.adc_value})`:''}`,
        kontrast: `${L.kontrast||'-'}${L.kontrast_patern?` (${L.kontrast_patern})`:''}`,
        morf: [L.morphology,L.margins].filter(Boolean).join(', ')||'-',
      };
    });
    
    const top = ddx[0];
    const yorum = top ? 
      `Bulgular ağırlıklı skorlama modelinde ${top.name.toUpperCase()} lehine değerlendirilmiştir (%${top.pct}).${ddx[1]?` İkincil ayırıcı tanıda ${ddx[1].name} yer almaktadır.`:''}`
      : 'Orbita MR incelemesinde patolojik bulgu saptanmamıştır.';
    
    return (
      <div className="card">
        <h2>Rapor</h2>
        <div className="hint">Yazdır, PDF yap, panoya kopyala veya HTML olarak indir.</div>
        <div className="row noprint" style={{marginBottom:14,flexWrap:'wrap'}}>
          <button className="btn" onClick={doPrint}>🖨 Yazdır / PDF</button>
          <button className="btn" onClick={doCopyRich}>📋 Panoya kopyala (zengin metin)</button>
          <button className="btn" onClick={doDownloadHtml}>⬇ HTML indir</button>
          <button className="btn" onClick={doCopyText}>Düz metin</button>
        </div>
        
        <div className="report" ref={reportRef}>
          <h1>ORBİTA MR İNCELEMESİ</h1>
          <table><tbody>{header.map((r,i)=><tr key={i}><th style={{width:180}}>{r.k}</th><td>{r.v}</td></tr>)}</tbody></table>
          
          <h2>KLİNİK</h2>
          <div className="kutu">
            {(s.klinik_semptom||[]).length>0 && <div><b>Semptomlar:</b> {s.klinik_semptom.join(', ')}.</div>}
            {s.kronisite && <div><b>Süre:</b> {s.kronisite}.</div>}
            {s.vision_status && <div><b>Görme:</b> {s.vision_status}.</div>}
            {(s.sistemik||[]).length>0 && <div><b>Sistemik:</b> {s.sistemik.join(', ')}.</div>}
            {s.klinik_not && <div><b>Not:</b> {s.klinik_not}</div>}
          </div>
          
          <h2>BULBUS OCULI</h2>
          <table><tbody>{bulbus.map((x,i)=><tr key={i}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>PROPTOZ</h2>
          <table><tbody>{proptoz.map((x,i)=><tr key={i}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>EKSTRAOKÜLER KAS KALINLIKLARI (mm)</h2>
          <table>
            <thead><tr><th>Kas</th><th>Sağ</th><th>Sol</th><th>Değerlendirme</th></tr></thead>
            <tbody>
              {eomRows.map((r,i)=>{
                const R=parseFloat(r[1]), L=parseFloat(r[2]);
                const note = (R>4.5||L>4.5)?(R>4.5&&L>4.5?'Bilateral kalınlaşmış':R>4.5?'Sağ kalınlaşmış':'Sol kalınlaşmış'):'Normal';
                return <tr key={i}><td>{r[0]}</td><td>{r[1]||'-'}</td><td>{r[2]||'-'}</td><td>{note}</td></tr>;
              })}
            </tbody>
          </table>
          {eomNotes.length>0 && <div className="kutu">{eomNotes.map((n,i)=><div key={i}>{n}</div>)}</div>}
          
          <h2>RETROORBİTAL YAĞ DOKUSU</h2>
          <table><tbody>{fatItems.map((x,i)=><tr key={i}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>OPTİK SİNİR</h2>
          <table><tbody>{onItems.map((x,i)=><tr key={i}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>LAKRİMAL BEZ</h2>
          <table><tbody>{lacItems.map((x,i)=><tr key={i}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>KEMİK DUVARLAR</h2>
          <table><tbody>{kItems.map((x,i)=><tr key={i}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>VASKÜLER YAPILAR</h2>
          <table><tbody>{vItems.map((x,i)=><tr key={i}><td>{x}</td></tr>)}</tbody></table>
          
          <h2>KOMŞU PARANAZAL SİNÜSLER</h2>
          <table><tbody><tr><td>{sinusItem}</td></tr></tbody></table>
          
          {lesionRows.length>0 && <>
            <h2>LEZYON LİSTESİ</h2>
            <table>
              <thead><tr>
                <th>#</th><th>Ad / Köken</th><th>Yerleşim</th><th>Boyut</th>
                <th>Sinyal (T1/T2)</th><th>DWI · ADC</th><th>Kontrast</th><th>Morfoloji</th>
              </tr></thead>
              <tbody>
                {lesionRows.map(r=>(
                  <tr key={r.no}>
                    <td>{r.no}</td>
                    <td><b>{r.ad}</b><br/><span style={{fontSize:11,color:'#666'}}>{r.origin}</span></td>
                    <td>{r.loc}</td>
                    <td>{r.boyut}</td>
                    <td>{r.sinyal}</td>
                    <td>{r.dwi_adc}</td>
                    <td>{r.kontrast}</td>
                    <td>{r.morf}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </>}
          
          {ddx.length>0 && <>
            <h2>AYIRICI TANI (WEIGHTED)</h2>
            <table>
              <thead><tr><th>#</th><th>Patoloji</th><th>Kategori</th><th>Puan</th><th>Olasılık</th></tr></thead>
              <tbody>
                {ddx.slice(0,5).map((d,i)=>(
                  <tr key={d.id}><td>{i+1}</td><td><b>{d.name}</b></td><td>{d.category}</td><td>{d.score}</td><td>%{d.pct}</td></tr>
                ))}
              </tbody>
            </table>
          </>}
          
          <div className="yorum">
            <b>YORUM:</b> {yorum}
            {s.oneri && <div style={{marginTop:6}}><b>Öneri:</b> {s.oneri}</div>}
            {s.ek_bulgular && <div style={{marginTop:6}}><b>Ek bulgular:</b> {s.ek_bulgular}</div>}
          </div>
          
          <div className="meta">Rapor tarihi: {new Date().toLocaleDateString('tr-TR')} — Orbita MR Karar Destek Sistemi</div>
        </div>
      </div>
    );
  };
  
  /* ============ EXPORT ============ */
  const doPrint = ()=>{
    const rep = reportRef.current; if(!rep) return;
    const overlay = document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:#fff;z-index:99999;overflow:auto;padding:24px';
    const close=document.createElement('button');
    close.textContent='Kapat'; close.className='noprint';
    close.style.cssText='position:fixed;top:12px;right:12px;padding:8px 14px;background:#ef4444;color:#fff;border:0;border-radius:6px;cursor:pointer;z-index:100000';
    close.onclick=()=>document.body.removeChild(overlay);
    overlay.appendChild(close);
    const cl = rep.cloneNode(true);
    cl.style.maxWidth='900px'; cl.style.margin='0 auto';
    overlay.appendChild(cl);
    document.body.appendChild(overlay);
    setTimeout(()=>{window.print();},300);
  };
  
  const doCopyText = async ()=>{
    const rep=reportRef.current; if(!rep) return;
    try{ await navigator.clipboard.writeText(rep.innerText); alert('Düz metin panoya kopyalandı.'); }
    catch(e){ alert('Hata: '+e.message); }
  };
  
  const doCopyRich = async ()=>{
    const rep=reportRef.current; if(!rep) return;
    try{
      const html=rep.outerHTML;
      const blob=new Blob([html],{type:'text/html'});
      const tblob=new Blob([rep.innerText],{type:'text/plain'});
      await navigator.clipboard.write([new ClipboardItem({'text/html':blob,'text/plain':tblob})]);
      alert('Zengin metin panoya kopyalandı.');
    }catch(e){
      try{
        const sel=window.getSelection(); sel.removeAllRanges();
        const rng=document.createRange(); rng.selectNodeContents(rep); sel.addRange(rng);
        document.execCommand('copy'); sel.removeAllRanges();
        alert('Zengin metin panoya kopyalandı (fallback).');
      }catch(e2){ alert('Hata: '+e2.message); }
    }
  };
  
  const doDownloadHtml = ()=>{
    const rep=reportRef.current; if(!rep) return;
    const css=document.querySelector('style').innerHTML;
    const content=`<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Orbita MR Rapor</title><style>body{background:#fff;font-family:'Times New Roman',serif;margin:24px}${css}</style></head><body>${rep.outerHTML}</body></html>`;
    const blob=new Blob([content],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`orbita_mr_rapor_${Date.now()}.html`;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},200);
  };
  
  /* ============ RENDER ============ */
  let body=null;
  switch(step){
    case 'patient': body=renderPatient(); break;
    case 'protokol': body=renderProtokol(); break;
    case 'bulbus': body=renderBulbus(); break;
    case 'proptoz': body=renderProptoz(); break;
    case 'eom': body=renderEom(); break;
    case 'fat': body=renderFat(); break;
    case 'onerve': body=renderONerve(); break;
    case 'lacrimal': body=renderLacrimal(); break;
    case 'kemik': body=renderKemik(); break;
    case 'vasc': body=renderVasc(); break;
    case 'sinus': body=renderSinus(); break;
    case 'lezyonPre': body=renderLezyonPre(); break;
    case 'lezyon': body=renderLezyon(); break;
    case 'ddx': body=renderDDx(); break;
    case 'ek': body=renderEk(); break;
    case 'report': body=renderReport(); break;
    default: body=<div className="card">Bilinmeyen adım</div>;
  }
  
  return (
    <div className="wrap">
      <div className="title">
        <h1>👁 Orbita MR Karar Destek Sistemi</h1>
        <span className="badge">Bulbus · Proptoz · EOM · Yağ · Optik Sinir</span>
      </div>
      <div className="subtitle">Kompartman bazlı orbita MRI sorgulaması · multilezyon tanı · weighted DDx · zebra + YORUM kutulu rapor</div>
      <div className="progress noprint"><span style={{width:`${progress}%`}}/></div>
      <div className="stepper noprint">
        {STEPS.map((st,i)=>(
          <div key={st.key} className={`pill${i===stepIdx?' active':''}${i<stepIdx?' done':''}`} onClick={()=>setStepIdx(i)}>
            {i+1}. {st.label}
          </div>
        ))}
      </div>
      {body}
      <div className="btnbar noprint">
        <button className="btn ghost" onClick={goPrev} disabled={stepIdx===0}>« Önceki</button>
        <div className="row">
          <span className="muted">Adım {stepIdx+1} / {STEPS.length}</span>
          {step!=='report' && <button className="btn primary" onClick={goNext}>Sonraki »</button>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
