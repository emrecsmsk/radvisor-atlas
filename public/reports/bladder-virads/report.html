// ─── VI-RADS Calculation ───
function calcVIRADS(tumor){
  const{t2Score,dwiScore,dceScore}=tumor;
  if(!t2Score||!dwiScore||!dceScore) return null;
  if(dwiScore===1) return 1;
  if(dwiScore===5) return 5;
  if(dwiScore===2){if(t2Score>=5||dceScore>=5) return 5; return 2;}
  if(dwiScore===3){if(t2Score<=2&&dceScore<=2) return 2; if(t2Score>=4||dceScore>=4) return 4; return 3;}
  if(dwiScore===4){if(t2Score<=2&&dceScore<=2) return 3; if(t2Score>=5||dceScore>=5) return 5; return 4;}
  return dwiScore;
}

function viradsStage(s){return{1:T.stage1,2:T.stage2,3:T.stage3,4:T.stage4,5:T.stage5}[s]||"";}

function downloadFile(content, filename, mimeType){
  const blob = new Blob([content], {type: mimeType});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── MAIN COMPONENT ───
function BladderVIRADS(){
  const[step,setStep]=useState(0);
  const[patient,setPatient]=useState({name:"",age:"",gender:"",protocol:"",date:new Date().toISOString().slice(0,10),clinicalInfo:"",priorTURBT:"",cystoscopy:""});
  const[bladder,setBladder]=useState({distension:"",wallRegularity:"",diverticulum:"",diverticulumNote:"",freeFluid:""});
  const[tumors,setTumors]=useState([]);
  const[currentTumorIdx,setCurrentTumorIdx]=useState(-1);
  const[upperUrinary,setUpperUrinary]=useState({right:"normal",left:"normal",rightNote:"",leftNote:""});
  const[extras,setExtras]=useState({lymphNode:"normal",lymphNodeNote:"",bone:"",pelvicOrgan:"",other:""});
  const[copied,setCopied]=useState(false);
  const reportRef=useRef(null);
  const printReportRef=useRef(null);

  const currentTumor=currentTumorIdx>=0?tumors[currentTumorIdx]:null;
  const updatePatient=(k,v)=>setPatient(p=>({...p,[k]:v}));
  const updateBladder=(k,v)=>setBladder(p=>({...p,[k]:v}));

  const addTumor=()=>{const nt=emptyTumor();setTumors(t=>[...t,nt]);setCurrentTumorIdx(tumors.length);setStep(3);};
  const updateCurrentTumor=(k,v)=>{setTumors(ts=>ts.map((t,i)=>i===currentTumorIdx?{...t,[k]:v}:t));};
  const removeTumor=(idx)=>{setTumors(ts=>ts.filter((_,i)=>i!==idx));if(currentTumorIdx===idx)setCurrentTumorIdx(-1);else if(currentTumorIdx>idx)setCurrentTumorIdx(currentTumorIdx-1);};
  const finalizeTumor=()=>{if(currentTumor){const virads=calcVIRADS(currentTumor);setTumors(ts=>ts.map((t,i)=>i===currentTumorIdx?{...t,virads}:t));}setCurrentTumorIdx(-1);};

  const goNext=()=>{
    if(step===7){finalizeTumor();setStep(2);return;}
    if(step===2&&currentTumorIdx<0){setStep(8);return;}
    if(step>=3&&step<=6&&currentTumorIdx<0){setStep(8);return;}
    setStep(s=>Math.min(s+1,STEPS.length-1));
  };
  const goPrev=()=>{
    if(step===8){setStep(2);return;}
    if(step>=3&&step<=7&&currentTumorIdx<0){setStep(2);return;}
    setStep(s=>Math.max(s-1,0));
  };

  // ─── REAL EXPORT FUNCTIONS ───
  const handlePrint=useCallback(()=>{window.print();},[]);

  const handleCopy=useCallback(()=>{
    try{
      const el=reportRef.current;
      if(!el) return;
      const text=el.innerText;
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
      }else{
        const ta=document.createElement("textarea");
        ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
        document.body.appendChild(ta);ta.select();document.execCommand("copy");
        document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2000);
      }
    }catch(e){console.error(e);}
  },[]);

      moderate:T.fluidModerate,large:T.fluidLarge

    const indexTumor = tumors.length>0 ? tumors.reduce((max,t,i)=>(t.virads||0)>(max.virads||0)?{...t,idx:i}:max,{...tumors[0],idx:0}) : null;

    let tumorsHTML = '';

            <span class="badge badge-${s||1}">${s||'?'}</span>
          </div>
          <div style="font-size:12px;color:#666;margin-bottom:10px">${s?viradsText(s):''}</div>
          <table>
            <tr><td>${T.htmlLocRow}</td><td>${locLabel(t.location)}</td></tr>
            <tr><td>${T.htmlSizeRow}</td><td>${[t.sizeAP,t.sizeLR,t.sizeCC].filter(Boolean).length>0?`${t.sizeAP||'—'} × ${t.sizeLR||'—'} × ${t.sizeCC||'—'} mm`:'—'}</td></tr>

            <tr><td>${T.htmlGrowthRow}</td><td>${t.growthPattern?growthLabel(t.growthPattern):'—'}</td></tr>
            <tr><td>${T.htmlStalkRow}</td><td>${t.stalk?stalkLabel(t.stalk):'—'}</td></tr>

            <tr><td>${T.htmlDWIRow}</td><td>${t.dwiScore??'—'}</td></tr>

    const fullHTML=`<!DOCTYPE html>

      <div style={{marginBottom:14}}><label style={S.label}>{T.tumorMorphology}</label><Radio options={MORPHOLOGY} value={currentTumor.morphology} onChange={v=>updateCurrentTumor("morphology",v)}/></div>
      <div style={{marginBottom:14}}><label style={S.label}>{T.growthPattern}</label><Radio options={GROWTH_PATTERN} value={currentTumor.growthPattern} onChange={v=>updateCurrentTumor("growthPattern",v)}/></div>
      <div style={{marginBottom:14}}><label style={S.label}>{T.stalkLabel}</label><Radio options={STALK_OPTIONS} value={currentTumor.stalk} onChange={v=>updateCurrentTumor("stalk",v)}/></div>
      <div style={{marginBottom:14}}><label style={S.label}>{T.muscleLayerLabel}</label><Radio options={MUSCLE_LAYER} value={currentTumor.muscleLayer} onChange={v=>updateCurrentTumor("muscleLayer",v)}/></div>
      <div style={{marginBottom:14}}><label style={S.label}>{T.wallThickness}</label><input style={S.input} type="number" value={currentTumor.wallThickness} onChange={e=>updateCurrentTumor("wallThickness",e.target.value)} placeholder="mm"/></div>
      <div><label style={S.label}>{T.perivesicalLabel}</label><Radio options={PERIVESICAL} value={currentTumor.perivesical} onChange={v=>updateCurrentTumor("perivesical",v)}/></div>
    </div>);
  };

  const renderStep7=()=>{
    if(!currentTumor) return <div style={{color:"#94a3b8"}}>{T.noTumorYet2}</div>;
    const score=calcVIRADS(currentTumor);
    if(!score) return(<div style={{color:"#fbbf24",textAlign:"center",padding:20}}>
      {T.scoreNeeded}
      <div style={{marginTop:10}}><button style={S.btnSecondary} onClick={()=>setStep(3)}>{T.backToScoring}</button></div>
    </div>);
    const isUpgrade=(currentTumor.dwiScore===3&&(currentTumor.t2Score>=4||currentTumor.dceScore>=4));
    const isDowngrade=(currentTumor.dwiScore===3&&currentTumor.t2Score<=2&&currentTumor.dceScore<=2)||(currentTumor.dwiScore===4&&currentTumor.t2Score<=2&&currentTumor.dceScore<=2);
    return(<div>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{color:"#94a3b8",fontSize:13,marginBottom:8}}>{T.tumor(currentTumorIdx+1)} — {T.calcScore}</div>
        <div style={S.piradsBadge(score)}>{score}</div>
        <div style={{marginTop:10,color:"#e2e8f0",fontSize:14,fontWeight:500}}>{viradsText(score)}</div>
        <div style={{marginTop:4,color:"#94a3b8",fontSize:12}}>{T.stageEstimate}: {viradsStage(score)}</div>
        {isUpgrade&&<div style={{marginTop:8,color:"#f97316",fontSize:12}}>{T.upgrade}</div>}
        {isDowngrade&&<div style={{marginTop:8,color:"#22c55e",fontSize:12}}>{T.downgrade}</div>}
      </div>
      <div style={S.piradsBar(score)}><div style={S.piradsBarFill(score)}/></div>
      <hr style={S.divider}/>
      <div style={S.yorumBlock}>
        <div style={S.yorumTitle}>{T.scoringDetail}</div>
        <table style={S.zebraTable}><tbody>
          {[[T.localizationRow,locLabel(currentTumor.location)],[T.dominantSeq,T.dominantSeqVal],[T.t2wScoreRow,currentTumor.t2Score??"—"],[T.dwiScoreRow,currentTumor.dwiScore??"—"],[T.dceScoreRow,currentTumor.dceScore??"—"],[T.morphologyRow,currentTumor.morphology?morphLabel(currentTumor.morphology):"—"],[T.stalkRow,currentTumor.stalk?stalkLabel(currentTumor.stalk):"—"],[T.finalVIRADS,score],[T.stageRow,viradsStage(score)]].map(([k,v],i)=>(
            <tr key={k} style={S.zebraRow(i)}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
          ))}
        </tbody></table>
      </div>
      <div style={{...S.btnRow,justifyContent:"center"}}>
        <button style={S.btnSuccess} onClick={()=>{finalizeTumor();setStep(2);}}>{T.saveTumor}</button>
      </div>
    </div>);
  };

  const renderStep8=()=>(
    <div>
      <div style={S.infoBox}>🔬 {T.miInfo}</div>
      {tumors.length===0?(<div style={{color:"#64748b",fontSize:13}}>{T.noTumorDefined}</div>):(
        <div>{tumors.map((t,i)=>{const s=t.virads||calcVIRADS(t);return(
          <div key={t.id} style={{...S.yorumBlock,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{...S.piradsBadge(s||1),width:32,height:32,fontSize:15,borderRadius:8}}>{s||"?"}</div>
              <div><div style={{fontWeight:600,color:"#e2e8f0"}}>{T.tumor(i+1)} — {locLabel(t.location)}</div><div style={{fontSize:12,color:"#94a3b8"}}>{s?viradsText(s):T.scoreNotCalc}</div></div>
            </div>
            <div style={S.piradsBar(s||1)}><div style={S.piradsBarFill(s||1)}/></div>
            <div style={{fontSize:12,marginTop:6}}><span style={{color:"#94a3b8"}}>{T.muscleLayerRow}: </span><span style={{color:t.muscleLayer==="disrupted"||t.muscleLayer==="absent"?"#f87171":"#e2e8f0"}}>{t.muscleLayer?muscleLabel(t.muscleLayer):T.notEvaluated}</span></div>
            <div style={{fontSize:12,marginTop:3}}><span style={{color:"#94a3b8"}}>{T.perivesicalRow}: </span><span style={{color:t.perivesical==="invasion"||t.perivesical==="organ_invasion"?"#f87171":"#e2e8f0"}}>{t.perivesical?pvLabel(t.perivesical):T.notEvaluated}</span></div>
          </div>
        );})}</div>
      )}
    </div>
  );

  const renderStep9=()=>(
    <div>
      <div style={S.row}>
        <div style={S.col(1)}>
          <label style={S.label}>{T.rightKidney}</label>
          <Radio options={UPPER_URINARY} value={upperUrinary.right} onChange={v=>setUpperUrinary(p=>({...p,right:v}))}/>
          {upperUrinary.right!=="normal"&&(<div style={{marginTop:8}}><input style={S.input} value={upperUrinary.rightNote} onChange={e=>setUpperUrinary(p=>({...p,rightNote:e.target.value}))} placeholder={T.detailNotePlaceholder}/></div>)}
        </div>
        <div style={S.col(1)}>
          <label style={S.label}>{T.leftKidney}</label>
          <Radio options={UPPER_URINARY} value={upperUrinary.left} onChange={v=>setUpperUrinary(p=>({...p,left:v}))}/>
          {upperUrinary.left!=="normal"&&(<div style={{marginTop:8}}><input style={S.input} value={upperUrinary.leftNote} onChange={e=>setUpperUrinary(p=>({...p,leftNote:e.target.value}))} placeholder={T.detailNotePlaceholder}/></div>)}
        </div>
      </div>
    </div>
  );

  const renderStep10=()=>(
    <div>
      <div style={{marginBottom:14}}><label style={S.label}>{T.pelvicLN}</label><Radio options={LN_OPTIONS} value={extras.lymphNode} onChange={v=>setExtras(p=>({...p,lymphNode:v}))}/>{extras.lymphNode!=="normal"&&(<div style={{marginTop:8}}><input style={S.input} value={extras.lymphNodeNote} onChange={e=>setExtras(p=>({...p,lymphNodeNote:e.target.value}))} placeholder={T.lnNotePlaceholder}/></div>)}</div>
      <div style={{marginBottom:14}}><label style={S.label}>{T.boneLabel}</label><textarea style={{...S.input,minHeight:50,resize:"vertical"}} value={extras.bone} onChange={e=>setExtras(p=>({...p,bone:e.target.value}))} placeholder={T.bonePlaceholder}/></div>
      <div style={{marginBottom:14}}><label style={S.label}>{T.pelvicOrgans}</label><textarea style={{...S.input,minHeight:50,resize:"vertical"}} value={extras.pelvicOrgan} onChange={e=>setExtras(p=>({...p,pelvicOrgan:e.target.value}))} placeholder={T.pelvicOrgansPlaceholder}/></div>
      <div><label style={S.label}>{T.otherFindings}</label><textarea style={{...S.input,minHeight:50,resize:"vertical"}} value={extras.other} onChange={e=>setExtras(p=>({...p,other:e.target.value}))} placeholder={T.otherPlaceholder}/></div>
    </div>
  );

  // ─── REPORT ───
  const indexTumor=useMemo(()=>{
    if(tumors.length===0) return null;
    return tumors.reduce((max,t,i)=>(t.virads||0)>(max.virads||0)?{...t,idx:i}:max,{...tumors[0],idx:0});
  },[tumors]);

  const renderReport=()=>{
    const distLabel={adequate:T.distAdequate,suboptimal:T.distSuboptimal,overdistended:T.distOverdistended,collapsed:T.distCollapsed};
    const wallLabel={smooth:T.wallSmooth,diffuse_thickening:T.wallDiffuse,focal_thickening:T.wallFocal,trabeculation:T.wallTrabeculation};
    const fluidLabel={none:T.fluidNone,minimal:T.fluidMinimal,moderate:T.fluidModerate,large:T.fluidLarge};
    const genderStr = patient.gender==="M"?T.genderM:patient.gender==="F"?T.genderF:"—";

    return(
      <div>
        {/* EXPORT BUTTONS */}
        <div className="no-print" style={{...S.btnRow,marginBottom:20,marginTop:0,justifyContent:"center",flexWrap:"wrap",gap:8}}>
          <button style={S.btnPrimary} onClick={handlePrint}>{T.printPDF}</button>
          <button style={{...S.btnSuccess,opacity:copied?0.6:1}} onClick={handleCopy}>{copied?T.copied:T.copyText}</button>
          <button style={{...S.btnPrimary,background:"linear-gradient(135deg,#f59e0b,#d97706)"}} onClick={handleDownloadHTML}>{T.downloadHTML}</button>
          <button style={{...S.btnSecondary}} onClick={handleDownloadTXT}>{T.downloadTXT}</button>
        </div>

        <div ref={reportRef} className="report-container">
          <div style={{textAlign:"center",marginBottom:20}}>
            <div className="report-title-header" style={{fontSize:17,fontWeight:700,color:"#f1f5f9"}}>{T.reportTitle}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{T.createdOn(new Date().toLocaleDateString(RV_LOCALE==='tr'?'tr-TR':'en-GB'))}</div>
          </div>

          {/* Patient */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>{T.patientInfoSection}</div>
            <table style={S.zebraTable}><tbody>
              {[[T.patientRow,patient.name||"—"],[T.ageGenderRow,T.ageGender(patient.age,genderStr)],[T.dateRow,patient.date||"—"],[T.protocolRow,patient.protocol||"—"],[T.clinicalInfoRow,patient.clinicalInfo||"—"],[T.priorTURBTRow,patient.priorTURBT||T.noInfo],[T.cystoscopyRow,patient.cystoscopy||T.noInfo]].map(([k,v],i)=>(
                <tr key={k} style={S.zebraRow(i)} className={i%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
              ))}
            </tbody></table>
          </div>

          {/* Bladder */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>{T.bladderSection}</div>
            <table style={S.zebraTable}><tbody>
              {[[T.distRow,distLabel[bladder.distension]||"—"],[T.wallRow,wallLabel[bladder.wallRegularity]||"—"],[T.divRow,bladder.diverticulum==="present"?T.divPresented(bladder.diverticulumNote||""):T.divAbsent],[T.freeFluidRow,fluidLabel[bladder.freeFluid]||"—"]].map(([k,v],i)=>(
                <tr key={k} style={S.zebraRow(i)} className={i%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
              ))}
            </tbody></table>
          </div>

          {/* Tumors */}
          {tumors.length>0&&(
            <div style={S.reportSection}>
              <div className="section-title" style={S.reportTitle}>{T.tumorSection(tumors.length)}</div>
              {tumors.map((t,i)=>{
                const isIndex=indexTumor&&indexTumor.idx===i;
                const s=t.virads||calcVIRADS(t);
                return(
                  <div key={t.id} className="yorum-block" style={{...S.yorumBlock,borderColor:isIndex?"rgba(59,130,246,0.4)":undefined,marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontWeight:700,color:"#e2e8f0"}}>{T.tumor(i+1)}</span>
                        {isIndex&&<span style={{background:"rgba(59,130,246,0.2)",color:"#60a5fa",padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:600}}>{T.indexLabel}</span>}
                      </div>
                      <div className="virads-badge" style={S.piradsBadge(s||1)}>{s||"?"}</div>
                    </div>
                    <div style={S.piradsBar(s||1)}><div style={S.piradsBarFill(s||1)}/></div>
                    <div style={{fontSize:12,color:"#94a3b8",marginBottom:10}}>{s?viradsText(s):""}</div>
                    <table style={S.zebraTable}><tbody>
                      {[[T.localizationRow,locLabel(t.location)],[T.sizeRow,[t.sizeAP,t.sizeLR,t.sizeCC].filter(Boolean).length>0?`${t.sizeAP||"—"} × ${t.sizeLR||"—"} × ${t.sizeCC||"—"} mm`:"—"],[T.morphologyRowTbl,t.morphology?morphLabel(t.morphology):"—"],[T.growthPatternRow,t.growthPattern?growthLabel(t.growthPattern):"—"],[T.stalkRowTbl,t.stalk?stalkLabel(t.stalk):"—"],[T.t2wScoreRow,t.t2Score??"—"],[T.dwiScoreRow,t.dwiScore??"—"],[T.dceScoreRow,t.dceScore??"—"],[T.muscleLayerRowTbl,t.muscleLayer?muscleLabel(t.muscleLayer):"—"],[T.perivesicalRowTbl,t.perivesical?pvLabel(t.perivesical):"—"],[T.viRadsRow,s||"—"],[T.stageRowTbl,s?viradsStage(s):"—"]].map(([k,v],j)=>(
                        <tr key={k} style={S.zebraRow(j)} className={j%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
                      ))}
                    </tbody></table>
                  </div>
                );
              })}
            </div>
          )}

          {/* Upper Urinary */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>{T.upperUrinarySection}</div>
            <table style={S.zebraTable}><tbody>
              {[[T.rightKidney,`${upperLabel(upperUrinary.right)}${upperUrinary.rightNote?` — ${upperUrinary.rightNote}`:""}`],[T.leftKidney,`${upperLabel(upperUrinary.left)}${upperUrinary.leftNote?` — ${upperUrinary.leftNote}`:""}`]].map(([k,v],i)=>(
                <tr key={k} style={S.zebraRow(i)} className={i%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
              ))}
            </tbody></table>
          </div>

          {/* Additional Findings */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>{T.additionalSection}</div>
            <table style={S.zebraTable}><tbody>
              {[[T.pelvicLN,`${lnLabel(extras.lymphNode)}${extras.lymphNodeNote?` — ${extras.lymphNodeNote}`:""}`],[T.boneLabel,extras.bone||T.boneDefault],[T.pelvicOrgans,extras.pelvicOrgan||T.pelvicOrganDefault],[T.otherFindings,extras.other||"—"]].map(([k,v],i)=>(
                <tr key={k} style={S.zebraRow(i)} className={i%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
              ))}
            </tbody></table>
          </div>

          {/* IMPRESSION / YORUM */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>{T.commentSection}</div>
            <div className="yorum-block" style={S.yorumBlock}>
              {tumors.length===0?(
                <div style={{color:"#94a3b8"}}>{T.noTumorComment}</div>
              ):(
                <div>
                  <div style={{marginBottom:12}}>{T.tumorCount(tumors.length)}<b style={{color:"#60a5fa"}}>{tumors.length}</b>{T.tumorCountSuffix}</div>
                  {indexTumor&&(<div style={{marginBottom:12}}><b>{T.indexTumorLabel(indexTumor.idx+1)}</b>{" "}{locLabel(indexTumor.location)}{indexTumor.sizeAP&&` — ${indexTumor.sizeAP}×${indexTumor.sizeLR||"?"}×${indexTumor.sizeCC||"?"} mm`}{indexTumor.morphology&&`, ${morphLabel(indexTumor.morphology)}`}</div>)}
                  {tumors.map((t,i)=>{const s=t.virads||calcVIRADS(t);return(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                      <div className="virads-badge" style={{...S.piradsBadge(s||1),width:30,height:30,fontSize:14,borderRadius:8}}>{s||"?"}</div>
                      <div><span style={{fontWeight:600}}>{T.tumor(i+1)}: </span><span>VI-RADS {s} — {viradsText(s)}</span></div>
                    </div>
                  );})}
                  {indexTumor&&(indexTumor.virads>=4)&&(<div className="alert-box" style={{marginTop:12,padding:"10px 14px",background:"rgba(239,68,68,0.08)",borderRadius:8,border:"1px solid rgba(239,68,68,0.15)",color:"#fca5a5",fontSize:13}}>{T.alertHigh}</div>)}
                  {indexTumor&&indexTumor.virads===3&&(<div className="alert-box" style={{marginTop:12,padding:"10px 14px",background:"rgba(234,179,8,0.08)",borderRadius:8,border:"1px solid rgba(234,179,8,0.15)",color:"#fde047",fontSize:13}}>{T.alertMid}</div>)}
                  {indexTumor&&indexTumor.virads<=2&&indexTumor.virads>=1&&(<div className="alert-box" style={{marginTop:12,padding:"10px 14px",background:"rgba(16,185,129,0.08)",borderRadius:8,border:"1px solid rgba(16,185,129,0.15)",color:"#6ee7b7",fontSize:13}}>{T.alertLow}</div>)}
                  {(upperUrinary.right!=="normal"||upperUrinary.left!=="normal")&&(<div style={{marginTop:8,color:"#fca5a5",fontSize:13}}>{T.upperUrinPathology}</div>)}
                  {(extras.lymphNode!=="normal")&&(<div style={{marginTop:4,color:"#fca5a5",fontSize:13}}>{T.pelvicLNPathology}</div>)}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  };

  const stepRenderers=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6,renderStep7,renderStep8,renderStep9,renderStep10,renderReport];

  return(
    <div style={S.app}>
      <div style={S.header} className="no-print">
        <h1 style={S.title}>{T.appTitle}</h1>
        <div style={S.subtitle}>{T.appSubtitle}</div>
      </div>
      <div style={S.progressBar} className="no-print">
        {STEPS.map((s,i)=>(<div key={i} style={S.progressDot(i===step,i<step)} onClick={()=>setStep(i)} title={s}/>))}
      </div>
      <div style={S.card} className={step===11?"":"no-print-card"}>
        <div style={S.stepTitle} className={step===11?"no-print":""}>
          <span style={S.stepBadge}>{step+1}/{STEPS.length}</span>
          <span>{STEPS[step]}</span>
        </div>
        {stepRenderers[step]()}
      </div>
      {step!==11&&!(step===7&&currentTumorIdx>=0)&&(
        <div style={S.btnRow} className="no-print">
          <button style={S.btnSecondary} onClick={goPrev} disabled={step===0}>{T.back}</button>
          <button style={S.btnPrimary} onClick={goNext}>{step===10?T.generateReport:T.next}</button>
        </div>
      )}
      <div className="no-print" style={{textAlign:"center",marginTop:24,fontSize:11,color:"#475569"}}>
        {T.footerNote}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BladderVIRADS/>);
</script>
</body>
</html>
