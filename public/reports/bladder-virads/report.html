// ─── VI-RADS Calculation ───
function calcVIRADS(tumor){
  const{t2Score,dwiScore,dceScore}=tumor;
  if(!t2Score||!dwiScore||!dceScore) return null;
  if(dwiScore===1) return 1;
  if(dwiScore===5) return 5;
  if(dwiScore===2){if(t2Score>=5||dceScore>=5) return 5; return 2;}
  if(dwiScore===3){if(t2Score<=2&&dceScore<=2) return 2; if(t2Score>=4||dceScore>=4) return 4; return 3;}
  if(dwiScore===4){if(t2Score<=2&&dceScore<=2) return 3; if(t2Score>=5||dceScore>=5) return 5; return 4;}
  return dwiScore;
}

function viradsStage(s){return{1:"Tümör saptanmadı",2:"≤T1 (Non-muscle invasive — Ta/T1)",3:"T1–T2a arası (belirsiz)",4:"≥T2a (Muscle invasive)",5:"≥T2b / T3 / T4 (İleri evre)"}[s]||"";}

function downloadFile(content, filename, mimeType){
  const blob = new Blob([content], {type: mimeType});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── MAIN COMPONENT ───
function BladderVIRADS(){
  const[step,setStep]=useState(0);
  const[patient,setPatient]=useState({name:"",age:"",gender:"",protocol:"",date:new Date().toISOString().slice(0,10),clinicalInfo:"",priorTURBT:"",cystoscopy:""});
  const[bladder,setBladder]=useState({distension:"",wallRegularity:"",diverticulum:"",diverticulumNote:"",freeFluid:""});
  const[tumors,setTumors]=useState([]);
  const[currentTumorIdx,setCurrentTumorIdx]=useState(-1);
  const[upperUrinary,setUpperUrinary]=useState({right:"normal",left:"normal",rightNote:"",leftNote:""});
  const[extras,setExtras]=useState({lymphNode:"normal",lymphNodeNote:"",bone:"",pelvicOrgan:"",other:""});
  const[copied,setCopied]=useState(false);
  const reportRef=useRef(null);
  const printReportRef=useRef(null);

  const currentTumor=currentTumorIdx>=0?tumors[currentTumorIdx]:null;
  const updatePatient=(k,v)=>setPatient(p=>({...p,[k]:v}));
  const updateBladder=(k,v)=>setBladder(p=>({...p,[k]:v}));

  const addTumor=()=>{const nt=emptyTumor();setTumors(t=>[...t,nt]);setCurrentTumorIdx(tumors.length);setStep(3);};
  const updateCurrentTumor=(k,v)=>{setTumors(ts=>ts.map((t,i)=>i===currentTumorIdx?{...t,[k]:v}:t));};
  const removeTumor=(idx)=>{setTumors(ts=>ts.filter((_,i)=>i!==idx));if(currentTumorIdx===idx)setCurrentTumorIdx(-1);else if(currentTumorIdx>idx)setCurrentTumorIdx(currentTumorIdx-1);};
  const finalizeTumor=()=>{if(currentTumor){const virads=calcVIRADS(currentTumor);setTumors(ts=>ts.map((t,i)=>i===currentTumorIdx?{...t,virads}:t));}setCurrentTumorIdx(-1);};

  const goNext=()=>{
    if(step===7){finalizeTumor();setStep(2);return;}
    if(step===2&&currentTumorIdx<0){setStep(8);return;}
    if(step>=3&&step<=6&&currentTumorIdx<0){setStep(8);return;}
    setStep(s=>Math.min(s+1,STEPS.length-1));
  };
  const goPrev=()=>{
    if(step===8){setStep(2);return;}
    if(step>=3&&step<=7&&currentTumorIdx<0){setStep(2);return;}
    setStep(s=>Math.max(s-1,0));
  };

  // ─── REAL EXPORT FUNCTIONS ───
  const handlePrint=useCallback(()=>{window.print();},[]);

  const handleCopy=useCallback(()=>{
    try{
      const el=reportRef.current;
      if(!el) return;
      const text=el.innerText;
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
      }else{
        const ta=document.createElement("textarea");
        ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
        document.body.appendChild(ta);ta.select();document.execCommand("copy");
        document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2000);
      }
    }catch(e){console.error(e);}
  },[]);

  const handleDownloadHTML=useCallback(()=>{
    const el=reportRef.current;
    if(!el) return;
    // Build clean printable HTML report
    const distLabel={adequate:"Yeterli",suboptimal:"Suboptimal",overdistended:"Aşırı gergin",collapsed:"Kollabe"};
    const wallLabel={smooth:"Düzgün, ince",diffuse_thickening:"Diffüz kalınlaşma",focal_thickening:"Fokal kalınlaşma",trabeculation:"Trabekulasyon"};
    const fluidLabel={none:"Yok",minimal:"Minimal",moderate:"Orta miktarda",large:"Belirgin"};

    const indexTumor = tumors.length>0 ? tumors.reduce((max,t,i)=>(t.virads||0)>(max.virads||0)?{...t,idx:i}:max,{...tumors[0],idx:0}) : null;

    let tumorsHTML = '';
    if(tumors.length>0){
      tumorsHTML = `<div class="section-title">Tümör Değerlendirmesi (${tumors.length} tümör)</div>`;
      tumors.forEach((t,i)=>{
        const isIndex=indexTumor&&indexTumor.idx===i;
        const s=t.virads||calcVIRADS(t);
        tumorsHTML+=`<div class="yorum" style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div><strong>Tümör ${i+1}</strong>${isIndex?' <span style="background:#dbeafe;color:#2563eb;padding:2px 8px;border-radius:6px;font-size:11px">İNDEKS</span>':''}</div>
            <span class="badge badge-${s||1}">${s||'?'}</span>
          </div>
          <div style="font-size:12px;color:#666;margin-bottom:10px">${s?viradsText(s):''}</div>
          <table>
            <tr><td>Lokalizasyon</td><td>${locLabel(t.location)}</td></tr>

            <div style={S.piradsBar(s||1)}><div style={S.piradsBarFill(s||1)}/></div>
            <div style={{fontSize:12,marginTop:6}}><span style={{color:"#94a3b8"}}>Kas Tabakası: </span><span style={{color:t.muscleLayer==="disrupted"||t.muscleLayer==="absent"?"#f87171":"#e2e8f0"}}>{t.muscleLayer?muscleLabel(t.muscleLayer):"Değerlendirilmedi"}</span></div>
            <div style={{fontSize:12,marginTop:3}}><span style={{color:"#94a3b8"}}>Perivesikal: </span><span style={{color:t.perivesical==="invasion"||t.perivesical==="organ_invasion"?"#f87171":"#e2e8f0"}}>{t.perivesical?pvLabel(t.perivesical):"Değerlendirilmedi"}</span></div>
          </div>
        );})}</div>
      )}
    </div>
  );

  const renderStep9=()=>(
    <div>
      <div style={S.row}>
        <div style={S.col(1)}>
          <label style={S.label}>Sağ Böbrek / Üreter</label>
          <Radio options={UPPER_URINARY} value={upperUrinary.right} onChange={v=>setUpperUrinary(p=>({...p,right:v}))}/>
          {upperUrinary.right!=="normal"&&(<div style={{marginTop:8}}><input style={S.input} value={upperUrinary.rightNote} onChange={e=>setUpperUrinary(p=>({...p,rightNote:e.target.value}))} placeholder="Detay notu..."/></div>)}
        </div>
        <div style={S.col(1)}>
          <label style={S.label}>Sol Böbrek / Üreter</label>
          <Radio options={UPPER_URINARY} value={upperUrinary.left} onChange={v=>setUpperUrinary(p=>({...p,left:v}))}/>
          {upperUrinary.left!=="normal"&&(<div style={{marginTop:8}}><input style={S.input} value={upperUrinary.leftNote} onChange={e=>setUpperUrinary(p=>({...p,leftNote:e.target.value}))} placeholder="Detay notu..."/></div>)}
        </div>
      </div>
    </div>
  );

  const renderStep10=()=>(
    <div>
      <div style={{marginBottom:14}}><label style={S.label}>Pelvik Lenf Nodları</label><Radio options={LN_OPTIONS} value={extras.lymphNode} onChange={v=>setExtras(p=>({...p,lymphNode:v}))}/>{extras.lymphNode!=="normal"&&(<div style={{marginTop:8}}><input style={S.input} value={extras.lymphNodeNote} onChange={e=>setExtras(p=>({...p,lymphNodeNote:e.target.value}))} placeholder="Lokalizasyon, boyut, sayı..."/></div>)}</div>
      <div style={{marginBottom:14}}><label style={S.label}>Kemik</label><textarea style={{...S.input,minHeight:50,resize:"vertical"}} value={extras.bone} onChange={e=>setExtras(p=>({...p,bone:e.target.value}))} placeholder="Kemik metastazı değerlendirmesi..."/></div>
      <div style={{marginBottom:14}}><label style={S.label}>Pelvik Organlar</label><textarea style={{...S.input,minHeight:50,resize:"vertical"}} value={extras.pelvicOrgan} onChange={e=>setExtras(p=>({...p,pelvicOrgan:e.target.value}))} placeholder="Prostat, uterus, over, rektum..."/></div>
      <div><label style={S.label}>Diğer Bulgular</label><textarea style={{...S.input,minHeight:50,resize:"vertical"}} value={extras.other} onChange={e=>setExtras(p=>({...p,other:e.target.value}))} placeholder="Ek notlar..."/></div>
    </div>
  );

  // ─── REPORT ───
  const indexTumor=useMemo(()=>{
    if(tumors.length===0) return null;
    return tumors.reduce((max,t,i)=>(t.virads||0)>(max.virads||0)?{...t,idx:i}:max,{...tumors[0],idx:0});
  },[tumors]);

  const renderReport=()=>{
    const distLabel={adequate:"Yeterli",suboptimal:"Suboptimal",overdistended:"Aşırı gergin",collapsed:"Kollabe"};
    const wallLabel={smooth:"Düzgün, ince",diffuse_thickening:"Diffüz kalınlaşma",focal_thickening:"Fokal kalınlaşma",trabeculation:"Trabekulasyon"};
    const fluidLabel={none:"Yok",minimal:"Minimal",moderate:"Orta miktarda",large:"Belirgin"};

    return(
      <div>
        {/* EXPORT BUTTONS */}
        <div className="no-print" style={{...S.btnRow,marginBottom:20,marginTop:0,justifyContent:"center",flexWrap:"wrap",gap:8}}>
          <button style={S.btnPrimary} onClick={handlePrint}>🖨️ Yazdır / PDF</button>
          <button style={{...S.btnSuccess,opacity:copied?0.6:1}} onClick={handleCopy}>{copied?"✓ Kopyalandı!":"📋 Metin Kopyala"}</button>
          <button style={{...S.btnPrimary,background:"linear-gradient(135deg,#f59e0b,#d97706)"}} onClick={handleDownloadHTML}>📄 HTML İndir</button>
          <button style={{...S.btnSecondary}} onClick={handleDownloadTXT}>📝 TXT İndir</button>
        </div>

        <div ref={reportRef} className="report-container">
          <div style={{textAlign:"center",marginBottom:20}}>
            <div className="report-title-header" style={{fontSize:17,fontWeight:700,color:"#f1f5f9"}}>MESANE MR — VI-RADS YAPISAL RAPOR</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:4}}>Oluşturulma: {new Date().toLocaleDateString("tr-TR")}</div>
          </div>

          {/* Hasta */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>Hasta Bilgileri</div>
            <table style={S.zebraTable}><tbody>
              {[["Hasta",patient.name||"—"],["Yaş / Cinsiyet",`${patient.age||"—"} yaş / ${patient.gender==="M"?"Erkek":patient.gender==="F"?"Kadın":"—"}`],["Tarih",patient.date||"—"],["Protokol",patient.protocol||"—"],["Klinik Bilgi",patient.clinicalInfo||"—"],["Önceki TUR-BT",patient.priorTURBT||"Bilgi yok"],["Sistoskopi",patient.cystoscopy||"Bilgi yok"]].map(([k,v],i)=>(
                <tr key={k} style={S.zebraRow(i)} className={i%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
              ))}
            </tbody></table>
          </div>

          {/* Mesane */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>Mesane Genel Değerlendirme</div>
            <table style={S.zebraTable}><tbody>
              {[["Distansiyon",distLabel[bladder.distension]||"—"],["Duvar Düzenliliği",wallLabel[bladder.wallRegularity]||"—"],["Divertikül",bladder.diverticulum==="present"?`Mevcut — ${bladder.diverticulumNote||""}`:"Yok"],["Pelvik Serbest Sıvı",fluidLabel[bladder.freeFluid]||"—"]].map(([k,v],i)=>(
                <tr key={k} style={S.zebraRow(i)} className={i%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
              ))}
            </tbody></table>
          </div>

          {/* Tümörler */}
          {tumors.length>0&&(
            <div style={S.reportSection}>
              <div className="section-title" style={S.reportTitle}>Tümör Değerlendirmesi ({tumors.length} tümör)</div>
              {tumors.map((t,i)=>{
                const isIndex=indexTumor&&indexTumor.idx===i;
                const s=t.virads||calcVIRADS(t);
                return(
                  <div key={t.id} className="yorum-block" style={{...S.yorumBlock,borderColor:isIndex?"rgba(59,130,246,0.4)":undefined,marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontWeight:700,color:"#e2e8f0"}}>Tümör {i+1}</span>
                        {isIndex&&<span style={{background:"rgba(59,130,246,0.2)",color:"#60a5fa",padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:600}}>İNDEKS</span>}
                      </div>
                      <div className="virads-badge" style={S.piradsBadge(s||1)}>{s||"?"}</div>
                    </div>
                    <div style={S.piradsBar(s||1)}><div style={S.piradsBarFill(s||1)}/></div>
                    <div style={{fontSize:12,color:"#94a3b8",marginBottom:10}}>{s?viradsText(s):""}</div>
                    <table style={S.zebraTable}><tbody>
                      {[["Lokalizasyon",locLabel(t.location)],["Boyut",[t.sizeAP,t.sizeLR,t.sizeCC].filter(Boolean).length>0?`${t.sizeAP||"—"} × ${t.sizeLR||"—"} × ${t.sizeCC||"—"} mm`:"—"],["Morfoloji",t.morphology?morphLabel(t.morphology):"—"],["Büyüme Paterni",t.growthPattern?growthLabel(t.growthPattern):"—"],["Submukozal Sap",t.stalk?stalkLabel(t.stalk):"—"],["T2W Skoru",t.t2Score??"—"],["DWI Skoru",t.dwiScore??"—"],["DCE Skoru",t.dceScore??"—"],["Kas Tabakası",t.muscleLayer?muscleLabel(t.muscleLayer):"—"],["Perivesikal",t.perivesical?pvLabel(t.perivesical):"—"],["VI-RADS",s||"—"],["Evre Tahmini",s?viradsStage(s):"—"]].map(([k,v],j)=>(
                        <tr key={k} style={S.zebraRow(j)} className={j%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
                      ))}
                    </tbody></table>
                  </div>
                );
              })}
            </div>
          )}

          {/* Üst Üriner */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>Üst Üriner Sistem</div>
            <table style={S.zebraTable}><tbody>
              {[["Sağ Böbrek / Üreter",`${upperLabel(upperUrinary.right)}${upperUrinary.rightNote?` — ${upperUrinary.rightNote}`:""}`],["Sol Böbrek / Üreter",`${upperLabel(upperUrinary.left)}${upperUrinary.leftNote?` — ${upperUrinary.leftNote}`:""}`]].map(([k,v],i)=>(
                <tr key={k} style={S.zebraRow(i)} className={i%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
              ))}
            </tbody></table>
          </div>

          {/* Ek Bulgular */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>Ek Bulgular</div>
            <table style={S.zebraTable}><tbody>
              {[["Pelvik Lenf Nodları",`${lnLabel(extras.lymphNode)}${extras.lymphNodeNote?` — ${extras.lymphNodeNote}`:""}`],["Kemik",extras.bone||"Kemik metastazı ile uyumlu sinyal değişikliği saptanmadı"],["Pelvik Organlar",extras.pelvicOrgan||"Belirgin patoloji saptanmadı"],["Diğer",extras.other||"—"]].map(([k,v],i)=>(
                <tr key={k} style={S.zebraRow(i)} className={i%2===0?"zebra-even":""}><td style={S.zebraTdLabel}>{k}</td><td style={S.zebraTd}>{v}</td></tr>
              ))}
            </tbody></table>
          </div>

          {/* YORUM */}
          <div style={S.reportSection}>
            <div className="section-title" style={S.reportTitle}>YORUM</div>
            <div className="yorum-block" style={S.yorumBlock}>
              {tumors.length===0?(
                <div style={{color:"#94a3b8"}}>Mesane MR incelemesinde VI-RADS skorlanmasını gerektiren fokal tümöral lezyon saptanmamıştır.</div>
              ):(
                <div>
                  <div style={{marginBottom:12}}>Mesane multiparametrik MR incelemesinde toplam <b style={{color:"#60a5fa"}}>{tumors.length}</b> adet tümöral lezyon tanımlanmıştır.</div>
                  {indexTumor&&(<div style={{marginBottom:12}}><b>İndeks tümör (Tümör {indexTumor.idx+1}):</b>{" "}{locLabel(indexTumor.location)}{indexTumor.sizeAP&&` — ${indexTumor.sizeAP}×${indexTumor.sizeLR||"?"}×${indexTumor.sizeCC||"?"} mm`}{indexTumor.morphology&&`, ${morphLabel(indexTumor.morphology)}`}</div>)}
                  {tumors.map((t,i)=>{const s=t.virads||calcVIRADS(t);return(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                      <div className="virads-badge" style={{...S.piradsBadge(s||1),width:30,height:30,fontSize:14,borderRadius:8}}>{s||"?"}</div>
                      <div><span style={{fontWeight:600}}>Tümör {i+1}: </span><span>VI-RADS {s} — {viradsText(s)}</span></div>
                    </div>
                  );})}
                  {indexTumor&&(indexTumor.virads>=4)&&(<div className="alert-box" style={{marginTop:12,padding:"10px 14px",background:"rgba(239,68,68,0.08)",borderRadius:8,border:"1px solid rgba(239,68,68,0.15)",color:"#fca5a5",fontSize:13}}>⚠️ VI-RADS ≥4: Musküler invazyon yüksek olasılıklıdır (MIBC). Derin kas invazyonu açısından TUR-BT ve evreleme önerilir. Neoadjuvan kemoterapi ve radikal sistektomi değerlendirilmelidir.</div>)}
                  {indexTumor&&indexTumor.virads===3&&(<div className="alert-box" style={{marginTop:12,padding:"10px 14px",background:"rgba(234,179,8,0.08)",borderRadius:8,border:"1px solid rgba(234,179,8,0.15)",color:"#fde047",fontSize:13}}>⚡ VI-RADS 3 (belirsiz): Musküler invazyon kesin değerlendirilememektedir. TUR-BT ile derin kas biyopsisi önerilir. Klinik korelasyon ve multidisipliner değerlendirme gereklidir.</div>)}
                  {indexTumor&&indexTumor.virads<=2&&indexTumor.virads>=1&&(<div className="alert-box" style={{marginTop:12,padding:"10px 14px",background:"rgba(16,185,129,0.08)",borderRadius:8,border:"1px solid rgba(16,185,129,0.15)",color:"#6ee7b7",fontSize:13}}>✓ VI-RADS ≤2: Musküler invazyon düşük olasılıklıdır (NMIBC muhtemel). TUR-BT planlanmalıdır. İntravezikal BCG/kemoterapi değerlendirilebilir.</div>)}
                  {(upperUrinary.right!=="normal"||upperUrinary.left!=="normal")&&(<div style={{marginTop:8,color:"#fca5a5",fontSize:13}}>• Üst üriner sistemde eşlik eden patoloji saptanmıştır — detaylar yukarıda.</div>)}
                  {(extras.lymphNode!=="normal")&&(<div style={{marginTop:4,color:"#fca5a5",fontSize:13}}>• Pelvik lenfadenopati bulguları mevcut.</div>)}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  };

  const stepRenderers=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5,renderStep6,renderStep7,renderStep8,renderStep9,renderStep10,renderReport];

  return(
    <div style={S.app}>
      <div style={S.header} className="no-print">
        <h1 style={S.title}>Mesane MR — VI-RADS</h1>
        <div style={S.subtitle}>Vesical Imaging-Reporting & Data System — Yapısal Raporlama Karar Destek Sistemi</div>
      </div>
      <div style={S.progressBar} className="no-print">
        {STEPS.map((s,i)=>(<div key={i} style={S.progressDot(i===step,i<step)} onClick={()=>setStep(i)} title={s}/>))}
      </div>
      <div style={S.card} className={step===11?"":"no-print-card"}>
        <div style={S.stepTitle} className={step===11?"no-print":""}>
          <span style={S.stepBadge}>{step+1}/{STEPS.length}</span>
          <span>{STEPS[step]}</span>
        </div>
        {stepRenderers[step]()}
      </div>
      {step!==11&&!(step===7&&currentTumorIdx>=0)&&(
        <div style={S.btnRow} className="no-print">
          <button style={S.btnSecondary} onClick={goPrev} disabled={step===0}>← Geri</button>
          <button style={S.btnPrimary} onClick={goNext}>{step===10?"Rapor Oluştur →":"İleri →"}</button>
        </div>
      )}
      <div className="no-print" style={{textAlign:"center",marginTop:24,fontSize:11,color:"#475569"}}>
        VI-RADS — Vesical Imaging-Reporting and Data System | Klinik karar destek aracıdır, tanı koymaz.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BladderVIRADS/>);
</script>
</body>
</html>
