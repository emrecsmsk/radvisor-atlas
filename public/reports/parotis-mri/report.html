<style>
:root{
  --bg:#0b0f1a;--surface:#131825;--surface2:#1b2236;--surface3:#222c42;
  --border:#2a3550;--border2:#354060;
  --accent:#10b981;--accent2:#059669;--accent3:#34d399;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --danger:#ef4444;--warn:#f59e0b;--info:#60a5fa;--purple:#a78bfa;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px;}
#root{min-height:100vh;}

/* ── LAYOUT ── */
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:860px;margin:0 auto;padding:16px;}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.hdr-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:700;color:var(--text);}
.hdr-sub{font-size:11px;color:var(--text3);}
.progress-bar{height:3px;background:var(--surface3);border-radius:2px;margin-bottom:18px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent3));border-radius:2px;transition:width .4s ease;}
.step-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.step-num{font-size:11px;color:var(--text3);}
.step-title{font-size:17px;font-weight:700;color:var(--text);}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px;}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:6px;}

/* ── FORM ELEMENTS ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.field input[type=text],.field input[type=number],.field textarea,.field select{
  width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.field textarea{min-height:70px;resize:vertical;}

/* ── CHIP GROUPS ── */
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;user-select:none;}
.chip:hover{border-color:var(--accent);color:var(--text);}
.chip.sel{background:var(--accent2);border-color:var(--accent);color:#fff;font-weight:600;}
.chip.sel-multi{background:var(--surface3);border-color:var(--accent3);color:var(--accent3);}

/* ── GRID ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* ── LEZYON BADGE ── */
.lez-badge{display:inline-flex;align-items:center;gap:5px;background:var(--surface3);
  border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;margin:3px;}
.lez-badge .lez-n{font-weight:700;color:var(--accent);}

/* ── DIFFERENTIAL TABLE ── */
.diff-table{width:100%;border-collapse:collapse;margin-top:6px;}
.diff-table th{text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border);}
.diff-table td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
.diff-table tr:last-child td{border-bottom:none;}
.diff-bar-wrap{width:120px;background:var(--surface3);border-radius:3px;height:6px;overflow:hidden;}
.diff-bar{height:100%;border-radius:3px;transition:width .3s;}
.cat-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.cat-benign{background:#065f46;color:#6ee7b7;}
.cat-malign{background:#7f1d1d;color:#fca5a5;}
.cat-enflamatuar{background:#1e3a5f;color:#93c5fd;}
.cat-kistik{background:#3b2f00;color:#fcd34d;}
.cat-vaskuler{background:#2d1f5e;color:#c4b5fd;}

/* ── NAVIGATION BUTTONS ── */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.btn{padding:9px 18px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-primary{background:var(--accent2);color:#fff;}
.btn-primary:hover{background:var(--accent);}
.btn-secondary{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.btn-secondary:hover{border-color:var(--accent);color:var(--text);}
.btn-danger{background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5;}
.btn-danger:hover{background:#991b1b;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent);}
.btn-outline:hover{background:var(--accent2);color:#fff;}

/* ── ALERT BOXES ── */
.alert{border-radius:7px;padding:10px 14px;margin-bottom:10px;font-size:12px;display:flex;gap:8px;align-items:flex-start;}
.alert-info{background:#172554;border:1px solid #1e40af;color:#93c5fd;}
.alert-warn{background:#451a03;border:1px solid #92400e;color:#fcd34d;}
.alert-success{background:#064e3b;border:1px solid #065f46;color:#6ee7b7;}

/* ── REPORT OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto;}
.report-wrap{background:#fff;color:#111;width:100%;max-width:760px;border-radius:10px;overflow:hidden;}
.report-toolbar{background:#1e293b;padding:10px 16px;display:flex;gap:8px;justify-content:flex-end;}
.report-body{padding:28px 32px;font-family:'Segoe UI',sans-serif;font-size:13px;line-height:1.7;}
.report-body h1{font-size:16px;font-weight:800;text-align:center;margin-bottom:4px;border-bottom:2px solid #111;padding-bottom:6px;}
.report-body h2{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-top:16px;margin-bottom:4px;border-bottom:1px solid #aaa;padding-bottom:2px;}
.report-body h3{font-size:12px;font-weight:700;margin-top:10px;margin-bottom:2px;color:#1a4c2e;}
.report-body p{margin-bottom:4px;}
.report-body .yorum-box{background:#f0fdf4;border:2px solid #16a34a;border-radius:6px;padding:10px 14px;margin-top:14px;}
.report-body .yorum-box h2{border-color:#16a34a;color:#15803d;}
.report-body table{width:100%;border-collapse:collapse;margin:6px 0;font-size:12px;}
.report-body table th{background:#f1f5f9;font-weight:700;padding:5px 8px;text-align:left;border:1px solid #ddd;}
.report-body table td{padding:4px 8px;border:1px solid #ddd;}
.report-body .rank1{font-weight:700;color:#15803d;}
.report-body .rank2{color:#166534;}
.report-body .rank3{color:#374151;}

@media print{.report-toolbar{display:none;}.overlay{background:none;padding:0;}.report-wrap{border-radius:0;width:100%;max-width:none;}}

function hesaplaSkорlar(lez, g, tumLezyonlar){
  const sc={};
  PATOLOJILER.forEach(p=>sc[p.id]=0);
  const add=(id,pts)=>{if(pts>0) sc[id]=Math.min(100,(sc[id]||0)+pts);};

  const bilateral=tumLezyonlar.some(l=>l.lokBez==='sag')&&tumLezyonlar.some(l=>l.lokBez==='sol');
  const cokluLezyon=tumLezyonlar.length>1;

  const {lokBez,lokLob,boyutMm,cokluOdak,kenar,t1,t2,dwi,ce,yag,kist,kalsif,sinirInvazyon}=lez;
  const {yas,cinsiyet,semptom,sagYag,solYag}=g;
  const diffuz=sagYag==='yaygin'||solYag==='yaygin';

  // ── Pleomorfik Adenom ──────────────────────────────────────
  add('pleomorfik',8);
  if(t2==='yuksek')add('pleomorfik',28);
  if(t2==='orta')add('pleomorfik',10);
  if(kenar==='duzgun')add('pleomorfik',20);
  if(dwi==='yok')add('pleomorfik',18);
  if(ce==='heterojen')add('pleomorfik',10);
  if(kist==='fokal')add('pleomorfik',8);
  if(lokLob==='superfisyal')add('pleomorfik',8);
  if(sinirInvazyon==='hayir')add('pleomorfik',10);
  if(cokluOdak==='tek')add('pleomorfik',5);
  if(!bilateral)add('pleomorfik',5);

  // ── Warthin Tümörü ─────────────────────────────────────────
  add('warthin',8);
  if(cinsiyet==='erkek')add('warthin',12);
  if(yas==='yas60')add('warthin',18);
  if(yas==='yas4060')add('warthin',8);
  if(t1==='hiperintens')add('warthin',18);
  if(t2==='orta')add('warthin',15);
  if(dwi==='var_hafif')add('warthin',14);
  if(kist==='fokal'||kist==='dominant')add('warthin',12);
  if(bilateral)add('warthin',22);
  if(kenar==='duzgun')add('warthin',8);
  if(lokLob==='kuyruk')add('warthin',10);

  // ── Bazal Hücreli Adenom ────────────────────────────────────
  add('bazalHucreli',4);
  if(t2==='yuksek')add('bazalHucreli',18);
  if(kenar==='duzgun')add('bazalHucreli',18);
  if(ce==='homojen')add('bazalHucreli',22);
  if(dwi==='yok')add('bazalHucreli',12);
  if(cokluOdak==='tek')add('bazalHucreli',8);

  // ── Onkositom ───────────────────────────────────────────────
  add('onkositom',3);
  if(yas==='yas60')add('onkositom',12);
  if(t2==='orta')add('onkositom',12);
  if(dwi==='var_hafif')add('onkositom',12);
  if(ce==='homojen')add('onkositom',12);
  if(kenar==='duzgun')add('onkositom',10);

  // ── Lipom ───────────────────────────────────────────────────
  add('lipom',2);
  if(yag==='var')add('lipom',65);
  if(t1==='hiperintens')add('lipom',20);
  if(t2==='yuksek')add('lipom',10);
  if(kenar==='duzgun')add('lipom',10);
  if(ce==='yok')add('lipom',8);

  // ── Hemanjiom / VM ──────────────────────────────────────────
  add('hemanjiom',2);
  if(t2==='cok_yuksek')add('hemanjiom',35);
  if(kalsif==='var')add('hemanjiom',22);
  if(ce==='heterojen')add('hemanjiom',12);
  if(kenar==='duzgun')add('hemanjiom',8);
  if(dwi==='yok')add('hemanjiom',8);

  // ── Mukoepidermoid Karsinom ─────────────────────────────────
  add('mukoepidermoid',5);
  if(kenar==='duzensiz')add('mukoepidermoid',20);
  if(kenar==='infiltratif')add('mukoepidermoid',32);
  if(t2==='orta')add('mukoepidermoid',10);
  if(dwi==='var')add('mukoepidermoid',22);
  if(ce==='heterojen')add('mukoepidermoid',10);
  if(sinirInvazyon==='evet')add('mukoepidermoid',15);
  if(kist==='fokal')add('mukoepidermoid',10);
  if(semptom==='agri')add('mukoepidermoid',8);

  // ── Adenoid Kistik Karsinom ─────────────────────────────────
  add('adenoidKistik',4);
  if(sinirInvazyon==='evet')add('adenoidKistik',45);
  if(kenar==='infiltratif')add('adenoidKistik',28);
  if(kenar==='duzensiz')add('adenoidKistik',15);
  if(t2==='dusuk')add('adenoidKistik',22);
  if(t2==='orta')add('adenoidKistik',10);
  if(dwi==='var')add('adenoidKistik',18);
  if(semptom==='agri')add('adenoidKistik',12);

  // ── Asinik Hücreli Karsinom ─────────────────────────────────
  add('asinikHucreli',3);
  if(kenar==='duzensiz')add('asinikHucreli',18);
  if(t2==='orta')add('asinikHucreli',12);
  if(dwi==='var')add('asinikHucreli',18);
  if(kist==='fokal')add('asinikHucreli',12);
  if(lokLob==='superfisyal')add('asinikHucreli',5);

  // ── Adenokarsinom NOS ───────────────────────────────────────
  add('adenokarsinom',3);
  if(kenar==='infiltratif')add('adenokarsinom',22);
  if(kenar==='duzensiz')add('adenokarsinom',12);
  if(dwi==='var')add('adenokarsinom',22);
  if(t2==='dusuk')add('adenokarsinom',12);
  if(sinirInvazyon==='evet')add('adenokarsinom',18);

  // ── Skuamöz HK (Mets.) ─────────────────────────────────────
  add('skuamoz',3);
  if(kenar==='infiltratif')add('skuamoz',22);
  if(dwi==='var')add('skuamoz',18);
  if(lokBez==='intraparotidLN')add('skuamoz',28);
  if(semptom==='agri')add('skuamoz',10);
  if(yas==='yas60')add('skuamoz',10);
  if(cokluLezyon)add('skuamoz',8);

  // ── Lenfoma ─────────────────────────────────────────────────
  add('lenfoma',3);
  if(cokluOdak==='coklu')add('lenfoma',22);
  if(cokluLezyon)add('lenfoma',15);
  if(bilateral)add('lenfoma',20);
  if(t2==='orta')add('lenfoma',12);
  if(dwi==='var')add('lenfoma',18);
  if(ce==='homojen')add('lenfoma',10);
  if(kenar==='duzgun')add('lenfoma',8);

  // ── 1. Brankial Yarık Kisti ─────────────────────────────────
  add('firstBranchial',3);
  if(kist==='dominant')add('firstBranchial',45);
  if(t2==='cok_yuksek')add('firstBranchial',25);
  if(t1==='hipointens')add('firstBranchial',12);
  if(kenar==='duzgun')add('firstBranchial',10);
  if(ce==='yok'||ce==='ince_rim')add('firstBranchial',12);

  // ── Lenfepitelyal Kist (HIV) ────────────────────────────────
  add('lenfepitelyal',3);
  if(bilateral)add('lenfepitelyal',35);
  if(kist==='dominant')add('lenfepitelyal',22);
  if(t2==='cok_yuksek')add('lenfepitelyal',18);
  if(cokluOdak==='coklu'||cokluLezyon)add('lenfepitelyal',18);

  // ── Akut Siyaladinit / Parotit ──────────────────────────────
  add('akutSiyadanit',5);
  if(diffuz)add('akutSiyadanit',32);
  if(t2==='yuksek')add('akutSiyadanit',18);
  if(t2==='cok_yuksek')add('akutSiyadanit',12);
  if(semptom==='agri')add('akutSiyadanit',18);
  if(kenar==='duzensiz')add('akutSiyadanit',12);

  // ── Kronik Siyaladinit ──────────────────────────────────────
  add('kronikSiyadanit',3);
  if(diffuz)add('kronikSiyadanit',22);
  if(t2==='dusuk')add('kronikSiyadanit',18);
  if(kalsif==='var')add('kronikSiyadanit',12);
  if(semptom==='sislik')add('kronikSiyadanit',10);

  // ── Sjögren Sendromu ────────────────────────────────────────
  add('sjogren',3);
  if(bilateral)add('sjogren',28);
  if(diffuz)add('sjogren',22);
  if(kist==='dominant')add('sjogren',18);
  if(cokluOdak==='coklu'||cokluLezyon)add('sjogren',15);
  if(t2==='yuksek')add('sjogren',12);

  // ── Sialolitiazis ───────────────────────────────────────────
  add('sialolitiazis',3);
  if(kalsif==='var')add('sialolitiazis',40);
  if(diffuz)add('sialolitiazis',12);
  if(semptom==='sislik')add('sialolitiazis',18);

  return sc;
}

function topDiff(sc,n=5){
  return Object.entries(sc)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,n)
    .map(([id,s])=>({...PATOLOJI_MAP[id],skor:s}));
}

// ──────────────────────────────────────────────────────────────────────────────
// REPORT GENERATOR
// ──────────────────────────────────────────────────────────────────────────────
function generateReport(global,lezyonlar){
  const topL=(label,val)=>val?`<p><b>${label}:</b> ${val}</p>`:'';

  // Translate full-string state values stored in Turkish to current locale
  const optLbl=(key,val)=>{
    const tr=_TR[key],loc=T[key];
    if(!tr||!loc||!val)return val||'';
    const i=tr.indexOf(val);
    return i>=0?loc[i]:val;
  };

  const bezLabel=(kisa)=>T.bezLabels[kisa]||'';
  const lobLabel=(l)=>T.lobLabels[l]||l;
  const t2Lbl=(v)=>T.t2Labels[v]||v;
  const t1Lbl=(v)=>T.t1Labels[v]||v;
  const dwiLbl=(v)=>T.dwiLabels[v]||v;
  const ceLbl=(v)=>T.ceLabels[v]||v;
  const kenarLbl=(v)=>T.kenarLabels[v]||v;
  const pName=(id)=>T.patolojiNames[id]||id;
  const katLabel=(kat)=>T.katLabels[kat]||kat;

  let lezyonHtml='';
  lezyonlar.forEach((l,i)=>{
    const sc=hesaplaSkорlar(l,global,lezyonlar);
    const top=topDiff(sc,5);
    const lokStr=`${bezLabel(l.lokBez)} ${T.rParotidWord} – ${lobLabel(l.lokLob)}`;
    lezyonHtml+=`
    <h2>${T.rLesion} ${i+1} – ${lokStr.toUpperCase()}</h2>
    <h3>${T.rMorphTitle}</h3>
    ${l.boyutMm?`<p><b>${T.rSizeLabel}:</b> ${l.boyutMm} mm${l.boyutDir?' ('+l.boyutDir+')':''}</p>`:''}
    ${l.cokluOdak?`<p><b>${T.rFocusCount}:</b> ${l.cokluOdak==='tek'?T.rFocusSingle:T.rFocusMulti}</p>`:''}
    ${l.kenar?`<p><b>${T.rMarginLabel}:</b> ${kenarLbl(l.kenar)}</p>`:''}
    ${l.sekil?`<p><b>${T.rShapeLabel}:</b> ${optLbl('s6ShapeOpts',l.sekil)}</p>`:''}
    <h3>${T.rSignalTitle}</h3>
    ${l.t1?`<p><b>${T.rT1Label}:</b> ${t1Lbl(l.t1)}</p>`:''}
    ${l.t2?`<p><b>${T.rT2Label}:</b> ${t2Lbl(l.t2)}</p>`:''}
    ${l.dwi?`<p><b>${T.rDwiLabel}:</b> ${dwiLbl(l.dwi)}${l.adc?' – ADC: '+l.adc:''}</p>`:''}
    ${l.ce?`<p><b>${T.rCeLabel}:</b> ${ceLbl(l.ce)}</p>`:''}
    <h3>${T.rExtraTitle}</h3>
    ${l.yag==='var'?`<p>${T.rFatPresent}</p>`:''}
    ${l.kist&&l.kist!=='yok'?`<p>${l.kist==='fokal'?T.rCystFokal:T.rCystDominant}</p>`:''}
    ${l.kalsif==='var'?`<p>${T.rCalcif}</p>`:''}
    ${l.hemoraji==='var'?`<p>${T.rHem}</p>`:''}
    ${l.sinirInvazyon==='evet'?`<p style="color:#dc2626;font-weight:700">${T.rNerveInv}</p>`:''}
    <h3>${T.rDiffTitle}</h3>
    <table>
      <tr><th>${T.rDiffCols[0]}</th><th>${T.rDiffCols[1]}</th><th>${T.rDiffCols[2]}</th><th>${T.rDiffCols[3]}</th></tr>
      ${top.map((p,idx)=>`<tr class="${idx===0?'rank1':idx===1?'rank2':'rank3'}">
        <td>${idx+1}</td><td>${pName(p.id)}</td><td>${katLabel(p.kat)}</td><td>${p.skor}/100</td>
      </tr>`).join('')}
    </table>`;
  });

  const fasiyalStr=global.fasiyal==='intakt'?T.rFacialisIntact
    :global.fasiyal==='deplase'?`${T.rFacialisDeplase} ${global.fasiyalDetay||''}`
    :global.fasiyal==='invazyon'?`<b style="color:#dc2626">${T.rFacialisInv}</b> ${global.fasiyalDetay||''}`
    :T.rFacialisNone;

  const komsList=(global.komsYayilim||[]).map(v=>optLbl('s14Opts',v)).join(', ')||T.rAdjacentDefault;

  const yorumBulgu=lezyonlar.length>0?
    T.rCommentLesion.replace('{{n}}',lezyonlar.length):
    T.rCommentNoLesion;

  const malignFlag=lezyonlar.some(l=>{
    const sc=hesaplaSkорlar(l,global,lezyonlar);
    const top=topDiff(sc,1);
    return top[0]&&top[0].kat==='Malign Tümör'&&top[0].skor>=50;
  });

  return `
  <h1>${T.rTitle}</h1>

  <h2>${T.rTech}</h2>
  ${topL(T.rSeqQuality,optLbl('s0QualityOpts',global.sekansKalite))}
  ${topL(T.rContrast,optLbl('s0ContrastOpts',global.enjeksiyon))}
  ${topL(T.rPlane,optLbl('s0PlaneOpts',global.kesit))}

  <h2>${T.rRightParotid}</h2>
  ${topL(T.rSize,global.sagBoyut?global.sagBoyut+' mm':'')}
  ${topL(T.rSignalHomo,optLbl('s1SignalOpts',global.sagSinyal))}
  ${topL(T.rFatContent,T.yagLabels[global.sagYag]||global.sagYag||'')}
  ${topL(T.rStensen,optLbl('s1DuctOpts',global.sagDuktus))}
  ${!global.sagBoyut&&!global.sagSinyal?`<p>${T.rRightDefault}</p>`:''}

  <h2>${T.rLeftParotid}</h2>
  ${topL(T.rSize,global.solBoyut?global.solBoyut+' mm':'')}
  ${topL(T.rSignalHomo,optLbl('s2SignalOpts',global.solSinyal))}
  ${topL(T.rFatContent,T.yagLabels[global.solYag]||global.solYag||'')}
  ${topL(T.rStensen,optLbl('s2DuctOpts',global.solDuktus))}
  ${!global.solBoyut&&!global.solSinyal?`<p>${T.rLeftDefault}</p>`:''}

  ${lezyonlar.length>0?lezyonHtml:`<h2>${T.rFocalLesion}</h2><p>${T.rNoFocal}</p>`}

  <h2>${T.rFacialis}</h2>
  <p>${fasiyalStr}</p>

  <h2>${T.rLymphNodes}</h2>
  ${topL(T.rLymphFinding,global.lenfDetay||optLbl('s13Opts',global.lenf))}
  ${!global.lenf?`<p>${T.rLymphDefault}</p>`:''}

  <h2>${T.rAdjacent}</h2>
  <p>${komsList}</p>

  <h2>${T.rClinical}</h2>
  ${topL(T.rAgeGroup,T.rAgeOpts[global.yas]||'')}
  ${topL(T.rSex,T.cinsiyetLabels[global.cinsiyet]||global.cinsiyet||'')}
  ${topL(T.rSymptom,T.rSymptomOpts[global.semptom]||'')}
  ${topL(T.rDuration,optLbl('s15DurationOpts',global.suresi))}
  ${topL(T.rExtra,global.ekBulgular)}

  <div class="yorum-box">
    <h2>${T.rCommentTitle}</h2>
    <p>${yorumBulgu}</p>
    ${malignFlag?`<p><b>${T.rMalignAlert}</b></p>`:''}
    ${global.fasiyal==='invazyon'?`<p><b>${T.rNerveAlert}</b></p>`:''}
  </div>`;
}

// ──────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ──────────────────────────────────────────────────────────────────────────────
function App(){
  const [step,setStep]=useState(0);
  const [global,setGlobal]=useState(initGlobal());
  const [lezyonlar,setLezyonlar]=useState([]);
  const [currentIdx,setCurrentIdx]=useState(-1);
  const [showReport,setShowReport]=useState(false);
  const reportRef=useRef(null);

  const setG=(k,v)=>setGlobal(g=>({...g,[k]:v}));
  const setL=(k,v)=>{
    if(currentIdx<0)return;
    setLezyonlar(arr=>arr.map((l,i)=>i===currentIdx?{...l,[k]:v}:l));
  };
  const toggleG=(k,v)=>setGlobal(g=>({...g,[k]:g[k]===v?'':v}));
  const toggleL=(k,v)=>{
    if(currentIdx<0)return;
    setLezyonlar(arr=>arr.map((l,i)=>{
      if(i!==currentIdx)return l;
      return {...l,[k]:l[k]===v?'':v};
    }));
  };
  const toggleGArr=(k,v)=>setGlobal(g=>{
    const arr=g[k]||[];
    return {...g,[k]:arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]};
  });

  const lez=currentIdx>=0?lezyonlar[currentIdx]:null;

  const addLezyon=()=>{
    const idx=lezyonlar.length;
    setLezyonlar(arr=>[...arr,initLezyon()]);
    setCurrentIdx(idx);
    setStep(LOOP_START);
  };

  const finalizeLezyon=()=>{
    setCurrentIdx(-1); // 3-PART FIX PART 1
    setStep(LEZYON_OZET);
  };

  const handleNext=()=>{
    if(step===3){
      if(global.lezyonVar==='evet'){addLezyon();return;}
      if(global.lezyonVar==='hayir'){setStep(LEZYON_OZET);return;}
      return;
    }
    if(step===LOOP_END){finalizeLezyon();return;}
    if(step===LEZYON_OZET){setStep(POST_LOOP);return;}
    if(step===TOTAL_STEPS-2){setShowReport(true);return;}
    setStep(s=>Math.min(s+1,TOTAL_STEPS-1));
  };

  const handlePrev=()=>{
    if(step===POST_LOOP){ // 3-PART FIX PART 3
      setStep(LEZYON_OZET);return;
    }
    if(step===LEZYON_OZET){setStep(3);return;}
    if(step===LOOP_START){setStep(3);return;}
    setStep(s=>Math.max(s-1,0));
  };

  const progress=(step/(TOTAL_STEPS-1))*100;
  const isInLoop=step>=LOOP_START&&step<=LOOP_END;

  // ── REPORT OVERLAY ──────────────────────────────────────────────────────────
  if(showReport){
    const html=generateReport(global,lezyonlar);
    const copyReport=()=>{
      const el=reportRef.current;
      if(!el)return;
      const range=document.createRange();
      range.selectNodeContents(el);
      const sel=window.getSelection();
      sel.removeAllRanges();sel.addRange(range);
      try{document.execCommand('copy');}catch(e){}
      sel.removeAllRanges();
      alert(T.copiedMsg);
    };
    const downloadReport=()=>{
      const fullHtml=`<!DOCTYPE html><html lang="${T.downloadLangAttr}"><head><meta charset="UTF-8"><title>${T.downloadTitle}</title><style>body{font-family:'Segoe UI',sans-serif;font-size:13px;line-height:1.7;max-width:760px;margin:24px auto;color:#111;}h1{font-size:16px;font-weight:800;text-align:center;border-bottom:2px solid #111;padding-bottom:6px;}h2{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-top:16px;border-bottom:1px solid #aaa;padding-bottom:2px;}h3{font-size:12px;font-weight:700;margin-top:10px;color:#1a4c2e;}p{margin-bottom:4px;}table{width:100%;border-collapse:collapse;margin:6px 0;font-size:12px;}th{background:#f1f5f9;font-weight:700;padding:5px 8px;text-align:left;border:1px solid #ddd;}td{padding:4px 8px;border:1px solid #ddd;}.yorum-box{background:#f0fdf4;border:2px solid #16a34a;border-radius:6px;padding:10px 14px;margin-top:14px;}.yorum-box h2{border-color:#16a34a;color:#15803d;}</style></head><body>${html}</body></html>`;
      const blob=new Blob([fullHtml],{type:'text/html;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=T.downloadFile;a.click();
      URL.revokeObjectURL(url);
    };
    return(
      <div className="overlay">
        <div className="report-wrap">
          <div className="report-toolbar">
            <button className="btn btn-secondary btn-sm" onClick={copyReport}>{T.copyBtn}</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>window.print()}>{T.printBtn}</button>
            <button className="btn btn-secondary btn-sm" onClick={downloadReport}>{T.downloadBtn}</button>
            <button className="btn btn-primary btn-sm" onClick={()=>setShowReport(false)}>{T.closeBtn}</button>
          </div>
          <div className="report-body" ref={reportRef} dangerouslySetInnerHTML={{__html:html}}/>
        </div>
      </div>
    );
  }

  // ── STEP RENDERER ────────────────────────────────────────────────────────────
  const renderStep=()=>{
    switch(step){

      // ── STEP 0: Teknik ──────────────────────────────────────────────────────
      case 0:return(
        <div>
          <div className="card">
            <div className="card-title">{T.s0CardTitle}</div>
            <div className="field"><label>{T.s0Quality}</label>
              <div className="chips">
                {T.s0QualityOpts.map((v,i)=>(
                  <CHIP key={i} active={global.sekansKalite===_TR.s0QualityOpts[i]} onClick={()=>toggleG('sekansKalite',_TR.s0QualityOpts[i])}>{v}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s0Contrast}</label>
              <div className="chips">
                {T.s0ContrastOpts.map((v,i)=>(
                  <CHIP key={i} active={global.enjeksiyon===_TR.s0ContrastOpts[i]} onClick={()=>toggleG('enjeksiyon',_TR.s0ContrastOpts[i])}>{v}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s0Plane}</label>
              <div className="chips">
                {T.s0PlaneOpts.map((v,i)=>(
                  <CHIP key={i} active={global.kesit===_TR.s0PlaneOpts[i]} onClick={()=>toggleG('kesit',_TR.s0PlaneOpts[i])}>{v}</CHIP>

      // ── STEP 1: Sağ Parotis ─────────────────────────────────────────────────
      case 1:return(
        <div>
          <div className="card">
            <div className="card-title">{T.s1CardTitle}</div>

              <input type="number" className="field" placeholder={T.s1SizePh}
                value={global.sagBoyut} onChange={e=>setG('sagBoyut',e.target.value)}
                style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontSize:13}}/>
            </div>
            <div className="field"><label>{T.s1Signal}</label>
              <div className="chips">
                {T.s1SignalOpts.map((v,i)=>(
                  <CHIP key={i} active={global.sagSinyal===_TR.s1SignalOpts[i]} onClick={()=>toggleG('sagSinyal',_TR.s1SignalOpts[i])}>{v}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s1Fat}</label>
              <div className="chips">
                {T.s1FatOpts.map(([v,l],i)=>(
                  <CHIP key={v} active={global.sagYag===v} onClick={()=>toggleG('sagYag',v)}>{l}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s1Duct}</label>
              <div className="chips">
                {T.s1DuctOpts.map((v,i)=>(
                  <CHIP key={i} active={global.sagDuktus===_TR.s1DuctOpts[i]} onClick={()=>toggleG('sagDuktus',_TR.s1DuctOpts[i])}>{v}</CHIP>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      // ── STEP 2: Sol Parotis ─────────────────────────────────────────────────
      case 2:return(
        <div>
          <div className="card">
            <div className="card-title">{T.s2CardTitle}</div>
            <div className="field"><label>{T.s2Size}</label>
              <input type="number" placeholder={T.s2SizePh}
                value={global.solBoyut} onChange={e=>setG('solBoyut',e.target.value)}
                style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontSize:13}}/>
            </div>
            <div className="field"><label>{T.s2Signal}</label>
              <div className="chips">
                {T.s2SignalOpts.map((v,i)=>(
                  <CHIP key={i} active={global.solSinyal===_TR.s2SignalOpts[i]} onClick={()=>toggleG('solSinyal',_TR.s2SignalOpts[i])}>{v}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s2Fat}</label>
              <div className="chips">
                {T.s2FatOpts.map(([v,l],i)=>(
                  <CHIP key={v} active={global.solYag===v} onClick={()=>toggleG('solYag',v)}>{l}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s2Duct}</label>
              <div className="chips">
                {T.s2DuctOpts.map((v,i)=>(
                  <CHIP key={i} active={global.solDuktus===_TR.s2DuctOpts[i]} onClick={()=>toggleG('solDuktus',_TR.s2DuctOpts[i])}>{v}</CHIP>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      // ── STEP 3: Lezyon Tespiti ──────────────────────────────────────────────
      case 3:return(
        <div>
          <div className="card">
            <div className="card-title">{T.s3CardTitle}</div>
            <div className="field"><label>{T.s3Question}</label>
              <div className="chips">
                <CHIP active={global.lezyonVar==='evet'} onClick={()=>toggleG('lezyonVar','evet')}>{T.s3Yes}</CHIP>
                <CHIP active={global.lezyonVar==='hayir'} onClick={()=>toggleG('lezyonVar','hayir')}>{T.s3No}</CHIP>
              </div>
            </div>
            {lezyonlar.length>0&&(
              <div>
                <div style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>{T.s3AddedLabel}</div>
                {lezyonlar.map((l,i)=>(
                  <span key={i} className="lez-badge">
                    <span className="lez-n">L{i+1}</span>
                    {l.lokBez?` – ${l.lokBez==='sag'?T.s3Right:T.s3Left} ${T.lobDisplayLabels[l.lokLob]||l.lokLob||''}`:` – ${T.s3Defining}`}
                  </span>
                ))}
              </div>
            )}
          </div>
          {global.lezyonVar==='evet'&&(
            <button className="btn btn-primary" style={{width:'100%'}} onClick={addLezyon}>
              {T.s3AddBtn}{lezyonlar.length+1})
            </button>
          )}
        </div>
      );

      // ── LOOP STEP 4: Lokalizasyon ───────────────────────────────────────────
      case 4:return lez?(
        <div>
          <div className="alert alert-info">{T.s4Alert} {currentIdx+1} / {T.s4AlertStep}</div>
          <div className="card">
            <div className="card-title">{T.s4WhichGland}</div>
            <div className="chips">
              {T.s4GlandOpts.map(([v,l])=>(
                <CHIP key={v} active={lez.lokBez===v} onClick={()=>toggleL('lokBez',v)}>{l}</CHIP>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-title">{T.s4LobTitle}</div>
            <div className="chips">
              {T.s4LobOpts.map(([v,l])=>(
                <CHIP key={v} active={lez.lokLob===v} onClick={()=>toggleL('lokLob',v)}>{l}</CHIP>
              ))}
            </div>
          </div>
        </div>
      ):null;

      // ── LOOP STEP 5: Boyut ──────────────────────────────────────────────────
      case 5:return lez?(
        <div>
          <div className="alert alert-info">{T.s4Alert} {currentIdx+1} / {T.s5Alert}</div>
          <div className="card">
            <div className="card-title">{T.s5CardTitle}</div>
            <div className="grid2">
              <div className="field"><label>{T.s5LongAxis}</label>
                <input type="number" placeholder={T.s5LongAxisPh}
                  value={lez.boyutMm} onChange={e=>setL('boyutMm',e.target.value)}
                  style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontSize:13}}/>
              </div>
              <div className="field"><label>{T.s5Dir}</label>
                <input type="text" placeholder={T.s5DirPh}
                  value={lez.boyutDir} onChange={e=>setL('boyutDir',e.target.value)}
                  style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 10px',color:'var(--text)',fontSize:13}}/>
              </div>
            </div>
            <div className="field"><label>{T.s5FocusLabel}</label>
              <div className="chips">
                <CHIP active={lez.cokluOdak==='tek'} onClick={()=>toggleL('cokluOdak','tek')}>{T.s5Single}</CHIP>
                <CHIP active={lez.cokluOdak==='coklu'} onClick={()=>toggleL('cokluOdak','coklu')}>{T.s5Multi}</CHIP>
              </div>
            </div>
          </div>
        </div>
      ):null;

      // ── LOOP STEP 6: Sınır/Şekil ───────────────────────────────────────────
      case 6:return lez?(
        <div>
          <div className="alert alert-info">{T.s4Alert} {currentIdx+1} / {T.s6Alert}</div>
          <div className="card">
            <div className="card-title">{T.s6MarginTitle}</div>
            <div className="chips">
              {T.s6MarginOpts.map(([v,l])=>(
                <CHIP key={v} active={lez.kenar===v} onClick={()=>toggleL('kenar',v)}>{l}</CHIP>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-title">{T.s6ShapeTitle}</div>
            <div className="chips">
              {T.s6ShapeOpts.map((v,i)=>(
                <CHIP key={i} active={lez.sekil===_TR.s6ShapeOpts[i]} onClick={()=>toggleL('sekil',_TR.s6ShapeOpts[i])}>{v}</CHIP>
              ))}
            </div>
          </div>
        </div>
      ):null;

      // ── LOOP STEP 7: T1/T2 ─────────────────────────────────────────────────
      case 7:return lez?(
        <div>
          <div className="alert alert-info">{T.s4Alert} {currentIdx+1} / {T.s7Alert}</div>
          <div className="card">
            <div className="card-title">{T.s7T1Title}</div>
            <div className="chips">
              {T.s7T1Opts.map(([v,l])=>(
                <CHIP key={v} active={lez.t1===v} onClick={()=>toggleL('t1',v)}>{l}</CHIP>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-title">{T.s7T2Title}</div>
            <div className="chips">
              {T.s7T2Opts.map(([v,l])=>(
                <CHIP key={v} active={lez.t2===v} onClick={()=>toggleL('t2',v)}>{l}</CHIP>
              ))}
            </div>
          </div>
        </div>
      ):null;

      // ── LOOP STEP 8: DWI/ADC ───────────────────────────────────────────────
      case 8:return lez?(
        <div>
          <div className="alert alert-info">{T.s4Alert} {currentIdx+1} / {T.s8Alert}</div>
          <div className="card">
            <div className="card-title">{T.s8DwiTitle}</div>
            <div className="chips">
              {T.s8DwiOpts.map(([v,l])=>(
                <CHIP key={v} active={lez.dwi===v} onClick={()=>toggleL('dwi',v)}>{l}</CHIP>
              ))}
            </div>
            {lez.dwi==='var'&&(
              <div className="alert alert-warn" style={{marginTop:10}}>{T.s8DwiWarn}</div>
            )}
          </div>
          <div className="card">
            <div className="card-title">{T.s8AdcTitle}</div>
            <div className="chips">
              {T.s8AdcOpts.map(([v,l])=>(
                <CHIP key={v} active={lez.adc===v} onClick={()=>toggleL('adc',v)}>{l}</CHIP>
              ))}
            </div>
          </div>
        </div>
      ):null;

      // ── LOOP STEP 9: Kontrastlanma ─────────────────────────────────────────
      case 9:return lez?(
        <div>
          <div className="alert alert-info">{T.s4Alert} {currentIdx+1} / {T.s9Alert}</div>
          <div className="card">
            <div className="card-title">{T.s9CeTitle}</div>
            <div className="chips">
              {T.s9CeOpts.map(([v,l])=>(
                <CHIP key={v} active={lez.ce===v} onClick={()=>toggleL('ce',v)}>{l}</CHIP>
              ))}
            </div>
          </div>
        </div>
      ):null;

      // ── LOOP STEP 10: Ek Özellikler ────────────────────────────────────────
      case 10:return lez?(
        <div>
          <div className="alert alert-info">{T.s4Alert} {currentIdx+1} / {T.s10Alert}</div>
          <div className="card">
            <div className="card-title">{T.s10FatTitle}</div>
            <div className="chips">
              <CHIP active={lez.yag==='yok'} onClick={()=>toggleL('yag','yok')}>{T.s10FatNo}</CHIP>
              <CHIP active={lez.yag==='var'} onClick={()=>toggleL('yag','var')}>{T.s10FatYes}</CHIP>
            </div>
          </div>
          <div className="card">
            <div className="card-title">{T.s10CystTitle}</div>
            <div className="chips">
              {T.s10CystOpts.map(([v,l])=>(
                <CHIP key={v} active={lez.kist===v} onClick={()=>toggleL('kist',v)}>{l}</CHIP>
              ))}
            </div>
          </div>
          <div className="card">
            <div className="card-title">{T.s10ExtraTitle}</div>
            <div className="grid2">
              <div>
                <div style={{fontSize:12,color:'var(--text2)',marginBottom:6}}>{T.s10CalcifLabel}</div>
                <div className="chips">
                  <CHIP active={lez.kalsif==='yok'} onClick={()=>toggleL('kalsif','yok')}>{T.s10CalcifNo}</CHIP>
                  <CHIP active={lez.kalsif==='var'} onClick={()=>toggleL('kalsif','var')}>{T.s10CalcifYes}</CHIP>
                </div>
              </div>
              <div>
                <div style={{fontSize:12,color:'var(--text2)',marginBottom:6}}>{T.s10HemLabel}</div>
                <div className="chips">
                  <CHIP active={lez.hemoraji==='yok'} onClick={()=>toggleL('hemoraji','yok')}>{T.s10HemNo}</CHIP>
                  <CHIP active={lez.hemoraji==='var'} onClick={()=>toggleL('hemoraji','var')}>{T.s10HemYes}</CHIP>
                </div>
              </div>
            </div>
          </div>
          <div className="card">
            <div className="card-title">{T.s10NerveTitle}</div>
            <div className="chips">
              <CHIP active={lez.sinirInvazyon==='hayir'} onClick={()=>toggleL('sinirInvazyon','hayir')}>{T.s10NerveNo}</CHIP>
              <CHIP active={lez.sinirInvazyon==='evet'} onClick={()=>toggleL('sinirInvazyon','evet')}>{T.s10NerveYes}</CHIP>
            </div>
            {lez.sinirInvazyon==='evet'&&(
              <div className="alert alert-warn" style={{marginTop:10}}>{T.s10NerveWarn}</div>
            )}
          </div>
          {/* Instant Diff Preview */}
          <div className="card">
            <div className="card-title">{T.s10DiffTitle}</div>
            {(()=>{
              const sc=hesaplaSkорlar(lez,global,lezyonlar);
              const top=topDiff(sc,5);
              return(
                <table className="diff-table">
                  <thead><tr><th>{T.s10DiffCols[0]}</th><th>{T.s10DiffCols[1]}</th><th>{T.s10DiffCols[2]}</th><th>{T.s10DiffCols[3]}</th></tr></thead>
                  <tbody>
                    {top.map((p,i)=>(
                      <tr key={p.id}>
                        <td style={{fontWeight:700,color:'var(--accent)'}}>{i+1}</td>
                        <td style={{fontWeight:i===0?700:400}}>{T.patolojiNames[p.id]||p.name}</td>
                        <td>{katBadge(p.kat)}</td>
                        <td>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div className="diff-bar-wrap">
                              <div className="diff-bar" style={{width:`${p.skor}%`,background:p.kat==='Malign Tümör'?'#ef4444':p.kat==='Benign Tümör'?'#10b981':'#60a5fa'}}/>
                            </div>
                            <span style={{fontSize:11,color:'var(--text2)'}}>{p.skor}</span>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              );
            })()}
          </div>
        </div>
      ):null;

      // ── STEP 11: Lezyon Özeti ───────────────────────────────────────────────
      case 11:return(
        <div>
          {lezyonlar.length===0?(
            <div className="card">
              <div className="card-title">{T.s11CardTitle}</div>
              <div className="alert alert-info">{T.s11NoLezyon}</div>
            </div>
          ):(
            lezyonlar.map((l,i)=>{
              const sc=hesaplaSkорlar(l,global,lezyonlar);
              const top=topDiff(sc,3);
              return(
                <div key={i} className="card">
                  <div className="card-title">◈ {T.s4Alert} {i+1} – {l.lokBez==='sag'?T.s3Right:l.lokBez==='sol'?T.s3Left:'?'} {T.lobDisplayLabels[l.lokLob]||l.lokLob||''}</div>
                  <table className="diff-table">
                    <thead><tr><th>{T.s11DiffCols[0]}</th><th>{T.s11DiffCols[1]}</th><th>{T.s11DiffCols[2]}</th><th>{T.s11DiffCols[3]}</th></tr></thead>
                    <tbody>
                      {top.map((p,idx)=>(
                        <tr key={p.id}>
                          <td style={{fontWeight:700,color:'var(--accent)'}}>{idx+1}</td>
                          <td style={{fontWeight:idx===0?700:400}}>{T.patolojiNames[p.id]||p.name}</td>
                          <td>{katBadge(p.kat)}</td>
                          <td>
                            <div className="diff-bar-wrap">
                              <div className="diff-bar" style={{width:`${p.skor}%`,background:p.kat==='Malign Tümör'?'#ef4444':'#10b981'}}/>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })
          )}
          <button className="btn btn-outline" style={{width:'100%',marginBottom:8}} onClick={addLezyon}>
            {T.s11AddBtn}{lezyonlar.length+1})
          </button>
        </div>
      );

      // ── STEP 12: Fasiyal Sinir ──────────────────────────────────────────────
      case 12:return(
        <div>
          <div className="card">
            <div className="card-title">{T.s12CardTitle}</div>
            <div className="chips">
              {T.s12Opts.map(([v,l])=>(
                <CHIP key={v} active={global.fasiyal===v} onClick={()=>toggleG('fasiyal',v)}>{l}</CHIP>
              ))}
            </div>
            {global.fasiyal&&global.fasiyal!=='intakt'&&(
              <div className="field" style={{marginTop:12}}>
                <label>{T.s12DetailLabel}</label>
                <textarea value={global.fasiyalDetay} onChange={e=>setG('fasiyalDetay',e.target.value)} placeholder={T.s12DetailPh}/>
              </div>
            )}
            {global.fasiyal==='invazyon'&&(
              <div className="alert alert-warn" style={{marginTop:8}}>{T.s12InvWarn}</div>
            )}
          </div>
        </div>
      );

      // ── STEP 13: Lenf Nodları ───────────────────────────────────────────────
      case 13:return(
        <div>
          <div className="card">
            <div className="card-title">{T.s13CardTitle}</div>
            <div className="chips">
              {T.s13Opts.map((v,i)=>(
                <CHIP key={i} active={global.lenf===_TR.s13Opts[i]} onClick={()=>toggleG('lenf',_TR.s13Opts[i])}>{v}</CHIP>
              ))}
            </div>
            {global.lenf&&global.lenf!==_TR.s13Opts[0]&&(
              <div className="field" style={{marginTop:12}}>
                <label>{T.s13DetailLabel}</label>
                <textarea value={global.lenfDetay} onChange={e=>setG('lenfDetay',e.target.value)} placeholder={T.s13DetailPh}/>
              </div>
            )}
          </div>
        </div>
      );

      // ── STEP 14: Komşu Yapılar ──────────────────────────────────────────────
      case 14:return(
        <div>
          <div className="card">
            <div className="card-title">{T.s14CardTitle}</div>
            <div className="chips" style={{flexWrap:'wrap'}}>
              {T.s14Opts.map((v,i)=>(
                <MCHIP key={i} active={(global.komsYayilim||[]).includes(_TR.s14Opts[i])} onClick={()=>toggleGArr('komsYayilim',_TR.s14Opts[i])}>{v}</MCHIP>
              ))}
            </div>
          </div>
        </div>
      );

      // ── STEP 15: Klinik Bilgi ───────────────────────────────────────────────
      case 15:return(
        <div>
          <div className="card">
            <div className="card-title">{T.s15CardTitle}</div>
            <div className="field"><label>{T.s15AgeLabel}</label>
              <div className="chips">
                {T.s15AgeOpts.map(([v,l])=>(
                  <CHIP key={v} active={global.yas===v} onClick={()=>toggleG('yas',v)}>{l}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s15SexLabel}</label>
              <div className="chips">
                <CHIP active={global.cinsiyet==='erkek'} onClick={()=>toggleG('cinsiyet','erkek')}>{T.s15Male}</CHIP>
                <CHIP active={global.cinsiyet==='kadin'} onClick={()=>toggleG('cinsiyet','kadin')}>{T.s15Female}</CHIP>
              </div>
            </div>
            <div className="field"><label>{T.s15SymptomLabel}</label>
              <div className="chips">
                {T.s15SymptomOpts.map(([v,l])=>(
                  <CHIP key={v} active={global.semptom===v} onClick={()=>toggleG('semptom',v)}>{l}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s15DurationLabel}</label>
              <div className="chips">
                {T.s15DurationOpts.map((v,i)=>(
                  <CHIP key={i} active={global.suresi===_TR.s15DurationOpts[i]} onClick={()=>toggleG('suresi',_TR.s15DurationOpts[i])}>{v}</CHIP>
                ))}
              </div>
            </div>
            <div className="field"><label>{T.s15ExtraLabel}</label>
              <textarea value={global.ekBulgular} onChange={e=>setG('ekBulgular',e.target.value)} placeholder={T.s15ExtraPh}/>
            </div>
          </div>
        </div>
      );

      // ── STEP 16: Rapor ──────────────────────────────────────────────────────
      case 16:
        const totalLez=lezyonlar.length;
        const malignCount=lezyonlar.filter(l=>{
          const sc=hesaplaSkорlar(l,global,lezyonlar);
          const top=topDiff(sc,1);
          return top[0]&&top[0].kat==='Malign Tümör'&&top[0].skor>=50;
        }).length;
        return(
          <div>
            <div className="card">
              <div className="card-title">{T.s16SummaryTitle}</div>
              <div className="grid3" style={{marginBottom:14}}>
                <div style={{background:'var(--surface2)',borderRadius:8,padding:'12px',textAlign:'center'}}>
                  <div style={{fontSize:22,fontWeight:800,color:'var(--accent)'}}>{totalLez}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{T.s16LezLabel}</div>
                </div>
                <div style={{background:'var(--surface2)',borderRadius:8,padding:'12px',textAlign:'center'}}>
                  <div style={{fontSize:22,fontWeight:800,color:malignCount>0?'var(--danger)':'var(--accent)'}}>{malignCount}</div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{T.s16MalignLabel}</div>
                </div>
                <div style={{background:'var(--surface2)',borderRadius:8,padding:'12px',textAlign:'center'}}>
                  <div style={{fontSize:22,fontWeight:800,color:global.fasiyal==='invazyon'?'var(--danger)':'var(--text2)'}}>
                    {global.fasiyal==='intakt'?'✓':global.fasiyal==='invazyon'?'!':'–'}
                  </div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{T.s16NervLabel}</div>
                </div>
              </div>
              {lezyonlar.map((l,i)=>{
                const sc=hesaplaSkорlar(l,global,lezyonlar);
                const top=topDiff(sc,3);
                return(
                  <div key={i} style={{marginBottom:14}}>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--accent)',marginBottom:6}}>
                      {T.s4Alert} {i+1} – {l.lokBez==='sag'?T.s3Right:l.lokBez==='sol'?T.s3Left:l.lokBez||'?'} {T.lobDisplayLabels[l.lokLob]||l.lokLob||''} {l.boyutMm?`(${l.boyutMm} mm)`:''}
                    </div>
                    <table className="diff-table">
                      <thead><tr><th>{T.s16DiffCols[0]}</th><th>{T.s16DiffCols[1]}</th><th>{T.s16DiffCols[2]}</th><th style={{width:160}}>{T.s16DiffCols[3]}</th></tr></thead>
                      <tbody>
                        {top.map((p,idx)=>(
                          <tr key={p.id}>
                            <td style={{fontWeight:700,color:'var(--accent)',width:40}}>{idx+1}</td>
                            <td style={{fontWeight:idx===0?700:400}}>{T.patolojiNames[p.id]||p.name}</td>
                            <td>{katBadge(p.kat)}</td>
                            <td>
                              <div style={{display:'flex',alignItems:'center',gap:8}}>
                                <div className="diff-bar-wrap">
                                  <div className="diff-bar" style={{width:`${p.skor}%`,background:p.kat==='Malign Tümör'?'#ef4444':p.kat==='Benign Tümör'?'#10b981':'#60a5fa'}}/>
                                </div>
                                <span style={{fontSize:11,color:'var(--text2)',minWidth:24}}>{p.skor}</span>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                );
              })}
            </div>
            <button className="btn btn-primary" style={{width:'100%',padding:12,fontSize:14}}
              onClick={()=>setShowReport(true)}>
              {T.generateBtn}
            </button>
          </div>
        );

      default:return null;
    }
  };

  // ── NAVIGATION BUTTON LOGIC ─────────────────────────────────────────────────
  const showNext=!(step===3&&global.lezyonVar==='evet')||lezyonlar.length>0;
  const nextLabel=
    step===LOOP_END?T.lezTamamla:
    step===LEZYON_OZET?T.devam:
    step===TOTAL_STEPS-2?T.rapoGit:
    step===TOTAL_STEPS-1?'':
    T.next;
  const prevLabel=step===0?'':
    step===POST_LOOP||step===LEZYON_OZET?T.backLezyon:
    T.back;

  return(
    <div className="shell">
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-icon">🫁</div>
        <div>
          <div className="hdr-title">{T.appTitle}</div>
          <div className="hdr-sub">{T.appSub}</div>
        </div>
        <div style={{marginLeft:'auto',fontSize:11,color:'var(--text3)'}}>
          {isInLoop&&`L${currentIdx+1} / ${T.stepOf} ${step-LOOP_START+1}`}
        </div>
      </div>

      {/* PROGRESS */}
      <div className="progress-bar">
        <div className="progress-fill" style={{width:`${progress}%`}}/>
      </div>

      {/* STEP INFO */}
      <div className="step-info">
        <span className="step-num">{T.stepOf} {step+1} / {TOTAL_STEPS}</span>
        <span className="step-title">{STEP_TITLES[step]}</span>
      </div>

      {/* STEP CONTENT */}
      <div style={{flex:1}}>
        {renderStep()}
      </div>

      {/* NAVIGATION */}
      {step<TOTAL_STEPS-1&&(
        <div className="nav">
          <button className="btn btn-secondary" onClick={handlePrev} disabled={step===0}
            style={{visibility:step===0?'hidden':'visible'}}>
            {prevLabel}
          </button>
          {nextLabel&&(
            <button className="btn btn-primary" onClick={handleNext}>
              {nextLabel}
            </button>
          )}
        </div>
      )}
      {step===TOTAL_STEPS-1&&(
        <div className="nav">
          <button className="btn btn-secondary" onClick={handlePrev}>{T.geri}</button>
          <button className="btn btn-primary" onClick={()=>setShowReport(true)}>{T.viewReportBtn}</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
