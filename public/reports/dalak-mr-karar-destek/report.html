    const STEP_MAP = Object.fromEntries(STEPS.map((s) => [s.id, s]));

    function getNextStep(currentId, answers) {
      const a = answers[currentId];
      switch (currentId) {
        case "S1": return a === T.opt.izlendi ? "S3" : "S2";
        case "S2": return "END";
        case "S3": return "S4";
        case "S4": return a === T.opt.ektopik ? "S5" : "S6";
        case "S5": return "S6";
        case "S6": return "S7";
        case "S7": return "S8";
        case "S8": return a === T.opt.var ? "S9" : "S11";
        case "S9": return "S10";
        case "S10": return "S11";
        case "S11": return "S12";
        case "S12": return "S13";
        case "S13": return "S14";
        case "S14": return "S15";
        case "S15": return "S16";
        case "S16": return "S17";
        case "S17": return a === T.opt.var ? "L1" : "END";
        case "L1": return "L2";
        case "L2": return "L3";
        case "L3": return "L4";
        case "L4": return "L5";
        case "L5": return "L6";
        case "L6": return a === T.opt.var ? "L7" : "L8";
        case "L7": return "L8";
        case "L8": return "L9";
        case "L9": return "L10";
        case "L10": return "L11";
        case "L11": return a === T.opt.var ? "L12" : "L15";
        case "L12": return "L13";
        case "L13": return "L14";
        case "L14": return "L15";
        case "L15": return "L16";
        case "L16": return "L17";
        case "L17": return "L18";
        case "L18": return "L19";
        case "L19": return "L20";
        case "L20": return a === T.opt.var ? "LOOP" : "END";
        default: return "END";
      }
    }

    function checkSignalMatch(userSignal, expected) {
      if (!userSignal || !expected) return false;
      const u = userSignal.toLowerCase();
      const e = expected.toLowerCase();
      if (e.includes(T.match.cokHiperintens)) return u.includes(T.match.hiperintens);
      if (e === T.match.heterojen) return true;
      if (e.includes(T.match.hipointens) && u.includes(T.match.hipointens)) return true;
      if (e.includes(T.match.hiperintens) && u.includes(T.match.hiperintens)) return true;
      if (e.includes(T.match.izointens) && u.includes(T.match.izointens)) return true;
      return false;
    }

    function checkDwiMatch(userDwi, expected) {
      if (!userDwi || !expected) return false;
      const u = userDwi.toLowerCase();
      const e = expected.toLowerCase();
      if (e.includes(T.match.restNoYok) || e.includes(T.match.geneldeRestNoYok)) return u.includes(T.match.izointens) || u.includes(T.match.hipointens);
      if (e.includes(T.match.gucluRestriksiyon) || e.includes(T.match.belirginRestriksiyon)) return u.includes(T.match.hiperintens) && !u.includes(T.match.hafif);
      if (e.includes(T.match.restriksiyon)) return u.includes(T.match.hiperintens);
      if (e.includes(T.match.hafif) || e.includes(T.match.shineThrough)) return u.includes(T.match.hiperintens);
      if (e.includes(T.match.degisken)) return true;
      return false;
    }

    function checkAdcMatch(userAdc, expected) {
      if (!userAdc || !expected) return false;
      const u = userAdc.toLowerCase();
      const e = expected.toLowerCase();
      if (e.includes(T.match.yuksek)) return u.includes(T.match.hiperintens);
      if (e.includes(T.match.cokDusuk)) return u.includes(T.match.hipointens) && !u.includes(T.match.hafif);
      if (e.includes(T.match.dusuk) || e.includes(T.match.hafifDusuk)) return u.includes(T.match.hipointens);
      if (e.includes(T.match.normal)) return u.includes(T.match.izointens) || u.includes(T.match.hafif);
      return false;
    }

    function checkEnhMatch(userEnh, expected) {
      if (!userEnh || !expected) return false;
      const u = userEnh.toLowerCase();
      const e = expected.toLowerCase();
      if (e.includes(T.match.yok) || e.includes(T.match.kontrastlanmaYok)) return u === T.match.yok;
      if (e.includes(T.match.rim) || e.includes(T.match.periferik)) return u === T.match.zayif || u === T.match.guclu;
      if (e.includes(T.match.homojen) || e.includes(T.match.progressif) || e.includes(T.match.devam)) return u === T.match.guclu || u === T.match.zayif;
      if (e.includes(T.match.heterojen) || e.includes(T.match.nekroz)) return true;
      if (e.includes(T.match.minimal)) return u === T.match.minimal || u === T.match.yok;
      if (e.includes(T.match.hafif)) return u === T.match.zayif || u === T.match.minimal;
      if (e.includes(T.match.kama)) return true;
      return false;
    }

    function scoreLesion(lesion) {
      const scores = PATHOLOGIES.map((p) => {
        let total = 0, matched = 0;
        const checks = [];

        total++;
        const t1Match = checkSignalMatch(lesion.L16, p.t1);
        if (t1Match) { matched++; checks.push({ label: "T1", pass: true }); }
        else checks.push({ label: "T1", pass: false });

        total++;
        const t2Match = checkSignalMatch(lesion.L17, p.t2);
        if (t2Match) { matched++; checks.push({ label: "T2", pass: true }); }
        else checks.push({ label: "T2", pass: false });

        total++;
        const dwiMatch = checkDwiMatch(lesion.L18, p.dwi);
        if (dwiMatch) { matched++; checks.push({ label: "DWI", pass: true }); }
        else checks.push({ label: "DWI", pass: false });

        total++;
        const adcMatch = checkAdcMatch(lesion.L19, p.adc);
        if (adcMatch) { matched++; checks.push({ label: "ADC", pass: true }); }
        else checks.push({ label: "ADC", pass: false });

        if (lesion.L11 === T.opt.var) {
          total++;
          const artMatch = checkEnhMatch(lesion.L12, p.arterial);
          if (artMatch) { matched++; checks.push({ label: T.phase.arterialShort, pass: true }); }
          else checks.push({ label: T.phase.arterialShort, pass: false });

          total++;
          const porMatch = checkEnhMatch(lesion.L13, p.portal);
          if (porMatch) { matched++; checks.push({ label: T.phase.portalShort, pass: true }); }
          else checks.push({ label: T.phase.portalShort, pass: false });

          total++;
          const lateMatch = checkEnhMatch(lesion.L14, p.late);
          if (lateMatch) { matched++; checks.push({ label: T.phase.lateShort, pass: true }); }
          else checks.push({ label: T.phase.lateShort, pass: false });
        } else {
          total++;
          const noEnh = new RegExp(T.match.yok + "|" + T.match.kontrastlanmaYok, "i").test(p.arterial);
          if (noEnh) { matched++; checks.push({ label: T.score.enhancement, pass: true }); }
          else checks.push({ label: T.score.enhancement, pass: false });
        }

        if (lesion.L1 === T.opt.kistik && new RegExp(T.path.basitKist + "|" + T.path.hidatikKist + "|" + T.path.psodokist, "i").test(p.name)) {
          matched += 0.5;
          checks.push({ label: T.score.cysticType, pass: true });
        }
        if (lesion.L1 === T.opt.solid && new RegExp(T.pv.solid_regex, "i").test(p.name)) {
          matched += 0.5;
          checks.push({ label: T.score.solidType, pass: true });
        }
        if (lesion.L5 === T.opt.wedge && p.name === T.path.infarkt) {
          matched += 1;
          checks.push({ label: T.score.wedgeShape, pass: true });
        }
        if (lesion.L6 === T.opt.var && p.name === T.path.hidatikKist) {
          matched += 0.5;
          checks.push({ label: T.score.septation, pass: true });
        }

        const pct = total > 0 ? Math.round((matched / total) * 100) : 0;
        return { name: p.name, pct: Math.min(pct, 100), checks, matched, total };
      });

      return scores.sort((a, b) => b.pct - a.pct);
    }

          <div className="print-only print-report">
            <h1>{T.printTitle}</h1>
            <p className="print-date">{T.date}: {date}</p>
            <h2>{T.generalFindings}</h2>
            <table>
              <tbody>
                {STEPS.filter((s) => !s.id.startsWith("L") && answers[s.id] !== undefined).map((s) => (
                  <tr key={s.id}>
                    <td className="td-label">{s.q}</td>
                    <td className="td-value">{answers[s.id]}{s.unit ? ` ${s.unit}` : ""}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {lesionScores.map(({ les, scores }) => (
              <div key={les._num}>
                <h2>{T.lesion} #{les._num}</h2>
                <table>
                  <tbody>
                    {STEPS.filter((s) => s.id.startsWith("L") && les[s.id] !== undefined).map((s) => (
                      <tr key={s.id}>
                        <td className="td-label">{s.q}</td>
                        <td className="td-value">{les[s.id]}{s.unit ? ` ${s.unit}` : ""}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="yorum-box">
                  <h3 className="yorum-title">{T.impression}</h3>
                  {scores.filter((sc) => sc.pct > 0).map((sc) => {
                    const color = sc.pct >= 70 ? "#22c55e" : sc.pct >= 40 ? "#f59e0b" : "#ef4444";
                    return (
                      <div key={sc.name} className="score-item">
                        <div className="score-hdr">
                          <strong>{sc.name}</strong>
                          <span style={{ color, fontWeight: 700 }}>%{sc.pct}</span>
                        </div>
                        <div className="bar-track">
                          <div className="bar-fill" style={{ width: `${sc.pct}%`, background: color }} />
                        </div>
                        <div className="check-row">
                          {sc.checks.map((ch, ci) => (
                            <span key={ci} className={`chk ${ch.pass ? "chk-ok" : "chk-no"}`}>
                              {ch.pass ? "✓" : "✕"} {ch.label}
                            </span>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
            <p className="footer">{T.footer}</p>
          </div>
        </div>
      );
    }

    /* ══════ MAIN APP ══════ */
    function DalakApp() {
      const [screen, setScreen] = useState("wizard");
      const [answers, setAnswers] = useState({});
      const [stepHistory, setStepHistory] = useState(["S1"]);
      const [currentInput, setCurrentInput] = useState("");
      const [multiSelect, setMultiSelect] = useState([]);
      const [lesions, setLesions] = useState([]);
      const [currentLesion, setCurrentLesion] = useState({});
      const [lesionNum, setLesionNum] = useState(1);
      const [animDir, setAnimDir] = useState("in");
      const contentRef = useRef(null);
      const [copyMsg, setCopyMsg] = useState("");

      const currentStepId = stepHistory[stepHistory.length - 1];
      const step = STEP_MAP[currentStepId];
      const isLesionStep = currentStepId && currentStepId.startsWith("L");

      const totalMainSteps = 17;
      const totalLesionSteps = 20;
      const progress = useMemo(() => {
        if (currentStepId === "END") return 100;
        const mainIdx = STEPS.findIndex((s) => s.id === currentStepId);
        if (mainIdx < 0) return 95;
        if (!isLesionStep) return Math.round((mainIdx / totalMainSteps) * 60);
        const lesionIdx = STEPS.findIndex((s) => s.id === currentStepId) - totalMainSteps;
        return 60 + Math.round((lesionIdx / totalLesionSteps) * 35);
      }, [currentStepId, isLesionStep]);

      const navigate = useCallback((nextId) => {
        if (nextId === "END") {
          if (isLesionStep && Object.keys(currentLesion).length > 0) {
            setLesions((prev) => [...prev, { ...currentLesion, _num: lesionNum }]);
          }
          setScreen("report");
          return;
        }
        if (nextId === "LOOP") {
          setLesions((prev) => [...prev, { ...currentLesion, _num: lesionNum }]);
          setCurrentLesion({});
          setLesionNum((n) => n + 1);
          setAnimDir("in");
          setStepHistory((h) => [...h, "L1"]);
          return;
        }
        setAnimDir("in");
        setStepHistory((h) => [...h, nextId]);
      }, [isLesionStep, currentLesion, lesionNum]);

      const handleAnswer = useCallback((value) => {
        if (isLesionStep) {
          setCurrentLesion((prev) => ({ ...prev, [currentStepId]: value }));
        }
        setAnswers((prev) => ({ ...prev, [currentStepId]: value }));
        setCurrentInput("");
        setMultiSelect([]);
        const allAnswers = { ...answers, [currentStepId]: value };
        const next = getNextStep(currentStepId, allAnswers);
        navigate(next);
      }, [answers, currentStepId, isLesionStep, navigate]);

      const handleMultiSubmit = useCallback(() => {
        if (multiSelect.length === 0) return;
        handleAnswer(multiSelect.join(", "));
      }, [multiSelect, handleAnswer]);

      const handleNumberSubmit = useCallback(() => {
        if (!currentInput || isNaN(currentInput)) return;
        handleAnswer(currentInput);
      }, [currentInput, handleAnswer]);

      const goBack = useCallback(() => {
        if (stepHistory.length <= 1) return;
        setAnimDir("out");
        if (currentStepId === "L1" && lesionNum > 1 && Object.keys(currentLesion).length === 0) {
          setLesionNum((n) => n - 1);
          const lastLesion = lesions[lesions.length - 1];
          if (lastLesion) {
            setCurrentLesion(lastLesion);
            setLesions((prev) => prev.slice(0, -1));
          }
        }
        setStepHistory((h) => h.slice(0, -1));
        setCurrentInput("");
        setMultiSelect([]);
      }, [stepHistory, currentStepId, lesionNum, currentLesion, lesions]);

      const resetAll = useCallback(() => {
        setAnswers({});
        setStepHistory(["S1"]);
        setCurrentInput("");
        setMultiSelect([]);
        setLesions([]);
        setCurrentLesion({});
        setLesionNum(1);
        setScreen("wizard");
      }, []);

      const toggleMulti = useCallback((opt) => {
        setMultiSelect((prev) => prev.includes(opt) ? prev.filter((x) => x !== opt) : [...prev, opt]);
      }, []);

      const allLesions = useMemo(() => screen !== "report" ? [] : lesions, [screen, lesions]);

      const generateReportText = useCallback(() => {
        let lines = [];
        lines.push("═══════════════════════════════════════════");
        lines.push(`  ${T.reportHeader}`);
        lines.push("═══════════════════════════════════════════");
        lines.push(`  ${T.date}: ${new Date().toLocaleDateString(T.locale)}`);
        lines.push("───────────────────────────────────────────");
        lines.push("");
        lines.push(`▸ ${T.generalFindingsHeader}`);
        lines.push("───────────────────────────────────────────");
        for (const sid of STEPS.filter((s) => !s.id.startsWith("L")).map((s) => s.id)) {
          if (answers[sid] !== undefined) {
            const st = STEP_MAP[sid];
            lines.push(`  ${st.q}: ${answers[sid]}${st.unit ? " " + st.unit : ""}`);
          }
        }
        lines.push("");
        if (allLesions.length > 0) {
          for (const les of allLesions) {
            lines.push(`▸ ${T.lesion} #${les._num}`);
            lines.push("───────────────────────────────────────────");
            for (const sid of STEPS.filter((s) => s.id.startsWith("L")).map((s) => s.id)) {
              if (les[sid] !== undefined) {
                const st = STEP_MAP[sid];
                lines.push(`  ${st.q}: ${les[sid]}${st.unit ? " " + st.unit : ""}`);
              }
            }
            lines.push("");
            const scores = scoreLesion(les);
            lines.push(`  ${T.impression}:`);
            for (const sc of scores.filter((s) => s.pct > 0)) {
              lines.push(`    ${sc.name}: %${sc.pct}`);
            }
            lines.push("");
          }
        }
        lines.push("═══════════════════════════════════════════");
        return lines.join("\n");
      }, [answers, allLesions]);

      const handleCopy = useCallback(() => {
        const text = generateReportText();
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.cssText = "position:fixed;left:-9999px;top:-9999px;opacity:0";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          setCopyMsg(T.copied);
        } catch (e) {
          setCopyMsg(T.copyFail);
        }
        document.body.removeChild(ta);
        setTimeout(() => setCopyMsg(""), 2500);
      }, [generateReportText]);

      const handlePrint = useCallback(() => { window.print(); }, []);

      if (screen === "report") {
        return <ReportScreen answers={answers} lesions={allLesions} onReset={resetAll} onCopy={handleCopy} onPrint={handlePrint} copyMsg={copyMsg} />;
      }

      if (currentStepId === "END") {
        setScreen("report");
        return null;
      }

      return (
        <div style={styles.root}>
          <div style={styles.header}>
            <div style={styles.headerInner}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={styles.logoIcon}>◈</span>
                <span style={styles.logoText}>{T.appTitle}</span>
              </div>
              <button onClick={resetAll} style={styles.resetBtn}>{T.reset}</button>
            </div>
            <div style={styles.progressTrack}>
              <div style={{ ...styles.progressBar, width: `${progress}%` }} />
            </div>
            <div style={styles.progressLabel}>
              {isLesionStep ? `${T.lesion} #${lesionNum} – ${currentStepId}` : `${T.step} ${currentStepId}`} · %{progress}
            </div>
          </div>

          <div style={styles.content} ref={contentRef}>
            <div key={currentStepId} style={{ ...styles.questionCard, animation: `${animDir === "in" ? "slideIn" : "slideOut"} 0.3s ease` }}>
              {isLesionStep && <div style={styles.lesionBadge}>{T.lesion} #{lesionNum}</div>}
              <h2 style={styles.questionTitle}>{step && step.q}</h2>

              {step && step.type === "single" && (
                <div style={styles.optionGrid}>
                  {step.opts.map((opt) => (
                    <button key={opt} onClick={() => handleAnswer(opt)} style={styles.optionBtn}
                      onMouseEnter={(e) => { e.currentTarget.style.background = COLORS.cardHover; e.currentTarget.style.borderColor = COLORS.accent; e.currentTarget.style.transform = "translateY(-1px)"; }}
                      onMouseLeave={(e) => { e.currentTarget.style.background = COLORS.card; e.currentTarget.style.borderColor = COLORS.border; e.currentTarget.style.transform = "translateY(0)"; }}>
                      {opt}
                    </button>
                  ))}
                </div>
              )}

              {step && step.type === "multi" && (
                <div>
                  <div style={styles.optionGrid}>
                    {step.opts.map((opt) => {
                      const selected = multiSelect.includes(opt);
                      return (
                        <button key={opt} onClick={() => toggleMulti(opt)} style={{ ...styles.optionBtn, ...(selected ? { background: COLORS.accentDim, borderColor: COLORS.accent, color: COLORS.accentLight } : {}) }}>
                          {selected ? "✓ " : ""}{opt}
                        </button>
                      );
                    })}
                  </div>
                  <button onClick={handleMultiSubmit} disabled={multiSelect.length === 0} style={{ ...styles.submitBtn, opacity: multiSelect.length === 0 ? 0.4 : 1 }}>
                    {T.continue}
                  </button>
                </div>
              )}

              {step && step.type === "number" && (
                <div style={styles.numberRow}>
                  <input type="number" value={currentInput} onChange={(e) => setCurrentInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && handleNumberSubmit()}
                    placeholder={T.enterValue} style={styles.numInput} autoFocus />
                  <span style={styles.unitLabel}>{step.unit}</span>
                  <button onClick={handleNumberSubmit} disabled={!currentInput} style={{ ...styles.submitBtn, opacity: !currentInput ? 0.4 : 1, marginTop: 0 }}>
                    {T.continue}
                  </button>
                </div>
              )}
            </div>

            {stepHistory.length > 1 && (
              <button onClick={goBack} style={styles.backBtn}>{T.back}</button>
            )}
          </div>

          <style>{`
            @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
            @keyframes slideOut { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
            input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
            input[type=number] { -moz-appearance: textfield; }
            * { box-sizing: border-box; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<DalakApp />);
  </script>
</body>
</html>
