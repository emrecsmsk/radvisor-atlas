<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Böbrek MR Karar Destek Sistemi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--accent:#7b2ff7;--accent2:#9d4edd;--text:#e0e0e0;--text2:#a0a0b0;--border:#2a2a4a;--success:#2ecc71;--warn:#f39c12;--danger:#e74c3c;--row1:#1a1a2e;--row2:#1e2240}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:18px 24px;text-align:center;border-bottom:2px solid var(--accent)}
.header h1{font-size:1.4em;color:#fff;letter-spacing:1px}
.header small{color:var(--text2);font-size:.8em}
.container{max-width:900px;margin:0 auto;padding:16px}
.step-indicator{display:flex;align-items:center;justify-content:center;gap:4px;margin:12px 0;flex-wrap:wrap}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:.3s}
.step-dot.active{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.step-dot.done{background:var(--success)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin:12px 0}
.card h2{color:var(--accent2);font-size:1.1em;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:8px}
.card h3{color:var(--warn);font-size:.95em;margin:10px 0 8px}
.radio-group,.check-group{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.radio-group label,.check-group label{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 16px;cursor:pointer;transition:.2s;font-size:.9em;display:flex;align-items:center;gap:6px}
.radio-group label:hover,.check-group label:hover{border-color:var(--accent)}
.radio-group input:checked+span,.check-group input:checked+span{color:var(--accent2);font-weight:600}
.radio-group label:has(input:checked),.check-group label:has(input:checked){border-color:var(--accent);background:rgba(123,47,247,.12)}
input[type=radio],input[type=checkbox]{accent-color:var(--accent)}
.input-row{display:flex;gap:10px;align-items:center;margin:8px 0;flex-wrap:wrap}
.input-row label{font-size:.85em;color:var(--text2);min-width:80px}
.num-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);width:90px;font-size:.9em}
.num-input:focus{outline:none;border-color:var(--accent)}
select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:.9em}
select:focus{outline:none;border-color:var(--accent)}
textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);width:100%;font-size:.9em;resize:vertical;min-height:60px}
textarea:focus{outline:none;border-color:var(--accent)}
.nav-row{display:flex;justify-content:space-between;margin-top:16px;gap:10px}
.btn{padding:10px 24px;border:none;border-radius:6px;cursor:pointer;font-size:.9em;font-weight:600;transition:.2s}
.btn-prev{background:var(--border);color:var(--text)}
.btn-next{background:var(--accent);color:#fff}
.btn-next:hover{background:var(--accent2)}
.btn-prev:hover{background:#3a3a5a}
.btn-add{background:var(--success);color:#fff;padding:8px 18px}
.btn-add:hover{background:#27ae60}
.btn-del{background:var(--danger);color:#fff;padding:6px 14px;font-size:.8em}
.btn-del:hover{background:#c0392b}
.btn-report{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:12px 32px;font-size:1em}
.signal-panel{display:grid;grid-template-columns:120px repeat(3,1fr);gap:1px;background:var(--border);border-radius:6px;overflow:hidden;margin:10px 0;font-size:.85em}
.signal-panel .sh{background:#2a2a5a;padding:8px;text-align:center;font-weight:600;color:var(--accent2)}
.signal-panel .sc{background:var(--bg);padding:6px 4px;text-align:center}
.signal-panel .sc label{background:transparent;border:none;padding:2px;font-size:.85em}
.items-list{margin:10px 0}
.item-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin:6px 0;display:flex;justify-content:space-between;align-items:center}
.item-card .info{font-size:.85em;color:var(--text2)}
.item-card .info strong{color:var(--text)}
.hidden{display:none!important}
/* Report */
.report-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;overflow-y:auto;display:none}
.report-overlay.show{display:block}
.report-sheet{background:#fff;color:#000;max-width:800px;margin:20px auto;padding:40px;border-radius:4px;font-family:'Times New Roman',serif;font-size:12pt;line-height:1.5}
.report-sheet h1{font-size:14pt;text-align:center;border-bottom:2px solid #333;padding-bottom:8px;margin-bottom:12px}
.report-sheet h2{font-size:12pt;margin:14px 0 6px;color:#333;border-left:3px solid #7b2ff7;padding-left:8px}
.report-sheet table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10pt}
.report-sheet th{background:#e8e0f0;padding:6px 8px;border:1px solid #999;text-align:left;font-size:10pt}
.report-sheet td{padding:5px 8px;border:1px solid #ccc}
.report-sheet tr:nth-child(odd) td{background:#f9f9f9}
.report-sheet tr:nth-child(even) td{background:#f0eef5}
.report-sheet .yorum{background:#f5f0ff;border:1px solid #ccc;border-radius:4px;padding:10px;margin:8px 0;font-style:italic}
.report-sheet .dx-bar{height:18px;border-radius:3px;margin:2px 0}
.toolbar{position:sticky;top:0;background:#333;padding:10px;display:flex;gap:10px;justify-content:center;z-index:10000;border-radius:0 0 8px 8px}
.toolbar .btn{padding:8px 18px;font-size:.85em}
.btn-print{background:#2196F3;color:#fff}
.btn-copy{background:#4CAF50;color:#fff}
.btn-close{background:#f44336;color:#fff}
/* Differential bars */
.dx-row{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:10pt}
.dx-row .dx-name{width:160px;text-align:right;font-size:9pt}
.dx-row .dx-bar-wrap{flex:1;background:#eee;border-radius:3px;height:18px;overflow:hidden}
.dx-row .dx-bar{height:100%;border-radius:3px;transition:width .5s}
.dx-row .dx-pct{width:45px;font-size:9pt;font-weight:600}
@media print{.toolbar{display:none}.report-overlay{position:static;background:#fff}.report-sheet{margin:0;padding:20px;box-shadow:none}}
@media(max-width:600px){.signal-panel{grid-template-columns:90px repeat(3,1fr);font-size:.75em}.radio-group label,.check-group label{padding:6px 10px;font-size:.8em}}
</style>
</head>
<body>
<div class="header">
<h1>🫘 BÖBREK MR KARAR DESTEK SİSTEMİ</h1>

</div>
<div class="container" id="app"></div>
<div class="report-overlay" id="reportOverlay">
<div class="toolbar">
<button class="btn btn-print" onclick="window.print()">🖨️ Yazdır</button>
<button class="btn btn-copy" onclick="copyReport()">📋 Kopyala</button>
<button class="btn btn-close" onclick="closeReport()">✕ Kapat</button>
</div>
<div class="report-sheet" id="reportSheet"></div>
</div>

<script>
"use strict";

/* ============================================================
   DATA MODEL
   ============================================================ */
const DATA = {
  sides: [], // ['sol','sag']
  sol: null,
  sag: null
};

function emptyKidney() {
  return {
    lokalizasyon: '', // 'normal','izlenmedi'
    izlenmediNeden: '', // 'opere','agenezi','cross_ektopi','pelvik_ektopi'
    crossTip: '', // 'fuzyon','nonfuzyon'
    boyutAP: '', boyutRL: '', boyutCC: '',
    hipoplazi: false,
    atnali: '', // 'yok','var'
    istmus: '', // 'fibroz','parankimal'
    kaliksler: '', // 'megakaliks','mikrokaliks','normal'
    upjDarlik: '', // 'var','yok'
    ciftToplSistem: '', // 'var','yok'
    sivi: '', // 'var','yok'
    siviSignal: {t1a:'',t2a:'',t1afs:'',t2afs:'',dwi:''},
    fibrozis: '', // 'var','yok'
    lenfNodu: '', // 'var','yok'
    lenfSayi: '', lenfBoyut: '',
    kistler: [], // array of kist objects
    tumorler: [], // array of tumor objects
    kistVar: '', // 'var','yok'
    tumorVar: '' // 'var','yok'
  };
}
function emptyKist() {
  return {sayi:'',boyut:'',lokalizasyon:'',kontur:'',homojenite:'',
    intSignal:{t1a:'',t2a:'',t1afs:'',t2afs:'',dwi:''},
    solidVar:'',
    solidSignal:{t1a:'',t2a:'',t1afs:'',t2afs:'',dwi:''},
    ivkmPat:'',ivkmGuc:''};
}
function emptyTumor() {
  return {boyutAP:'',boyutRL:'',boyutCC:'',
    lokPole:'',lokYon:'',kontur:'',homojenite:'',
    signal:{t1a:'',t2a:'',t1afs:'',t2afs:'',dwi:''},
    ivkmPat:'',ivkmGuc:''};
}

/* ============================================================
   PATHOLOGY TABLE FOR DIFFERENTIAL
   ============================================================ */
const PATHOLOGIES = [
  {name:'Basit Kist',t1:'hipointens',t2:'hiperintens',inout:'degismez',dwi:'hiperintens',adc:'yuksek',art:'yok',portal:'yok',gec:'yok'},
  {name:'Kist Hidatik',t1:'hipointens',t2:'hiperintens',inout:'degismez',dwi:'degisken',adc:'yuksek',art:'periferik_rim',portal:'rim',gec:'yok'},
  {name:'Hemorajik Kist',t1:'hiperintens',t2:'degisken',inout:'degismez',dwi:'yok',adc:'yuksek',art:'yok',portal:'yok',gec:'yok'},
  {name:'Proteinöz Kist',t1:'hafif_hiperintens',t2:'hafif_hiperintens',inout:'degismez',dwi:'yok',adc:'yuksek',art:'yok',portal:'yok',gec:'yok'},
  {name:'Bosniak II-III Kist',t1:'degisken',t2:'hiperintens',inout:'degismez',dwi:'yok',adc:'yuksek',art:'septa_duvar',portal:'septa_duvar',gec:'septa_duvar'},
  {name:'Hemanjiom',t1:'hipointens',t2:'hiperintens',inout:'degismez',dwi:'hiperintens',adc:'yuksek',art:'periferik_noduler',portal:'sentripedal',gec:'gec_faz_dolum'},
  {name:'Enfekte Kist/Abse',t1:'heterojen',t2:'hiperintens',inout:'degismez',dwi:'restriksiyon',adc:'dusuk',art:'solid_kontrast',portal:'solid_kontrast',gec:'solid_kontrast'},
  {name:'Kistik RCC',t1:'heterojen',t2:'hiperintens',inout:'degismez',dwi:'hafif_hiperintens',adc:'dusuk',art:'homojen_guclu',portal:'izointens',gec:'santral_skar'},
  {name:'Clear Cell RCC',t1:'izointens',t2:'hiperintens',inout:'hafif_yag_baskilama',dwi:'restriksiyon',adc:'dusuk_orta',art:'erken_guclu',portal:'washout',gec:'washout'},
  {name:'Papiller RCC',t1:'hipointens',t2:'hipointens',inout:'degismez',dwi:'restriksiyon',adc:'dusuk',art:'zayif',portal:'zayif',gec:'zayif'},
  {name:'Kromofob RCC',t1:'izointens',t2:'hafif_hiperintens',inout:'degismez',dwi:'orta_restriksiyon',adc:'orta',art:'orta',portal:'orta',gec:'orta'},
  {name:'Metastaz',t1:'hipointens',t2:'hipointens',inout:'degismez',dwi:'belirgin_restriksiyon',adc:'dusuk',art:'zayif',portal:'zayif',gec:'zayif'},
  {name:'Onkositom',t1:'izointens',t2:'hiperintens',inout:'degismez',dwi:'hafif_restriksiyon',adc:'orta',art:'erken_santral_skar',portal:'erken_santral_skar',gec:'erken_santral_skar'},
  {name:'AML (Makroskopik Yağ)',t1:'hiperintens',t2:'hiperintens',inout:'belirgin_dusus',dwi:'yok',adc:'yuksek',art:'hafif',portal:'hafif',gec:'hafif'},
  {name:'AML (Yağdan Fakir)',t1:'izointens',t2:'hafif_hipointens',inout:'minimal_dusus',dwi:'restriksiyon',adc:'orta',art:'homojen',portal:'homojen',gec:'homojen'},
  {name:'Lenfoma',t1:'hipointens',t2:'hipointens',inout:'degismez',dwi:'belirgin_restriksiyon',adc:'cok_dusuk',art:'minimal',portal:'minimal',gec:'minimal'},
  {name:'Pyelonefrit',t1:'hipointens',t2:'hiperintens',inout:'degismez',dwi:'restriksiyon',adc:'dusuk',art:'kama',portal:'kama',gec:'kama'}
];

/* ============================================================
   WIZARD ENGINE
   ============================================================ */
let currentStep = 0;
let steps = [];
let currentSide = '';
let currentKistIdx = -1;
let currentTumorIdx = -1;

function buildSteps() {
  steps = [{id:'taraf',title:'Taraf Seçimi'}];
  DATA.sides.forEach(s => {
    const lbl = s === 'sol' ? 'Sol' : 'Sağ';
    steps.push(
      {id:'lok',side:s,title:`${lbl} Böbrek — Lokalizasyon`},
      {id:'lok_neden',side:s,title:`${lbl} Böbrek — İzlenmeme Nedeni`,cond:()=>DATA[s]&&DATA[s].lokalizasyon==='izlenmedi'},
      {id:'boyut',side:s,title:`${lbl} Böbrek — Boyut`},
      {id:'atnali',side:s,title:`${lbl} Böbrek — Atnalı Böbrek`},
      {id:'kaliksler',side:s,title:`${lbl} Böbrek — Kaliksler`},
      {id:'upj',side:s,title:`${lbl} Böbrek — Üreteropelvik Darlık`},
      {id:'cift_topl',side:s,title:`${lbl} Böbrek — Çift Toplayıcı Sistem`},
      {id:'sivi',side:s,title:`${lbl} Böbrek — Sıvı Görünümü`},
      {id:'sivi_signal',side:s,title:`${lbl} Böbrek — Sıvı Sinyal Özellikleri`,cond:()=>DATA[s]&&DATA[s].sivi==='var'},
      {id:'fibrozis',side:s,title:`${lbl} Böbrek — Fibrozis`},
      {id:'lenf',side:s,title:`${lbl} Böbrek — Lenf Nodu`},
      {id:'kist_var',side:s,title:`${lbl} Böbrek — Böbrek Kistleri`},
      {id:'kist_detay',side:s,title:`${lbl} Böbrek — Kist Detayları`,cond:()=>DATA[s]&&DATA[s].kistVar==='var'},
      {id:'tumor_var',side:s,title:`${lbl} Böbrek — Tümör`},
      {id:'tumor_detay',side:s,title:`${lbl} Böbrek — Tümör Detayları`,cond:()=>DATA[s]&&DATA[s].tumorVar==='var'}
    );
  });
  steps.push({id:'rapor',title:'Rapor'});
}

function shouldShow(step) {
  if (!step.cond) return true;
  return step.cond();
}

function visibleSteps() {
  return steps.filter(s => shouldShow(s));
}

function render() {
  const app = document.getElementById('app');
  const vs = visibleSteps();
  const vi = vs.indexOf(steps[currentStep]);
  const step = steps[currentStep];
  
  if (!shouldShow(step)) { goNext(); return; }

  let dots = vs.map((s,i) => `<div class="step-dot ${i<vi?'done':''} ${i===vi?'active':''}"></div>`).join('');
  
  let html = `<div class="step-indicator">${dots}</div>`;
  html += `<div class="card"><h2>${step.title}</h2>`;
  
  const side = step.side;
  if (side && !DATA[side]) DATA[side] = emptyKidney();
  const K = side ? DATA[side] : null;

  switch(step.id) {
    case 'taraf': html += renderTaraf(); break;
    case 'lok': html += renderLok(K); break;
    case 'lok_neden': html += renderLokNeden(K); break;
    case 'boyut': html += renderBoyut(K); break;
    case 'atnali': html += renderAtnali(K); break;
    case 'kaliksler': html += renderKaliksler(K); break;
    case 'upj': html += renderUPJ(K); break;
    case 'cift_topl': html += renderCiftTopl(K); break;
    case 'sivi': html += renderSivi(K); break;
    case 'sivi_signal': html += renderSiviSignal(K); break;
    case 'fibrozis': html += renderFibrozis(K); break;
    case 'lenf': html += renderLenf(K); break;
    case 'kist_var': html += renderKistVar(K); break;
    case 'kist_detay': html += renderKistDetay(K,side); break;
    case 'tumor_var': html += renderTumorVar(K); break;
    case 'tumor_detay': html += renderTumorDetay(K,side); break;
    case 'rapor': html += renderRaporBtn(); break;
  }

  html += `<div class="nav-row">`;
  if (currentStep > 0) html += `<button class="btn btn-prev" onclick="goPrev()">← Geri</button>`;
  else html += `<div></div>`;
  if (step.id === 'rapor') html += `<button class="btn btn-report" onclick="generateReport()">📄 Rapor Oluştur</button>`;
  else html += `<button class="btn btn-next" onclick="goNext()">İleri →</button>`;
  html += `</div></div>`;

  app.innerHTML = html;
}

function goNext() {
  saveCurrentStep();
  let next = currentStep + 1;
  while (next < steps.length && !shouldShow(steps[next])) next++;
  if (next < steps.length) { currentStep = next; render(); }
}

function goPrev() {
  saveCurrentStep();
  let prev = currentStep - 1;
  while (prev >= 0 && !shouldShow(steps[prev])) prev--;
  if (prev >= 0) { currentStep = prev; render(); }
}

function saveCurrentStep() {
  const step = steps[currentStep];
  const side = step.side;
  const K = side ? DATA[side] : null;

  switch(step.id) {
    case 'taraf': {
      const checks = document.querySelectorAll('input[name="taraf"]:checked');
      DATA.sides = Array.from(checks).map(c=>c.value);
      DATA.sides.forEach(s => { if(!DATA[s]) DATA[s] = emptyKidney(); });
      buildSteps();
      break;
    }
    case 'lok': K.lokalizasyon = getRadio('lok'); break;
    case 'lok_neden': {
      K.izlenmediNeden = getRadio('neden');
      K.crossTip = getRadio('cross_tip');
      break;
    }
    case 'boyut': {
      K.boyutAP = gv('boyutAP'); K.boyutRL = gv('boyutRL'); K.boyutCC = gv('boyutCC');
      K.hipoplazi = document.getElementById('hipoplazi')?.checked || false;
      break;
    }
    case 'atnali': {
      K.atnali = getRadio('atnali');
      K.istmus = getRadio('istmus');
      break;
    }
    case 'kaliksler': K.kaliksler = getRadio('kaliksler'); break;
    case 'upj': K.upjDarlik = getRadio('upj'); break;
    case 'cift_topl': K.ciftToplSistem = getRadio('cift_topl'); break;
    case 'sivi': K.sivi = getRadio('sivi'); break;
    case 'sivi_signal': K.siviSignal = getSignalPanel('sivi_'); break;
    case 'fibrozis': K.fibrozis = getRadio('fibrozis'); break;
    case 'lenf': {
      K.lenfNodu = getRadio('lenf');
      K.lenfSayi = gv('lenfSayi'); K.lenfBoyut = gv('lenfBoyut');
      break;
    }
    case 'kist_var': K.kistVar = getRadio('kist_var'); break;
    case 'kist_detay': saveKistDetay(K); break;
    case 'tumor_var': K.tumorVar = getRadio('tumor_var'); break;
    case 'tumor_detay': saveTumorDetay(K); break;
  }
}

function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '';
}
function gv(id) {
  const el = document.getElementById(id);
  return el ? el.value : '';
}
function getSignalPanel(prefix) {
  return {
    t1a: getRadio(prefix+'t1a'),
    t2a: getRadio(prefix+'t2a'),
    t1afs: getRadio(prefix+'t1afs'),
    t2afs: getRadio(prefix+'t2afs'),
    dwi: getRadio(prefix+'dwi')
  };
}

/* ============================================================
   RENDER FUNCTIONS
   ============================================================ */
function radioGroup(name, options, selected) {
  return `<div class="radio-group">${options.map(o => 
    `<label><input type="radio" name="${name}" value="${o.v}" ${selected===o.v?'checked':''}><span>${o.l}</span></label>`
  ).join('')}</div>`;
}

function renderTaraf() {
  return `<p style="margin-bottom:10px">Değerlendirilecek böbrekleri seçiniz:</p>
    <div class="check-group">
      <label><input type="checkbox" name="taraf" value="sol" ${DATA.sides.includes('sol')?'checked':''}><span>Sol Böbrek</span></label>
      <label><input type="checkbox" name="taraf" value="sag" ${DATA.sides.includes('sag')?'checked':''}><span>Sağ Böbrek</span></label>
    </div>`;
}

function renderLok(K) {
  return radioGroup('lok',[
    {v:'normal',l:'Normal Lokalizasyonda İzlendi'},
    {v:'izlenmedi',l:'Normal Lokalizasyonda İzlenmedi'}
  ], K.lokalizasyon);
}

function renderLokNeden(K) {
  let h = radioGroup('neden',[
    {v:'opere',l:'Opere (Nefrektomi)'},
    {v:'agenezi',l:'Agenezi'},
    {v:'cross_ektopi',l:'Cross Ektopi'},
    {v:'pelvik_ektopi',l:'Pelvik Ektopi'}
  ], K.izlenmediNeden);
  h += `<div id="crossTipDiv" class="${K.izlenmediNeden==='cross_ektopi'?'':'hidden'}" style="margin-top:10px">
    <h3>Cross Ektopi Tipi</h3>
    ${radioGroup('cross_tip',[{v:'fuzyon',l:'Füzyon'},{v:'nonfuzyon',l:'Nonfüzyon'}], K.crossTip)}
  </div>`;
  // Add change listener
  h += `<script>document.querySelectorAll('input[name="neden"]').forEach(r=>r.addEventListener('change',function(){
    document.getElementById('crossTipDiv').classList.toggle('hidden',this.value!=='cross_ektopi');
  }));<\/script>`;
  return h;
}

function renderBoyut(K) {
  return `<div class="input-row">
    <label>AP (mm):</label><input class="num-input" type="number" id="boyutAP" value="${K.boyutAP}">
    <label>RL (mm):</label><input class="num-input" type="number" id="boyutRL" value="${K.boyutRL}">
    <label>CC (mm):</label><input class="num-input" type="number" id="boyutCC" value="${K.boyutCC}">

/* ============================================================
   DIFFERENTIAL DIAGNOSIS SCORING
   ============================================================ */
function scoreTumor(tumor) {
  const results = [];
  PATHOLOGIES.forEach(p => {
    let score = 0, maxScore = 0;
    // T1A
    if (tumor.signal.t1a) {
      maxScore += 2;
      if (matchSignal(tumor.signal.t1a, p.t1)) score += 2;
      else if (partialMatch(tumor.signal.t1a, p.t1)) score += 1;
    }
    // T2A
    if (tumor.signal.t2a) {
      maxScore += 3; // T2 is more discriminative
      if (matchSignal(tumor.signal.t2a, p.t2)) score += 3;
      else if (partialMatch(tumor.signal.t2a, p.t2)) score += 1.5;
    }
    // DWI
    if (tumor.signal.dwi) {
      maxScore += 2;
      if (matchDWI(tumor.signal.dwi, p.dwi)) score += 2;
      else if (partialMatchDWI(tumor.signal.dwi, p.dwi)) score += 1;
    }
    // IVKM
    if (tumor.ivkmGuc) {
      maxScore += 3;
      if (matchIVKM(tumor.ivkmGuc, p.art)) score += 3;
      else if (partialMatchIVKM(tumor.ivkmGuc, p.art)) score += 1.5;
    }
    const pct = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    results.push({name: p.name, score, maxScore, pct});
  });
  results.sort((a,b) => b.pct - a.pct);
  return results;
}

function matchSignal(user, path) {
  if (!user || !path) return false;
  // Direct match
  if (path.includes(user)) return true;
  if (user === 'hiperintens' && (path.includes('hiperintens') || path === 'hafif_hiperintens')) return true;
  if (user === 'hipointens' && (path.includes('hipointens') || path === 'hafif_hipointens')) return true;
  if (user === 'izointens' && path.includes('izointens')) return true;
  return false;
}
function partialMatch(user, path) {
  if (path === 'degisken' || path === 'heterojen') return true;
  return false;
}
function matchDWI(user, pathDWI) {
  if (user === 'hiperintens' && (pathDWI.includes('restriksiyon') || pathDWI === 'hiperintens' || pathDWI === 'hafif_hiperintens')) return true;
  if (user === 'hipointens' && (pathDWI === 'yok' || pathDWI.includes('yok'))) return true;
  if (user === 'izointens' && pathDWI === 'degisken') return true;
  return false;
}
function partialMatchDWI(user, pathDWI) {
  if (pathDWI === 'degisken') return true;
  return false;
}
function matchIVKM(userGuc, pathArt) {
  if (userGuc === 'guclu' && (pathArt.includes('guclu') || pathArt.includes('erken'))) return true;
  if (userGuc === 'zayif' && (pathArt.includes('zayif') || pathArt.includes('orta') || pathArt.includes('hafif'))) return true;
  if (userGuc === 'yok' && (pathArt === 'yok' || pathArt.includes('minimal'))) return true;
  return false;
}
function partialMatchIVKM(userGuc, pathArt) {
  if (userGuc === 'guclu' && pathArt.includes('homojen')) return true;
  if (userGuc === 'zayif' && pathArt.includes('solid_kontrast')) return true;
  return false;
}

function scoreKist(kist) {
  // Simplified scoring for cysts - use internal signal + solid + IVKM
  const results = [];
  // Only score cyst-relevant pathologies
  const cystPaths = PATHOLOGIES.filter(p => 
    ['Basit Kist','Kist Hidatik','Hemorajik Kist','Proteinöz Kist','Bosniak II-III Kist','Hemanjiom','Enfekte Kist/Abse','Kistik RCC'].includes(p.name)
  );
  cystPaths.forEach(p => {
    let score = 0, maxScore = 0;
    if (kist.intSignal.t1a) {
      maxScore += 2;
      if (matchSignal(kist.intSignal.t1a, p.t1)) score += 2;
      else if (partialMatch(kist.intSignal.t1a, p.t1)) score += 1;
    }
    if (kist.intSignal.t2a) {
      maxScore += 3;
      if (matchSignal(kist.intSignal.t2a, p.t2)) score += 3;
      else if (partialMatch(kist.intSignal.t2a, p.t2)) score += 1.5;
    }
    if (kist.ivkmGuc) {
      maxScore += 3;
      if (matchIVKM(kist.ivkmGuc, p.art)) score += 3;
      else if (partialMatchIVKM(kist.ivkmGuc, p.art)) score += 1.5;
    }
    if (kist.homojenite) {
      maxScore += 1;
      if (kist.homojenite === 'heterojen' && (p.t1 === 'heterojen' || p.name.includes('Enfekte') || p.name.includes('Kistik'))) score += 1;
      else if (kist.homojenite === 'homojen' && p.t1 !== 'heterojen') score += 1;
    }
    const pct = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    results.push({name: p.name, score, maxScore, pct});
  });
  results.sort((a,b) => b.pct - a.pct);
  return results;
}

        let intSig = '';
        ['t1a','t2a','t1afs','t2afs','dwi'].forEach(k => {
          if (c.intSignal[k]) intSig += `${k.toUpperCase().replace('FS','+FS')}: ${signalLabel(c.intSignal[k])}, `;
        });
        if (intSig) h += row('İnternal İntensite', intSig.slice(0,-2));
        if (c.solidVar === 'var') {
          let solSig = '';
          ['t1a','t2a','t1afs','t2afs','dwi'].forEach(k => {
            if (c.solidSignal[k]) solSig += `${k.toUpperCase().replace('FS','+FS')}: ${signalLabel(c.solidSignal[k])}, `;
          });
          h += row('Solid Komponent', solSig ? solSig.slice(0,-2) : 'Mevcut');
        }
        if (c.ivkmGuc) h += row('IVKM', `${c.ivkmPat==='homojen'?'Homojen':'Heterojen'}, ${kontrastLabel(c.ivkmGuc)}`);
        h += `</table>`;

        // Differential for kist
        const dx = scoreKist(c);
        if (dx.length > 0 && dx[0].pct > 0) {
          h += `<div class="yorum"><b>YORUM — Kist ${i+1} Ayırıcı Tanı:</b></div>`;
          h += renderDxBars(dx.slice(0,5));
        }
      });
    }

    // Tümörler
    if (K.tumorVar === 'var' && K.tumorler.length > 0) {
      h += `<h2>${lbl} BÖBREK — TÜMÖRLER</h2>`;
      K.tumorler.forEach((t,i) => {
        h += `<table><tr><th colspan="2">Tümör ${i+1}</th></tr>`;
        h += row('Boyut', `${t.boyutAP||'-'} × ${t.boyutRL||'-'} × ${t.boyutCC||'-'} mm`);
        h += row('Lokalizasyon', `${lokLabel(t.lokPole)} ${yonLabel(t.lokYon)}`);
        h += row('Kontur', {'duzenli':'Düzenli','lobule':'Lobüle','duzensiz':'Düzensiz'}[t.kontur] || '-');
        h += row('Homojenite', t.homojenite === 'homojen' ? 'Homojen' : 'Heterojen');
        let sig = '';
        ['t1a','t2a','t1afs','t2afs','dwi'].forEach(k => {
          if (t.signal[k]) sig += `${k.toUpperCase().replace('FS','+FS')}: ${signalLabel(t.signal[k])}, `;
        });
        if (sig) h += row('Sinyal Özellikleri', sig.slice(0,-2));
        if (t.ivkmGuc) h += row('IVKM', `${t.ivkmPat==='homojen'?'Homojen':'Heterojen'}, ${kontrastLabel(t.ivkmGuc)}`);
        h += `</table>`;

        // Differential for tumor
        const dx = scoreTumor(t);
        if (dx.length > 0 && dx[0].pct > 0) {
          h += `<div class="yorum"><b>YORUM — Tümör ${i+1} Ayırıcı Tanı:</b></div>`;
          h += renderDxBars(dx.filter(d=>d.pct>0).slice(0,8));
        }
      });
    }
  });

  // MR AYIRICI TANI KURALLARI
  h += `<h2>MR AYIRICI TANI KURALLARI</h2>`;
  h += `<div class="yorum">
    <b>T2 Sinyal:</b> Hiperintens → Clear Cell RCC, Kist, Onkositom | Hipointens → Papiller RCC, Lenfoma, Metastaz<br>
    <b>Kontrast Paterni:</b> Erken güçlü arteriyel → Clear Cell RCC, Onkositom | Zayıf → Papiller RCC | Minimal → Lenfoma<br>
    <b>DWI/ADC:</b> Çok düşük ADC → Lenfoma, Metastaz | Orta restriksiyon → RCC | Restriksiyon yok → Benign kistler<br>
    <b>In/Out Phase:</b> Sinyal kaybı → Yağ içeren lezyon (AML), Nadiren Clear Cell RCC
  </div>`;

  sheet.innerHTML = h;
  document.getElementById('reportOverlay').classList.add('show');
}

function row(label, val) {
  return `<tr><td style="width:180px;font-weight:600;background:#f0eef5">${label}</td><td>${val}</td></tr>`;
}

function renderDxBars(dx) {
  const colors = ['#7b2ff7','#9d4edd','#c77dff','#e0aaff','#f0d0ff','#d4a8e8','#b07cc6','#8e5ea2'];
  let h = '';
  dx.forEach((d,i) => {
    h += `<div class="dx-row">
      <span class="dx-name">${d.name}</span>
      <div class="dx-bar-wrap"><div class="dx-bar" style="width:${d.pct}%;background:${colors[i%colors.length]}"></div></div>
      <span class="dx-pct">%${d.pct}</span>
    </div>`;
  });
  return h;
}

function closeReport() {
  document.getElementById('reportOverlay').classList.remove('show');
}

function copyReport() {
  const sheet = document.getElementById('reportSheet');
  const range = document.createRange();
  range.selectNodeContents(sheet);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  document.execCommand('copy');
  sel.removeAllRanges();
  alert('Rapor panoya kopyalandı!');
}

/* ============================================================
   INIT
   ============================================================ */
buildSteps();
render();
</script>
