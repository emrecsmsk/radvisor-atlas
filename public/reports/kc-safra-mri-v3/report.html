<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaciğer & Safra Kesesi MRI Karar Destek v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b16;--card:#13132a;--card2:#1a1a35;--card3:#10102a;--purple:#7c3aed;--purple2:#9333ea;--purpleLight:#a855f7;--purpleDim:#5b21b6;--text:#e2e8f0;--textDim:#94a3b8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--cyan:#06b6d4;--border:#2a2a48;--border2:#3a3a58;--success:#10b981;--white:#fff;--pink:#ec4899}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-header{background:linear-gradient(135deg,#0f0f2a 0%,#2d1b69 50%,#1a0a3e 100%);padding:14px 20px;border-bottom:2px solid var(--purple);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.app-header h1{font-size:1.1rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:8px}
.app-header .badge{background:var(--purple);color:#fff;font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
.container{max-width:980px;margin:0 auto;padding:12px}

.section-header{background:linear-gradient(90deg,var(--purpleDim),transparent);padding:8px 14px;border-radius:6px;margin-bottom:10px;font-size:.82rem;font-weight:600;color:var(--purpleLight);letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.section-header .icon{font-size:1rem}

.progress-wrap{margin-bottom:12px;position:sticky;top:0;z-index:100;background:var(--bg);padding:6px 0}
.progress-bar{display:flex;gap:2px;flex-wrap:wrap}
.progress-bar .dot{height:5px;flex:1;min-width:10px;border-radius:3px;background:var(--border);transition:.3s;cursor:pointer}
.progress-bar .dot.active{background:var(--purple);box-shadow:0 0 6px rgba(124,58,237,.5)}
.progress-bar .dot.done{background:var(--success)}
.progress-bar .dot.loop{background:var(--cyan);opacity:.5}
.progress-bar .dot.loop.done{background:var(--cyan);opacity:1}
.progress-bar .dot.loop.active{background:var(--cyan);box-shadow:0 0 6px rgba(6,182,212,.6);opacity:1}
.progress-bar .dot:hover{opacity:.8}
.prog-label{font-size:.7rem;color:var(--textDim);margin-top:4px;text-align:center}

.step-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.step-title{font-size:.98rem;font-weight:600;color:var(--purpleLight);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.step-title .num{background:var(--purple);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.step-title .lesion-tag{background:var(--cyan);color:#fff;font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600}
.step-subtitle{font-size:.78rem;color:var(--textDim);margin-bottom:10px}

.opt-group{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.opt-group-label{font-size:.76rem;color:var(--cyan);margin-bottom:4px;font-weight:600;margin-top:6px}
.opt-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:7px;cursor:pointer;font-size:.82rem;text-align:left;transition:.2s;line-height:1.3}
.opt-btn:hover{border-color:var(--purple);background:#1e1e3a}
.opt-btn.selected{border-color:var(--purple);background:rgba(124,58,237,.18);color:var(--white)}
.opt-btn.selected::before{content:'✓ ';color:var(--purpleLight);font-weight:700}
.cb-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:.82rem;transition:.2s}
.cb-row:hover{border-color:var(--purple)}
.cb-row.checked{border-color:var(--purple);background:rgba(124,58,237,.15)}
.cb-row input[type=checkbox]{accent-color:var(--purple);width:15px;height:15px;pointer-events:none}

.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.opt-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.opt-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
@media(max-width:600px){.opt-grid,.opt-grid-3,.opt-grid-4{grid-template-columns:1fr 1fr}}

/* Number input / measurement row */
.meas-grid{display:grid;grid-template-columns:1fr 100px 40px;gap:8px;align-items:center;background:var(--card2);border:1px solid var(--border);padding:8px 10px;border-radius:7px;margin-bottom:6px}
.meas-grid label{font-size:.8rem}
.meas-grid input[type=number]{background:var(--card3);border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:5px;font-size:.85rem;font-family:inherit;width:100%;text-align:right}
.meas-grid input[type=number]:focus{outline:none;border-color:var(--purple)}
.meas-grid .unit{font-size:.72rem;color:var(--textDim)}
.meas-hint{font-size:.7rem;color:var(--textDim);margin-top:-2px;margin-bottom:6px;padding-left:4px}
.meas-result{background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.3);padding:8px 12px;border-radius:6px;margin-top:6px;font-size:.8rem}
.meas-result b{color:var(--cyan)}
.meas-result .ok{color:var(--green)}
.meas-result .warn{color:var(--yellow)}
.meas-result .bad{color:var(--red)}

/* Segment picker */
.seg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:6px 0}
.seg-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 4px;border-radius:6px;cursor:pointer;font-size:.78rem;text-align:center;transition:.2s;line-height:1.2}
.seg-btn small{display:block;font-size:.62rem;color:var(--textDim);margin-top:2px}
.seg-btn:hover{border-color:var(--purple)}
.seg-btn.selected{border-color:var(--purple);background:rgba(124,58,237,.2);color:var(--white)}
.seg-btn.selected small{color:var(--purpleLight)}
@media(max-width:600px){.seg-grid{grid-template-columns:repeat(3,1fr)}}

/* Lesion summary pills */
.lesion-list{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.lesion-pill{background:var(--card3);border:1px solid var(--border2);padding:4px 10px;border-radius:14px;font-size:.75rem;color:var(--textDim)}
.lesion-pill.done{border-color:var(--cyan);color:var(--cyan)}
.lesion-pill.current{border-color:var(--purple);color:var(--purpleLight);background:rgba(124,58,237,.1)}
.lesion-pill .lp-num{font-weight:700;margin-right:4px}

/* Navigation */
.nav-bar{display:flex;justify-content:space-between;gap:10px;margin-top:12px;flex-wrap:wrap}
.btn{padding:9px 20px;border-radius:7px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-prev{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-prev:hover{border-color:var(--purple)}
.btn-next{background:var(--purple);color:#fff}
.btn-next:hover{background:var(--purple2)}
.btn-finalize{background:linear-gradient(135deg,var(--success),var(--green));color:#fff}
.btn-add-lesion{background:var(--cyan);color:#fff}
.btn-report{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-size:.95rem;padding:11px 28px}
.btn-sm{padding:6px 14px;font-size:.78rem}

/* Differential bars */
.diff-bar-wrap{margin-bottom:5px}
.diff-label{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:2px}
.diff-label .name{color:var(--text)}
.diff-label .pct{color:var(--purpleLight);font-weight:700}
.diff-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden}
.diff-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.diff-extra{font-size:.7rem;color:var(--textDim);margin-top:1px;margin-bottom:4px}

/* Category tags */
.cat-tag{display:inline-block;font-size:.6rem;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:600;vertical-align:middle}
.cat-Konjenital{background:rgba(6,182,212,.2);color:var(--cyan)}
.cat-Enfektif{background:rgba(239,68,68,.2);color:var(--red)}
.cat-Benign{background:rgba(34,197,94,.2);color:var(--green)}
.cat-Malign{background:rgba(234,179,8,.2);color:var(--yellow)}
.cat-Travmatik{background:rgba(249,115,22,.2);color:var(--orange)}
.cat-Vasküler{background:rgba(168,85,247,.2);color:var(--purpleLight)}
.cat-Metabolik{background:rgba(148,163,184,.2);color:var(--textDim)}
.cat-Diffüz{background:rgba(236,72,153,.2);color:var(--pink)}
.cat-Safra{background:rgba(34,197,94,.15);color:#4ade80}
.cat-Biliyer{background:rgba(6,182,212,.15);color:var(--cyan)}
.cat-Nadir{background:rgba(100,116,139,.2);color:#94a3b8}

/* Report overlay */
.report-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:9999;overflow-y:auto;padding:16px}
.report-overlay.open{display:block}
.report-sheet{max-width:820px;margin:0 auto;background:#fff;color:#1a1a1a;padding:36px;border-radius:6px;font-size:.82rem;line-height:1.5}
.report-sheet h2{color:#4c1d95;font-size:1rem;margin:16px 0 6px;border-bottom:2px solid #7c3aed;padding-bottom:3px}
.report-sheet h3{color:#6d28d9;font-size:.88rem;margin:10px 0 4px}
.report-sheet h4{color:#7c3aed;font-size:.82rem;margin:8px 0 3px}
.report-sheet table{width:100%;border-collapse:collapse;margin:6px 0 10px}
.report-sheet th{background:#4c1d95;color:#fff;padding:5px 7px;text-align:left;font-size:.74rem}
.report-sheet td{padding:4px 7px;font-size:.74rem;border-bottom:1px solid #e5e7eb;vertical-align:top}
.report-sheet tr:nth-child(even) td{background:#f5f3ff}
.report-sheet .yorum{background:#f0fdf4;border-left:4px solid #22c55e;padding:10px 14px;margin:10px 0;border-radius:4px;font-size:.8rem}
.report-sheet .yorum b{color:#166534}
.report-sheet .yorum-red{background:#fef2f2;border-left:4px solid #ef4444;padding:10px 14px;margin:10px 0;border-radius:4px;font-size:.8rem}
.report-sheet .yorum-red b{color:#991b1b}
.report-sheet .yorum-blue{background:#eff6ff;border-left:4px solid #3b82f6;padding:10px 14px;margin:10px 0;border-radius:4px;font-size:.8rem}
.report-sheet .yorum-blue b{color:#1e40af}
.report-sheet .yorum-amber{background:#fef3c7;border-left:4px solid #eab308;padding:10px 14px;margin:10px 0;border-radius:4px;font-size:.8rem}
.report-sheet .yorum-amber b{color:#92400e}
.toolbar{position:sticky;top:0;background:var(--card);padding:8px;display:flex;gap:6px;justify-content:center;border-radius:6px 6px 0 0;z-index:10000;border-bottom:1px solid var(--border);flex-wrap:wrap}
.toolbar .btn{padding:7px 14px;font-size:.78rem}
.toolbar .btn-print{background:var(--purple);color:#fff}
.toolbar .btn-copy{background:var(--success);color:#fff}
.toolbar .btn-download{background:var(--cyan);color:#fff}
.toolbar .btn-close{background:var(--red);color:#fff}
.hidden{display:none!important}
.info-box{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.3);border-radius:7px;padding:8px 12px;font-size:.78rem;color:var(--textDim);margin-bottom:10px;line-height:1.4}
.info-box b{color:var(--purpleLight)}
.divider{border:none;border-top:1px solid var(--border);margin:8px 0}
@media print{.toolbar{display:none}.report-overlay{position:static;background:#fff;padding:0}.report-sheet{box-shadow:none;border-radius:0}}
</style>
</head>

// =====================================================
// STATE
// =====================================================
let state={lesions:[],currentIdx:-1};
let currentStep=0;

// Lesion count from radio
function lesionCount(){
  const n=state.lezyon_sayisi;
  if(n==='n1') return 1;
  if(n==='n2') return 2;
  if(n==='n3') return 3;
  if(n==='n4') return 4;
  if(n==='n5') return 3; // ≥5'te baskın 3 değerlendirilir
  return 0;
}
function isContrastGiven(){return state.kontrast_tipi && state.kontrast_tipi!=='kontrast_yok';}
function isHBPGiven(){return state.kontrast_tipi==='kontrast_intrasel_eob'||state.kontrast_tipi==='kontrast_intrasel_bopta';}

// Dinamik step listesi üretir: PRE + (her lezyon için LESION_STEPS) + POST
function buildSteps(){
  const steps=[];
  // PRE
  STEPS_PRE.forEach(s=>{
    if(!s.showIf||s.showIf(state)) steps.push({...s,_phase:'pre'});
  });
  // LOOP (fokal_var ve sayı seçilmişse)
  if(state.fokal_var==='fokal_var' && lesionCount()>0){
    const n=lesionCount();
    for(let i=0;i<n;i++){
      LESION_STEPS.forEach(s=>{
        // HBP sadece intrasellüler kontrast varsa
        if(s.showIfHBP && !isHBPGiven()) return;
        // Kontrast faz adımları sadece kontrast verildiyse
        if(s.showIfKontrast && !isContrastGiven()) return;
        steps.push({...s,_phase:'loop',_lidx:i});
      });
    }
    // Loop finalize adımı
    steps.push({id:'loop_finalize',title:'Lezyon Değerlendirmesi Tamamlandı',section:'Lezyon Değerlendirme',icon:'✅',type:'finalize',_phase:'loop_end',label:'Tüm lezyonlar değerlendirildi. Devam etmek için onayla.'});
  }
  // POST
  STEPS_POST.forEach(s=>{
    if(!s.showIf||s.showIf(state)) steps.push({...s,_phase:'post'});
  });
  return steps;
}
function vis(){return buildSteps();}

// Get/set state değerleri — loop içindeysek lesions[idx]'e yazar
function getVal(step){
  if(step._phase==='loop'){
    const lez=state.lesions[step._lidx]||{};
    return lez[step.id];
  }
  return state[step.id];
}
function setVal(step,v){
  if(step._phase==='loop'){
    while(state.lesions.length<=step._lidx) state.lesions.push({});
    state.lesions[step._lidx][step.id]=v;
  } else {
    state[step.id]=v;
  }
}

// =====================================================
// C/RL ORAN VE BOYUT YORUMU
// =====================================================
function crlRatio(){
  const c=parseFloat(state.kc_kaudat_tv);
  const r=parseFloat(state.kc_sag_tv);
  if(!c||!r||r===0) return null;
  return c/r;
}
function crlInterpret(){
  const ratio=crlRatio();
  if(ratio===null) return null;
  let cls='ok',txt='Normal (<0.60)',key=null;
  if(ratio>=0.65){cls='bad';txt='≥0.65 — SİROZ için yüksek özgüllük (Harbin)';key='crl_yuksek';}
  else if(ratio>=0.60){cls='warn';txt='0.60-0.65 — Borderline/şüpheli';key='crl_borderline';}
  return {ratio:ratio.toFixed(2),cls,txt,key};
}
function liverSizeInterpret(){
  const m=state.kc_sag_cc_mcl?parseFloat(state.kc_sag_cc_mcl):null;
  const out=[];
  if(m){
    if(m>160) out.push({field:'Sağ lob CC (MKL)',val:m+' mm',cls:'bad',int:'Hepatomegali lehine (>160 mm)',key:'kc_hepatomegali'});
    else if(m>=140) out.push({field:'Sağ lob CC (MKL)',val:m+' mm',cls:'ok',int:'Normal sınırlarda (140-160 mm)'});
    else out.push({field:'Sağ lob CC (MKL)',val:m+' mm',cls:'warn',int:'Küçük boyut (<140 mm) — atrofi?'});
  }
  const a=state.kc_sag_cc_mal?parseFloat(state.kc_sag_cc_mal):null;
  if(a){
    if(a>150) out.push({field:'Sağ lob CC (MAL)',val:a+' mm',cls:'bad',int:'Hepatomegali (>150 mm)',key:'kc_hepatomegali'});
    else out.push({field:'Sağ lob CC (MAL)',val:a+' mm',cls:'ok',int:'Normal sınırlarda'});
  }
  const sol=state.kc_sol_cc?parseFloat(state.kc_sol_cc):null;
  if(sol){
    if(sol>90) out.push({field:'Sol lob CC',val:sol+' mm',cls:'warn',int:'Hipertrofi lehine (>90 mm)',key:'kc_hipertrofi_sol'});
    else out.push({field:'Sol lob CC',val:sol+' mm',cls:'ok',int:'Normal sınırlarda'});
  }
  const k=state.kc_kaudat_tv?parseFloat(state.kc_kaudat_tv):null;
  if(k){
    if(k>35) out.push({field:'Kaudat lob transvers',val:k+' mm',cls:'warn',int:'Hipertrofi lehine (>35 mm)',key:'kc_hipertrofi_kaudat'});
    else out.push({field:'Kaudat lob transvers',val:k+' mm',cls:'ok',int:'Normal sınırlarda'});
  }
  const r=state.kc_sag_tv?parseFloat(state.kc_sag_tv):null;
  if(r) out.push({field:'Sağ lob transvers (portal bif. sev.)',val:r+' mm',cls:'ok',int:'—'});
  const crl=crlInterpret();
  if(crl) out.push({field:'Kaudat/Sağ lob oranı (C/RL, Harbin)',val:crl.ratio,cls:crl.cls,int:crl.txt,key:crl.key});
  return out;
}

// =====================================================
// SCORING
// =====================================================
function score(){
  const sel=new Set();
  // Global state'ten düz key'ler topla
  for(const k in state){
    if(k==='lesions'||k==='currentIdx') continue;
    const v=state[k];
    if(Array.isArray(v)) v.forEach(x=>sel.add(x));
    else if(typeof v==='string'&&v) sel.add(v);
  }
  // Lezyonlardan key'ler topla
  state.lesions.forEach(lez=>{
    for(const k in lez){
      const v=lez[k];
      if(Array.isArray(v)) v.forEach(x=>sel.add(x));
      else if(typeof v==='string'&&v){
        sel.add(v);
        // Segment key'i
        if(k==='segment'){sel.add('seg_'+v);}
      }
    }
  });
  // Multipl flag'ı
  if(state.lesions.length>1) sel.add('multipl');
  else if(state.lesions.length===1) sel.add('tek_lezyon');
  // Boyut key'leri (lezyonların en büyük uzun çapına göre)
  let maxLong=0;
  state.lesions.forEach(l=>{
    const v=parseFloat(l.lez_uzun_cap);
    if(v&&v>maxLong) maxLong=v;
  });
  if(maxLong>0){
    if(maxLong<10) sel.add('kucuk_boyut');
    else if(maxLong<=30) sel.add('orta_boyut');
    else sel.add('buyuk_boyut');
  }
  // Ölçüm kaynaklı key'ler (C/RL, boyut)
  const szI=liverSizeInterpret();
  szI.forEach(x=>{if(x.key) sel.add(x.key);});
  // Portal ven çapı
  const pvc=parseFloat(state.pv_cap);
  if(pvc&&pvc>=13) sel.add('pv_dilate');

  const results=DB.map(p=>{
    let total=0,maxP=0;
    for(const k in p.keys){maxP+=p.keys[k];if(sel.has(k)) total+=p.keys[k];}
    return{path:p,score:total,max:maxP,pct:maxP>0?Math.round(100*total/maxP):0};
  });
  results.sort((a,b)=>b.pct-a.pct||b.score-a.score);
  return results.filter(r=>r.score>0);
}

// =====================================================
// RENDER
// =====================================================
function render(){
  const steps=vis();
  if(currentStep>=steps.length) currentStep=steps.length-1;
  if(currentStep<0) currentStep=0;
  const step=steps[currentStep];
  const app=document.getElementById('app');
  let h='';

  // Progress
  h+=`<div class="progress-wrap"><div class="progress-bar">`;
  for(let i=0;i<steps.length;i++){
    let c=i<currentStep?'done':i===currentStep?'active':'';
    if(steps[i]._phase==='loop'||steps[i]._phase==='loop_end') c+=' loop';
    h+=`<div class="dot ${c}" onclick="currentStep=${i};render()" title="${steps[i].title}"></div>`;
  }
  const loopInfo=step._phase==='loop'?` | Lezyon ${step._lidx+1}/${lesionCount()}`:'';
  h+=`</div><div class="prog-label">Adım ${currentStep+1}/${steps.length} — ${step.section||''}${loopInfo}</div></div>`;

  // Section header
  if(step.section){
    h+=`<div class="section-header"><span class="icon">${step.icon||''}</span>${step.section}${step._phase==='loop'?' — Lezyon '+(step._lidx+1):''}</div>`;
  }

  // Card
  h+=`<div class="step-card">`;
  h+=`<div class="step-title"><span class="num">${currentStep+1}</span>${step.title}`;
  if(step._phase==='loop') h+=`<span class="lesion-tag">L${step._lidx+1}</span>`;
  h+='</div>';
  if(step.label) h+=`<div class="step-subtitle">${step.label}</div>`;

  // Lesion list (loop içindeyken üstte göster)
  if(step._phase==='loop'){
    h+='<div class="lesion-list">';
    for(let i=0;i<lesionCount();i++){
      const lez=state.lesions[i]||{};
      const seg=lez.segment?SEGMENTS.find(x=>x.v===lez.segment)?.t:'?';
      const sz=(lez.lez_uzun_cap&&lez.lez_kisa_cap)?`${lez.lez_uzun_cap}×${lez.lez_kisa_cap}mm`:(lez.lez_uzun_cap?lez.lez_uzun_cap+'mm':'');
      const done=Object.keys(lez).length>5;
      const cur=i===step._lidx;
      const cls=cur?'current':done?'done':'';
      h+=`<div class="lesion-pill ${cls}"><span class="lp-num">L${i+1}</span>${seg} ${sz}</div>`;
    }
    h+='</div>';
  }

  // --- Input tiplerine göre render ---
  if(step.type==='radio'){
    const cur=getVal(step);
    h+='<div class="opt-group">';
    step.opts.forEach(o=>{
      const s=cur===o.v?'selected':'';
      h+=`<div class="opt-btn ${s}" onclick="pickR('${step.id}','${o.v}')">${o.t}</div>`;
    });
    h+='</div>';
  } else if(step.type==='multi'){
    const arr=getVal(step)||[];
    h+='<div class="opt-group">';
    step.opts.forEach(o=>{
      const chk=arr.includes(o.v);
      h+=`<div class="cb-row ${chk?'checked':''}" onclick="togC('${step.id}','${o.v}')">
        <input type="checkbox" ${chk?'checked':''}> ${o.t}</div>`;
    });
    h+='</div>';
  } else if(step.type==='segment'){
    const cur=getVal(step);
    h+='<div class="seg-grid">';
    SEGMENTS.forEach(s=>{
      const sel=cur===s.v?'selected':'';
      h+=`<div class="seg-btn ${sel}" onclick="pickR('${step.id}','${s.v}')">${s.t}<small>${s.d}</small></div>`;
    });
    h+='</div>';
    h+=`<div class="meas-hint">Couinaud: S1 Kaudat | S2-S3 Sol lateral (süp/inf) | S4a-S4b Sol medial (süp/inf) | S5-S8 Sağ (ant-inf / post-inf / post-süp / ant-süp)</div>`;
  } else if(step.type==='measurement_liver'){
    h+=`<div class="opt-group-label">Kraniokaudal (CC) Ölçümler</div>`;
    h+=measRow('Sağ lob CC — Midklaviküler hat','kc_sag_cc_mcl','mm','Normal: <160 mm');
    h+=measRow('Sağ lob CC — Midaksiller hat','kc_sag_cc_mal','mm','Normal: ~110-150 mm');
    h+=measRow('Sol lob CC','kc_sol_cc','mm','Normal: <90 mm');
    h+=`<div class="opt-group-label">Transvers Ölçümler (C/RL oranı için)</div>`;
    h+=measRow('Kaudat lob transvers çapı','kc_kaudat_tv','mm','Portal bif. sev. aksiyel — Normal: <35 mm');
    h+=measRow('Sağ lob transvers çapı','kc_sag_tv','mm','Portal bif. sev. aksiyel — sağ lob lateral kenarına');
    // Live interpret
    const sz=liverSizeInterpret();
    if(sz.length>0){
      h+='<div class="meas-result"><b>Canlı Değerlendirme:</b><br>';
      sz.forEach(x=>{h+=`<span class="${x.cls}">• ${x.field}: ${x.val} → ${x.int}</span><br>`;});
      h+='</div>';
    }
  } else if(step.type==='measurement_lesion'){
    h+=measRowLesion('Uzun çap (aksiyel)','lez_uzun_cap','mm',step._lidx);
    h+=measRowLesion('Kısa çap (aksiyel)','lez_kisa_cap','mm',step._lidx);
    h+=measRowLesion('Kraniokaudal (CC) boyut','lez_cc','mm',step._lidx);
    // Live size preview
    const lez=state.lesions[step._lidx]||{};
    const u=parseFloat(lez.lez_uzun_cap),k=parseFloat(lez.lez_kisa_cap),c=parseFloat(lez.lez_cc);
    if(u||k||c){
      let kat='';
      if(u){
        if(u<10) kat='Küçük lezyon (<10 mm)';
        else if(u<=30) kat='Orta boyut (10-30 mm)';
        else kat='Büyük lezyon (>30 mm)';
      }
      h+=`<div class="meas-result"><b>Boyut özeti:</b> ${[u,k,c].filter(x=>x).map((x,i)=>['Uzun','Kısa','CC'][i]+':'+x+'mm').join(' × ')} ${kat?'<br><b>Kategori:</b> <span class="'+(u>30?'warn':'ok')+'">'+kat+'</span>':''}</div>`;
    }
  } else if(step.type==='single_measure'){
    h+=measRow(step.label,step.field,'mm',step.ref);
    const v=parseFloat(state[step.field]);
    if(v){
      h+=`<div class="meas-result"><b>Ölçülen:</b> ${v} mm — <span class="${v>=13?'warn':'ok'}">${step.ref}</span></div>`;
    }
  } else if(step.type==='finalize'){
    // Lezyon özeti
    h+='<div class="info-box"><b>✓ Lezyon değerlendirmesi özeti:</b><br>';
    for(let i=0;i<lesionCount();i++){
      const lez=state.lesions[i]||{};
      const seg=lez.segment?SEGMENTS.find(x=>x.v===lez.segment):null;
      const segTxt=seg?seg.t+' ('+SEG_TO_LOBE[seg.v]+')':'segment?';
      const sz=lez.lez_uzun_cap?lez.lez_uzun_cap+(lez.lez_kisa_cap?'×'+lez.lez_kisa_cap:'')+'mm':'boyut?';
      h+=`<b>L${i+1}</b> — ${segTxt}, ${sz}<br>`;
    }
    h+='</div>';
    h+='<button class="btn btn-finalize" onclick="finalizeLoop()" style="width:100%">✅ Lezyon değerlendirmesini tamamla ve genel değerlendirmeye devam et</button>';
  }

  // Nav
  h+='<div class="nav-bar">';
  if(step.type!=='finalize'){
    h+=currentStep>0?`<button class="btn btn-prev" onclick="goP()">← Geri</button>`:'<div></div>';
    if(currentStep<steps.length-1){
      h+=`<button class="btn btn-next" onclick="goN()">İleri →</button>`;
    } else {
      h+=`<button class="btn btn-report" onclick="showRes()">📊 Sonuçları Göster</button>`;
    }
  } else {
    h+=`<button class="btn btn-prev" onclick="goP()">← Geri</button><div></div>`;
  }
  h+='</div></div>';

  // Live diff
  const filled=countFilled();
  if(filled>=3){
    const res=score();
    if(res.length>0){
      h+=`<div class="step-card"><div class="step-title" style="font-size:.88rem">📊 Canlı Ayırıcı Tanı</div>`;
      const top=res.slice(0,6);
      const mx=top[0]?.pct||1;
      top.forEach(r=>{
        const w=Math.max(4,Math.round(100*r.pct/mx));
        const c=r.path.cat==='Malign'?'var(--red)':r.path.cat==='Benign'?'var(--green)':r.path.cat==='Enfektif'?'var(--orange)':r.path.cat==='Diffüz'?'var(--pink)':'var(--purple)';
        h+=`<div class="diff-bar-wrap"><div class="diff-label"><span class="name">${r.path.name}<span class="cat-tag cat-${r.path.cat}">${r.path.cat}</span></span><span class="pct">${r.pct}%</span></div><div class="diff-bar"><div class="diff-bar-fill" style="width:${w}%;background:${c}"></div></div></div>`;
      });
      h+='</div>';
    }
  }

  app.innerHTML=h;
}

function measRow(label,field,unit,hint){
  const v=state[field]||'';
  let h=`<div class="meas-grid"><label>${label}</label><input type="number" value="${v}" step="0.1" onchange="setMeas('${field}',this.value)" placeholder="0"><span class="unit">${unit}</span></div>`;
  if(hint) h+=`<div class="meas-hint">${hint}</div>`;
  return h;
}
function measRowLesion(label,field,unit,lidx){
  const lez=state.lesions[lidx]||{};
  const v=lez[field]||'';
  return `<div class="meas-grid"><label>${label}</label><input type="number" value="${v}" step="0.1" onchange="setLesionMeas(${lidx},'${field}',this.value)" placeholder="0"><span class="unit">${unit}</span></div>`;
}
function setMeas(f,v){state[f]=v;render();}
function setLesionMeas(lidx,f,v){
  while(state.lesions.length<=lidx) state.lesions.push({});
  state.lesions[lidx][f]=v;
  render();
}

function countFilled(){
  let c=0;
  for(const k in state){
    if(k==='lesions'||k==='currentIdx') continue;
    const v=state[k];
    if(v&&(!Array.isArray(v)||v.length>0)) c++;
  }
  state.lesions.forEach(l=>{for(const k in l){if(l[k]) c++;}});
  return c;
}

function pickR(id,v){
  const step=vis()[currentStep];
  setVal(step,v);
  render();
}
function togC(id,v){
  const step=vis()[currentStep];
  let arr=getVal(step)||[];
  arr=[...arr];
  const i=arr.indexOf(v);
  if(i>=0) arr.splice(i,1);
  else arr.push(v);
  setVal(step,arr);
  render();
}

// === 3-PART LESION LOOP FIX ===
// 1) finalize: currentIdx = -1 (post-loop)
// 2) goNext: idx===-1 ise loop'u atla (pre-loop'tan post-loop'a)
// 3) goPrev: post-loop'tan pre-loop'a dön, loop'u atla

function finalizeLoop(){
  state.currentIdx=-1;
  // loop_finalize adımı zaten son loop adımı, sonraki adıma geç
  goN();
}

function goN(){
  const s=vis();
  if(currentStep<s.length-1){
    currentStep++;
    render();
    window.scrollTo(0,0);
  }
}
function goP(){
  if(currentStep>0){
    currentStep--;
    render();
    window.scrollTo(0,0);
  }
}

// =====================================================
// RESULTS
// =====================================================
function showRes(){
  const res=score();
  const app=document.getElementById('app');
  let h='<div class="step-card"><div class="step-title">📊 Ayırıcı Tanı Sonuçları</div>';
  if(res.length===0){
    h+='<p style="color:var(--textDim)">Girilen bulgularla eşleşen patoloji bulunamadı.</p>';
  } else {
    const top=res.slice(0,20);
    const mx=top[0]?.pct||1;
    top.forEach((r,i)=>{
      const w=Math.max(4,Math.round(100*r.pct/mx));
      const c=r.path.cat==='Malign'?'var(--red)':r.path.cat==='Benign'?'var(--green)':r.path.cat==='Enfektif'?'var(--orange)':r.path.cat==='Diffüz'?'var(--pink)':'var(--purple)';
      h+=`<div class="diff-bar-wrap" style="margin-bottom:8px">
        <div class="diff-label"><span class="name"><b>${i+1}.</b> ${r.path.name}<span class="cat-tag cat-${r.path.cat}">${r.path.cat}</span></span><span class="pct">${r.pct}%</span></div>
        <div class="diff-bar"><div class="diff-bar-fill" style="width:${w}%;background:${c}"></div></div>
        <div class="diff-extra">${r.path.diger}</div></div>`;
    });
  }
  h+='<div class="nav-bar" style="margin-top:16px">';
  h+='<button class="btn btn-prev" onclick="currentStep=0;render()">← Başa Dön</button>';
  h+='<button class="btn btn-report" onclick="genReport()">📋 Rapor Oluştur</button>';
  h+='</div></div>';
  app.innerHTML=h;
}

// REPORT

function kontrastLabel(){
  const m={kontrast_ekstrasel:'Ekstrasellüler Gd (Gd-DTPA / Gd-DOTA) — 3 fazlı',
          kontrast_intrasel_eob:'Hepatobiliyer Gd-EOB-DTPA (Primovist) — 4 fazlı + HBP (20 dk)',
          kontrast_intrasel_bopta:'Hepatobiliyer Gd-BOPTA (MultiHance) — 4 fazlı + HBP (60-120 dk)',
          kontrast_yok:'Kontrastsız'};
  return m[state.kontrast_tipi]||'Belirtilmedi';
}
function labelFor(step,val){
  const o=step.opts?.find(x=>x.v===val);
  return o?o.t:val;
}

function genReport(){
  const res=score();
  const ov=document.getElementById('reportOverlay');
  let r='<div class="toolbar">';
  r+='<button class="btn btn-print" onclick="window.print()">🖨️ Yazdır</button>';
  r+='<button class="btn btn-copy" onclick="copyR()">📋 Kopyala</button>';
  r+='<button class="btn btn-download" onclick="downloadR()">💾 HTML İndir</button>';
  r+='<button class="btn btn-close" onclick="closeR()">✕ Kapat</button></div>';

  r+='<div class="report-sheet" id="rptC">';
  r+='<h2 style="text-align:center;border-bottom:3px solid #4c1d95;padding-bottom:6px;font-size:1.1rem">KARACİĞER & SAFRA KESESİ MRI<br>KAPSAMLI RAPOR</h2>';
  r+=`<p style="text-align:center;color:#6b7280;font-size:.75rem">Tarih: ${new Date().toLocaleDateString('tr-TR')} &nbsp;|&nbsp; Gülhane EAH — Radyoloji</p>`;

  // Teknik Protokol
  r+='<h2>TEKNİK PROTOKOL</h2>';
  r+=`<p><b>Kontrast ajanı:</b> ${kontrastLabel()}</p>`;
  if(isHBPGiven()){
    r+='<p style="font-size:.75rem;color:#6b21a8"><i>Hepatobiliyer faz değerlendirmesi bu incelemede mevcuttur. Normal parankim HBP\'de hiperintens olur; hepatositik fonksiyon içermeyen lezyonlar (HCC, metastaz, kist, hemanjiyom) hipointens; FNH OATP1 expresse ettiğinden izo/hiperintens izlenir.</i></p>';
  }

  // KARACİĞER ÖLÇÜMLERİ
  const szI=liverSizeInterpret();
  if(szI.length>0){
    r+='<h2>KARACİĞER BOYUT ÖLÇÜMLERİ</h2>';
    r+='<table><tr><th>Ölçüm</th><th>Değer</th><th>Yorum</th></tr>';
    szI.forEach(x=>{
      const c=x.cls==='bad'?'#991b1b':x.cls==='warn'?'#92400e':'#166534';
      r+=`<tr><td>${x.field}</td><td><b>${x.val}</b></td><td style="color:${c}">${x.int}</td></tr>`;
    });
    r+='</table>';
    const crl=crlInterpret();
    if(crl&&(crl.cls==='bad'||crl.cls==='warn')){
      r+=`<div class="yorum-amber"><b>C/RL ORAN YORUMU:</b> Kaudat/sağ lob oranı ${crl.ratio} (${crl.txt}). Harbin kriterine göre C/RL ≥0.65 siroz için %96 özgüllüğe sahiptir. Klinik ve diğer siroz bulguları ile korelasyon önerilir.</div>`;
    }
  }

  // PARANKİM
  r+='<h2>KARACİĞER PARANKİMİ</h2>';
  const preSections=['Karaciğer Parankimi'];
  STEPS_PRE.filter(s=>preSections.includes(s.section)&&s.type!=='measurement_liver').forEach(s=>{
    const v=state[s.id];
    if(!v||(Array.isArray(v)&&v.length===0)) return;
    let disp=Array.isArray(v)?v.map(x=>labelFor(s,x)).join(', '):labelFor(s,v);
    r+=`<p><b>${s.title}:</b> ${disp}</p>`;
  });

  // FOKAL LEZYON
  if(state.fokal_var==='fokal_var' && state.lesions.length>0){
    r+='<h2>FOKAL LEZYON DEĞERLENDİRMESİ</h2>';
    r+=`<p><b>Lezyon sayısı:</b> ${labelFor({opts:STEPS_PRE.find(x=>x.id==='lezyon_sayisi').opts},state.lezyon_sayisi)}</p>`;
    state.lesions.forEach((lez,idx)=>{
      const seg=lez.segment?SEGMENTS.find(x=>x.v===lez.segment):null;
      const segTxt=seg?`${seg.t} — ${SEG_TO_LOBE[seg.v]}`:'segment belirtilmedi';
      const sz=[lez.lez_uzun_cap,lez.lez_kisa_cap,lez.lez_cc].filter(x=>x).map((x,i)=>['Uzun','Kısa','CC'][i]+' '+x+'mm').join(' × ');
      r+=`<h3>Lezyon ${idx+1} — ${segTxt}</h3>`;
      r+='<table>';
      r+=`<tr><th style="width:32%">Özellik</th><th>Bulgu</th></tr>`;
      if(sz) r+=`<tr><td>Boyut</td><td><b>${sz}</b></td></tr>`;
      LESION_STEPS.forEach(s=>{
        if(s.type==='measurement_lesion'||s.type==='segment') return;
        const v=lez[s.id];
        if(!v||(Array.isArray(v)&&v.length===0)) return;
        let disp=Array.isArray(v)?v.map(x=>labelFor(s,x)).join(', '):labelFor(s,v);
        r+=`<tr><td>${s.title}</td><td>${disp}</td></tr>`;
      });
      r+='</table>';
    });
  } else if(state.fokal_var==='fokal_yok'){
    r+='<h2>FOKAL LEZYON DEĞERLENDİRMESİ</h2><p>Fokal karaciğer lezyonu saptanmadı.</p>';
  }

  // SAFRA YOLLARI & SK
  const syksections=['Safra Yolları','Safra Kesesi','Vasküler Yapılar','Perihepatik','Klinik'];
  syksections.forEach(sec=>{
    const inSec=STEPS_POST.filter(s=>s.section===sec);
    const hasData=inSec.some(s=>{const v=state[s.id];return v&&(!Array.isArray(v)||v.length>0);})||inSec.some(s=>s.type==='single_measure'&&state[s.field]);
    if(!hasData) return;
    r+=`<h2>${sec.toUpperCase()}</h2>`;
    inSec.forEach(s=>{
      if(s.type==='single_measure'){
        const v=state[s.field];
        if(v) r+=`<p><b>${s.title}:</b> ${v} mm</p>`;
        return;
      }
      const v=state[s.id];
      if(!v||(Array.isArray(v)&&v.length===0)) return;
      let disp=Array.isArray(v)?v.map(x=>labelFor(s,x)).join(', '):labelFor(s,v);
      r+=`<p><b>${s.title}:</b> ${disp}</p>`;
    });
  });

  // AYIRICI TANI
  r+='<h2>AYIRICI TANI SONUÇLARI</h2>';
  if(res.length>0){
    r+='<table><tr><th>#</th><th>Patoloji</th><th>Kategori</th><th>Uyum</th><th>Ayırıcı Özellikler</th></tr>';
    res.slice(0,12).forEach((x,i)=>{
      r+=`<tr><td>${i+1}</td><td><b>${x.path.name}</b></td><td>${x.path.cat}</td><td>%${x.pct}</td><td style="font-size:.7rem">${x.path.diger}</td></tr>`;
    });
    r+='</table>';
  } else {r+='<p>Eşleşen patoloji bulunamadı.</p>';}

  // En olası tanıların MRI özellikleri (HBP dahil)
  if(res.length>0){
    const top=res.slice(0,3).filter(x=>x.path.t1||x.path.hbp);
    if(top.length>0){
      r+='<h2>EN OLASI TANILARIN MRI SINYAL ÖZELLİKLERİ</h2>';
      r+='<table><tr><th>Patoloji</th><th>T1</th><th>T2</th><th>DWI</th><th>ADC</th><th>Art</th><th>PVF</th><th>Geç</th>'+(isHBPGiven()?'<th>HBP</th>':'')+'</tr>';
      top.forEach(x=>{
        const p=x.path;
        r+=`<tr><td><b>${p.name}</b></td><td>${p.t1||'-'}</td><td>${p.t2||'-'}</td><td>${p.dwi||'-'}</td><td>${p.adc||'-'}</td><td>${p.art||'-'}</td><td>${p.pvf||'-'}</td><td>${p.gec||'-'}</td>${isHBPGiven()?'<td>'+(p.hbp||'-')+'</td>':''}</tr>`;
      });
      r+='</table>';
    }
  }

  // YORUM
  if(res.length>0){
    const t=res[0];
    const maligTop3=res.slice(0,3).filter(x=>x.path.cat==='Malign');
    if(maligTop3.length>0){
      r+='<div class="yorum-red"><b>⚠️ MALİGNİTE UYARISI:</b> ';
      r+=`Ayırıcı tanıda malign patoloji(ler) ön sıralarda yer almaktadır: ${maligTop3.map(x=>x.path.name+' (%'+x.pct+')').join(', ')}. `;
      r+='Klinik korelasyon, biyopsi ve/veya ileri tetkik önerilir.</div>';
    }
    r+='<div class="yorum"><b>YORUM:</b> ';
    r+=`Girilen MRI ve klinik bulguları en yüksek oranda <b>${t.path.name}</b> (%${t.pct}) ile uyumludur. `;
    r+=`${t.path.diger}. `;
    if(res.length>1) r+=`Ayırıcı tanıda ${res.slice(1,4).map(x=>x.path.name+' (%'+x.pct+')').join(', ')} da değerlendirilmelidir. `;
    r+='Kesin tanı için klinik, laboratuvar ve gerekirse patolojik korelasyon önerilir.</div>';

    const diffuz=res.filter(x=>x.path.cat==='Diffüz'&&x.pct>=30);
    if(diffuz.length>0){
      r+='<div class="yorum-blue"><b>DİFFÜZ PARANKİMAL YORUM:</b> ';
      r+=diffuz.map(x=>`${x.path.name} ile uyumlu bulgular mevcuttur (%${x.pct})`).join('. ')+'. ';
      r+='</div>';
    }
    const vask=res.filter(x=>x.path.cat==='Vasküler'&&x.pct>=30);
    if(vask.length>0){
      r+='<div class="yorum-blue"><b>VASKÜLER YORUM:</b> ';
      r+=vask.map(x=>`${x.path.name} bulguları değerlendirilmelidir (%${x.pct})`).join('. ')+'. ';
      r+='</div>';
    }
    if(isHBPGiven()){
      r+='<div class="yorum-amber"><b>HEPATOBİLİYER FAZ YORUMU:</b> ';
      r+='HBP fazında <b>hipointens</b> lezyonlar hepatositik fonksiyon içermeyen patolojileri (HCC, metastaz, kolanjiyokarsinom, kist, abse) düşündürür. ';
      r+='<b>İzo/hiperintens</b> lezyonlar ise FNH (OATP1+) için tipiktir. β-katenin mutant adenom da hiperintens olabilir. ';
      r+='HCC ile FNH ayırımında HBP bulgusu yüksek diagnostik değer taşır.</div>';
    }
  }

  // Kritik kombinasyonlar
  r+='<h2>KRİTİK MRI KOMBİNASYONLARI — HIZLI REFERANS</h2>';
  r+='<table><tr><th>MRI Bulgusu</th><th>En Olası Tanı</th></tr>';
  [['T2 çok hiperintens + nodüler periferik kontrast','Hemanjiyom'],
   ['Arteriyel hiper + washout + kapsül + siroz','HCC'],
   ['Arteriyel hiper + HBP hipointens (EOB)','HCC (HBP kanıtı ile)'],
   ['Santral skar + homojen güçlü art. kontrast + HBP izo/hiper','FNH'],
   ['Rim kontrast + çok güçlü DWI restriksiyonu','Abse'],
   ['Multipl rim lezyon + restriksiyon + HBP hipointens','Metastaz'],
   ['Progressif geç kontrast (fibrotik) + HBP hipo','Kolanjiyokarsinom'],
   ['Out-phase diffüz sinyal düşüşü','Hepatosteatoz'],
   ['T1-T2 diffüz düşük + susceptibility','Siderozis'],
   ['Nodüler kontur + C/RL ≥0.65 + portal HT','Siroz'],
   ['Portal ven genişlemiş + arteriyel kontrast tutan trombüs','Tümör trombozu (HCC)'],
   ['HV tromboz + kaudat lob hipertrofisi','Budd-Chiari'],
   ['Beading + multifokal darlık + safra yolları','PSC'],
   ['SK duvarında hava','Amfizematöz kolesistit'],
   ['Pearl-necklace sign','Adenomyomatozis'],
   ['İrregüler SK duvar + KC invazyon','SK karsinomu']
  ].forEach(c=>{r+=`<tr><td>${c[0]}</td><td><b>${c[1]}</b></td></tr>`;});
  r+='</table>';

  r+='<p style="text-align:center;color:#9ca3af;font-size:.68rem;margin-top:16px">Bu rapor klinik karar destek amaçlıdır. Kesin tanı için klinik, laboratuvar ve patolojik korelasyon gereklidir.</p>';
  r+='</div>';
  ov.innerHTML=r;
  ov.classList.add('open');
}

function closeR(){document.getElementById('reportOverlay').classList.remove('open');}
function copyR(){
  const el=document.getElementById('rptC');
  const rng=document.createRange();rng.selectNodeContents(el);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(rng);
  document.execCommand('copy');sel.removeAllRanges();
  alert('Rapor panoya kopyalandı!');
}
function downloadR(){
  const el=document.getElementById('rptC');
  const html=`<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>KC MRI Rapor</title><style>
    body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;max-width:820px;margin:20px auto;padding:24px;line-height:1.5;font-size:.86rem}
    h2{color:#4c1d95;font-size:1rem;margin:16px 0 6px;border-bottom:2px solid #7c3aed;padding-bottom:3px}
    h3{color:#6d28d9;font-size:.88rem;margin:10px 0 4px}
    table{width:100%;border-collapse:collapse;margin:6px 0 10px}
    th{background:#4c1d95;color:#fff;padding:5px 7px;text-align:left;font-size:.78rem}
    td{padding:4px 7px;font-size:.78rem;border-bottom:1px solid #e5e7eb;vertical-align:top}
    tr:nth-child(even) td{background:#f5f3ff}
    .yorum{background:#f0fdf4;border-left:4px solid #22c55e;padding:10px 14px;margin:10px 0;border-radius:4px}
    .yorum-red{background:#fef2f2;border-left:4px solid #ef4444;padding:10px 14px;margin:10px 0;border-radius:4px}
    .yorum-blue{background:#eff6ff;border-left:4px solid #3b82f6;padding:10px 14px;margin:10px 0;border-radius:4px}
    .yorum-amber{background:#fef3c7;border-left:4px solid #eab308;padding:10px 14px;margin:10px 0;border-radius:4px}
  </style></head><body>`+el.innerHTML+'</body></html>';
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`KC_MRI_Rapor_${new Date().toISOString().slice(0,10)}.html`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// Init
render();
</script>
</body>
</html>
