@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f0f14;--bg2:#16161e;--bg3:#1c1c28;--bg4:#24243a;
--purple:#8b5cf6;--purple2:#a78bfa;--purple3:#6d28d9;--purple-glow:rgba(139,92,246,.15);
--text:#e2e2ee;--text2:#9999b0;--text3:#6666a0;
--border:#2a2a40;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--cyan:#06b6d4;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-wrap{max-width:900px;margin:0 auto;padding:20px}
.header{text-align:center;padding:28px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
.header h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--purple2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.header p{color:var(--text2);font-size:.82rem;margin-top:4px}
/* Progress */
.progress-bar{display:flex;gap:3px;margin-bottom:24px;padding:0 4px}
.progress-seg{height:4px;flex:1;border-radius:2px;background:var(--bg4);transition:background .3s}
.progress-seg.done{background:var(--purple)}
.progress-seg.active{background:var(--purple2);box-shadow:0 0 8px var(--purple-glow)}
/* Step Card */
.step-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px 32px;min-height:320px;position:relative}
.step-title{font-size:1.1rem;font-weight:600;color:var(--purple2);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.step-title .num{background:var(--purple3);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700}
.step-desc{color:var(--text2);font-size:.82rem;margin-bottom:20px}
/* Form Elements */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.82rem;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-group input[type=text],.form-group input[type=number],.form-group select,.form-group textarea{
width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.88rem;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--purple)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
/* Radio/Check */
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.opt-btn{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.85rem;color:var(--text2);transition:all .2s;text-align:center;user-select:none}
.opt-btn:hover{border-color:var(--purple);color:var(--text)}
.opt-btn.sel{background:var(--purple-glow);border-color:var(--purple);color:var(--purple2);font-weight:600}
/* Checkbox row */
.chk-grid{display:flex;flex-wrap:wrap;gap:8px}
.chk-btn{padding:8px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:.82rem;color:var(--text2);transition:all .2s}
.chk-btn.sel{background:var(--purple-glow);border-color:var(--purple);color:var(--purple2)}
/* Buttons */
.btn-row{display:flex;justify-content:space-between;margin-top:24px}
.btn{padding:10px 28px;border:none;border-radius:8px;font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-prev{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-prev:hover{border-color:var(--purple);color:var(--text)}
.btn-next{background:linear-gradient(135deg,var(--purple3),var(--purple));color:#fff}
.btn-next:hover{opacity:.9;transform:translateY(-1px)}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none}
/* Conditional section */
.cond-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-top:12px}
.cond-box .cond-title{font-size:.85rem;font-weight:600;color:var(--amber);margin-bottom:10px}
/* Report */
.report-wrap{background:#fff;color:#111;border-radius:12px;padding:32px;font-size:.88rem;line-height:1.7}
.report-wrap h2{font-size:1.15rem;color:#111;border-bottom:2px solid var(--purple);padding-bottom:6px;margin:20px 0 12px}
.report-wrap h3{font-size:.95rem;color:var(--purple3);margin:14px 0 8px}
.report-table{width:100%;border-collapse:collapse;margin:10px 0 18px}
.report-table th{background:#f0ecfb;color:var(--purple3);text-align:left;padding:8px 10px;font-weight:600;font-size:.8rem;border:1px solid #e0d8f0}
.report-table td{padding:7px 10px;border:1px solid #e8e8f0;font-size:.82rem}
.report-table tr:nth-child(even) td{background:#faf9ff}
.report-table tr:nth-child(odd) td{background:#fff}
.yorum-box{background:#f6f3ff;border-left:4px solid var(--purple);padding:14px 18px;border-radius:0 8px 8px 0;margin:12px 0}
.yorum-box .yorum-title{font-weight:700;color:var(--purple3);font-size:.85rem;margin-bottom:6px}
.yorum-box p{font-size:.82rem;color:#333;margin:3px 0}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.72rem;font-weight:700;margin-left:6px}
.badge-normal{background:#dcfce7;color:#166534}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
/* Export Buttons */
.export-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.export-btn{padding:10px 22px;border:none;border-radius:8px;font-family:inherit;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s}
.export-print{background:var(--purple);color:#fff}
.export-copy{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.export-html{background:var(--green);color:#fff}
/* Print */
@media print{
body{background:#fff !important}
.app-wrap{max-width:100%}
.header,.progress-bar,.btn-row,.export-row,.step-card{display:none !important}
.report-wrap{display:block !important;box-shadow:none;padding:20px}
}
/* Patoloji tablosu */
.pat-table{width:100%;border-collapse:collapse;font-size:.72rem;margin:10px 0}
.pat-table th{background:var(--purple3);color:#fff;padding:6px 8px;text-align:center;font-size:.68rem;border:1px solid #5530a0}
.pat-table td{padding:5px 7px;border:1px solid #e0d8f0;text-align:center;font-size:.7rem}
.pat-table tr:nth-child(even) td{background:#faf9ff}
.pat-table td:first-child{text-align:left;font-weight:600;min-width:120px}
/* Scroll helper */
.scroll-x{overflow-x:auto}
/* Alert */
.alert-info{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.25);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:.8rem;color:var(--cyan)}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>

  renalR_cap:"",renalR_darlik:"yok",renalR_mesafe:"",renalR_darlikCap:"",renalR_darlikMm:"",renalR_trombus:"yok",
  renalL_cap:"",renalL_darlik:"yok",renalL_mesafe:"",renalL_darlikCap:"",renalL_darlikMm:"",renalL_trombus:"yok",
  iliakR_cap:"",iliakR_darlik:"yok",iliakR_mesafe:"",iliakR_darlikCap:"",iliakR_darlikMm:"",iliakR_trombus:"yok",
  iliakL_cap:"",iliakL_darlik:"yok",iliakL_mesafe:"",iliakL_darlikCap:"",iliakL_darlikMm:"",iliakL_trombus:"yok",
 });

 const set=(k,v)=>setData(p=>({...p,[k]:v}));

 /* Determine effective steps (skip ektazi if not needed) */
 const effectiveSteps=useMemo(()=>{
  if(step<=2) return STEPS; // haven't passed kalibrasyon yet
  return hasEktazi(data)?STEPS:STEPS.filter(s=>s.id!=="ektazi");
 },[data,step]);

 const curStep=effectiveSteps[step];
 const totalSteps=effectiveSteps.length;

 const goNext=()=>{
  if(step<totalSteps-1){
   let next=step+1;
   // skip ektazi if no ektazi
   if(effectiveSteps[next]?.id==="ektazi" && !hasEktazi(data)) next++;
   setStep(Math.min(next,totalSteps-1));
  }
 };
 const goPrev=()=>{
  if(step>0){
   let prev=step-1;
   if(effectiveSteps[prev]?.id==="ektazi" && !hasEktazi(data)) prev--;
   setStep(Math.max(prev,0));
  }
 };

 /* ─── Stenosis % calc ─── */
 const stenosisPct=(cap,darlikCap)=>{
  const c=parseFloat(cap),d=parseFloat(darlikCap);
  if(!c||!d||c<=0)return null;
  return Math.round(((c-d)/c)*100);
 };

 /* ─── YORUM Generator ─── */
 const generateYorum=()=>{
  const findings=[];
  // Position
  if(data.konum!=="normal"){
   const konumLabel=data.konum==="right"?T.labelRightSide:data.konum==="duplicate"?T.labelDuplicate:data.konum==="tortuous"?T.labelTortuous:data.konum;
   findings.push(`${T.yorumAortPosition}: ${konumLabel} - ${T.yorumAnatomicVariant}`);
  }
  // Ektazi/Aneurysm
  const caps=[
   {n:T.yorumCeliacSection,v:data.capCeliac},
   {n:T.yorumInfrarenalSection,v:data.capInfrarenal},
   {n:T.yorumPreBifurk,v:data.capBifurk}
  ];
  caps.forEach(c=>{const mm=parseFloat(c.v);if(mm>30){
   findings.push(mm>=50?`${c.n}: ${mm} mm - ${T.yorumAneurysmLevel}`:`${c.n}: ${mm} mm - ${T.yorumEctatic}`);
  }});
  // Thrombus
  if(data.trombusVar==="var") findings.push(`${T.yorumTrombusFound} (${data.tromUzunluk||"?"} ${T.yorumTrombusLength}, ${data.tromKalinlik||"?"} ${T.yorumTrombusThickness}). ${T.yorumTrombusClinical}`);
  // Wall
  if(data.duvar.includes("calcified")){
   const d=data.duvarDetay["calcified"]||{};
   let txt=T.yorumCalcification;
   if(d.segment) txt+=` (${d.segment})`;
   if(d.uzunluk) txt+=`, ${d.uzunluk} ${T.yorumCalcLength}`;
   if(d.kalinlik) txt+=`, ${T.yorumCalcWall} ${d.kalinlik} mm`;
   txt+=` - ${T.yorumCalcAtero}`;
   if(d.ek) txt+=` ${d.ek}.`;
   findings.push(txt);
  }
  if(data.duvar.includes("ulcerated")){
   const d=data.duvarDetay["ulcerated"]||{};
   let txt=T.yorumUlcer;
   if(d.segment) txt+=` (${d.segment})`;
   if(d.uzunluk) txt+=`, ${T.detailDiameter}: ${d.uzunluk} mm`;
   if(d.derinlik) txt+=`, ${T.detailDepth}: ${d.derinlik} mm`;
   if(d.kalinlik) txt+=`, ${d.kalinlik}`;
   txt+=` - ${T.yorumUlcerNote}`;
   if(d.ek) txt+=` ${d.ek}.`;
   findings.push(txt);
  }
  if(data.duvar.includes("irregular")){
   const d=data.duvarDetay["irregular"]||{};
   let txt=T.yorumIrregular;
   if(d.segment) txt+=` (${d.segment})`;
   if(d.uzunluk) txt+=`, ${d.uzunluk} ${T.yorumIrregularLength}`;
   if(d.kalinlik) txt+=`, ${T.yorumCalcWall} ${d.kalinlik} mm`;
   txt+=` - ${T.yorumIrregularNote}`;
   if(d.ek) txt+=` ${d.ek}.`;
   findings.push(txt);
  }
  // Flap
  if(data.flepVar==="var") findings.push(T.yorumFlepFound);
  // Leak
  if(data.leakVar==="var") findings.push(`${T.yorumLeakFound} (${data.leakMiktar||T.yorumLeakUnspecified}). ${T.yorumLeakNote}`);
  // Arteries
  Object.keys(ARTERY_NAMES).forEach(prefix=>{
   if(data[prefix+"_darlik"]==="var"){
    const pct=stenosisPct(data[prefix+"_cap"],data[prefix+"_darlikCap"]);
    const label=ARTERY_NAMES[prefix];
    findings.push(`${label}: ${T.yorumStenosisFound}${pct!==null?` (${T.yorumStenosisApprox} %${pct} ${T.yorumStenosisStenoz})`:""}.`);
   }
   if(data[prefix+"_trombus"]==="var") findings.push(`${ARTERY_NAMES[prefix]} ${T.yorumTrombusInArtery}`);
  });
  if(findings.length===0) findings.push(T.yorumNoPathology);
  return findings;
 };

 /* ─── Differential suggestion ─── */
 const suggestDifferential=()=>{
  const matches=[];
  if(data.duvar.includes("calcified")||data.duvar.includes("ulcerated")||Object.keys(ARTERY_NAMES).some(p=>data[p+"_darlik"]==="var"))
   matches.push(T.pathAtero);
  if(data.trombusVar==="var"||Object.keys(ARTERY_NAMES).some(p=>data[p+"_trombus"]==="var"))
   matches.push(T.pathTromboz,T.pathEmboli);
  if(data.flepVar==="var") matches.push(T.pathDiseksiyon);
  if(hasEktazi(data)){
   const maxCap=Math.max(parseFloat(data.capCeliac)||0,parseFloat(data.capInfrarenal)||0,parseFloat(data.capBifurk)||0);
   matches.push(maxCap>=50?T.pathAnevrizma:`${T.pathAnevrizma} (${T.badgeEktazi})`);
  }
  if(data.leakVar==="var") matches.push(T.pathPseudo);
  if(data.duvar.includes("irregular")&&data.duvar.includes("calcified")) matches.push(T.pathVaskulit);
  return [...new Set(matches)];
 };

 /* ─── Export Handlers ─── */
 const handlePrint=()=>window.print();
 const handleCopy=()=>{
  const el=document.getElementById("report-content");
  if(!el)return;
  const range=document.createRange();
  range.selectNodeContents(el);
  const sel=window.getSelection();
  sel.removeAllRanges();sel.addRange(range);
  document.execCommand("copy");
  sel.removeAllRanges();
  alert(T.copySuccess);
 };
 const handleHTML=()=>{
  const html=buildReportHTML();
  const full=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Aort MRI Raporu</title></head><body>${html}</body></html>`;
  const blob=new Blob([full],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="aort_mri_raporu.html";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
 };

       <div className="form-row">
        <div className="form-group"><label>{T.labelFlepStart}</label>
         <div className="opt-grid">{[["above",T.labelAbove],["below",T.labelBelow]].map(([v,l])=><div key={v} className={"opt-btn"+(data.flepBasRel===v?" sel":"")} onClick={()=>set("flepBasRel",v)}>{l}</div>)}</div>
        </div>
        <div className="form-group"><label>{T.labelDistance}</label><input type="number" value={data.flepBasMm} onChange={e=>set("flepBasMm",e.target.value)} placeholder="mm"/></div>
       </div>
       <div className="form-row">
        <div className="form-group"><label>{T.labelFlepEnd}</label>
         <div className="opt-grid">{[["above",T.labelAbove],["below",T.labelBelow]].map(([v,l])=><div key={v} className={"opt-btn"+(data.flepBitRel===v?" sel":"")} onClick={()=>set("flepBitRel",v)}>{l}</div>)}</div>
        </div>
        <div className="form-group"><label>{T.labelDistance}</label><input type="number" value={data.flepBitMm} onChange={e=>set("flepBitMm",e.target.value)} placeholder="mm"/></div>
       </div>
      </div>
     )}
    </>
   );
   case "leak": return(
    <>
     <div className="step-desc">{T.descLeak}</div>
     <div className="form-group"><label>{T.labelLeakPresent}</label>
      <div className="opt-grid">{["yok","var"].map(v=><div key={v} className={"opt-btn"+(data.leakVar===v?" sel":"")} onClick={()=>set("leakVar",v)}>{v==="yok"?T.labelNo:T.labelYes}</div>)}</div>
     </div>
     {data.leakVar==="var"&&(
      <div className="cond-box">
       <div className="cond-title">{T.labelLeakDetails}</div>
       <div className="form-group"><label>{T.labelLeakAmount}</label>
        <input type="text" value={data.leakMiktar} onChange={e=>set("leakMiktar",e.target.value)} placeholder={T.labelLeakPlaceholder}/>
       </div>
      </div>
     )}
    </>
   );
   case "celiac": return renderArtery("celiac",T.artCeliac);
   case "sma": return renderArtery("sma",T.artSma);
   case "renalR": return renderArtery("renalR",T.artRenalR);
   case "renalL": return renderArtery("renalL",T.artRenalL);
   case "iliakR": return renderArtery("iliakR",T.artIliakR);
   case "iliakL": return renderArtery("iliakL",T.artIliakL);
   case "report": {
    const yorumlar=generateYorum();
    const diffs=suggestDifferential();
    const matchedPat=PATHOLOGIES.filter(p=>diffs.some(d=>d.includes(p.name.split(" ")[0])));
    const wallLabel=(key)=>{
     if(key==="regular") return T.labelWallRegular;
     if(key==="calcified") return T.labelWallCalcified;
     if(key==="ulcerated") return T.labelWallUlcerated;
     if(key==="irregular") return T.labelWallIrregular;
     return key;
    };
    const konumDisplay=data.konum==="normal"?T.labelNormalPosition:data.konum==="right"?T.labelRightSide:data.konum==="duplicate"?T.labelDuplicate:data.konum==="tortuous"?T.labelTortuous:data.konum;
    return(
     <>
      <div className="export-row" style={{marginBottom:16}}>
       <button className="export-btn export-print" onClick={handlePrint}>{T.btnPrint}</button>
       <button className="export-btn export-copy" onClick={handleCopy}>{T.btnCopy}</button>
       <button className="export-btn export-html" onClick={handleHTML}>{T.btnDownloadHTML}</button>
      </div>
      <div className="report-wrap" id="report-content">
       <h2>{T.reportTitle}</h2>
       <table className="report-table">
        <tbody>
         <tr><td style={{fontWeight:600,width:150}}>{T.reportHTMLPatientName}</td><td>{data.patientName||"-"}</td><td style={{fontWeight:600,width:100}}>{T.reportHTMLAge}</td><td>{data.patientAge||"-"}</td></tr>
         <tr><td style={{fontWeight:600}}>{T.reportHTMLGender}</td><td>{data.patientGender==="male"?T.labelMale:data.patientGender==="female"?T.labelFemale:data.patientGender||"-"}</td><td style={{fontWeight:600}}>{T.reportHTMLProtocol}</td><td>{data.patientProtocol||"-"}</td></tr>
        </tbody>
       </table>
       <h3>{T.reportAortGeneral}</h3>
       <table className="report-table">
        <thead><tr><th>{T.reportParamHeader}</th><th>{T.reportValueHeader}</th></tr></thead>
        <tbody>
         <tr><td style={{fontWeight:600}}>{T.reportKonum}</td><td>{konumDisplay}</td></tr>
         <tr><td style={{fontWeight:600}}>{T.reportCeliacDiam}</td><td>{data.capCeliac?data.capCeliac+" mm":"-"}{parseFloat(data.capCeliac)>30&&<span className="badge badge-warning">{T.badgeEktazi}</span>}{parseFloat(data.capCeliac)>=50&&<span className="badge badge-danger">{T.badgeAnevrizma}</span>}</td></tr>
         <tr><td style={{fontWeight:600}}>{T.reportInfrarenalDiam}</td><td>{data.capInfrarenal?data.capInfrarenal+" mm":"-"}{parseFloat(data.capInfrarenal)>30&&<span className="badge badge-warning">{T.badgeEktazi}</span>}{parseFloat(data.capInfrarenal)>=50&&<span className="badge badge-danger">{T.badgeAnevrizma}</span>}</td></tr>
         <tr><td style={{fontWeight:600}}>{T.reportBifurkDiam}</td><td>{data.capBifurk?data.capBifurk+" mm":"-"}{parseFloat(data.capBifurk)>30&&<span className="badge badge-warning">{T.badgeEktazi}</span>}{parseFloat(data.capBifurk)>=50&&<span className="badge badge-danger">{T.badgeAnevrizma}</span>}</td></tr>
         <tr><td style={{fontWeight:600}}>{T.reportWall}</td><td>{data.duvar.length>0?data.duvar.map(wallLabel).join(", "):T.reportWallUnspecified}</td></tr>
         {data.duvar.filter(d=>d!=="regular").map(d=>{
          const det=data.duvarDetay[d]||{};
          const parts=[];
          if(det.segment) parts.push(`${T.detailSegment}: ${det.segment}`);
          if(d==="calcified"){
           if(det.uzunluk) parts.push(`${T.detailLength}: ${det.uzunluk} mm`);
           if(det.kalinlik) parts.push(`${T.detailWallThick}: ${det.kalinlik} mm`);
          } else if(d==="ulcerated"){
           if(det.uzunluk) parts.push(`${T.detailDiameter}: ${det.uzunluk} mm`);
           if(det.derinlik) parts.push(`${T.detailDepth}: ${det.derinlik} mm`);
           if(det.kalinlik) parts.push(`${T.detailCount}: ${det.kalinlik}`);
          } else if(d==="irregular"){
           if(det.uzunluk) parts.push(`${T.detailLength}: ${det.uzunluk} mm`);
           if(det.kalinlik) parts.push(`${T.detailWallThick}: ${det.kalinlik} mm`);
          }
          if(det.ek) parts.push(det.ek);
          return parts.length>0?<tr key={d}><td style={{fontWeight:600,paddingLeft:24,fontSize:".78rem",color:"#666"}}>↳ {wallLabel(d)}</td><td style={{fontSize:".82rem"}}>{parts.join(" • ")}</td></tr>:null;
         })}
         <tr><td style={{fontWeight:600}}>{T.reportTrombus}</td><td>{data.trombusVar==="var"?`${T.reportHTMLPresent} (${T.reportHTMLTrombusDetail} ${data.tromSaatFrom||"?"}-${data.tromSaatTo||"?"}, ${data.tromUzunluk||"?"} ${T.reportHTMLLengthUnit}, ${data.tromKalinlik||"?"} ${T.reportHTMLThicknessUnit})`:T.reportHTMLAbsent}</td></tr>
         <tr><td style={{fontWeight:600}}>{T.reportFlep}</td><td>{data.flepVar==="var"?T.reportHTMLPresent:T.reportHTMLAbsent}</td></tr>
         <tr><td style={{fontWeight:600}}>{T.reportLeak}</td><td>{data.leakVar==="var"?`${T.reportHTMLPresent} (${data.leakMiktar||T.reportHTMLAmountUnspecified})`:T.reportHTMLAbsent}</td></tr>
        </tbody>
       </table>
       {hasEktazi(data)&&<>
        <h3>{T.reportEktaziDetails}</h3>
        <p style={{fontSize:".85rem"}}>{T.reportEktaziStart} {data.ektBasMm||"?"} mm {data.ektBasRel==="above"?T.reportAbove:T.reportBelow}<br/>
        {T.reportEktaziEnd} {data.ektBitMm||"?"} mm {data.ektBitRel==="above"?T.reportAbove:T.reportBelow}<br/>
        {T.reportEktaziDegree}: {data.ektDerece||"?"}&deg;</p>
       </>}
       {data.flepVar==="var"&&<>
        <h3>{T.reportFlepDetails}</h3>
        <p style={{fontSize:".85rem"}}>{T.reportEktaziStart} {data.flepBasMm||"?"} mm {data.flepBasRel==="above"?T.reportAbove:T.reportBelow}<br/>
        {T.reportEktaziEnd} {data.flepBitMm||"?"} mm {data.flepBitRel==="above"?T.reportAbove:T.reportBelow}</p>
       </>}
       <h3>{T.reportBranchArteries}</h3>
       <div className="scroll-x">
        <table className="report-table">
         <thead><tr><th>{T.reportArtery}</th><th style={{textAlign:"center"}}>{T.reportDiameter}</th><th style={{textAlign:"center"}}>{T.reportStenosis}</th><th style={{textAlign:"center"}}>{T.reportStenosisPct}</th><th style={{textAlign:"center"}}>{T.reportTrombusCol}</th></tr></thead>
         <tbody>
          {Object.keys(ARTERY_NAMES).map(p=>{
           const pct=stenosisPct(data[p+"_cap"],data[p+"_darlikCap"]);
           return <tr key={p}>
            <td style={{fontWeight:600}}>{ARTERY_NAMES[p]}</td>
            <td style={{textAlign:"center"}}>{data[p+"_cap"]?data[p+"_cap"]+" mm":"-"}</td>
            <td style={{textAlign:"center"}}>{data[p+"_darlik"]==="var"?<><span style={{color:"#dc2626"}}>{T.reportHTMLPresent}</span>{data[p+"_mesafe"]&&<span style={{fontSize:".75rem",color:"#666"}}> ({data[p+"_mesafe"]} mm)</span>}</>:T.reportHTMLAbsent}</td>
            <td style={{textAlign:"center"}}>{pct!==null?<span style={{color:pct>70?"#dc2626":pct>50?"#d97706":"#16a34a",fontWeight:600}}>%{pct}</span>:"-"}</td>
            <td style={{textAlign:"center"}}>{data[p+"_trombus"]==="var"?<span style={{color:"#dc2626"}}>{T.reportHTMLPresent}</span>:T.reportHTMLAbsent}</td>
           </tr>;
          })}
         </tbody>
        </table>
       </div>
       <div className="yorum-box">
        <div className="yorum-title">{T.reportImpression}</div>
        {yorumlar.map((y,i)=><p key={i}>• {y}</p>)}
       </div>

      </div>
     </>
    );
   }
   default: return null;
  }
 };

 return(
  <div className="app-wrap">
   <div className="header">
    <h1 data-i18n-tr="Aort MRI Karar Destek Sistemi" data-i18n-en="Aorta MRI Decision Support System">{T.appTitle}</h1>
    <p style={{color:"var(--text3)",fontSize:".78rem",marginTop:4}} data-i18n-tr="Radyoloji Karar Destek" data-i18n-en="Radiology Decision Support">{T.appSubtitle}</p>
   </div>
   <div className="progress-bar">
    {effectiveSteps.map((s,i)=><div key={s.id} className={"progress-seg"+(i<step?" done":"")+(i===step?" active":"")}/>)}
   </div>
   <div className="step-card">
    {curStep&&curStep.id!=="report"&&(
     <div className="step-title">
      <span className="num">{step+1}</span>
      {curStep.title}
     </div>
    )}
    {renderStep()}
    {curStep&&curStep.id!=="report"&&(
     <div className="btn-row">
      <button className="btn btn-prev" onClick={goPrev} disabled={step===0}>{T.btnBack}</button>
      <button className="btn btn-next" onClick={goNext}>{step===totalSteps-2?T.btnGenerateReport:T.btnNext}</button>
     </div>
    )}
    {curStep&&curStep.id==="report"&&(
     <div className="btn-row">
      <button className="btn btn-prev" onClick={goPrev}>{T.btnEdit}</button>
     </div>
    )}
   </div>
  </div>
 );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
