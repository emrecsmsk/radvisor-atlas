<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uyluk MRI — Kas-İskelet ve Nörovasküler Karar Destek Sistemi</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0e17;
    --bg-2:#16151f;
    --bg-3:#1d1c28;
    --bg-4:#252432;
    --border:#2f2e3e;
    --border-2:#3b394d;
    --text:#e6e4f0;
    --text-dim:#a8a5bd;
    --text-muted:#716f86;
    --accent:#dc2626;
    --accent-2:#f59e0b;
    --accent-3:#10b981;
    --accent-soft:rgba(220,38,38,0.14);
    --accent-softer:rgba(220,38,38,0.08);
    --warn:#f97316;
    --danger:#ef4444;
    --ok:#22c55e;
    --shadow:0 20px 50px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',system-ui,sans-serif;min-height:100vh}
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(220,38,38,0.12), transparent 60%),
      radial-gradient(900px 500px at 90% 10%, rgba(245,158,11,0.08), transparent 60%),
      radial-gradient(1000px 700px at 50% 120%, rgba(16,185,129,0.06), transparent 60%),
      var(--bg);
  }
  .app{max-width:1180px;margin:0 auto;padding:28px 20px 80px}
  header.brand,.header{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--border);background:linear-gradient(180deg,var(--bg-2),var(--bg-3));border-radius:16px;box-shadow:var(--shadow);margin-bottom:14px}
  .header .brand{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
  .brand-text h1{margin:0;font-size:18px;font-weight:600;letter-spacing:-0.4px;color:var(--text)}
  .brand-text .sub{font-size:11.5px;color:var(--text-dim);margin-top:3px;letter-spacing:0.2px}
  .header-meta{display:flex;gap:8px;flex-wrap:wrap}
  .meta-chip{background:var(--bg-4);border:1px solid var(--border);border-radius:10px;padding:6px 12px;font-size:11.5px;color:var(--text-dim);font-weight:500;white-space:nowrap}
  .meta-chip span{color:var(--text-dim2);margin-right:4px;text-transform:uppercase;font-size:10.5px;letter-spacing:0.5px}
  .meta-chip b{color:var(--accent);font-weight:700;font-size:13px}
  .step-body{min-height:120px}
  .step-title-wrap{flex:1}
  .nav-mid{flex:1;display:flex;justify-content:center;align-items:center}
  .nav-warn{color:#fbbf24;font-size:12.5px;font-weight:500;text-align:center;padding:6px 14px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:8px}
  .print-actions{position:sticky;top:10px;z-index:10;display:flex;gap:10px;margin-bottom:14px;width:100%;max-width:210mm;padding:10px;background:rgba(15,14,23,0.95);border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(8px)}
  .print-sheet{background:#fff;color:#111;width:100%;max-width:210mm;min-height:280mm;padding:20mm;box-shadow:0 10px 40px rgba(0,0,0,0.5);border-radius:6px;font-family:'IBM Plex Sans',system-ui,sans-serif}
  @media print{.no-print{display:none!important}}
  .logo{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#dc2626 0%,#f59e0b 65%,#10b981 100%);display:grid;place-items:center;font-weight:700;color:#0f0e17;font-size:22px;letter-spacing:-1px;box-shadow:0 6px 18px rgba(220,38,38,0.35)}
  .titles h1{margin:0;font-size:18px;font-weight:600;letter-spacing:-0.2px}
  .titles p{margin:2px 0 0;font-size:12px;color:var(--text-dim)}
  .progress-wrap{margin:18px 0 8px}
  .progress-bar{height:6px;background:var(--bg-3);border-radius:100px;overflow:hidden;border:1px solid var(--border)}
  .progress-fill{height:100%;background:linear-gradient(90deg,#dc2626,#f59e0b,#10b981);border-radius:100px;transition:width .35s cubic-bezier(.4,0,.2,1)}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:6px;font-family:'JetBrains Mono',monospace}

  .card{background:linear-gradient(180deg,var(--bg-2),var(--bg-3));border:1px solid var(--border);border-radius:18px;padding:26px 28px;margin-top:18px;animation:fadeIn .35s ease-out;box-shadow:var(--shadow)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .step-h{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .step-num{width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent-2);display:grid;place-items:center;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:13px;border:1px solid rgba(245,158,11,0.25)}
  .step-title{font-size:19px;font-weight:600;letter-spacing:-0.2px}
  .step-sub{font-size:13px;color:var(--text-dim);margin-top:2px}

  label.field{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;letter-spacing:0.3px;text-transform:uppercase;font-weight:500}
  .row{display:grid;gap:14px;margin-bottom:14px}
  .row.r2{grid-template-columns:1fr 1fr}
  .row.r3{grid-template-columns:1fr 1fr 1fr}
  .row.r4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:720px){.row.r2,.row.r3,.row.r4{grid-template-columns:1fr}}

  input[type=text],input[type=number],select,textarea{
    width:100%;background:var(--bg-4);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:inherit;font-size:14px;transition:all .15s
  }
  input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(220,38,38,0.15)}
  textarea{resize:vertical;min-height:72px}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--bg-4);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:100px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;user-select:none}
  .chip:hover{border-color:var(--border-2);background:var(--bg-3)}
  .chip.selected{background:var(--accent-soft);border-color:var(--accent);color:#fecaca}
  .chip.warn.selected{background:rgba(249,115,22,0.14);border-color:var(--warn);color:#fed7aa}
  .chip.ok.selected{background:rgba(34,197,94,0.14);border-color:var(--ok);color:#bbf7d0}

  .check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-top:6px}
  .check-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:var(--bg-4);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;user-select:none;font-size:13px;line-height:1.4}
  .check-item:hover{border-color:var(--border-2)}
  .check-item.on{background:var(--accent-softer);border-color:var(--accent);color:#fecaca}
  .check-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border-2);flex-shrink:0;margin-top:1px;position:relative;transition:all .15s}
  .check-item.on .check-box{background:var(--accent);border-color:var(--accent)}
  .check-item.on .check-box::after{content:'✓';position:absolute;top:-3px;left:2px;color:#fff;font-size:12px;font-weight:700}

  .seg-wrap{display:grid;grid-template-columns:150px 1fr;gap:10px;align-items:center;padding:9px 0;border-bottom:1px dashed var(--border)}
  .seg-wrap:last-child{border-bottom:none}
  .seg-name{font-size:13px;font-weight:500;color:var(--text)}
  .seg-opts{display:flex;gap:6px;flex-wrap:wrap}
  .seg-opt{padding:6px 12px;border-radius:8px;background:var(--bg-4);border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all .15s;user-select:none}
  .seg-opt:hover{border-color:var(--border-2)}
  .seg-opt.on{background:var(--accent-soft);border-color:var(--accent);color:#fecaca}
  .seg-opt.on.warn{background:rgba(249,115,22,0.14);border-color:var(--warn);color:#fed7aa}

  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
  button.btn{background:var(--bg-4);border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
  button.btn:hover{border-color:var(--border-2);background:var(--bg-3)}
  button.btn.primary{background:linear-gradient(135deg,#dc2626,#f59e0b);border-color:transparent;color:#fff;font-weight:600}
  button.btn.primary:hover{filter:brightness(1.1)}
  button.btn.ghost{background:transparent}
  button.btn.danger{background:rgba(239,68,68,0.1);border-color:var(--danger);color:#fca5a5}
  button.btn.danger:hover{background:rgba(239,68,68,0.18)}
  button.btn.ok{background:rgba(34,197,94,0.1);border-color:var(--ok);color:#86efac}
  button.btn:disabled{opacity:0.4;cursor:not-allowed}

  .lesion-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .lesion-tab{padding:8px 14px;background:var(--bg-4);border:1px solid var(--border);border-radius:100px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;display:inline-flex;align-items:center;gap:6px}
  .lesion-tab.active{background:var(--accent-soft);border-color:var(--accent);color:#fecaca}
  .lesion-tab.done{background:rgba(34,197,94,0.1);border-color:var(--ok);color:#86efac}
  .lesion-del{background:transparent;border:none;color:inherit;cursor:pointer;padding:0 0 0 4px;font-size:14px;opacity:0.7}
  .lesion-del:hover{opacity:1}

  /* Report styles */
  .report-sheet{background:#fff;color:#111;padding:42px 52px;border-radius:10px;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;line-height:1.55;box-shadow:0 30px 80px rgba(0,0,0,0.5)}
  .report-sheet h2{margin:0 0 4px;font-size:22px;color:#991b1b;letter-spacing:-0.3px}
  .report-sheet .sub{color:#666;font-size:12px;margin-bottom:18px}
  .report-sheet h3{font-size:14px;text-transform:uppercase;color:#991b1b;margin:22px 0 8px;letter-spacing:1px;border-bottom:2px solid #991b1b;padding-bottom:4px}
  .report-sheet h4{font-size:13px;margin:14px 0 6px;color:#333}
  .report-sheet table{width:100%;border-collapse:collapse;margin:6px 0 12px;font-size:12.5px}
  .report-sheet table td{padding:7px 10px;vertical-align:top;border-bottom:1px solid #eee}
  .report-sheet table tr:nth-child(even) td{background:#fafafa}
  .report-sheet table td:first-child{font-weight:600;color:#555;width:34%}
  .report-sheet .yorum{background:#f0fdf4;border-left:4px solid #10b981;padding:12px 16px;margin:14px 0;border-radius:4px;color:#064e3b}
  .report-sheet .yorum-title{font-weight:700;color:#065f46;margin-bottom:6px;font-size:12px;text-transform:uppercase;letter-spacing:0.8px}
  .report-sheet .ek-bulgu{display:inline-block;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px 4px 2px 0;font-weight:500}
  .report-sheet .malign-flag{background:#fef2f2;border-left:4px solid #dc2626;padding:12px 16px;margin:14px 0;border-radius:4px;color:#7f1d1d}
  .report-sheet .malign-title{font-weight:700;color:#991b1b;margin-bottom:6px;font-size:12px;text-transform:uppercase;letter-spacing:0.8px}
  .report-sheet .diff-table td:first-child{width:auto}
  .report-sheet .diff-pct{font-weight:700;color:#991b1b;text-align:right}
  .report-sheet .lesion-block{border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin:10px 0;background:#fafafa}
  .report-sheet .lesion-title{font-weight:700;color:#991b1b;margin-bottom:8px;font-size:13px}
  .report-sheet .footer{margin-top:32px;padding-top:14px;border-top:1px solid #ddd;font-size:11px;color:#888;display:flex;justify-content:space-between}

  .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:0.4px}
  .badge.red{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
  .badge.orange{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
  .badge.green{background:#f0fdf4;color:#065f46;border:1px solid #bbf7d0}
  .badge.blue{background:#eff6ff;color:#1e3a8a;border:1px solid #bfdbfe}
  .badge.gray{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}

  .diff-list{margin:14px 0}
  .diff-item{display:grid;grid-template-columns:1fr 80px;gap:12px;align-items:center;padding:10px 14px;background:var(--bg-4);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px}
  .diff-item.top{background:linear-gradient(135deg,rgba(220,38,38,0.15),rgba(245,158,11,0.08));border-color:var(--accent)}
  .diff-bar{background:var(--bg-3);height:6px;border-radius:100px;overflow:hidden;margin-top:4px}
  .diff-bar-fill{height:100%;background:linear-gradient(90deg,#dc2626,#f59e0b);border-radius:100px}
  .diff-name{font-weight:500}
  .diff-detail{font-size:11px;color:var(--text-muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
  .diff-score{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent-2);text-align:right;font-size:15px}

  .alert-info{background:rgba(16,185,129,0.08);border-left:3px solid var(--accent-3);padding:10px 14px;border-radius:6px;font-size:12.5px;color:#bbf7d0;margin:10px 0}
  .alert-warn{background:rgba(249,115,22,0.08);border-left:3px solid var(--warn);padding:10px 14px;border-radius:6px;font-size:12.5px;color:#fed7aa;margin:10px 0}

  .export-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;justify-content:center}

  /* Print overlay */
  .print-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:grid;place-items:start center;overflow:auto;padding:20px}
  .print-overlay .actions{position:sticky;top:10px;z-index:10;display:flex;gap:10px;margin-bottom:14px}

  @media print{
    body *{visibility:hidden!important}
    .print-sheet,.print-sheet *{visibility:visible!important}
    .print-sheet{position:absolute!important;left:0;top:0;width:100%;background:#fff!important;padding:20mm!important;box-shadow:none!important;border-radius:0!important}
    .no-print{display:none!important}
  }
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>

  {id:'lez_loc',title:T.sl_lez_loc_title,sub:T.sl_lez_loc_sub},

/* ========================================================
   ANA UYGULAMA BİLEŞENİ
======================================================== */
function App(){
  const [stepIdx,setStepIdx] = useState(0);
  const [currentLesionIdx,setCurrentLesionIdx] = useState(-1);
  const [lesionSubStep,setLesionSubStep] = useState(0);

  /* Ana state */
  const [data,setData] = useState({
    // Klinik
    taraf:'',yas:'',cinsiyet:'',indikasyon:[],travmaOykusu:'',klinikNot:'',
    // Teknik
    cihaz:'',sekanslar:[],kontrastVerildi:'',
    // Cilt
    cilt:{durum:'normal',bulgu:[]},ciltNot:'',
    // Fascia
    fasciaLata:{durum:'normal',bulgu:[]},kompartmanSindromu:'',fasciaNot:'',
    // Femur korteks
    femurKorteks:{durum:'normal',bulgu:[]},periost:{durum:'normal',bulgu:[]},femurKorteksNot:'',
    // Femur medülla
    femurMedulla:{durum:'normal',bulgu:[]},kemikIligi:'',femurMedullaNot:'',
    // Kuadriseps
    rectusFemoris:'normal',vastusLat:'normal',vastusMed:'normal',vastusInt:'normal',
    anteriorBulgu:[],anteriorNot:'',
    // Adduktorlar
    adductorMag:'normal',adductorLong:'normal',adductorBrev:'normal',gracilis:'normal',pectineus:'normal',
    medialBulgu:[],medialNot:'',
    // Hamstring
    bicepsFem:'normal',semitend:'normal',semimem:'normal',
    posteriorBulgu:[],posteriorNot:'',
    // Tendon
    proximalTendon:'normal',distalTendon:'normal',tendonBulgu:[],tendonNot:'',
    // Vascular
    sfa:'normal',cfa:'normal',profundaFem:'normal',femoralVen:'normal',saphenVen:'normal',
    vascularBulgu:[],vascularNot:'',
    // Siyatik
    siyatikCap:'normal',siyatikSinyal:'normal',siyatikCevre:'normal',siyatikBulgu:[],siyatikNot:'',
    // Femoral / Obturator
    femoralSinir:'normal',obturatorSinir:'normal',femoralBulgu:[],femoralNot:'',
    // Lenf
    lenfNodBoyut:'',lenfNodSayisi:'',lenfNodSinyal:'',lenfBulgu:[],lenfNot:'',
    // Lezyonlar
    lezyonVarMi:'',lezyonlar:[],
    // Ek bulgular
    ekBulgular:''
  });

  const lesions = data.lezyonlar||[];
  const inLesionLoop = stepIdx === 15 && currentLesionIdx >= 0 && currentLesionIdx < lesions.length;
  const totalSteps = STEPS.length + (lesions.length>0 ? lesions.length * LESION_SUBSTEPS.length : 0);
  const computedStep = useMemo(()=>{
    if(inLesionLoop){
      return 15 + currentLesionIdx * LESION_SUBSTEPS.length + lesionSubStep;
    }
    if(stepIdx < 15) return stepIdx;
    return stepIdx + lesions.length * LESION_SUBSTEPS.length;
  },[stepIdx,currentLesionIdx,lesionSubStep,lesions.length,inLesionLoop]);
  const progress = ((computedStep+1) / (totalSteps+1)) * 100;

  const update = (k,v)=>setData(s=>({...s,[k]:v}));
  const updateNested = (parent,k,v)=>setData(s=>({...s,[parent]:{...s[parent],[k]:v}}));
  const toggleInList = (k,v)=>setData(s=>({...s,[k]:s[k].includes(v)?s[k].filter(x=>x!==v):[...s[k],v]}));
  const toggleInNestedList = (parent,k,v)=>setData(s=>({
    ...s,[parent]:{...s[parent],[k]:s[parent][k].includes(v)?s[parent][k].filter(x=>x!==v):[...s[parent][k],v]}
  }));

  /* Lezyon yönetimi */
  const addLesion = () => {
    const newLesion = {
      id:'L'+(lesions.length+1),
      komp:'',kas:'',boyut:{x:'',y:'',z:''},
      morfoloji:[],sinir:'',
      t1:[],t1Not:'',
      t2:[],stir:[],t2Not:'',
      dwi:'',adc:'',dwiNot:'',
      kontrast:[],dinamik:'',kontrastNot:'',
      invazyon:[],invazyonNot:'',
      tamamlandi:false
    };
    setData(s=>({...s,lezyonlar:[...s.lezyonlar,newLesion]}));
  };

  const updateLesion = (idx,key,val) => {
    setData(s=>({
      ...s,
      lezyonlar:s.lezyonlar.map((l,i)=>i===idx?{...l,[key]:val}:l)
    }));
  };
  const toggleLesionList = (idx,key,val) => {
    setData(s=>({
      ...s,
      lezyonlar:s.lezyonlar.map((l,i)=>{
        if(i!==idx) return l;
        const cur = l[key]||[];
        return {...l,[key]:cur.includes(val)?cur.filter(x=>x!==val):[...cur,val]};
      })
    }));
  };
  const removeLesion = (idx) => {
    setData(s=>({...s,lezyonlar:s.lezyonlar.filter((_,i)=>i!==idx)}));
    if(currentLesionIdx === idx) {setCurrentLesionIdx(-1); setLesionSubStep(0);}
  };

  const finalizeLesion = () => {
    if(currentLesionIdx < 0) return;
    const idx = currentLesionIdx;
    // Lezyonu tamamla ve güncel listeyi elde et
    const updatedLesions = lesions.map((l,i)=>i===idx?{...l,tamamlandi:true}:l);
    setData(s=>({...s,lezyonlar:updatedLesions}));
    // Sıradaki tamamlanmamış lezyonu bul
    const nextIncomplete = updatedLesions.findIndex((l,i)=>i!==idx && !l.tamamlandi);
    if(nextIncomplete >= 0){
      // Sıradaki lezyona otomatik geç
      setCurrentLesionIdx(nextIncomplete);
      setLesionSubStep(0);
    } else {
      // Tüm lezyonlar tamam — döngüden çık (stepIdx=15 'ek' ekranı görünsün)
      setCurrentLesionIdx(-1);
      setLesionSubStep(0);
    }
  };

  /* Navigasyon - 3-part loop fix pattern */
  const goNext = () => {
    if(inLesionLoop){
      // Lezyon döngüsü içinde
      if(lesionSubStep < LESION_SUBSTEPS.length - 1){
        setLesionSubStep(s=>s+1);
      } else {
        // Bu lezyon tamamlandı
        finalizeLesion();
      }
      window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    // Ana adım 15 (lezyon girişi) sonrası: eğer lezyon varsa döngüye gir
    if(stepIdx === 14 && lesions.length > 0){
      // Önce tamamlanmamış olan lezyonu bul
      const incomplete = lesions.findIndex(l=>!l.tamamlandi);
      if(incomplete >= 0){
        setStepIdx(15);
        setCurrentLesionIdx(incomplete);
        setLesionSubStep(0);
        window.scrollTo({top:0,behavior:'smooth'});
        return;
      }
      // Hepsi tamamsa ek bulgular adımına (stepIdx=15 'ek')
      setStepIdx(15);
      window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    // Ana adım 15 = 'Ek Bulgular' ekranı (currentLesionIdx=-1 iken)
    // Bu durumda her zaman rapor adımına geç — lezyonlar finalizeLesion ile otomatik ilerlemiş olmalı
    if(stepIdx === 15 && currentLesionIdx === -1){
      setStepIdx(16);
      window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    if(stepIdx < STEPS.length - 1){
      setStepIdx(s=>s+1);
    }
    window.scrollTo({top:0,behavior:'smooth'});
  };

  const goPrev = () => {
    if(inLesionLoop){
      if(lesionSubStep > 0){
        setLesionSubStep(s=>s-1);
      } else {
        // İlk alt adımdan; önceki lezyona ya da lezyon girişine dön
        if(currentLesionIdx > 0){
          // Önceki lezyonun son alt adımına
          setCurrentLesionIdx(currentLesionIdx-1);
          setLesionSubStep(LESION_SUBSTEPS.length-1);
        } else {
          // Lezyon giriş adımına dön
          setCurrentLesionIdx(-1);
          setLesionSubStep(0);
          setStepIdx(14);
        }
      }
      window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    // Lezyon sonrası (ek bulgu) adımından lezyon varsa sona dön
    if(stepIdx === 16 && lesions.length > 0){
      setStepIdx(15);
      setCurrentLesionIdx(lesions.length-1);
      setLesionSubStep(LESION_SUBSTEPS.length-1);
      window.scrollTo({top:0,behavior:'smooth'});
      return;
    }
    if(stepIdx > 0){
      setStepIdx(s=>s-1);
    }
    window.scrollTo({top:0,behavior:'smooth'});
  };

  /* Current step calc */
  let currentStepDef;
  if(inLesionLoop){
    currentStepDef = LESION_SUBSTEPS[lesionSubStep];
  } else {
    currentStepDef = STEPS[stepIdx];
  }


  /* ========================================================
     SCORING ENGINE — Ağırlıklı ayırıcı tanı motoru
     Lezyon + genel bulgular birleştirilir
  ======================================================== */
  const computeDifferential = () => {
    // Tüm bulgu setini topla
    const allFeatures = {
      komp:[],t1:[],t2:[],stir:[],dwi:[],kontrast:[],morfoloji:[],klinik:[],patognomik:[]
    };
    // Lezyonlardan topla
    lesions.forEach(l=>{
      if(!l.tamamlandi) return;
      if(l.komp) allFeatures.komp.push(l.komp);
      if(l.kas) allFeatures.komp.push(l.kas);
      allFeatures.morfoloji.push(...(l.morfoloji||[]));
      allFeatures.t1.push(...(l.t1||[]));
      allFeatures.t2.push(...(l.t2||[]));
      allFeatures.stir.push(...(l.stir||[]));
      if(l.dwi) allFeatures.dwi.push(l.dwi);
      allFeatures.kontrast.push(...(l.kontrast||[]));
      allFeatures.morfoloji.push(...(l.invazyon||[]));
    });
    // Genel bulgulardan topla (kompartman, klinik vb.)
    allFeatures.morfoloji.push(...(data.cilt.bulgu||[]));
    allFeatures.morfoloji.push(...(data.fasciaLata.bulgu||[]));
    allFeatures.morfoloji.push(...(data.femurKorteks.bulgu||[]));
    allFeatures.morfoloji.push(...(data.periost.bulgu||[]));
    allFeatures.morfoloji.push(...(data.femurMedulla.bulgu||[]));
    allFeatures.morfoloji.push(...(data.anteriorBulgu||[]));
    allFeatures.morfoloji.push(...(data.medialBulgu||[]));
    allFeatures.morfoloji.push(...(data.posteriorBulgu||[]));
    allFeatures.morfoloji.push(...(data.vascularBulgu||[]));
    allFeatures.morfoloji.push(...(data.siyatikBulgu||[]));
    allFeatures.morfoloji.push(...(data.femoralBulgu||[]));
    allFeatures.morfoloji.push(...(data.tendonBulgu||[]));
    allFeatures.klinik.push(...(data.indikasyon||[]));

    // Skorla
    const scored = PATHOLOGIES.map(path=>{
      let score = 0;
      let maxScore = 0;
      const matches = {};
      Object.keys(path.features).forEach(cat=>{
        const expected = path.features[cat];
        const weight = path.weights[cat] || 1;
        const actual = allFeatures[cat] || [];
        maxScore += weight * 1.0; // normalize
        let catMatch = 0;
        expected.forEach(exp=>{
          if(actual.some(a=>a.includes(exp) || exp.includes(a))){
            catMatch += 1;
          }
        });
        const catScore = expected.length>0 ? (catMatch/expected.length) * weight : 0;
        score += catScore;
        matches[cat] = catMatch>0;
      });
      const pct = maxScore>0 ? Math.min(100, Math.round((score/maxScore)*100)) : 0;
      return {...path,score:pct,matches};
    }).sort((a,b)=>b.score-a.score);
    return scored;
  };

  /* ========================================================
     RENDER: Klinik adımı (Step 0)
  ======================================================== */
  const renderKlinik = () => (
    <Fragment>
      <div className="row r3">
        <Field label={T.fld_taraf}>

            {[{v:'Sağ',l:T.chip_sag},{v:'Sol',l:T.chip_sol},{v:'Bilateral',l:T.chip_bilateral}].map(t=>(
              <Chip key={t.v} label={t.l} selected={data.taraf===t.v} onClick={()=>update('taraf',t.v)}/>

        <Field label={T.fld_yas}>

          <div className="chips">
            {[{v:'Kadın',l:T.chip_kadin},{v:'Erkek',l:T.chip_erkek}].map(c=>(
              <Chip key={c.v} label={c.l} selected={data.cinsiyet===c.v} onClick={()=>update('cinsiyet',c.v)}/>
            ))}
          </div>
        </Field>
      </div>
      <Field label={T.fld_indikasyon}>
        <div className="check-grid">
          {['akut_travma','spor_yaralanmasi','kunt_travma','kayma_yaralanmasi','kitle_sisme','agrili_sislik',
            'ates','enfeksiyon_bulgulari','pulsatil_kitle','nörolojik_defisit','radikulopati','paresteziler',
            'egzersizle_agri','kemik_agrisi','kronik_agri','patolojik_fraktür','postop_kontrol',
            'tumor_staging','tumor_takip','tarama_NF1','antikoagulan','immunsupresyon','diyabet',
            'primer_malignite_oyku','cerrahi_oyku','iatrojenik'].map(i=>(
              <CheckBoxItem key={i} label={i.replace(/_/g,' ')} on={data.indikasyon.includes(i)}
                onToggle={()=>toggleInList('indikasyon',i)}/>
            ))}
        </div>
      </Field>
      <div className="row r2">
        <Field label={T.fld_travma}>

            {[{v:'Yok',l:T.chip_travma_yok},{v:'Akut (<24s)',l:T.chip_travma_akut},{v:'Subakut (1-7 gün)',l:T.chip_travma_subakut},{v:'Kronik (>1 hf)',l:T.chip_travma_kronik}].map(t=>(
              <Chip key={t.v} label={t.l} selected={data.travmaOykusu===t.v} onClick={()=>update('travmaOykusu',t.v)}/>

        <Field label={T.fld_klinikNot}>

  /* Teknik */
  const renderTeknik = () => (

          <div className="chips">
            {['1.5 T','3 T'].map(c=>(
              <Chip key={c} label={c} selected={data.cihaz===c} onClick={()=>update('cihaz',c)}/>
            ))}
          </div>
        </Field>
        <Field label={T.fld_kontrast_iv}>
          <div className="chips">
            {[{v:'Verildi (Gd)',l:T.chip_kontrast_verildi},{v:'Verilmedi',l:T.chip_kontrast_verilmedi}].map(k=>(
              <Chip key={k.v} label={k.l} selected={data.kontrastVerildi===k.v} onClick={()=>update('kontrastVerildi',k.v)}/>
            ))}
          </div>
        </Field>
      </div>
      <Field label={T.fld_sekanslar}>
        <div className="check-grid">
          {['T1 aksiyel','T1 koronal','T1 sagital','T2 aksiyel','T2 koronal','T2 sagital',
            'PDFS / Yağ baskılı PD','STIR','DWI (b=50/400/800)','ADC haritası',
            'T2* / GRE','Kontrastlı T1 yağ baskılı','Dinamik kontrast (4D/Time-resolved)',
            'MR anjiyografi','MR venografi'].map(s=>(
              <CheckBoxItem key={s} label={s} on={data.sekanslar.includes(s)}
                onToggle={()=>toggleInList('sekanslar',s)}/>
            ))}
        </div>
      </Field>
    </Fragment>
  );

  /* Cilt */
  const renderCilt = () => (
    <Fragment>
      <Field label={T.fld_cilt_genel}>
        <div className="chips">
          {[{v:'normal',l:T.chip_normal},{v:'anormal',l:T.chip_anormal}].map(d=>(
            <Chip key={d.v} label={d.l} selected={data.cilt.durum===d.v}
              onClick={()=>updateNested('cilt','durum',d.v)}/>
          ))}
        </div>
      </Field>
      {data.cilt.durum==='anormal' && (
        <Fragment>
          <Field label={T.fld_cilt_bulgular}>
            <div className="check-grid">
              {['cilt_kalinlaşması','subkutan_retikuler_odem','subkutan_yag_planı_silikleşme',
                'sivi_koleksiyonu','apse','nodüler_kitle','cilt_altı_kist','lipom_benzeri_kitle',
                'hematom','Morel-Lavallée','nekroz','gaz_odaklari','selülit'].map(b=>(
                  <CheckBoxItem key={b} label={b.replace(/_/g,' ')} on={data.cilt.bulgu.includes(b)}
                    onToggle={()=>toggleInNestedList('cilt','bulgu',b)}/>
                ))}
            </div>
          </Field>
          <Field label={T.fld_ek_not}>
            <textarea value={data.ciltNot} onChange={e=>update('ciltNot',e.target.value)} placeholder={T.ph_ciltNot}/>
          </Field>
        </Fragment>
      )}
    </Fragment>
  );

  /* Fascia lata */
  const renderFascia = () => (

      <Field label={T.fld_fascia_genel}>
        <div className="chips">
          {[{v:'normal',l:T.chip_normal},{v:'anormal',l:T.chip_anormal}].map(d=>(
            <Chip key={d.v} label={d.l} selected={data.fasciaLata.durum===d.v}
              onClick={()=>updateNested('fasciaLata','durum',d.v)}/>
          ))}
        </div>
      </Field>
      {data.fasciaLata.durum==='anormal' && (
        <Fragment>
          <Field label={T.fld_fascia_bulgular}>
            <div className="check-grid">
              {['fascia_kalinlaşması','fascia_boyunca_hiperintensite','fascia_yelken_tail',
                'kompartman_sıvı_artışı','kompartman_odemi','fasiitis','derin_fascia_hiperintensitesi',
                'non_enhancing_fascia','fascial_yayilim','multikompartman_tutulum','fascia_ile_kas_arasinda',
                'gaz_gorunumu','fascia_lata','iliotibial_tract_kalinlaşması'].map(b=>(
                  <CheckBoxItem key={b} label={b.replace(/_/g,' ')} on={data.fasciaLata.bulgu.includes(b)}
                    onToggle={()=>toggleInNestedList('fasciaLata','bulgu',b)}/>
                ))}

            <div className="chips">
              {[{v:'Yok',l:T.chip_kompart_yok},{v:'Şüpheli',l:T.chip_kompart_supheli},{v:'Belirgin',l:T.chip_kompart_belirgin}].map(k=>(

          <div className="chips">

              <Chip key={d.v} label={d.l} selected={data.femurKorteks.durum===d.v}
                onClick={()=>updateNested('femurKorteks','durum',d.v)}/>

          <div className="chips">

              <Chip key={d.v} label={d.l} selected={data.periost.durum===d.v}
                onClick={()=>updateNested('periost','durum',d.v)}/>

          </div>

      </div>
      {data.femurKorteks.durum==='anormal' && (

  const buildTextReport = () => {

    if(data.indikasyon.length) lines.push(`• ${T.tr_indikasyon}: ${data.indikasyon.map(i=>i.replace(/_/g,' ')).join(', ')}`);
    if(data.travmaOykusu) lines.push(`• ${T.tr_travmaLabel}: ${data.travmaOykusu}`);
    if(data.klinikNot) lines.push(`• ${T.tr_notLabel}: ${data.klinikNot}`);
    lines.push('');
    lines.push(T.tr_teknik);
    lines.push('───────────────────────────');
    if(data.cihaz) lines.push(`• ${T.tr_cihaz}: ${data.cihaz}`);
    if(data.sekanslar.length) lines.push(`• ${T.tr_sekanslarLabel}: ${data.sekanslar.join('; ')}`);
    if(data.kontrastVerildi) lines.push(`• ${T.tr_kontrastLabel}: ${data.kontrastVerildi}`);
    lines.push('');
    lines.push(T.tr_bulgular);
    lines.push('───────────────────────────');
    lines.push(`• Cilt/Subkutan: ${data.cilt.durum}${data.cilt.bulgu.length?' — '+data.cilt.bulgu.map(b=>b.replace(/_/g,' ')).join(', '):''}`);
    lines.push(`• Fascia lata/kompartman: ${data.fasciaLata.durum}${data.fasciaLata.bulgu.length?' — '+data.fasciaLata.bulgu.map(b=>b.replace(/_/g,' ')).join(', '):''}`);
    lines.push(`• Femur korteks: ${data.femurKorteks.durum}${data.femurKorteks.bulgu.length?' — '+data.femurKorteks.bulgu.map(b=>b.replace(/_/g,' ')).join(', '):''}`);
    lines.push(`• Femur medülla: ${data.femurMedulla.durum}${data.femurMedulla.bulgu.length?' — '+data.femurMedulla.bulgu.map(b=>b.replace(/_/g,' ')).join(', '):''}`);
    lines.push(`• Kuadriseps: RF:${data.rectusFemoris} VL:${data.vastusLat} VM:${data.vastusMed} VI:${data.vastusInt}`);
    lines.push(`• Adduktorlar: AM:${data.adductorMag} AL:${data.adductorLong} AB:${data.adductorBrev} Grac:${data.gracilis} Pect:${data.pectineus}`);
    lines.push(`• Hamstring: BF:${data.bicepsFem} ST:${data.semitend} SM:${data.semimem}`);
    lines.push(`• Tendonlar: Prox:${data.proximalTendon} Dist:${data.distalTendon}`);
    lines.push(`• Vasküler: CFA:${data.cfa} SFA:${data.sfa} ProfFem:${data.profundaFem} FemV:${data.femoralVen} Saphen:${data.saphenVen}`);
    lines.push(`• Siyatik sinir: ${data.siyatikCap}/${data.siyatikSinyal}/${data.siyatikCevre}`);
    lines.push(`• Femoral/Obturator: Fem:${data.femoralSinir} Obt:${data.obturatorSinir}`);
    if(data.lenfNodBoyut||data.lenfNodSayisi) lines.push(`• Lenf: ${data.lenfNodSayisi||''} ${data.lenfNodBoyut?'('+data.lenfNodBoyut+')':''} ${data.lenfNodSinyal||''}`);
    lines.push('');
    if(lesions.length){
      lines.push(T.tr_lezyonlar);
      lines.push('───────────────────────────');
      lesions.forEach(l=>{
        lines.push(`[${l.id}] Lokalizasyon: ${(l.komp||'').replace(/_/g,' ')} ${l.kas?'— '+l.kas:''}`);
        if(l.boyut.x||l.boyut.y||l.boyut.z) lines.push(`  Boyut: ${l.boyut.x}×${l.boyut.y}×${l.boyut.z} mm`);
        if(l.morfoloji.length) lines.push(`  Morfoloji: ${l.morfoloji.map(x=>x.replace(/_/g,' ')).join(', ')}`);
        if(l.t1.length) lines.push(`  T1: ${l.t1.map(x=>x.replace(/_/g,' ')).join(', ')}`);
        if(l.t2.length) lines.push(`  T2: ${l.t2.map(x=>x.replace(/_/g,' ')).join(', ')}`);
        if(l.stir.length) lines.push(`  STIR: ${l.stir.map(x=>x.replace(/_/g,' ')).join(', ')}`);
        if(l.dwi) lines.push(`  DWI/ADC: ${l.dwi.replace(/_/g,' ')}${l.adc?' (ADC '+l.adc+')':''}`);
        if(l.kontrast.length) lines.push(`  Kontrast: ${l.kontrast.map(x=>x.replace(/_/g,' ')).join(', ')}`);
        if(l.invazyon.length) lines.push(`  Komşuluk: ${l.invazyon.map(x=>x.replace(/_/g,' ')).join(', ')}`);
      });
      lines.push('');
    }
    lines.push(T.tr_ayirici);
    lines.push('───────────────────────────');
    diffResult.topDiff.forEach((d,i)=>{
      lines.push(`${i+1}. ${d.name} — %${d.score}  [${d.category}]`);
    });
    lines.push('');
    if(data.ekBulgular){
      lines.push(T.tr_ek);
      lines.push('───────────────────────────');
      lines.push(data.ekBulgular);
      lines.push('');
    }
    lines.push(T.tr_yorum);
    lines.push('───────────────────────────');
    const first = diffResult.topDiff[0];
    if(first && first.score>40){
      lines.push(T.tr_yorum_high(first.name));
      lines.push(first.description);
    } else {
      lines.push(T.tr_yorum_low);
    }
    lines.push('');
    lines.push(`${T.tr_tarih}: ` + new Date().toLocaleDateString('tr-TR'));
    return lines.join('\n');
  };

    .badge.red{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .badge.orange{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
    .badge.green{background:#f0fdf4;color:#065f46;border:1px solid #bbf7d0}
    </style></head><body>`;
    html += `<h2>${T.hr_title}</h2>`;
    html += `<div class="sub">${T.tr_tarih}: ${new Date().toLocaleDateString('tr-TR')}</div>`;
    html += `<h3>${T.hr_klinik}</h3><table>`;
    if(data.taraf) html += `<tr><td>${T.tr_taraf}</td><td>${data.taraf}</td></tr>`;
    if(data.yas) html += `<tr><td>${T.tr_yasLabel}</td><td>${data.yas}</td></tr>`;
    if(data.cinsiyet) html += `<tr><td>${T.tr_cinsiyetLabel}</td><td>${data.cinsiyet}</td></tr>`;
    if(data.indikasyon.length) html += `<tr><td>${T.tr_indikasyon}</td><td>${data.indikasyon.map(i=>pct(i)).join(', ')}</td></tr>`;
    if(data.travmaOykusu) html += `<tr><td>${T.tr_travmaLabel}</td><td>${data.travmaOykusu}</td></tr>`;
    if(data.klinikNot) html += `<tr><td>${T.tr_notLabel}</td><td>${data.klinikNot}</td></tr>`;
    html += `</table>`;
    html += `<h3>${T.hr_teknik}</h3><table>`;
    if(data.cihaz) html += `<tr><td>${T.tr_cihaz}</td><td>${data.cihaz}</td></tr>`;
    if(data.sekanslar.length) html += `<tr><td>${T.tr_sekanslarLabel}</td><td>${data.sekanslar.join('; ')}</td></tr>`;
    if(data.kontrastVerildi) html += `<tr><td>${T.tr_kontrastLabel}</td><td>${data.kontrastVerildi}</td></tr>`;
    html += `</table>`;

    html += `<h3>${T.hr_yumusak}</h3><table>`;
    html += `<tr><td>Cilt / Subkutan</td><td>${data.cilt.durum}${data.cilt.bulgu.length?' — '+data.cilt.bulgu.map(pct).join(', '):''}</td></tr>`;
    html += `<tr><td>Fascia lata</td><td>${data.fasciaLata.durum}${data.fasciaLata.bulgu.length?' — '+data.fasciaLata.bulgu.map(pct).join(', '):''}</td></tr>`;
    if(data.kompartmanSindromu) html += `<tr><td>Kompartman sendromu</td><td>${data.kompartmanSindromu}</td></tr>`;
    html += `</table>`;

    html += `<h3>${T.hr_femur}</h3><table>`;
    html += `<tr><td>${T.fld_kortikal}</td><td>${data.femurKorteks.durum}${data.femurKorteks.bulgu.length?' — '+data.femurKorteks.bulgu.map(pct).join(', '):''}</td></tr>`;
    html += `<tr><td>${T.fld_periost}</td><td>${data.periost.durum}${data.periost.bulgu.length?' — '+data.periost.bulgu.map(pct).join(', '):''}</td></tr>`;
    html += `<tr><td>${T.fld_medulla_genel}</td><td>${data.femurMedulla.durum}${data.femurMedulla.bulgu.length?' — '+data.femurMedulla.bulgu.map(pct).join(', '):''}${data.kemikIligi?' | '+data.kemikIligi:''}</td></tr>`;
    html += `</table>`;

    html += `<h3>${T.hr_kaslar}</h3><table>`;
    html += `<tr><td>Anterior (Quadriceps)</td><td>Rectus femoris: <b>${data.rectusFemoris}</b> | Vastus lateralis: <b>${data.vastusLat}</b> | Vastus medialis: <b>${data.vastusMed}</b> | Vastus intermedius: <b>${data.vastusInt}</b></td></tr>`;
    html += `<tr><td>Medial (Adductors)</td><td>Adductor magnus: <b>${data.adductorMag}</b> | Adductor longus: <b>${data.adductorLong}</b> | Adductor brevis: <b>${data.adductorBrev}</b> | Gracilis: <b>${data.gracilis}</b> | Pectineus: <b>${data.pectineus}</b></td></tr>`;
    html += `<tr><td>Posterior (Hamstring)</td><td>Biceps femoris: <b>${data.bicepsFem}</b> | Semitendinosus: <b>${data.semitend}</b> | Semimembranosus: <b>${data.semimem}</b></td></tr>`;
    if(data.anteriorBulgu.length) html += `<tr><td>${T.fld_ek_anterior}</td><td>${data.anteriorBulgu.map(pct).join(', ')}</td></tr>`;
    if(data.medialBulgu.length) html += `<tr><td>${T.fld_ek_medial}</td><td>${data.medialBulgu.map(pct).join(', ')}</td></tr>`;
    if(data.posteriorBulgu.length) html += `<tr><td>${T.fld_ek_posterior}</td><td>${data.posteriorBulgu.map(pct).join(', ')}</td></tr>`;
    html += `</table>`;

    html += `<h3>${T.hr_tendonlar}</h3><table>`;
    html += `<tr><td>${T.fld_prox_tendon}</td><td>${data.proximalTendon}</td></tr>`;
    html += `<tr><td>${T.fld_dist_tendon}</td><td>${data.distalTendon}</td></tr>`;
    if(data.tendonBulgu.length) html += `<tr><td>${T.fld_ek_tendon}</td><td>${data.tendonBulgu.map(pct).join(', ')}</td></tr>`;
    html += `</table>`;

    html += `<h3>${T.hr_vascular}</h3><table>`;
    html += `<tr><td>CFA / SFA / Profunda</td><td>CFA: <b>${data.cfa}</b> | SFA: <b>${data.sfa}</b> | Profunda fem.: <b>${data.profundaFem}</b></td></tr>`;
    html += `<tr><td>Veins</td><td>Femoral vein: <b>${data.femoralVen}</b> | Saphenous: <b>${data.saphenVen}</b></td></tr>`;
    if(data.vascularBulgu.length) html += `<tr><td>${T.fld_ek_vascular}</td><td>${data.vascularBulgu.map(pct).join(', ')}</td></tr>`;
    html += `</table>`;

    html += `<h3>${T.hr_sinirler}</h3><table>`;
    html += `<tr><td>Sciatic nerve</td><td>Caliber: <b>${data.siyatikCap}</b> | Signal: <b>${data.siyatikSinyal}</b> | Surroundings: <b>${data.siyatikCevre}</b></td></tr>`;
    html += `<tr><td>Femoral nerve</td><td><b>${data.femoralSinir}</b></td></tr>`;
    html += `<tr><td>Obturator nerve</td><td><b>${data.obturatorSinir}</b></td></tr>`;
    if(data.siyatikBulgu.length) html += `<tr><td>${T.fld_ek_siyatik}</td><td>${data.siyatikBulgu.map(pct).join(', ')}</td></tr>`;
    if(data.femoralBulgu.length) html += `<tr><td>${T.fld_ek_femoral}</td><td>${data.femoralBulgu.map(pct).join(', ')}</td></tr>`;
    html += `</table>`;

    if(data.lenfNodBoyut||data.lenfNodSayisi||data.lenfBulgu.length){
      html += `<h3>${T.hr_lenf}</h3><table>`;
      if(data.lenfNodSayisi) html += `<tr><td>${T.fld_lenf_sayi}</td><td>${data.lenfNodSayisi}</td></tr>`;
      if(data.lenfNodBoyut) html += `<tr><td>${T.fld_lenf_boyut}</td><td>${data.lenfNodBoyut}</td></tr>`;
      if(data.lenfNodSinyal) html += `<tr><td>${T.fld_lenf_sinyal}</td><td>${data.lenfNodSinyal}</td></tr>`;
      if(data.lenfBulgu.length) html += `<tr><td>${T.fld_lenf_bulgular}</td><td>${data.lenfBulgu.map(pct).join(', ')}</td></tr>`;
      html += `</table>`;
    }

    if(lesions.length){
      html += `<h3>${T.hr_lezyonlar}</h3>`;
      lesions.forEach(l=>{
        html += `<div class="lesion-block"><div class="lesion-title">Lesion ${l.id}${l.komp?' — '+pct(l.komp):''}${l.kas?' ('+l.kas+')':''}</div>`;
        html += `<table>`;
        if(l.boyut.x||l.boyut.y||l.boyut.z) html += `<tr><td>${T.fld_lez_boyut}</td><td>${l.boyut.x}×${l.boyut.y}×${l.boyut.z} mm</td></tr>`;
        if(l.morfoloji.length) html += `<tr><td>${T.fl_morfoloji}</td><td>${l.morfoloji.map(pct).join(', ')}</td></tr>`;
        if(l.t1.length) html += `<tr><td>${T.fl_t1}</td><td>${l.t1.map(pct).join(', ')}${l.t1Not?' | '+l.t1Not:''}</td></tr>`;
        if(l.t2.length) html += `<tr><td>${T.fl_t2}</td><td>${l.t2.map(pct).join(', ')}</td></tr>`;
        if(l.stir.length) html += `<tr><td>${T.fl_stir}</td><td>${l.stir.map(pct).join(', ')}${l.t2Not?' | '+l.t2Not:''}</td></tr>`;
        if(l.dwi) html += `<tr><td>${T.fl_dwi}</td><td>${pct(l.dwi)}${l.adc?' | ADC: '+l.adc:''}${l.dwiNot?' | '+l.dwiNot:''}</td></tr>`;
        if(l.kontrast.length) html += `<tr><td>${T.fl_kontrast}</td><td>${l.kontrast.map(pct).join(', ')}${l.dinamik?' | Dynamic: '+l.dinamik:''}${l.kontrastNot?' | '+l.kontrastNot:''}</td></tr>`;
        if(l.invazyon.length) html += `<tr><td>${T.fld_komsuluk}</td><td>${l.invazyon.map(pct).join(', ')}${l.invazyonNot?' | '+l.invazyonNot:''}</td></tr>`;
        html += `</table></div>`;
      });
    }

    html += `<h3>${T.hr_ayirici}</h3>`;
    html += `<table>`;
    diffResult.topDiff.forEach((d,i)=>{
      const malignCats = ['Malign Tümör','Kemik-Malign'];
      const cls = malignCats.includes(d.category) ? 'red' :
                  (d.category.includes('Enfeksiyon')||d.category.includes('Travmatik')) ? 'orange' : 'green';
      html += `<tr><td>${i+1}. ${d.name} <span class="badge ${cls}">${d.category}</span></td><td class="diff-pct">%${d.score}</td></tr>`;
    });
    html += `</table>`;

    // Malign/şüpheli flagging
    const hasMalign = diffResult.topDiff.slice(0,3).some(d=>['Malign Tümör','Kemik-Malign'].includes(d.category) && d.score>35);
    if(hasMalign){
      html += `<div class="malign-flag"><div class="malign-title">${T.hr_malign_title}</div>${T.hr_malign_text}</div>`;
    }

    if(data.ekBulgular){
      html += `<h3>${T.hr_ek}</h3><p>${data.ekBulgular.replace(/\n/g,'<br/>')}</p>`;
    }

    const first = diffResult.topDiff[0];
    html += `<div class="yorum"><div class="yorum-title">${T.hr_yorum}</div>`;
    if(first && first.score>40){
      html += T.hr_yorum_high(first.name,first.score,first.description);
      if(diffResult.topDiff[1] && diffResult.topDiff[1].score>25){
        html += T.hr_yorum_alt(diffResult.topDiff[1].name,diffResult.topDiff[1].score,diffResult.topDiff[2]?.name,diffResult.topDiff[2]?.score);
      }
    } else {
      html += T.hr_yorum_low(first?.name||'—',first?.score||0);
    }
    html += `</div>`;

    html += `<div class="footer"><span>${T.tr_tarih}: ${new Date().toLocaleDateString('tr-TR')}</span><span>${T.hr_footer}</span></div>`;
    html += `</body></html>`;
    return html;
  };

  /* ============== RAPOR ADIMI ============== */
  const [printOpen,setPrintOpen] = useState(false);
  const [copyStatus,setCopyStatus] = useState('');

  const copyHTMLToClipboard = () => {
    const htmlBody = buildHTMLReport();
    try {
      // execCommand fallback (sandbox-safe)
      const ta = document.createElement('textarea');
      ta.value = htmlBody;
      ta.style.position='fixed';ta.style.left='-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopyStatus(T.copy_html_ok);
    } catch(e){
      setCopyStatus(T.copy_html_fail);
    }
    setTimeout(()=>setCopyStatus(''),2500);
  };

  const copyTextToClipboard = () => {
    const txt = buildTextReport();
    try {
      const ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.position='fixed';ta.style.left='-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopyStatus(T.copy_text_ok);
    } catch(e){
      setCopyStatus(T.copy_html_fail);
    }
    setTimeout(()=>setCopyStatus(''),2500);
  };

  const downloadHTML = () => {
    try{
      const html = buildHTMLReport();
      const blob = new Blob([html],{type:'text/html;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `uyluk_mrg_raporu_${new Date().toISOString().slice(0,10)}.html`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setCopyStatus(T.dl_ok);
    }catch(e){
      // URL.createObjectURL may not work in sandbox → use print overlay
      setPrintOpen(true);
      setCopyStatus(T.dl_fallback);
    }
    setTimeout(()=>setCopyStatus(''),2500);
  };

  const openPrintOverlay = () => setPrintOpen(true);
  const closePrintOverlay = () => setPrintOpen(false);
  const triggerPrint = () => window.print();

  const renderRapor = () => {
    const first = diffResult.topDiff[0];
    const hasMalign = diffResult.topDiff.slice(0,3).some(d=>['Malign Tümör','Kemik-Malign'].includes(d.category) && d.score>35);
    return (
      <Fragment>
        <div className="alert-info">{T.info_diff}</div>
        <h3 style={{fontSize:'15px',margin:'18px 0 10px',color:'var(--accent-2)'}}>{T.diff_title}</h3>
        <div className="diff-list">
          {diffResult.topDiff.map((d,i)=>(
            <div key={d.id} className={`diff-item ${i===0?'top':''}`}>
              <div>
                <div className="diff-name">{i+1}. {d.name}</div>
                <div className="diff-detail">{d.category}</div>
                <div className="diff-bar"><div className="diff-bar-fill" style={{width:d.score+'%'}}></div></div>
              </div>
              <div className="diff-score">%{d.score}</div>
            </div>
          ))}
        </div>

        {hasMalign && (
          <div className="alert-warn">{T.warn_malign}</div>
        )}

        <div className="export-actions">
          <button className="btn primary" onClick={openPrintOverlay}>{T.btn_print}</button>
          <button className="btn ok" onClick={copyHTMLToClipboard}>{T.btn_html_copy}</button>
          <button className="btn" onClick={copyTextToClipboard}>{T.btn_text_copy}</button>
          <button className="btn" onClick={downloadHTML}>{T.btn_html_dl}</button>
        </div>
        {copyStatus && <div style={{textAlign:'center',marginTop:10,color:'var(--accent-3)',fontSize:'13px'}}>{copyStatus}</div>}

        {first && (
          <div style={{marginTop:24,padding:'16px 20px',background:'var(--bg-4)',borderRadius:10,borderLeft:'4px solid var(--accent-3)'}}>
            <div style={{fontSize:'12px',color:'var(--accent-3)',textTransform:'uppercase',letterSpacing:'0.8px',fontWeight:600,marginBottom:6}}>{T.yorum_title}</div>
            <div style={{fontSize:'13.5px',lineHeight:1.6,color:'var(--text)'}}>
              {first.score>40
                ? <Fragment>{T.yorum_high(first.name,first.score,first.description)}</Fragment>
                : <Fragment>{T.yorum_low(first.name,first.score)}</Fragment>
              }
            </div>
          </div>
        )}
      </Fragment>
    );
  };

  /* ========================================================
     STEP DISPATCH — Aktif adıma göre içerik seçimi
  ======================================================== */
  const renderStepBody = () => {
    if(inLesionLoop){
      const subId = currentStepDef.id;
      if(subId === 'lez_loc') return renderLezLoc();
      if(subId === 'lez_morf') return renderLezMorf();
      if(subId === 'lez_t1') return renderLezT1();
      if(subId === 'lez_t2') return renderLezT2();
      if(subId === 'lez_dwi') return renderLezDWI();
      if(subId === 'lez_kontrast') return renderLezKontrast();
      if(subId === 'lez_kom') return renderLezKom();
      return <div>{T.stepUnknownLez}</div>;
    }
    const id = currentStepDef.id;
    if(id === 'klinik') return renderKlinik();
    if(id === 'teknik') return renderTeknik();
    if(id === 'cilt') return renderCilt();
    if(id === 'fascia') return renderFascia();
    if(id === 'femur_cortex') return renderFemurCortex();
    if(id === 'femur_medulla') return renderFemurMedulla();
    if(id === 'anterior') return renderAnterior();
    if(id === 'medial') return renderMedial();
    if(id === 'posterior') return renderPosterior();
    if(id === 'tendon') return renderTendon();
    if(id === 'vascular') return renderVascular();
    if(id === 'sciatic') return renderSciatic();
    if(id === 'femoral_n') return renderFemoralN();
    if(id === 'lenf') return renderLenf();
    if(id === 'lezyon_giris') return renderLezyonGiris();
    if(id === 'ek') return renderEk();
    if(id === 'rapor') return renderRapor();
    return <div>{T.stepUnknown}</div>;
  };

  /* ========================================================
     NAVİGASYON GUARD'LARI
  ======================================================== */
  const isLastStep = stepIdx === STEPS.length - 1;
  const nextDisabled = (stepIdx === 14 && data.lezyonVarMi === 'Var' && lesions.length === 0);
  const prevDisabled = stepIdx === 0 && !inLesionLoop;

  /* ========================================================
     ANA RETURN — Header + Progress + Card + Navigation + Print Overlay
  ======================================================== */
  return (
    <Fragment>
      <div className="header">
        <div className="brand">
          <div className="logo">U</div>
          <div className="brand-text">
            <h1>{T.appTitle}</h1>
            <div className="sub">{T.appSub}</div>
          </div>
        </div>
        <div className="header-meta">
          <div className="meta-chip"><span>{T.stepLabel}</span> <b>{computedStep + 1}</b> / {totalSteps}</div>
          {lesions.length > 0 && <div className="meta-chip"><span>{T.lesionLabel}</span> <b>{lesions.filter(l=>l.tamamlandi).length}</b> / {lesions.length}</div>}
        </div>
      </div>

      <div className="progress-wrap">
        <div className="progress-bar"><div className="progress-fill" style={{width: progress + '%'}}></div></div>
      </div>

      <div className="card fadeIn" key={inLesionLoop ? `lez-${currentLesionIdx}-${lesionSubStep}` : `main-${stepIdx}`}>
        <div className="step-h">
          <div className="step-num">{inLesionLoop ? `L${currentLesionIdx+1}.${lesionSubStep+1}` : (stepIdx + 1)}</div>
          <div className="step-title-wrap">
            <div className="step-title">{currentStepDef.title}</div>
            <div className="step-sub">{currentStepDef.sub}</div>
          </div>
        </div>

        <div className="step-body">
          {renderStepBody()}
        </div>

        <div className="nav">
          <button className="btn" onClick={goPrev} disabled={prevDisabled}>{T.navBack}</button>
          <div className="nav-mid">
            {nextDisabled && <div className="nav-warn">{T.navWarnLesion}</div>}
          </div>
          {!isLastStep && (
            <button className={`btn ${inLesionLoop && lesionSubStep === LESION_SUBSTEPS.length - 1 ? 'ok' : 'primary'}`}
              onClick={goNext} disabled={nextDisabled}>
              {inLesionLoop && lesionSubStep === LESION_SUBSTEPS.length - 1 ? T.navFinishLesion : T.navNext}
            </button>
          )}
        </div>
      </div>

      {/* PRINT OVERLAY — DOM tabanlı, sandbox-safe */}
      {printOpen && (
        <div className="print-overlay">
          <div className="print-actions no-print">
            <button className="btn" onClick={closePrintOverlay}>{T.btn_kapat}</button>
            <div style={{flex:1}}></div>
            <button className="btn primary" onClick={triggerPrint}>{T.btn_yazdir}</button>
          </div>
          <div className="print-sheet" dangerouslySetInnerHTML={{__html: buildHTMLReport()}}></div>
        </div>
      )}
    </Fragment>
  );
}

/* ============== UYGULAMA MONTAJI ============== */
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);

    </script>
  </body>
</html>
