<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metabolik Beyin MRI — Karar Destek</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card2: #16213e;
  --border: #2d2d4e;
  --accent: #7c3aed;
  --accent-light: #a78bfa;
  --accent-dim: rgba(124,58,237,0.15);
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app-header{background:linear-gradient(135deg,#1a0a3d 0%,#0f0f1a 60%);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:14px}
.app-header .icon{width:44px;height:44px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.app-header h1{font-size:1.2rem;font-weight:700;color:#fff}
.app-header p{font-size:.8rem;color:var(--text-muted);margin-top:2px}
.main{max-width:860px;margin:0 auto;padding:28px 20px 60px}

/* Progress */
.progress-bar{display:flex;align-items:center;gap:0;margin-bottom:28px;overflow-x:auto;padding-bottom:4px}
.step-node{display:flex;flex-direction:column;align-items:center;position:relative;flex:1;min-width:60px}
.step-node .circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:var(--text-muted);transition:.2s;z-index:1}
.step-node.done .circle{background:var(--accent);border-color:var(--accent);color:#fff}
.step-node.active .circle{background:var(--accent-dim);border-color:var(--accent-light);color:var(--accent-light)}
.step-node .label{font-size:.62rem;color:var(--text-muted);margin-top:4px;text-align:center;white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis}
.step-node.active .label,.step-node.done .label{color:var(--accent-light)}
.step-line{flex:1;height:2px;background:var(--border);margin-top:-20px;min-width:12px;transition:.2s}
.step-line.done{background:var(--accent)}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px}
.card h2{font-size:1.05rem;font-weight:700;color:var(--accent-light);margin-bottom:6px}
.card .subtitle{font-size:.82rem;color:var(--text-muted);margin-bottom:22px}

/* Form elements */
.field-group{margin-bottom:22px}
.field-label{font-size:.83rem;font-weight:600;color:var(--text-muted);margin-bottom:10px;display:block;letter-spacing:.02em}
.field-label span{color:var(--danger);margin-left:3px}
.option-grid{display:flex;flex-wrap:wrap;gap:8px}
.opt{background:var(--card2);border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.82rem;cursor:pointer;transition:.15s;user-select:none;color:var(--text)}
.opt:hover{border-color:var(--accent-light);background:var(--accent-dim)}
.opt.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--accent-light);font-weight:600}
.opt.checkbox-style{padding:7px 12px;display:flex;align-items:center;gap:8px}
.opt.checkbox-style .chk{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.opt.checkbox-style.selected .chk{background:var(--accent);border-color:var(--accent);color:#fff}
.divider{height:1px;background:var(--border);margin:18px 0}
.sublabel{font-size:.78rem;color:var(--text-muted);margin-bottom:8px;margin-top:14px;font-weight:500}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:28px;justify-content:flex-end}
.btn{padding:10px 22px;border-radius:8px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#6d28d9}
.btn-secondary{background:var(--card2);color:var(--text-muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent-light);color:var(--text)}
.btn-outline{background:transparent;color:var(--accent-light);border:1px solid var(--accent)}
.btn-outline:hover{background:var(--accent-dim)}

/* Results */
.result-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.result-header h2{font-size:1.1rem;color:#fff}
.dx-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.dx-item{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.dx-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.dx-rank.r1{background:#7c3aed;color:#fff}
.dx-rank.r2{background:#5b21b6;color:#e9d5ff}
.dx-rank.r3{background:#3b0764;color:#c4b5fd}
.dx-rank.r4{background:var(--card);color:var(--text-muted);border:1px solid var(--border)}
.dx-rank.r5{background:var(--card);color:var(--text-muted);border:1px solid var(--border)}
.dx-name{flex:1;font-size:.88rem;font-weight:600;color:var(--text)}
.dx-bar-wrap{width:120px;flex-shrink:0}
.dx-score-label{font-size:.72rem;color:var(--text-muted);text-align:right;margin-bottom:3px}
.dx-bar{height:7px;border-radius:4px;background:var(--border);overflow:hidden}
.dx-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent-light));transition:.3s}
.dx-pct{font-size:.78rem;color:var(--accent-light);font-weight:700;margin-top:3px;text-align:right}

/* Yorum block */
.yorum-card{background:linear-gradient(135deg,#1a0a3d,#0f1629);border:1px solid var(--accent);border-radius:12px;padding:18px;margin-bottom:20px}
.yorum-card .ytag{background:var(--accent);color:#fff;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:10px;letter-spacing:.06em}
.yorum-card .yname{font-size:.95rem;font-weight:700;color:var(--accent-light);margin-bottom:8px}
.yorum-card .ytext{font-size:.83rem;color:var(--text);line-height:1.7}

/* Report table */
.report-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-bottom:16px}
.report-table th{background:var(--accent-dim);color:var(--accent-light);font-size:.72rem;font-weight:700;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);letter-spacing:.04em}
.report-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
.report-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.report-table tr:last-child td{border-bottom:none}

/* Print overlay */
#printOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;overflow-y:auto;padding:20px}
#printSheet{background:#fff;color:#111;max-width:780px;margin:0 auto;padding:28px 32px;font-family:'Segoe UI',sans-serif;font-size:12px;line-height:1.5;border-radius:4px}
#printSheet h1{font-size:15px;font-weight:700;border-bottom:2px solid #7c3aed;padding-bottom:6px;margin-bottom:14px;color:#1a0a3d}
#printSheet h2{font-size:13px;color:#5b21b6;margin:14px 0 6px}
#printSheet p{margin-bottom:4px}
#printSheet table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
#printSheet th{background:#ede9fe;color:#5b21b6;padding:5px 8px;text-align:left;font-size:10px;letter-spacing:.04em}
#printSheet td{padding:5px 8px;border-bottom:1px solid #e5e7eb}
#printSheet tr:nth-child(even) td{background:#f9fafb}
#printSheet .dx-badge{display:inline-block;background:#7c3aed;color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;margin-right:4px}
#printSheet .yorum-block{background:#f5f3ff;border-left:3px solid #7c3aed;padding:8px 12px;margin-bottom:8px;font-size:11px}
#printSheet .footer{margin-top:20px;font-size:10px;color:#6b7280;border-top:1px solid #e5e7eb;padding-top:8px;text-align:right}
.overlay-toolbar{display:flex;gap:10px;max-width:780px;margin:0 auto 12px;justify-content:flex-end}
.overlay-btn{padding:8px 18px;border-radius:7px;border:none;font-size:.83rem;font-weight:600;cursor:pointer}
.overlay-btn.print{background:var(--accent);color:#fff}
.overlay-btn.copy{background:#1a1a2e;color:var(--accent-light);border:1px solid var(--accent)}
.overlay-btn.close{background:#1a1a2e;color:var(--text-muted);border:1px solid var(--border)}

/* Reset btn */
.reset-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:7px 14px;border-radius:7px;font-size:.78rem;cursor:pointer;margin-right:auto}
.reset-btn:hover{border-color:var(--danger);color:var(--danger)}

@media print{
  #printOverlay{position:absolute!important;overflow:visible!important;padding:0!important}
  .overlay-toolbar{display:none!important}
  #printSheet{box-shadow:none;border-radius:0}
}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>

      {f:'klinik', v:['epizodik'], w:3},
      {f:'yas', v:['cocuk','adolesan','yetiskin'], w:1},
    ],
    yorum: T.melas_yorum
  },
  {
    id: 'hie_neonatal',
    name: T.hie_neonatal_name,
    category: T.cat_metabolik_vaskuler,
    criteria: [
      {f:'yas', v:['neonatal'], w:4},
      {f:'t1', v:['belirgin_hipointens'], w:2},
      {f:'t2', v:['hiperintens'], w:2},
      {f:'putamen', v:true, w:2},
      {f:'thalamus', v:true, w:2},
      {f:'korteks', v:true, w:2},
      {f:'dwi', v:['var'], w:3},
      {f:'klinik', v:['akut','subakut'], w:2},
    ],
    yorum: T.hie_neonatal_yorum
  },
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let state = {
  step: 0,
  yas: null,
  klinik: null,
  t1: null,
  gp_t1_hiper: false,
  t2: null,
  putamen: false,
  basal_gp: false,
  thalamus: false,
  periventrikular: false,
  posterior_beyaz: false,
  myelinated: false,
  diffuz_beyaz: false,
  korteks: false,
  beyin_sapi: false,
  serebellum: false,
  internal_capsule: false,
  dwi: null,
  kontrast: null,
  bilateral: false,
  odem: false,
  stroke_like: false,
  korteks_ribbon: false,
};

// ─────────────────────────────────────────────
// SCORING
// ─────────────────────────────────────────────
function score(disease) {
  let raw = 0, maxPossible = 0;
  for (const c of disease.criteria) {
    maxPossible += c.w;
    const val = state[c.f];
    if (typeof c.v === 'boolean') {
      if (val === c.v) raw += c.w;
    } else if (Array.isArray(c.v)) {
      if (c.v.includes(val)) raw += c.w;
    }
  }
  return maxPossible > 0 ? Math.round((raw / maxPossible) * 100) : 0;
}

function computeScores() {
  return diseases
    .map(d => ({ ...d, pct: score(d) }))
    .sort((a, b) => b.pct - a.pct)
    .slice(0, 6);
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderProgress() {
  const pb = document.getElementById('progressBar');
  pb.innerHTML = '';
  STEPS.forEach((s, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'step-line' + (i <= state.step ? ' done' : '');
      pb.appendChild(line);
    }
    const node = document.createElement('div');
    node.className = 'step-node' + (i === state.step ? ' active' : i < state.step ? ' done' : '');
    node.innerHTML = `<div class="circle">${i < state.step ? '✓' : i+1}</div><div class="label">${s}</div>`;
    pb.appendChild(node);
  });
}

function radio(field, value, label) {
  return `<div class="opt${state[field]===value?' selected':''}" onclick="setState('${field}','${value}')">${label}</div>`;
}

function chk(field, label) {
  const on = state[field];
  return `<div class="opt checkbox-style${on?' selected':''}" onclick="toggleState('${field}')"><div class="chk">${on?'✓':''}</div>${label}</div>`;
}

function setState(f, v) {
  state[f] = v;
  renderStep();
}

function toggleState(f) {
  state[f] = !state[f];
  renderStep();
}

function renderStep() {
  renderProgress();
  const card = document.getElementById('stepCard');
  let html = '';

  if (state.step === 0) {
    html = `
    <h2>${T.step0_h2}</h2>
    <p class="subtitle">${T.step0_subtitle}</p>
    <div class="field-group">
      <label class="field-label">${T.yas_label} <span>*</span></label>
      <div class="option-grid">
        ${radio('yas','neonatal',T.yas_neonatal)}
        ${radio('yas','sut_cocugu',T.yas_sut_cocugu)}
        ${radio('yas','cocuk',T.yas_cocuk)}
        ${radio('yas','adolesan',T.yas_adolesan)}
        ${radio('yas','yetiskin',T.yas_yetiskin)}
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">${T.klinik_label} <span>*</span></label>
      <div class="option-grid">
        ${radio('klinik','akut',T.klinik_akut)}
        ${radio('klinik','subakut',T.klinik_subakut)}
        ${radio('klinik','kronik',T.klinik_kronik)}
        ${radio('klinik','epizodik',T.klinik_epizodik)}
      </div>
    </div>`;
  }

  else if (state.step === 1) {
    html = `
    <h2>${T.step1_h2}</h2>
    <p class="subtitle">${T.step1_subtitle}</p>
    <div class="field-group">
      <label class="field-label">${T.t1_label} <span>*</span></label>
      <div class="option-grid">
        ${radio('t1','izointens',T.t1_izointens)}
        ${radio('t1','hafif_hipointens',T.t1_hafif_hipointens)}
        ${radio('t1','belirgin_hipointens',T.t1_belirgin_hipointens)}
        ${radio('t1','atrofi',T.t1_atrofi)}
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">${T.t1_ozel}</label>
      <div class="option-grid">
        ${chk('gp_t1_hiper',T.gp_t1_hiper)}
      </div>
    </div>`;
  }

  else if (state.step === 2) {
    html = `
    <h2>${T.step2_h2}</h2>
    <p class="subtitle">${T.step2_subtitle}</p>
    <div class="field-group">
      <label class="field-label">${T.t2_label} <span>*</span></label>
      <div class="option-grid">
        ${radio('t2','normal',T.t2_normal)}
        ${radio('t2','hafif_hiperintens',T.t2_hafif_hiperintens)}
        ${radio('t2','hiperintens',T.t2_hiperintens)}
        ${radio('t2','cok_hiperintens',T.t2_cok_hiperintens)}
      </div>
    </div>`;
  }

  else if (state.step === 3) {
    html = `
    <h2>${T.step3_h2}</h2>
    <p class="subtitle">${T.step3_subtitle}</p>

    <div class="field-group">
      <div class="sublabel">${T.sublabel_derin}</div>
      <div class="option-grid">
        ${chk('putamen',T.loc_putamen)}
        ${chk('basal_gp',T.loc_basal_gp)}
        ${chk('thalamus',T.loc_thalamus)}
      </div>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <div class="sublabel">${T.sublabel_beyaz}</div>
      <div class="option-grid">
        ${chk('periventrikular',T.loc_periventrikular)}
        ${chk('posterior_beyaz',T.loc_posterior_beyaz)}
        ${chk('myelinated',T.loc_myelinated)}
        ${chk('diffuz_beyaz',T.loc_diffuz_beyaz)}
        ${chk('internal_capsule',T.loc_internal_capsule)}
      </div>
    </div>

    <div class="divider"></div>

    <div class="field-group">
      <div class="sublabel">${T.sublabel_korteks}</div>
      <div class="option-grid">
        ${chk('korteks',T.loc_korteks)}
        ${chk('beyin_sapi',T.loc_beyin_sapi)}
        ${chk('serebellum',T.loc_serebellum)}
      </div>
    </div>`;
  }

  else if (state.step === 4) {
    html = `
    <h2>${T.step4_h2}</h2>
    <p class="subtitle">${T.step4_subtitle}</p>
    <div class="field-group">
      <label class="field-label">${T.dwi_label} <span>*</span></label>
      <div class="option-grid">
        ${radio('dwi','yok',T.dwi_yok)}
        ${radio('dwi','olabilir',T.dwi_olabilir)}
        ${radio('dwi','var',T.dwi_var)}
      </div>
    </div>`;
  }

  else if (state.step === 5) {
    html = `
    <h2>${T.step5_h2}</h2>
    <p class="subtitle">${T.step5_subtitle}</p>
    <div class="field-group">
      <label class="field-label">${T.kontrast_label} <span>*</span></label>
      <div class="option-grid">
        ${radio('kontrast','yok',T.kontrast_yok)}
        ${radio('kontrast','minimal',T.kontrast_minimal)}
        ${radio('kontrast','var',T.kontrast_var)}
        ${radio('kontrast','yapilmadi',T.kontrast_yapilmadi)}
      </div>
    </div>`;
  }

  else if (state.step === 6) {
    html = `
    <h2>${T.step6_h2}</h2>
    <p class="subtitle">${T.step6_subtitle}</p>
    <div class="field-group">
      <div class="option-grid">
        ${chk('bilateral',T.ek_bilateral)}
        ${chk('odem',T.ek_odem)}
        ${chk('stroke_like',T.ek_stroke_like)}
        ${chk('korteks_ribbon',T.ek_korteks_ribbon)}
      </div>
    </div>`;
  }

  else if (state.step === 7) {
    const scores = computeScores();
    const top = scores[0];
    const rankClass = ['r1','r2','r3','r4','r5','r5'];

    let dxHtml = scores.map((d, i) => `
      <div class="dx-item">
        <div class="dx-rank ${rankClass[i]}">${i+1}</div>
        <div class="dx-name">${d.name}<br><span style="font-size:.72rem;color:var(--text-muted);font-weight:400">${d.category}</span></div>
        <div class="dx-bar-wrap">
          <div class="dx-score-label">${T.uyum_label}</div>
          <div class="dx-bar"><div class="dx-bar-fill" style="width:${d.pct}%"></div></div>
          <div class="dx-pct">%${d.pct}</div>
        </div>
      </div>`).join('');

    let yorumHtml = scores.slice(0,3).filter(d=>d.pct>10).map((d,i)=>`
      <div class="yorum-card">
        <div class="ytag">${T.yorum_tag(i+1)}</div>
        <div class="yname">${d.name} <span style="color:var(--text-muted);font-size:.78rem">— %${d.pct} ${T.uyum_label}</span></div>
        <div class="ytext">${d.yorum}</div>
      </div>`).join('');

    // Findings summary for report
    const lokList = [
      state.putamen && T.lok_putamen,
      state.basal_gp && T.lok_basal_gp,
      state.thalamus && T.lok_thalamus,
      state.periventrikular && T.lok_periventrikular,
      state.posterior_beyaz && T.lok_posterior_beyaz,
      state.myelinated && T.lok_myelinated,
      state.diffuz_beyaz && T.lok_diffuz_beyaz,
      state.internal_capsule && T.lok_internal_capsule,
      state.korteks && T.lok_korteks,
      state.beyin_sapi && T.lok_beyin_sapi,
      state.serebellum && T.lok_serebellum,
    ].filter(Boolean);

    html = `
    <div class="result-header">
      <h2>${T.step7_h2}</h2>
    </div>
    <div class="dx-list">${dxHtml}</div>
    ${yorumHtml}
    <div class="divider"></div>
    <div class="btn-row" style="justify-content:flex-start;flex-wrap:wrap;gap:8px;margin-top:0">
      <button class="reset-btn" onclick="resetAll()">↺ ${T.yeni_inceleme.replace('↺ ','')}</button>
      <button class="btn btn-primary" onclick="showPrint()">${T.rapor_yazdir}</button>
      <button class="btn btn-outline" onclick="copyReport()">${T.kopyala}</button>
    </div>`;

    // Store for print
    window._printData = { scores, lokList };
  }

  // nav buttons
  if (state.step < 7) {
    const canNext = canProceed();
    html += `<div class="btn-row">
      ${state.step > 0 ? `<button class="btn btn-secondary" onclick="prevStep()">${T.geri}</button>` : ''}
      <button class="btn btn-primary" onclick="nextStep()" ${canNext?'':'disabled style="opacity:.5;cursor:not-allowed"'}>
        ${state.step===6?T.sonuclari_gor:T.ileri}
      </button>
    </div>`;
  } else {
    html += `<div class="btn-row">
      <button class="btn btn-secondary" onclick="prevStep()">${T.geri}</button>
    </div>`;
  }

  card.innerHTML = html;
}

function canProceed() {
  if (state.step===0) return state.yas && state.klinik;
  if (state.step===1) return !!state.t1;
  if (state.step===2) return !!state.t2;
  if (state.step===4) return !!state.dwi;
  if (state.step===5) return !!state.kontrast;
  return true;
}

function nextStep() {
  if (!canProceed()) return;
  state.step = Math.min(state.step+1, 7);
  renderStep();
  window.scrollTo({top:0,behavior:'smooth'});
}

function prevStep() {
  state.step = Math.max(state.step-1, 0);
  renderStep();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetAll() {
  Object.keys(state).forEach(k => {
    if (k==='step') state[k]=0;
    else if (typeof state[k]==='boolean') state[k]=false;
    else state[k]=null;
  });
  renderStep();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ─────────────────────────────────────────────
// PRINT / EXPORT
// ─────────────────────────────────────────────
function getYasLabel(v) {
  return T.yas_labels[v]||v||'—';
}
function getKlinikLabel(v) {
  return T.klinik_labels[v]||v||'—';
}
function getT1Label(v) {
  return T.t1_labels[v]||v||'—';
}
function getT2Label(v) {
  return T.t2_labels[v]||v||'—';
}
function getDWILabel(v) {
  return T.dwi_labels[v]||v||'—';
}
function getKontrastLabel(v) {
  return T.kontrast_labels[v]||v||'—';
}

function buildReportHTML() {
  const {scores, lokList} = window._printData||{scores:[],lokList:[]};
  const now = new Date().toLocaleDateString(T.date_locale,{day:'2-digit',month:'long',year:'numeric'});

  const extraList = [
    state.bilateral && T.extra_bilateral,
    state.odem && T.extra_odem,
    state.stroke_like && T.extra_stroke_like,
    state.korteks_ribbon && T.extra_korteks_ribbon,
    state.gp_t1_hiper && T.extra_gp_t1_hiper,
  ].filter(Boolean);

  const dxRows = scores.slice(0,5).map((d,i)=>`
    <tr>
      <td><strong>${i+1}.</strong> ${d.name}</td>
      <td>${d.category}</td>
      <td style="color:#7c3aed;font-weight:700">%${d.pct}</td>
    </tr>`).join('');

  const yorumBlocks = scores.slice(0,2).filter(d=>d.pct>10).map(d=>`
    <div class="yorum-block">
      <strong>${d.name}</strong><br>${d.yorum}
    </div>`).join('');

  return `
    <h1>${T.print_title}</h1>
    <p><strong>${T.print_tarih}:</strong> ${now} &nbsp;|&nbsp; <strong>${T.print_kurum}:</strong> ${T.print_kurum_val}</p>

    <h2>${T.print_klinik_bilgi}</h2>
    <table>
      <tr><th>${T.print_param}</th><th>${T.print_deger}</th></tr>
      <tr><td>${T.yas_label}</td><td>${getYasLabel(state.yas)}</td></tr>
      <tr><td>${T.klinik_label}</td><td>${getKlinikLabel(state.klinik)}</td></tr>
    </table>

    <h2>${T.print_mri_bulgulari}</h2>
    <table>
      <tr><th>${T.print_sekans}</th><th>${T.print_bulgu}</th></tr>
      <tr><td>T1</td><td>${getT1Label(state.t1)}${state.gp_t1_hiper?' + '+T.extra_gp_t1_hiper:''}</td></tr>
      <tr><td>T2/FLAIR</td><td>${getT2Label(state.t2)}</td></tr>
      <tr><td>DWI/ADC</td><td>${getDWILabel(state.dwi)}</td></tr>
      <tr><td>${T.kontrast_label}</td><td>${getKontrastLabel(state.kontrast)}</td></tr>
      <tr><td>${T.print_lokalizasyon}</td><td>${lokList.length?lokList.join(', '):T.print_belirtilmemis}</td></tr>
      <tr><td>${T.print_ek}</td><td>${extraList.length?extraList.join(', '):'—'}</td></tr>
    </table>

    <h2>${T.print_diff_tani}</h2>
    <table>
      <tr><th>${T.print_tani}</th><th>${T.print_kategori}</th><th>${T.uyum_label}</th></tr>
      ${dxRows}
    </table>

    ${yorumBlocks}

    <p style="margin-top:14px;font-size:11px;color:#374151"><strong>${T.print_not}:</strong> ${T.print_not_val}</p>
    <div class="footer">${T.print_footer}</div>`;
}

function showPrint() {
  document.getElementById('printSheet').innerHTML = buildReportHTML();
  document.getElementById('printOverlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closePrint() {
  document.getElementById('printOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

function copyReport() {
  const el = document.getElementById('printSheet');
  if (!el.innerHTML) el.innerHTML = buildReportHTML();

  try {
    const range = document.createRange();
    range.selectNode(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    alert(T.copy_success);
  } catch(e) {
    alert(T.copy_fail);
  }
}

// Init
renderStep();
</script>

</html>
