/* ===== WEIGHTS ===== */
var W = {t1:2, t2:3, io:3, dwi:5, adc:5, art:3, pv:2, lat:1, sh:3, hil:4, cor:3};
var MAX_SC = 0;
(function(){var ks=Object.keys(W);for(var i=0;i<ks.length;i++) MAX_SC += W[ks[i]]*2;})();

function calcDiff(nd) {
  var res = [];
  for (var i = 0; i < DIFFS.length; i++) {
    var dd = DIFFS[i], sc = 0;
    function chk(val, exact, partial, w) {
      if (!val) return;
      if (exact.indexOf(val) >= 0) sc += w * 2;
      else if (partial.indexOf(val) >= 0) sc += w;
    }
    chk(nd.t1, dd.t1e, dd.t1p, W.t1);
    chk(nd.t2, dd.t2e, dd.t2p, W.t2);
    chk(nd.io, dd.ioe, dd.iop, W.io);
    chk(nd.dwi, dd.dwe, dd.dwp, W.dwi);
    chk(nd.adc, dd.adce, dd.adcp, W.adc);
    chk(nd.art, dd.arte, dd.artp, W.art);
    chk(nd.pv, dd.pve, dd.pvp, W.pv);
    chk(nd.lat, dd.late, dd.latp, W.lat);
    chk(nd.shape, dd.she, dd.shp, W.sh);
    chk(nd.hilus, dd.hile, dd.hilp, W.hil);
    chk(nd.cortex, dd.core, dd.corp, W.cor);
    var pct = Math.round((sc / MAX_SC) * 100);
    if (pct > 10) res.push({name:dd.name, pct:pct, sev:dd.sev, desc:dd.desc, keys:dd.keys});
  }
  res.sort(function(a, b) { return b.pct - a.pct; });
  return res;
}

function pctCol(p) { return p>=65?'var(--rd)':p>=45?'var(--or)':p>=30?'var(--yl)':'var(--gn)'; }

function Row(p){return React.createElement('tr',null,React.createElement('td',{className:'tl'},p.l),React.createElement('td',{className:'tv'},p.v||'\u2014'))}

function DiffResult(p) {
  var r = p.results;
  if (!r||r.length===0) return React.createElement('div',{style:{color:'var(--txd)',fontSize:'.8rem',padding:8}},'Yeterli veri yok.');
  return React.createElement('div',null,r.slice(0,6).map(function(d,i){
    var col=pctCol(d.pct), top=i===0&&d.pct>=35;
    return React.createElement('div',{key:i,className:'dr',style:{borderLeftColor:col,background:top?'rgba(109,159,255,.06)':undefined}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6}},
        React.createElement('span',{style:{fontSize:'.78rem',fontWeight:700,color:col}},'%'+d.pct),
        React.createElement('span',{style:{fontSize:'.84rem',fontWeight:top?700:600,color:top?'var(--txb)':'var(--tx)'}},d.name),
        d.sev>=70?React.createElement('span',{style:{fontSize:'.62rem',padding:'1px 6px',borderRadius:4,background:'rgba(248,113,113,.15)',color:'var(--rd)',fontWeight:700,marginLeft:4}},'MALİGN'):
        d.sev>=40?React.createElement('span',{style:{fontSize:'.62rem',padding:'1px 6px',borderRadius:4,background:'rgba(251,146,60,.12)',color:'var(--or)',fontWeight:700,marginLeft:4}},'ŞÜPHELİ'):
        d.sev<=5?React.createElement('span',{style:{fontSize:'.62rem',padding:'1px 6px',borderRadius:4,background:'rgba(52,211,153,.12)',color:'var(--gn)',fontWeight:700,marginLeft:4}},'BENİGN'):null
      ),
      React.createElement('div',{className:'dr-bar'},React.createElement('div',{className:'dr-fill',style:{width:d.pct+'%',background:col}})),
      React.createElement('div',{className:'dr-desc'},d.desc),
      React.createElement('div',{className:'dr-keys'},d.keys.map(function(k,j){return React.createElement('span',{key:j,className:'dr-key'},k)}))
    );
  }));
}

/* ===== APP ===== */
function App() {
  var _s=useState(0),step=_s[0],setStep=_s[1];
  var _n=useState([]),nods=_n[0],setNods=_n[1];
  var _ni=useState(-1),nIdx=_ni[0],setNIdx=_ni[1];
  var _ns=useState(0),nSub=_ns[0],setNSub=_ns[1];

  var sn=STEPS[step],total=STEPS.length,pct=((step+1)/total)*100;

  function addNod(){
    var n={region:'',side:'',kisa:'',uzun:'',shape:'',hilus:'',cortex:'',t1:'',t2:'',io:'',dwi:'',adc:'',art:'',pv:'',lat:''};
    setNods(function(p){return p.concat([n])});
    setNIdx(nods.length);setNSub(0);
  }
  function setNF(k,v){setNods(function(p){var c=p.slice();c[nIdx]={};for(var x in p[nIdx])c[nIdx][x]=p[nIdx][x];c[nIdx][k]=v;return c})}
  function finNod(){setNIdx(-1);setNSub(0)}
  function rmNod(i){setNods(function(p){return p.filter(function(_,j){return j!==i})})}

  function ix(name){return STEPS.indexOf(name)}

  function canNext(){
    if(sn==='nodPre') return true;
    if(sn==='nodLoop'){
      if(nIdx<0) return true;
      var nd=nods[nIdx]; if(!nd) return true;
      var cs=NOD_SUB[nSub];
      if(cs==='sonuc') return true;
      if(cs==='region') return !!nd.region;
      if(cs==='side') return !!nd.side;
      if(cs==='kisa') return !!nd.kisa;
      if(cs==='uzun') return !!nd.uzun;
      if(cs==='shape') return !!nd.shape;
      if(cs==='hilus') return !!nd.hilus;
      if(cs==='cortex') return !!nd.cortex;
      if(cs==='t1') return !!nd.t1;
      if(cs==='t2') return !!nd.t2;
      if(cs==='io') return !!nd.io;
      if(cs==='dwi') return !!nd.dwi;
      if(cs==='adc') return !!nd.adc;
      if(cs==='art') return !!nd.art;
      if(cs==='pv') return !!nd.pv;
      if(cs==='lat') return !!nd.lat;
      return true;
    }
    return true;
  }

  function goNext(){
    if(sn==='nodPre'){
      if(nIdx===-1){setStep(ix('nodPost'));return}
      setStep(ix('nodLoop'));return;
    }
    if(sn==='nodLoop'){
      var last=NOD_SUB.length-1;
      if(nIdx>=0&&nSub<last){setNSub(nSub+1);return}
      finNod();setStep(ix('nodPost'));return;
    }
    setStep(Math.min(step+1,total-1));
  }
  function goPrev(){
    if(sn==='nodLoop'){if(nSub>0){setNSub(nSub-1);return}setStep(ix('nodPre'));return}
    if(sn==='nodPost'){setStep(ix('nodPre'));return}
    setStep(Math.max(step-1,0));
  }

  /* ===== RENDER ===== */
  function renderStep(){
    switch(sn){
      case 'nodPre':
        return React.createElement(SW,{n:1,t:'Lenf Nodu Değerlendirmesi',s:'Patolojik lenf nodlarını ekleyin'},
          React.createElement('div',{className:'lb'},
            nods.map(function(n,i){return React.createElement('div',{key:i,className:'lc dn',onClick:function(){setNIdx(i);setNSub(0);setStep(ix('nodLoop'))}},
              'Nod '+(i+1)+(n.kisa?' ('+n.kisa+'mm)':'')+(n.region?' \u2014 '+n.region:''))}),
            React.createElement('div',{className:'lc la',onClick:function(){addNod();setStep(ix('nodLoop'))}},'+ Lenf Nodu Ekle')
          ),
          nods.length===0?React.createElement('div',{style:{color:'var(--txd)',fontSize:'.82rem',padding:8}},'Patolojik lenf nodu yoksa rapora ilerleyin.'):null
        );

      case 'nodLoop':{
        if(nIdx<0||!nods[nIdx]) return null;
        var nd=nods[nIdx],cs=NOD_SUB[nSub];
        var diffRes=calcDiff(nd);
        var lbl={region:'Anatomik Bölge',side:'Taraf',kisa:'Kısa Aks',uzun:'Uzun Aks',shape:'Morfoloji (Şekil)',hilus:'Hilus Durumu',cortex:'Korteks',t1:'T1A Sinyal',t2:'T2A Sinyal',io:'In-Phase / Out-Phase',dwi:'DWI',adc:'ADC',art:'Arterial Faz',pv:'Portal Venöz Faz',lat:'Geç Faz',sonuc:'Ayırıcı Tanı Sonucu'};
        var content=null;

        if(cs==='region'){
          var regionEls = REGIONS.map(function(g){
            return React.createElement('div',{key:g.g,style:{marginBottom:10}},
              React.createElement('div',{style:{fontSize:'.76rem',fontWeight:700,color:'var(--ac)',marginBottom:4}},g.g),
              React.createElement('div',{className:'og'},g.r.map(function(r){
                return React.createElement('div',{key:r,className:'ob'+(nd.region===r?' sel':''),onClick:function(){setNF('region',r)}},r);
              })));
          });
          content = React.createElement('div',null,regionEls);
        }
        else if(cs==='side') content=React.createElement(Radio,{options:['Sağ','Sol','Bilateral','Midline'],value:nd.side,onChange:function(v){setNF('side',v)}});
        else if(cs==='kisa') content=React.createElement('div',null,
          React.createElement('div',{className:'fl'},'Kısa aks ölçümü'),
          React.createElement(NumIn,{value:nd.kisa,onChange:function(v){setNF('kisa',v)}}));
        else if(cs==='uzun') content=React.createElement('div',null,
          React.createElement('div',{className:'fl'},'Uzun aks ölçümü'),
          React.createElement(NumIn,{value:nd.uzun,onChange:function(v){setNF('uzun',v)}}));
        else if(cs==='shape') content=React.createElement('div',null,
          React.createElement('div',{className:'morph-grid'},SHAPES.map(function(s){
            return React.createElement('div',{key:s,className:'morph-item'+(nd.shape===s?' sel':''),onClick:function(){setNF('shape',s)}},
              React.createElement('div',{className:'mi-label'},s.split('(')[0].trim()),
              React.createElement('div',{className:'mi-sub'},s.includes('(')?'('+s.split('(')[1]:''));
          })),
          nd.kisa && nd.uzun ? React.createElement('div',{style:{marginTop:8,fontSize:'.78rem',color:'var(--txd)'}},
            'Hesaplanan oran: '+(parseFloat(nd.uzun)/parseFloat(nd.kisa)).toFixed(2)+
            (parseFloat(nd.uzun)/parseFloat(nd.kisa)>=2?' (Oval)':' (Yuvarlak)')
          ):null);
        else if(cs==='hilus') content=React.createElement('div',{className:'morph-grid',style:{gridTemplateColumns:'1fr'}},HILUS.map(function(h){
          return React.createElement('div',{key:h,className:'morph-item'+(nd.hilus===h?' sel':''),onClick:function(){setNF('hilus',h)}},
            React.createElement('div',{className:'mi-label'},h.split('(')[0].trim()),
            h.includes('(')?React.createElement('div',{className:'mi-sub'},'('+h.split('(')[1]):null);}));
        else if(cs==='cortex') content=React.createElement(Radio,{options:CORTEX,value:nd.cortex,onChange:function(v){setNF('cortex',v)}});
        else if(cs==='t1') content=React.createElement(Radio,{options:T1_OPTS,value:nd.t1,onChange:function(v){setNF('t1',v)}});
        else if(cs==='t2') content=React.createElement(Radio,{options:T2_OPTS,value:nd.t2,onChange:function(v){setNF('t2',v)}});
        else if(cs==='io') content=React.createElement(Radio,{options:IO_OPTS,value:nd.io,onChange:function(v){setNF('io',v)}});
        else if(cs==='dwi') content=React.createElement(Radio,{options:DWI_OPTS,value:nd.dwi,onChange:function(v){setNF('dwi',v)}});
        else if(cs==='adc') content=React.createElement(Radio,{options:ADC_OPTS,value:nd.adc,onChange:function(v){setNF('adc',v)}});
        else if(cs==='art') content=React.createElement(Radio,{options:ART_OPTS,value:nd.art,onChange:function(v){setNF('art',v)}});
        else if(cs==='pv') content=React.createElement(Radio,{options:PV_OPTS,value:nd.pv,onChange:function(v){setNF('pv',v)}});
        else if(cs==='lat') content=React.createElement(Radio,{options:LATE_OPTS,value:nd.lat,onChange:function(v){setNF('lat',v)}});
        else if(cs==='sonuc') content=React.createElement('div',null,
          React.createElement('div',{style:{fontSize:'.86rem',fontWeight:700,color:'var(--ac)',marginBottom:10}},'Nod '+(nIdx+1)+' \u2014 Ayırıcı Tanı Eşleştirmesi'),
          React.createElement(DiffResult,{results:diffRes}),
          React.createElement('div',{style:{marginTop:14,display:'flex',gap:8}},
            React.createElement('button',{className:'btn bn',style:{fontSize:'.8rem',padding:'7px 16px'},onClick:function(){finNod();setStep(ix('nodPre'))}},'Nod Listesine Dön'),
            React.createElement('button',{className:'btn bs',style:{fontSize:'.8rem',padding:'7px 16px'},onClick:function(){finNod();addNod();setNSub(0)}},'+ Yeni Nod Ekle')
          ));

        return React.createElement(SW,{n:1,t:'Nod '+(nIdx+1)+' \u2014 '+lbl[cs],s:'Alt adım '+(nSub+1)+'/'+NOD_SUB.length},content);
      }

      case 'nodPost':
        return React.createElement(SW,{n:1,t:'Lenf Nodu Özeti',s:'Toplam '+nods.length+' lenf nodu'},
          nods.map(function(n,i){
            var dr=calcDiff(n),top=dr.length>0?dr[0]:null;
            return React.createElement('div',{key:i,style:{background:'var(--sf2)',borderRadius:8,padding:12,marginBottom:8,fontSize:'.8rem'}},
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
                React.createElement('strong',{style:{color:'var(--ac)'}},'Nod '+(i+1)+': '+n.region+' ('+n.side+')'),
                React.createElement('span',{style:{color:'var(--rd)',cursor:'pointer',fontSize:'.72rem'},onClick:function(){rmNod(i)}},'\u2715 Sil')
              ),
              React.createElement('div',{style:{marginTop:3}},'Kısa: '+n.kisa+'mm | Uzun: '+n.uzun+'mm | '+n.shape.split('(')[0].trim()+' | Hilus: '+n.hilus.split('(')[0].trim()),
              React.createElement('div',{style:{marginTop:2}},'T1:'+n.t1+' | T2:'+n.t2+' | DWI:'+n.dwi+' | ADC:'+n.adc),
              top?React.createElement('div',{style:{marginTop:4,padding:'4px 8px',background:'rgba(109,159,255,.08)',borderRadius:4,fontSize:'.76rem'}},
                React.createElement('span',{style:{color:pctCol(top.pct),fontWeight:700}},'%'+top.pct+' '),
                React.createElement('span',{style:{color:'var(--txb)'}},top.name),
                top.sev>=70?React.createElement('span',{style:{marginLeft:6,fontSize:'.62rem',color:'var(--rd)',fontWeight:700}},'MALİGN'):null):null
            );
          }),
          React.createElement('div',{style:{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}},
            React.createElement('div',{className:'lc la',onClick:function(){addNod();setStep(ix('nodLoop'))}},'+ Başka Nod Ekle'),
            React.createElement('button',{className:'btn bn',style:{fontSize:'.82rem',padding:'8px 20px'},onClick:function(){setStep(ix('rapor'))}},'\uD83D\uDCCB Rapor Oluştur')
          )
        );

      case 'rapor': return renderReport();
      default: return null;
    }
  }

  /* ===== REPORT ===== */
  function renderReport(){
    var els=[];
    els.push(React.createElement('h2',{key:'hd'},'LENF NODU MRI \u2014 YAPISAL RAPOR'));

    if(nods.length===0){
      els.push(React.createElement('table',{key:'t0',className:'rt'},React.createElement('tbody',null,React.createElement(Row,{l:'Lenf Nodları',v:'Patolojik lenf nodu saptanmamıştır.'}))));
    } else {
      nods.forEach(function(n,i){
        els.push(React.createElement('h3',{key:'h'+i},'Nod '+(i+1)+': '+n.region+' ('+n.side+')'));
        els.push(React.createElement('table',{key:'t'+i,className:'rt'},React.createElement('tbody',null,
          React.createElement(Row,{l:'Bölge / Taraf',v:n.region+' \u2014 '+n.side}),
          React.createElement(Row,{l:'Kısa Aks / Uzun Aks',v:n.kisa+'mm / '+n.uzun+'mm'}),
          React.createElement(Row,{l:'Morfoloji',v:n.shape}),
          React.createElement(Row,{l:'Hilus',v:n.hilus}),
          React.createElement(Row,{l:'Korteks',v:n.cortex}),
          React.createElement(Row,{l:'T1A / T2A',v:n.t1+' / '+n.t2}),
          React.createElement(Row,{l:'In/Out-Phase',v:n.io}),
          React.createElement(Row,{l:'DWI / ADC',v:n.dwi+' / '+n.adc}),
          React.createElement(Row,{l:'Arterial / PV / Geç',v:n.art+' / '+n.pv+' / '+n.lat})
        )));
        var dr=calcDiff(n);
        if(dr.length>0){
          els.push(React.createElement('div',{key:'dr'+i,style:{marginBottom:14}},
            React.createElement('div',{style:{fontSize:'.82rem',fontWeight:700,color:'var(--ac)',marginBottom:6,marginTop:4}},'Nod '+(i+1)+' \u2014 Ayırıcı Tanı'),
            React.createElement(DiffResult,{results:dr})));
        }
      });

      // YORUM
      var yorumlar = makeYorumlar();
      if(yorumlar.length>0){
        els.push(React.createElement('h3',{key:'hy'},'YORUM'));
        yorumlar.forEach(function(y,i){
          els.push(React.createElement('div',{key:'y'+i,className:'yb',style:{borderLeftColor:y.c}},
            React.createElement('div',{className:'yt',style:{color:y.c}},y.t),
            React.createElement('div',{className:'yx'},y.x)));
        });
      }
    }

    els.push(React.createElement('div',{key:'exp',className:'er'},
      React.createElement('button',{className:'be',onClick:function(){window.print()}},'\uD83D\uDDA8 PDF Yazdır'),
      React.createElement('button',{className:'be',onClick:copyRpt},'\uD83D\uDCCB Kopyala'),
      React.createElement('button',{className:'be',onClick:exportHTML},'\uD83D\uDCE5 HTML İndir')
    ));

    return React.createElement('div',{className:'rp',id:'rpt-content'},els);
  }

  function makeYorumlar(){
    var y=[];
    nods.forEach(function(n,i){
      var dr=calcDiff(n);
      if(dr.length===0) return;
      var top=dr[0];
      var col=top.sev>=70?'var(--rd)':top.sev>=40?'var(--or)':top.sev>=20?'var(--yl)':'var(--gn)';

      // Size criteria
      var kisa=parseFloat(n.kisa)||0;
      var sizeWarn='';
      if(n.region.indexOf('Juguler')>=0||n.region.indexOf('Submandibular')>=0||n.region.indexOf('Submental')>=0){
        if(kisa>10) sizeWarn=' Kısa aks boyut kriteri aşılmıştır (boyun: 10mm sınırı).';
      } else if(n.region.indexOf('Retrofaringeal')>=0){
        if(kisa>8) sizeWarn=' Retrofaringeal bölgede 8mm sınırı aşılmıştır.';
      } else if(n.region.indexOf('Inguinal')>=0){
        if(kisa>15) sizeWarn=' İnguinal bölgede 15mm sınırı aşılmıştır.';
      } else if(n.region.indexOf('Mediastinal')>=0||n.region.indexOf('Hiler')>=0){
        if(kisa>10) sizeWarn=' Mediastinal/hiler bölgede 10mm sınırı aşılmıştır.';
      } else {
        if(kisa>10) sizeWarn=' Kısa aks 10mm sınırını aşmıştır.';
      }

      var txt='Nod '+(i+1)+' ('+n.region+', '+n.side+', kısa aks '+n.kisa+'mm): Sinyal profili en çok '+top.name+' ile uyumludur (%'+top.pct+' eşleşme).'+sizeWarn;
      if(top.sev>=70) txt+=' MALİGNİTE AÇISINDAN DİKKATLİ DEĞERLENDİRİLMELİDİR.';
      if(dr.length>1) txt+=' Ayırıcı tanıda '+dr[1].name+' (%'+dr[1].pct+') de düşünülmelidir.';

      // ADC rule
      if(n.adc==='Çok düşük') txt+=' ADC değeri çok düşük olup lenfoma olasılığı yüksektir.';
      else if(n.adc==='Düşük') txt+=' ADC değeri düşük olup malignite olasılığı artmıştır.';

      // Hilus rule
      if(n.hilus==='Korunmuş (yağlı hilus mevcut)') txt+=' Yağlı hilusun korunması benign lehine bulgudur.';

      // Morphology rule
      if(n.shape.indexOf('Yuvarlak')>=0 && n.hilus==='Kaybolmuş') txt+=' Yuvarlak morfoloji + hilus kaybı malignite lehine önemli morfolojik bulgulardır.';

      y.push({t:'Nod '+(i+1)+': '+top.name+' (%'+top.pct+')',x:txt,c:col});
    });
    return y;
  }

  function copyRpt(){
    var el=document.getElementById('rpt-content');if(!el)return;
    var ta=document.createElement('textarea');ta.style.position='fixed';ta.style.left='-9999px';
    ta.value=el.innerText;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);alert('Rapor panoya kopyalandı!');
  }

  function exportHTML(){
    var el=document.getElementById('rpt-content');if(!el)return;
    var css='body{font-family:Segoe UI,system-ui,sans-serif;background:#fff;color:#111;padding:24px;max-width:900px;margin:0 auto}'
      +'h2{font-size:1.1rem;color:#4a7adf;border-bottom:2px solid #4a7adf;padding-bottom:6px;margin-bottom:16px}'
      +'h3{font-size:.9rem;background:#4a7adf;color:#fff;padding:6px 10px;border-radius:6px;margin:16px 0 8px}'
      +'table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:.82rem}'
      +'th{text-align:left;padding:6px 10px;background:#4a7adf;color:#fff;border:1px solid #ddd}'
      +'td{padding:6px 10px;border:1px solid #ddd}'
      +'tr:nth-child(even) td{background:#f4f4f8}'
      +'.tl{color:#666;width:38%}.tv{color:#111;font-weight:600}'
      +'.dr{background:#f8f8fc;border-left:3px solid #4a7adf;border-radius:0 6px 6px 0;padding:10px;margin:6px 0}'
      +'.dr-bar{height:6px;border-radius:3px;background:#eee;overflow:hidden;margin:4px 0}'
      +'.dr-fill{height:100%;border-radius:3px}'
      +'.dr-desc{font-size:.74rem;color:#666;margin-top:4px}'
      +'.dr-keys{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}'
      +'.dr-key{font-size:.65rem;padding:2px 6px;border-radius:3px;background:#e8eeff;color:#4a7adf}'
      +'.yb{background:#f8f8fc;border-left:3px solid #4a7adf;border-radius:0 6px 6px 0;padding:12px;margin:8px 0}'
      +'.yt{font-size:.84rem;font-weight:700;margin-bottom:4px}'
      +'.yx{font-size:.8rem;line-height:1.5}'
      +'.er{display:none}';
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Lenf Nodu MRI Rapor</title><style>'+css+'</style></head><body>'+el.innerHTML+'</body></html>';
    var blob=new Blob([html],{type:'text/html'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='lenf_nodu_mri_rapor.html';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  var nextLbl='İleri \u2192';
  if(sn==='nodLoop') nextLbl=nSub>=NOD_SUB.length-1?'Tamamla \u2713':'Sonraki \u2192';

  return React.createElement('div',{className:'wrap'},
    React.createElement('div',{className:'hdr'},React.createElement('h1',null,'Lenf Nodu MRI Karar Destek Sistemi')),
    React.createElement('div',{className:'pb'},React.createElement('div',{className:'pf',style:{width:pct+'%'}})),
    renderStep(),
    sn!=='rapor'?React.createElement('div',{className:'nr'},
      React.createElement('button',{className:'btn bp',onClick:goPrev,disabled:step===0&&(sn!=='nodLoop'||nSub===0)},'\u2190 Geri'),
      React.createElement('span',{style:{color:'var(--txd)',fontSize:'.76rem'}},(step+1)+'/'+total),
      React.createElement('button',{className:'btn bn',onClick:goNext,disabled:!canNext()},nextLbl)
    ):React.createElement('div',{className:'nr'},
      React.createElement('button',{className:'btn bp',onClick:goPrev},'\u2190 Düzenle'),
      React.createElement('button',{className:'btn bs',onClick:function(){setStep(0);setNods([]);setNIdx(-1);}},'\uD83D\uDD04 Yeni'))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
