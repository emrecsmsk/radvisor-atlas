<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0c0b14;--sf:#161525;--sf2:#1e1d30;--bd:#2a2845;
--ac:#6d9fff;--ac2:#4a7adf;--acg:rgba(109,159,255,.12);
--tx:#dde0f0;--txd:#7f82a0;--txb:#fff;
--gn:#34d399;--rd:#f87171;--or:#fb923c;--yl:#fbbf24;--bl:#60a5fa;--pk:#c084fc;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.wrap{max-width:920px;margin:0 auto;padding:16px}
.hdr{text-align:center;padding:18px 0;border-bottom:1px solid var(--bd);margin-bottom:18px}
.hdr h1{font-size:1.35rem;color:var(--ac);font-weight:700;letter-spacing:.3px}
.pb{width:100%;height:4px;background:var(--sf2);border-radius:2px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--ac2),var(--ac));border-radius:2px;transition:width .4s}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:12px;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sn{display:inline-block;background:var(--ac2);color:#fff;font-size:.66rem;padding:2px 8px;border-radius:10px;margin-bottom:5px;font-weight:600}
.st{font-size:1rem;font-weight:600;color:var(--txb);margin-bottom:2px}
.ss{color:var(--txd);font-size:.78rem;margin-bottom:12px}
.og{display:flex;flex-wrap:wrap;gap:6px}
.ob{padding:8px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);cursor:pointer;font-size:.82rem;transition:all .15s;user-select:none}
.ob:hover{border-color:var(--ac);background:var(--acg)}
.ob.sel{border-color:var(--ac);background:var(--ac);color:#fff;font-weight:600}
.ni{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:.88rem;width:100px;outline:none}
.ni:focus{border-color:var(--ac)}
.ir{display:flex;align-items:center;gap:6px}
.iu{color:var(--txd);font-size:.8rem}
.fl{color:var(--txd);font-size:.78rem;margin-bottom:4px;margin-top:10px}
.fl:first-child{margin-top:0}
.nr{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)}
.btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.84rem;font-weight:600;transition:all .15s}
.bp{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}.bp:hover{border-color:var(--ac)}
.bn{background:var(--ac);color:#fff}.bn:hover{background:var(--ac2)}.bn:disabled{opacity:.3;cursor:not-allowed}
.bs{background:#16a34a;color:#fff}
.lb{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.lc{padding:5px 12px;border-radius:14px;font-size:.74rem;border:1px solid var(--bd);background:var(--sf2);color:var(--txd);cursor:pointer;transition:all .15s}
.lc.dn{border-color:var(--gn);color:var(--gn)}
.la{border-color:var(--gn);color:var(--gn)}.la:hover{background:rgba(52,211,153,.1)}
.rp{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:12px}
.rp h2{font-size:1.05rem;color:var(--ac);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.rp h3{font-size:.88rem;color:var(--txb);margin:14px 0 6px;padding:6px 10px;background:var(--ac2);border-radius:6px}
.rt{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:.8rem}
.rt th{text-align:left;padding:6px 10px;background:var(--ac2);color:#fff;font-weight:600;border:1px solid var(--bd)}
.rt td{padding:6px 10px;border:1px solid var(--bd)}
.rt tr:nth-child(even) td{background:var(--sf2)}.rt tr:nth-child(odd) td{background:var(--sf)}
.tl{color:var(--txd);width:38%;font-weight:500}.tv{color:var(--txb);font-weight:600}
.dr{background:var(--sf2);border-radius:8px;padding:12px;margin:6px 0;border-left:3px solid var(--ac)}
.dr-bar{height:8px;border-radius:4px;background:var(--sf);overflow:hidden;margin:4px 0}
.dr-fill{height:100%;border-radius:4px;transition:width .6s}
.dr-desc{font-size:.74rem;color:var(--txd);margin-top:4px;line-height:1.4}
.dr-keys{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.dr-key{font-size:.66rem;padding:2px 6px;border-radius:4px;background:rgba(109,159,255,.1);color:var(--ac)}
.yb{background:var(--sf2);border-left:3px solid var(--ac);border-radius:0 8px 8px 0;padding:14px;margin:10px 0}
.yt{font-size:.84rem;font-weight:700;margin-bottom:5px}
.yx{font-size:.8rem;line-height:1.5}
.er{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.be{padding:7px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);cursor:pointer;font-size:.78rem;transition:all .15s}.be:hover{border-color:var(--ac);color:var(--ac)}
.morph-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.morph-item{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all .15s;font-size:.82rem}
.morph-item:hover{border-color:var(--ac)}
.morph-item.sel{border-color:var(--ac);background:var(--acg);color:var(--txb);font-weight:600}
.morph-item .mi-label{font-weight:600;margin-bottom:2px}
.morph-item .mi-sub{font-size:.7rem;color:var(--txd)}
@media print{
body{background:#fff;color:#000}
.nr,.er,.lb,.btn,.pb,.hdr,.sn{display:none!important}
.cd,.rp,.yb,.dr{border:1px solid #ccc;background:#fff;color:#000}
.rt th{background:#4a7adf;color:#fff}.rt td{color:#000}
}
</style>

var MAX_SC = 0;
(function(){var ks=Object.keys(W);for(var i=0;i<ks.length;i++) MAX_SC += W[ks[i]]*2;})();

function calcDiff(nd) {
  var res = [];
  for (var i = 0; i < DIFFS.length; i++) {
    var dd = DIFFS[i], sc = 0;
    function chk(val, exact, partial, w) {
      if (!val) return;
      if (exact.indexOf(val) >= 0) sc += w * 2;
      else if (partial.indexOf(val) >= 0) sc += w;
    }
    chk(nd.t1, dd.t1e, dd.t1p, W.t1);
    chk(nd.t2, dd.t2e, dd.t2p, W.t2);
    chk(nd.io, dd.ioe, dd.iop, W.io);
    chk(nd.dwi, dd.dwe, dd.dwp, W.dwi);
    chk(nd.adc, dd.adce, dd.adcp, W.adc);
    chk(nd.art, dd.arte, dd.artp, W.art);
    chk(nd.pv, dd.pve, dd.pvp, W.pv);
    chk(nd.lat, dd.late, dd.latp, W.lat);
    chk(nd.shape, dd.she, dd.shp, W.sh);
    chk(nd.hilus, dd.hile, dd.hilp, W.hil);
    chk(nd.cortex, dd.core, dd.corp, W.cor);
    var pct = Math.round((sc / MAX_SC) * 100);
    if (pct > 10) res.push({name:dd.name, pct:pct, sev:dd.sev, desc:dd.desc, keys:dd.keys});
  }
  res.sort(function(a, b) { return b.pct - a.pct; });
  return res;
}

          React.createElement('div',{style:{fontSize:'.86rem',fontWeight:700,color:'var(--ac)',marginBottom:10}},T.diffMatchTitle(nIdx+1)),
          React.createElement(DiffResult,{results:diffRes}),
          React.createElement('div',{style:{marginTop:14,display:'flex',gap:8}},
            React.createElement('button',{className:'btn bn',style:{fontSize:'.8rem',padding:'7px 16px'},onClick:function(){finNod();setStep(ix('nodPre'))}},T.backToList),
            React.createElement('button',{className:'btn bs',style:{fontSize:'.8rem',padding:'7px 16px'},onClick:function(){finNod();addNod();setNSub(0)}},T.addNewNode)
          ));

        return React.createElement(SW,{n:1,t:T.nodTitle(nIdx+1,lbl[cs]),s:T.nodSubStep(nSub+1,NOD_SUB.length)},content);
      }

      case 'nodPost':
        return React.createElement(SW,{n:1,t:T.stepLabelNodeSummary,s:T.stepSubNodeSummary(nods.length)},
          nods.map(function(n,i){
            var dr=calcDiff(n),top=dr.length>0?dr[0]:null;
            return React.createElement('div',{key:i,style:{background:'var(--sf2)',borderRadius:8,padding:12,marginBottom:8,fontSize:'.8rem'}},
              React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
                React.createElement('strong',{style:{color:'var(--ac)'}},T.nodLabel(i+1)+': '+n.region+' ('+n.side+')'),
                React.createElement('span',{style:{color:'var(--rd)',cursor:'pointer',fontSize:'.72rem'},onClick:function(){rmNod(i)}},T.delete)
              ),
              React.createElement('div',{style:{marginTop:3}},T.fieldShortAxis+': '+n.kisa+'mm | '+T.fieldLongAxis+': '+n.uzun+'mm | '+n.shape.split('(')[0].trim()+' | '+T.labelHilus+': '+n.hilus.split('(')[0].trim()),
              React.createElement('div',{style:{marginTop:2}},'T1:'+n.t1+' | T2:'+n.t2+' | DWI:'+n.dwi+' | ADC:'+n.adc),
              top?React.createElement('div',{style:{marginTop:4,padding:'4px 8px',background:'rgba(109,159,255,.08)',borderRadius:4,fontSize:'.76rem'}},
                React.createElement('span',{style:{color:pctCol(top.pct),fontWeight:700}},'%'+top.pct+' '),
                React.createElement('span',{style:{color:'var(--txb)'}},top.name),
                top.sev>=70?React.createElement('span',{style:{marginLeft:6,fontSize:'.62rem',color:'var(--rd)',fontWeight:700}},T.malign):null):null
            );
          }),
          React.createElement('div',{style:{marginTop:12,display:'flex',gap:8,flexWrap:'wrap'}},
            React.createElement('div',{className:'lc la',onClick:function(){addNod();setStep(ix('nodLoop'))}},T.addAnotherNode),
            React.createElement('button',{className:'btn bn',style:{fontSize:'.82rem',padding:'8px 20px'},onClick:function(){setStep(ix('rapor'))}},T.createReport)
          )
        );

      case 'rapor': return renderReport();
      default: return null;
    }
  }

  /* ===== REPORT ===== */
  function renderReport(){
    var els=[];
    els.push(React.createElement('h2',{key:'hd'},T.reportTitle));

    if(nods.length===0){
      els.push(React.createElement('table',{key:'t0',className:'rt'},React.createElement('tbody',null,React.createElement(Row,{l:T.nodLabel(1).replace('1',''),v:T.noPathNodesReport}))));
    } else {
      nods.forEach(function(n,i){
        els.push(React.createElement('h3',{key:'h'+i},T.nodLabel(i+1)+': '+n.region+' ('+n.side+')'));
        els.push(React.createElement('table',{key:'t'+i,className:'rt'},React.createElement('tbody',null,
          React.createElement(Row,{l:T.labelRegion,v:n.region+' \u2014 '+n.side}),
          React.createElement(Row,{l:T.labelAxes,v:n.kisa+'mm / '+n.uzun+'mm'}),
          React.createElement(Row,{l:T.labelMorphology,v:n.shape}),
          React.createElement(Row,{l:T.labelHilus,v:n.hilus}),
          React.createElement(Row,{l:T.labelCortex,v:n.cortex}),
          React.createElement(Row,{l:T.labelT1T2,v:n.t1+' / '+n.t2}),
          React.createElement(Row,{l:T.labelInOut,v:n.io}),
          React.createElement(Row,{l:T.labelDwiAdc,v:n.dwi+' / '+n.adc}),
          React.createElement(Row,{l:T.labelContrast,v:n.art+' / '+n.pv+' / '+n.lat})
        )));
        var dr=calcDiff(n);
        if(dr.length>0){
          els.push(React.createElement('div',{key:'dr'+i,style:{marginBottom:14}},
            React.createElement('div',{style:{fontSize:'.82rem',fontWeight:700,color:'var(--ac)',marginBottom:6,marginTop:4}},T.diffTitle(i+1)),
            React.createElement(DiffResult,{results:dr})));
        }
      });

      var yorumlar = makeYorumlar();
      if(yorumlar.length>0){
        els.push(React.createElement('h3',{key:'hy'},T.labelComment));
        yorumlar.forEach(function(y,i){
          els.push(React.createElement('div',{key:'y'+i,className:'yb',style:{borderLeftColor:y.c}},
            React.createElement('div',{className:'yt',style:{color:y.c}},y.t),
            React.createElement('div',{className:'yx'},y.x)));
        });
      }
    }

    els.push(React.createElement('div',{key:'exp',className:'er'},
      React.createElement('button',{className:'be',onClick:function(){window.print()}},T.printPdf),
      React.createElement('button',{className:'be',onClick:copyRpt},T.copyReport),
      React.createElement('button',{className:'be',onClick:exportHTML},T.exportHtml)
    ));

    return React.createElement('div',{className:'rp',id:'rpt-content'},els);
  }

  function makeYorumlar(){
    var y=[];
    nods.forEach(function(n,i){
      var dr=calcDiff(n);
      if(dr.length===0) return;
      var top=dr[0];
      var col=top.sev>=70?'var(--rd)':top.sev>=40?'var(--or)':top.sev>=20?'var(--yl)':'var(--gn)';

      var kisa=parseFloat(n.kisa)||0;
      var sizeWarn='';
      if(n.region.indexOf('Juguler')>=0||n.region.indexOf('Jugular')>=0||n.region.indexOf('Submandibular')>=0||n.region.indexOf('Submental')>=0){
        if(kisa>10) sizeWarn=T.sizeWarnNeck;
      } else if(n.region.indexOf('Retrofaringeal')>=0||n.region.indexOf('Retropharyngeal')>=0){
        if(kisa>8) sizeWarn=T.sizeWarnRetropharyngeal;
      } else if(n.region.indexOf('Inguinal')>=0){
        if(kisa>15) sizeWarn=T.sizeWarnInguinal;
      } else if(n.region.indexOf('Mediastinal')>=0||n.region.indexOf('Hiler')>=0||n.region.indexOf('Hilar')>=0){
        if(kisa>10) sizeWarn=T.sizeWarnMediastinal;
      } else {
        if(kisa>10) sizeWarn=T.sizeWarnGeneral;
      }

      var txt=T.commentMatch(i+1,n.region,n.side,n.kisa,top.name,top.pct)+sizeWarn;
      if(top.sev>=70) txt+=T.commentMalign;
      if(dr.length>1) txt+=T.commentAlternative(dr[1].name,dr[1].pct);

      if(n.adc===T.adcVeryLow) txt+=T.commentAdcVeryLow;
      else if(n.adc===T.adcLow) txt+=T.commentAdcLow;

      if(n.hilus===T.hilusPreserved) txt+=T.commentHilusPreserved;

      if(n.shape.indexOf(T.shapeRound)>=0 && n.hilus===T.hilusLost) txt+=T.commentRoundHilusLost;

      y.push({t:T.commentTitle(i+1,top.name,top.pct),x:txt,c:col});
    });
    return y;
  }

  function copyRpt(){
    var el=document.getElementById('rpt-content');if(!el)return;
    var ta=document.createElement('textarea');ta.style.position='fixed';ta.style.left='-9999px';
    ta.value=el.innerText;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);alert(T.copied);
  }

  function exportHTML(){
    var el=document.getElementById('rpt-content');if(!el)return;
    var css='body{font-family:Segoe UI,system-ui,sans-serif;background:#fff;color:#111;padding:24px;max-width:900px;margin:0 auto}'
      +'h2{font-size:1.1rem;color:#4a7adf;border-bottom:2px solid #4a7adf;padding-bottom:6px;margin-bottom:16px}'
      +'h3{font-size:.9rem;background:#4a7adf;color:#fff;padding:6px 10px;border-radius:6px;margin:16px 0 8px}'
      +'table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:.82rem}'
      +'th{text-align:left;padding:6px 10px;background:#4a7adf;color:#fff;border:1px solid #ddd}'
      +'td{padding:6px 10px;border:1px solid #ddd}'
      +'tr:nth-child(even) td{background:#f4f4f8}'
      +'.tl{color:#666;width:38%}.tv{color:#111;font-weight:600}'
      +'.dr{background:#f8f8fc;border-left:3px solid #4a7adf;border-radius:0 6px 6px 0;padding:10px;margin:6px 0}'
      +'.dr-bar{height:6px;border-radius:3px;background:#eee;overflow:hidden;margin:4px 0}'
      +'.dr-fill{height:100%;border-radius:3px}'
      +'.dr-desc{font-size:.74rem;color:#666;margin-top:4px}'
      +'.dr-keys{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}'
      +'.dr-key{font-size:.65rem;padding:2px 6px;border-radius:3px;background:#e8eeff;color:#4a7adf}'
      +'.yb{background:#f8f8fc;border-left:3px solid #4a7adf;border-radius:0 6px 6px 0;padding:12px;margin:8px 0}'
      +'.yt{font-size:.84rem;font-weight:700;margin-bottom:4px}'
      +'.yx{font-size:.8rem;line-height:1.5}'
      +'.er{display:none}';
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+T.exportFileTitle+'</title><style>'+css+'</style></head><body>'+el.innerHTML+'</body></html>';
    var blob=new Blob([html],{type:'text/html'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=T.exportFileName;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  var nextLbl=T.nextBtn;
  if(sn==='nodLoop') nextLbl=nSub>=NOD_SUB.length-1?T.finishBtn:T.nextBtn;

  return React.createElement('div',{className:'wrap'},
    React.createElement('div',{className:'hdr'},React.createElement('h1',{'data-i18n-tr':'Lenf Nodu MRI Karar Destek Sistemi','data-i18n-en':'Lymph Node MRI Decision Support System'},T.appTitle)),
    React.createElement('div',{className:'pb'},React.createElement('div',{className:'pf',style:{width:pct+'%'}})),
    renderStep(),
    sn!=='rapor'?React.createElement('div',{className:'nr'},
      React.createElement('button',{className:'btn bp',onClick:goPrev,disabled:step===0&&(sn!=='nodLoop'||nSub===0)},T.prevBtn),
      React.createElement('span',{style:{color:'var(--txd)',fontSize:'.76rem'}},(step+1)+'/'+total),
      React.createElement('button',{className:'btn bn',onClick:goNext,disabled:!canNext()},nextLbl)
    ):React.createElement('div',{className:'nr'},
      React.createElement('button',{className:'btn bp',onClick:goPrev},T.editReport),
      React.createElement('button',{className:'btn bs',onClick:function(){setStep(0);setNods([]);setNIdx(-1);}},T.newReport))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

<script src="/bridge.js"></script>
