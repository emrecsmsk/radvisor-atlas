            <div className="chips">
              {[["glut_med","Gluteus medius"],["glut_min","Gluteus minimus"],["glut_max","Gluteus maximus"],
                ["iliopsoas","İliopsoas"],["rf","Rektus femoris"],["hamstring","Proksimal hamstring"],
                ["adductor","Adduktor grup"],["piriformis","Piriformis"],["qf","Kuadratus femoris"]].map(([v,l]) =>
                <div key={v} className={"chip" + (L.muscle===v?" on":"")} onClick={()=>updateCurrentMT({muscle:v})}>{l}</div>
              )}
            </div>
          </div>
        )}
        {mtSub === 1 && (
          <div className="grp">
            <div className="grp-label">Lokalizasyon</div>
            <div className="chips">
              {[["myotendinous","Miyotendinöz bileşke"],["tendon","Tendon mid-substance"],
                ["entez","Enthesis"],["belly","Kas karnı"],["retinaculum","Retinaküler"]].map(([v,l]) =>
                <div key={v} className={"chip" + (L.location===v?" on":"")} onClick={()=>updateCurrentMT({location:v})}>{l}</div>
              )}
            </div>
          </div>
        )}
        {mtSub === 2 && (
          <div className="grp">
            <div className="grp-label">Lezyon Tipi</div>
            <div className="chips">
              {[["tendinopati","Tendinopati"],["strain1","Grade 1 strain"],["strain2","Grade 2 strain"],
                ["strain3","Grade 3 strain"],["parsiyel","Parsiyel kat yırtık"],
                ["tam","Tam kat / rüptür"],["enthezit","Entezopati"]].map(([v,l]) =>
                <div key={v} className={"chip" + (L.type===v?" on":"")} onClick={()=>updateCurrentMT({type:v})}>{l}</div>
              )}
            </div>
          </div>
        )}
        {mtSub === 3 && (
          <>
            <div className="two-col">
              <div className="field">
                <label className="grp-label" style={{marginBottom:0}}>Retraksiyon (cm)</label>
                <input type="number" step="0.5" value={L.retraction} onChange={e=>updateCurrentMT({retraction:e.target.value})} placeholder="0" />
              </div>
              <div className="field">
                <label className="grp-label" style={{marginBottom:0}}>Goutallier Sınıfı</label>
                <div className="chips">
                  {["0","1","2","3","4"].map(g =>
                    <div key={g} className={"chip small" + (L.goutallier===g?" on":"")} onClick={()=>updateCurrentMT({goutallier:g})}>{g}</div>
                  )}
                </div>
              </div>
            </div>
            <div className="grp" style={{marginTop:14}}>
              <div className={"checkbox" + (L.bursa_rel?" on":"")} onClick={()=>updateCurrentMT({bursa_rel: !L.bursa_rel})}>
                <div className="checkbox-box"/>
                <div>Komşu bursa ile ilişkili / bursit eşlik ediyor</div>
              </div>
            </div>
          </>
        )}
      </>
    );
  }

  // ========= STEP 13 bursa =========
  function renderStep13() {
    return (
      <>
        <div className="grp">
          <div className="grp-label">Trokanterik Bursa</div>
          <div className="chips">
            <div className={"chip" + (data.troch_bursa==="yok"?" on":"")} onClick={()=>update("troch_bursa","yok")}>Yok</div>
            <div className={"chip" + (data.troch_bursa==="sıvı"?" on":"")} onClick={()=>update("troch_bursa","sıvı")}>Sıvı birikimi</div>
            <div className={"chip" + (data.troch_bursa==="belirgin"?" on":"")} onClick={()=>update("troch_bursa","belirgin")}>Belirgin (bursit)</div>
          </div>
        </div>
        <div className="grp">
          <div className="chips">
            <div className={"chip" + (data.peritroch_edema==="var"?" on":"")} onClick={()=>update("peritroch_edema", data.peritroch_edema==="var"?"":"var")}>Peritrokanterik ödem</div>
            <div className={"chip" + (data.itb_thick==="var"?" on":"")} onClick={()=>update("itb_thick", data.itb_thick==="var"?"":"var")}>ITB kalınlaşması</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">İliopsoas Bursası</div>
          <div className="chips">
            <div className={"chip" + (data.iliopsoas_bursa==="yok"?" on":"")} onClick={()=>update("iliopsoas_bursa","yok")}>Yok</div>
            <div className={"chip" + (data.iliopsoas_bursa==="sıvı"?" on":"")} onClick={()=>update("iliopsoas_bursa","sıvı")}>Sıvı</div>
            <div className={"chip" + (data.iliopsoas_bursa==="belirgin"?" on":"")} onClick={()=>update("iliopsoas_bursa","belirgin")}>Belirgin distansiyon</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">İskiogluteal Bursa</div>
          <div className="chips">
            <div className={"chip" + (data.ischiogluteal_bursa==="yok"?" on":"")} onClick={()=>update("ischiogluteal_bursa","yok")}>Yok</div>
            <div className={"chip" + (data.ischiogluteal_bursa==="var"?" on":"")} onClick={()=>update("ischiogluteal_bursa","var")}>Sıvı / inflamasyon</div>
          </div>
        </div>
      </>
    );
  }

  // ========= STEP 14 nörovasküler =========
  function renderStep14() {
    return (
      <>
        <div className="grp">
          <div className="chips">
            <div className={"chip" + (data.sciatic_edema==="var"?" on":"")} onClick={()=>update("sciatic_edema", data.sciatic_edema==="var"?"":"var")}>Siyatik sinir ödemi</div>
            <div className={"chip" + (data.piriformis_asymm==="var"?" on":"")} onClick={()=>update("piriformis_asymm", data.piriformis_asymm==="var"?"":"var")}>Piriformis asimetri</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">Femoral Sinir</div>
          <div className="chips">
            <div className={"chip" + (data.femoral_nerve==="normal"?" on":"")} onClick={()=>update("femoral_nerve","normal")}>Normal</div>
            <div className={"chip" + (data.femoral_nerve==="anormal"?" on":"")} onClick={()=>update("femoral_nerve","anormal")}>Anormal</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">Obturator Sinir</div>
          <div className="chips">
            <div className={"chip" + (data.obturator_nerve==="normal"?" on":"")} onClick={()=>update("obturator_nerve","normal")}>Normal</div>
            <div className={"chip" + (data.obturator_nerve==="anormal"?" on":"")} onClick={()=>update("obturator_nerve","anormal")}>Anormal</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">Lateral Femoral Kutanöz Sinir (LFCN)</div>
          <div className="chips">
            <div className={"chip" + (data.lfcn==="normal"?" on":"")} onClick={()=>update("lfcn","normal")}>Normal</div>
            <div className={"chip" + (data.lfcn==="anormal"?" on":"")} onClick={()=>update("lfcn","anormal")}>Anormal (meralgia paresthetica)</div>
          </div>
        </div>
      </>
    );
  }

  // ========= STEP 15 pubik simfiz =========
  function renderStep15() {
    return (
      <>
        <div className="grp">
          <div className="grp-label">Pubik Simfiz & Enthesiyal</div>
          <div className="chips">
            <div className={"chip" + (data.pubic_bone_edema==="var"?" on":"")} onClick={()=>update("pubic_bone_edema", data.pubic_bone_edema==="var"?"":"var")}>Pubik kemik ödemi</div>
            <div className={"chip" + (data.pubic_widening==="var"?" on":"")} onClick={()=>update("pubic_widening", data.pubic_widening==="var"?"":"var")}>Pubik simfiz genişlemesi</div>
            <div className={"chip" + (data.rec_add_apo==="var"?" on":"")} onClick={()=>update("rec_add_apo", data.rec_add_apo==="var"?"":"var")}>Rektus-adduktor aponöroz yırtığı</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">Enthesiyal Kemik İliği Ödemi</div>
          <div className="chips">
            <div className={"chip" + (data.ischial_tub_edema==="var"?" on":"")} onClick={()=>update("ischial_tub_edema", data.ischial_tub_edema==="var"?"":"var")}>İskial tüberosit</div>
            <div className={"chip" + (data.aiis_edema==="var"?" on":"")} onClick={()=>update("aiis_edema", data.aiis_edema==="var"?"":"var")}>AIIS</div>
          </div>
        </div>
      </>
    );
  }

  // ========= STEP 16 kemik/tümör =========
  function renderStep16() {
    return (
      <>
        <div className="grp">
          <div className="grp-label">Fraktür</div>
          <div className="chips">
            <div className={"chip" + (data.fx_line==="yok"?" on":"")} onClick={()=>update("fx_line","yok")}>Yok</div>
            <div className={"chip" + (data.fx_line==="var"?" on":"")} onClick={()=>update("fx_line","var")}>Var</div>
          </div>
        </div>
        {data.fx_line === "var" &&
          <div className="grp">
            <div className="grp-label">Fraktür Lokalizasyonu</div>
            <div className="chips">
              <div className={"chip" + (data.fx_location==="femoral_neck"?" on":"")} onClick={()=>update("fx_location","femoral_neck")}>Femur boynu (stres)</div>
              <div className={"chip" + (data.fx_location==="subchondral"?" on":"")} onClick={()=>update("fx_location","subchondral")}>Subkondral</div>
              <div className={"chip" + (data.fx_location==="troch"?" on":"")} onClick={()=>update("fx_location","troch")}>Trokanterik</div>
              <div className={"chip" + (data.fx_location==="diger"?" on":"")} onClick={()=>update("fx_location","diger")}>Diğer</div>
            </div>
          </div>
        }
        <div className="grp">
          <div className="grp-label">Subkondral Yetmezlik Fraktürü</div>
          <div className="chips">
            <div className={"chip" + (data.subchondral_fx==="yok"?" on":"")} onClick={()=>update("subchondral_fx","yok")}>Yok</div>
            <div className={"chip" + (data.subchondral_fx==="var"?" on":"")} onClick={()=>update("subchondral_fx","var")}>Var</div>
          </div>
        </div>
        <div className="grp">
          <div className="chips">
            <div className={"chip" + (data.mass_soft==="var"?" on":"")} onClick={()=>update("mass_soft", data.mass_soft==="var"?"":"var")}>Yumuşak doku kitlesi</div>
            <div className={"chip" + (data.mass_bone==="var"?" on":"")} onClick={()=>update("mass_bone", data.mass_bone==="var"?"":"var")}>Kemik lezyonu / tümör</div>
            <div className={"chip" + (data.het_ossification==="var"?" on":"")} onClick={()=>update("het_ossification", data.het_ossification==="var"?"":"var")}>Heterotopik ossifikasyon / miyozitis ossifikans</div>
          </div>
        </div>
        {(data.mass_soft === "var" || data.mass_bone === "var") &&
          <div className="grp">
            <div className="grp-label">Detay</div>
            <input type="text" value={data.mass_detail} onChange={e=>update("mass_detail", e.target.value)} placeholder="boyut, sinyal, kontrastlanma..." />
          </div>
        }
      </>
    );
  }

  // ========= STEP 17 serbest metin =========
  function renderStep17() {
    return (
      <>
        <div className="grp">
          <div className="grp-label">Ek Notlar / Serbest Metin</div>
          <textarea value={data.free_text} onChange={e=>update("free_text", e.target.value)} placeholder="Rapora eklemek istediğiniz ek bulgular, klinik yorumlar, takip önerileri..." style={{minHeight:140}}/>
        </div>
      </>
    );
  }

  // ========= STEP 18 inceleme =========
  function renderStep18() {
    const summary = [];
    summary.push(`Taraf: ${sideTR(data.side)} • ${ageText(data.age)} • ${sexTR(data.sex)}`);
    if (data.avn_suspicion === "var") summary.push(`AVN değerlendirmesi: ARCO ${data.avn_stage || "?"}`);
    if (data.alpha_angle) summary.push(`Alpha açısı: ${data.alpha_angle}°`);
    if (data.lcea) summary.push(`LCEA: ${data.lcea}°`);
    if (data.ischiofem_space) summary.push(`İskiofemoral mesafe: ${data.ischiofem_space} mm`);
    summary.push(`Labral yırtık sayısı: ${(data.labralTears||[]).length}`);
    summary.push(`Kas/tendon lezyon sayısı: ${mtLesions.length}`);
    return (
      <>
        <div className="grp-sub" style={{marginLeft:0}}>Doldurulan veri özeti (düzeltmek için geri gidebilirsiniz):</div>
        <div className="lesion-list">
          {summary.map((s,i) => <div key={i} className="lesion-item">{s}</div>)}
        </div>
      </>
    );
  }

  // ========= STEP 19 ayırıcı tanı paneli =========
  function renderStep19() {
    const top = scores.slice(0, 8);
    return (
      <>
        <div className="grp-sub" style={{marginLeft:0}}>Girilen verilere göre ilk 8 ayırıcı tanı olasılığı. Klinik karar için bu panel kullanılır.</div>
        <div className="dx-preview">
          {top.map((p,i) => (
            <div key={p.id} className="dx-row">
              <div className="dx-name">{i+1}. {p.adi}</div>
              <div className="dx-bar"><div className="dx-bar-fill" style={{width: p.score+"%"}}/></div>
              <div className="dx-score">{p.score}%</div>
            </div>
          ))}
        </div>
      </>
    );
  }

  // ========= STEP 20 final =========
  function renderStep20() {
    return (
      <>
        <div className="grp-sub" style={{marginLeft:0}}>Rapor oluşturmak için <b>Raporu Oluştur</b>'a tıklayın.</div>
        <div style={{textAlign:"center", padding:"20px 0"}}>
          <button className="btn btn-primary" onClick={()=>setShowReport(true)}>Raporu Oluştur →</button>
        </div>
      </>
    );
  }

  // ========= Final (safety) =========
  function renderFinal() { return renderStep20(); }

  /* =====================================================
     Rapor overlay
  ===================================================== */
  function renderReport() {
    return (
      <div className="report-overlay" onClick={(e) => { if (e.target.className === "report-overlay") setShowReport(false); }}>
        <div className="report-sheet" onClick={e=>e.stopPropagation()}>
          <div className="report-toolbar">
            <button className="btn" onClick={()=>setShowReport(false)}>← Geri</button>
            <button className="btn" onClick={copyReportText}>📋 Metni Kopyala</button>
            <button className="btn" onClick={downloadHTML}>⬇ HTML indir</button>
            <button className="btn btn-primary" onClick={printReport}>🖨 Yazdır / PDF</button>
          </div>
          <div className="report-body" id="report-body-content" dangerouslySetInnerHTML={{__html: generateReport()}}/>
        </div>
      </div>
    );
  }

  /* ---------- render ---------- */
  const progressPct = Math.round(100 * (step + 1) / TOTAL_STEPS);

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">
          <div className="brand-icon">K</div>
          <div>
            <div className="brand-title">Kalça MR Karar Destek Sistemi</div>
            <div className="brand-sub">Multilezyon Ayırıcı Tanı & Yapılandırılmış Rapor</div>
          </div>
        </div>
        <div className="step-chip">Adım {step+1} / {TOTAL_STEPS}</div>
      </div>

      <div className="progress"><div className="progress-fill" style={{width: progressPct + "%"}}/></div>

      <div className="card">
        <h2 className="step-title">{STEP_TITLES[step]}</h2>
        <div className="step-desc">
          {step === 0 && "Hasta temel bilgisi, klinik sorgu ve risk faktörleri."}
          {step === 1 && "Uygulanan sekansları işaretleyin."}
          {step === 2 && "Kemik iliği sinyali ve AVN ön taraması."}
          {step === 3 && "AVN şüphesi varlığında detay değerlendirme."}
          {step === 4 && "CAM tip FAI ön değerlendirmesi — alpha açısı ve baş-boyun morfolojisi."}
          {step === 5 && "Pincer tip FAI ve displazi değerlendirmesi — LCEA, asetabuler indeks, wall sign."}
          {step === 6 && "Kıkırdak yüzeyler (4 zon) ve OA bulguları."}
          {step === 7 && "Labrum değerlendirmesi — her yırtık için ayrı döngü."}
          {step === 8 && "Paralabral kist ve ligamentum teres."}
          {step === 9 && "Eklem kapsülü ve kapsüler ligamanlar."}
          {step === 10 && "İskiofemoral ve kuadratus femoris mesafeleri."}
          {step === 11 && "Efüzyon, sinoviyal ve hemorajik patolojiler."}
          {step === 12 && "Kas/tendon değerlendirmesi — her patolojik yapı için ayrı döngü."}
          {step === 13 && "Bursa değerlendirmesi."}
          {step === 14 && "Nörovasküler yapıların kısa taranması."}
          {step === 15 && "Pubik simfiz ve enthesiyal yapılar (atletik pubalji)."}
          {step === 16 && "Kemik lezyonlar, tümör, heterotopik ossifikasyon."}
          {step === 17 && "Opsiyonel ek metin."}
          {step === 18 && "Veri özeti ve kontrol."}
          {step === 19 && "Ayırıcı tanı olasılıkları."}
          {step === 20 && "Raporu oluşturun."}
        </div>
        {renderStep()}
        <div className="nav">
          <button className="btn" onClick={goPrev} disabled={step === 0 && labralIdx === -1 && mtIdx === -1}>← Geri</button>
          <button className="btn btn-primary" onClick={goNext} disabled={!canNext()}>
            {step === TOTAL_STEPS - 2 ? "Raporu Oluştur →" : "İleri →"}
          </button>
        </div>
      </div>

      {showReport && renderReport()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
