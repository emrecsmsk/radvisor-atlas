      } else {
        yorumItems.push(`Mevcut bulgular en yüksek olasılıkla <b>${pathoLabel(top[0])}</b> ile uyumludur (${top[0].score}%).`);
        if (top[1] && top[1].score > 30) yorumItems.push(`Ayırıcı tanıda <b>${pathoLabel(top[1])}</b> (${top[1].score}%) dikkate alınmalıdır.`);
        if (topId === "fai_cam" || topId === "fai_mixed") {
          yorumItems.push("Klinik FAI düşündürüyor ise dinamik muayene ve ortopedi konsültasyonu önerilir; artroskopik femoroplasti adayı olabilir.");
          if (F.labrum_any) yorumItems.push("Eşlik eden labral yırtık artroskopik onarım/refiksasyon için ek göstergedir.");
        }
        if (topId === "fai_pincer") {
          yorumItems.push("Asetabuler rim trimleme değerlendirmesi ortopedi tarafından yapılmalıdır.");
          if (F.labrum_posterior) yorumItems.push("Posterior contrecoup lezyonu not edilmiştir.");
        }
        if (topId === "avn") {
          if (F.avn_collapse || data.avn_stage === "IV" || data.avn_stage === "III") {
            yorumItems.push("<b>İleri evre AVN</b> — cerrahi girişim (core dekompresyon etkisiz, total kalça protezi değerlendirmesi) için acil ortopedi sevki önerilir.");
          } else {
            yorumItems.push("Erken evre AVN — core dekompresyon ± kök hücre tedavisi için uygun aday olabilir; ortopedi konsültasyonu önerilir.");
          }
        }
        if (topId === "subchondral_fx" || topId === "stress_fx") {
          yorumItems.push("Yük bindirmekten kaçınılması ve ortopedi sevki önerilir. Stres fraktürü şüphesinde tam istirahat ve takip MR tavsiye edilir.");
        }
        if (topId === "transient_op") {
          yorumItems.push("Geçici kemik iliği ödemi sendromu kendini sınırlayan bir tablodur; 6-12 haftalık konservatif yaklaşım ve takip MR önerilir. AVN ayırıcı tanısı için klinik korelasyon önemlidir.");
        }
        if (topId === "labral_tear") {
          yorumItems.push("Labral yırtık onarımı veya debridmanı için ortopedi değerlendirmesi önerilir. Eşlik eden FAI morfolojisi mutlaka tedavi planına dahil edilmelidir.");
        }
        if (topId === "ischiofem_imp") {
          yorumItems.push("İskiofemoral sıkışma — konservatif tedaviye yanıtsız olgularda USG/MR kılavuzlu enjeksiyon veya cerrahi dekompresyon düşünülebilir.");
        }
        if (topId === "glut_tear") {
          yorumItems.push("Gluteus medius/minimus yırtığı — Goutallier ≥2 atrofi varlığında onarım sonuçları sınırlı olabilir; ortopedi değerlendirmesi önerilir.");
        }
        if (topId === "hamstring_inj") {
          if (F.hams_retraction) yorumItems.push("Belirgin retraksiyon ile giden proksimal hamstring yırtığında cerrahi reinsersiyon değerlendirmesi önerilir.");
        }
        if (topId === "athletic_pubalgia") {
          yorumItems.push("Atletik pubalji — spor hekimliği / genel cerrahi değerlendirmesi önerilir; konservatif yaklaşım sonrası cerrahi onarım gündeme gelebilir.");
        }
        if (topId === "pvns") {
          yorumItems.push("PVNS şüphesi — artroskopik / açık sinovektomi için ortopedi sevki önerilir; kontrastlı MR ve eklem aralığı değerlendirmesi tanıyı destekler.");
        }
        if (topId === "septic") {
          yorumItems.push("<b>Klinik korelasyon ve acil eklem aspirasyonu</b> önerilir.");
        }
        if (topId === "oa_hip" && F.tonnis_grade >= 3) {
          yorumItems.push("İleri evre kalça OA — total kalça artroplastisi adayı olabilir.");
        }
      }
      lines.push(`<div class="yorum"><b>${T.report.commentary}:</b><ul>${yorumItems.map(y => `<li>${y}</li>`).join("")}</ul></div>`);
    }

    // Ayırıcı tanı tablosu
    lines.push(`<div class="rbox"><div class="rbox-head slate">${T.report.diffDx}</div><div class="rbox-body" style="padding:0">`);
    lines.push(`<table class="dx-table"><thead><tr><th>${T.report.rank}</th><th>${T.report.diagnosis}</th><th>${T.report.category}</th><th style="text-align:right">${T.report.probability}</th></tr></thead><tbody>`);
    top.forEach((p,i) => {
      if (p.score > 0) {
        const color = CAT_COLOR[p.kat] || "#334155";
        lines.push(`<tr><td>${i+1}</td><td>${pathoLabel(p)}</td><td><span class="cat-badge" style="background:${color}">${catLabel(p.kat)}</span></td><td class="pct">${p.score}%</td></tr>`);
      }
    });
    lines.push(`</tbody></table></div></div>`);

    lines.push(`<div class="report-footer"><span>${T.report.footer(todayStr())}</span><span>${T.report.page}</span></div>`);

    return lines.join("\n");
  }

  /* ---------- Export fonksiyonları ---------- */
  function printReport() {
    window.print();
  }
  function copyReportText() {
    const el = document.getElementById("report-body-content");
    if (!el) return;
    try {
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand("copy");
      sel.removeAllRanges();
      alert(T.alertCopied);
    } catch(e) { alert(T.alertCopyFail(e.message)); }
  }
  function downloadHTML() {
    const html = document.documentElement.outerHTML;
    const body = document.getElementById("report-body-content")?.innerHTML || "";
    const fullStyles = document.querySelector("style")?.innerHTML || "";
    const full = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Kalça MR Raporu - ${todayStr()}</title><style>${fullStyles}</style></head><body><div class="report-sheet" style="margin:20px auto"><div class="report-body" id="report-body-content">${body}</div></div></body></html>`;
    const blob = new Blob([full], {type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `kalca-mrg-raporu-${todayStr().replace(/\./g,"-")}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

            <div className={"chip" + (data.troch_bursa==="yok"?" on":"")} onClick={()=>update("troch_bursa","yok")}>{lbl.trochN}</div>
            <div className={"chip" + (data.troch_bursa==="sıvı"?" on":"")} onClick={()=>update("troch_bursa","sıvı")}>{lbl.trochFluid}</div>
            <div className={"chip" + (data.troch_bursa==="belirgin"?" on":"")} onClick={()=>update("troch_bursa","belirgin")}>{lbl.trochLarge}</div>
          </div>
        </div>
        <div className="grp">
          <div className="chips">
            <div className={"chip" + (data.peritroch_edema==="var"?" on":"")} onClick={()=>update("peritroch_edema", data.peritroch_edema==="var"?"":"var")}>{lbl.periEdema}</div>
            <div className={"chip" + (data.itb_thick==="var"?" on":"")} onClick={()=>update("itb_thick", data.itb_thick==="var"?"":"var")}>{lbl.itbThick}</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">{lbl.ilioLbl}</div>
          <div className="chips">
            <div className={"chip" + (data.iliopsoas_bursa==="yok"?" on":"")} onClick={()=>update("iliopsoas_bursa","yok")}>{lbl.ilioN}</div>
            <div className={"chip" + (data.iliopsoas_bursa==="sıvı"?" on":"")} onClick={()=>update("iliopsoas_bursa","sıvı")}>{lbl.ilioFluid}</div>
            <div className={"chip" + (data.iliopsoas_bursa==="belirgin"?" on":"")} onClick={()=>update("iliopsoas_bursa","belirgin")}>{lbl.ilioLarge}</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">{lbl.ischioLbl}</div>
          <div className="chips">
            <div className={"chip" + (data.ischiogluteal_bursa==="yok"?" on":"")} onClick={()=>update("ischiogluteal_bursa","yok")}>{lbl.ischioN}</div>
            <div className={"chip" + (data.ischiogluteal_bursa==="var"?" on":"")} onClick={()=>update("ischiogluteal_bursa","var")}>{lbl.ischioY}</div>
          </div>
        </div>
      </>
    );
  }

  // ========= STEP 14 nörovasküler =========
  function renderStep14() {
    const lbl = RV_LOCALE === 'en'
      ? { sciaticEdema:"Sciatic nerve edema", pirAsymm:"Piriformis asymmetry",
          femNerve:"Femoral Nerve", obtNerve:"Obturator Nerve", lfcn:"Lateral Femoral Cutaneous Nerve (LFCN)",
          norm:"Normal", abnorm:"Abnormal", abnormLfcn:"Abnormal (meralgia paresthetica)" }
      : { sciaticEdema:"Siyatik sinir ödemi", pirAsymm:"Piriformis asimetri",
          femNerve:"Femoral Sinir", obtNerve:"Obturator Sinir", lfcn:"Lateral Femoral Kutanöz Sinir (LFCN)",
          norm:"Normal", abnorm:"Anormal", abnormLfcn:"Anormal (meralgia paresthetica)" };
    return (
      <>
        <div className="grp">
          <div className="chips">
            <div className={"chip" + (data.sciatic_edema==="var"?" on":"")} onClick={()=>update("sciatic_edema", data.sciatic_edema==="var"?"":"var")}>{lbl.sciaticEdema}</div>
            <div className={"chip" + (data.piriformis_asymm==="var"?" on":"")} onClick={()=>update("piriformis_asymm", data.piriformis_asymm==="var"?"":"var")}>{lbl.pirAsymm}</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">{lbl.femNerve}</div>
          <div className="chips">
            <div className={"chip" + (data.femoral_nerve==="normal"?" on":"")} onClick={()=>update("femoral_nerve","normal")}>{lbl.norm}</div>
            <div className={"chip" + (data.femoral_nerve==="anormal"?" on":"")} onClick={()=>update("femoral_nerve","anormal")}>{lbl.abnorm}</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">{lbl.obtNerve}</div>
          <div className="chips">
            <div className={"chip" + (data.obturator_nerve==="normal"?" on":"")} onClick={()=>update("obturator_nerve","normal")}>{lbl.norm}</div>
            <div className={"chip" + (data.obturator_nerve==="anormal"?" on":"")} onClick={()=>update("obturator_nerve","anormal")}>{lbl.abnorm}</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">{lbl.lfcn}</div>
          <div className="chips">
            <div className={"chip" + (data.lfcn==="normal"?" on":"")} onClick={()=>update("lfcn","normal")}>{lbl.norm}</div>
            <div className={"chip" + (data.lfcn==="anormal"?" on":"")} onClick={()=>update("lfcn","anormal")}>{lbl.abnormLfcn}</div>
          </div>
        </div>
      </>
    );
  }

  // ========= STEP 15 pubik simfiz =========
  function renderStep15() {
    const lbl = RV_LOCALE === 'en'
      ? { symphLbl:"Pubic Symphysis & Entheseal",
          pubEdema:"Pubic bone edema", pubWide:"Pubic symphysis widening",
          recAdd:"Rectus-adductor aponeurosis tear",
          entheseal:"Entheseal Bone Marrow Edema",
          ischial:"Ischial tuberosity", aiis:"AIIS" }
      : { symphLbl:"Pubik Simfiz & Enthesiyal",
          pubEdema:"Pubik kemik ödemi", pubWide:"Pubik simfiz genişlemesi",
          recAdd:"Rektus-adduktor aponöroz yırtığı",
          entheseal:"Enthesiyal Kemik İliği Ödemi",
          ischial:"İskial tüberosit", aiis:"AIIS" };
    return (
      <>
        <div className="grp">
          <div className="grp-label">{lbl.symphLbl}</div>
          <div className="chips">
            <div className={"chip" + (data.pubic_bone_edema==="var"?" on":"")} onClick={()=>update("pubic_bone_edema", data.pubic_bone_edema==="var"?"":"var")}>{lbl.pubEdema}</div>
            <div className={"chip" + (data.pubic_widening==="var"?" on":"")} onClick={()=>update("pubic_widening", data.pubic_widening==="var"?"":"var")}>{lbl.pubWide}</div>
            <div className={"chip" + (data.rec_add_apo==="var"?" on":"")} onClick={()=>update("rec_add_apo", data.rec_add_apo==="var"?"":"var")}>{lbl.recAdd}</div>
          </div>
        </div>
        <div className="grp">
          <div className="grp-label">{lbl.entheseal}</div>
          <div className="chips">
            <div className={"chip" + (data.ischial_tub_edema==="var"?" on":"")} onClick={()=>update("ischial_tub_edema", data.ischial_tub_edema==="var"?"":"var")}>{lbl.ischial}</div>
            <div className={"chip" + (data.aiis_edema==="var"?" on":"")} onClick={()=>update("aiis_edema", data.aiis_edema==="var"?"":"var")}>{lbl.aiis}</div>
          </div>
        </div>
      </>
    );
  }

  // ========= STEP 16 kemik/tümör =========
  function renderStep16() {
    const lbl = RV_LOCALE === 'en'
      ? { fxLbl:"Fracture", fxN:"Absent", fxY:"Present",
          fxLocLbl:"Fracture Localisation",
          fxNeck:"Femoral neck (stress)", fxSub:"Subchondral", fxTroch:"Trochanteric", fxOther:"Other",
          subchFx:"Subchondral Insufficiency Fracture",
          masssoft:"Soft tissue mass", massbone:"Bone lesion / tumour",
          hetOss:"Heterotopic ossification / myositis ossificans",
          detailLbl:"Detail", detailPh:"size, signal, enhancement..." }
      : { fxLbl:"Fraktür", fxN:"Yok", fxY:"Var",
          fxLocLbl:"Fraktür Lokalizasyonu",
          fxNeck:"Femur boynu (stres)", fxSub:"Subkondral", fxTroch:"Trokanterik", fxOther:"Diğer",
          subchFx:"Subkondral Yetmezlik Fraktürü",
          masssoft:"Yumuşak doku kitlesi", massbone:"Kemik lezyonu / tümör",
          hetOss:"Heterotopik ossifikasyon / miyozitis ossifikans",
          detailLbl:"Detay", detailPh:"boyut, sinyal, kontrastlanma..." };
    return (
      <>
        <div className="grp">
          <div className="grp-label">{lbl.fxLbl}</div>
          <div className="chips">
            <div className={"chip" + (data.fx_line==="yok"?" on":"")} onClick={()=>update("fx_line","yok")}>{lbl.fxN}</div>
            <div className={"chip" + (data.fx_line==="var"?" on":"")} onClick={()=>update("fx_line","var")}>{lbl.fxY}</div>
          </div>
        </div>
        {data.fx_line === "var" &&
          <div className="grp">
            <div className="grp-label">{lbl.fxLocLbl}</div>
            <div className="chips">
              <div className={"chip" + (data.fx_location==="femoral_neck"?" on":"")} onClick={()=>update("fx_location","femoral_neck")}>{lbl.fxNeck}</div>
              <div className={"chip" + (data.fx_location==="subchondral"?" on":"")} onClick={()=>update("fx_location","subchondral")}>{lbl.fxSub}</div>
              <div className={"chip" + (data.fx_location==="troch"?" on":"")} onClick={()=>update("fx_location","troch")}>{lbl.fxTroch}</div>
              <div className={"chip" + (data.fx_location==="diger"?" on":"")} onClick={()=>update("fx_location","diger")}>{lbl.fxOther}</div>
            </div>
          </div>
        }
        <div className="grp">
          <div className="grp-label">{lbl.subchFx}</div>
          <div className="chips">
            <div className={"chip" + (data.subchondral_fx==="yok"?" on":"")} onClick={()=>update("subchondral_fx","yok")}>{lbl.fxN}</div>
            <div className={"chip" + (data.subchondral_fx==="var"?" on":"")} onClick={()=>update("subchondral_fx","var")}>{lbl.fxY}</div>
          </div>
        </div>
        <div className="grp">
          <div className="chips">
            <div className={"chip" + (data.mass_soft==="var"?" on":"")} onClick={()=>update("mass_soft", data.mass_soft==="var"?"":"var")}>{lbl.masssoft}</div>
            <div className={"chip" + (data.mass_bone==="var"?" on":"")} onClick={()=>update("mass_bone", data.mass_bone==="var"?"":"var")}>{lbl.massbone}</div>
            <div className={"chip" + (data.het_ossification==="var"?" on":"")} onClick={()=>update("het_ossification", data.het_ossification==="var"?"":"var")}>{lbl.hetOss}</div>
          </div>
        </div>
        {(data.mass_soft === "var" || data.mass_bone === "var") &&
          <div className="grp">
            <div className="grp-label">{lbl.detailLbl}</div>
            <input type="text" value={data.mass_detail} onChange={e=>update("mass_detail", e.target.value)} placeholder={lbl.detailPh} />
          </div>
        }
      </>
    );
  }

  // ========= STEP 17 serbest metin =========
  function renderStep17() {
    const lbl = RV_LOCALE === 'en'
      ? { lbl:"Additional Notes / Free Text", ph:"Additional findings, clinical comments, follow-up recommendations..." }
      : { lbl:"Ek Notlar / Serbest Metin", ph:"Rapora eklemek istediğiniz ek bulgular, klinik yorumlar, takip önerileri..." };
    return (
      <>
        <div className="grp">
          <div className="grp-label">{lbl.lbl}</div>
          <textarea value={data.free_text} onChange={e=>update("free_text", e.target.value)} placeholder={lbl.ph} style={{minHeight:140}}/>
        </div>
      </>
    );
  }

  // ========= STEP 18 inceleme =========
  function renderStep18() {
    const lbl = RV_LOCALE === 'en'
      ? { sub:"Data summary (you can go back to correct):",
          side:"Side", avn:"AVN assessment", alpha:"Alpha angle",
          ifs:"Ischiofemoral space", labTears:"Labral tears", mtLes:"Muscle/tendon lesions" }
      : { sub:"Doldurulan veri özeti (düzeltmek için geri gidebilirsiniz):",
          side:"Taraf", avn:"AVN değerlendirmesi", alpha:"Alpha açısı",
          ifs:"İskiofemoral mesafe", labTears:"Labral yırtık sayısı", mtLes:"Kas/tendon lezyon sayısı" };
    const summary = [];
    summary.push(`${lbl.side}: ${sideTR(data.side)} • ${ageText(data.age)} • ${sexTR(data.sex)}`);
    if (data.avn_suspicion === "var") summary.push(`${lbl.avn}: ARCO ${data.avn_stage || "?"}`);
    if (data.alpha_angle) summary.push(`${lbl.alpha}: ${data.alpha_angle}°`);
    if (data.lcea) summary.push(`LCEA: ${data.lcea}°`);
    if (data.ischiofem_space) summary.push(`${lbl.ifs}: ${data.ischiofem_space} mm`);
    summary.push(`${lbl.labTears}: ${(data.labralTears||[]).length}`);
    summary.push(`${lbl.mtLes}: ${mtLesions.length}`);
    return (
      <>
        <div className="grp-sub" style={{marginLeft:0}}>{lbl.sub}</div>
        <div className="lesion-list">
          {summary.map((s,i) => <div key={i} className="lesion-item">{s}</div>)}
        </div>
      </>
    );
  }

  // ========= STEP 19 ayırıcı tanı paneli =========
  function renderStep19() {
    const top = scores.slice(0, 8);
    const sub = RV_LOCALE === 'en'
      ? "Top 8 differential diagnosis probabilities based on entered data. This panel is used for clinical decision-making."
      : "Girilen verilere göre ilk 8 ayırıcı tanı olasılığı. Klinik karar için bu panel kullanılır.";
    return (
      <>
        <div className="grp-sub" style={{marginLeft:0}}>{sub}</div>
        <div className="dx-preview">
          {top.map((p,i) => (
            <div key={p.id} className="dx-row">
              <div className="dx-name">{i+1}. {pathoLabel(p)}</div>
              <div className="dx-bar"><div className="dx-bar-fill" style={{width: p.score+"%"}}/></div>
              <div className="dx-score">{p.score}%</div>
            </div>
          ))}
        </div>
      </>
    );
  }

  // ========= STEP 20 final =========
  function renderStep20() {
    return (
      <>
        <div className="grp-sub" style={{marginLeft:0}}>{RV_LOCALE === 'en' ? <>Click <b>Generate Report</b> to generate.</> : <>Rapor oluşturmak için <b>Raporu Oluştur</b>'a tıklayın.</>}</div>
        <div style={{textAlign:"center", padding:"20px 0"}}>
          <button className="btn btn-primary" onClick={()=>setShowReport(true)}>{T.nav.generate}</button>
        </div>
      </>
    );
  }

  // ========= Final (safety) =========
  function renderFinal() { return renderStep20(); }

  /* =====================================================
     Rapor overlay
  ===================================================== */
  function renderReport() {
    return (
      <div className="report-overlay" onClick={(e) => { if (e.target.className === "report-overlay") setShowReport(false); }}>
        <div className="report-sheet" onClick={e=>e.stopPropagation()}>
          <div className="report-toolbar">
            <button className="btn" onClick={()=>setShowReport(false)}>{T.toolbar.back}</button>
            <button className="btn" onClick={copyReportText}>{T.toolbar.copy}</button>
            <button className="btn" onClick={downloadHTML}>{T.toolbar.download}</button>
            <button className="btn btn-primary" onClick={printReport}>{T.toolbar.print}</button>
          </div>
          <div className="report-body" id="report-body-content" dangerouslySetInnerHTML={{__html: generateReport()}}/>
        </div>
      </div>
    );
  }

  /* ---------- render ---------- */
  const progressPct = Math.round(100 * (step + 1) / TOTAL_STEPS);

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand">
          <div className="brand-icon">K</div>
          <div>
            <div className="brand-title">{T.brand.title}</div>
            <div className="brand-sub">{T.brand.sub}</div>
          </div>
        </div>
        <div className="step-chip">{T.stepChip(step+1, TOTAL_STEPS)}</div>
      </div>

      <div className="progress"><div className="progress-fill" style={{width: progressPct + "%"}}/></div>

      <div className="card">
        <h2 className="step-title">{STEP_TITLES[step]}</h2>
        <div className="step-desc">
          {T.stepDescs[step]}
        </div>
        {renderStep()}
        <div className="nav">
          <button className="btn" onClick={goPrev} disabled={step === 0 && labralIdx === -1 && mtIdx === -1}>{T.nav.back}</button>
          <button className="btn btn-primary" onClick={goNext} disabled={!canNext()}>
            {step === TOTAL_STEPS - 2 ? T.nav.generate : T.nav.next}
          </button>
        </div>
      </div>

      {showReport && renderReport()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
