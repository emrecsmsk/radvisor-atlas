<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kalça MR Karar Destek Sistemi</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
<style>
  /* =============== TEMA =============== */
  :root {
    --bg:       #0f0e17;
    --bg2:      #1a1823;
    --bg3:      #24202f;
    --panel:    #1f1c2c;
    --border:   #332d44;
    --border2:  #443b5c;
    --text:     #ece6f2;
    --text2:    #b7afc9;
    --text3:    #8a8299;
    --accent:   #f43f5e;  /* rose */
    --accent2:  #fb7185;  /* rose-light */
    --accent3:  #be123c;  /* rose-dark */
    --accent-b: #06b6d4;  /* cyan */
    --accent-b2:#22d3ee;  /* cyan-light */
    --success:  #10b981;
    --warn:     #f59e0b;
    --danger:   #ef4444;
    --info:     #3b82f6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 15px; line-height: 1.5; }
  body::before {
    content: ""; position: fixed; inset: 0;
    background: radial-gradient(900px 600px at 12% -5%, rgba(244,63,94,0.10), transparent 60%),
                radial-gradient(900px 600px at 95% 105%, rgba(6,182,212,0.09), transparent 60%);
    pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  .app {
    max-width: 1180px; margin: 0 auto; padding: 24px 20px 80px;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(244,63,94,0.12), rgba(6,182,212,0.08));
    border: 1px solid var(--border);
    margin-bottom: 18px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-b));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #0f0e17;
    box-shadow: 0 4px 14px rgba(244,63,94,0.35);
  }
  .brand-title { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  .brand-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .step-chip {
    font-size: 12px; padding: 6px 12px; border-radius: 999px;
    background: rgba(244,63,94,0.15); color: var(--accent2);
    border: 1px solid rgba(244,63,94,0.3); font-weight: 600;
  }

  .progress {
    height: 6px; border-radius: 999px; background: var(--bg3); overflow: hidden;
    margin-bottom: 20px; border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-b));
    transition: width 0.3s ease;
  }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 24px;
    animation: fadeIn 0.22s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h2.step-title {
    margin: 0 0 4px; font-size: 20px; letter-spacing: 0.2px;
    display: flex; align-items: center; gap: 10px;
  }
  h2.step-title::before {
    content: ""; width: 4px; height: 22px; border-radius: 2px;
    background: linear-gradient(180deg, var(--accent), var(--accent-b));
  }
  .step-desc { color: var(--text3); font-size: 13px; margin: 0 0 18px 14px; }

  .grp { margin-bottom: 18px; }
  .grp-label {
    font-size: 12.5px; font-weight: 600; color: var(--accent2); letter-spacing: 0.6px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .grp-sub { font-size: 12px; color: var(--text3); margin-bottom: 8px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 9px 14px; border-radius: 999px; cursor: pointer;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); font-size: 13.5px; font-weight: 500;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.on {
    background: linear-gradient(135deg, rgba(244,63,94,0.18), rgba(6,182,212,0.10));
    border-color: var(--accent); color: #fff;
    box-shadow: 0 0 0 2px rgba(244,63,94,0.18);
  }
  .chip.on-b {
    background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(6,182,212,0.08));
    border-color: var(--accent-b); color: #fff;
    box-shadow: 0 0 0 2px rgba(6,182,212,0.18);
  }
  .chip.small { padding: 6px 10px; font-size: 12.5px; }
  .chip.danger.on {
    background: rgba(239,68,68,0.15);
    border-color: var(--danger); color: #fecaca;
    box-shadow: 0 0 0 2px rgba(239,68,68,0.15);
  }

  .field {
    display: flex; flex-direction: column; gap: 6px;
  }
  input[type="text"], input[type="number"], textarea, select {
    padding: 10px 12px; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; font-family: inherit;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(244,63,94,0.15);
  }
  textarea { resize: vertical; min-height: 90px; }

  .two-col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .three-col {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  }

  .checkbox {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
    font-size: 13.5px;
  }
  .checkbox:hover { border-color: var(--accent); }
  .checkbox.on {
    background: rgba(244,63,94,0.12); border-color: var(--accent);
  }
  .checkbox-box {
    width: 18px; height: 18px; border-radius: 5px;
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .checkbox.on .checkbox-box {
    background: var(--accent); border-color: var(--accent);
  }
  .checkbox.on .checkbox-box::after {
    content: "✓"; color: #fff; font-size: 12px; font-weight: 700;
  }

  .nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border);
  }
  .btn {
    padding: 10px 20px; border-radius: 10px; cursor: pointer;
    font-size: 14px; font-weight: 600; font-family: inherit;
    border: 1px solid var(--border); background: var(--bg3); color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover:not(:disabled) { border-color: var(--accent); color: #fff; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-b));
    color: #0f0e17; border: none;
    box-shadow: 0 4px 14px rgba(244,63,94,0.25);
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 6px 20px rgba(244,63,94,0.4);
    transform: translateY(-1px);
  }
  .btn-sm { padding: 7px 12px; font-size: 12.5px; }

  .lesion-list {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 14px;
  }
  .lesion-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; border-radius: 10px;
    background: linear-gradient(90deg, rgba(244,63,94,0.08), transparent);
    border: 1px solid rgba(244,63,94,0.25);
  }
  .lesion-item.b {
    background: linear-gradient(90deg, rgba(6,182,212,0.08), transparent);
    border-color: rgba(6,182,212,0.25);
  }
  .lesion-meta { font-size: 13.5px; }
  .lesion-meta b { color: var(--accent2); }
  .lesion-item.b .lesion-meta b { color: var(--accent-b2); }
  .del-btn {
    background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5; padding: 5px 10px; border-radius: 6px; cursor: pointer;
    font-size: 12px;
  }
  .del-btn:hover { background: rgba(239,68,68,0.25); }

  .sub-chip-row {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 5px 10px; border-radius: 8px;
    background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.25);
    font-size: 11.5px; color: var(--accent2); font-weight: 600;
    margin-bottom: 14px;
  }
  .sub-chip-row.b {
    background: rgba(6,182,212,0.1); border-color: rgba(6,182,212,0.25);
    color: var(--accent-b2);
  }

  .dx-preview {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-top: 16px;
  }
  .dx-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 10px; border-radius: 8px;
    margin-bottom: 6px;
    background: var(--bg3);
  }
  .dx-bar {
    flex: 1; height: 8px; border-radius: 999px;
    background: rgba(255,255,255,0.05); overflow: hidden;
    position: relative;
  }
  .dx-bar-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-b));
  }
  .dx-name { font-size: 13px; min-width: 200px; }
  .dx-score {
    font-size: 12px; font-weight: 700; min-width: 44px; text-align: right;
    color: var(--accent2);
  }

  /* ============ RAPOR ============ */
  .report-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    overflow-y: auto; padding: 30px 20px;
  }
  .report-sheet {
    max-width: 920px; margin: 0 auto;
    background: #fff; color: #111;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  .report-toolbar {
    display: flex; gap: 10px; flex-wrap: wrap;
    padding: 14px 22px; background: #f8fafc; border-bottom: 1px solid #e5e7eb;
  }
  .report-toolbar .btn {
    background: #fff; color: #0f172a; border: 1px solid #cbd5e1;
  }
  .report-toolbar .btn:hover { border-color: var(--accent); color: var(--accent3); }
  .report-toolbar .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-b));
    color: #fff; border: none;
  }
  .report-body {
    padding: 30px 36px; font-size: 13.5px; line-height: 1.55;
  }
  .report-header {
    text-align: center; margin-bottom: 20px;
    padding-bottom: 14px; border-bottom: 2px solid #1f2937;
  }
  .report-header h1 {
    margin: 0 0 4px; font-size: 20px; letter-spacing: 1px;
    color: #0f172a; font-weight: 700;
  }
  .report-header .sub {
    font-size: 12px; color: #475569; letter-spacing: 0.5px;
  }
  .rbox {
    border: 1px solid #cbd5e1; border-radius: 8px;
    margin-bottom: 14px; overflow: hidden;
  }
  .rbox-head {
    padding: 8px 14px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase;
    color: #fff;
    background: linear-gradient(90deg, #334155, #475569);
  }
  .rbox-head.rose {
    background: linear-gradient(90deg, #be123c, #f43f5e);
  }
  .rbox-head.cyan {
    background: linear-gradient(90deg, #0e7490, #06b6d4);
  }
  .rbox-head.amber {
    background: linear-gradient(90deg, #b45309, #f59e0b);
  }
  .rbox-head.slate {
    background: linear-gradient(90deg, #1e293b, #475569);
  }
  .rbox-body { padding: 12px 14px; background: #fff; }
  .rbox-body p { margin: 4px 0; }
  .zrow {
    display: grid; grid-template-columns: 180px 1fr;
    gap: 0; padding: 7px 12px;
    font-size: 13px;
  }
  .zrow:nth-child(odd)  { background: #f1f5f9; }
  .zrow:nth-child(even) { background: #fff; }
  .zrow .k { font-weight: 600; color: #334155; }
  .zrow .v { color: #0f172a; }

  .zbullet {
    padding: 6px 12px; font-size: 13px; border-left: 3px solid #cbd5e1;
  }
  .zbullet:nth-child(odd)  { background: #f8fafc; }
  .zbullet:nth-child(even) { background: #fff; }

  .yorum {
    background: #fff7ed; border-left: 4px solid #f59e0b;
    padding: 12px 14px; border-radius: 4px;
    margin: 10px 0; font-size: 13px; color: #78350f;
  }
  .yorum b { color: #b45309; }
  .yorum ul { margin: 6px 0 0 18px; padding: 0; }
  .yorum li { margin-bottom: 4px; }

  .ek-bulgu {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    background: #fef3c7; color: #92400e;
    font-size: 11px; font-weight: 600;
    margin-left: 6px; letter-spacing: 0.3px;
  }

  .dx-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .dx-table th, .dx-table td {
    padding: 7px 12px; text-align: left;
    border-bottom: 1px solid #e5e7eb;
  }
  .dx-table th {
    background: #f1f5f9; color: #334155; font-size: 11.5px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .dx-table tr:nth-child(even) td { background: #f8fafc; }
  .dx-table tr:nth-child(odd) td  { background: #fff; }
  .dx-table .pct { font-weight: 700; color: #be123c; text-align: right; }
  .dx-table .cat-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
    color: #fff;
  }

  .report-footer {
    margin-top: 18px; padding-top: 12px;
    border-top: 1px solid #e5e7eb;
    font-size: 11.5px; color: #64748b;
    display: flex; justify-content: space-between;
  }

  @media print {
    body * { visibility: hidden !important; }
    .report-overlay, .report-overlay * { visibility: visible !important; }
    .report-overlay {
      position: static !important; background: #fff !important; padding: 0 !important;
    }
    .report-sheet {
      box-shadow: none !important; border-radius: 0 !important; max-width: 100% !important;
    }
    .report-toolbar { display: none !important; }
    .report-body { padding: 14mm !important; }
  }

  .measure-hint {
    display: inline-block; margin-left: 6px;
    padding: 2px 8px; border-radius: 4px;
    background: rgba(6,182,212,0.12); color: var(--accent-b2);
    font-size: 11px; font-weight: 500;
  }
  .warn-note {
    background: rgba(245,158,11,0.10); border-left: 3px solid var(--warn);
    padding: 8px 12px; border-radius: 6px;
    font-size: 12.5px; color: #fcd34d; margin: 10px 0;
  }

  .inline-num {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    margin-right: 8px;
  }
  .inline-num input { width: 70px; padding: 4px 8px; }
  .inline-num-lbl { font-size: 12px; color: var(--text3); }

  .divider {
    height: 1px; background: var(--border); margin: 14px 0;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
/* =========================================================
   KALÇA MR KARAR DESTEK SİSTEMİ
   - 22 adımlı wizard
   - Labral yırtık döngüsü (3 altstep)
   - Kas/tendon lezyon döngüsü (4 altstep)
   - 28 patoloji skorlama motoru (else-if + Math.min(100) clamp)
   - 3-kuralli lezyon loop fix: finalize()→idx=-1,
     goNext idx===-1 iken atlar, goPrev ilk altsteptten
     lezyonu kaldırıp döngüden çıkar
   - Zebra + kutulu rapor
   - DOM overlay print + execCommand copy + Blob download
========================================================= */

const { useState, useMemo, useEffect, useRef } = React;

const TOTAL_STEPS = 22;
const MT_SUBSTEPS  = 4; // kas/tendon (muscle-tendon)
const LAB_SUBSTEPS = 3; // labral

/* =========================================================
   PATOLOJİ VERİTABANI
   Her patoloji: id, adi, kat (kategori)
   CAT_COLOR kategorilere renk atar (rapor cat-badge için)
========================================================= */
const CAT_COLOR = {
  "sıkışma":       "#be123c",
  "labrum":        "#9333ea",
  "kemik":         "#92400e",
  "dejeneratif":   "#475569",
  "morfolojik":    "#0e7490",
  "kas-tendon":    "#0f766e",
  "bursa":         "#ca8a04",
  "sinoviyal":     "#7c2d12",
  "inflamatuar":   "#b91c1c",
  "diğer":         "#334155"
};

const PATHO = [
  { id:"fai_cam",           adi:"CAM tip Femoroasetabuler Sıkışma (FAI)",      kat:"sıkışma" },
  { id:"fai_pincer",        adi:"Pincer tip FAI",                              kat:"sıkışma" },
  { id:"fai_mixed",         adi:"Mikst tip FAI",                               kat:"sıkışma" },
  { id:"labral_tear",       adi:"Asetabuler Labrum Yırtığı",                   kat:"labrum" },
  { id:"paralab_cyst",      adi:"Paralabral Kist",                             kat:"labrum" },
  { id:"avn",               adi:"Femur Başı Avasküler Nekrozu (AVN)",          kat:"kemik" },
  { id:"subchondral_fx",    adi:"Subkondral Yetmezlik Fraktürü",               kat:"kemik" },
  { id:"stress_fx",         adi:"Femur Boynu Stres Fraktürü",                  kat:"kemik" },
  { id:"transient_op",      adi:"Geçici Osteoporoz / Kemik İliği Ödemi Sendromu", kat:"kemik" },
  { id:"oa_hip",            adi:"Kalça Osteoartriti",                          kat:"dejeneratif" },
  { id:"ddh",               adi:"Asetabuler Displazi (DDH varyantı)",          kat:"morfolojik" },
  { id:"ischiofem_imp",     adi:"İskiofemoral Sıkışma Sendromu",               kat:"sıkışma" },
  { id:"glut_tendinopathy", adi:"Gluteal Tendinopati (Glut. med/min)",         kat:"kas-tendon" },
  { id:"glut_tear",         adi:"Gluteal Tendon Yırtığı (Glut. med/min)",      kat:"kas-tendon" },
  { id:"troch_bursitis",    adi:"Trokanterik Bursit / Büyük Trokanter Ağrı Sendromu", kat:"bursa" },
  { id:"iliopsoas_tendinop",adi:"İliopsoas Tendinopatisi",                     kat:"kas-tendon" },
  { id:"iliopsoas_bursit",  adi:"İliopsoas Bursiti",                           kat:"bursa" },
  { id:"snapping_int",      adi:"İç Kaynaklı Snapping Hip (İliopsoas)",        kat:"kas-tendon" },
  { id:"snapping_ext",      adi:"Dış Kaynaklı Snapping Hip (ITB)",             kat:"kas-tendon" },
  { id:"hamstring_inj",     adi:"Proksimal Hamstring Yaralanması",             kat:"kas-tendon" },
  { id:"adductor_inj",      adi:"Adduktor Yaralanması",                        kat:"kas-tendon" },
  { id:"rf_inj",            adi:"Rektus Femoris Yaralanması",                  kat:"kas-tendon" },
  { id:"athletic_pubalgia", adi:"Atletik Pubalji / Spor Hernisi",              kat:"kas-tendon" },
  { id:"piriformis_synd",   adi:"Piriformis Sendromu",                         kat:"kas-tendon" },
  { id:"synovitis",         adi:"Sinovit / Kapsülit",                          kat:"sinoviyal" },
  { id:"pvns",              adi:"PVNS / Tenosinoviyal Dev Hücreli Tümör",      kat:"sinoviyal" },
  { id:"septic",            adi:"Septik Artrit",                               kat:"inflamatuar" },
  { id:"het_oss",           adi:"Heterotopik Ossifikasyon / Miyozitis Ossifikans", kat:"diğer" }
];

/* =========================================================
   ÖZELLİK HARİTASI
   data state → skorlamada kullanılacak binary/nümerik bayraklar
========================================================= */
function buildFeatureMap(data, mtLesions, labralTears) {
  const F = {};

  // Morfolojik ölçümler
  const a = parseFloat(data.alpha_angle);
  const lcea = parseFloat(data.lcea);
  const ai = parseFloat(data.acet_index);
  const ifs = parseFloat(data.ischiofem_space);
  const qfs = parseFloat(data.qf_space);

  F.alpha_high  = !isNaN(a) && a > 55;
  F.alpha_vhigh = !isNaN(a) && a > 60;
  F.hn_offset_reduced = data.hn_offset === "azalmış";
  F.cam_morph = data.cam_morphology === "var";

  F.lcea_high  = !isNaN(lcea) && lcea > 40;
  F.lcea_low   = !isNaN(lcea) && lcea < 25;
  F.acet_retro = data.cross_over === "var";
  F.pincer_focal = data.pincer_focal === "var";
  F.acet_index_high = !isNaN(ai) && ai > 10;

  F.ifs_narrow   = !isNaN(ifs) && ifs < 17;
  F.ifs_vnarrow  = !isNaN(ifs) && ifs < 13;
  F.qfs_narrow   = !isNaN(qfs) && qfs < 8;
  F.qf_edema     = data.qf_edema === "var";
  F.qf_atrophy   = data.qf_atrophy === "var";

  // Kemik iliği / AVN
  F.head_bme         = data.head_bme === "var";
  F.head_bme_diffuse = data.head_bme_pattern === "diffuz";
  F.head_bme_focal   = data.head_bme_pattern === "fokal";
  F.neck_bme         = data.neck_bme === "var";
  F.avn_double_line  = data.avn_double_line === "var";
  F.avn_crescent     = data.avn_crescent === "var";
  F.avn_collapse     = data.avn_collapse === "var";
  F.avn_stage        = data.avn_stage || "";
  F.fx_line          = data.fx_line === "var";
  F.fx_location      = data.fx_location || "";
  F.subch_fx         = data.subchondral_fx === "var";

  // Kıkırdak
  F.cart_acet_ant    = data.cart_acet_ant   && data.cart_acet_ant !== "intakt";
  F.cart_acet_sup    = data.cart_acet_sup   && data.cart_acet_sup !== "intakt";
  F.cart_acet_post   = data.cart_acet_post  && data.cart_acet_post !== "intakt";
  F.cart_fem         = data.cart_fem        && data.cart_fem !== "intakt";
  F.cart_any_severe  = [data.cart_acet_ant, data.cart_acet_sup, data.cart_acet_post, data.cart_fem]
                         .some(v => v === "grade3" || v === "grade4");
  F.osteophyte       = data.osteophyte === "var";
  F.joint_narrow     = data.joint_narrowing === "var";
  F.subch_cyst       = data.subchondral_cyst === "var";
  F.subch_scl        = data.subchondral_sclerosis === "var";
  F.tonnis_grade     = parseInt(data.tonnis_grade || "0");

  // Labrum
  F.labrum_any = (labralTears || []).length > 0;
  F.labrum_ant_sup = (labralTears || []).some(t => t.quadrant === "anterosup" || t.quadrant === "sup");
  F.labrum_posterior = (labralTears || []).some(t => t.quadrant === "posterosup" || t.quadrant === "post" || t.quadrant === "posteroinf");
  F.labrum_hypertrophy = data.labrum_hypertrophy === "var";
  F.paralab_cyst = (labralTears || []).some(t => t.paralabralCyst) || data.paralab_cyst === "var";

  // Ligamentum teres
  F.lt_partial = data.ligteres === "parsiyel";
  F.lt_full    = data.ligteres === "komplet";

  // Kapsül
  F.capsule_thick = data.capsule_thick === "var";
  F.capsule_edema = data.capsule_edema === "var";
  F.iliofem_thick = data.iliofem_thick === "var";

  // Sinovyum / efüzyon
  F.effusion_small = data.effusion === "minimal";
  F.effusion_mod   = data.effusion === "orta";
  F.effusion_large = data.effusion === "belirgin";
  F.effusion_any   = data.effusion && data.effusion !== "yok";
  F.syn_thick      = data.synovial_thick === "var";
  F.syn_enhance    = data.synovial_enhance === "var";
  F.low_signal_syn = data.low_signal_synovium === "var";
  F.blooming       = data.blooming === "var";
  F.erosion        = data.erosion === "var";
  F.soft_tissue_edema = data.soft_tissue_edema === "var";
  F.hem_effusion   = data.hem_effusion === "var";

  // Kas-tendon lezyon toplam
  const mt = mtLesions || [];
  const byMuscle = {};
  mt.forEach(L => {
    if (!L.muscle) return;
    byMuscle[L.muscle] = byMuscle[L.muscle] || [];
    byMuscle[L.muscle].push(L);
  });
  function any(m, t) {
    return (byMuscle[m] || []).some(L => !t || L.type === t);
  }
  F.glut_med_any  = any("glut_med");
  F.glut_min_any  = any("glut_min");
  F.glut_tendinop = any("glut_med", "tendinopati") || any("glut_min", "tendinopati");
  F.glut_tear_partial = any("glut_med", "parsiyel") || any("glut_min", "parsiyel");
  F.glut_tear_full    = any("glut_med", "tam") || any("glut_min", "tam");
  F.glut_any_tear = F.glut_tear_partial || F.glut_tear_full;
  F.glut_atrophy  = mt.some(L => (L.muscle === "glut_med" || L.muscle === "glut_min") && parseInt(L.goutallier||"0") >= 2);

  F.ilio_any       = any("iliopsoas");
  F.ilio_tendinop  = any("iliopsoas", "tendinopati");
  F.ilio_tear      = any("iliopsoas", "parsiyel") || any("iliopsoas", "tam");
  F.ilio_bursa_fluid = data.iliopsoas_bursa === "sıvı" || data.iliopsoas_bursa === "belirgin";
  F.ilio_bursa_large = data.iliopsoas_bursa === "belirgin";

  F.hams_any       = any("hamstring");
  F.hams_tendinop  = any("hamstring", "tendinopati");
  F.hams_tear      = any("hamstring", "parsiyel") || any("hamstring", "tam");
  F.hams_retraction = mt.some(L => L.muscle === "hamstring" && parseFloat(L.retraction||"0") > 2);
  F.ischial_edema  = data.ischial_tub_edema === "var";

  F.add_any        = any("adductor");
  F.add_tendinop   = any("adductor", "tendinopati");
  F.add_tear       = any("adductor", "parsiyel") || any("adductor", "tam");
  F.pubic_edema    = data.pubic_bone_edema === "var";
  F.rec_add_apo    = data.rec_add_apo === "var";

  F.rf_any         = any("rf");
  F.rf_tear        = any("rf", "parsiyel") || any("rf", "tam");
  F.aiis_edema     = data.aiis_edema === "var";

  F.pir_any        = any("piriformis");
  F.pir_asymm      = data.piriformis_asymm === "var";
  F.sciatic_edema  = data.sciatic_edema === "var";

  // Bursa
  F.troch_bursa_fluid = data.troch_bursa === "sıvı" || data.troch_bursa === "belirgin";
  F.troch_bursa_large = data.troch_bursa === "belirgin";
  F.peritroch_edema   = data.peritroch_edema === "var";
  F.ischiogluteal_bursa = data.ischiogluteal_bursa === "var";

  // ITB
  F.itb_thick      = data.itb_thick === "var";

  // Tümör / kitle / ossifikasyon
  F.mass_soft      = data.mass_soft === "var";
  F.mass_bone      = data.mass_bone === "var";
  F.het_ossif      = data.het_ossification === "var";

  // Risk faktörleri
  F.ageYoung       = parseInt(data.age || "0") < 40;
  F.ageOld         = parseInt(data.age || "0") > 60;
  F.male           = data.sex === "erkek";
  F.pregnant       = data.pregnant === "var";
  F.athlete        = data.athlete === "var";
  F.osteoporosis   = data.osteoporosis === "var";
  F.avn_risk       = data.avn_risk === "var"; // steroid, alkol, hemoglobinopati
  F.trauma         = data.trauma === "var";
  F.clinical_infection = data.clinical_infection === "var";

  return F;
}

/* =========================================================
   SKORLAMA MOTORU
   Her patoloji için: özellik → ağırlık eklemeleri.
   Kritik: else-if zinciri kullan, Math.min(100) clamp uygula.
========================================================= */
function computeScores(F) {
  const out = [];
  for (const P of PATHO) {
    let score = 0, max = 0;

    // --------- CAM FAI ---------
    if (P.id === "fai_cam") {
      max = 70;
      if (F.alpha_vhigh)      score += 20;
      else if (F.alpha_high)  score += 14;
      if (F.cam_morph)        score += 14;
      if (F.hn_offset_reduced) score += 10;
      if (F.labrum_ant_sup)   score += 10;
      if (F.cart_acet_ant)    score += 8;
      if (F.ageYoung)         score += 4;
      if (F.male)             score += 4;
    }
    // --------- Pincer FAI ---------
    else if (P.id === "fai_pincer") {
      max = 70;
      if (F.lcea_high)        score += 20;
      if (F.acet_retro)       score += 14;
      if (F.pincer_focal)     score += 10;
      if (F.labrum_ant_sup)   score += 10;
      if (F.cart_acet_post)   score += 8;
      if (F.labrum_posterior) score += 6; // contrecoup
      if (!F.ageYoung)        score += 2;
    }
    // --------- Mikst FAI ---------
    else if (P.id === "fai_mixed") {
      max = 70;
      if (F.alpha_high && F.lcea_high)   score += 24;
      else if (F.alpha_high || F.lcea_high) score += 10;
      if (F.labrum_any)       score += 14;
      if (F.cart_acet_ant || F.cart_acet_post) score += 12;
      if (F.cam_morph)        score += 6;
      if (F.acet_retro)       score += 6;
      if (F.hn_offset_reduced) score += 4;
      if (F.ageYoung)         score += 4;
    }
    // --------- Labral yırtık ---------
    else if (P.id === "labral_tear") {
      max = 55;
      if (F.labrum_any)       score += 30;
      if (F.paralab_cyst)     score += 10;
      if (F.labrum_ant_sup)   score += 6;
      if (F.labrum_hypertrophy) score += 4;
      if (F.alpha_high || F.lcea_high) score += 4;
      if (F.cart_acet_ant)    score += 3;
    }
    // --------- Paralabral kist ---------
    else if (P.id === "paralab_cyst") {
      max = 45;
      if (F.paralab_cyst)     score += 30;
      if (F.labrum_any)       score += 10;
      if (F.cart_acet_ant)    score += 3;
      if (F.alpha_high)       score += 2;
    }
    // --------- AVN ---------
    else if (P.id === "avn") {
      max = 80;
      if (F.avn_double_line)  score += 24;
      if (F.avn_crescent)     score += 16;
      if (F.avn_collapse)     score += 16;
      if (F.head_bme_focal)   score += 12;
      else if (F.head_bme)    score += 6;
      if (F.avn_risk)         score += 8;
      if (F.avn_stage === "IV" || F.avn_stage === "III") score += 4;
    }
    // --------- Subkondral yetmezlik fx ---------
    else if (P.id === "subchondral_fx") {
      max = 60;
      if (F.subch_fx)         score += 26;
      if (F.head_bme)         score += 14;
      if (F.ageOld)           score += 10;
      if (F.osteoporosis)     score += 6;
      if (!F.avn_double_line) score += 4;
    }
    // --------- Stres fraktür ---------
    else if (P.id === "stress_fx") {
      max = 60;
      if (F.fx_line && F.fx_location === "femoral_neck") score += 26;
      else if (F.fx_line)     score += 16;
      if (F.neck_bme)         score += 14;
      if (F.athlete)          score += 10;
      if (F.osteoporosis)     score += 6;
      if (F.head_bme)         score += 4;
    }
    // --------- Geçici osteoporoz / BME sendromu ---------
    else if (P.id === "transient_op") {
      max = 60;
      if (F.head_bme_diffuse) score += 22;
      if (F.neck_bme)         score += 14;
      if (!F.avn_double_line && !F.avn_crescent) score += 10;
      if (F.pregnant)         score += 8;
      else if (F.ageOld)      score += 4;
      if (F.effusion_any)     score += 6;
    }
    // --------- Kalça OA ---------
    else if (P.id === "oa_hip") {
      max = 80;
      if (F.tonnis_grade >= 3)  score += 24;
      else if (F.tonnis_grade === 2) score += 16;
      else if (F.tonnis_grade === 1) score += 8;
      if (F.osteophyte)       score += 14;
      if (F.joint_narrow)     score += 12;
      if (F.cart_any_severe)  score += 14;
      if (F.subch_cyst)       score += 8;
      if (F.subch_scl)        score += 6;
      if (F.ageOld)           score += 2;
    }
    // --------- Asetabuler displazi ---------
    else if (P.id === "ddh") {
      max = 60;
      if (F.lcea_low)         score += 26;
      if (F.acet_index_high)  score += 16;
      if (F.labrum_hypertrophy) score += 10;
      if (F.labrum_ant_sup)   score += 6;
      if (F.ageYoung)         score += 2;
    }
    // --------- İskiofemoral sıkışma ---------
    else if (P.id === "ischiofem_imp") {
      max = 70;
      if (F.ifs_vnarrow)      score += 26;
      else if (F.ifs_narrow)  score += 18;
      if (F.qf_edema)         score += 20;
      if (F.qfs_narrow)       score += 12;
      if (F.qf_atrophy)       score += 10;
      if (F.sciatic_edema)    score += 2;
    }
    // --------- Gluteal tendinopati ---------
    else if (P.id === "glut_tendinopathy") {
      max = 55;
      if (F.glut_tendinop)    score += 26;
      if (F.peritroch_edema)  score += 12;
      if (F.troch_bursa_fluid) score += 10;
      if (F.glut_med_any || F.glut_min_any) score += 4;
      if (F.itb_thick)        score += 3;
    }
    // --------- Gluteal yırtık ---------
    else if (P.id === "glut_tear") {
      max = 70;
      if (F.glut_tear_full)    score += 30;
      else if (F.glut_tear_partial) score += 20;
      if (F.glut_atrophy)      score += 14;
      if (F.peritroch_edema)   score += 10;
      if (F.troch_bursa_fluid) score += 10;
      if (F.glut_med_any || F.glut_min_any) score += 6;
    }
    // --------- Trokanterik bursit / GTPS ---------
    else if (P.id === "troch_bursitis") {
      max = 55;
      if (F.troch_bursa_large) score += 22;
      else if (F.troch_bursa_fluid) score += 14;
      if (F.peritroch_edema)  score += 14;
      if (F.glut_tendinop)    score += 10;
      if (F.glut_any_tear)    score += 6;
      if (F.itb_thick)        score += 3;
    }
    // --------- İliopsoas tendinopati ---------
    else if (P.id === "iliopsoas_tendinop") {
      max = 50;
      if (F.ilio_tendinop)    score += 24;
      if (F.ilio_bursa_fluid) score += 14;
      if (F.ilio_any)         score += 6;
      if (F.ilio_tear)        score += 6;
    }
    // --------- İliopsoas bursiti ---------
    else if (P.id === "iliopsoas_bursit") {
      max = 50;
      if (F.ilio_bursa_large) score += 26;
      else if (F.ilio_bursa_fluid) score += 16;
      if (F.ilio_tendinop)    score += 10;
      if (F.effusion_any)     score += 4; // kalça ile komünikasyon olabilir
    }
    // --------- İç snapping hip ---------
    else if (P.id === "snapping_int") {
      max = 45;
      if (F.ilio_tendinop)    score += 20;
      if (F.ilio_bursa_fluid) score += 14;
      if (F.ilio_any)         score += 6;
      if (F.ageYoung)         score += 3;
    }
    // --------- Dış snapping hip ---------
    else if (P.id === "snapping_ext") {
      max = 45;
      if (F.itb_thick)        score += 22;
      if (F.troch_bursa_fluid) score += 12;
      if (F.glut_tendinop)    score += 8;
      if (F.peritroch_edema)  score += 3;
    }
    // --------- Proksimal hamstring ---------
    else if (P.id === "hamstring_inj") {
      max = 70;
      if (F.hams_tear)        score += 28;
      else if (F.hams_tendinop) score += 16;
      if (F.hams_retraction)  score += 14;
      if (F.ischial_edema)    score += 12;
      if (F.ischiogluteal_bursa) score += 6;
      if (F.athlete)          score += 4;
      if (F.hams_any)         score += 6;
    }
    // --------- Adduktor yaralanma ---------
    else if (P.id === "adductor_inj") {
      max = 55;
      if (F.add_tear)         score += 24;
      else if (F.add_tendinop) score += 14;
      if (F.pubic_edema)      score += 12;
      if (F.rec_add_apo)      score += 10;
      if (F.athlete)          score += 5;
      if (F.add_any)          score += 4;
    }
    // --------- Rektus femoris yaralanma ---------
    else if (P.id === "rf_inj") {
      max = 50;
      if (F.rf_tear)          score += 26;
      else if (F.rf_any)      score += 14;
      if (F.aiis_edema)       score += 14;
      if (F.athlete)          score += 6;
    }
    // --------- Atletik pubalji ---------
    else if (P.id === "athletic_pubalgia") {
      max = 60;
      if (F.pubic_edema)      score += 20;
      if (F.rec_add_apo)      score += 18;
      if (F.add_tendinop || F.add_tear) score += 14;
      if (F.athlete)          score += 8;
    }
    // --------- Piriformis sendromu ---------
    else if (P.id === "piriformis_synd") {
      max = 55;
      if (F.pir_asymm)        score += 18;
      if (F.sciatic_edema)    score += 20;
      if (F.pir_any)          score += 14;
      if (!F.avn_double_line) score += 3;
    }
    // --------- Sinovit / kapsülit ---------
    else if (P.id === "synovitis") {
      max = 60;
      if (F.syn_thick)        score += 20;
      if (F.syn_enhance)      score += 16;
      if (F.effusion_large)   score += 14;
      else if (F.effusion_mod) score += 8;
      if (F.capsule_thick || F.capsule_edema) score += 10;
    }
    // --------- PVNS ---------
    else if (P.id === "pvns") {
      max = 70;
      if (F.low_signal_syn)   score += 26;
      if (F.blooming)         score += 22;
      if (F.erosion)          score += 12;
      if (F.effusion_any)     score += 6;
      if (F.hem_effusion)     score += 4;
    }
    // --------- Septik artrit ---------
    else if (P.id === "septic") {
      max = 70;
      if (F.clinical_infection) score += 18;
      if (F.effusion_mod || F.effusion_large) score += 16;
      if (F.syn_thick || F.syn_enhance) score += 14;
      if (F.head_bme)         score += 10;
      if (F.soft_tissue_edema) score += 12;
    }
    // --------- Heterotopik ossifikasyon / miyozitis ossifikans ---------
    else if (P.id === "het_oss") {
      max = 45;
      if (F.het_ossif)        score += 24;
      if (F.trauma)           score += 12;
      if (F.mass_soft)        score += 6;
      if (F.soft_tissue_edema) score += 3;
    }

    const raw = max ? Math.min(100, Math.round(100 * score / max)) : 0;
    out.push({ ...P, score: raw });
  }
  out.sort((a,b) => b.score - a.score);
  return out;
}

}

    alpha_angle:"", hn_offset:"", cam_morphology:"",

    lcea:"", acet_index:"", cross_over:"", pincer_focal:"",
    acet_coverage:"", wall_sign:"",
    // 6 - kıkırdak
    cart_acet_ant:"", cart_acet_sup:"", cart_acet_post:"",
    cart_fem:"", osteophyte:"", joint_narrowing:"",
    subchondral_cyst:"", subchondral_sclerosis:"", tonnis_grade:"",
    // 7 - labrum ön değerlendirme + döngü (aşağıda)
    labrum_hypertrophy:"", labrum_degeneration:"",
    labrum_evaluated:"evet",
    labralTears: [],
    // 8 - paralabral kist + lig teres
    paralab_cyst:"", paralab_cyst_loc:"", paralab_cyst_size:"",
    ligteres:"", ligteres_detail:"",
    // 9 - kapsül ve ligamanlar
    capsule_thick:"", capsule_edema:"",
    iliofem_thick:"", ischiofem_lig:"", pubofem_lig:"",
    // 10 - iskiofemoral ve qf space
    ischiofem_space:"", qf_space:"", qf_edema:"", qf_atrophy:"",
    // 11 - sinovyum / efüzyon
    effusion:"", synovial_thick:"", synovial_enhance:"",
    low_signal_synovium:"", blooming:"", erosion:"",
    soft_tissue_edema:"", hem_effusion:"",
    // 12 - kas-tendon (döngü aşağıda)
    mt_evaluated:"evet",
    // 13 - bursa
    troch_bursa:"", peritroch_edema:"",
    iliopsoas_bursa:"", ischiogluteal_bursa:"", itb_thick:"",
    // 14 - nörovasküler
    sciatic_edema:"", piriformis_asymm:"",
    femoral_nerve:"", obturator_nerve:"", lfcn:"",
    // 15 - pubik simfiz / atletik pubalji
    pubic_bone_edema:"", pubic_widening:"",
    rec_add_apo:"", ischial_tub_edema:"", aiis_edema:"",
    // 16 - kemik lezyon / tümör / diğer
    mass_soft:"", mass_bone:"", mass_detail:"",
    fx_line:"", fx_location:"", subchondral_fx:"",
    het_ossification:"",
    // 17 - serbest
    free_text: ""
  });

  const [mtLesions, setMtLesions] = useState([]);
  const [mtIdx, setMtIdx] = useState(-1);
  const [mtSub, setMtSub] = useState(0);

  const [labralIdx, setLabralIdx] = useState(-1);
  const [labralSub, setLabralSub] = useState(0);

  function update(path, value) {
    setData(d => {
      const nd = {...d};
      if (path.includes(".")) {
        const [a,b] = path.split(".");
        nd[a] = {...nd[a], [b]: value};
      } else {
        nd[path] = value;
      }
      return nd;
    });
  }

  /* ---------- Labral loop ---------- */
  function startLabral() {
    const L = { id: Date.now(), quadrant:"", category:"", subtype:"", paralabralCyst:false };
    const newArr = [...(data.labralTears||[]), L];
    update("labralTears", newArr);
    setLabralIdx(newArr.length - 1);
    setLabralSub(0);
  }
  function updateCurrentLabral(patch) {
    update("labralTears", (data.labralTears||[]).map((L,i)=> i===labralIdx ? {...L, ...patch} : L));
  }
  function finalizeLabral() {
    setLabralIdx(-1);
    setLabralSub(0);
  }
  function removeLabral(i) {
    update("labralTears", (data.labralTears||[]).filter((_,j)=> j!==i));
  }

  /* ---------- Kas/tendon loop ---------- */
  function startMT() {
    const L = { id: Date.now(), muscle:"", location:"", type:"", retraction:"", goutallier:"", bursa_rel:false };
    setMtLesions(ls => {
      const n = [...ls, L];
      setMtIdx(n.length - 1);
      setMtSub(0);
      return n;
    });
  }
  function updateCurrentMT(patch) {
    setMtLesions(ls => ls.map((L,i)=> i===mtIdx ? {...L, ...patch} : L));
  }
  function finalizeMT() {
    setMtIdx(-1);
    setMtSub(0);
  }
  function removeMT(i) {
    setMtLesions(ls => ls.filter((_,j)=> j!==i));
  }

  const scores = useMemo(() => {
    const F = buildFeatureMap(data, mtLesions, data.labralTears || []);
    return computeScores(F);
  }, [data, mtLesions]);

  /* ---------- Navigasyon ---------- */
  function canNext() {
    if (step === 0) return !!data.side && !!data.age && !!data.sex;
    // Adım 7: labral loop
    if (step === 7 && labralIdx !== -1) {
      const L = (data.labralTears||[])[labralIdx];
      if (!L) return false;
      if (labralSub === 0) return !!L.quadrant;
      if (labralSub === 1) return !!L.category;
      if (labralSub === 2) {
        if (L.category === "fraying") return true;
        return !!L.subtype;
      }
    }
    // Adım 12: kas/tendon loop
    if (step === 12 && mtIdx !== -1) {
      const L = mtLesions[mtIdx];
      if (!L) return false;
      if (mtSub === 0) return !!L.muscle;
      if (mtSub === 1) return !!L.location;
      if (mtSub === 2) return !!L.type;
      if (mtSub === 3) return true;
    }
    return true;
  }

  function goNext() {
    // Labral döngü
    if (step === 7 && labralIdx !== -1) {
      if (labralSub < LAB_SUBSTEPS - 1) { setLabralSub(s=>s+1); return; }
      finalizeLabral();
      return;
    }
    // Kas/tendon döngü
    if (step === 12 && mtIdx !== -1) {
      if (mtSub < MT_SUBSTEPS - 1) { setMtSub(s=>s+1); return; }
      finalizeMT();
      return;
    }
    // AVN detay adımını atla (koşullu: step 3)
    if (step === 2) {
      if (data.avn_suspicion !== "var") {
        setStep(4);
        return;
      }
    }
    if (step < TOTAL_STEPS - 1) setStep(s=>s+1);
    else setShowReport(true);
  }

  function goPrev() {
    // Labral döngü içindeyken
    if (step === 7 && labralIdx !== -1) {
      if (labralSub > 0) { setLabralSub(s=>s-1); return; }
      // ilk altsteptte geri → lezyonu kaldır
      update("labralTears", (data.labralTears||[]).filter((_,j)=> j!==labralIdx));
      setLabralIdx(-1); setLabralSub(0);
      return;
    }
    // Kas/tendon döngü içindeyken
    if (step === 12 && mtIdx !== -1) {
      if (mtSub > 0) { setMtSub(s=>s-1); return; }
      setMtLesions(ls => ls.filter((_,i)=> i!==mtIdx));
      setMtIdx(-1); setMtSub(0);
      return;
    }
    // AVN atlama: step 4 iken avn_suspicion yoksa geri 2'ye
    if (step === 4 && data.avn_suspicion !== "var") {
      setStep(2);
      return;
    }
    if (step > 0) setStep(s=>s-1);
  }

  /* ---------- Rapor oluştur ---------- */
  function generateReport() {
    const F = buildFeatureMap(data, mtLesions, data.labralTears || []);
    const top = scores.slice(0, 6);

    const lines = [];
    lines.push(`<div class="report-header">`);
    lines.push(`<h1>KALÇA MANYETİK REZONANS GÖRÜNTÜLEME</h1>`);
    lines.push(`<div class="sub">${sideTR(data.side).toUpperCase()} KALÇA &nbsp;•&nbsp; ${todayStr()}</div>`);
    lines.push(`</div>`);

    // Klinik bilgi
    lines.push(`<div class="rbox"><div class="rbox-head slate">Klinik Bilgi</div><div class="rbox-body">`);
    lines.push(`<div class="zrow"><div class="k">Taraf</div><div class="v">${sideTR(data.side)}</div></div>`);
    lines.push(`<div class="zrow"><div class="k">Yaş / Cinsiyet</div><div class="v">${ageText(data.age)} • ${sexTR(data.sex)}</div></div>`);
    if (data.clinical) lines.push(`<div class="zrow"><div class="k">Klinik</div><div class="v">${data.clinical}</div></div>`);
    if (data.ex) lines.push(`<div class="zrow"><div class="k">Muayene</div><div class="v">${data.ex}</div></div>`);
    const risks = [];
    if (data.pregnant === "var") risks.push("gebelik");
    if (data.athlete === "var") risks.push("sporcu");
    if (data.osteoporosis === "var") risks.push("osteoporoz");
    if (data.avn_risk === "var") risks.push("AVN risk faktörü (steroid/alkol/hemoglobinopati)");
    if (data.trauma === "var") risks.push("travma");
    if (data.clinical_infection === "var") risks.push("enfeksiyon şüphesi");
    if (risks.length) lines.push(`<div class="zrow"><div class="k">Risk Faktörleri</div><div class="v">${risks.join(", ")}</div></div>`);
    lines.push(`</div></div>`);

    // Teknik
    const seqs = [];
    if (data.seq.t1) seqs.push("T1");
    if (data.seq.t2) seqs.push("T2");
    if (data.seq.pd) seqs.push("PD");
    if (data.seq.pdfs) seqs.push("PD yağ baskılı");
    if (data.seq.t2fs_cor) seqs.push("Koronal T2 FS");
    if (data.seq.t2fs_ax) seqs.push("Aksiyel T2 FS");
    if (data.seq.t1_obl) seqs.push("Radyal/Oblique T1");
    if (data.seq.t1fs_post) seqs.push("Post-kontrast T1 FS");
    if (data.seq.arthro) seqs.push("MR artrografi" + (data.arthro_detail ? ` (${data.arthro_detail})` : ""));
    lines.push(`<div class="rbox"><div class="rbox-head">Teknik</div><div class="rbox-body">`);
    lines.push(`<p>${sideTR(data.side)} kalça eklemi üzerinde sekanslar uygulandı: ${seqs.join(", ") || "standart protokol"}.</p>`);
    lines.push(`</div></div>`);

    // Kemik yapılar
    const boneFindings = [];
    if (data.head_bme === "var") {
      let s = "Femur başında kemik iliği ödemi";
      if (data.head_bme_pattern === "fokal") s += " (fokal patern)";
      else if (data.head_bme_pattern === "diffuz") s += " (yaygın patern)";
      boneFindings.push(s);
    }
    if (data.neck_bme === "var") boneFindings.push("Femur boynunda kemik iliği ödemi");
    if (data.avn_suspicion === "var") {
      let avnLine = "Femur başında AVN ile uyumlu bulgular";
      const avnDet = [];
      if (data.avn_double_line === "var") avnDet.push("double line sign (+)");
      if (data.avn_crescent === "var") avnDet.push("crescent sign (+)");
      if (data.avn_collapse === "var") avnDet.push("subkondral çökme");
      if (data.avn_stage) avnDet.push(`ARCO Evre ${data.avn_stage}`);
      if (data.avn_ficat) avnDet.push(`Ficat Evre ${data.avn_ficat}`);
      if (data.avn_lesion_pct) avnDet.push(`lezyon yüzdesi ~%${data.avn_lesion_pct}`);
      if (avnDet.length) avnLine += ": " + avnDet.join(", ");
      boneFindings.push(avnLine);
    }
    if (data.fx_line === "var") {
      let fl = "Fraktür hattı izlenmekte";
      if (data.fx_location === "femoral_neck") fl += " (femur boynu — stres fraktür tipi)";
      else if (data.fx_location === "subchondral") fl += " (subkondral)";
      boneFindings.push(fl);
    }
    if (data.subchondral_fx === "var") boneFindings.push("Subkondral yetmezlik fraktürü ile uyumlu hat/çizgi izlenmekte");
    if (boneFindings.length === 0) boneFindings.push("Femur başı ve boynu kemik iliği sinyali normal sınırlardadır. Belirgin kemik iliği ödemi, AVN bulgusu ya da fraktür hattı saptanmamıştır.");
    lines.push(`<div class="rbox"><div class="rbox-head rose">Kemik Yapılar — Femur Başı / Boynu</div><div class="rbox-body">`);
    boneFindings.forEach((f,i) => lines.push(`<div class="zbullet">${f}</div>`));
    lines.push(`</div></div>`);

    // Morfolojik bulgular
    const morphFindings = [];
    if (data.alpha_angle) {
      const a = parseFloat(data.alpha_angle);
      let s = `Alpha açısı: ${data.alpha_angle}°`;
      if (a > 60) s += " (belirgin artmış — CAM morfolojisi ile uyumlu)";
      else if (a > 55) s += " (sınırda-artmış — CAM morfolojisi)";
      else s += " (normal sınırlarda)";
      morphFindings.push(s);
    }
    if (data.hn_offset === "azalmış") morphFindings.push("Femoral baş-boyun offset'i azalmıştır (CAM morfoloji paterni)");
    if (data.cam_morphology === "var") morphFindings.push("Anterosuperior femoral baş-boyun bileşkesinde konveksite artışı (pistol-grip deformite) izlenmektedir");
    if (data.head_shape === "asimetrik") morphFindings.push("Femoral baş konturunda asimetri dikkati çekmektedir");
    if (data.lcea) {
      const l = parseFloat(data.lcea);
      let s = `Lateral Center Edge Angle (LCEA): ${data.lcea}°`;
      if (l > 40) s += " (artmış — asetabuler overcoverage / pincer)";
      else if (l < 25) s += " (azalmış — asetabuler displazi lehine)";
      else s += " (normal sınırlarda)";
      morphFindings.push(s);
    }
    if (data.acet_index) morphFindings.push(`Asetabuler indeks: ${data.acet_index}°` + (parseFloat(data.acet_index) > 10 ? " (artmış)" : ""));
    if (data.cross_over === "var") morphFindings.push("Cross-over (overlap) bulgusu izlenmekte — asetabuler retroversiyon lehine");
    if (data.pincer_focal === "var") morphFindings.push("Fokal anterior asetabuler overcoverage (fokal pincer)");
    if (data.acet_coverage === "azalmış") morphFindings.push("Asetabuler yük taşıma yüzeyinde yetersizlik / azalmış örtünme");
    if (data.wall_sign === "pozitif") morphFindings.push("Posterior wall sign pozitif");
    if (morphFindings.length === 0) morphFindings.push("Kalça eklem morfolojisi normal sınırlarda. Belirgin CAM/pincer morfolojisi ya da asetabuler displazi bulgusu yoktur.");
    lines.push(`<div class="rbox"><div class="rbox-head cyan">Morfolojik Değerlendirme</div><div class="rbox-body">`);
    morphFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
    lines.push(`</div></div>`);

    // Kıkırdak
    const cartFindings = [];
    function cartText(zone, val, zoneName) {
      if (!val || val === "intakt") return null;
      const gmap = {"grade1":"Grade 1 (sinyal değişikliği)", "grade2":"Grade 2 (parsiyel kalınlık)", "grade3":"Grade 3 (subkondrale ulaşan)", "grade4":"Grade 4 (tam kat / kemik ekspoze)"};
      return `${zoneName}: ${gmap[val] || val}`;
    }
    [
      ["anterior asetabuler zon", data.cart_acet_ant],
      ["superior asetabuler zon", data.cart_acet_sup],
      ["posterior asetabuler zon", data.cart_acet_post],
      ["femoral baş kıkırdağı", data.cart_fem]
    ].forEach(([n,v]) => {
      const t = cartText(null, v, n);
      if (t) cartFindings.push(t);
    });
    if (data.osteophyte === "var") cartFindings.push("Osteofit oluşumları mevcuttur");
    if (data.joint_narrowing === "var") cartFindings.push("Eklem aralığında daralma");
    if (data.subchondral_cyst === "var") cartFindings.push("Subkondral kistik değişiklikler");
    if (data.subchondral_sclerosis === "var") cartFindings.push("Subkondral skleroz");
    if (data.tonnis_grade) cartFindings.push(`Tönnis derecesi: ${data.tonnis_grade}`);
    if (cartFindings.length === 0) cartFindings.push("Asetabuler ve femoral baş kıkırdak yüzeyleri intakt, kalınlık ve sinyal özellikleri korunmuştur. Dejeneratif değişiklik saptanmamıştır.");
    lines.push(`<div class="rbox"><div class="rbox-head">Kıkırdak & Dejeneratif Değişiklikler</div><div class="rbox-body">`);
    cartFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
    lines.push(`</div></div>`);

    // Labrum
    lines.push(`<div class="rbox"><div class="rbox-head amber">Asetabuler Labrum</div><div class="rbox-body">`);
    if (data.labrum_evaluated === "hayır") {
      lines.push(`<div class="zbullet">Labrum değerlendirmeye uygun görüntülenmemiştir / değerlendirilmemiştir.</div>`);
    } else if ((data.labralTears||[]).length === 0) {
      let s = "Asetabuler labrum normal üçgen konfigürasyonda, kenarları düzgün, sinyal intensitesi korunmuş olup yırtık bulgusu saptanmamıştır.";
      if (data.labrum_hypertrophy === "var") s += " Labral hipertrofi dikkat çekicidir.";
      if (data.labrum_degeneration === "var") s += " Labral intrasubstans dejeneratif sinyal değişiklikleri izlenmektedir.";
      lines.push(`<div class="zbullet">${s}</div>`);
    } else {
      (data.labralTears||[]).forEach((L,i) => {
        let s = `<b>Yırtık ${i+1}:</b> ${labQuadTR(L.quadrant)} kadranda ${labCatTR(L.category).toLowerCase()}`;
        if (L.subtype && L.category !== "fraying") s += ` — ${czernyTR(L.subtype)}`;
        if (L.paralabralCyst) s += ` <span class="ek-bulgu">paralabral kist (+)</span>`;
        lines.push(`<div class="zbullet">${s}</div>`);
      });
      if (data.labrum_hypertrophy === "var") lines.push(`<div class="zbullet">Eşlik eden labral hipertrofi.</div>`);
    }
    lines.push(`</div></div>`);

    // Paralabral kist + lig teres
    const ltFindings = [];
    if (data.paralab_cyst === "var" && !(data.labralTears||[]).some(t => t.paralabralCyst)) {
      let s = "Paralabral kist formasyonu";
      if (data.paralab_cyst_loc) s += ` (${data.paralab_cyst_loc})`;
      if (data.paralab_cyst_size) s += `, yaklaşık ${data.paralab_cyst_size} mm boyutunda`;
      ltFindings.push(s);
    }
    if (data.ligteres && data.ligteres !== "intakt") {
      const ltMap = {parsiyel:"parsiyel yırtık", komplet:"komplet yırtık", dejeneratif:"dejeneratif sinyal değişikliği", hipertrofik:"hipertrofi"};
      let s = `Ligamentum teres: ${ltMap[data.ligteres] || data.ligteres}`;
      if (data.ligteres_detail) s += ` (${data.ligteres_detail})`;
      ltFindings.push(s);
    } else {
      ltFindings.push("Ligamentum teres intakt izlenmektedir.");
    }
    lines.push(`<div class="rbox"><div class="rbox-head">Paralabral / Ligamentum Teres</div><div class="rbox-body">`);
    ltFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
    lines.push(`</div></div>`);

    // Kapsül ve ligamanlar
    const capFindings = [];
    if (data.capsule_thick === "var") capFindings.push("Eklem kapsülünde diffüz kalınlaşma");
    if (data.capsule_edema === "var") capFindings.push("Kapsüler ödem / inflamatuar değişiklikler");
    if (data.iliofem_thick === "var") capFindings.push("İliofemoral ligaman (Y ligaman) kalınlaşmıştır");
    if (data.ischiofem_lig && data.ischiofem_lig !== "intakt") capFindings.push(`İskiofemoral ligamanda ${data.ischiofem_lig}`);
    if (data.pubofem_lig && data.pubofem_lig !== "intakt") capFindings.push(`Pubofemoral ligamanda ${data.pubofem_lig}`);
    if (capFindings.length === 0) capFindings.push("Eklem kapsülü ve kapsüler ligamanlar (iliofemoral, iskiofemoral, pubofemoral) normal kalınlık ve sinyal özelliklerinde izlenmektedir.");
    lines.push(`<div class="rbox"><div class="rbox-head">Kapsül ve Ligamanlar</div><div class="rbox-body">`);
    capFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
    lines.push(`</div></div>`);

    // İskiofemoral / QF
    const ifsFindings = [];
    if (data.ischiofem_space) {
      const n = parseFloat(data.ischiofem_space);
      let s = `İskiofemoral mesafe: ${data.ischiofem_space} mm`;
      if (n < 13) s += " (belirgin dar — iskiofemoral sıkışma yönünden yüksek ilişki)";
      else if (n < 17) s += " (daralmış)";
      else s += " (normal)";
      ifsFindings.push(s);
    }
    if (data.qf_space) {
      const n = parseFloat(data.qf_space);
      let s = `Kuadratus femoris mesafesi: ${data.qf_space} mm`;
      if (n < 8) s += " (daralmış)";
      ifsFindings.push(s);
    }
    if (data.qf_edema === "var") ifsFindings.push("Kuadratus femoris kasında ödem / sinyal değişikliği");
    if (data.qf_atrophy === "var") ifsFindings.push("Kuadratus femoris kasında atrofi / yağlı dejenerasyon");
    if (ifsFindings.length > 0) {
      lines.push(`<div class="rbox"><div class="rbox-head">İskiofemoral & Kuadratus Femoris Mesafe</div><div class="rbox-body">`);
      ifsFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
      lines.push(`</div></div>`);
    }

    // Sinovyum / efüzyon
    const synFindings = [];
    if (data.effusion && data.effusion !== "yok") {
      const m = {minimal:"minimal", orta:"orta miktarda", belirgin:"belirgin miktarda"};
      synFindings.push(`Eklem içi efüzyon: ${m[data.effusion] || data.effusion}`);
    }
    if (data.hem_effusion === "var") synFindings.push("Efüzyon heterojen sinyalli — hemorajik komponent düşündürmekte");
    if (data.synovial_thick === "var") synFindings.push("Sinoviyal kalınlaşma");
    if (data.synovial_enhance === "var") synFindings.push("Post-kontrastta belirgin sinoviyal kontrastlanma");
    if (data.low_signal_synovium === "var") synFindings.push("Sinoviyumda T2/GRE tüm sekanslarda düşük sinyal alanları — hemosiderin içeriği lehine");
    if (data.blooming === "var") synFindings.push("GRE/SWI sekanslarında blooming artefakt (+) <span class='ek-bulgu'>PVNS şüphesi</span>");
    if (data.erosion === "var") synFindings.push("Eklem yüzünde erozif değişiklikler");
    if (data.soft_tissue_edema === "var") synFindings.push("Eklem çevresi yumuşak dokularda yaygın ödem");
    if (synFindings.length === 0) synFindings.push("Eklem içi efüzyon ve sinoviyal patoloji izlenmemektedir.");
    lines.push(`<div class="rbox"><div class="rbox-head rose">Sinovyum & Efüzyon</div><div class="rbox-body">`);
    synFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
    lines.push(`</div></div>`);

    // Kas-tendon
    lines.push(`<div class="rbox"><div class="rbox-head cyan">Kas / Tendon Değerlendirmesi</div><div class="rbox-body">`);
    if (mtLesions.length === 0) {
      lines.push(`<div class="zbullet">Gluteus medius/minimus/maksimus, iliopsoas, rektus femoris, proksimal hamstring, adduktor grup, piriformis ve kuadratus femoris kas/tendon yapıları normal kalınlık ve sinyal özelliklerinde olup patolojik değişiklik saptanmamıştır.</div>`);
    } else {
      // Kaslar bazında gruplayıp zebra gridi
      const grouped = {};
      mtLesions.forEach(L => {
        grouped[L.muscle] = grouped[L.muscle] || [];
        grouped[L.muscle].push(L);
      });
      Object.keys(grouped).forEach(m => {
        grouped[m].forEach((L,i) => {
          let s = `${muscleTR(m)}${grouped[m].length > 1 ? ` (lezyon ${i+1})` : ""}: ${typeTR(L.type).toLowerCase()}, ${locTR(L.location).toLowerCase()}`;
          if (L.retraction && parseFloat(L.retraction) > 0) s += `, ${L.retraction} cm retraksiyon`;
          if (L.goutallier) {
            const gmap = {"0":"Goutallier 0", "1":"Goutallier 1", "2":"Goutallier 2", "3":"Goutallier 3", "4":"Goutallier 4"};
            s += `, ${gmap[L.goutallier] || L.goutallier}`;
          }
          if (L.bursa_rel) s += " <span class='ek-bulgu'>bursa ilişkili</span>";
          lines.push(`<div class="zbullet">${s}</div>`);
        });
      });
    }
    lines.push(`</div></div>`);

    // Bursa
    const bursaFindings = [];
    if (data.troch_bursa && data.troch_bursa !== "yok") {
      const m = {sıvı:"sıvı birikimi", belirgin:"belirgin sıvı ve inflamatuar değişiklikler"};
      bursaFindings.push(`Trokanterik bursada ${m[data.troch_bursa] || data.troch_bursa}`);
    }
    if (data.peritroch_edema === "var") bursaFindings.push("Peritrokanterik yumuşak dokularda ödem");
    if (data.iliopsoas_bursa && data.iliopsoas_bursa !== "yok") {
      const m = {sıvı:"sıvı", belirgin:"belirgin distansiyon"};
      bursaFindings.push(`İliopsoas bursasında ${m[data.iliopsoas_bursa] || data.iliopsoas_bursa}`);
    }
    if (data.ischiogluteal_bursa === "var") bursaFindings.push("İskiogluteal bursada sıvı / inflamasyon");
    if (data.itb_thick === "var") bursaFindings.push("İliotibial bant proksimalinde kalınlaşma");
    if (bursaFindings.length === 0) bursaFindings.push("Trokanterik, iliopsoas ve iskiogluteal bursalarda patolojik sıvı birikimi izlenmemiştir.");
    lines.push(`<div class="rbox"><div class="rbox-head amber">Bursa Değerlendirmesi</div><div class="rbox-body">`);
    bursaFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
    lines.push(`</div></div>`);

    // Nörovasküler
    const nvFindings = [];
    if (data.sciatic_edema === "var") nvFindings.push("Siyatik sinir trasesinde sinyal artışı / ödem");
    if (data.piriformis_asymm === "var") nvFindings.push("Piriformis kasında asimetri / hipertrofi");
    if (data.femoral_nerve === "anormal") nvFindings.push("Femoral sinirde sinyal değişikliği");
    if (data.obturator_nerve === "anormal") nvFindings.push("Obturator sinirde sinyal değişikliği");
    if (data.lfcn === "anormal") nvFindings.push("Lateral femoral kutanöz sinirde sinyal değişikliği (meralgia paresthetica ilişkili olabilir)");
    if (nvFindings.length > 0) {
      lines.push(`<div class="rbox"><div class="rbox-head">Nörovasküler Yapılar</div><div class="rbox-body">`);
      nvFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
      lines.push(`</div></div>`);
    }

    // Pubik simfiz / atletik pubalji
    const pubFindings = [];
    if (data.pubic_bone_edema === "var") pubFindings.push("Pubik kemikte belirgin sinyal değişikliği / kemik iliği ödemi");
    if (data.pubic_widening === "var") pubFindings.push("Pubik simfizde genişleme / instabilite bulguları");
    if (data.rec_add_apo === "var") pubFindings.push("Rektus abdominis-adduktor aponörozunda bütünlük bozukluğu / sinyal değişikliği");
    if (data.ischial_tub_edema === "var") pubFindings.push("İskial tüberositte kemik iliği ödemi");
    if (data.aiis_edema === "var") pubFindings.push("Anterior inferior iliak spinada (AIIS) kemik iliği ödemi");
    if (pubFindings.length > 0) {
      lines.push(`<div class="rbox"><div class="rbox-head">Pubik Bölge & Enthesiyal Yapılar</div><div class="rbox-body">`);
      pubFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
      lines.push(`</div></div>`);
    }

    // Diğer (tümör, ossifikasyon)
    const otherFindings = [];
    if (data.mass_soft === "var") otherFindings.push("Yumuşak doku kitlesel lezyon" + (data.mass_detail ? ` (${data.mass_detail})` : ""));
    if (data.mass_bone === "var") otherFindings.push("Kemik içi kitlesel/lezyonel değişiklik" + (data.mass_detail ? ` (${data.mass_detail})` : ""));
    if (data.het_ossification === "var") otherFindings.push("Periartiküler yumuşak dokularda heterotopik ossifikasyon / miyozitis ossifikans lehine matür lamellar kemik formasyonu");
    if (otherFindings.length > 0) {
      lines.push(`<div class="rbox"><div class="rbox-head">Ek / Diğer Bulgular</div><div class="rbox-body">`);
      otherFindings.forEach(f => lines.push(`<div class="zbullet">${f}</div>`));
      lines.push(`</div></div>`);
    }

    if (data.free_text && data.free_text.trim()) {
      lines.push(`<div class="rbox"><div class="rbox-head slate">Ek Notlar</div><div class="rbox-body"><p>${data.free_text.replace(/\n/g,"<br>")}</p></div></div>`);
    }

    // YORUM bloğu — top 1-2 patolojiye göre özel tavsiyeler
    const topScore = top[0]?.score || 0;
    if (topScore > 0) {
      const yorumItems = [];
      const topId = top[0].id;
      yorumItems.push(`Mevcut bulgular en yüksek olasılıkla <b>${top[0].adi}</b> ile uyumludur (${top[0].score}%).`);
      if (top[1] && top[1].score > 30) yorumItems.push(`Ayırıcı tanıda <b>${top[1].adi}</b> (${top[1].score}%) dikkate alınmalıdır.`);

      // Patoloji-spesifik öneriler
      if (topId === "fai_cam" || topId === "fai_mixed") {
        yorumItems.push("Klinik FAI düşündürüyor ise dinamik muayene ve ortopedi konsültasyonu önerilir; artroskopik femoroplasti adayı olabilir.");
        if (F.labrum_any) yorumItems.push("Eşlik eden labral yırtık artroskopik onarım/refiksasyon için ek göstergedir.");
      }
      if (topId === "fai_pincer") {
        yorumItems.push("Asetabuler rim trimleme değerlendirmesi ortopedi tarafından yapılmalıdır.");
        if (F.labrum_posterior) yorumItems.push("Posterior contrecoup lezyonu not edilmiştir.");
      }
      if (topId === "avn") {
        if (F.avn_collapse || data.avn_stage === "IV" || data.avn_stage === "III") {
          yorumItems.push("<b>İleri evre AVN</b> — cerrahi girişim (core dekompresyon etkisiz, total kalça protezi değerlendirmesi) için acil ortopedi sevki önerilir.");
        } else {
          yorumItems.push("Erken evre AVN — core dekompresyon ± kök hücre tedavisi için uygun aday olabilir; ortopedi konsültasyonu önerilir.");
        }
      }
      if (topId === "subchondral_fx" || topId === "stress_fx") {
        yorumItems.push("Yük bindirmekten kaçınılması ve ortopedi sevki önerilir. Stres fraktürü şüphesinde tam istirahat ve takip MR tavsiye edilir.");
      }
      if (topId === "transient_op") {
        yorumItems.push("Geçici kemik iliği ödemi sendromu kendini sınırlayan bir tablodur; 6-12 haftalık konservatif yaklaşım ve takip MR önerilir. AVN ayırıcı tanısı için klinik korelasyon önemlidir.");
      }
      if (topId === "labral_tear") {
        yorumItems.push("Labral yırtık onarımı veya debridmanı için ortopedi değerlendirmesi önerilir. Eşlik eden FAI morfolojisi mutlaka tedavi planına dahil edilmelidir.");
      }
      if (topId === "ischiofem_imp") {
        yorumItems.push("İskiofemoral sıkışma — konservatif tedaviye yanıtsız olgularda USG/MR kılavuzlu enjeksiyon veya cerrahi dekompresyon düşünülebilir.");
      }
      if (topId === "glut_tear") {
        yorumItems.push("Gluteus medius/minimus yırtığı — Goutallier ≥2 atrofi varlığında onarım sonuçları sınırlı olabilir; ortopedi değerlendirmesi önerilir.");
      }
      if (topId === "hamstring_inj") {
        if (F.hams_retraction) yorumItems.push("Belirgin retraksiyon ile giden proksimal hamstring yırtığında cerrahi reinsersiyon değerlendirmesi önerilir.");
      }
      if (topId === "athletic_pubalgia") {
        yorumItems.push("Atletik pubalji — spor hekimliği / genel cerrahi değerlendirmesi önerilir; konservatif yaklaşım sonrası cerrahi onarım gündeme gelebilir.");
      }
      if (topId === "pvns") {
        yorumItems.push("PVNS şüphesi — artroskopik / açık sinovektomi için ortopedi sevki önerilir; kontrastlı MR ve eklem aralığı değerlendirmesi tanıyı destekler.");
      }
      if (topId === "septic") {
        yorumItems.push("<b>Klinik korelasyon ve acil eklem aspirasyonu</b> önerilir.");
      }
      if (topId === "oa_hip" && F.tonnis_grade >= 3) {
        yorumItems.push("İleri evre kalça OA — total kalça artroplastisi adayı olabilir.");
      }

      lines.push(`<div class="yorum"><b>YORUM:</b><ul>${yorumItems.map(y => `<li>${y}</li>`).join("")}</ul></div>`);
    }

    // Ayırıcı tanı tablosu
    lines.push(`<div class="rbox"><div class="rbox-head slate">Ayırıcı Tanı Özeti</div><div class="rbox-body" style="padding:0">`);
    lines.push(`<table class="dx-table"><thead><tr><th>Sıra</th><th>Tanı</th><th>Kategori</th><th style="text-align:right">Olasılık</th></tr></thead><tbody>`);
    top.forEach((p,i) => {
      if (p.score > 0) {
        const color = CAT_COLOR[p.kat] || "#334155";
        lines.push(`<tr><td>${i+1}</td><td>${p.adi}</td><td><span class="cat-badge" style="background:${color}">${p.kat}</span></td><td class="pct">${p.score}%</td></tr>`);
      }
    });
    lines.push(`</tbody></table></div></div>`);

    lines.push(`<div class="report-footer"><span>Kalça MR Karar Destek • ${todayStr()}</span><span>Sayfa 1/1</span></div>`);

    return lines.join("\n");
  }

  /* ---------- Export fonksiyonları ---------- */
  function printReport() {
    window.print();
  }
  function copyReportText() {
    const el = document.getElementById("report-body-content");
    if (!el) return;
    try {
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand("copy");
      sel.removeAllRanges();
      alert("Rapor panoya kopyalandı.");
    } catch(e) { alert("Kopyalama başarısız: " + e.message); }
  }
  function downloadHTML() {
    const html = document.documentElement.outerHTML;
    const body = document.getElementById("report-body-content")?.innerHTML || "";
    const fullStyles = document.querySelector("style")?.innerHTML || "";
    const full = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Kalça MR Raporu - ${todayStr()}</title><style>${fullStyles}</style></head><body><div class="report-sheet" style="margin:20px auto"><div class="report-body" id="report-body-content">${body}</div></div></body></html>`;
    const blob = new Blob([full], {type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `kalca-mrg-raporu-${todayStr().replace(/\./g,"-")}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
