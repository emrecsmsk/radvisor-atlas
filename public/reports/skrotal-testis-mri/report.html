<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skrotal / Testis MRI — Raporlama & Ayırıcı Tanı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0e17;
    --bg-card: #1a1827;
    --bg-elev: #222033;
    --border: #2d2b42;
    --border-light: #3a3853;
    --text: #e8e6f2;
    --text-dim: #a09dbb;
    --text-mute: #706e89;
    --accent: #2dd4bf;         /* teal-400 */
    --accent-2: #60a5fa;       /* blue-400 */
    --accent-dim: rgba(45, 212, 191, 0.12);
    --accent-line: rgba(45, 212, 191, 0.35);
    --warn: #fbbf24;
    --danger: #f87171;
    --ok: #4ade80;
    --patoloji: #f472b6;
  }
  html, body { height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 20% -10%, rgba(45,212,191,0.08), transparent 50%),
                radial-gradient(900px 500px at 110% 10%, rgba(96,165,250,0.06), transparent 60%),
                var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }
  #root { max-width: 1180px; margin: 0 auto; padding: 28px 20px 80px; }

  /* Header */
  .hdr {
    display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 18px; margin-bottom: 22px;
  }
  .hdr h1 {
    font-weight: 600; font-size: 22px; letter-spacing: -0.01em;
    background: linear-gradient(120deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; color: transparent;
  }
  .hdr .sub { color: var(--text-mute); font-size: 12px; margin-top: 4px; letter-spacing: 0.02em; text-transform: uppercase;}
  .hdr .ver { color: var(--text-dim); font-family:'IBM Plex Mono', monospace; font-size: 11px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px;}

  /* Step dots */
  .steps { display:flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap;}
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border); transition: all 0.25s ease;
  }
  .dot.done { background: var(--accent); opacity: 0.55; }
  .dot.active { background: var(--accent); transform: scale(1.35); box-shadow: 0 0 0 4px var(--accent-dim);}
  .dot.loop { background: var(--accent-2); opacity: 0.7; }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px 28px;
    animation: fadeIn 0.28s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity:1; transform: none;} }

  .step-label { color: var(--text-mute); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px;}
  .step-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; letter-spacing:-0.01em;}
  .step-desc { color: var(--text-dim); font-size: 13px; margin-bottom: 22px;}

  /* Inputs */
  .grid { display: grid; gap: 10px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }

  .opt {
    display: flex; align-items:center; gap: 12px;
    padding: 12px 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    font-size: 14px;
  }
  .opt:hover { border-color: var(--border-light); background: #27253a; }
  .opt.sel { border-color: var(--accent-line); background: var(--accent-dim); color: var(--text); }
  .opt .chk {
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--border-light); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.15s ease;
  }
  .opt.sel .chk { background: var(--accent); border-color: var(--accent); }
  .opt.sel .chk::after { content: "✓"; color: #0a0912; font-size: 12px; font-weight: 700;}
  .opt .sub { color: var(--text-mute); font-size: 12px; margin-left:auto; }

  .field { display:flex; flex-direction:column; gap:6px; margin-bottom: 12px;}
  .field label { color: var(--text-dim); font-size: 12px; letter-spacing: 0.04em;}
  .field input, .field select, .field textarea {
    background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-family: inherit; font-size: 14px;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { min-height: 80px; resize: vertical; font-family: 'IBM Plex Mono', monospace; font-size: 13px;}

  .row3 { display:grid; grid-template-columns: repeat(3,1fr); gap: 10px;}
  .row4 { display:grid; grid-template-columns: repeat(4,1fr); gap: 10px;}

  /* Nav buttons */
  .nav { display:flex; justify-content:space-between; margin-top: 22px; gap: 10px;}
  .btn {
    padding: 11px 22px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--text);
    font-family: inherit;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover:not(:disabled) { border-color: var(--border-light); background: #2b283f;}
  .btn:disabled { opacity: 0.4; cursor: not-allowed;}
  .btn.primary {
    background: linear-gradient(100deg, var(--accent), var(--accent-2));
    color: #09121a; font-weight: 600; border: none;
  }
  .btn.primary:hover { filter: brightness(1.1);}
  .btn.danger { color: var(--danger); border-color: rgba(248,113,113,0.3);}
  .btn.danger:hover { background: rgba(248,113,113,0.08);}
  .btn.small { padding: 7px 12px; font-size: 12px;}

  /* Lesion cards */
  .lesion-summary {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .lesion-summary .lh {
    display:flex; align-items:center; justify-content:space-between; margin-bottom: 6px;
  }
  .lesion-summary .ltitle { font-weight: 600; color: var(--accent);}
  .lesion-summary .lmeta { color: var(--text-dim); font-size: 12px;}
  .lesion-summary .ldiff { margin-top: 8px; display:flex; gap: 6px; flex-wrap: wrap;}
  .diff-chip {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 999px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-line);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Report kutulu zebra */
  .rpt-section {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
    background: var(--bg-card);
  }
  .rpt-header {
    padding: 10px 16px;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: linear-gradient(100deg, rgba(45,212,191,0.18), rgba(96,165,250,0.12));
    border-bottom: 1px solid var(--border);
    color: var(--accent);
  }
  .rpt-body { padding: 4px 0;}
  .rpt-row {
    display: grid;
    grid-template-columns: 210px 1fr;
    padding: 8px 16px;
    gap: 14px;
    font-size: 13px;
  }
  .rpt-row:nth-child(odd) { background: rgba(255,255,255,0.015);}
  .rpt-row .rk { color: var(--text-dim); font-size: 12px;}
  .rpt-row .rv { color: var(--text); }
  .rpt-row .rv.pat { color: var(--patoloji); font-weight: 500;}
  .rpt-narrative { padding: 14px 16px; font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-line;}

  /* Differential bar */
  .diff-row { display:flex; align-items:center; gap: 10px; margin-bottom: 6px; padding: 6px 16px; font-size: 13px;}
  .diff-row:nth-child(odd) { background: rgba(255,255,255,0.015);}
  .diff-row .dname { width: 260px; flex-shrink: 0;}
  .diff-row .dbar-wrap { flex: 1; background: var(--bg); border-radius: 999px; height: 8px; overflow: hidden; border: 1px solid var(--border);}
  .diff-row .dbar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 999px;}
  .diff-row .dpct { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); min-width: 52px; text-align: right;}

  .info-banner {
    background: rgba(96,165,250,0.06);
    border: 1px solid rgba(96,165,250,0.22);
    padding: 10px 14px; border-radius: 8px;
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 16px;
  }
  .warn-banner {
    background: rgba(251,191,36,0.06);
    border: 1px solid rgba(251,191,36,0.22);
    padding: 10px 14px; border-radius: 8px;
    font-size: 12px; color: #fcd34d;
    margin-bottom: 16px;
  }

  .toolbar {
    display:flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .overlay-ta {
    width: 100%; min-height: 220px;
    background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px;
    line-height: 1.55; resize: vertical; margin-top: 10px;
  }
  .toast {
    position: fixed; bottom: 22px; right: 22px;
    background: var(--bg-elev); border: 1px solid var(--accent-line);
    color: var(--accent); padding: 10px 16px; border-radius: 8px;
    font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: fadeIn 0.25s ease;
  }

  .tag-mini {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    margin-right: 4px;
  }
  .tag-mini.pat { color: var(--patoloji); border-color: rgba(244,114,182,0.3);}

  .step-title small { color: var(--text-mute); font-size: 12px; font-weight: 400; margin-left: 8px;}
</style>

/* =====================================================================
   SKORLAMA MOTORU
   ===================================================================== */
const WEIGHTS = {
  compartment: 5,
  structure: 2,
  t1: 2,
  t2: 2,
  dwi: 4,
  adc: 4,
  contrast: 3,
  chemshift: 3,
  special: 3,
  demographics: 1,
  size: 1
};

function scorePathology(pathology, lesion) {
  let total = 0;
  let maxPossible = 0;
  const keys = Object.keys(WEIGHTS);

  keys.forEach(k => {
    const pathTags = pathology.tags[k] || [];
    const lesionTags = lesion[k] || [];
    if (pathTags.length === 0) return;
    maxPossible += WEIGHTS[k];

    if (lesionTags.length === 0) return;

    // Tam eşleşme
    const directMatch = lesionTags.some(t => pathTags.includes(t));
    if (directMatch) {
      total += WEIGHTS[k];
      return;
    }

    // Kısmi eşleşme (alt string)
    let partialHit = false;
    for (const lt of lesionTags) {
      for (const pt of pathTags) {
        if (lt && pt && (lt.includes(pt) || pt.includes(lt))) {
          partialHit = true; break;
        }
      }
      if (partialHit) break;
    }
    if (partialHit) total += WEIGHTS[k] * 0.4;
  });

  if (maxPossible === 0) return 0;
  const raw = (total / maxPossible) * 100;
  return Math.min(100, Math.max(0, raw));
}

function getDifferentials(lesion, topN = 7) {
  if (!lesion) return [];
  const scores = PATHOLOGY_DB.map(p => ({
    ...p,
    score: scorePathology(p, lesion)
  })).filter(p => p.score > 10);

  scores.sort((a,b) => b.score - a.score);
  const sliced = scores.slice(0, topN);
  const sum = sliced.reduce((s,p)=>s+p.score, 0);
  if (sum === 0) return [];
  return sliced.map(p => ({
    ...p,
    percentage: Math.round((p.score / sum) * 100)
  }));
}

  const [step, setStep] = useState(0);
  const [loopStep, setLoopStep] = useState(-1);     // -1 => döngü aktif değil
  const [currentIdx, setCurrentIdx] = useState(-1); // -1 => aktif lezyon yok

  const [data, setData] = useState({

                parenkim:'homojen', t2Sinyal:'normal', not:''},
    solTestis:{ degerlendirildi:true, mevcut:true, lokalizasyon:'skrotal', boyutAP:'', boyutCC:'', boyutTR:'',
                parenkim:'homojen', t2Sinyal:'normal', not:''},

    // Epididim
    sagEpididim:{ normal:true, buyume:false, sinyalArt:false, kontrastArt:false, not:''},
    solEpididim:{ normal:true, buyume:false, sinyalArt:false, kontrastArt:false, not:''},

    // Kord / varikosel
    sagKord:{ normal:true, varikosel:false, varikoselGrad:'', kitle:false, not:''},
    solKord:{ normal:true, varikosel:false, varikoselGrad:'', kitle:false, not:''},

    // Sıvı koleksiyonu
    sivi:{
      sagHidrosel:false, solHidrosel:false,
      sagHematosel:false, solHematosel:false,
      sagPiyosel:false, solPiyosel:false,
      not:''
    },

    // Tunika / rüptür
    tunika:{ saglam:true, sagRuptur:false, solRuptur:false, kontur:'düzgün', not:''},

    // Lezyonlar
    lezyonVarMi:null,
    lezyonlar:[]
  });

  const patch = (path, val) => {
    setData(prev => {
      const next = {...prev};
      const keys = path.split('.');
      let cur = next;
      for (let i=0;i<keys.length-1;i++) {
        cur[keys[i]] = {...cur[keys[i]]};
        cur = cur[keys[i]];
      }
      cur[keys[keys.length-1]] = val;
      return next;
    });
  };

  const updateLesion = (idx, fieldPath, val) => {
    setData(prev => {
      const lez = [...prev.lezyonlar];
      const cur = {...lez[idx]};
      const keys = fieldPath.split('.');
      let ref = cur;
      for (let i=0;i<keys.length-1;i++) {
        ref[keys[i]] = {...ref[keys[i]]};
        ref = ref[keys[i]];
      }
      ref[keys[keys.length-1]] = val;
      lez[idx] = cur;
      return {...prev, lezyonlar: lez};
    });
  };

  const newLesion = () => ({
    taraf:'', compartment:[], compartmentDetail:'',
    boyutAP:'', boyutCC:'', boyutTR:'',
    structure:[],
    t1:[], t2:[],
    dwi:[], adc:[],
    contrast:[],
    chemshift:[],
    special:[],
    demographics:[],
    size:[],
    notlar:''
  });

  const addLesion = () => {
    const idx = data.lezyonlar.length;
    setData(prev => ({...prev, lezyonlar:[...prev.lezyonlar, newLesion()]}));
    setCurrentIdx(idx);
    setLoopStep(0);
  };

  const editLesion = (i) => {
    setCurrentIdx(i);
    setLoopStep(0);
  };

  const deleteLesion = (i) => {
    setData(prev => ({...prev, lezyonlar: prev.lezyonlar.filter((_,k)=>k!==i)}));
  };

  const finalizeLoop = () => {
    setCurrentIdx(-1);
    setLoopStep(-1);
  };

  /* ---- Navigation ---- */
  const goNext = () => {
    // Lezyon döngüsü içindeyken
    if (step === 9 && loopStep >= 0 && currentIdx >= 0) {
      if (loopStep < LOOP_STEPS.length - 1) {
        setLoopStep(loopStep + 1);
      } else {
        // Son sub-step: mevcut lezyon tamamlandı, özet ekrana dön
        finalizeLoop();
      }
      return;
    }
    // Lezyon soruldu ama yok denmişse direkt özet
    if (step === 8 && data.lezyonVarMi === false) {
      setStep(10);
      return;
    }
    if (step === 9 && currentIdx === -1) {
      // döngü özeti ekranındayız, ileri = ÖZET
      setStep(10);
      return;
    }
    if (step < STEPS.length - 1) setStep(step + 1);
  };

  const goPrev = () => {
    // Döngüde geri
    if (step === 9 && loopStep > 0 && currentIdx >= 0) {
      setLoopStep(loopStep - 1);
      return;
    }
    if (step === 9 && loopStep === 0 && currentIdx >= 0) {
      finalizeLoop();
      return;
    }
    // özetten geri: eğer lezyon yoksa step 8'e dön
    if (step === 10 && data.lezyonVarMi === false) {
      setStep(8); return;
    }
    if (step > 0) setStep(step - 1);
  };

  /* ---- Dots ---- */
  const renderDots = () => {
    const dots = [];
    STEPS.forEach((s, i) => {
      let cls = 'dot';
      if (i < step) cls += ' done';
      if (i === step) cls += ' active';
      dots.push(<div key={'s'+i} className={cls}/>);
    });
    if (step === 9 && currentIdx >= 0) {
      LOOP_STEPS.forEach((_, j) => {
        let cls = 'dot loop';
        if (j === loopStep) cls = 'dot active';
        dots.push(<div key={'l'+j} className={cls}/>);
      });
    }
    return <div className="steps">{dots}</div>;
  };

  /* =====================================================================
     ADIM RENDER'LARI
     ===================================================================== */
  const toggleMulti = (arr, val) => {
    if (arr.includes(val)) return arr.filter(x => x !== val);
    return [...arr, val];
  };

  const Opt = ({on, onClick, children, sub}) => (
    <div className={"opt " + (on ? "sel" : "")} onClick={onClick}>
      <div className="chk"/>
      <span>{children}</span>
      {sub && <span className="sub">{sub}</span>}
    </div>
  );

  const renderStep = () => {
    /* -------- 0. INTRO -------- */
    if (step === 0) {
      return (
        <div>
          <div className="step-label">{T.s0label} / {STEPS.length}</div>
          <div className="step-title">{T.s0title}</div>
          <div className="step-desc">{T.s0desc}</div>

          <div className="grid grid-3">
            <div className="field">
              <label>{T.s0dateLabel}</label>
              <input type="date" value={data.tarih} onChange={e=>patch('tarih', e.target.value)}/>
            </div>
            <div className="field">
              <label>{T.s0ageLabel}</label>
              <input type="number" placeholder={T.s0agePlaceholder} value={data.hastaYas} onChange={e=>patch('hastaYas', e.target.value)}/>
            </div>
            <div className="field">
              <label>{T.s0fieldLabel}</label>
              <select value={data.teknik.ag} onChange={e=>patch('teknik.ag', e.target.value)}>
                <option value="1.5T">1.5 T</option>
                <option value="3T">3 T</option>
              </select>
            </div>
          </div>

          <div className="field">
            <label>{T.s0clinLabel}</label>
            <textarea placeholder={T.s0clinPlaceholder}
                      value={data.klinik} onChange={e=>patch('klinik', e.target.value)}/>
          </div>

          <div className="step-label" style={{marginTop:12}}>{T.s0seqLabel}</div>
          <div className="grid grid-3">
            {['T1','T2','Yag_baski_T2','DWI/ADC','Kontrastli_T1','IP_OP','T2_star'].map(s => (
              <Opt key={s} on={data.teknik.sekans.includes(s)}
                   onClick={()=>patch('teknik.sekans', toggleMulti(data.teknik.sekans, s))}>
                {s.replace(/_/g,' ')}
              </Opt>
            ))}
          </div>
        </div>
      );
    }

    /* -------- 1. SKROTAL DUVAR -------- */
    if (step === 1) {
      const c = data.cilt;
      return (
        <div>
          <div className="step-label">{T.s1label} / {STEPS.length}</div>
          <div className="step-title">{T.s1title}</div>
          <div className="step-desc">{T.s1desc}</div>
          <div className="grid grid-2">
            <Opt on={c.normal} onClick={()=>{
              patch('cilt.normal', !c.normal);
              if (!c.normal) { patch('cilt.kalinlasma', false); patch('cilt.enflamatuar', false); patch('cilt.apse', false); patch('cilt.kitle', false);}
            }}>{T.s1normal}</Opt>
            <Opt on={c.kalinlasma} onClick={()=>{ patch('cilt.kalinlasma', !c.kalinlasma); if(!c.kalinlasma) patch('cilt.normal', false);}}>{T.s1thickening}</Opt>
            <Opt on={c.enflamatuar} onClick={()=>{ patch('cilt.enflamatuar', !c.enflamatuar); if(!c.enflamatuar) patch('cilt.normal', false);}}>{T.s1inflam}</Opt>
            <Opt on={c.apse} onClick={()=>{ patch('cilt.apse', !c.apse); if(!c.apse) patch('cilt.normal', false);}}>{T.s1abscess}</Opt>
            <Opt on={c.kitle} onClick={()=>{ patch('cilt.kitle', !c.kitle); if(!c.kitle) patch('cilt.normal', false);}}>{T.s1mass}</Opt>
          </div>
          <div className="field" style={{marginTop:12}}>
            <label>{T.noteLabel}</label>
            <textarea value={c.not} onChange={e=>patch('cilt.not', e.target.value)}/>
          </div>
        </div>
      );
    }

    /* -------- 2-3. TESTİSLER -------- */
    if (step === 2 || step === 3) {
      const side = step === 2 ? 'sag' : 'sol';
      const key = side === 'sag' ? 'sagTestis' : 'solTestis';
      const t = data[key];
      return (
        <div>
          <div className="step-label">{T.s23label} {step+1} / {STEPS.length}</div>
          <div className="step-title">{side === 'sag' ? T.s23titleSag : T.s23titleSol}</div>
          <div className="step-desc">{T.s23desc}</div>

          <div className="grid grid-2" style={{marginBottom:14}}>
            <Opt on={t.degerlendirildi} onClick={()=>patch(key+'.degerlendirildi', !t.degerlendirildi)}>
              {T.s23evalOpt}
            </Opt>
            {t.degerlendirildi && (
              <Opt on={t.mevcut} onClick={()=>patch(key+'.mevcut', !t.mevcut)}>
                {T.s23presentOpt}
              </Opt>
            )}
          </div>

          {!t.degerlendirildi && (
            <div className="warn-banner">{T.s23warnNotEval}</div>
          )}

          {t.degerlendirildi && !t.mevcut && (
            <>
              <div className="info-banner">{T.s23infoBanner}</div>
              <div className="grid grid-3">
                {['inguinal','abdominal','yok_atrofik','operasyon_sonrasi'].map(l => (
                  <Opt key={l} on={t.lokalizasyon===l} onClick={()=>patch(key+'.lokalizasyon', l)}>
                    {l==='inguinal'?T.s23locInguinal:l==='abdominal'?T.s23locAbdominal:l==='yok_atrofik'?T.s23locAtrophic:T.s23locPostOp}
                  </Opt>
                ))}
              </div>
            </>
          )}

          {t.degerlendirildi && t.mevcut && (
            <>
              <div className="step-label" style={{marginTop:12}}>{T.s23sizeLabel}</div>
              <div className="row3">
                <div className="field"><label>AP</label><input type="number" value={t.boyutAP} onChange={e=>patch(key+'.boyutAP', e.target.value)}/></div>
                <div className="field"><label>CC</label><input type="number" value={t.boyutCC} onChange={e=>patch(key+'.boyutCC', e.target.value)}/></div>
                <div className="field"><label>TR</label><input type="number" value={t.boyutTR} onChange={e=>patch(key+'.boyutTR', e.target.value)}/></div>
              </div>

              <div className="step-label" style={{marginTop:4}}>{T.s23parLabel}</div>
              <div className="grid grid-3">
                {[['homojen',T.s23parHomojen],['heterojen_diffuz',T.s23parHeterojen],['fokal_lezyon',T.s23parFokal],['atrofi',T.s23parAtrofi]].map(([v,lbl])=>(
                  <Opt key={v} on={t.parenkim===v} onClick={()=>patch(key+'.parenkim', v)}>{lbl}</Opt>
                ))}
              </div>

              <div className="step-label" style={{marginTop:12}}>{T.s23t2Label}</div>
              <div className="grid grid-3">
                {[['normal',T.s23t2Normal],['diffuz_hipo',T.s23t2DiffHipo],['diffuz_hiper',T.s23t2DiffHiper],['heterojen',T.s23t2Heterojen]].map(([v,lbl])=>(
                  <Opt key={v} on={t.t2Sinyal===v} onClick={()=>patch(key+'.t2Sinyal', v)}>{lbl}</Opt>
                ))}
              </div>

              <div className="field" style={{marginTop:12}}>
                <label>{T.s23addNote}</label>
                <textarea value={t.not} onChange={e=>patch(key+'.not', e.target.value)}/>
              </div>
            </>
          )}
        </div>
      );
    }

    /* -------- 4. EPİDİDİM -------- */
    if (step === 4) {
      return (
        <div>
          <div className="step-label">{T.s4label} / {STEPS.length}</div>
          <div className="step-title">{T.s4title}</div>
          <div className="step-desc">{T.s4desc}</div>

          {['sag','sol'].map(side => {
            const k = side==='sag'?'sagEpididim':'solEpididim';
            const e = data[k];
            const lbl = side==='sag'?T.s4sagLbl:T.s4solLbl;
            return (
              <div key={side} style={{marginBottom:20, paddingBottom:12, borderBottom:'1px solid var(--border)'}}>
                <div className="step-label" style={{color:'var(--accent)'}}>{lbl}</div>
                <div className="grid grid-2" style={{marginTop:8}}>
                  <Opt on={e.normal} onClick={()=>{
                    patch(k+'.normal', !e.normal);
                    if (!e.normal) { patch(k+'.buyume', false); patch(k+'.sinyalArt', false); patch(k+'.kontrastArt', false);}
                  }}>{T.s4normal}</Opt>
                  <Opt on={e.buyume} onClick={()=>{patch(k+'.buyume', !e.buyume); if(!e.buyume) patch(k+'.normal', false);}}>{T.s4buyume}</Opt>
                  <Opt on={e.sinyalArt} onClick={()=>{patch(k+'.sinyalArt', !e.sinyalArt); if(!e.sinyalArt) patch(k+'.normal', false);}}>{T.s4sinyalArt}</Opt>
                  <Opt on={e.kontrastArt} onClick={()=>{patch(k+'.kontrastArt', !e.kontrastArt); if(!e.kontrastArt) patch(k+'.normal', false);}}>{T.s4kontrastArt}</Opt>
                </div>
                <div className="field" style={{marginTop:10}}>
                  <label>{T.noteLabel}</label>
                  <textarea value={e.not} onChange={ev=>patch(k+'.not', ev.target.value)}/>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    /* -------- 5. SPERMATİK KORD -------- */
    if (step === 5) {
      return (
        <div>
          <div className="step-label">{T.s5label} / {STEPS.length}</div>
          <div className="step-title">{T.s5title}</div>
          <div className="step-desc">{T.s5desc}</div>

          {['sag','sol'].map(side => {
            const k = side==='sag'?'sagKord':'solKord';
            const e = data[k];
            const lbl = side==='sag'?T.s5sagLbl:T.s5solLbl;
            return (
              <div key={side} style={{marginBottom:20, paddingBottom:12, borderBottom:'1px solid var(--border)'}}>
                <div className="step-label" style={{color:'var(--accent)'}}>{lbl}</div>
                <div className="grid grid-3" style={{marginTop:8}}>
                  <Opt on={e.normal} onClick={()=>{
                    patch(k+'.normal', !e.normal);
                    if (!e.normal) { patch(k+'.varikosel', false); patch(k+'.kitle', false);}
                  }}>{T.s5normal}</Opt>
                  <Opt on={e.varikosel} onClick={()=>{patch(k+'.varikosel', !e.varikosel); if(!e.varikosel) patch(k+'.normal', false);}}>{T.s5varikosel}</Opt>
                  <Opt on={e.kitle} onClick={()=>{patch(k+'.kitle', !e.kitle); if(!e.kitle) patch(k+'.normal', false);}}>{T.s5korde}</Opt>
                </div>
                {e.varikosel && (
                  <div className="field" style={{marginTop:10}}>
                    <label>{T.s5pamLabel}</label>
                    <input type="number" placeholder={T.s5pamPlaceholder} value={e.varikoselGrad} onChange={ev=>patch(k+'.varikoselGrad', ev.target.value)}/>
                  </div>
                )}
                <div className="field" style={{marginTop:10}}>
                  <label>{T.noteLabel}</label>
                  <textarea value={e.not} onChange={ev=>patch(k+'.not', ev.target.value)}/>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    /* -------- 6. SIVI KOLEKSİYONLARI -------- */
    if (step === 6) {
      const s = data.sivi;
      return (
        <div>
          <div className="step-label">{T.s6label} / {STEPS.length}</div>
          <div className="step-title">{T.s6title}</div>
          <div className="step-desc">{T.s6desc}</div>

          <div className="grid grid-2">
            <div>
              <div className="step-label" style={{color:'var(--accent)'}}>{T.s6sagTitle}</div>
              <div style={{display:'grid', gap:8, marginTop:6}}>
                <Opt on={s.sagHidrosel} onClick={()=>patch('sivi.sagHidrosel', !s.sagHidrosel)}>{T.s6sagHidrosel}</Opt>
                <Opt on={s.sagHematosel} onClick={()=>patch('sivi.sagHematosel', !s.sagHematosel)}>{T.s6sagHematosel}</Opt>
                <Opt on={s.sagPiyosel} onClick={()=>patch('sivi.sagPiyosel', !s.sagPiyosel)}>{T.s6sagPiyosel}</Opt>
              </div>
            </div>
            <div>
              <div className="step-label" style={{color:'var(--accent)'}}>{T.s6solTitle}</div>
              <div style={{display:'grid', gap:8, marginTop:6}}>
                <Opt on={s.solHidrosel} onClick={()=>patch('sivi.solHidrosel', !s.solHidrosel)}>{T.s6solHidrosel}</Opt>
                <Opt on={s.solHematosel} onClick={()=>patch('sivi.solHematosel', !s.solHematosel)}>{T.s6solHematosel}</Opt>
                <Opt on={s.solPiyosel} onClick={()=>patch('sivi.solPiyosel', !s.solPiyosel)}>{T.s6solPiyosel}</Opt>
              </div>
            </div>
          </div>

          <div className="field" style={{marginTop:12}}>
            <label>{T.noteLabel}</label>
            <textarea value={s.not} onChange={e=>patch('sivi.not', e.target.value)}/>
          </div>
        </div>
      );
    }

    /* -------- 7. TUNİKA / RÜPTÜR -------- */
    if (step === 7) {
      const t = data.tunika;
      return (
        <div>
          <div className="step-label">{T.s7label} / {STEPS.length}</div>
          <div className="step-title">{T.s7title}</div>
          <div className="step-desc">{T.s7desc}</div>
          <div className="grid grid-2">
            <Opt on={t.saglam} onClick={()=>{
              patch('tunika.saglam', !t.saglam);
              if(!t.saglam){ patch('tunika.sagRuptur', false); patch('tunika.solRuptur', false);}
            }}>{T.s7intact}</Opt>
            <Opt on={t.sagRuptur} onClick={()=>{patch('tunika.sagRuptur', !t.sagRuptur); if(!t.sagRuptur) patch('tunika.saglam', false);}}>{T.s7sagRupture}</Opt>
            <Opt on={t.solRuptur} onClick={()=>{patch('tunika.solRuptur', !t.solRuptur); if(!t.solRuptur) patch('tunika.saglam', false);}}>{T.s7solRupture}</Opt>
          </div>

          <div className="step-label" style={{marginTop:12}}>{T.s7konturLabel}</div>
          <div className="grid grid-3">
            {[['düzgün',T.s7konturDuz],['lobüle',T.s7konturLob],['bozulmuş',T.s7konturBoz]].map(([v,lbl])=>(
              <Opt key={v} on={t.kontur===v} onClick={()=>patch('tunika.kontur', v)}>{lbl}</Opt>
            ))}
          </div>
          <div className="field" style={{marginTop:12}}>
            <label>{T.noteLabel}</label>
            <textarea value={t.not} onChange={e=>patch('tunika.not', e.target.value)}/>
          </div>
        </div>
      );
    }

    /* -------- 8. LEZYON SORGUSU -------- */
    if (step === 8) {
      return (
        <div>
          <div className="step-label">{T.s8label} / {STEPS.length}</div>
          <div className="step-title">{T.s8title}</div>
          <div className="step-desc">{T.s8desc}</div>
          <div className="grid grid-2">
            <Opt on={data.lezyonVarMi===true} onClick={()=>patch('lezyonVarMi', true)}>
              {T.s8yes}
            </Opt>
            <Opt on={data.lezyonVarMi===false} onClick={()=>patch('lezyonVarMi', false)}>
              {T.s8no}
            </Opt>
          </div>
        </div>
      );
    }

    /* -------- 9. LEZYON DÖNGÜSÜ -------- */
    if (step === 9) {
      // Döngü özeti ekranı
      if (currentIdx === -1) {
        return (
          <div>
            <div className="step-label">{T.s9label} / {STEPS.length}</div>
            <div className="step-title">{T.s9title} <small>({data.lezyonlar.length})</small></div>
            <div className="step-desc">{T.s9desc}</div>

            {data.lezyonlar.length === 0 && (
              <div className="info-banner">{T.s9empty}</div>
            )}

            {data.lezyonlar.map((l, i) => {
              const diffs = getDifferentials(l, 3);
              return (
                <div key={i} className="lesion-summary">
                  <div className="lh">
                    <div className="ltitle">{T.s9lesionN}{i+1}</div>
                    <div style={{display:'flex', gap:6}}>
                      <button className="btn small" onClick={()=>editLesion(i)}>{T.s9edit}</button>
                      <button className="btn small danger" onClick={()=>deleteLesion(i)}>{T.s9delete}</button>
                    </div>
                  </div>
                  <div className="lmeta">
                    {l.taraf && (l.taraf==='sag'?T.ls0sag:l.taraf==='sol'?T.ls0sol:T.ls0bilateral)}{l.taraf?' · ':''}
                    {l.compartment.map(c=>L(c)).join(', ')}
                    {(l.boyutAP||l.boyutCC||l.boyutTR) ? ` · ${l.boyutAP||'?'}×${l.boyutCC||'?'}×${l.boyutTR||'?'} mm` : ''}
                  </div>
                  {diffs.length > 0 && (
                    <div className="ldiff">
                      {diffs.map(d => <span key={d.id} className="diff-chip">{loc(d.name)} %{d.percentage}</span>)}
                    </div>
                  )}
                </div>
              );
            })}

            <div style={{marginTop:14, display:'flex', gap:8}}>
              <button className="btn primary" onClick={addLesion}>{T.s9addBtn}</button>
            </div>
          </div>
        );
      }

      // Aktif lezyon sub-step'leri
      const L0 = data.lezyonlar[currentIdx];
      if (!L0) { finalizeLoop(); return null; }

      const tLoop = (field, val) => updateLesion(currentIdx, field, val);
      const toggleLoop = (field, val) => updateLesion(currentIdx, field, toggleMulti(L0[field]||[], val));

      const subTitle = <small>Lezyon #{currentIdx+1} · {loopStep+1}/{LOOP_STEPS.length}</small>;

      if (loopStep === 0) {
        return (
          <div>
            <div className="step-label">{T.ls0label}</div>
            <div className="step-title">{T.ls0title} {subTitle}</div>
            <div className="step-desc">{T.ls0desc}</div>

            <div className="step-label">{T.ls0sideLabel}</div>
            <div className="grid grid-3">
              {[[T.ls0sag,'sag'],[T.ls0sol,'sol'],[T.ls0bilateral,'bilateral']].map(([lbl,v])=>(
                <Opt key={v} on={L0.taraf===v} onClick={()=>tLoop('taraf', v)}>{lbl}</Opt>
              ))}
            </div>

            <div className="step-label" style={{marginTop:12}}>{T.ls0compLabel}</div>
            <div className="grid grid-2">
              {[
                'intratestikuler','ekstratestikuler','paratestikuler',
                'epididim_bas','epididim_govde','epididim_kuyruk',
                'spermatik_kord','tunika','tunika_vaginalis','inguinal','abdominal'
              ].map(v => (
                <Opt key={v} on={L0.compartment.includes(v)} onClick={()=>toggleLoop('compartment', v)}>
                  {L(v)}
                </Opt>
              ))}
            </div>

            <div className="field" style={{marginTop:12}}>
              <label>{T.ls0detailLabel}</label>
              <input type="text" placeholder={T.ls0detailPlaceholder}
                     value={L0.compartmentDetail} onChange={e=>tLoop('compartmentDetail', e.target.value)}/>
            </div>
          </div>
        );
      }

      if (loopStep === 1) {
        return (
          <div>
            <div className="step-label">{T.ls1label}</div>
            <div className="step-title">{T.ls1title} {subTitle}</div>
            <div className="step-desc">{T.ls1desc}</div>
            <div className="row3">
              <div className="field"><label>AP (mm)</label><input type="number" value={L0.boyutAP} onChange={e=>tLoop('boyutAP', e.target.value)}/></div>
              <div className="field"><label>CC (mm)</label><input type="number" value={L0.boyutCC} onChange={e=>tLoop('boyutCC', e.target.value)}/></div>
              <div className="field"><label>TR (mm)</label><input type="number" value={L0.boyutTR} onChange={e=>tLoop('boyutTR', e.target.value)}/></div>
            </div>

            <div className="step-label" style={{marginTop:12}}>{T.ls1sizeLabel}</div>
            <div className="grid grid-4">
              {[['kucuk',T.ls1small],['orta',T.ls1mid],['buyuk',T.ls1large],['multifokal',T.ls1multi]].map(([v,lbl])=>(
                <Opt key={v} on={L0.size.includes(v)} onClick={()=>toggleLoop('size', v)}>{lbl}</Opt>
              ))}
            </div>
          </div>
        );
      }

      if (loopStep === 2) {
        return (
          <div>
            <div className="step-label">{T.ls2label}</div>
            <div className="step-title">{T.ls2title} {subTitle}</div>
            <div className="step-desc">{T.ls2desc}</div>

            <div className="grid grid-2">
              {[
                'solid','solid_homojen','kistik','kistik_solid','mikst','heterojen',
                'iyi_sinirli','infiltratif','multifokal','diffuz','wedge','tubuler',
                'ince_duvar','onion','yag','sivi','sivi_kompleks','debris','atrofi'
              ].map(v => (
                <Opt key={v} on={L0.structure.includes(v)} onClick={()=>toggleLoop('structure', v)}>
                  {L(v)}
                </Opt>
              ))}
            </div>
          </div>
        );
      }

      if (loopStep === 3) {
        return (
          <div>
            <div className="step-label">{T.ls3label}</div>
            <div className="step-title">{T.ls3title} {subTitle}</div>
            <div className="grid grid-3">
              {['izointens','hipointens','hiperintens','hafif_hiper','hafif_hipo','heterojen','hiperintens_odak','akim_void'].map(v => (
                <Opt key={v} on={L0.t1.includes(v)} onClick={()=>toggleLoop('t1', v)}>{L(v)}</Opt>
              ))}
            </div>
          </div>
        );
      }

      if (loopStep === 4) {
        return (
          <div>
            <div className="step-label">{T.ls4label}</div>
            <div className="step-title">{T.ls4title} {subTitle}</div>
            <div className="grid grid-3">
              {[
                'hipointens','hipointens_homojen','belirgin_hipo','izointens',
                'hiperintens','heterojen','heterojen_hiper','hafif_hiper',
                'tabakali','konsantrik_halka','tubuler_hiper','akim_void'
              ].map(v => (
                <Opt key={v} on={L0.t2.includes(v)} onClick={()=>toggleLoop('t2', v)}>{L(v)}</Opt>
              ))}
            </div>
          </div>
        );
      }

      if (loopStep === 5) {
        return (
          <div>
            <div className="step-label">{T.ls5label}</div>
            <div className="step-title">{T.ls5title} {subTitle}</div>
            <div className="step-desc">{T.ls5desc}</div>

            <div className="step-label">{T.ls5dwiLabel}</div>
            <div className="grid grid-3">
              {['yok','kisitlanma_kismi','kisitlanma','belirgin_kisitlanma','degisken','heterojen','izointens'].map(v => (
                <Opt key={v} on={L0.dwi.includes(v)} onClick={()=>toggleLoop('dwi', v)}>{L(v)}</Opt>
              ))}
            </div>

            <div className="step-label" style={{marginTop:12}}>{T.ls5adcLabel}</div>
            <div className="grid grid-3">
              {['dusuk','cok_dusuk','izointens','yuksek','heterojen','degisken'].map(v => (
                <Opt key={v} on={L0.adc.includes(v)} onClick={()=>toggleLoop('adc', v)}>{L(v)}</Opt>
              ))}
            </div>
          </div>
        );
      }

      if (loopStep === 6) {
        return (
          <div>
            <div className="step-label">{T.ls6label}</div>
            <div className="step-title">{T.ls6title} {subTitle}</div>
            <div className="step-desc">{T.ls6desc}</div>
            <div className="grid grid-2">
              {[
                'yok','minimal','hafif','orta','homojen','homojen_orta',
                'heterojen','erken_yogun','erken_yogun_washout',
                'periferik_halka','duvar_gec','duvar_kalin','azalmis','artmis_diffuz','gec_dolma','gec_hafif'
              ].map(v => (
                <Opt key={v} on={L0.contrast.includes(v)} onClick={()=>toggleLoop('contrast', v)}>{L(v)}</Opt>
              ))}
            </div>
          </div>
        );
      }

      if (loopStep === 7) {
        return (
          <div>
            <div className="step-label">{T.ls7label}</div>
            <div className="step-title">{T.ls7title} {subTitle}</div>
            <div className="step-desc">{T.ls7desc}</div>
            <div className="grid grid-2">
              {['yok','var','var_fokal','yagbaskila_dusus'].map(v => (
                <Opt key={v} on={L0.chemshift.includes(v)} onClick={()=>toggleLoop('chemshift', v)}>{L(v)}</Opt>
              ))}
            </div>

            <div className="step-label" style={{marginTop:12}}>{T.ls7demoLabel}</div>
            <div className="grid grid-3">
              {['cocuk','adolesan','genc_erkek','15_35','15_45','20_40','30_60','yasli','60_ustu'].map(v => (
                <Opt key={v} on={L0.demographics.includes(v)} onClick={()=>toggleLoop('demographics', v)}>
                  {v==='cocuk'?T.ls7child:v==='adolesan'?T.ls7adol:v==='genc_erkek'?T.ls7young:v==='yasli'?T.ls7elderly:v==='60_ustu'?T.ls7over60:v.replace('_','-')+(RV_LOCALE==='en'?' years':' yaş')}
                </Opt>
              ))}
            </div>
          </div>
        );
      }

      if (loopStep === 8) {
        return (
          <div>
            <div className="step-label">{T.ls8label}</div>
            <div className="step-title">{T.ls8title} {subTitle}</div>
            <div className="step-desc">{T.ls8desc}</div>
            <div className="grid grid-2">
              {[
                'bilateral','kanama','kalsifikasyon','nekroz','fibrovaskuler_septa','tunika_korunur',
                'onion_skin','periferik_kalsifikasyon','mediastinum_yerlesim','cah',
                'hormonal','primer_malignite','retroperitoneal_lap',
                'whirlpool_kord','akut_skrotum','kord_tutulumu','kord_bukulme',
                'epididimit_eslik','reaktif_hidrosel','cilt_kalinlasma',
                'proteinoz_icerik','pampiniform_genisleme','sol_taraf','valsalva',
                'hemosiderin','kan_urun','t2star_hipo','travma',
                'duvar_kalinlik','enfeksiyon_eslik','ektopik_yerlesim',
                'barsak_icerik','yag_icerik','inguinal_devam','peristaltizm',
                'yag_dokusu','yag_baski_sinyal_kaybi','tunika_yerlesim','spermatosel_eslik'
              ].map(v => (
                <Opt key={v} on={L0.special.includes(v)} onClick={()=>toggleLoop('special', v)}>{L(v)}</Opt>
              ))}
            </div>

            <div className="field" style={{marginTop:12}}>
              <label>{T.ls8noteLabel}</label>
              <textarea placeholder={T.ls8notePlaceholder}
                        value={L0.notlar} onChange={e=>tLoop('notlar', e.target.value)}/>
            </div>
          </div>
        );
      }

      if (loopStep === 9) {
        const diffs = getDifferentials(L0, 7);
        return (
          <div>
            <div className="step-label">{T.ls9label}</div>
            <div className="step-title">{T.ls9title.replace('{n}', currentIdx+1)}</div>
            <div className="step-desc">{T.ls9desc}</div>

            {diffs.length === 0 && (
              <div className="warn-banner">{T.ls9noData}</div>
            )}

            {diffs.map(d => (
              <div key={d.id} className="diff-row">
                <div className="dname"><strong>{loc(d.name)}</strong><br/><span style={{color:'var(--text-mute)', fontSize:11}}>{loc(d.hint)}</span></div>
                <div className="dbar-wrap"><div className="dbar" style={{width: d.percentage + '%'}}/></div>
                <div className="dpct">%{d.percentage}</div>
              </div>
            ))}
          </div>
        );
      }
    }

    /* -------- 10. ÖZET & RAPOR -------- */
    if (step === 10) {
      return <ReportView data={data}/>;
    }

    return null;
  };

  /* ---- Nav etiketi ---- */
  const nextLabel = () => {
    if (step === 9 && loopStep === LOOP_STEPS.length - 1 && currentIdx >= 0) return T.navSaveLesion;
    if (step === 10) return T.navDone;
    return T.navForward;
  };
  const canNext = () => {
    if (step === 8 && data.lezyonVarMi === null) return false;
    if (step === 9 && currentIdx >= 0 && loopStep === 0) {
      if (!data.lezyonlar[currentIdx]?.taraf) return false;
      if ((data.lezyonlar[currentIdx]?.compartment||[]).length === 0) return false;
    }
    return true;
  };

  return (
    <>
      <div className="hdr">
        <div>
          <h1>{T.headerTitle}</h1>
          <div className="sub">{T.headerSub}</div>
        </div>
        <div className="ver">v1.0</div>
      </div>

      {renderDots()}

      <div className="card">
        {renderStep()}
      </div>

      <div className="nav">
        <button className="btn" onClick={goPrev} disabled={step===0 && loopStep<0}>{T.navBack}</button>
        {step !== 10 && (
          <button className="btn primary" onClick={goNext} disabled={!canNext()}>{nextLabel()}</button>
        )}
      </div>
    </>
  );
}

/* =====================================================================
   RAPOR GÖRÜNÜMÜ & ÜRETİCİLER
   ===================================================================== */
function ReportView({data}) {
  const [toast, setToast] = useState('');
  const [showText, setShowText] = useState(false);
  const taRef = useRef(null);

  const overallDiffs = useMemo(() => {
    if (data.lezyonlar.length === 0) return [];
    // Tüm lezyonların ortalama/toplam ağırlıklı skorları
    const agg = {};
    data.lezyonlar.forEach(l => {
      const diffs = getDifferentials(l, 10);
      diffs.forEach(d => {
        if (!agg[d.id]) agg[d.id] = {...d, score:0};
        agg[d.id].score += d.score;
      });
    });
    const arr = Object.values(agg).sort((a,b)=>b.score-a.score).slice(0,7);
    const sum = arr.reduce((s,p)=>s+p.score, 0);
    if (sum === 0) return [];
    return arr.map(p => ({...p, percentage: Math.round((p.score/sum)*100)}));
  }, [data.lezyonlar]);

  const plainReport = useMemo(() => genPlainReport(data, overallDiffs), [data, overallDiffs]);

  const doCopy = async () => {
    try {
      await navigator.clipboard.writeText(plainReport);
      setToast(T.toastCopied);
    } catch (e) {
      // overlay fallback
      if (taRef.current) {
        taRef.current.select();
        try { document.execCommand('copy'); setToast(T.toastCopiedOver); }
        catch { setToast(T.toastCopyFail); }
      } else {
        setShowText(true);
        setToast(T.toastOverlay);
      }
    }
    setTimeout(()=>setToast(''), 2200);
  };

  const doDownload = () => {
    const blob = new Blob([plainReport], {type:'text/plain;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `skrotal_testis_mri_${data.tarih||'rapor'}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setToast(T.toastDownloaded);
    setTimeout(()=>setToast(''), 2200);
  };

  return (
    <div>
      <div className="step-label">{T.s10label} {STEPS.length} / {STEPS.length}</div>
      <div className="step-title">{T.s10title}</div>
      <div className="step-desc">{T.s10desc}</div>

      <div className="toolbar">
        <button className="btn primary" onClick={doCopy}>{T.s10copy}</button>
        <button className="btn" onClick={doDownload}>{T.s10download}</button>
        <button className="btn" onClick={()=>setShowText(v=>!v)}>{showText ? T.s10hideText : T.s10showText}</button>
      </div>

      {genReportJSX(data, overallDiffs)}

      {showText && (
        <textarea ref={taRef} className="overlay-ta" value={plainReport} readOnly
                  onClick={e=>e.target.select()}/>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

/* =====================================================================
   RAPOR JSX ÜRETİCİ (inline görsel)
   ===================================================================== */
function genReportJSX(d, overallDiffs) {
  const yokMu = (side) => {
    const t = d[side==='sag'?'sagTestis':'solTestis'];
    return !t.degerlendirildi;
  };

  // Testis özeti
  const testisRow = (side) => {
    const k = side==='sag'?'sagTestis':'solTestis';
    const t = d[k];
    const lbl = side==='sag'?T.rowSagTestis:T.rowSolTestis;
    if (!t.degerlendirildi) {
      return <RptRow key={k} label={lbl} value={T.valNotEvaluated} pathologic={false}/>;
    }
    if (!t.mevcut) {
      const locStr = t.lokalizasyon==='inguinal'?T.valLocInguinal:
                  t.lokalizasyon==='abdominal'?T.valLocAbdominal:
                  t.lokalizasyon==='yok_atrofik'?T.valLocAtrophic:
                  T.valLocPostOp;
      return <RptRow key={k} label={lbl} value={T.valInScrotum + locStr} pathologic={true}/>;
    }
    const boyut = (t.boyutAP||t.boyutCC||t.boyutTR) ? `${t.boyutAP||'?'}×${t.boyutCC||'?'}×${t.boyutTR||'?'} mm` : T.valSizeNotEntered;
    const parenkimLbl = {homojen:T.valParenHomojen, heterojen_diffuz:T.valParenHeterojen, fokal_lezyon:T.valParenFokal, atrofi:T.valParenAtrofi}[t.parenkim];
    const t2Lbl = {normal:T.valT2Normal, diffuz_hipo:T.valT2DiffHipo, diffuz_hiper:T.valT2DiffHiper, heterojen:T.valT2Heterojen}[t.t2Sinyal];
    const patol = t.parenkim !== 'homojen' || t.t2Sinyal !== 'normal';
    return (
      <RptRow key={k} label={lbl}
              value={`${boyut}, ${parenkimLbl}, ${t2Lbl}${t.not?`. ${t.not}`:''}`}
              pathologic={patol}/>
    );
  };

  // Epididim
  const epiRow = (side) => {
    const k = side==='sag'?'sagEpididim':'solEpididim';
    const e = d[k];
    const lbl = side==='sag'?T.rowSagEpi:T.rowSolEpi;
    if (e.normal) return <RptRow key={k} label={lbl} value={T.valNormalSignal}/>;
    const bul = [];
    if (e.buyume) bul.push(T.valEpiBuyume);
    if (e.sinyalArt) bul.push(T.valEpiSinyalArt);
    if (e.kontrastArt) bul.push(T.valEpiKontrastArt);
    return <RptRow key={k} label={lbl} value={`${bul.join(', ') || T.valPathologic}${e.not?`. ${e.not}`:''}`} pathologic={true}/>;
  };

  // Kord
  const kordRow = (side) => {
    const k = side==='sag'?'sagKord':'solKord';
    const e = d[k];
    const lbl = side==='sag'?T.rowSagKord:T.rowSolKord;
    if (e.normal) return <RptRow key={k} label={lbl} value={T.valNormal}/>;
    const bul = [];
    if (e.varikosel) bul.push(T.valKordVarikosel + (e.varikoselGrad?` (${T.valKordMaksChar}${e.varikoselGrad} mm)`:``));
    if (e.kitle) bul.push(T.valKordKitle);
    return <RptRow key={k} label={lbl} value={`${bul.join(', ') || T.valPathologic}${e.not?`. ${e.not}`:''}`} pathologic={true}/>;
  };

  // Sıvı koleksiyonları
  const siviText = () => {
    const s = d.sivi;
    const parts = [];
    if (s.sagHidrosel) parts.push(T.valSagHidrosel);
    if (s.solHidrosel) parts.push(T.valSolHidrosel);
    if (s.sagHematosel) parts.push(T.valSagHematosel);
    if (s.solHematosel) parts.push(T.valSolHematosel);
    if (s.sagPiyosel) parts.push(T.valSagPiyosel);
    if (s.solPiyosel) parts.push(T.valSolPiyosel);
    if (parts.length === 0) return {t:T.valNoFluid, p:false};
    return {t: parts.join(', ') + (s.not?`. ${s.not}`:''), p:true};
  };
  const sv = siviText();

  // Tunika
  const KONTUR = { 'düzgün': T.s7konturDuz, 'lobüle': T.s7konturLob, 'bozulmuş': T.s7konturBoz };
  const tunikaText = () => {
    const t = d.tunika;
    if (t.saglam) return {t:T.valTunikaIntakt + (KONTUR[t.kontur] || t.kontur), p:false};
    const parts = [];
    if (t.sagRuptur) parts.push(T.valSagRuptur);
    if (t.solRuptur) parts.push(T.valSolRuptur);
    return {t: parts.join(', ') + T.valKontur + (KONTUR[t.kontur] || t.kontur) + (t.not?`. ${t.not}`:''), p:true};
  };
  const tn = tunikaText();

  // Skrotal cilt
  const ciltText = () => {
    const c = d.cilt;
    if (c.normal) return {t:T.valCiltNormal, p:false};
    const parts = [];
    if (c.kalinlasma) parts.push(T.valCiltKalinlasma);
    if (c.enflamatuar) parts.push(T.valCiltInflam);
    if (c.apse) parts.push(T.valCiltApse);
    if (c.kitle) parts.push(T.valCiltKitle);
    return {t: parts.join(', ') + (c.not?`. ${c.not}`:''), p:true};
  };
  const ct = ciltText();

  return (
    <>
      {/* Clinical */}
      {(d.tarih || d.hastaYas || d.klinik) && (
        <RptSection title={T.rptClinical}>
          {d.tarih && <RptRow label={T.rowDate} value={d.tarih}/>}
          {d.hastaYas && <RptRow label={T.rowAge} value={d.hastaYas}/>}
          <RptRow label={T.rowField} value={d.teknik.ag}/>
          <RptRow label={T.rowSequences} value={d.teknik.sekans.map(s=>s.replace(/_/g,' ')).join(', ')}/>
          {d.klinik && <RptRow label={T.rowIndication} value={d.klinik}/>}
        </RptSection>
      )}

      {/* Scrotal wall */}
      <RptSection title={T.rptScrWall}>
        <RptRow label={T.rowFinding} value={ct.t} pathologic={ct.p}/>
      </RptSection>

      {/* Testes */}
      <RptSection title={T.rptTestis}>
        {testisRow('sag')}
        {testisRow('sol')}
      </RptSection>

      {/* Epididymis */}
      <RptSection title={T.rptEpididymis}>
        {epiRow('sag')}
        {epiRow('sol')}
      </RptSection>

      {/* Spermatic cord */}
      <RptSection title={T.rptCord}>
        {kordRow('sag')}
        {kordRow('sol')}
      </RptSection>

      {/* Tunica */}
      <RptSection title={T.rptTunica}>
        <RptRow label={T.rowFinding} value={tn.t} pathologic={tn.p}/>
      </RptSection>

      {/* Fluid */}
      <RptSection title={T.rptFluid}>
        <RptRow label={T.rowFinding} value={sv.t} pathologic={sv.p}/>
      </RptSection>

      {/* Lesions */}
      {(yokMu('sag') || yokMu('sol')) && (
        <div className="warn-banner">
          {yokMu('sag') && yokMu('sol') ? T.warnBothSides : yokMu('sag') ? T.warnRightSide : T.warnLeftSide}{T.warnNotEvalSuffix}
        </div>
      )}

      {d.lezyonVarMi === false && (
        <RptSection title={T.rptFocal}>
          <RptRow label={T.rowFinding} value={T.valNoFocal}/>
        </RptSection>
      )}

      {d.lezyonlar.map((l, i) => {
        const diffs = getDifferentials(l, 5);
        const compText = l.compartment.map(c=>L(c)).join(', ');
        const taraf = l.taraf==='sag'?T.valSideRight:l.taraf==='sol'?T.valSideLeft:l.taraf==='bilateral'?T.valSideBilateral:'';
        const boyut = (l.boyutAP||l.boyutCC||l.boyutTR) ? `${l.boyutAP||'?'}×${l.boyutCC||'?'}×${l.boyutTR||'?'} mm` : T.valSizeNotEntered;
        const joinLbl = (arr) => (arr||[]).map(x=>L(x)).join(', ') || '—';
        return (
          <RptSection key={i} title={`${T.s9lesionN}${i+1}`}>
            <RptRow label={T.rowSide} value={taraf || '—'}/>
            <RptRow label={T.rowCompartment} value={compText || '—'} pathologic={true}/>
            {l.compartmentDetail && <RptRow label={T.rowAnatDetail} value={l.compartmentDetail}/>}
            <RptRow label={T.rowSize} value={boyut}/>
            <RptRow label={T.rowStructure} value={joinLbl(l.structure)} pathologic={true}/>
            <RptRow label={T.rowT1} value={joinLbl(l.t1)}/>
            <RptRow label={T.rowT2} value={joinLbl(l.t2)}/>
            <RptRow label={T.rowDWI} value={joinLbl(l.dwi)}/>
            <RptRow label={T.rowADC} value={joinLbl(l.adc)}/>
            <RptRow label={T.rowContrast} value={joinLbl(l.contrast)}/>
            <RptRow label={T.rowChemshift} value={joinLbl(l.chemshift)}/>
            {(l.special||[]).length > 0 && <RptRow label={T.rowExtra} value={joinLbl(l.special)} pathologic={true}/>}
            {l.notlar && <RptRow label={T.rowNote} value={l.notlar}/>}
            {diffs.length > 0 && (
              <div style={{padding:'10px 16px', borderTop:'1px solid var(--border)'}}>
                <div style={{color:'var(--text-mute)', fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:8}}>{T.rptDiffLabel}</div>
                {diffs.map(x => (
                  <div key={x.id} className="diff-row" style={{padding:'4px 0'}}>
                    <div className="dname"><strong>{loc(x.name)}</strong></div>
                    <div className="dbar-wrap"><div className="dbar" style={{width: x.percentage+'%'}}/></div>
                    <div className="dpct">%{x.percentage}</div>
                  </div>
                ))}
              </div>
            )}
          </RptSection>
        );
      })}

      {/* Overall differential */}
      {overallDiffs.length > 0 && (
        <RptSection title={T.rptOverallDiff}>
          <div style={{padding:'10px 16px'}}>
            {overallDiffs.map(x => (
              <div key={x.id} className="diff-row" style={{padding:'6px 0'}}>
                <div className="dname"><strong>{loc(x.name)}</strong><br/><span style={{color:'var(--text-mute)', fontSize:11}}>{loc(x.category)}</span></div>
                <div className="dbar-wrap"><div className="dbar" style={{width:x.percentage+'%'}}/></div>
                <div className="dpct">%{x.percentage}</div>
              </div>
            ))}
          </div>
        </RptSection>
      )}

      {/* Conclusion */}
      <RptSection title={T.rptConclusion}>
        <RptNarrative text={genConclusion(d, overallDiffs)}/>
      </RptSection>
    </>
  );
}

/* =====================================================================
   SONUÇ METNİ ÜRETİCİ
   ===================================================================== */
function genConclusion(d, diffs) {
  const lines = [];
  if (d.lezyonVarMi === false && d.sagTestis.parenkim === 'homojen' && d.solTestis.parenkim === 'homojen' &&
      d.sagEpididim.normal && d.solEpididim.normal && !d.sivi.sagHidrosel && !d.sivi.solHidrosel &&
      !d.sivi.sagHematosel && !d.sivi.solHematosel && !d.sivi.sagPiyosel && !d.sivi.solPiyosel) {
    lines.push(T.concNormal);
  } else if (d.lezyonVarMi === true && d.lezyonlar.length > 0) {
    if (diffs[0]) {
      lines.push(T.concTopDiff.replace('{n}', d.lezyonlar.length) + `${loc(diffs[0].name)} (%${diffs[0].percentage})`);
      if (diffs[1]) lines[lines.length-1] += `, ${loc(diffs[1].name)} (%${diffs[1].percentage})`;
      if (diffs[2]) lines[lines.length-1] += `, ${loc(diffs[2].name)} (%${diffs[2].percentage})`;
      lines[lines.length-1] += '.';
    } else {
      lines.push(`${d.lezyonlar.length}${T.concLezyonPlain}`);
    }
    // Malign clue
    const hasMalignHint = diffs.slice(0,3).some(x => {
      const cat = loc(x.category) + ' ' + loc(x.name);
      return /malign|seminom|lenfom|metastaz|GHT|lymphoma|metastasis/i.test(cat);
    });
    if (hasMalignHint) {
      lines.push(T.concMalign);
    }
  }
  if (d.tunika.sagRuptur || d.tunika.solRuptur) {
    lines.push(T.concTunikaRupture);
  }
  if (d.sivi.sagPiyosel || d.sivi.solPiyosel) {
    lines.push(T.concPiyosel);
  }
  if ((d.sagKord.varikosel || d.solKord.varikosel) && !lines.join(' ').includes(T.valKordVarikosel)) {
    const sides = [];
    if (d.sagKord.varikosel) sides.push(T.concSagSide);
    if (d.solKord.varikosel) sides.push(T.concSolSide);
    lines.push(`${sides.join(T.concVe)}${T.concVarikosel}`);
  }
  if (!d.sagTestis.degerlendirildi || !d.solTestis.degerlendirildi) {
    const t = [];
    if (!d.sagTestis.degerlendirildi) t.push(T.concSagSideEval);
    if (!d.solTestis.degerlendirildi) t.push(T.concSolSideEval);
    lines.push(`${t.join(T.concVe)}${T.concNotEval}`);
  }
  if (lines.length === 0) lines.push(T.concDefault);
  return lines.join('\n');
}

/* =====================================================================
   DÜZ METİN RAPOR ÜRETİCİ (kopyala / indir)
   ===================================================================== */
function genPlainReport(d, diffs) {
  const line = '═'.repeat(68);
  const sub  = '─'.repeat(68);
  let r = '';

  r += `${line}\n  ${T.ptHeader}\n${line}\n\n`;

  if (d.tarih) r += `${T.ptDateLabel} : ${d.tarih}\n`;
  if (d.hastaYas) r += `${T.ptAgeLabel} : ${d.hastaYas}\n`;
  r += `${T.ptFieldLabel} : ${d.teknik.ag}\n`;
  r += `${T.ptSeqLabel} : ${d.teknik.sekans.map(s=>s.replace(/_/g,' ')).join(', ')}\n`;
  if (d.klinik) r += `${T.ptIndicLabel} : ${d.klinik}\n`;
  r += '\n';

  r += `┌─ ${T.ptScrWall} ${'─'.repeat(Math.max(0,44-T.ptScrWall.length))}\n`;
  const c = d.cilt;
  if (c.normal) r += `│ ${T.ptCiltNormal}\n`;
  else {
    const pts = [];
    if (c.kalinlasma) pts.push(T.ptCiltKalinlasma);
    if (c.enflamatuar) pts.push(T.ptCiltInflam);
    if (c.apse) pts.push(T.ptCiltApse);
    if (c.kitle) pts.push(T.ptCiltKitle);
    r += `│ ${pts.join(', ')}${c.not?`. ${c.not}`:''}\n`;
  }
  r += '└' + '─'.repeat(67) + '\n\n';

  r += `┌─ ${T.ptTestisH} ${'─'.repeat(Math.max(0,55-T.ptTestisH.length))}\n`;
  ['sag','sol'].forEach(side => {
    const t = d[side==='sag'?'sagTestis':'solTestis'];
    const lbl = side==='sag'?T.ptSagLbl:T.ptSolLbl;
    if (!t.degerlendirildi) {
      r += `│ ${lbl} testis: ${T.ptNotEval}.\n`;
    } else if (!t.mevcut) {
      const locPt = t.lokalizasyon==='inguinal'?T.ptLocInguinal:
                  t.lokalizasyon==='abdominal'?T.ptLocAbdominal:
                  t.lokalizasyon==='yok_atrofik'?T.ptLocAtrophic:
                  T.ptLocPostOp;
      r += `│ ${lbl} testis: ${T.valInScrotum}${locPt}.\n`;
    } else {
      const boyut = (t.boyutAP||t.boyutCC||t.boyutTR) ? `${t.boyutAP||'?'}×${t.boyutCC||'?'}×${t.boyutTR||'?'} mm` : T.ptSizeNotEntered;
      const parenkim = {homojen:T.ptParHomojen, heterojen_diffuz:T.ptParHeterojen, fokal_lezyon:T.ptParFokal, atrofi:T.ptParAtrofi}[t.parenkim];
      const t2 = {normal:T.ptT2Normal, diffuz_hipo:T.ptT2DiffHipo, diffuz_hiper:T.ptT2DiffHiper, heterojen:T.ptT2Heterojen}[t.t2Sinyal];
      r += `│ ${lbl} testis: ${boyut}, ${parenkim}, ${t2}${t.not?`. ${t.not}`:''}.\n`;
    }
  });
  r += '└' + '─'.repeat(67) + '\n\n';

  r += `┌─ ${T.ptEpididymisH} ${'─'.repeat(Math.max(0,56-T.ptEpididymisH.length))}\n`;
  ['sag','sol'].forEach(side => {
    const e = d[side==='sag'?'sagEpididim':'solEpididim'];
    const lbl = side==='sag'?T.ptSagLbl:T.ptSolLbl;
    if (e.normal) r += `│ ${lbl} epididymis: ${T.ptNormal}.\n`;
    else {
      const pts = [];
      if (e.buyume) pts.push(T.ptEpiBuyume);
      if (e.sinyalArt) pts.push(T.ptEpiSinyalArt);
      if (e.kontrastArt) pts.push(T.ptEpiKontrastArt);
      r += `│ ${lbl} epididymis: ${pts.join(', ')}${e.not?`. ${e.not}`:''}.\n`;
    }
  });
  r += '└' + '─'.repeat(67) + '\n\n';

  r += `┌─ ${T.ptCordH} ${'─'.repeat(Math.max(0,50-T.ptCordH.length))}\n`;
  ['sag','sol'].forEach(side => {
    const e = d[side==='sag'?'sagKord':'solKord'];
    const lbl = side==='sag'?T.ptSagLbl:T.ptSolLbl;
    if (e.normal) r += `│ ${lbl} spermatic cord: ${T.ptNormal}.\n`;
    else {
      const pts = [];
      if (e.varikosel) pts.push(T.ptKordVarikosel + (e.varikoselGrad?` (${T.ptKordMaks}${e.varikoselGrad} mm)`:``));
      if (e.kitle) pts.push(T.ptKordKitle);
      r += `│ ${lbl} spermatic cord: ${pts.join(', ')}${e.not?`. ${e.not}`:''}.\n`;
    }
  });
  r += '└' + '─'.repeat(67) + '\n\n';

  r += `┌─ ${T.ptTunicaH} ${'─'.repeat(Math.max(0,38-T.ptTunicaH.length))}\n`;
  const tn = d.tunika;
  const KONTUR_PT = { 'düzgün': T.s7konturDuz, 'lobüle': T.s7konturLob, 'bozulmuş': T.s7konturBoz };
  if (tn.saglam) r += `│ ${T.ptTunikaIntakt}${KONTUR_PT[tn.kontur] || tn.kontur}.\n`;
  else {
    const pts = [];
    if (tn.sagRuptur) pts.push(T.ptSagRuptur);
    if (tn.solRuptur) pts.push(T.ptSolRuptur);
    r += `│ ${pts.join(', ')}, ${T.s7konturLabel.toLowerCase()} ${KONTUR_PT[tn.kontur] || tn.kontur}${tn.not?`. ${tn.not}`:''}.\n`;
  }
  r += '└' + '─'.repeat(67) + '\n\n';

  r += `┌─ ${T.ptFluidH} ${'─'.repeat(Math.max(0,40-T.ptFluidH.length))}\n`;
  const s = d.sivi;
  const svPts = [];
  if (s.sagHidrosel) svPts.push(T.ptSagHidrosel);
  if (s.solHidrosel) svPts.push(T.ptSolHidrosel);
  if (s.sagHematosel) svPts.push(T.ptSagHematosel);
  if (s.solHematosel) svPts.push(T.ptSolHematosel);
  if (s.sagPiyosel) svPts.push(T.ptSagPiyosel);
  if (s.solPiyosel) svPts.push(T.ptSolPiyosel);
  r += `│ ${svPts.length ? svPts.join(', ') + (s.not?`. ${s.not}`:'') + '.' : T.ptNoFluid}\n`;
  r += '└' + '─'.repeat(67) + '\n\n';

  // Lezyonlar
  if (d.lezyonVarMi === false) {
    r += `┌─ ${T.ptFocalH} ${'─'.repeat(Math.max(0,52-T.ptFocalH.length))}\n`;
    r += `│ ${T.ptNoFocal}\n`;
    r += '└' + '─'.repeat(67) + '\n\n';
  } else if (d.lezyonlar.length > 0) {
    d.lezyonlar.forEach((l, i) => {
      r += `┌─ ${T.ptLesionH}${i+1} ${'─'.repeat(Math.max(0,55 - String(i+1).length - T.ptLesionH.length))}\n`;
      const taraf = l.taraf==='sag'?T.ptSideRight:l.taraf==='sol'?T.ptSideSol:l.taraf==='bilateral'?T.ptSideBilateral:T.ptDash;
      r += `│ ${T.ptRowSide} : ${taraf}\n`;
      r += `│ ${T.ptRowComp} : ${l.compartment.map(c=>L(c)).join(', ') || T.ptDash}\n`;
      if (l.compartmentDetail) r += `│ ${T.ptRowAnat} : ${l.compartmentDetail}\n`;
      const boyut = (l.boyutAP||l.boyutCC||l.boyutTR) ? `${l.boyutAP||'?'}×${l.boyutCC||'?'}×${l.boyutTR||'?'} mm` : T.ptSizeNotEntered;
      r += `│ ${T.ptRowSize} : ${boyut}\n`;
      const joinLbl = (arr) => (arr||[]).map(x=>L(x)).join(', ') || T.ptDash;
      r += `│ ${T.ptRowStruct} : ${joinLbl(l.structure)}\n`;
      r += `│ ${T.ptRowT1} : ${joinLbl(l.t1)}\n`;
      r += `│ ${T.ptRowT2} : ${joinLbl(l.t2)}\n`;
      r += `│ ${T.ptRowDWI} : ${joinLbl(l.dwi)}\n`;
      r += `│ ${T.ptRowADC} : ${joinLbl(l.adc)}\n`;
      r += `│ ${T.ptRowContrast} : ${joinLbl(l.contrast)}\n`;
      r += `│ ${T.ptRowChemshift} : ${joinLbl(l.chemshift)}\n`;
      if ((l.special||[]).length) r += `│ ${T.ptRowExtra} : ${joinLbl(l.special)}\n`;
      if (l.notlar) r += `│ ${T.ptRowNote} : ${l.notlar}\n`;

      const lDiffs = getDifferentials(l, 5);
      if (lDiffs.length > 0) {
        r += `│ ${sub.slice(0,65)}\n`;
        r += `│ ${T.ptDiffTitle}\n`;
        lDiffs.forEach(x => {
          const bar = '█'.repeat(Math.round(x.percentage/5));
          r += `│   %${String(x.percentage).padStart(2,' ')}  ${bar.padEnd(20,' ')}  ${loc(x.name)}\n`;
        });
      }
      r += '└' + '─'.repeat(67) + '\n\n';
    });
  }

  // Overall differential
  if (diffs && diffs.length > 0) {
    r += `┌─ ${T.ptOverallDiffH} ${'─'.repeat(Math.max(0,40-T.ptOverallDiffH.length))}\n`;
    diffs.forEach(x => {
      const bar = '█'.repeat(Math.round(x.percentage/4));
      r += `│   %${String(x.percentage).padStart(2,' ')}  ${bar.padEnd(25,' ')}  ${loc(x.name)}\n`;
      r += `│        └ ${loc(x.category)}\n`;
    });
    r += '└' + '─'.repeat(67) + '\n\n';
  }

  // Not-evaluated side warning
  if (!d.sagTestis.degerlendirildi || !d.solTestis.degerlendirildi) {
    const ts = [];
    if (!d.sagTestis.degerlendirildi) ts.push(T.ptSagLbl.toLowerCase());
    if (!d.solTestis.degerlendirildi) ts.push(T.ptSolLbl.toLowerCase());
    r += `${T.ptWarnPrefix}${ts.join(' & ')}${T.ptWarnSuffix}\n\n`;
  }

  r += `┌─ ${T.ptConclusionH} ${'─'.repeat(Math.max(0,50-T.ptConclusionH.length))}\n`;
  genConclusion(d, diffs).split('\n').forEach(lineTxt => {
    r += `│ ${lineTxt}\n`;
  });
  r += '└' + '─'.repeat(67) + '\n';

  return r;
}

/* =====================================================================
   MOUNT
   ===================================================================== */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
