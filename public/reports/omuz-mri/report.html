              <div>
                {Lx.continuity === "tendinop" && <span className="chip chip-teal">{T.chipTendinopathy}</span>}
                {Lx.continuity === "partial" && <span className="chip chip-amber">{T.chipPartialTear} ({Lx.partial_face})</span>}
                {Lx.continuity === "full" && <span className="chip chip-red">{T.chipFullTear} ({Lx.full_size})</span>}
                {Lx.retraction && <span className="chip chip-red">Patte {Lx.retraction}</span>}
                {Lx.calcific && <span className="chip chip-amber">{T.chipCalcific}</span>}
                {Lx.goutallier > 0 && <span className="chip chip-amber">Goutallier {Lx.goutallier}</span>}
              </div>
            </div>;
          })}
          <button className="btn btn-primary" onClick={()=>startRCLesion()}>{T.addMoreLesion}</button>
          <button className="btn" style={{marginLeft:10}} onClick={()=>setStep(8)}>{T.continueBtn}</button>
        </>;
      }
      const Lx = lesions[lesionIdx];
      if (!Lx) return null;
      // sub-step 0: tendon
      if (lesionSub === 0) return <>
        <div className="sticker">{T.lesionSticker(lesionIdx, lesionSub, RC_SUBSTEPS)}</div>
        <h3 className="sec">{T.whichTendon}</h3>
        <div className="grid grid-2">
          {RC_TENDONS.map(t => <OptBox key={t.id} selected={Lx.tendon===t.id} onClick={()=>updateCurrentLesion({tendon:t.id})}>
            <b>{L(t,'name')}</b>
          </OptBox>)}
        </div>
      </>;
      // sub-step 1: location
      if (lesionSub === 1) return <>
        <div className="sticker">{T.lesionSticker(lesionIdx, lesionSub, RC_SUBSTEPS)}</div>
        <h3 className="sec">{T.tendonLocation}</h3>
        <div className="grid grid-2">
          <OptBox selected={Lx.location==="footprint"} onClick={()=>updateCurrentLesion({location:"footprint"})}>{T.footprintLoc}</OptBox>
          <OptBox selected={Lx.location==="kritik"} onClick={()=>updateCurrentLesion({location:"kritik"})}>{T.criticalZoneLoc}</OptBox>
          <OptBox selected={Lx.location==="mtj"} onClick={()=>updateCurrentLesion({location:"mtj"})}>{T.mtjLoc}</OptBox>
          <OptBox selected={Lx.location==="tum"} onClick={()=>updateCurrentLesion({location:"tum"})}>{T.diffuseLoc}</OptBox>
        </div>
      </>;
      // sub-step 2: integrity
      if (lesionSub === 2) return <>
        <div className="sticker">{T.lesionSticker(lesionIdx, lesionSub, RC_SUBSTEPS)}</div>
        <h3 className="sec">{T.tendonIntegrity}</h3>
        <div className="grid grid-2">
          <OptBox selected={Lx.continuity==="tendinop"} onClick={()=>updateCurrentLesion({continuity:"tendinop", partial_face:"", partial_thickness:"", full_size:"", retraction:null})}>
            <b>{T.tendinopathy}</b><small>{T.tendinopathyHint}</small>
          </OptBox>
          <OptBox selected={Lx.continuity==="partial"} onClick={()=>updateCurrentLesion({continuity:"partial", full_size:"", retraction:null})}>
            <b>{T.partialTear}</b><small>{T.partialTearHint}</small>
          </OptBox>
          <OptBox selected={Lx.continuity==="full"} onClick={()=>updateCurrentLesion({continuity:"full", partial_face:"", partial_thickness:""})}>
            <b>{T.fullTear}</b><small>{T.fullTearHint}</small>
          </OptBox>
        </div>
      </>;
      // sub-step 3: detail
      if (lesionSub === 3) {
        if (Lx.continuity === "tendinop") {
          return <>
            <div className="sticker">{T.lesionSticker(lesionIdx, lesionSub, RC_SUBSTEPS)}</div>
            <h3 className="sec">{T.tendinopNoDetail}</h3>
            <div className="hint">{T.tendinopNoDetailHint}</div>
          </>;
        }
        if (Lx.continuity === "partial") return <>
          <div className="sticker">{T.lesionSticker(lesionIdx, lesionSub, RC_SUBSTEPS)}</div>
          <h3 className="sec">{T.partialFace}</h3>
          <div className="grid grid-3">
            <OptBox selected={Lx.partial_face==="artikuler"} onClick={()=>updateCurrentLesion({partial_face:"artikuler"})}>{T.articularFace}</OptBox>
            <OptBox selected={Lx.partial_face==="bursal"} onClick={()=>updateCurrentLesion({partial_face:"bursal"})}>{T.bursalFace}</OptBox>
            <OptBox selected={Lx.partial_face==="intratendinoz"} onClick={()=>updateCurrentLesion({partial_face:"intratendinoz"})}>{T.intratendinous}</OptBox>
          </div>
          <div className="field"><label>{T.partialThicknessLabel}</label>
            <input className="num" type="number" min="0" max="99" value={Lx.partial_thickness} onChange={e=>updateCurrentLesion({partial_thickness:e.target.value})} placeholder={T.partialThicknessPlaceholder} />
          </div>
        </>;
        if (Lx.continuity === "full") return <>
          <div className="sticker">{T.lesionSticker(lesionIdx, lesionSub, RC_SUBSTEPS)}</div>
          <h3 className="sec">{T.fullTearSizeRetrac}</h3>
          <div className="field"><label>{T.defectSizeCofield}</label>
            <div className="grid grid-2">
              <OptBox selected={Lx.full_size==="small"} onClick={()=>updateCurrentLesion({full_size:"small"})}>{T.smallSize}</OptBox>
              <OptBox selected={Lx.full_size==="medium"} onClick={()=>updateCurrentLesion({full_size:"medium"})}>{T.mediumSize}</OptBox>
              <OptBox selected={Lx.full_size==="large"} onClick={()=>updateCurrentLesion({full_size:"large"})} amber>{T.largeSize}</OptBox>
              <OptBox selected={Lx.full_size==="massive"} onClick={()=>updateCurrentLesion({full_size:"massive"})} amber>{T.massiveSize}</OptBox>
            </div>
          </div>
          <div className="field"><label>{T.retraction}</label>
            <div className="grid grid-3">
              {PATTE.map(p => <OptBox key={p.id} selected={Lx.retraction===p.id} onClick={()=>updateCurrentLesion({retraction:p.id})}>
                <b>{p.label}</b><small>{L(p,'txt')}</small>
              </OptBox>)}
            </div>
          </div>
        </>;
      }
      // sub-step 4: goutallier & calcific
      if (lesionSub === 4) return <>
        <div className="sticker">{T.lesionSticker(lesionIdx, lesionSub, RC_SUBSTEPS)}</div>
        <h3 className="sec">{T.goutallierTitle}</h3>
        <div className="grid grid-3">
          {GOUTALLIER.map(g => <OptBox key={g.id} selected={Number(Lx.goutallier)===g.id} onClick={()=>updateCurrentLesion({goutallier:g.id})}>
            <b>{g.label}</b><small>{L(g,'txt')}</small>
          </OptBox>)}
        </div>
        <h3 className="sec amber">{T.calcificFocus}</h3>
        <ChkBox selected={Lx.calcific} onClick={()=>updateCurrentLesion({calcific: !Lx.calcific})}>{T.calcificFocusCheck}</ChkBox>
      </>;
    }

    // Step 8 — Biceps tendon
    if (step === 8) return <>
      <h3 className="sec">{T.bicepsLHB}</h3>
      <div className="grid grid-2">
        <div className="field"><label>{T.tendonSignal}</label>
          <div className="grid grid-2">
            <OptBox selected={d.biceps_signal==="normal"} onClick={()=>update("biceps_signal","normal")}>{T.normalSignal}</OptBox>
            <OptBox selected={d.biceps_signal==="artmis"} onClick={()=>update("biceps_signal","artmis")}>{T.increasedSignal}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.bicepsSheathFluid}</label>
          <div className="grid grid-3">
            <OptBox selected={d.biceps_sheath==="yok"} onClick={()=>update("biceps_sheath","yok")}>{T.noFluid}</OptBox>
            <OptBox selected={d.biceps_sheath==="minimal"} onClick={()=>update("biceps_sheath","minimal")}>{T.minimalFluid}</OptBox>
            <OptBox selected={d.biceps_sheath==="belirgin"} onClick={()=>update("biceps_sheath","belirgin")}>{T.prominentFluid}</OptBox>
          </div>
        </div>
      </div>
      <div className="field"><label>{T.tendonIntegrity8}</label>
        <div className="grid grid-3">
          <OptBox selected={d.biceps_continuity==="intakt"} onClick={()=>update("biceps_continuity","intakt")}>{T.intact}</OptBox>
          <OptBox selected={d.biceps_continuity==="parsiyel"} onClick={()=>update("biceps_continuity","parsiyel")}>{T.partialTear8}</OptBox>
          <OptBox selected={d.biceps_continuity==="tam"} onClick={()=>update("biceps_continuity","tam")} amber>{T.fullTear8}</OptBox>
        </div>
      </div>
      {d.biceps_continuity==="tam" && <div className="field"><label>{T.popeyeSign}</label>
        <div className="grid grid-2">
          <OptBox selected={d.biceps_popeye==="yok"} onClick={()=>update("biceps_popeye","yok")}>{T.absent}</OptBox>
          <OptBox selected={d.biceps_popeye==="evet"} onClick={()=>update("biceps_popeye","evet")}>{T.present}</OptBox>
        </div>
      </div>}
      <div className="field"><label>{T.bicepsPosition}</label>
        <div className="grid grid-3">
          <OptBox selected={d.biceps_position==="normal"} onClick={()=>update("biceps_position","normal")}>{T.normalPosition}</OptBox>
          <OptBox selected={d.biceps_position==="sublukse"} onClick={()=>update("biceps_position","sublukse")} amber>{T.medialSublux}</OptBox>
          <OptBox selected={d.biceps_position==="dislok_med"} onClick={()=>update("biceps_position","dislok_med")} amber>{T.medialDisloc}</OptBox>
        </div>
      </div>
    </>;

    // Step 9 — Labrum loop girişi & loop / Labrum loop
    if (step === 9) {
      if (labralIdx !== -1) {
        const Lx = (data.labralTears||[])[labralIdx];
        if (!Lx) return null;
        if (labralSub === 0) return <>
          <div className="sticker">{T.labralSticker(labralIdx, labralSub, LAB_SUBSTEPS)}</div>
          <h3 className="sec">{T.tearLocation}</h3>
          <div className="grid grid-4">
            {LABRAL_QUADRANTS.map(q => <OptBox key={q.id} selected={Lx.quadrant===q.id} onClick={()=>updateCurrentLabral({quadrant:q.id})}>
              {L(q,'name')}
            </OptBox>)}
          </div>
        </>;
        if (labralSub === 1) return <>
          <div className="sticker">{T.labralSticker(labralIdx, labralSub, LAB_SUBSTEPS)}</div>
          <h3 className="sec">{T.tearCategory}</h3>
          <div className="grid grid-2">
            <OptBox selected={Lx.category==="slap"} onClick={()=>updateCurrentLabral({category:"slap", subtype:""})}>
              <b>{T.slapSuperior}</b><small>{T.slapHint}</small>
            </OptBox>
            <OptBox selected={Lx.category==="ant"} onClick={()=>updateCurrentLabral({category:"ant", subtype:""})}>
              <b>{T.anteriorBankart}</b><small>{T.anteriorBankartHint}</small>
            </OptBox>
            <OptBox selected={Lx.category==="post"} onClick={()=>updateCurrentLabral({category:"post", subtype:""})}>
              <b>{T.posterior}</b><small>{T.posteriorHint}</small>
            </OptBox>
            <OptBox selected={Lx.category==="simple"} onClick={()=>updateCurrentLabral({category:"simple", subtype:""})}>
              <b>{T.simpleTear}</b><small>{T.simpleTearHint}</small>
            </OptBox>
          </div>
        </>;
        if (labralSub === 2) {
          if (Lx.category === "slap") return <>
            <div className="sticker">{T.labralSticker(labralIdx, labralSub, LAB_SUBSTEPS)}</div>
            <h3 className="sec">{T.slapSubtype}</h3>
            <div className="grid grid-2">
              {SLAP_TYPES.map(s => <OptBox key={s.id} selected={Lx.subtype===s.id} onClick={()=>updateCurrentLabral({subtype:s.id})}>
                <b>{s.name}</b><small>{L(s,'txt')}</small>
              </OptBox>)}
            </div>
            <ChkBox selected={Lx.paralabralCyst} onClick={()=>updateCurrentLabral({paralabralCyst:!Lx.paralabralCyst})}>{T.accompanyingParalabralCyst}</ChkBox>
          </>;
          if (Lx.category === "ant") return <>
            <div className="sticker">{T.labralSticker(labralIdx, labralSub, LAB_SUBSTEPS)}</div>
            <h3 className="sec">{T.anteriorVariant}</h3>
            <div className="grid grid-2">
              {ANT_LABRAL_VARIANTS.map(v => <OptBox key={v.id} selected={Lx.subtype===v.id} onClick={()=>updateCurrentLabral({subtype:v.id})}>
                <b>{L(v,'name')}</b><small>{L(v,'txt')}</small>
              </OptBox>)}
            </div>
            <ChkBox selected={Lx.paralabralCyst} onClick={()=>updateCurrentLabral({paralabralCyst:!Lx.paralabralCyst})}>{T.accompanyingParalabralCyst}</ChkBox>
          </>;
          if (Lx.category === "post") return <>
            <div className="sticker">{T.labralSticker(labralIdx, labralSub, LAB_SUBSTEPS)}</div>
            <h3 className="sec">{T.posteriorVariant}</h3>
            <div className="grid grid-2">
              {POST_LABRAL_VARIANTS.map(v => <OptBox key={v.id} selected={Lx.subtype===v.id} onClick={()=>updateCurrentLabral({subtype:v.id})}>
                <b>{L(v,'name')}</b><small>{L(v,'txt')}</small>
              </OptBox>)}
            </div>
            <ChkBox selected={Lx.paralabralCyst} onClick={()=>updateCurrentLabral({paralabralCyst:!Lx.paralabralCyst})}>{T.accompanyingParalabralCyst}</ChkBox>
          </>;
          // simple
          return <>
            <div className="sticker">{T.labralSticker(labralIdx, labralSub, LAB_SUBSTEPS)}</div>
            <h3 className="sec">{T.simpleTearTitle}</h3>
            <div className="hint">{T.simpleTearHintText}</div>
            <ChkBox selected={Lx.paralabralCyst} onClick={()=>updateCurrentLabral({paralabralCyst:!Lx.paralabralCyst})}>{T.accompanyingParalabralCyst}</ChkBox>
          </>;
        }
      }

      // loop dışında — özet + yeni ekle / outside loop — summary + add new
      return <>
        <h3 className="sec">{T.glenoidLabrumLesions}</h3>
        <div className="hint">{T.labralHint}</div>
        {(data.labralTears||[]).length > 0 && <div>
          <h3 className="sec amber">{T.recordedLabralTears}</h3>
          {(data.labralTears||[]).map((Lx,i) => {
            const q = LABRAL_QUADRANTS.find(x => x.id === Lx.quadrant);
            let tName = "";
            if (Lx.category === "slap") tName = SLAP_TYPES.find(x=>x.id===Lx.subtype)?.name || "SLAP";
            else if (Lx.category === "ant") tName = L(ANT_LABRAL_VARIANTS.find(x=>x.id===Lx.subtype)||{}, 'name') || "Anterior";
            else if (Lx.category === "post") tName = L(POST_LABRAL_VARIANTS.find(x=>x.id===Lx.subtype)||{}, 'name') || "Posterior";
            else tName = T.simpleBasit;
            return <div key={Lx.id} className="lesion-card">
              <div className="lesion-head">
                <div className="lesion-title">{T.labralTearTitle(i, q ? L(q,'name') : "?", tName)}</div>
                <button className="btn btn-sm" onClick={()=>removeLabral(i)}>{T.deleteBtn}</button>
              </div>
              {Lx.paralabralCyst && <span className="chip chip-amber">{T.accompanyingParalabralCyst} (+)</span>}
            </div>;
          })}
        </div>}
        <div>
          <button className="btn btn-primary" onClick={()=>startLabralTear()}>{T.addLabralTear}</button>
          <button className="btn" style={{marginLeft:10}} onClick={()=>setStep(10)}>
            {(data.labralTears||[]).length === 0 ? T.noLabralTear : T.noMoreLabralTear}
          </button>
        </div>

        <h3 className="sec">{T.additionalLabralFindings}</h3>
        <div className="field"><label>{T.labralDegen}</label>
          <div className="grid grid-2">
            <OptBox selected={d.labral_degen==="yok"} onClick={()=>update("labral_degen","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.labral_degen==="evet"} onClick={()=>update("labral_degen","evet")}>{T.labralDegenPresent}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.paralabralCystLoc}</label>
          <div className="grid grid-2">
            <OptBox selected={d.paralabral_cyst==="yok"} onClick={()=>update("paralabral_cyst","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.paralabral_cyst==="spinoglenoid"} onClick={()=>update("paralabral_cyst","spinoglenoid")} amber>{T.spinoglenoid}</OptBox>
            <OptBox selected={d.paralabral_cyst==="suprascapular"} onClick={()=>update("paralabral_cyst","suprascapular")} amber>{T.suprascapular}</OptBox>
            <OptBox selected={d.paralabral_cyst==="diger"} onClick={()=>update("paralabral_cyst","diger")}>{T.other}</OptBox>
          </div>
        </div>
      </>;
    }

    // Step 10 — Ligaman & kapsül / Ligaments & capsule
    if (step === 10) return <>
      <h3 className="sec">{T.glenohumLigaments}</h3>
      <div className="grid grid-2">
        <div className="field"><label>{T.sghl}</label>
          <div className="grid grid-2">
            <OptBox selected={d.sghl_abn==="normal"} onClick={()=>update("sghl_abn","normal")}>{T.normal}</OptBox>
            <OptBox selected={d.sghl_abn==="evet"} onClick={()=>update("sghl_abn","evet")}>{T.abnormal}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.mghl}</label>
          <div className="grid grid-2">
            <OptBox selected={d.mghl_abn==="normal"} onClick={()=>update("mghl_abn","normal")}>{T.normal}</OptBox>
            <OptBox selected={d.mghl_abn==="evet"} onClick={()=>update("mghl_abn","evet")}>{T.abnormal}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.ighl}</label>
          <div className="grid grid-2">
            <OptBox selected={d.ighl_torn==="normal"} onClick={()=>update("ighl_torn","normal")}>{T.normal}</OptBox>
            <OptBox selected={d.ighl_torn==="evet"} onClick={()=>update("ighl_torn","evet")} amber>{T.ighlAbnormal}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.chl}</label>
          <div className="grid grid-2">
            <OptBox selected={d.chl_thickening==="normal"} onClick={()=>update("chl_thickening","normal")}>{T.normal}</OptBox>
            <OptBox selected={d.chl_thickening==="evet"} onClick={()=>update("chl_thickening","evet")}>{T.chlThickened}</OptBox>
          </div>
        </div>
      </div>
      <h3 className="sec amber">{T.capsuleRotatorInterval}</h3>
      <div className="grid grid-2">
        <div className="field"><label>{T.rotatorInterval}</label>
          <div className="grid grid-2">
            <OptBox selected={d.rotator_interval==="normal"} onClick={()=>update("rotator_interval","normal")}>{T.normal}</OptBox>
            <OptBox selected={d.rotator_interval==="silinmis"} onClick={()=>update("rotator_interval","silinmis")}>{T.rotatorIntervalErased}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.axillaryThickening}</label>
          <div className="grid grid-2">
            <OptBox selected={d.axillary_thickening==="yok"} onClick={()=>update("axillary_thickening","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.axillary_thickening==="evet"} onClick={()=>update("axillary_thickening","evet")}>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.postCapsuleLaxity}</label>
          <div className="grid grid-2">
            <OptBox selected={d.post_capsule_lax==="yok"} onClick={()=>update("post_capsule_lax","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.post_capsule_lax==="evet"} onClick={()=>update("post_capsule_lax","evet")}>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.clinicalFrozen}</label>
          <div className="grid grid-2">
            <OptBox selected={d.clinical_frozen==="yok"} onClick={()=>update("clinical_frozen","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.clinical_frozen==="evet"} onClick={()=>update("clinical_frozen","evet")}>{T.clinicalFrozenPresent}</OptBox>
          </div>
        </div>
      </div>
    </>;

    // Step 11 — Kıkırdak & OA / Cartilage & OA
    if (step === 11) return <>
      <h3 className="sec">{T.glenohumCartilage}</h3>
      <div className="grid grid-4">
        <OptBox selected={d.cartilage_gh==="normal"} onClick={()=>update("cartilage_gh","normal")}>{T.normal}</OptBox>
        <OptBox selected={d.cartilage_gh==="hafif"} onClick={()=>update("cartilage_gh","hafif")}>{T.mildLoss}</OptBox>
        <OptBox selected={d.cartilage_gh==="orta"} onClick={()=>update("cartilage_gh","orta")}>{T.moderateLoss}</OptBox>
        <OptBox selected={d.cartilage_gh==="belirgin"} onClick={()=>update("cartilage_gh","belirgin")} amber>{T.markedLoss}</OptBox>
      </div>
      <h3 className="sec">{T.degenerativeChanges}</h3>
      <div className="grid grid-2">
        <ChkBox selected={d.subchondral_change==="evet"} onClick={()=>update("subchondral_change", d.subchondral_change==="evet"?"yok":"evet")}>{T.subchondralCystSclerosis}</ChkBox>
        <ChkBox selected={d.gh_osteofit==="evet"} onClick={()=>update("gh_osteofit", d.gh_osteofit==="evet"?"yok":"evet")}>{T.glenohumOsteophyte}</ChkBox>
        <ChkBox selected={d.gh_narrow==="evet"} onClick={()=>update("gh_narrow", d.gh_narrow==="evet"?"yok":"evet")}>{T.jointSpaceNarrow}</ChkBox>
      </div>
    </>;

    // Step 12 — Efüzyon & bursa & kontrast / Effusion & bursa & contrast
    if (step === 12) return <>
      <h3 className="sec">{T.jointEffusion}</h3>
      <div className="grid grid-4">
        <OptBox selected={d.effusion_amount==="yok"} onClick={()=>update("effusion_amount","yok")}>{T.noEffusion}</OptBox>
        <OptBox selected={d.effusion_amount==="minimal"} onClick={()=>update("effusion_amount","minimal")}>{T.minimal}</OptBox>
        <OptBox selected={d.effusion_amount==="orta"} onClick={()=>update("effusion_amount","orta")}>{T.moderate}</OptBox>
        <OptBox selected={d.effusion_amount==="belirgin"} onClick={()=>update("effusion_amount","belirgin")} amber>{T.prominent}</OptBox>
      </div>
      <h3 className="sec amber">{T.subacromialBursa}</h3>
      <div className="grid grid-4">
        <OptBox selected={d.bursa_effusion==="yok"} onClick={()=>update("bursa_effusion","yok")}>{T.noFluidBursa}</OptBox>
        <OptBox selected={d.bursa_effusion==="minimal"} onClick={()=>update("bursa_effusion","minimal")}>{T.minimal}</OptBox>
        <OptBox selected={d.bursa_effusion==="orta"} onClick={()=>update("bursa_effusion","orta")}>{T.moderate}</OptBox>
        <OptBox selected={d.bursa_effusion==="belirgin"} onClick={()=>update("bursa_effusion","belirgin")} amber>{T.prominent}</OptBox>
      </div>
      <div className="field" style={{marginTop:10}}><label>{T.bursalWall}</label>
        <div className="grid grid-2">
          <OptBox selected={d.bursa_wall==="normal"} onClick={()=>update("bursa_wall","normal")}>{T.normalBursaWall}</OptBox>
          <OptBox selected={d.bursa_wall==="kalin"} onClick={()=>update("bursa_wall","kalin")}>{T.thickenedBursaWall}</OptBox>
        </div>
      </div>
      {d.seq_post && <div className="field"><label>{T.postContrastEnhancement}</label>
        <div className="grid grid-4">
          <OptBox selected={d.post_contrast_enh==="yok"} onClick={()=>update("post_contrast_enh","yok")}>{T.absent}</OptBox>
          <OptBox selected={d.post_contrast_enh==="fokal"} onClick={()=>update("post_contrast_enh","fokal")}>{T.focal}</OptBox>
          <OptBox selected={d.post_contrast_enh==="bursal"} onClick={()=>update("post_contrast_enh","bursal")}>{T.bursalWallEnh}</OptBox>
          <OptBox selected={d.post_contrast_enh==="sinovit"} onClick={()=>update("post_contrast_enh","sinovit")} amber>{T.diffuseSynovitis}</OptBox>
        </div>
      </div>}
    </>;

    // Step 13 — Kas & nörovasküler / Muscle & neurovascular
    if (step === 13) return <>
      <h3 className="sec">{T.muscleAssessment}</h3>
      <div className="hint">{T.muscleHint}</div>
      <div className="grid grid-2">
        <div className="field"><label>{T.deltoidAbnormality}</label>
          <div className="grid grid-2">
            <OptBox selected={d.deltoid_abn==="yok"} onClick={()=>update("deltoid_abn","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.deltoid_abn==="evet"} onClick={()=>update("deltoid_abn","evet")}>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.teresMinorDenerv}</label>
          <div className="grid grid-2">
            <OptBox selected={d.quadrilateral_space==="yok"} onClick={()=>update("quadrilateral_space","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.quadrilateral_space==="evet"} onClick={()=>update("quadrilateral_space","evet")} amber>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.infraspinatusDenerv}</label>
          <div className="grid grid-2">
            <OptBox selected={d.infraspinatus_denerv==="yok"} onClick={()=>update("infraspinatus_denerv","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.infraspinatus_denerv==="evet"} onClick={()=>update("infraspinatus_denerv","evet")} amber>{T.present}</OptBox>
          </div>
        </div>
      </div>
    </>;

    // Step 14 — Sinoviyal / Synovial & inflammatory
    if (step === 14) return <>
      <h3 className="sec">{T.synovialInflammatory}</h3>
      <div className="grid grid-2">
        <div className="field"><label>{T.hemosiderinLabel}</label>
          <div className="grid grid-2">
            <OptBox selected={d.synovial_hemosiderin==="yok"} onClick={()=>update("synovial_hemosiderin","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.synovial_hemosiderin==="evet"} onClick={()=>update("synovial_hemosiderin","evet")} amber>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.bloomingLabel}</label>
          <div className="grid grid-2">
            <OptBox selected={d.blooming==="yok"} onClick={()=>update("blooming","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.blooming==="evet"} onClick={()=>update("blooming","evet")}>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.hemarthrosLabel}</label>
          <div className="grid grid-2">
            <OptBox selected={d.hemarthros==="yok"} onClick={()=>update("hemarthros","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.hemarthros==="evet"} onClick={()=>update("hemarthros","evet")}>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.earlyErosion}</label>
          <div className="grid grid-2">
            <OptBox selected={d.septic_erosion==="yok"} onClick={()=>update("septic_erosion","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.septic_erosion==="evet"} onClick={()=>update("septic_erosion","evet")} amber>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.periArticularEdema}</label>
          <div className="grid grid-2">
            <OptBox selected={d.periarticular_edema==="yok"} onClick={()=>update("periarticular_edema","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.periarticular_edema==="evet"} onClick={()=>update("periarticular_edema","evet")}>{T.present}</OptBox>
          </div>
        </div>
        <div className="field"><label>{T.clinicalSeptic}</label>
          <div className="grid grid-2">
            <OptBox selected={d.clinical_septic==="yok"} onClick={()=>update("clinical_septic","yok")}>{T.absent}</OptBox>
            <OptBox selected={d.clinical_septic==="evet"} onClick={()=>update("clinical_septic","evet")} amber>{T.present}</OptBox>
          </div>
        </div>
      </div>
    </>;

    // Step 15 — Kitle / Mass
    if (step === 15) return <>
      <h3 className="sec">{T.massLesion}</h3>
      <div className="field"><label>{T.massLesionLabel}</label>
        <div className="grid grid-2">
          <OptBox selected={d.mass_present==="yok"} onClick={()=>update("mass_present","yok")}>{T.absent}</OptBox>
          <OptBox selected={d.mass_present==="evet"} onClick={()=>update("mass_present","evet")} amber>{T.massPresent}</OptBox>
        </div>
      </div>
    </>;

    // Step 16 — Serbest metin / Free text
    if (step === 16) return <>
      <h3 className="sec">{T.freeText}</h3>
      <div className="field"><label>{T.freeTextLabel}</label>
        <textarea value={d.freetext} onChange={e=>update("freetext", e.target.value)} placeholder={T.freeTextPlaceholder} />
      </div>
    </>;

    // Step 17–20 — Özet ekranlar / Summary screens
    if (step === 17) return <>
      <h3 className="sec">{T.rcSummary}</h3>
      {lesions.length === 0 && <div className="hint">{T.noLesionsHint}</div>}
      {lesions.map((Lx,i) => {
        const t = RC_TENDONS.find(x=>x.id===Lx.tendon);
        return <div key={Lx.id} className="lesion-card">
          <div className="lesion-title">#{i+1} — {t ? L(t,'name') : "?"}</div>
          <div>
            {Lx.continuity==="tendinop" && <span className="chip chip-teal">{T.chipTendinopathy}</span>}
            {Lx.continuity==="partial" && <span className="chip chip-amber">{T.chipPartialTear} — {Lx.partial_face}</span>}
            {Lx.continuity==="full" && <span className="chip chip-red">{T.chipFullTear} — {Lx.full_size}</span>}
            {Lx.retraction && <span className="chip chip-red">Patte {Lx.retraction}</span>}
            {Lx.calcific && <span className="chip chip-amber">{T.chipCalcific}</span>}
            {Lx.goutallier > 0 && <span className="chip chip-amber">Goutallier {Lx.goutallier}</span>}
          </div>
        </div>;
      })}
    </>;

    if (step === 18) return <>
      <h3 className="sec">{T.labralSummary}</h3>
      {(data.labralTears||[]).length === 0 && <div className="hint">{T.noLabralTears}</div>}
      {(data.labralTears||[]).map((Lx,i) => {
        const q = LABRAL_QUADRANTS.find(x=>x.id===Lx.quadrant);
        let tName = "";
        if (Lx.category === "slap") tName = SLAP_TYPES.find(x=>x.id===Lx.subtype)?.name || "SLAP";
        else if (Lx.category === "ant") tName = L(ANT_LABRAL_VARIANTS.find(x=>x.id===Lx.subtype)||{}, 'name') || "Anterior";
        else if (Lx.category === "post") tName = L(POST_LABRAL_VARIANTS.find(x=>x.id===Lx.subtype)||{}, 'name') || "Posterior";
        else tName = T.simpleBasit;
        return <div key={Lx.id} className="lesion-card">
          <div className="lesion-title">#{i+1} — {q ? L(q,'name') : "?"} {T.quadrant("")} — {tName}</div>
          {Lx.paralabralCyst && <span className="chip chip-amber">{T.accompanyingParalabralCyst} (+)</span>}
        </div>;
      })}
    </>;

    // Step 19 — Ayırıcı tanı paneli / Differential diagnosis panel
    if (step === 19) return <>
      <h3 className="sec">{T.diffDx}</h3>
      <div className="hint">{T.diffDxHint}</div>
      {[...scores].filter(s => s.score > 0).sort((a,b)=>b.score-a.score).map(s => {
        const p = PATHO.find(x => x.key === s.key);
        const color = CAT_COLOR[p?.cat] || "#64748b";
        const barClass = s.score >= 60 ? "top" : (s.score >= 30 ? "mid" : "low");
        return <div key={s.key} className="bar-row">
          <div className="name"><span className="dx-dot" style={{background:color,display:"inline-block",width:10,height:10,borderRadius:"50%",marginRight:7}}></span>{L(p,'name')}</div>
          <div className={"bar "+barClass}><span style={{width:s.score+"%"}}></span></div>
          <div className="pct">%{s.score}</div>
        </div>;
      })}
      {scores.filter(s => s.score > 0).length === 0 && <div className="hint">{T.noPosFindings}</div>}
    </>;

    // Step 20 — Son gözden geçirme / Final review
    if (step === 20) return <>
      <h3 className="sec">{T.finalReview}</h3>
      <div className="hint">{T.finalReviewHint}</div>
      <div className="grid grid-2">
        <div><b>{T.sideLabel}:</b> {L(SIDE.find(s=>s.id===d.side)||SIDE[0],'label')} | <b>{T.ageLabel}:</b> {d.age} | <b>{T.sexLabel}:</b> {L(SEX.find(s=>s.id===d.sex)||SEX[0],'label')}</div>
        <div><b>{T.traumaLabel20}:</b> {d.trauma || "?"} | <b>{T.dislocationLabel20}:</b> {d.dislocation_hx || "?"}</div>
      </div>
      <div><b>{T.acromionLabel}:</b> {L(BIGLIANI.find(b=>b.id===d.acromion_type)||{}, 'label') || "?"}</div>
      <div><b>{T.rcLesionCount}:</b> {lesions.length}</div>
      <div><b>{T.labralTearCount}:</b> {(data.labralTears||[]).length}</div>
      <div><b>{T.hillSachsLabel20}:</b> {d.hill_sachs || "?"} | <b>{T.bonyBankartLabel20}:</b> {d.glenoid_bone_loss || "?"}</div>
    </>;

    // Step 21 — Rapor üret / Report generation
    if (step === 21) return <>
      <h3 className="sec">{T.reportGeneration}</h3>
      <div className="hint">{T.reportGenerationHint}</div>
      <button className="btn btn-primary" onClick={()=>setShowReport(true)}>{T.generateReport}</button>
    </>;

    return null;
  }

  const report = useMemo(() => generateReport(data, lesions, data.labralTears || [], scores), [data, lesions, scores]);

  /* ==== Topbar ==== */
  const pct = Math.round(100 * (step+1) / TOTAL_STEPS);
  const stepLabels = T.stepLabels;

  return <div className="app">
    <div className="topbar">
      <div className="brand">
        <div className="logo">Ω</div>
        <div>
          <h1>{T.appTitle}</h1>
          <p>{T.appSub}</p>
        </div>
      </div>
      <div className="progress-wrap">
        <div className="progress-label">
          <span>{T.stepLabel(step+1, TOTAL_STEPS)}: {stepLabels[step]}</span>
          <span>%{pct}</span>
        </div>
        <div className="progress"><span style={{width:pct+"%"}}></span></div>
      </div>
    </div>

    <div className="card">
      <div className="step-head">
        <div className="step-no">{step+1}</div>
        <div>
          <h3 className="step-title">{stepLabels[step]}</h3>
          <p className="step-sub">
            {T.stepSub(
              (step === 7) ? lesionIdx : -1,
              lesionSub, RC_SUBSTEPS,
              (step === 9) ? labralIdx : -1,
              labralSub, LAB_SUBSTEPS
            )}
          </p>
        </div>
      </div>

      {renderStep()}

      <div className="nav">
        <button className="btn" onClick={goPrev} disabled={step===0 && lesionIdx===-1 && labralIdx===-1}>{T.back}</button>
        <button className={step === TOTAL_STEPS-1 ? "btn btn-amber" : "btn btn-primary"} onClick={goNext} disabled={!canNext()}>
          {step === TOTAL_STEPS-1 ? T.openReport : T.next}
        </button>
      </div>
    </div>

    {showReport && <ReportOverlay report={report} data={data} scores={scores} onClose={()=>setShowReport(false)}
      onCopy={copyReportText} onPrint={printReport} onDownload={downloadHTML} />}
  </div>;
}

/* ========== Rapor Overlay ========== */
function ReportOverlay({report, data, scores, onClose, onCopy, onPrint, onDownload}) {
  const h = report.headerInfo;
  const sortedScores = [...scores].filter(s => s.score > 0).sort((a,b)=>b.score-a.score).slice(0,6);

  return <div className="overlay" onClick={onClose}>
    <div className="overlay-actions" onClick={e=>e.stopPropagation()}>
      <button className="btn" onClick={onPrint}>{T.printBtn}</button>
      <button className="btn" onClick={onCopy}>{T.copyBtn}</button>
      <button className="btn btn-primary" onClick={onDownload}>{T.downloadBtn}</button>
      <button className="btn" onClick={onClose}>{T.closeBtn}</button>
    </div>
    <div className="report-wrap" onClick={e=>e.stopPropagation()} id="report-text-content">
      <div className="report-header">
        <h2>{T.reportMainTitle}</h2>
        <p>{T.reportHeaderSub(h.side, h.age, h.sex, h.date)}</p>
      </div>

      <div className="rbox">
        <div className="rbox-head slate">{T.clinicalInfoHead}</div>
        <div className="rbox-body">{h.clinical || T.noClinicalInfo}</div>
      </div>

      <div className="rbox">
        <div className="rbox-head slate">{T.techniqueHead}</div>
        <div className="rbox-body">
          {report.seq.length === 0 && <div>{T.noTechnique}</div>}
          {report.seq.map((s,i) => <div key={i} className="zbullet">{s}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">{T.findingsBone}</div>
        <div className="rbox-body">
          {report.bone.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">{T.findingsAcromion}</div>
        <div className="rbox-body">
          {report.acromion.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head teal">{T.findingsRC}</div>
        <div className="rbox-body" style={{padding:0}}>
          {report.rcSections.map((sec,i)=>(
            <div key={i} style={{borderTop:i>0?"1px solid #cbd5e1":"none"}}>
              <div className="zrow"><div className="zk">{sec.name}</div><div className="zv">
                {sec.lines.map((ln,j) => <div key={j}>{ln}</div>)}
              </div></div>
            </div>
          ))}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head teal">{T.findingsBiceps}</div>
        <div className="rbox-body">
          {report.biceps.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head amber">{T.findingsLabrum}</div>
        <div className="rbox-body">
          {report.labrum.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">{T.findingsLig}</div>
        <div className="rbox-body">
          {report.lig.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">{T.findingsCart}</div>
        <div className="rbox-body">
          {report.cart.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">{T.findingsFluid}</div>
        <div className="rbox-body">
          {report.fluidLines.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">{T.findingsMuscle}</div>
        <div className="rbox-body">
          {report.muscle.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
          {report.cyst.map((b,i)=><div key={"c"+i} className="zbullet">{b}</div>)}
        </div>
      </div>

      {report.other.length > 0 && <div className="rbox">
        <div className="rbox-head">{T.findingsOther}</div>
        <div className="rbox-body">
          {report.other.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>}

      <div className="yorum">
        <b>{T.impression}</b>
        {report.yorum}
      </div>

      {sortedScores.length > 0 && <div className="rbox">
        <div className="rbox-head slate">{T.diffDxTable}</div>
        <div className="rbox-body" style={{padding:0}}>
          <table className="dx-table">
            <thead><tr><th style={{width:"60%"}}>{T.diffDxColDx}</th><th>{T.diffDxColCat}</th><th style={{width:90,textAlign:"right"}}>{T.diffDxColMatch}</th></tr></thead>
            <tbody>
              {sortedScores.map(s => {
                const p = PATHO.find(x=>x.key===s.key);
                const color = CAT_COLOR[p?.cat] || "#64748b";
                return <tr key={s.key}>
                  <td><span className="dx-dot" style={{background:color}}></span>{L(p,'name')}</td>
                  <td style={{textTransform:"capitalize"}}>{p?.cat}</td>
                  <td style={{textAlign:"right",fontVariantNumeric:"tabular-nums",fontWeight:700}}>%{s.score}</td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>}

      <div className="sig">
        {T.sigLine}<br/>
        {T.sigDate(h.date)}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
