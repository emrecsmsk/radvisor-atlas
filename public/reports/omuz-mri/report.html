    </>;

    // Step 7 — Manşet lezyon loop (alt adımlar)
    if (step === 7) {
      if (lesionIdx === -1) {
        // loop biter, manşet özeti + devam butonu
        return <>
          <h3 className="sec">Rotator Manşet Lezyonları Kaydedildi</h3>
          {lesions.length === 0 && <div className="hint">Kayıtlı lezyon yok.</div>}
          {lesions.map((L,i) => {
            const t = RC_TENDONS.find(x => x.id === L.tendon);
            return <div key={L.id} className="lesion-card">
              <div className="lesion-head">
                <div className="lesion-title">#{i+1} — {t ? t.name : "?"}</div>
                <button className="btn btn-sm" onClick={()=>removeLesion(i)}>Sil</button>
              </div>
              <div>
                {L.continuity === "tendinop" && <span className="chip chip-teal">Tendinopati</span>}
                {L.continuity === "partial" && <span className="chip chip-amber">Parsiyel ({L.partial_face})</span>}
                {L.continuity === "full" && <span className="chip chip-red">Tam kat ({L.full_size})</span>}
                {L.retraction && <span className="chip chip-red">Patte {L.retraction}</span>}
                {L.calcific && <span className="chip chip-amber">Kalsifik</span>}
                {L.goutallier > 0 && <span className="chip chip-amber">Goutallier {L.goutallier}</span>}
              </div>
            </div>;
          })}
          <button className="btn btn-primary" onClick={()=>startRCLesion()}>+ Başka Lezyon Ekle</button>
          <button className="btn" style={{marginLeft:10}} onClick={()=>setStep(8)}>Devam et →</button>
        </>;
      }
      const L = lesions[lesionIdx];
      if (!L) return null;
      // alt adım 0: tendon
      if (lesionSub === 0) return <>
        <div className="sticker">Lezyon <b>#{lesionIdx+1}</b> — Adım {lesionSub+1}/{RC_SUBSTEPS}</div>
        <h3 className="sec">Hangi tendon?</h3>
        <div className="grid grid-2">
          {RC_TENDONS.map(t => <OptBox key={t.id} selected={L.tendon===t.id} onClick={()=>updateCurrentLesion({tendon:t.id})}>
            <b>{t.name}</b>
          </OptBox>)}
        </div>
      </>;
      // alt adım 1: lokalizasyon
      if (lesionSub === 1) return <>
        <div className="sticker">Lezyon <b>#{lesionIdx+1}</b> — Adım {lesionSub+1}/{RC_SUBSTEPS}</div>
        <h3 className="sec">Tendon içinde lokalizasyon</h3>
        <div className="grid grid-2">
          <OptBox selected={L.location==="footprint"} onClick={()=>updateCurrentLesion({location:"footprint"})}>Footprint (insersiyonel)</OptBox>
          <OptBox selected={L.location==="kritik"} onClick={()=>updateCurrentLesion({location:"kritik"})}>Kritik zon (insersiyo 1-2 cm proksimali)</OptBox>
          <OptBox selected={L.location==="mtj"} onClick={()=>updateCurrentLesion({location:"mtj"})}>Muskulotendinöz bileşke</OptBox>
          <OptBox selected={L.location==="tum"} onClick={()=>updateCurrentLesion({location:"tum"})}>Difüz / birden çok alan</OptBox>
        </div>
      </>;
      // alt adım 2: kontinüite
      if (lesionSub === 2) return <>
        <div className="sticker">Lezyon <b>#{lesionIdx+1}</b> — Adım {lesionSub+1}/{RC_SUBSTEPS}</div>
        <h3 className="sec">Tendon bütünlüğü</h3>
        <div className="grid grid-2">
          <OptBox selected={L.continuity==="tendinop"} onClick={()=>updateCurrentLesion({continuity:"tendinop", partial_face:"", partial_thickness:"", full_size:"", retraction:null})}>
            <b>Tendinopati</b><small>Sinyal artışı, yırtık yok</small>
          </OptBox>
          <OptBox selected={L.continuity==="partial"} onClick={()=>updateCurrentLesion({continuity:"partial", full_size:"", retraction:null})}>
            <b>Parsiyel yırtık</b><small>Tendon kalınlığının bir kısmı</small>
          </OptBox>
          <OptBox selected={L.continuity==="full"} onClick={()=>updateCurrentLesion({continuity:"full", partial_face:"", partial_thickness:""})}>
            <b>Tam kat yırtık</b><small>Artiküler-bursal geçişli sıvı</small>
          </OptBox>
        </div>
      </>;
      // alt adım 3: detay
      if (lesionSub === 3) {
        if (L.continuity === "tendinop") {
          return <>
            <div className="sticker">Lezyon <b>#{lesionIdx+1}</b> — Adım {lesionSub+1}/{RC_SUBSTEPS}</div>
            <h3 className="sec">Tendinopati için ek detay yok</h3>
            <div className="hint">Bu adımda ek detay gerekmiyor. Sonraki adıma geçin.</div>
          </>;
        }
        if (L.continuity === "partial") return <>
          <div className="sticker">Lezyon <b>#{lesionIdx+1}</b> — Adım {lesionSub+1}/{RC_SUBSTEPS}</div>
          <h3 className="sec">Parsiyel Yırtık — Yüz</h3>
          <div className="grid grid-3">
            <OptBox selected={L.partial_face==="artikuler"} onClick={()=>updateCurrentLesion({partial_face:"artikuler"})}>Artiküler yüz</OptBox>
            <OptBox selected={L.partial_face==="bursal"} onClick={()=>updateCurrentLesion({partial_face:"bursal"})}>Bursal yüz</OptBox>
            <OptBox selected={L.partial_face==="intratendinoz"} onClick={()=>updateCurrentLesion({partial_face:"intratendinoz"})}>İntratendinöz</OptBox>
          </div>
          <div className="field"><label>Tendon kalınlığının yaklaşık kaç %'si? (opsiyonel)</label>
            <input className="num" type="number" min="0" max="99" value={L.partial_thickness} onChange={e=>updateCurrentLesion({partial_thickness:e.target.value})} placeholder="örn. 40" />
          </div>
        </>;
        if (L.continuity === "full") return <>
          <div className="sticker">Lezyon <b>#{lesionIdx+1}</b> — Adım {lesionSub+1}/{RC_SUBSTEPS}</div>
          <h3 className="sec">Tam Kat Yırtık — Boyut & Retraksiyon</h3>
          <div className="field"><label>Defekt boyutu (Cofield/DeOrio)</label>
            <div className="grid grid-2">
              <OptBox selected={L.full_size==="small"} onClick={()=>updateCurrentLesion({full_size:"small"})}>Küçük (&lt;1 cm)</OptBox>
              <OptBox selected={L.full_size==="medium"} onClick={()=>updateCurrentLesion({full_size:"medium"})}>Orta (1–3 cm)</OptBox>
              <OptBox selected={L.full_size==="large"} onClick={()=>updateCurrentLesion({full_size:"large"})} amber>Geniş (3–5 cm)</OptBox>
              <OptBox selected={L.full_size==="massive"} onClick={()=>updateCurrentLesion({full_size:"massive"})} amber>Masif (&gt;5 cm)</OptBox>
            </div>
          </div>
          <div className="field"><label>Tendon retraksiyonu (Patte)</label>
            <div className="grid grid-3">
              {PATTE.map(p => <OptBox key={p.id} selected={L.retraction===p.id} onClick={()=>updateCurrentLesion({retraction:p.id})}>
                <b>{p.label}</b><small>{p.txt}</small>
              </OptBox>)}
            </div>
          </div>
        </>;
      }
      // alt adım 4: goutallier & kalsifik
      if (lesionSub === 4) return <>
        <div className="sticker">Lezyon <b>#{lesionIdx+1}</b> — Adım {lesionSub+1}/{RC_SUBSTEPS}</div>
        <h3 className="sec">Kas Yağlı Dejenerasyonu (Goutallier)</h3>
        <div className="grid grid-3">
          {GOUTALLIER.map(g => <OptBox key={g.id} selected={Number(L.goutallier)===g.id} onClick={()=>updateCurrentLesion({goutallier:g.id})}>
            <b>{g.label}</b><small>{g.txt}</small>
          </OptBox>)}
        </div>
        <h3 className="sec amber">Kalsifik Fokus</h3>
        <ChkBox selected={L.calcific} onClick={()=>updateCurrentLesion({calcific: !L.calcific})}>Bu tendon liflerinde kalsifik fokus var</ChkBox>
      </>;
    }

    // Step 8 — Biceps tendon
    if (step === 8) return <>
      <h3 className="sec">Biceps Uzun Başı Tendonu</h3>
      <div className="grid grid-2">
        <div className="field"><label>Tendon sinyali</label>
          <div className="grid grid-2">
            <OptBox selected={d.biceps_signal==="normal"} onClick={()=>update("biceps_signal","normal")}>Normal</OptBox>
            <OptBox selected={d.biceps_signal==="artmis"} onClick={()=>update("biceps_signal","artmis")}>Artmış (tendinopati)</OptBox>
          </div>
        </div>
        <div className="field"><label>Biceps kılıfı sıvısı</label>
          <div className="grid grid-3">
            <OptBox selected={d.biceps_sheath==="yok"} onClick={()=>update("biceps_sheath","yok")}>Yok</OptBox>
            <OptBox selected={d.biceps_sheath==="minimal"} onClick={()=>update("biceps_sheath","minimal")}>Minimal</OptBox>
            <OptBox selected={d.biceps_sheath==="belirgin"} onClick={()=>update("biceps_sheath","belirgin")}>Belirgin (tenosinovit)</OptBox>
          </div>
        </div>
      </div>
      <div className="field"><label>Tendon bütünlüğü</label>
        <div className="grid grid-3">
          <OptBox selected={d.biceps_continuity==="intakt"} onClick={()=>update("biceps_continuity","intakt")}>İntakt</OptBox>
          <OptBox selected={d.biceps_continuity==="parsiyel"} onClick={()=>update("biceps_continuity","parsiyel")}>Parsiyel yırtık</OptBox>
          <OptBox selected={d.biceps_continuity==="tam"} onClick={()=>update("biceps_continuity","tam")} amber>Tam kat yırtık</OptBox>
        </div>
      </div>
      {d.biceps_continuity==="tam" && <div className="field"><label>Popeye işareti (distal kas karnı retraksiyonu)</label>
        <div className="grid grid-2">
          <OptBox selected={d.biceps_popeye==="yok"} onClick={()=>update("biceps_popeye","yok")}>Yok</OptBox>
          <OptBox selected={d.biceps_popeye==="evet"} onClick={()=>update("biceps_popeye","evet")}>Var</OptBox>
        </div>
      </div>}
      <div className="field"><label>Bicipital olukta pozisyon</label>
        <div className="grid grid-3">
          <OptBox selected={d.biceps_position==="normal"} onClick={()=>update("biceps_position","normal")}>Normal pozisyon</OptBox>
          <OptBox selected={d.biceps_position==="sublukse"} onClick={()=>update("biceps_position","sublukse")} amber>Medial subluksasyon</OptBox>
          <OptBox selected={d.biceps_position==="dislok_med"} onClick={()=>update("biceps_position","dislok_med")} amber>Medial dislokasyon</OptBox>
        </div>
      </div>
    </>;

    // Step 9 — Labrum loop girişi & loop
    if (step === 9) {
      // loop içindeyse
      if (labralIdx !== -1) {
        const L = (data.labralTears||[])[labralIdx];
        if (!L) return null;
        if (labralSub === 0) return <>
          <div className="sticker">Labral Yırtık <b>#{labralIdx+1}</b> — Adım {labralSub+1}/{LAB_SUBSTEPS}</div>
          <h3 className="sec">Yırtık Lokalizasyonu (Kadran)</h3>
          <div className="grid grid-4">
            {LABRAL_QUADRANTS.map(q => <OptBox key={q.id} selected={L.quadrant===q.id} onClick={()=>updateCurrentLabral({quadrant:q.id})}>
              {q.name}
            </OptBox>)}
          </div>
        </>;
        if (labralSub === 1) return <>
          <div className="sticker">Labral Yırtık <b>#{labralIdx+1}</b> — Adım {labralSub+1}/{LAB_SUBSTEPS}</div>
          <h3 className="sec">Yırtık Kategorisi</h3>
          <div className="grid grid-2">
            <OptBox selected={L.category==="slap"} onClick={()=>updateCurrentLabral({category:"slap", subtype:""})}>
              <b>SLAP (Süperior)</b><small>Biceps ankoru ile ilişkili</small>
            </OptBox>
            <OptBox selected={L.category==="ant"} onClick={()=>updateCurrentLabral({category:"ant", subtype:""})}>
              <b>Anterior (Bankart spektrumu)</b><small>Bankart, kemik Bankart, ALPSA, Perthes, GLAD, HAGL</small>
            </OptBox>
            <OptBox selected={L.category==="post"} onClick={()=>updateCurrentLabral({category:"post", subtype:""})}>
              <b>Posterior</b><small>Reverse Bankart, Kim</small>
            </OptBox>
            <OptBox selected={L.category==="simple"} onClick={()=>updateCurrentLabral({category:"simple", subtype:""})}>
              <b>Basit labral yırtık / dejenerasyon</b><small>Spesifik alt tip tanımlanmamış</small>
            </OptBox>
          </div>
        </>;
        if (labralSub === 2) {
          if (L.category === "slap") return <>
            <div className="sticker">Labral Yırtık <b>#{labralIdx+1}</b> — Adım {labralSub+1}/{LAB_SUBSTEPS}</div>
            <h3 className="sec">SLAP Alt Tipi</h3>
            <div className="grid grid-2">
              {SLAP_TYPES.map(s => <OptBox key={s.id} selected={L.subtype===s.id} onClick={()=>updateCurrentLabral({subtype:s.id})}>
                <b>{s.name}</b><small>{s.txt}</small>
              </OptBox>)}
            </div>
            <ChkBox selected={L.paralabralCyst} onClick={()=>updateCurrentLabral({paralabralCyst:!L.paralabralCyst})}>Eşlik eden paralabral kist</ChkBox>
          </>;
          if (L.category === "ant") return <>
            <div className="sticker">Labral Yırtık <b>#{labralIdx+1}</b> — Adım {labralSub+1}/{LAB_SUBSTEPS}</div>
            <h3 className="sec">Anterior Labral Varyant</h3>
            <div className="grid grid-2">
              {ANT_LABRAL_VARIANTS.map(v => <OptBox key={v.id} selected={L.subtype===v.id} onClick={()=>updateCurrentLabral({subtype:v.id})}>
                <b>{v.name}</b><small>{v.txt}</small>
              </OptBox>)}
            </div>
            <ChkBox selected={L.paralabralCyst} onClick={()=>updateCurrentLabral({paralabralCyst:!L.paralabralCyst})}>Eşlik eden paralabral kist</ChkBox>
          </>;
          if (L.category === "post") return <>
            <div className="sticker">Labral Yırtık <b>#{labralIdx+1}</b> — Adım {labralSub+1}/{LAB_SUBSTEPS}</div>
            <h3 className="sec">Posterior Labral Varyant</h3>
            <div className="grid grid-2">
              {POST_LABRAL_VARIANTS.map(v => <OptBox key={v.id} selected={L.subtype===v.id} onClick={()=>updateCurrentLabral({subtype:v.id})}>
                <b>{v.name}</b><small>{v.txt}</small>
              </OptBox>)}
            </div>
            <ChkBox selected={L.paralabralCyst} onClick={()=>updateCurrentLabral({paralabralCyst:!L.paralabralCyst})}>Eşlik eden paralabral kist</ChkBox>
          </>;
          // simple
          return <>
            <div className="sticker">Labral Yırtık <b>#{labralIdx+1}</b> — Adım {labralSub+1}/{LAB_SUBSTEPS}</div>
            <h3 className="sec">Basit Labral Yırtık</h3>
            <div className="hint">Spesifik alt tip tanımlanmadı; lokalize sinyal değişikliği olarak raporlanacak.</div>
            <ChkBox selected={L.paralabralCyst} onClick={()=>updateCurrentLabral({paralabralCyst:!L.paralabralCyst})}>Eşlik eden paralabral kist</ChkBox>
          </>;
        }
      }

      // loop dışında — özet + yeni ekle
      return <>
        <h3 className="sec">Glenoid Labrum Lezyonları</h3>
        <div className="hint">Her yırtık için kadran ve tip seçin. Bankart/SLAP/ALPSA vb. ayrı ayrı kaydedilebilir.</div>
        {(data.labralTears||[]).length > 0 && <div>
          <h3 className="sec amber">Kaydedilen Labral Yırtıklar</h3>
          {(data.labralTears||[]).map((L,i) => {
            const q = LABRAL_QUADRANTS.find(x => x.id === L.quadrant);
            let tName = "";
            if (L.category === "slap") tName = SLAP_TYPES.find(x=>x.id===L.subtype)?.name || "SLAP";
            else if (L.category === "ant") tName = ANT_LABRAL_VARIANTS.find(x=>x.id===L.subtype)?.name || "Anterior";
            else if (L.category === "post") tName = POST_LABRAL_VARIANTS.find(x=>x.id===L.subtype)?.name || "Posterior";
            else tName = "Basit";
            return <div key={L.id} className="lesion-card">
              <div className="lesion-head">
                <div className="lesion-title">Yırtık #{i+1} — {q?.name} — {tName}</div>
                <button className="btn btn-sm" onClick={()=>removeLabral(i)}>Sil</button>
              </div>
              {L.paralabralCyst && <span className="chip chip-amber">Paralabral kist (+)</span>}
            </div>;
          })}
        </div>}
        <div>
          <button className="btn btn-primary" onClick={()=>startLabralTear()}>+ Yeni Labral Yırtık Ekle</button>
          <button className="btn" style={{marginLeft:10}} onClick={()=>setStep(10)}>
            {(data.labralTears||[]).length === 0 ? "Labral yırtık yok, devam et →" : "Başka yırtık yok, devam et →"}
          </button>
        </div>

        <h3 className="sec">Ek Labral Bulgular</h3>
        <div className="field"><label>Labral dejenerasyon (yırtık olmadan)</label>
          <div className="grid grid-2">
            <OptBox selected={d.labral_degen==="yok"} onClick={()=>update("labral_degen","yok")}>Yok</OptBox>
            <OptBox selected={d.labral_degen==="evet"} onClick={()=>update("labral_degen","evet")}>Var (sinyal artışı)</OptBox>
          </div>
        </div>
        <div className="field"><label>Paralabral kist lokalizasyonu</label>
          <div className="grid grid-2">
            <OptBox selected={d.paralabral_cyst==="yok"} onClick={()=>update("paralabral_cyst","yok")}>Yok</OptBox>
            <OptBox selected={d.paralabral_cyst==="spinoglenoid"} onClick={()=>update("paralabral_cyst","spinoglenoid")} amber>Spinoglenoid çentik</OptBox>
            <OptBox selected={d.paralabral_cyst==="suprascapular"} onClick={()=>update("paralabral_cyst","suprascapular")} amber>Suprascapular çentik</OptBox>
            <OptBox selected={d.paralabral_cyst==="diger"} onClick={()=>update("paralabral_cyst","diger")}>Diğer</OptBox>
          </div>
        </div>
      </>;
    }

    // Step 10 — Ligaman & kapsül
    if (step === 10) return <>
      <h3 className="sec">Glenohumeral Ligamanlar</h3>
      <div className="grid grid-2">
        <div className="field"><label>SGHL (süperior glenohumeral lig.)</label>
          <div className="grid grid-2">
            <OptBox selected={d.sghl_abn==="normal"} onClick={()=>update("sghl_abn","normal")}>Normal</OptBox>
            <OptBox selected={d.sghl_abn==="evet"} onClick={()=>update("sghl_abn","evet")}>Anormal</OptBox>
          </div>
        </div>
        <div className="field"><label>MGHL (orta glenohumeral lig.)</label>
          <div className="grid grid-2">
            <OptBox selected={d.mghl_abn==="normal"} onClick={()=>update("mghl_abn","normal")}>Normal</OptBox>
            <OptBox selected={d.mghl_abn==="evet"} onClick={()=>update("mghl_abn","evet")}>Anormal</OptBox>
          </div>
        </div>
        <div className="field"><label>IGHL (inferior glenohumeral lig.)</label>
          <div className="grid grid-2">
            <OptBox selected={d.ighl_torn==="normal"} onClick={()=>update("ighl_torn","normal")}>Normal</OptBox>
            <OptBox selected={d.ighl_torn==="evet"} onClick={()=>update("ighl_torn","evet")} amber>Yırtık / HAGL</OptBox>
          </div>
        </div>
        <div className="field"><label>Korakohumeral ligaman (CHL)</label>
          <div className="grid grid-2">
            <OptBox selected={d.chl_thickening==="normal"} onClick={()=>update("chl_thickening","normal")}>Normal</OptBox>
            <OptBox selected={d.chl_thickening==="evet"} onClick={()=>update("chl_thickening","evet")}>Kalınlaşmış (&gt;4 mm)</OptBox>
          </div>
        </div>
      </div>
      <h3 className="sec amber">Kapsül & Rotator İnterval</h3>
      <div className="grid grid-2">
        <div className="field"><label>Rotator interval</label>
          <div className="grid grid-2">
            <OptBox selected={d.rotator_interval==="normal"} onClick={()=>update("rotator_interval","normal")}>Normal</OptBox>
            <OptBox selected={d.rotator_interval==="silinmis"} onClick={()=>update("rotator_interval","silinmis")}>Silinmiş / sinyal artmış</OptBox>
          </div>
        </div>
        <div className="field"><label>Aksiller reseste kapsüler kalınlaşma (&gt;4 mm)</label>
          <div className="grid grid-2">
            <OptBox selected={d.axillary_thickening==="yok"} onClick={()=>update("axillary_thickening","yok")}>Yok</OptBox>
            <OptBox selected={d.axillary_thickening==="evet"} onClick={()=>update("axillary_thickening","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Posterior kapsül laksitesi</label>
          <div className="grid grid-2">
            <OptBox selected={d.post_capsule_lax==="yok"} onClick={()=>update("post_capsule_lax","yok")}>Yok</OptBox>
            <OptBox selected={d.post_capsule_lax==="evet"} onClick={()=>update("post_capsule_lax","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Klinik: ağrılı hareket kısıtlılığı</label>
          <div className="grid grid-2">
            <OptBox selected={d.clinical_frozen==="yok"} onClick={()=>update("clinical_frozen","yok")}>Yok</OptBox>
            <OptBox selected={d.clinical_frozen==="evet"} onClick={()=>update("clinical_frozen","evet")}>Var (adeziv kapsülit düşündürücü)</OptBox>
          </div>
        </div>
      </div>
    </>;

    // Step 11 — Kıkırdak & OA
    if (step === 11) return <>
      <h3 className="sec">Glenohumeral Eklem Kıkırdağı</h3>
      <div className="grid grid-4">
        <OptBox selected={d.cartilage_gh==="normal"} onClick={()=>update("cartilage_gh","normal")}>Normal</OptBox>
        <OptBox selected={d.cartilage_gh==="hafif"} onClick={()=>update("cartilage_gh","hafif")}>Hafif kayıp</OptBox>
        <OptBox selected={d.cartilage_gh==="orta"} onClick={()=>update("cartilage_gh","orta")}>Orta kayıp</OptBox>
        <OptBox selected={d.cartilage_gh==="belirgin"} onClick={()=>update("cartilage_gh","belirgin")} amber>Belirgin kayıp</OptBox>
      </div>
      <h3 className="sec">Dejeneratif Değişiklikler</h3>
      <div className="grid grid-2">
        <ChkBox selected={d.subchondral_change==="evet"} onClick={()=>update("subchondral_change", d.subchondral_change==="evet"?"yok":"evet")}>Subkondral kist/skleroz</ChkBox>
        <ChkBox selected={d.gh_osteofit==="evet"} onClick={()=>update("gh_osteofit", d.gh_osteofit==="evet"?"yok":"evet")}>Glenohumeral osteofit</ChkBox>
        <ChkBox selected={d.gh_narrow==="evet"} onClick={()=>update("gh_narrow", d.gh_narrow==="evet"?"yok":"evet")}>Eklem aralığında daralma</ChkBox>
      </div>
    </>;

    // Step 12 — Efüzyon & bursa & kontrast
    if (step === 12) return <>
      <h3 className="sec">Eklem Efüzyonu</h3>
      <div className="grid grid-4">
        <OptBox selected={d.effusion_amount==="yok"} onClick={()=>update("effusion_amount","yok")}>Yok</OptBox>
        <OptBox selected={d.effusion_amount==="minimal"} onClick={()=>update("effusion_amount","minimal")}>Minimal</OptBox>
        <OptBox selected={d.effusion_amount==="orta"} onClick={()=>update("effusion_amount","orta")}>Orta</OptBox>
        <OptBox selected={d.effusion_amount==="belirgin"} onClick={()=>update("effusion_amount","belirgin")} amber>Belirgin</OptBox>
      </div>
      <h3 className="sec amber">Subakromial-Subdeltoid Bursa</h3>
      <div className="grid grid-4">
        <OptBox selected={d.bursa_effusion==="yok"} onClick={()=>update("bursa_effusion","yok")}>Sıvı yok</OptBox>
        <OptBox selected={d.bursa_effusion==="minimal"} onClick={()=>update("bursa_effusion","minimal")}>Minimal</OptBox>
        <OptBox selected={d.bursa_effusion==="orta"} onClick={()=>update("bursa_effusion","orta")}>Orta</OptBox>
        <OptBox selected={d.bursa_effusion==="belirgin"} onClick={()=>update("bursa_effusion","belirgin")} amber>Belirgin</OptBox>
      </div>
      <div className="field" style={{marginTop:10}}><label>Bursal duvar</label>
        <div className="grid grid-2">
          <OptBox selected={d.bursa_wall==="normal"} onClick={()=>update("bursa_wall","normal")}>Normal</OptBox>
          <OptBox selected={d.bursa_wall==="kalin"} onClick={()=>update("bursa_wall","kalin")}>Kalınlaşmış</OptBox>
        </div>
      </div>
      {d.seq_post && <div className="field"><label>Kontrast sonrası boyanma</label>
        <div className="grid grid-4">
          <OptBox selected={d.post_contrast_enh==="yok"} onClick={()=>update("post_contrast_enh","yok")}>Yok</OptBox>
          <OptBox selected={d.post_contrast_enh==="fokal"} onClick={()=>update("post_contrast_enh","fokal")}>Fokal</OptBox>
          <OptBox selected={d.post_contrast_enh==="bursal"} onClick={()=>update("post_contrast_enh","bursal")}>Bursal duvar</OptBox>
          <OptBox selected={d.post_contrast_enh==="sinovit"} onClick={()=>update("post_contrast_enh","sinovit")} amber>Yaygın sinovit</OptBox>
        </div>
      </div>}
    </>;

    // Step 13 — Kas & nörovasküler
    if (step === 13) return <>
      <h3 className="sec">Kas Değerlendirmesi</h3>
      <div className="hint">Rotator manşet kaslarında yağlı dejenerasyon her lezyon kaydında ayrıca girilmiştir. Bu adım ek nörovasküler/denervasyon bulgularına odaklıdır.</div>
      <div className="grid grid-2">
        <div className="field"><label>Deltoid kası anormalliği</label>
          <div className="grid grid-2">
            <OptBox selected={d.deltoid_abn==="yok"} onClick={()=>update("deltoid_abn","yok")}>Yok</OptBox>
            <OptBox selected={d.deltoid_abn==="evet"} onClick={()=>update("deltoid_abn","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Teres minor denervasyonu (kuadrilateral bölge sendromu)</label>
          <div className="grid grid-2">
            <OptBox selected={d.quadrilateral_space==="yok"} onClick={()=>update("quadrilateral_space","yok")}>Yok</OptBox>
            <OptBox selected={d.quadrilateral_space==="evet"} onClick={()=>update("quadrilateral_space","evet")} amber>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>İnfraspinatus denervasyonu (suprascapular nöropati)</label>
          <div className="grid grid-2">
            <OptBox selected={d.infraspinatus_denerv==="yok"} onClick={()=>update("infraspinatus_denerv","yok")}>Yok</OptBox>
            <OptBox selected={d.infraspinatus_denerv==="evet"} onClick={()=>update("infraspinatus_denerv","evet")} amber>Var</OptBox>
          </div>
        </div>
      </div>
    </>;

    // Step 14 — PVNS / İnflamatuar / Septik
    if (step === 14) return <>
      <h3 className="sec">Sinoviyal & İnflamatuar Bulgular</h3>
      <div className="grid grid-2">
        <div className="field"><label>Sinoviyal kalınlaşmada hemosiderin (düşük T1/T2)</label>
          <div className="grid grid-2">
            <OptBox selected={d.synovial_hemosiderin==="yok"} onClick={()=>update("synovial_hemosiderin","yok")}>Yok</OptBox>
            <OptBox selected={d.synovial_hemosiderin==="evet"} onClick={()=>update("synovial_hemosiderin","evet")} amber>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>GRE blooming artefaktı</label>
          <div className="grid grid-2">
            <OptBox selected={d.blooming==="yok"} onClick={()=>update("blooming","yok")}>Yok</OptBox>
            <OptBox selected={d.blooming==="evet"} onClick={()=>update("blooming","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Hemartroz / tekrarlayan hemoraji</label>
          <div className="grid grid-2">
            <OptBox selected={d.hemarthros==="yok"} onClick={()=>update("hemarthros","yok")}>Yok</OptBox>
            <OptBox selected={d.hemarthros==="evet"} onClick={()=>update("hemarthros","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Subkondral kemikte erken erozyon</label>
          <div className="grid grid-2">
            <OptBox selected={d.septic_erosion==="yok"} onClick={()=>update("septic_erosion","yok")}>Yok</OptBox>
            <OptBox selected={d.septic_erosion==="evet"} onClick={()=>update("septic_erosion","evet")} amber>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Periartiküler yumuşak doku ödemi/selülit</label>
          <div className="grid grid-2">
            <OptBox selected={d.periarticular_edema==="yok"} onClick={()=>update("periarticular_edema","yok")}>Yok</OptBox>
            <OptBox selected={d.periarticular_edema==="evet"} onClick={()=>update("periarticular_edema","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Klinik: ateş / lökositoz / lokal ısı artışı</label>
          <div className="grid grid-2">
            <OptBox selected={d.clinical_septic==="yok"} onClick={()=>update("clinical_septic","yok")}>Yok</OptBox>
            <OptBox selected={d.clinical_septic==="evet"} onClick={()=>update("clinical_septic","evet")} amber>Var</OptBox>
          </div>
        </div>
      </div>
    </>;

    // Step 15 — Kitle / mass (opsiyonel)
    if (step === 15) return <>
      <h3 className="sec">Kitle / Yer Kaplayıcı Lezyon</h3>
      <div className="field"><label>Periartiküler veya eklem içi kitle lezyonu</label>
        <div className="grid grid-2">
          <OptBox selected={d.mass_present==="yok"} onClick={()=>update("mass_present","yok")}>Yok</OptBox>
          <OptBox selected={d.mass_present==="evet"} onClick={()=>update("mass_present","evet")} amber>Var — ileri değerlendirme önerilir</OptBox>
        </div>
      </div>
    </>;

    // Step 16 — Serbest metin
    if (step === 16) return <>
      <h3 className="sec">Ek / Serbest Metin Bulgular</h3>
      <div className="field"><label>Yukarıdaki yapılandırılmış girdilere eklenecek ek bulgular</label>
        <textarea value={d.freetext} onChange={e=>update("freetext", e.target.value)} placeholder="Örn: Pektoralis majorda travmatik avülsiyon, kronik bursit sekeli, scapulothoracic bursit..." />
      </div>
    </>;

    // Step 17–20 — Özet ekranlar (gözden geçirme)
    if (step === 17) return <>
      <h3 className="sec">Lezyon Özeti — Rotator Manşet</h3>
      {lesions.length === 0 && <div className="hint">Kayıtlı rotator manşet lezyonu yok.</div>}
      {lesions.map((L,i) => {
        const t = RC_TENDONS.find(x=>x.id===L.tendon);
        return <div key={L.id} className="lesion-card">
          <div className="lesion-title">#{i+1} — {t?.name}</div>
          <div>
            {L.continuity==="tendinop" && <span className="chip chip-teal">Tendinopati</span>}
            {L.continuity==="partial" && <span className="chip chip-amber">Parsiyel — {L.partial_face}</span>}
            {L.continuity==="full" && <span className="chip chip-red">Tam kat — {L.full_size}</span>}
            {L.retraction && <span className="chip chip-red">Patte {L.retraction}</span>}
            {L.calcific && <span className="chip chip-amber">Kalsifik</span>}
            {L.goutallier > 0 && <span className="chip chip-amber">Goutallier {L.goutallier}</span>}
          </div>
        </div>;
      })}
    </>;

    if (step === 18) return <>
      <h3 className="sec">Lezyon Özeti — Labrum</h3>
      {(data.labralTears||[]).length === 0 && <div className="hint">Kayıtlı labral yırtık yok.</div>}
      {(data.labralTears||[]).map((L,i) => {
        const q = LABRAL_QUADRANTS.find(x=>x.id===L.quadrant);
        let tName = "";
        if (L.category === "slap") tName = SLAP_TYPES.find(x=>x.id===L.subtype)?.name || "SLAP";
        else if (L.category === "ant") tName = ANT_LABRAL_VARIANTS.find(x=>x.id===L.subtype)?.name || "Anterior";
        else if (L.category === "post") tName = POST_LABRAL_VARIANTS.find(x=>x.id===L.subtype)?.name || "Posterior";
        else tName = "Basit yırtık";
        return <div key={L.id} className="lesion-card">
          <div className="lesion-title">#{i+1} — {q?.name} kadran — {tName}</div>
          {L.paralabralCyst && <span className="chip chip-amber">Paralabral kist (+)</span>}
        </div>;
      })}
    </>;

    // Step 19 — Ayırıcı tanı paneli
    if (step === 19) return <>
      <h3 className="sec">Ayırıcı Tanı Olasılıkları</h3>
      <div className="hint">Olasılıklar, girilen bulguların ağırlıklı skorlamasıyla hesaplanmıştır (yalnızca klinik korelasyon ile değerlendirilmelidir).</div>
      {[...scores].filter(s => s.score > 0).sort((a,b)=>b.score-a.score).map(s => {
        const p = PATHO.find(x => x.key === s.key);
        const color = CAT_COLOR[p?.cat] || "#64748b";
        const barClass = s.score >= 60 ? "top" : (s.score >= 30 ? "mid" : "low");
        return <div key={s.key} className="bar-row">
          <div className="name"><span className="dx-dot" style={{background:color,display:"inline-block",width:10,height:10,borderRadius:"50%",marginRight:7}}></span>{p?.name}</div>
          <div className={"bar "+barClass}><span style={{width:s.score+"%"}}></span></div>
          <div className="pct">%{s.score}</div>
        </div>;
      })}
      {scores.filter(s => s.score > 0).length === 0 && <div className="hint">Henüz yeterli pozitif bulgu girilmedi.</div>}
    </>;

    // Step 20 — Son gözden geçirme
    if (step === 20) return <>
      <h3 className="sec">Son Gözden Geçirme</h3>
      <div className="hint">Rapor oluşturulmadan önce aşağıdaki özeti kontrol edin. Gerekirse geri dönüp değişiklik yapabilirsiniz.</div>
      <div className="grid grid-2">
        <div><b>Taraf:</b> {d.side} | <b>Yaş:</b> {d.age} | <b>Cinsiyet:</b> {d.sex}</div>
        <div><b>Travma:</b> {d.trauma || "?"} | <b>Dislokasyon:</b> {d.dislocation_hx || "?"}</div>
      </div>
      <div><b>Akromion:</b> {BIGLIANI.find(b=>b.id===d.acromion_type)?.label || "?"}</div>
      <div><b>Rotator manşet lezyonu:</b> {lesions.length}</div>
      <div><b>Labral yırtık:</b> {(data.labralTears||[]).length}</div>
      <div><b>Hill-Sachs:</b> {d.hill_sachs || "?"} | <b>Bony Bankart:</b> {d.glenoid_bone_loss || "?"}</div>
    </>;

    // Step 21 — Rapor üret
    if (step === 21) return <>
      <h3 className="sec">Rapor Üretimi</h3>
      <div className="hint">Zebra + kutulu formatta rapor hazır. &quot;Raporu Oluştur&quot; butonu ile görüntüleyebilir; ardından yazdırma, panoya kopyalama veya HTML olarak indirme yapabilirsiniz.</div>
      <button className="btn btn-primary" onClick={()=>setShowReport(true)}>Raporu Oluştur / Göster</button>
    </>;

    return null;
  }

  const report = useMemo(() => generateReport(data, lesions, data.labralTears || [], scores), [data, lesions, scores]);

  /* ==== Topbar ==== */
  const pct = Math.round(100 * (step+1) / TOTAL_STEPS);
  const stepLabels = [
    "Hasta Bilgileri",
    "Sekanslar",
    "Akromion & AC Eklem",
    "Kemik & AVN",
    "Hill-Sachs & Bony Bankart",
    "Supraspinatus & Kalsifik",
    "Rotator Manşet Lezyonları",
    "Manşet Lezyon Detayı (loop)",
    "Biceps Tendonu",
    "Glenoid Labrum (loop)",
    "Ligaman & Kapsül",
    "Kıkırdak & OA",
    "Efüzyon & Bursa",
    "Kas & Nörovasküler",
    "Sinoviyal & İnflamatuar",
    "Kitle / Yer Kaplayıcı",
    "Serbest Metin",
    "Özet — Rotator Manşet",
    "Özet — Labrum",
    "Ayırıcı Tanı Paneli",
    "Son Gözden Geçirme",
    "Rapor Üretimi",
  ];

  return <div className="app">
    <div className="topbar">
      <div className="brand">
        <div className="logo">Ω</div>
        <div>
          <h1>Omuz MRG — Karar Destek Sistemi</h1>
          <p>Çok-lezyonlu mimari · Ağırlıklı skorlama · Zebra + kutulu rapor formatı</p>
        </div>
      </div>
      <div className="progress-wrap">
        <div className="progress-label">
          <span>Adım {step+1}/{TOTAL_STEPS}: {stepLabels[step]}</span>
          <span>%{pct}</span>
        </div>
        <div className="progress"><span style={{width:pct+"%"}}></span></div>
      </div>
    </div>

    <div className="card">
      <div className="step-head">
        <div className="step-no">{step+1}</div>
        <div>
          <h3 className="step-title">{stepLabels[step]}</h3>
          <p className="step-sub">
            {step === 7 && lesionIdx !== -1 && `Rotator manşet lezyon alt adımı ${lesionSub+1}/${RC_SUBSTEPS}`}
            {step === 9 && labralIdx !== -1 && `Labral yırtık alt adımı ${labralSub+1}/${LAB_SUBSTEPS}`}
            {!(step === 7 && lesionIdx !== -1) && !(step === 9 && labralIdx !== -1) && "Gerekli alanları doldurun ve İleri ile devam edin."}
          </p>
        </div>
      </div>

      {renderStep()}

      <div className="nav">
        <button className="btn" onClick={goPrev} disabled={step===0 && lesionIdx===-1 && labralIdx===-1}>← Geri</button>
        <button className={step === TOTAL_STEPS-1 ? "btn btn-amber" : "btn btn-primary"} onClick={goNext} disabled={!canNext()}>
          {step === TOTAL_STEPS-1 ? "Raporu Aç" : "İleri →"}
        </button>
      </div>
    </div>

    {showReport && <ReportOverlay report={report} data={data} scores={scores} onClose={()=>setShowReport(false)}
      onCopy={copyReportText} onPrint={printReport} onDownload={downloadHTML} />}
  </div>;
}

/* ========== Rapor Overlay ========== */
function ReportOverlay({report, data, scores, onClose, onCopy, onPrint, onDownload}) {
  const h = report.headerInfo;
  const sortedScores = [...scores].filter(s => s.score > 0).sort((a,b)=>b.score-a.score).slice(0,6);

  return <div className="overlay" onClick={onClose}>
    <div className="overlay-actions" onClick={e=>e.stopPropagation()}>
      <button className="btn" onClick={onPrint}>🖨 Yazdır</button>
      <button className="btn" onClick={onCopy}>📋 Kopyala</button>
      <button className="btn btn-primary" onClick={onDownload}>⬇ HTML İndir</button>
      <button className="btn" onClick={onClose}>✕ Kapat</button>
    </div>
    <div className="report-wrap" onClick={e=>e.stopPropagation()} id="report-text-content">
      <div className="report-header">
        <h2>OMUZ MANYETİK REZONANS GÖRÜNTÜLEME RAPORU</h2>
        <p>İncelenen taraf: {h.side} Omuz · Yaş: {h.age} · Cinsiyet: {h.sex} · Tarih: {h.date}</p>
      </div>

      <div className="rbox">
        <div className="rbox-head slate">KLİNİK BİLGİ</div>
        <div className="rbox-body">{h.clinical || "Klinik bilgi belirtilmemiştir."}</div>
      </div>

      <div className="rbox">
        <div className="rbox-head slate">İNCELEME TEKNİĞİ</div>
        <div className="rbox-body">
          {report.seq.length === 0 && <div>Teknik belirtilmemiştir.</div>}
          {report.seq.map((s,i) => <div key={i} className="zbullet">{s}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">BULGULAR — KEMİK YAPILAR</div>
        <div className="rbox-body">
          {report.bone.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">AKROMİON & AKROMİOKLAVİKÜLER EKLEM</div>
        <div className="rbox-body">
          {report.acromion.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head teal">ROTATOR MANŞET</div>
        <div className="rbox-body" style={{padding:0}}>
          {report.rcSections.map((sec,i)=>(
            <div key={i} style={{borderTop:i>0?"1px solid #cbd5e1":"none"}}>
              <div className="zrow"><div className="zk">{sec.name}</div><div className="zv">
                {sec.lines.map((ln,j) => <div key={j}>{ln}</div>)}
              </div></div>
            </div>
          ))}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head teal">BİCEPS TENDONU</div>
        <div className="rbox-body">
          {report.biceps.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head amber">GLENOİD LABRUM</div>
        <div className="rbox-body">
          {report.labrum.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">GLENOHUMERAL LİGAMANLAR & KAPSÜL</div>
        <div className="rbox-body">
          {report.lig.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">EKLEM KIKIRDAĞI & DEJENERATİF DEĞİŞİKLİKLER</div>
        <div className="rbox-body">
          {report.cart.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">EKLEM SIVISI & SUBAKROMİAL-SUBDELTOİD BURSA</div>
        <div className="rbox-body">
          {report.fluidLines.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>

      <div className="rbox">
        <div className="rbox-head">KAS YAPILARI & NÖROVASKÜLER</div>
        <div className="rbox-body">
          {report.muscle.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
          {report.cyst.map((b,i)=><div key={"c"+i} className="zbullet">{b}</div>)}
        </div>
      </div>

      {report.other.length > 0 && <div className="rbox">
        <div className="rbox-head">DİĞER BULGULAR</div>
        <div className="rbox-body">
          {report.other.map((b,i)=><div key={i} className="zbullet">{b}</div>)}
        </div>
      </div>}

      <div className="yorum">
        <b>Yorum</b>
        {report.yorum}
      </div>

      {sortedScores.length > 0 && <div className="rbox">
        <div className="rbox-head slate">AYIRICI TANI OLASILIKLARI</div>
        <div className="rbox-body" style={{padding:0}}>
          <table className="dx-table">
            <thead><tr><th style={{width:"60%"}}>Tanı</th><th>Kategori</th><th style={{width:90,textAlign:"right"}}>Uyum</th></tr></thead>
            <tbody>
              {sortedScores.map(s => {
                const p = PATHO.find(x=>x.key===s.key);
                const color = CAT_COLOR[p?.cat] || "#64748b";
                return <tr key={s.key}>
                  <td><span className="dx-dot" style={{background:color}}></span>{p?.name}</td>
                  <td style={{textTransform:"capitalize"}}>{p?.cat}</td>
                  <td style={{textAlign:"right",fontVariantNumeric:"tabular-nums",fontWeight:700}}>%{s.score}</td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>}

      <div className="sig">
        Raporlayan Radyolog: ________________________<br/>
        İmza &amp; Tarih: {h.date}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
