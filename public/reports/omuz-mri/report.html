<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omuz MRG — Çok Lezyonlu Karar Destek</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg0:#0b1220; --bg1:#0f172a; --bg2:#1e293b; --bg3:#273449;
    --txt:#e2e8f0; --txt2:#94a3b8; --muted:#64748b;
    --line:#334155;
    --accent:#14b8a6;  /* teal */
    --accent2:#2dd4bf;
    --amber:#f59e0b;
    --amber2:#fbbf24;
    --red:#ef4444; --green:#10b981; --blue:#3b82f6; --violet:#8b5cf6;
    --shadow:0 4px 18px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg0);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;}
  body{min-height:100vh;}
  .app{max-width:1200px;margin:0 auto;padding:14px 18px 80px}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-radius:14px;border:1px solid var(--line);margin-bottom:16px;box-shadow:var(--shadow)}
  .brand{display:flex;gap:12px;align-items:center}
  .logo{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent) 0%,var(--amber) 100%);color:#062028;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(20,184,166,.35)}
  .brand h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.2px}
  .brand p{margin:2px 0 0;font-size:12.5px;color:var(--txt2)}
  .progress-wrap{flex:1;max-width:520px;margin:0 22px}
  .progress-label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--txt2);margin-bottom:4px}
  .progress{height:8px;background:var(--bg3);border-radius:99px;overflow:hidden}
  .progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--amber));transition:width .3s}
  .actions{display:flex;gap:8px}
  .btn{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:9px 14px;border-radius:9px;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500}
  .btn:hover:not(:disabled){background:var(--bg3);border-color:var(--accent)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#0d9488);border-color:var(--accent);color:#062028;font-weight:700}
  .btn-primary:hover:not(:disabled){filter:brightness(1.1)}
  .btn-amber{background:linear-gradient(135deg,var(--amber),#d97706);border-color:var(--amber);color:#1a0f00;font-weight:700}
  .btn-amber:hover:not(:disabled){filter:brightness(1.1)}
  .btn-ghost{background:transparent}
  .btn-sm{padding:6px 10px;font-size:12px}
  .card{background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:22px 26px;box-shadow:var(--shadow)}
  .step-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .step-no{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--amber));color:#062028;font-weight:800;font-size:16px;flex-shrink:0}
  .step-title{font-size:17px;font-weight:700;margin:0}
  .step-sub{font-size:12.5px;color:var(--txt2);margin:2px 0 0}
  h3.sec{margin:18px 0 10px;font-size:14px;font-weight:700;color:var(--accent2);letter-spacing:.4px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
  h3.sec::before{content:"";display:block;width:3px;height:16px;background:linear-gradient(var(--accent),var(--amber));border-radius:2px}
  h3.sec.amber{color:var(--amber2)}
  .grid{display:grid;gap:10px}
  .grid-2{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr 1fr 1fr}
  .grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
  @media (max-width:720px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:all .15s;font-size:13.5px;user-select:none}
  .opt:hover{border-color:var(--accent);background:var(--bg3)}
  .opt.sel{border-color:var(--accent);background:rgba(20,184,166,.12);box-shadow:inset 0 0 0 1px var(--accent)}
  .opt.sel.amber-sel{border-color:var(--amber);background:rgba(245,158,11,.12);box-shadow:inset 0 0 0 1px var(--amber)}
  .opt .dot{width:16px;height:16px;border:2px solid var(--muted);border-radius:50%;flex-shrink:0;margin-top:1px;position:relative}
  .opt.sel .dot{border-color:var(--accent)}
  .opt.sel .dot::after{content:"";position:absolute;inset:2px;background:var(--accent);border-radius:50%}
  .opt.sel.amber-sel .dot{border-color:var(--amber)}
  .opt.sel.amber-sel .dot::after{background:var(--amber)}
  .opt .chk{width:16px;height:16px;border:2px solid var(--muted);border-radius:4px;flex-shrink:0;margin-top:1px;position:relative;transition:all .15s}
  .opt.sel .chk{border-color:var(--accent);background:var(--accent)}
  .opt.sel .chk::after{content:"✓";position:absolute;left:1px;top:-3px;color:#062028;font-size:13px;font-weight:900}
  .opt-label{flex:1;line-height:1.45}
  .opt-label small{display:block;color:var(--txt2);font-size:11.5px;margin-top:2px}
  .txt,.num,textarea{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:8px;font-size:13.5px;font-family:inherit}
  .txt:focus,.num:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(20,184,166,.2)}
  textarea{resize:vertical;min-height:68px}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .field label{font-size:12.5px;color:var(--txt2);font-weight:600}
  .hint{background:rgba(20,184,166,.08);border:1px solid rgba(20,184,166,.3);color:#99f6e4;padding:10px 13px;border-radius:8px;font-size:12.5px;margin:10px 0}
  .warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);color:#fde68a;padding:10px 13px;border-radius:8px;font-size:12.5px;margin:10px 0}
  .danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:10px 13px;border-radius:8px;font-size:12.5px;margin:10px 0}
  .nav{display:flex;justify-content:space-between;margin-top:22px;padding-top:16px;border-top:1px solid var(--line)}
  .lesion-card{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg1) 100%);border:1px solid var(--accent);border-radius:12px;padding:14px 18px;margin-bottom:14px;position:relative}
  .lesion-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--accent),var(--amber));border-radius:12px 0 0 12px}
  .lesion-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .lesion-title{font-weight:700;color:var(--accent2);font-size:14px}
  .chip{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600;margin-right:6px;margin-top:3px}
  .chip-teal{background:rgba(20,184,166,.18);color:#5eead4;border:1px solid rgba(20,184,166,.4)}
  .chip-amber{background:rgba(245,158,11,.18);color:#fcd34d;border:1px solid rgba(245,158,11,.4)}
  .chip-red{background:rgba(239,68,68,.18);color:#fca5a5;border:1px solid rgba(239,68,68,.4)}
  .chip-green{background:rgba(16,185,129,.18);color:#6ee7b7;border:1px solid rgba(16,185,129,.4)}
  .lesion-list{margin:10px 0 0;padding:0;list-style:none}
  .lesion-list li{padding:8px 10px;background:var(--bg2);border-radius:6px;margin-bottom:5px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .bar-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12.5px}
  .bar-row .name{flex:1;min-width:140px}
  .bar-row .bar{flex:2;height:9px;background:var(--bg3);border-radius:99px;overflow:hidden}
  .bar-row .bar>span{display:block;height:100%;border-radius:99px;transition:width .4s}
  .bar-row .pct{width:48px;text-align:right;color:var(--txt2);font-variant-numeric:tabular-nums;font-weight:600}
  .bar-row .bar.top>span{background:linear-gradient(90deg,var(--accent),var(--amber))}
  .bar-row .bar.mid>span{background:#3b82f6}
  .bar-row .bar.low>span{background:#64748b}

  /* Report overlay */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 10px}
  .report-wrap{background:white;color:#111;border-radius:14px;max-width:900px;width:100%;padding:38px 46px;box-shadow:0 30px 90px rgba(0,0,0,.6);font-family:"Times New Roman","Georgia",serif;font-size:14px;line-height:1.55;margin-bottom:30px}
  .report-header{border-bottom:3px double #1e293b;padding-bottom:10px;margin-bottom:14px}
  .report-header h2{margin:0;font-size:20px;text-align:center;letter-spacing:1px;color:#0f172a}
  .report-header p{margin:3px 0 0;text-align:center;font-size:12.5px;color:#475569;font-family:Arial,sans-serif}
  .rbox{border:1.5px solid #0f172a;border-radius:6px;margin:10px 0;background:white;break-inside:avoid}
  .rbox-head{background:linear-gradient(90deg,#0f172a,#1e293b);color:white;padding:5px 12px;font-weight:700;font-size:13px;letter-spacing:.5px;font-family:Arial,sans-serif;border-radius:5px 5px 0 0}
  .rbox-head.teal{background:linear-gradient(90deg,#0f766e,#14b8a6)}
  .rbox-head.amber{background:linear-gradient(90deg,#b45309,#f59e0b)}
  .rbox-head.slate{background:linear-gradient(90deg,#334155,#64748b)}
  .rbox-body{padding:8px 14px}
  .zrow{display:grid;grid-template-columns:170px 1fr;padding:5px 10px;font-size:13px}
  .zrow:nth-child(odd){background:#f1f5f9}
  .zrow:nth-child(even){background:white}
  .zrow .zk{font-weight:700;color:#0f172a;font-family:Arial,sans-serif;font-size:12.5px}
  .zrow .zv{color:#1e293b}
  .yorum{background:#fef3c7;border-left:5px solid #f59e0b;border-radius:0 6px 6px 0;padding:12px 18px;margin:14px 0;font-size:13.5px}
  .yorum b{display:block;margin-bottom:6px;color:#78350f;letter-spacing:.5px;font-family:Arial,sans-serif;font-size:13px;text-transform:uppercase}
  .dx-table{border-collapse:collapse;width:100%;margin-top:8px;font-size:13px}
  .dx-table th{background:#0f172a;color:white;padding:6px 10px;text-align:left;font-family:Arial,sans-serif;font-size:12px;letter-spacing:.4px}
  .dx-table td{border-bottom:1px solid #cbd5e1;padding:6px 10px}
  .dx-table tr:nth-child(even) td{background:#f8fafc}
  .dx-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:middle}
  .sig{margin-top:22px;padding-top:10px;border-top:1px solid #cbd5e1;text-align:right;font-size:12.5px;color:#475569}
  .overlay-actions{position:fixed;top:14px;right:20px;display:flex;gap:8px;z-index:9100}

  /* zebra strip helpers for report */
  .zbullet{padding:4px 10px;margin:2px 0;font-size:13px}
  .zbullet:nth-child(odd){background:#f1f5f9}
  .zbullet:nth-child(even){background:white}

  /* print */
  @media print{
    body{background:white}
    body *{visibility:hidden}
    .report-wrap,.report-wrap *{visibility:visible}
    .report-wrap{position:absolute;left:0;top:0;width:100%;box-shadow:none;border-radius:0;padding:18px 22px;margin:0}
    .overlay-actions{display:none !important}
  }
  .kbd{display:inline-block;padding:2px 7px;background:var(--bg3);border-radius:4px;border:1px solid var(--line);font-size:11px;font-family:monospace;color:var(--txt2)}
  .side-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg2);padding:4px;border-radius:10px;border:1px solid var(--line)}
  .side-tab{flex:1;padding:9px 12px;border-radius:7px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--txt2);transition:all .15s}
  .side-tab.active{background:linear-gradient(135deg,var(--accent),var(--amber));color:#062028}
  .sticker{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;background:var(--bg3);border:1px solid var(--line);font-size:11.5px;color:var(--txt2);font-weight:600}
  .sticker b{color:var(--accent2)}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>

/* ================================================================== */
/* Skorlama motoru:                                                     */
/*  - Her patoloji için feature listesi {feat, w, label, present}       */
/*  - Toplam skor = Σ(present ? w : 0)                                  */
/*  - max olası = Σ(w)                                                  */
/*  - % = Math.min(100, round(100 * skor / max))                        */
/*  - else if zinciri ile signal karakterizasyonu                        */
/* ================================================================== */

function buildFeatureMap(data, lesions) {
  // lesions: rotator cuff lezyonları array
  const F = {};

  // Hangi tendonda ne var?
  const tendonState = {};
  RC_TENDONS.forEach(t => tendonState[t.id] = { any:false, tendinop:false, partial:false, full:false, size:null, retrac:null, goutallier:null, calcific:false });
  (lesions||[]).forEach(L => {
    if (!L || !L.tendon) return;
    const st = tendonState[L.tendon];
    if (!st) return;
    st.any = true;
    if (L.continuity === "tendinop") st.tendinop = true;
    else if (L.continuity === "partial") st.partial = true;
    else if (L.continuity === "full")    st.full = true;
    if (L.full_size)   st.size      = L.full_size;
    if (L.retraction)  st.retrac    = L.retraction;
    if (L.goutallier !== undefined && L.goutallier !== "") st.goutallier = Number(L.goutallier);
    if (L.calcific)    st.calcific  = true;
  });

  // === SUPRASPINATUS TENDİNOPATİ ===
  F.supra_tendinop = [
    { w: 30, label:"Supraspinatus tendonunda sinyal artışı (parsiyel yırtık yok)", present: tendonState.supra.tendinop && !tendonState.supra.partial && !tendonState.supra.full },
    { w: 15, label:"Tendon kalınlaşması/heterojenitesi", present: data.supra_thick === "evet" },
    { w: 12, label:"Kritik zon yerleşimi", present: data.supra_location === "kritik" },
    { w: 10, label:"T2 sinyal artışı tam kat uzanım göstermiyor", present: tendonState.supra.tendinop },
    { w: 8,  label:"Subakromial bursada eşlik eden efüzyon yok veya minimal", present: data.bursa_effusion === "yok" || data.bursa_effusion === "minimal" },
    { w: 10, label:"Akromion morfolojisi Tip II/III", present: data.acromion_type === "t2" || data.acromion_type === "t3" },
  ];

  // === SUPRASPINATUS PARSİYEL YIRTIK ===
  F.supra_partial = [
    { w: 35, label:"Supraspinatus tendonunda parsiyel (artiküler/bursal/intratendinöz) yırtık", present: tendonState.supra.partial },
    { w: 15, label:"T2 sinyal artışı tendonun bir yüzünde lokalize", present: tendonState.supra.partial },
    { w: 10, label:"Tendon yüksekliğinde kısmi azalma", present: data.supra_thin === "evet" },
    { w: 10, label:"Kritik zon yerleşimi (insersiyo 1-2 cm proksimali)", present: data.supra_location === "kritik" || data.supra_location === "footprint" },
    { w: 10, label:"Subakromial bursada sıvı", present: data.bursa_effusion === "orta" || data.bursa_effusion === "belirgin" },
    { w: 10, label:"Akromion Tip II/III morfolojisi", present: data.acromion_type === "t2" || data.acromion_type === "t3" },
  ];

  // === SUPRASPINATUS TAM KAT YIRTIK ===
  F.supra_full = [
    { w: 40, label:"Supraspinatus tendonunda tam kat defekt (her iki yüz arasında sıvı sinyali)", present: tendonState.supra.full },
    { w: 15, label:"Tendon retraksiyonu (Patte II/III)", present: tendonState.supra.retrac === 2 || tendonState.supra.retrac === 3 },
    { w: 10, label:"Defekt boyutu ≥1 cm", present: tendonState.supra.size && tendonState.supra.size !== "small" },
    { w: 10, label:"Subakromial-subdeltoid bursada belirgin sıvı", present: data.bursa_effusion === "belirgin" },
    { w: 10, label:"Supraspinatus kasında yağlı infiltrasyon (Goutallier ≥2)", present: tendonState.supra.goutallier >= 2 },
    { w: 8,  label:"Akromiohumeral mesafede daralma (<7 mm)", present: data.acromio_humeral === "daralmis" },
  ];

  // === İNFRASPİNATUS YIRTIK ===
  F.infra_tear = [
    { w: 40, label:"İnfraspinatus tendonunda parsiyel/tam kat yırtık", present: tendonState.infra.any && (tendonState.infra.partial || tendonState.infra.full) },
    { w: 15, label:"Tendon yapısında sinyal artışı ve incelme", present: tendonState.infra.tendinop || tendonState.infra.partial },
    { w: 15, label:"İnfraspinatus kasında atrofi / Goutallier ≥2", present: tendonState.infra.goutallier >= 2 },
    { w: 10, label:"Supraspinatus yırtığına posteriora uzanım", present: tendonState.supra.full && tendonState.infra.any },
  ];

  // === SUBSKAPULARİS YIRTIK ===
  F.subsc_tear = [
    { w: 40, label:"Subskapularis tendonunda yırtık (üst lif/alt lif)", present: tendonState.subsc.any && (tendonState.subsc.partial || tendonState.subsc.full) },
    { w: 15, label:"Lesser tuberosityde edema / kemik sinyal değişikliği", present: data.lesser_tub_edema === "evet" },
    { w: 15, label:"Biceps uzun başı tendon subluksasyonu / medial dislokasyonu (asıcı ligaman defekti)", present: data.biceps_position === "sublukse" || data.biceps_position === "dislok_med" },
    { w: 10, label:"Bicipital oluktan biceps tendonunun kaybı (dislokasyon)", present: data.biceps_position === "dislok_med" },
    { w: 10, label:"Subskapularis kasında yağlı infiltrasyon", present: tendonState.subsc.goutallier >= 2 },
  ];

  // === MASİF RCT ===
  const fullCount = RC_TENDONS.filter(t => tendonState[t.id].full).length;
  F.massive_rct = [
    { w: 35, label:"≥2 tendonda tam kat yırtık", present: fullCount >= 2 },
    { w: 20, label:"Supraspinatus yırtığında Patte III retraksiyon (glenoid seviyesi)", present: tendonState.supra.retrac === 3 },
    { w: 15, label:"Herhangi bir manşet kasında Goutallier ≥3 yağlı infiltrasyon", present: Object.values(tendonState).some(s => s.goutallier >= 3) },
    { w: 10, label:"Humerus başının superiora migrasyonu / akromiohumeral mesafe <6 mm", present: data.acromio_humeral === "daralmis" },
    { w: 10, label:"Glenohumeral dejeneratif değişiklikler (cuff artropatisi)", present: data.cuff_arthropathy === "evet" },
    { w: 10, label:"Subakromial-subdeltoid bursada belirgin sıvı / eklem sıvısı ile komünikasyon", present: data.bursa_effusion === "belirgin" && data.effusion_amount !== "yok" },
  ];

  // === KALSİFİK TENDİNİT ===
  F.calc_tendinit = [
    { w: 45, label:"Manşet tendonu içinde fokal hipointens kalsifikasyon (tüm sekanslarda düşük sinyal)", present: Object.values(tendonState).some(s => s.calcific) || data.calcification_present === "evet" },
    { w: 20, label:"Kalsifikasyon çevresinde ödem / T2 sinyal artışı (rezorpsiyon fazı)", present: data.calcific_edema === "evet" },
    { w: 15, label:"Subakromial bursada tepkisel sıvı", present: data.bursa_effusion === "orta" || data.bursa_effusion === "belirgin" },
    { w: 10, label:"Tendon bütünlüğü büyük oranda korunmuş", present: !tendonState.supra.full && !tendonState.infra.full && !tendonState.subsc.full },
  ];

  // === SUBAKROMİAL SIKIŞMA ===
  F.impingement = [
    { w: 25, label:"Tip III kancamsı akromion", present: data.acromion_type === "t3" },
    { w: 15, label:"Tip II kurvilineer akromion", present: data.acromion_type === "t2" },
    { w: 15, label:"Akromiohumeral mesafede daralma (<7 mm)", present: data.acromio_humeral === "daralmis" },
    { w: 15, label:"AC eklem hipertrofisi / inferiora osteofit uzanımı", present: data.ac_osteophyte === "evet" },
    { w: 15, label:"Supraspinatus kritik zonunda sinyal artışı", present: tendonState.supra.tendinop || tendonState.supra.partial },
    { w: 10, label:"Subakromial-subdeltoid bursada sıvı/kalınlaşma", present: data.bursa_effusion === "orta" || data.bursa_effusion === "belirgin" },
    { w: 8,  label:"Os acromiale varlığı", present: data.os_acromiale === "evet" },
  ];

  // === BİCEPS TENDİNOPATİ / TENOSİNOVİT ===
  F.biceps_tendinop = [
    { w: 30, label:"Biceps uzun başı tendonunda sinyal artışı / kalınlaşma", present: data.biceps_signal === "artmis" },
    { w: 25, label:"Bicipital oluk çevresinde sıvı (tenosinovit)", present: data.biceps_sheath === "belirgin" },
    { w: 10, label:"Bicipital oluk çevresinde minimal sıvı", present: data.biceps_sheath === "minimal" },
    { w: 15, label:"Eşlik eden supraspinatus yırtığı/tendinopatisi", present: tendonState.supra.any || tendonState.supra.tendinop },
    { w: 10, label:"Tendon bütünlüğü korunmuş", present: data.biceps_continuity === "intakt" },
  ];

  // === BİCEPS YIRTIK ===
  F.biceps_tear = [
    { w: 40, label:"Biceps uzun başı tendonunda tam kat yırtık", present: data.biceps_continuity === "tam" },
    { w: 20, label:"Biceps uzun başı tendonunda parsiyel yırtık", present: data.biceps_continuity === "parsiyel" },
    { w: 15, label:"Bicipital olukta tendon kaybı / Popeye işareti", present: data.biceps_continuity === "tam" && data.biceps_popeye === "evet" },
    { w: 15, label:"Eşlik eden rotator manşet yırtığı", present: tendonState.supra.full || tendonState.subsc.full || tendonState.infra.full },
    { w: 10, label:"Bicipital olukta sıvı ve retrakte tendon uçları", present: data.biceps_continuity === "parsiyel" || data.biceps_continuity === "tam" },
  ];

  // === BİCEPS İNSTABİLİTE ===
  F.biceps_instab = [
    { w: 40, label:"Biceps uzun başı tendonunun bicipital olukta medial subluksasyonu", present: data.biceps_position === "sublukse" },
    { w: 45, label:"Biceps uzun başı tendonunun medial dislokasyonu (subskapularis üstünde/altında)", present: data.biceps_position === "dislok_med" },
    { w: 20, label:"Subskapularis üst lif yırtığı / asıcı ligaman defekti", present: tendonState.subsc.any },
    { w: 15, label:"Lesser tuberositeye uzanan sinyal değişikliği", present: data.lesser_tub_edema === "evet" },
  ];

  // === SLAP ===
  const hasSlap = (data.labralTears||[]).some(t => t.category === "slap");
  F.slap = [
    { w: 45, label:"Süperior labrumda biceps ankoru civarı yırtık sinyali", present: hasSlap },
    { w: 15, label:"Sulkus sülkusun arkasına uzanan kontrast/sıvı sinyali", present: hasSlap && (data.labralTears||[]).some(t => t.subtype === "s2" || t.subtype === "s5") },
    { w: 15, label:"Paralabral kist (spinoglenoid çentik)", present: data.paralabral_cyst === "spinoglenoid" },
    { w: 10, label:"Eşlik eden biceps tendon anormalliği", present: data.biceps_signal === "artmis" || data.biceps_continuity !== "intakt" },
    { w: 10, label:"Kova sapı / flep komponenti", present: hasSlap && (data.labralTears||[]).some(t => ["s3","s4","s6"].includes(t.subtype)) },
  ];

  // === BANKART ===
  const hasBankart = (data.labralTears||[]).some(t => t.category === "ant" && t.subtype === "bankart");
  F.bankart = [
    { w: 45, label:"Anteroinferior labrumda avülsiyon / Bankart lezyonu (3-6 konum)", present: hasBankart },
    { w: 15, label:"Anterior skapular periost yırtığı", present: hasBankart },
    { w: 15, label:"Eşlik eden Hill-Sachs lezyonu (humerus başı posterolateralinde kompresyon defekti)", present: data.hill_sachs === "evet" },
    { w: 10, label:"Anterior kapsüler laksite / MGHL/IGHL bozukluk", present: data.ighl_torn === "evet" },
    { w: 8,  label:"Dislokasyon öyküsü (travma)", present: data.trauma === "evet" && data.dislocation_hx === "evet" },
  ];

  // === KEMİK BANKART ===
  const hasBony = (data.labralTears||[]).some(t => t.subtype === "bony");
  F.bony_bankart = [
    { w: 50, label:"Anteroinferior glenoid kenarında fraktür/kemik kaybı", present: hasBony || data.glenoid_bone_loss === "evet" },
    { w: 20, label:"Anterior labral avülsiyon", present: hasBankart || hasBony },
    { w: 15, label:"Glenoid kemik kaybı >20%", present: data.glenoid_bone_loss_severity === "ciddi" },
    { w: 10, label:"Hill-Sachs lezyonu (eşlik)", present: data.hill_sachs === "evet" },
  ];

  // === ALPSA ===
  const hasAlpsa = (data.labralTears||[]).some(t => t.subtype === "alpsa");
  F.alpsa = [
    { w: 55, label:"Anteroinferior labroligamentöz kompleksin intakt periost ile mediale yer değiştirmesi (ALPSA)", present: hasAlpsa },
    { w: 15, label:"Kronik dislokasyon/tekrarlayan instabilite öyküsü", present: data.dislocation_hx === "evet" },
    { w: 10, label:"Hill-Sachs lezyonu", present: data.hill_sachs === "evet" },
  ];

  // === HILL-SACHS ===
  F.hill_sachs = [
    { w: 50, label:"Humerus başının posterolateralinde kompresyon defekti (Hill-Sachs)", present: data.hill_sachs === "evet" },
    { w: 20, label:"Eşlik eden Bankart / ALPSA / anterior labral lezyon", present: hasBankart || hasAlpsa || hasBony },
    { w: 15, label:"Anterior dislokasyon öyküsü", present: data.dislocation_hx === "evet" },
    { w: 10, label:"Defekt boyutu >12 mm / engage Hill-Sachs", present: data.hill_sachs_size === "buyuk" },
  ];

  // === REVERSE BANKART ===
  const hasRevB = (data.labralTears||[]).some(t => t.subtype === "rev-bankart");
  F.rev_bankart = [
    { w: 50, label:"Posterior (7-9 konum) labral yırtık / Reverse Bankart", present: hasRevB },
    { w: 20, label:"Eşlik eden reverse Hill-Sachs (humerus başı anteromedial defekti)", present: data.rev_hill_sachs === "evet" },
    { w: 15, label:"Posterior kapsüler laksite", present: data.post_capsule_lax === "evet" },
    { w: 10, label:"Posterior dislokasyon / dislokasyon öyküsü", present: data.post_dislocation_hx === "evet" },
  ];

  // === REVERSE HILL-SACHS ===
  F.rev_hill_sachs = [
    { w: 50, label:"Humerus başının anteromedial yüzeyinde kompresyon defekti", present: data.rev_hill_sachs === "evet" },
    { w: 25, label:"Eşlik eden reverse Bankart / posterior labral yırtık", present: hasRevB },
    { w: 15, label:"Posterior dislokasyon öyküsü (konvülziyon/elektrik çarpması)", present: data.post_dislocation_hx === "evet" },
  ];

  // === ADEZİV KAPSÜLİT ===
  F.frozen = [
    { w: 30, label:"Aksiller reses kapsüler kalınlaşma (>4 mm)", present: data.axillary_thickening === "evet" },
    { w: 20, label:"Rotator interval yağ dokusunun silinmesi / T2 sinyal artışı", present: data.rotator_interval === "silinmis" },
    { w: 15, label:"Koracohumeral ligaman kalınlaşması (>4 mm)", present: data.chl_thickening === "evet" },
    { w: 15, label:"Kontrast sonrası sinovit (eşlik ederse)", present: data.post_contrast_enh === "sinovit" },
    { w: 10, label:"Klinik: ağrılı hareket kısıtlılığı / diyabet öyküsü", present: data.clinical_frozen === "evet" },
    { w: 10, label:"Büyük eklem efüzyonu yok", present: data.effusion_amount === "yok" || data.effusion_amount === "minimal" },
  ];

  // === GLENOHUMERAL OA ===
  F.gh_oa = [
    { w: 25, label:"Humeral başı ve/veya glenoidde kondral kayıp", present: data.cartilage_gh === "orta" || data.cartilage_gh === "belirgin" },
    { w: 20, label:"Glenohumeral osteofitler", present: data.gh_osteofit === "evet" },
    { w: 15, label:"Subkondral kist / skleroz", present: data.subchondral_change === "evet" },
    { w: 15, label:"Glenohumeral eklem aralığında daralma", present: data.gh_narrow === "evet" },
    { w: 10, label:"Eklem efüzyonu", present: data.effusion_amount === "orta" || data.effusion_amount === "belirgin" },
    { w: 10, label:"Labral dejenerasyon (yırtık olmaksızın sinyal artışı)", present: data.labral_degen === "evet" },
  ];

  // === AC EKLEM OA ===
  F.ac_oa = [
    { w: 35, label:"AC eklemde dejeneratif değişiklikler (osteofit, subkondral değişiklik)", present: data.ac_osteofit === "evet" || data.ac_arthrosis === "evet" },
    { w: 20, label:"AC eklem hipertrofisi / kapsüler kalınlaşma", present: data.ac_hypertrophy === "evet" },
    { w: 15, label:"Akromion/klavikula altında inferior osteofit (sıkışmayı besleyen)", present: data.ac_osteophyte === "evet" },
    { w: 15, label:"AC eklemde kemik iliği ödemi", present: data.ac_edema === "evet" },
    { w: 10, label:"Eklem aralığında daralma", present: data.ac_narrow === "evet" },
  ];

  // === BURSİT ===
  F.bursit = [
    { w: 40, label:"Subakromial-subdeltoid bursada belirgin sıvı", present: data.bursa_effusion === "belirgin" },
    { w: 25, label:"Subakromial-subdeltoid bursada orta miktarda sıvı", present: data.bursa_effusion === "orta" },
    { w: 15, label:"Bursal duvarda kalınlaşma", present: data.bursa_wall === "kalin" },
    { w: 15, label:"Kontrast sonrası duvarsal boyanma (eşlik ederse)", present: data.post_contrast_enh === "sinovit" || data.post_contrast_enh === "bursal" },
    { w: 10, label:"Eşlik eden manşet yırtığı veya kalsifik tendinit (sekonder bursit)", present: tendonState.supra.full || tendonState.supra.partial || Object.values(tendonState).some(s => s.calcific) },
  ];

  // === PARALABRAL KİST ===
  F.paralab_cyst = [
    { w: 45, label:"Spinoglenoid çentikte paralabral kist", present: data.paralabral_cyst === "spinoglenoid" },
    { w: 40, label:"Suprascapular çentikte paralabral kist", present: data.paralabral_cyst === "suprascapular" },
    { w: 30, label:"Başka lokalizasyonda paralabral kist", present: data.paralabral_cyst === "diger" },
    { w: 20, label:"Eşlik eden posterosuperior labral yırtık (SLAP)", present: hasSlap },
    { w: 15, label:"İnfraspinatus kasında denervasyon / ödem ve atrofi", present: data.infraspinatus_denerv === "evet" },
  ];

  // === AVN ===
  F.avn = [
    { w: 45, label:"Humerus başı subkondral kemikte çift çizgi işareti (T2)", present: data.avn_double_line === "evet" },
    { w: 20, label:"Subkondral kemik iliği ödemi ve yağlı sinyal değişikliği", present: data.avn_marrow_change === "evet" },
    { w: 15, label:"Subkondral kollaps (ilerlemiş evre)", present: data.avn_collapse === "evet" },
    { w: 10, label:"Bilinen risk faktörü (steroid, alkol, orak hücre, radyoterapi)", present: data.avn_risk === "evet" },
    { w: 10, label:"Eklem kıkırdak kaybı / sekonder OA", present: data.cartilage_gh === "belirgin" },
  ];

  // === SEPTİK ARTRİT ===
  F.septic = [
    { w: 35, label:"Belirgin eklem efüzyonu + sinoviyal kalınlaşma", present: data.effusion_amount === "belirgin" && data.post_contrast_enh === "sinovit" },
    { w: 20, label:"Kontrast sonrası yoğun sinoviyal boyanma", present: data.post_contrast_enh === "sinovit" },
    { w: 20, label:"Periartiküler yumuşak doku ödemi / selülit", present: data.periarticular_edema === "evet" },
    { w: 15, label:"Klinik: ateş, lokal ısı artışı, lökositoz", present: data.clinical_septic === "evet" },
    { w: 15, label:"Eklem kıkırdağı ve subkondral kemikte erken erozyon", present: data.septic_erosion === "evet" },
  ];

  // === PVNS ===
  F.pvns = [
    { w: 45, label:"Sinoviyal kalınlaşma içinde hemosiderin kaynaklı düşük T1/T2 sinyal", present: data.synovial_hemosiderin === "evet" },
    { w: 20, label:"Gradyan ekoda belirgin blooming artefaktı", present: data.blooming === "evet" },
    { w: 15, label:"Kronik tekrarlayan hemartroz", present: data.hemarthros === "evet" },
    { w: 10, label:"Kemik erozyonu / subkondral kist", present: data.septic_erosion === "evet" || data.subchondral_change === "evet" },
  ];

  return F;
}

function computeScores(F) {
  const out = [];
  Object.keys(F).forEach(k => {
    const feats = F[k];
    let score = 0, max = 0;
    feats.forEach(f => { max += f.w; if (f.present) score += f.w; });
    const raw = max ? Math.min(100, Math.round(100 * score / max)) : 0;
    out.push({ key:k, score: raw, features: feats.filter(f => f.present) });
  });
  return out;
}

/* ========== Yardımcı UI bileşenleri ========== */

function OptBox({selected, onClick, children, small, amber}) {
  return <div className={`opt ${selected?"sel":""} ${amber?"amber-sel":""}`} onClick={onClick}>
    <div className="dot"></div>
    <div className="opt-label">{children}</div>
  </div>;
}
function ChkBox({selected, onClick, children}) {
  return <div className={`opt ${selected?"sel":""}`} onClick={onClick}>
    <div className="chk"></div>
    <div className="opt-label">{children}</div>
  </div>;
}
function Radio({value, onChange, options, cols}) {
  return <div className={`grid grid-${cols||2}`}>
    {options.map(o => <OptBox key={o.id} selected={value===o.id} onClick={()=>onChange(o.id)}>
      <b>{o.label}</b>
      {o.hint && <small>{o.hint}</small>}
    </OptBox>)}
  </div>;
}

/* ========== Rapor oluşturucu ========== */

function generateReport(data, lesions, labralTears, scores) {
  const d = data;
  const sideObj = SIDE.find(s => s.id === d.side) || SIDE[0];
  const sides = RV_LOCALE === 'en' ? sideObj.labelEn : sideObj.label;
  const today = new Date().toLocaleDateString(RV_LOCALE === 'en' ? 'en-US' : 'tr-TR');

  // Teknik / Sequences
  const seq = [];
  if (d.seq_t1)   seq.push(RV_LOCALE==='en' ? "Axial, coronal oblique, sagittal oblique T1W" : "Aksiyel, koronal oblik, sagital oblik T1A");
  if (d.seq_t2)   seq.push(RV_LOCALE==='en' ? "Axial, coronal oblique, sagittal oblique T2W" : "Aksiyel, koronal oblik, sagital oblik T2A");
  if (d.seq_pd)   seq.push(RV_LOCALE==='en' ? "PD fat-saturated" : "PD yağ baskılı");
  if (d.seq_stir) seq.push("STIR");
  if (d.seq_fs)   seq.push(RV_LOCALE==='en' ? "Fat-saturated T2W" : "Yağ baskılı T2A");
  if (d.seq_artro) seq.push(RV_LOCALE==='en' ? "MRI arthrography (direct intra-articular gadolinium)" : "MR artrografi (direkt intraartiküler gadolinyum)");
  if (d.seq_post) seq.push(RV_LOCALE==='en' ? "Post-contrast fat-saturated T1W" : "Kontrast sonrası yağ baskılı T1A");

  // Bone findings / Kemik bulguları
  const bone = [];
  if (d.greater_tub_edema === "evet") bone.push(RV_LOCALE==='en' ? "Bone marrow edema of the greater tuberosity is noted." : "Büyük tüberkülde kemik iliği ödemi izlenmektedir.");
  if (d.lesser_tub_edema === "evet")  bone.push(RV_LOCALE==='en' ? "Bone marrow edema of the lesser tuberosity is noted." : "Küçük tüberkülde kemik iliği ödemi izlenmektedir.");
  if (d.hill_sachs === "evet") {
    const sz = d.hill_sachs_size === "buyuk"
      ? (RV_LOCALE==='en' ? "(defect size >12 mm, potentially engaging)" : "(defekt boyutu >12 mm, engage-edici nitelikte olabilir)")
      : "";
    bone.push(RV_LOCALE==='en'
      ? `Compression defect in the posterolateral humeral head (Hill-Sachs lesion) ${sz}.`
      : `Humerus başı posterolateralinde kompresyon defekti (Hill-Sachs lezyonu) ${sz}.`);
  }
  if (d.rev_hill_sachs === "evet") bone.push(RV_LOCALE==='en'
    ? "Compression defect in the anteromedial humeral head (reverse Hill-Sachs / McLaughlin lesion) is noted."
    : "Humerus başı anteromedial yüzeyinde kompresyon defekti (reverse Hill-Sachs / McLaughlin lezyonu) izlenmektedir.");
  if (d.glenoid_bone_loss === "evet") {
    const sev = d.glenoid_bone_loss_severity === "ciddi"
      ? (RV_LOCALE==='en' ? "severe (>20%)" : "ciddi (>20%)")
      : (d.glenoid_bone_loss_severity === "orta"
          ? (RV_LOCALE==='en' ? "moderate" : "orta")
          : (RV_LOCALE==='en' ? "mild" : "hafif"));
    bone.push(RV_LOCALE==='en'
      ? `${sev} anteroinferior glenoid bone loss (consistent with bony Bankart lesion) is noted.`
      : `Anteroinferior glenoid kenarında ${sev} boyutta kemik kaybı (kemik Bankart lezyonu ile uyumlu) izlenmektedir.`);
  }
  if (d.avn_marrow_change === "evet" || d.avn_double_line === "evet") {
    const dbl = d.avn_double_line==="evet" ? (RV_LOCALE==='en' ? " (double-line sign positive)" : " (çift çizgi işareti pozitif)") : "";
    const col = d.avn_collapse==="evet" ? (RV_LOCALE==='en' ? " and subchondral collapse" : " ve subkondral kollaps") : "";
    bone.push(RV_LOCALE==='en'
      ? `Subchondral bone marrow signal change consistent with avascular necrosis of the humeral head${dbl}${col} is noted.`
      : `Humerus başında avasküler nekroz ile uyumlu subkondral kemik iliği sinyal değişikliği${dbl}${col} izlenmektedir.`);
  }
  if (bone.length === 0) bone.push(RV_LOCALE==='en'
    ? "Signal and morphology of bone structures are within normal limits."
    : "Kemik yapılarda sinyal ve morfoloji normal sınırlardadır.");

  // Acromion & AC / Akromion & AC
  const acromion = [];
  const acrType = BIGLIANI.find(b => b.id === d.acromion_type);
  if (acrType) acromion.push(L(acrType,'txt') + ".");
  if (d.os_acromiale === "evet") acromion.push(RV_LOCALE==='en' ? "Os acromiale variant is noted." : "Os akromiale varyasyonu izlenmektedir.");
  if (d.acromio_humeral === "daralmis") acromion.push(RV_LOCALE==='en'
    ? "Acromiohumeral distance is narrowed (<7 mm); consistent with cuff arthropathy/superior humeral migration."
    : "Akromiohumeral mesafe daralmıştır (<7 mm); manşet artropatisi/üst humeral migrasyon ile uyumludur.");
  else if (d.acromio_humeral === "normal") acromion.push(RV_LOCALE==='en' ? "Acromiohumeral distance is preserved." : "Akromiohumeral mesafe korunmuştur.");
  if (d.ac_osteofit === "evet" || d.ac_arthrosis === "evet") acromion.push(RV_LOCALE==='en'
    ? "Degenerative changes are present at the acromioclavicular joint."
    : "Akromioklaviküler eklemde dejeneratif değişiklikler mevcuttur.");
  if (d.ac_hypertrophy === "evet") acromion.push(RV_LOCALE==='en' ? "AC joint capsular hypertrophy is noted." : "AC eklem kapsüler hipertrofisi izlenmektedir.");
  if (d.ac_osteophyte === "evet") acromion.push(RV_LOCALE==='en'
    ? "Inferior osteophyte from the AC joint exerts pressure on the subacromial space."
    : "AC ekleminden inferiora uzanan osteofit; subakromial alana basınç oluşturmaktadır.");
  if (d.ac_edema === "evet") acromion.push(RV_LOCALE==='en' ? "Bone marrow edema around the AC joint is noted." : "AC eklem civarı kemik iliği ödemi izlenmektedir.");
  if (acromion.length === 0) acromion.push(RV_LOCALE==='en'
    ? "Acromion morphology and AC joint are within normal limits."
    : "Akromion morfolojisi ve AC eklem normal sınırlardadır.");

  // Rotator cuff per tendon / Rotator manşet (her tendon)
  const rcSections = RC_TENDONS.map(t => {
    const tName = L(t,'name');
    const tL = (lesions||[]).filter(Lx => Lx.tendon === t.id);
    if (tL.length === 0) {
      return {name: tName, lines: [RV_LOCALE==='en' ? "Signal and morphology of the tendon are normal." : "Tendonda sinyal ve morfoloji doğaldır."]};
    }
    const lines = [];
    tL.forEach(Lx => {
      const locMapTR = {"kritik":"kritik zon (insersiyonun 1-2 cm proksimali)","footprint":"footprint (insersiyonel bölge)","mtj":"muskulotendinöz bileşke","tum":"difüz"};
      const locMapEN = {"kritik":"critical zone (1–2 cm proximal to insertion)","footprint":"footprint (insertional area)","mtj":"myotendinous junction","tum":"diffuse"};
      const loc = (RV_LOCALE==='en' ? locMapEN[Lx.location] : locMapTR[Lx.location]) || (RV_LOCALE==='en' ? "tendon body" : "tendon gövdesi");
      if (Lx.continuity === "tendinop") {
        lines.push(RV_LOCALE==='en'
          ? `Signal increase and thickening (tendinopathy) are noted in the ${loc} of the ${tName} tendon.`
          : `${tName} tendonu ${loc}de sinyal artışı ve kalınlaşma (tendinopati) izlenmektedir.`);
      } else if (Lx.continuity === "partial") {
        const faceMapTR = {"artikuler":"artiküler yüzeyinde","bursal":"bursal yüzeyinde","intratendinoz":"intratendinöz"};
        const faceMapEN = {"artikuler":"articular surface","bursal":"bursal surface","intratendinoz":"intratendinous"};
        const face = (RV_LOCALE==='en' ? faceMapEN[Lx.partial_face] : faceMapTR[Lx.partial_face]) || (RV_LOCALE==='en' ? "one surface" : "bir yüzünde");
        const pctTxt = Lx.partial_thickness
          ? (RV_LOCALE==='en' ? ` (approximately ${Lx.partial_thickness}% of tendon thickness)` : ` (tendon kalınlığının yaklaşık %${Lx.partial_thickness}'i)`)
          : "";
        lines.push(RV_LOCALE==='en'
          ? `Partial-thickness tear at the ${face} of the ${tName} tendon at the ${loc}${pctTxt} is noted.`
          : `${tName} tendonunun ${loc}de, ${face} parsiyel kat yırtık${pctTxt} izlenmektedir.`);
      } else if (Lx.continuity === "full") {
        const sizeMapTR = {"small":"küçük (<1 cm)","medium":"orta (1–3 cm)","large":"geniş (3–5 cm)","massive":"masif (>5 cm)"};
        const sizeMapEN = {"small":"small (<1 cm)","medium":"medium (1–3 cm)","large":"large (3–5 cm)","massive":"massive (>5 cm)"};
        const sz = (RV_LOCALE==='en' ? sizeMapEN[Lx.full_size] : sizeMapTR[Lx.full_size]) || "";
        const retracMapTR = {1:"Patte I (minimal retraksiyon)", 2:"Patte II (humerus başı–glenoid arası retraksiyon)", 3:"Patte III (glenoid seviyesinde retraksiyon)"};
        const retracMapEN = {1:"Patte I (minimal retraction)", 2:"Patte II (retraction between humeral head and glenoid)", 3:"Patte III (retraction to glenoid level)"};
        const retrac = Lx.retraction ? `, ${(RV_LOCALE==='en' ? retracMapEN : retracMapTR)[Lx.retraction]}` : "";
        lines.push(RV_LOCALE==='en'
          ? `Full-thickness tear of the ${tName} tendon at the ${loc} (${sz}${retrac}) is noted.`
          : `${tName} tendonunda ${loc}de tam kat yırtık (${sz} boyutlu${retrac}) izlenmektedir.`);
      }
      if (Lx.calcific) lines.push(RV_LOCALE==='en'
        ? `A calcific focus is noted within the ${tName} tendon fibers.`
        : `${tName} tendonu lifleri içinde kalsifik fokus izlenmektedir.`);
      if (Lx.goutallier !== undefined && Lx.goutallier !== "" && Number(Lx.goutallier) > 0) {
        const g = GOUTALLIER.find(x => x.id === Number(Lx.goutallier));
        if (g) lines.push(RV_LOCALE==='en'
          ? `Fatty degeneration of the ${tName} muscle (${g.label}: ${L(g,'txt')}).`
          : `${tName} kasında yağlı dejenerasyon (${g.label}: ${g.txt}).`);
      }
    });
    return {name: tName, lines};
  });

  // Biceps
  const biceps = [];
  if (d.biceps_continuity === "intakt" && d.biceps_signal === "normal" && d.biceps_sheath === "yok" && (d.biceps_position==="normal" || !d.biceps_position)) {
    biceps.push(RV_LOCALE==='en'
      ? "The biceps long head tendon is in normal position within the bicipital groove with preserved signal and contour."
      : "Biceps uzun başı tendonu bicipital olukta normal lokalizasyonda, sinyal ve konturu korunmuştur.");
  } else {
    if (d.biceps_signal === "artmis") biceps.push(RV_LOCALE==='en'
      ? "Signal increase and thickening (tendinopathy) are noted in the biceps long head tendon."
      : "Biceps uzun başı tendonunda sinyal artışı ve kalınlaşma (tendinopati) izlenmektedir.");
    if (d.biceps_sheath === "minimal") biceps.push(RV_LOCALE==='en' ? "Minimal fluid in the biceps sheath." : "Biceps kılıfında minimal sıvı.");
    else if (d.biceps_sheath === "belirgin") biceps.push(RV_LOCALE==='en'
      ? "Prominent fluid in the biceps sheath (consistent with tenosynovitis)."
      : "Biceps kılıfında belirgin sıvı (tenosinovit ile uyumlu).");
    if (d.biceps_continuity === "parsiyel") biceps.push(RV_LOCALE==='en'
      ? "Partial-thickness tear areas are identified in the biceps long head tendon."
      : "Biceps uzun başı tendonunda parsiyel yırtık alanları seçilmektedir.");
    else if (d.biceps_continuity === "tam") {
      biceps.push(RV_LOCALE==='en'
        ? "Full-thickness tear of the biceps long head tendon; the tendon is absent from the bicipital groove."
        : "Biceps uzun başı tendonunda tam kat yırtık; tendon bicipital oluktan kaybolmuştur.");
      if (d.biceps_popeye === "evet") biceps.push(RV_LOCALE==='en'
        ? "Distal muscle belly retraction (Popeye sign) is noted."
        : "Distalde kas karnında retraksiyon (Popeye işareti) izlenmektedir.");
    }
    if (d.biceps_position === "sublukse") biceps.push(RV_LOCALE==='en'
      ? "The biceps long head tendon shows medial subluxation within the bicipital groove."
      : "Biceps uzun başı tendonu bicipital olukta medial subluksasyon göstermektedir.");
    else if (d.biceps_position === "dislok_med") biceps.push(RV_LOCALE==='en'
      ? "The biceps long head tendon is medially dislocated; the bicipital groove is empty."
      : "Biceps uzun başı tendonu medial dislokasyon göstermiş; bicipital oluk boş izlenmektedir.");
  }

  // Labrum
  const labrum = [];
  if (!labralTears || labralTears.length === 0) {
    labrum.push(RV_LOCALE==='en'
      ? "Signal and morphology of the glenoid labrum are preserved in all quadrants."
      : "Glenoid labrumda sinyal ve morfoloji tüm kadranlarda korunmuştur.");
  } else {
    labralTears.forEach(Lx => {
      const q = LABRAL_QUADRANTS.find(x => x.id === Lx.quadrant);
      const qn = q ? L(q,'name').toLowerCase() : (RV_LOCALE==='en' ? "localized" : "lokalize");
      if (Lx.category === "slap") {
        const t = SLAP_TYPES.find(x => x.id === Lx.subtype);
        labrum.push(RV_LOCALE==='en'
          ? `${t ? `${t.name} (${L(t,'txt')})` : "SLAP lesion"} is noted in the superior labrum.`
          : `Süperior labrumda ${t ? `${t.name} (${t.txt})` : "SLAP lezyonu"} izlenmektedir.`);
      } else if (Lx.category === "ant") {
        const t = ANT_LABRAL_VARIANTS.find(x => x.id === Lx.subtype);
        labrum.push(RV_LOCALE==='en'
          ? `${t ? `${L(t,'name')}: ${L(t,'txt')}` : "anterior labral tear"} is noted in the anteroinferior labrum.`
          : `Anteroinferior labrumda ${t ? `${t.name}: ${t.txt}` : "anterior labral yırtık"} izlenmektedir.`);
      } else if (Lx.category === "post") {
        const t = POST_LABRAL_VARIANTS.find(x => x.id === Lx.subtype);
        labrum.push(RV_LOCALE==='en'
          ? `${t ? `${L(t,'name')}: ${L(t,'txt')}` : "posterior labral tear"} is noted in the posterior labrum.`
          : `Posterior labrumda ${t ? `${t.name}: ${t.txt}` : "posterior labral yırtık"} izlenmektedir.`);
      } else if (Lx.category === "simple") {
        labrum.push(RV_LOCALE==='en'
          ? `Labral tear/degeneration signal is noted in the ${q ? L(q,'name') : "relevant"} quadrant.`
          : `${q ? q.name : "İlgili"} kadranda labral yırtık/dejenerasyon sinyali izlenmektedir.`);
      }
      if (Lx.paralabralCyst) {
        labrum.push(RV_LOCALE==='en'
          ? `An accompanying paralabral cyst (${qn}-located) is noted.`
          : `Eşlik eden paralabral kist (${qn} yerleşimli) izlenmektedir.`);
      }
    });
  }

  // Ligaments / Ligamanlar
  const lig = [];
  if (d.ighl_torn === "evet") lig.push(RV_LOCALE==='en'
    ? "Disruption of the inferior glenohumeral ligament (IGHL) continuity is noted."
    : "İnferior glenohumeral ligaman (IGHL) devamlılığında bozulma izlenmektedir.");
  if (d.mghl_abn === "evet") lig.push(RV_LOCALE==='en'
    ? "The middle glenohumeral ligament (MGHL) shows signal change."
    : "Orta glenohumeral ligaman (MGHL) sinyal değişikliği göstermektedir.");
  if (d.sghl_abn === "evet") lig.push(RV_LOCALE==='en'
    ? "Abnormality of the superior glenohumeral ligament (SGHL) is noted."
    : "Süperior glenohumeral ligaman (SGHL) anormalliği izlenmektedir.");
  if (d.chl_thickening === "evet") lig.push(RV_LOCALE==='en'
    ? "The coracohumeral ligament is thickened (>4 mm); a finding of adhesive capsulitis."
    : "Korakohumeral ligaman kalınlaşmıştır (>4 mm); adeziv kapsülit bulgusu.");
  if (d.rotator_interval === "silinmis") lig.push(RV_LOCALE==='en'
    ? "Rotator interval fat tissue is obliterated with increased T2 signal."
    : "Rotator interval yağ dokusu silinmiş ve T2 sinyal artışı izlenmektedir.");
  if (d.post_capsule_lax === "evet") lig.push(RV_LOCALE==='en'
    ? "Posterior capsular laxity is present."
    : "Posterior kapsül laksitesi mevcuttur.");
  if (lig.length === 0) lig.push(RV_LOCALE==='en'
    ? "Glenohumeral ligaments and capsular structures are within normal limits."
    : "Glenohumeral ligamanlar ve kapsüler yapılar normal sınırlardadır.");

  // Cartilage / Kıkırdak
  const cart = [];
  if (d.cartilage_gh === "normal" || !d.cartilage_gh) cart.push(RV_LOCALE==='en'
    ? "Glenohumeral joint cartilage is preserved."
    : "Glenohumeral eklem kıkırdağı korunmuştur.");
  else if (d.cartilage_gh === "hafif") cart.push(RV_LOCALE==='en'
    ? "Mild thinning/fibrillation of glenohumeral joint cartilage."
    : "Glenohumeral eklem kıkırdağında hafif incelme/fibrilasyon.");
  else if (d.cartilage_gh === "orta") cart.push(RV_LOCALE==='en'
    ? "Moderate cartilage loss of the glenohumeral joint."
    : "Glenohumeral eklem kıkırdağında orta derecede kayıp.");
  else if (d.cartilage_gh === "belirgin") cart.push(RV_LOCALE==='en'
    ? "Marked cartilage loss of the glenohumeral joint."
    : "Glenohumeral eklem kıkırdağında belirgin kayıp.");
  if (d.subchondral_change === "evet") cart.push(RV_LOCALE==='en'
    ? "Sclerosis and cystic changes are noted in the subchondral bone."
    : "Subkondral kemikte skleroz ve kistik değişiklikler izlenmektedir.");
  if (d.gh_osteofit === "evet") cart.push(RV_LOCALE==='en'
    ? "Osteophytes are present at the glenohumeral joint margins."
    : "Glenohumeral eklem kenarlarında osteofitler mevcuttur.");
  if (d.gh_narrow === "evet") cart.push(RV_LOCALE==='en'
    ? "Narrowing of the glenohumeral joint space is noted."
    : "Glenohumeral eklem aralığında daralma izlenmektedir.");

  // Effusion & bursa / Efüzyon & bursa
  const fluidLines = [];
  const effMapTR = {"yok":"Glenohumeral eklemde efüzyon izlenmemektedir.",
    "minimal":"Glenohumeral eklemde minimal miktarda efüzyon.",
    "orta":"Glenohumeral eklemde orta miktarda efüzyon.",
    "belirgin":"Glenohumeral eklemde belirgin miktarda efüzyon."};
  const effMapEN = {"yok":"No glenohumeral joint effusion.",
    "minimal":"Minimal glenohumeral joint effusion.",
    "orta":"Moderate glenohumeral joint effusion.",
    "belirgin":"Prominent glenohumeral joint effusion."};
  fluidLines.push((RV_LOCALE==='en' ? effMapEN : effMapTR)[d.effusion_amount] || (RV_LOCALE==='en' ? effMapEN["yok"] : effMapTR["yok"]));
  if (d.axillary_thickening === "evet") fluidLines.push(RV_LOCALE==='en'
    ? "Capsular thickening (>4 mm) is noted in the axillary recess."
    : "Aksiller reseste kapsüler kalınlaşma (>4 mm) izlenmektedir.");
  const bursaMapTR = {"yok":"Subakromial-subdeltoid bursada sıvı izlenmemektedir.",
    "minimal":"Subakromial-subdeltoid bursada minimal sıvı.",
    "orta":"Subakromial-subdeltoid bursada orta miktarda sıvı (bursit ile uyumlu).",
    "belirgin":"Subakromial-subdeltoid bursada belirgin sıvı (bursit)."};
  const bursaMapEN = {"yok":"No fluid in the subacromial-subdeltoid bursa.",
    "minimal":"Minimal fluid in the subacromial-subdeltoid bursa.",
    "orta":"Moderate fluid in the subacromial-subdeltoid bursa (consistent with bursitis).",
    "belirgin":"Prominent fluid in the subacromial-subdeltoid bursa (bursitis)."};
  fluidLines.push((RV_LOCALE==='en' ? bursaMapEN : bursaMapTR)[d.bursa_effusion] || (RV_LOCALE==='en' ? bursaMapEN["yok"] : bursaMapTR["yok"]));
  if (d.bursa_wall === "kalin") fluidLines.push(RV_LOCALE==='en' ? "Bursal wall thickening." : "Bursal duvarda kalınlaşma.");
  if (d.post_contrast_enh === "sinovit") fluidLines.push(RV_LOCALE==='en'
    ? "Diffuse synovial enhancement on post-contrast imaging (synovitis)."
    : "Kontrast sonrası yaygın sinoviyal boyanma (sinovit).");
  else if (d.post_contrast_enh === "bursal") fluidLines.push(RV_LOCALE==='en'
    ? "Bursal wall enhancement on post-contrast imaging."
    : "Kontrast sonrası bursal duvarsal boyanma.");
  else if (d.post_contrast_enh === "fokal") fluidLines.push(RV_LOCALE==='en'
    ? "Focal enhancement is noted on post-contrast imaging."
    : "Kontrast sonrası fokal boyanma izlenmektedir.");

  // Muscle & other / Kas & diğer
  const muscle = [];
  RC_TENDONS.forEach(t => {
    const Lx = (lesions||[]).filter(l => l.tendon === t.id && l.goutallier !== undefined && l.goutallier !== "" && Number(l.goutallier)>0)[0];
    if (Lx) {
      const g = GOUTALLIER.find(x => x.id === Number(Lx.goutallier));
      muscle.push(RV_LOCALE==='en'
        ? `${L(t,'name')} muscle: ${g.label} (${L(g,'txt')}).`
        : `${t.name} kası: ${g.label} (${g.txt}).`);
    }
  });
  if (d.deltoid_abn === "evet") muscle.push(RV_LOCALE==='en'
    ? "Signal change is noted in the deltoid muscle."
    : "Deltoid kasında sinyal değişikliği izlenmektedir.");
  if (d.quadrilateral_space === "evet") muscle.push(RV_LOCALE==='en'
    ? "Denervation findings (edema/atrophy) of the teres minor muscle in the quadrilateral space; quadrilateral space syndrome should be considered."
    : "Kuadrilateral bölgede teres minor kası denervasyon bulguları (ödem/atrofi); kuadrilateral bölge sendromu düşünülmelidir.");
  if (d.infraspinatus_denerv === "evet") muscle.push(RV_LOCALE==='en'
    ? "Denervation pattern (edema and/or atrophy) of the infraspinatus muscle; suprascapular neuropathy should be considered."
    : "İnfraspinatus kasında denervasyon paterni (ödem ve/veya atrofi); suprascapular nöropati açısından değerlendirilmelidir.");
  if (muscle.length === 0) muscle.push(RV_LOCALE==='en'
    ? "Signal and volume of the rotator cuff muscle complex are normal."
    : "Rotator manşet kas kompleksinde sinyal ve volüm doğaldır.");

  // Paralabral cyst / Paralabral kist
  const cyst = [];
  if (d.paralabral_cyst === "spinoglenoid") cyst.push(RV_LOCALE==='en'
    ? "Paralabral cyst in the spinoglenoid notch; may compress the suprascapular nerve."
    : "Spinoglenoid çentikte paralabral kist; suprascapular sinire bası yapabilir.");
  else if (d.paralabral_cyst === "suprascapular") cyst.push(RV_LOCALE==='en'
    ? "Paralabral cyst in the suprascapular notch."
    : "Suprascapular çentikte paralabral kist.");
  else if (d.paralabral_cyst === "diger") cyst.push(RV_LOCALE==='en'
    ? "A paralabral cyst is noted adjacent to the labrum."
    : "Labrum komşuluğunda paralabral kist izlenmektedir.");

  // Other / Diğer
  const other = [];
  if (d.synovial_hemosiderin === "evet") other.push(RV_LOCALE==='en'
    ? "Hypointense areas on all sequences within synovial thickening (hemosiderin); suggestive of PVNS."
    : "Sinoviyal kalınlaşma içinde tüm sekanslarda hipointens alanlar (hemosiderin); PVNS açısından düşündürücüdür.");
  if (d.blooming === "evet") other.push(RV_LOCALE==='en' ? "Prominent blooming artifact on GRE sequence." : "GRE sekansta belirgin blooming artefaktı.");
  if (d.calcification_present === "evet" && !(lesions||[]).some(l=>l.calcific)) other.push(RV_LOCALE==='en'
    ? "A calcific focus is noted in the cuff tendon."
    : "Manşet tendonunda kalsifik fokus izlenmektedir.");
  if (d.mass_present === "evet") other.push(RV_LOCALE==='en'
    ? "A periarticular/intra-articular space-occupying lesion is noted; further evaluation is recommended."
    : "Periartiküler/eklem içi yer kaplayıcı lezyon izlenmekte olup ileri değerlendirme önerilir.");
  if (d.periarticular_edema === "evet") other.push(RV_LOCALE==='en'
    ? "Periarticular soft tissue edema/inflammatory changes are present."
    : "Periartiküler yumuşak doku ödemi/inflamatuar değişiklikler mevcuttur.");
  if (d.freetext && d.freetext.trim()) other.push(d.freetext.trim());

  /* ====== IMPRESSION / YORUM ====== */
  const topScores = [...scores].sort((a,b) => b.score - a.score).filter(s => s.score >= 15);
  let yorum = "";
  if (topScores.length === 0) {
    yorum = RV_LOCALE==='en'
      ? `No significant pathology is identified on ${sides} shoulder MRI. Clinical correlation is recommended.`
      : `${sides} omuz MRG incelemede belirgin patoloji saptanmamıştır. Klinik bulgular eşliğinde değerlendirilmesi önerilir.`;
  } else {
    const top = topScores[0];
    const pathoEntry = PATHO.find(p => p.key === top.key);
    const name = L(pathoEntry, 'name') || top.key;
    const parts = [];
    parts.push(RV_LOCALE==='en'
      ? `Most likely diagnosis on ${sides} shoulder MRI: ${name} (match ${top.score}%).`
      : `${sides} omuz MRG'de en olası tanı: ${name} (uyum %${top.score}).`);
    if (topScores.length >= 2) {
      const others = topScores.slice(1,3).map(s => `${L(PATHO.find(p=>p.key===s.key)||{},'name')} (${s.score}%)`).join(", ");
      parts.push(RV_LOCALE==='en'
        ? `Differential diagnosis should also include ${others}.`
        : `Ayırıcı tanıda ayrıca ${others} göz önünde bulundurulmalıdır.`);
    }
    // Pathology-specific impression sentences / Patoloji özgü yorum cümleleri
    if (top.key === "massive_rct") parts.push(RV_LOCALE==='en'
      ? "Massive rotator cuff tear is present; musculoskeletal orthopaedic consultation is recommended for surgical planning (tendon transfer or reverse shoulder arthroplasty)."
      : "Masif rotator manşet yırtığı mevcut olup cerrahi değerlendirme (tendon transferi veya ters omuz artroplastisi) planı açısından MSK ortopedi konsültasyonu önerilir.");
    else if (top.key === "supra_full") parts.push(RV_LOCALE==='en'
      ? "Supraspinatus full-thickness tear is present; the degree of fatty degeneration and retraction are important for surgical repairability."
      : "Supraspinatus tam kat yırtığı mevcut olup kas yağlı dejenerasyon durumu ve retraksiyon derecesi cerrahi onarılabilirlik açısından önemlidir.");
    else if (top.key === "frozen") parts.push(RV_LOCALE==='en'
      ? "Findings consistent with adhesive capsulitis are present. Clinical correlation with active range-of-motion restriction and pain is recommended."
      : "Adeziv kapsülit bulguları mevcuttur. Aktif hareket kısıtlılığı ve ağrı ile birlikte klinik korelasyon önerilir.");
    else if (top.key === "bankart" || top.key === "bony_bankart" || top.key === "alpsa") parts.push(RV_LOCALE==='en'
      ? "Anterior glenohumeral instability findings are present. The degree of glenoid bone loss and Hill-Sachs lesion size determine the choice between arthroscopic Bankart repair and bone augmentation (Latarjet)."
      : "Anterior glenohumeral instabilite bulguları mevcuttur. Glenoid kemik kaybı oranı ve Hill-Sachs lezyonu boyutu, artroskopik Bankart onarımı ile kemik augmentasyonu (Latarjet) arasında seçim yapılmasında belirleyicidir.");
    else if (top.key === "slap") parts.push(RV_LOCALE==='en'
      ? "SLAP lesion findings are present. The relationship with the biceps anchor and the presence of a paralabral cyst may influence operative planning."
      : "SLAP lezyonu bulguları mevcuttur. Biseps ankoru ile ilişki ve paralabral kist varlığı operatif planı etkileyebilir.");
    else if (top.key === "calc_tendinit") parts.push(RV_LOCALE==='en'
      ? "Calcific tendinitis findings are present. Clinical staging should be assessed for treatment planning (barbotage, percutaneous aspiration)."
      : "Kalsifik tendinit bulguları mevcuttur. Tedavi (barbotaj, perkütan aspirasyon) planlaması için klinik evre değerlendirilmelidir.");
    else if (top.key === "avn") parts.push(RV_LOCALE==='en'
      ? "Advanced staging (Ficat-Arlet), risk factor evaluation, and early orthopaedic consultation are recommended for humeral head avascular necrosis."
      : "Humerus başı avasküler nekrozu açısından ileri evreleme (Ficat-Arlet), risk faktörü sorgulaması ve erken ortopedi konsültasyonu önerilir.");
    else if (top.key === "septic") parts.push(RV_LOCALE==='en'
      ? "Suspicion of septic arthritis requires urgent evaluation; joint aspiration and culture should be planned."
      : "Septik artrit şüphesi acil değerlendirme gerektirir; eklem aspirasyonu ve kültür planlanmalıdır.");
    else if (top.key === "paralab_cyst") parts.push(RV_LOCALE==='en'
      ? "The paralabral cyst is secondary to an underlying labral tear; neuropathic symptoms (suprascapular nerve) should be evaluated."
      : "Paralabral kist, altta yatan labral yırtığa sekonder olup nöropatik semptomların (suprascapular sinir) değerlendirilmesi gerekir.");
    yorum = parts.join(" ");
  }

  return {
    headerInfo: {
      side: sides,
      age: d.age || "",
      sex: (RV_LOCALE==='en' ? (SEX.find(s=>s.id===d.sex)?.labelEn || d.sex) : d.sex) || "",
      date: today,
      clinical: d.clinical || "",
    },
    seq,
    bone, acromion, rcSections, biceps, labrum, lig, cart, fluidLines, muscle, cyst, other,
    yorum,
    topScores,
  };
}

/* ============ ANA UYGULAMA ============ */

function App() {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    side:"", age:"", sex:"", clinical:"", trauma:"",
    seq_t1:true, seq_t2:true, seq_pd:true, seq_stir:false, seq_fs:true, seq_artro:false, seq_post:false,
    acromion_type:"", os_acromiale:"", acromio_humeral:"",
    ac_osteofit:"", ac_arthrosis:"", ac_hypertrophy:"", ac_osteophyte:"", ac_edema:"", ac_narrow:"",
    greater_tub_edema:"", lesser_tub_edema:"", hill_sachs:"", hill_sachs_size:"",
    rev_hill_sachs:"", glenoid_bone_loss:"", glenoid_bone_loss_severity:"",
    avn_marrow_change:"", avn_double_line:"", avn_collapse:"", avn_risk:"",
    supra_thick:"", supra_thin:"", supra_location:"",
    calcification_present:"", calcific_edema:"",
    biceps_signal:"", biceps_sheath:"", biceps_continuity:"intakt", biceps_popeye:"", biceps_position:"normal",
    sghl_abn:"", mghl_abn:"", ighl_torn:"", chl_thickening:"", rotator_interval:"",
    cartilage_gh:"", subchondral_change:"", gh_osteofit:"", gh_narrow:"",
    effusion_amount:"", bursa_effusion:"", bursa_wall:"", post_contrast_enh:"",
    axillary_thickening:"",
    dislocation_hx:"", post_dislocation_hx:"", post_capsule_lax:"",
    labral_degen:"",
    paralabral_cyst:"", infraspinatus_denerv:"", deltoid_abn:"", quadrilateral_space:"",
    synovial_hemosiderin:"", blooming:"", hemarthros:"", septic_erosion:"", periarticular_edema:"",
    clinical_frozen:"", clinical_septic:"",
    cuff_arthropathy:"",
    mass_present:"",
    freetext:"",
    // loops
    labralTears: [],
  });
  const [lesions, setLesions] = useState([]);      // rotator cuff
  const [lesionIdx, setLesionIdx] = useState(-1);
  const [lesionSub, setLesionSub] = useState(0);
  const [labralIdx, setLabralIdx] = useState(-1);
  const [labralSub, setLabralSub] = useState(0);
  const [showReport, setShowReport] = useState(false);

  const TOTAL_STEPS = 22;
  const update = (k,v) => setData(d => ({...d, [k]:v}));

  /* ==== Lezyon loop yardımcıları ==== */
  const RC_SUBSTEPS = 5; // 0:tendon,1:konum,2:kontinüite,3:parsiyel/tam detay,4:goutallier+kalsifik
  const LAB_SUBSTEPS = 3; // 0:kadran,1:kategori,2:subtype+cyst

  function startRCLesion() {
    const L = { id: Date.now(), tendon:"", location:"", continuity:"", partial_face:"", partial_thickness:"", full_size:"", retraction:null, goutallier:"", calcific:false };
    setLesions(ls => [...ls, L]);
    setLesionIdx(lesions.length);
    setLesionSub(0);
  }
  function updateCurrentLesion(patch) {
    setLesions(ls => ls.map((L,i) => i===lesionIdx ? {...L, ...patch} : L));
  }
  function finalizeRCLesion() {
    setLesionIdx(-1);
    setLesionSub(0);
  }
  function removeLesion(i) {
    setLesions(ls => ls.filter((_,j) => j!==i));
  }

  function startLabralTear() {
    const L = { id: Date.now(), quadrant:"", category:"", subtype:"", paralabralCyst:false };
    const newArr = [...(data.labralTears||[]), L];
    update("labralTears", newArr);
    setLabralIdx(newArr.length - 1);
    setLabralSub(0);
  }
  function updateCurrentLabral(patch) {
    update("labralTears", (data.labralTears||[]).map((L,i)=> i===labralIdx ? {...L, ...patch} : L));
  }
  function finalizeLabralTear() {
    setLabralIdx(-1);
    setLabralSub(0);
  }
  function removeLabral(i) {
    update("labralTears", (data.labralTears||[]).filter((_,j)=> j!==i));
  }

  /* ==== Skorlama ==== */
  const scores = useMemo(() => {
    const F = buildFeatureMap(data, lesions);
    return computeScores(F);
  }, [data, lesions]);

  /* ==== Navigasyon ==== */
  function canNext() {
    if (step === 0) return !!data.side && !!data.age && !!data.sex;
    if (step === 7 && lesionIdx !== -1) {
      const L = lesions[lesionIdx];
      if (!L) return false;
      if (lesionSub === 0) return !!L.tendon;
      if (lesionSub === 1) return !!L.location;
      if (lesionSub === 2) return !!L.continuity;
      if (lesionSub === 3) {
        if (L.continuity === "partial") return !!L.partial_face;
        if (L.continuity === "full")    return !!L.full_size && L.retraction !== null;
        return true;
      }
      if (lesionSub === 4) return true;
    }
    if (step === 9 && labralIdx !== -1) {
      const L = (data.labralTears||[])[labralIdx];
      if (!L) return false;
      if (labralSub === 0) return !!L.quadrant;
      if (labralSub === 1) return !!L.category;
      if (labralSub === 2) {
        if (L.category === "simple") return true;
        return !!L.subtype;
      }
    }
    return true;
  }

  function goNext() {
    // Rotator cuff lezyon loop
    if (step === 7 && lesionIdx !== -1) {
      if (lesionSub < RC_SUBSTEPS - 1) { setLesionSub(s => s+1); return; }
      // son altstep — bitir
      finalizeRCLesion();
      return;
    }
    // Labral tear loop
    if (step === 9 && labralIdx !== -1) {
      if (labralSub < LAB_SUBSTEPS - 1) { setLabralSub(s => s+1); return; }
      finalizeLabralTear();
      return;
    }
    if (step < TOTAL_STEPS - 1) setStep(s => s+1);
    else setShowReport(true);
  }

  function goPrev() {
    // Lezyon loop içindeyken
    if (step === 7 && lesionIdx !== -1) {
      if (lesionSub > 0) { setLesionSub(s => s-1); return; }
      // en baş altstepteyiz — lezyon kaldırılmış sayılır
      setLesions(ls => ls.filter((_,i)=> i!==lesionIdx));
      setLesionIdx(-1);
      setLesionSub(0);
      return;
    }
    if (step === 9 && labralIdx !== -1) {
      if (labralSub > 0) { setLabralSub(s => s-1); return; }
      update("labralTears", (data.labralTears||[]).filter((_,i)=> i!==labralIdx));
      setLabralIdx(-1);
      setLabralSub(0);
      return;
    }
    if (step > 0) setStep(s => s-1);
  }

  /* ==== Export ==== */
  function copyReportText() {
    const el = document.getElementById("report-text-content");
    if (!el) return;
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try { document.execCommand("copy"); alert(T.copySuccess); }
    catch(e) { alert(T.copyFail); }
    sel.removeAllRanges();
  }

    const html = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Omuz MRG Raporu</title><style>

    </style></head><body>${el.innerHTML}</body></html>`;
    const blob = new Blob([html], {type:"text/html"});
    const url = URL.createObjectURL(blob);

    document.body.appendChild(a);
