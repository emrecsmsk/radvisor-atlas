<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omuz MRG — Çok Lezyonlu Karar Destek</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg0:#0b1220; --bg1:#0f172a; --bg2:#1e293b; --bg3:#273449;
    --txt:#e2e8f0; --txt2:#94a3b8; --muted:#64748b;
    --line:#334155;
    --accent:#14b8a6;  /* teal */
    --accent2:#2dd4bf;
    --amber:#f59e0b;
    --amber2:#fbbf24;
    --red:#ef4444; --green:#10b981; --blue:#3b82f6; --violet:#8b5cf6;
    --shadow:0 4px 18px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg0);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;}
  body{min-height:100vh;}
  .app{max-width:1200px;margin:0 auto;padding:14px 18px 80px}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-radius:14px;border:1px solid var(--line);margin-bottom:16px;box-shadow:var(--shadow)}
  .brand{display:flex;gap:12px;align-items:center}
  .logo{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent) 0%,var(--amber) 100%);color:#062028;font-weight:800;font-size:18px;box-shadow:0 4px 12px rgba(20,184,166,.35)}
  .brand h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.2px}
  .brand p{margin:2px 0 0;font-size:12.5px;color:var(--txt2)}
  .progress-wrap{flex:1;max-width:520px;margin:0 22px}
  .progress-label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--txt2);margin-bottom:4px}
  .progress{height:8px;background:var(--bg3);border-radius:99px;overflow:hidden}
  .progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--amber));transition:width .3s}
  .actions{display:flex;gap:8px}
  .btn{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:9px 14px;border-radius:9px;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500}
  .btn:hover:not(:disabled){background:var(--bg3);border-color:var(--accent)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#0d9488);border-color:var(--accent);color:#062028;font-weight:700}
  .btn-primary:hover:not(:disabled){filter:brightness(1.1)}
  .btn-amber{background:linear-gradient(135deg,var(--amber),#d97706);border-color:var(--amber);color:#1a0f00;font-weight:700}
  .btn-amber:hover:not(:disabled){filter:brightness(1.1)}
  .btn-ghost{background:transparent}
  .btn-sm{padding:6px 10px;font-size:12px}
  .card{background:var(--bg1);border:1px solid var(--line);border-radius:14px;padding:22px 26px;box-shadow:var(--shadow)}
  .step-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .step-no{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--amber));color:#062028;font-weight:800;font-size:16px;flex-shrink:0}
  .step-title{font-size:17px;font-weight:700;margin:0}
  .step-sub{font-size:12.5px;color:var(--txt2);margin:2px 0 0}
  h3.sec{margin:18px 0 10px;font-size:14px;font-weight:700;color:var(--accent2);letter-spacing:.4px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
  h3.sec::before{content:"";display:block;width:3px;height:16px;background:linear-gradient(var(--accent),var(--amber));border-radius:2px}
  h3.sec.amber{color:var(--amber2)}
  .grid{display:grid;gap:10px}
  .grid-2{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr 1fr 1fr}
  .grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
  @media (max-width:720px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:all .15s;font-size:13.5px;user-select:none}
  .opt:hover{border-color:var(--accent);background:var(--bg3)}
  .opt.sel{border-color:var(--accent);background:rgba(20,184,166,.12);box-shadow:inset 0 0 0 1px var(--accent)}
  .opt.sel.amber-sel{border-color:var(--amber);background:rgba(245,158,11,.12);box-shadow:inset 0 0 0 1px var(--amber)}
  .opt .dot{width:16px;height:16px;border:2px solid var(--muted);border-radius:50%;flex-shrink:0;margin-top:1px;position:relative}
  .opt.sel .dot{border-color:var(--accent)}
  .opt.sel .dot::after{content:"";position:absolute;inset:2px;background:var(--accent);border-radius:50%}
  .opt.sel.amber-sel .dot{border-color:var(--amber)}
  .opt.sel.amber-sel .dot::after{background:var(--amber)}
  .opt .chk{width:16px;height:16px;border:2px solid var(--muted);border-radius:4px;flex-shrink:0;margin-top:1px;position:relative;transition:all .15s}
  .opt.sel .chk{border-color:var(--accent);background:var(--accent)}
  .opt.sel .chk::after{content:"✓";position:absolute;left:1px;top:-3px;color:#062028;font-size:13px;font-weight:900}
  .opt-label{flex:1;line-height:1.45}
  .opt-label small{display:block;color:var(--txt2);font-size:11.5px;margin-top:2px}
  .txt,.num,textarea{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:8px;font-size:13.5px;font-family:inherit}
  .txt:focus,.num:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(20,184,166,.2)}
  textarea{resize:vertical;min-height:68px}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
  .field label{font-size:12.5px;color:var(--txt2);font-weight:600}
  .hint{background:rgba(20,184,166,.08);border:1px solid rgba(20,184,166,.3);color:#99f6e4;padding:10px 13px;border-radius:8px;font-size:12.5px;margin:10px 0}
  .warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);color:#fde68a;padding:10px 13px;border-radius:8px;font-size:12.5px;margin:10px 0}
  .danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:10px 13px;border-radius:8px;font-size:12.5px;margin:10px 0}
  .nav{display:flex;justify-content:space-between;margin-top:22px;padding-top:16px;border-top:1px solid var(--line)}
  .lesion-card{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg1) 100%);border:1px solid var(--accent);border-radius:12px;padding:14px 18px;margin-bottom:14px;position:relative}
  .lesion-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(var(--accent),var(--amber));border-radius:12px 0 0 12px}
  .lesion-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .lesion-title{font-weight:700;color:var(--accent2);font-size:14px}
  .chip{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600;margin-right:6px;margin-top:3px}
  .chip-teal{background:rgba(20,184,166,.18);color:#5eead4;border:1px solid rgba(20,184,166,.4)}
  .chip-amber{background:rgba(245,158,11,.18);color:#fcd34d;border:1px solid rgba(245,158,11,.4)}
  .chip-red{background:rgba(239,68,68,.18);color:#fca5a5;border:1px solid rgba(239,68,68,.4)}
  .chip-green{background:rgba(16,185,129,.18);color:#6ee7b7;border:1px solid rgba(16,185,129,.4)}
  .lesion-list{margin:10px 0 0;padding:0;list-style:none}
  .lesion-list li{padding:8px 10px;background:var(--bg2);border-radius:6px;margin-bottom:5px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .bar-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12.5px}
  .bar-row .name{flex:1;min-width:140px}
  .bar-row .bar{flex:2;height:9px;background:var(--bg3);border-radius:99px;overflow:hidden}
  .bar-row .bar>span{display:block;height:100%;border-radius:99px;transition:width .4s}
  .bar-row .pct{width:48px;text-align:right;color:var(--txt2);font-variant-numeric:tabular-nums;font-weight:600}
  .bar-row .bar.top>span{background:linear-gradient(90deg,var(--accent),var(--amber))}
  .bar-row .bar.mid>span{background:#3b82f6}
  .bar-row .bar.low>span{background:#64748b}

  /* Report overlay */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 10px}
  .report-wrap{background:white;color:#111;border-radius:14px;max-width:900px;width:100%;padding:38px 46px;box-shadow:0 30px 90px rgba(0,0,0,.6);font-family:"Times New Roman","Georgia",serif;font-size:14px;line-height:1.55;margin-bottom:30px}
  .report-header{border-bottom:3px double #1e293b;padding-bottom:10px;margin-bottom:14px}
  .report-header h2{margin:0;font-size:20px;text-align:center;letter-spacing:1px;color:#0f172a}
  .report-header p{margin:3px 0 0;text-align:center;font-size:12.5px;color:#475569;font-family:Arial,sans-serif}
  .rbox{border:1.5px solid #0f172a;border-radius:6px;margin:10px 0;background:white;break-inside:avoid}
  .rbox-head{background:linear-gradient(90deg,#0f172a,#1e293b);color:white;padding:5px 12px;font-weight:700;font-size:13px;letter-spacing:.5px;font-family:Arial,sans-serif;border-radius:5px 5px 0 0}
  .rbox-head.teal{background:linear-gradient(90deg,#0f766e,#14b8a6)}
  .rbox-head.amber{background:linear-gradient(90deg,#b45309,#f59e0b)}
  .rbox-head.slate{background:linear-gradient(90deg,#334155,#64748b)}
  .rbox-body{padding:8px 14px}
  .zrow{display:grid;grid-template-columns:170px 1fr;padding:5px 10px;font-size:13px}
  .zrow:nth-child(odd){background:#f1f5f9}
  .zrow:nth-child(even){background:white}
  .zrow .zk{font-weight:700;color:#0f172a;font-family:Arial,sans-serif;font-size:12.5px}
  .zrow .zv{color:#1e293b}
  .yorum{background:#fef3c7;border-left:5px solid #f59e0b;border-radius:0 6px 6px 0;padding:12px 18px;margin:14px 0;font-size:13.5px}
  .yorum b{display:block;margin-bottom:6px;color:#78350f;letter-spacing:.5px;font-family:Arial,sans-serif;font-size:13px;text-transform:uppercase}
  .dx-table{border-collapse:collapse;width:100%;margin-top:8px;font-size:13px}
  .dx-table th{background:#0f172a;color:white;padding:6px 10px;text-align:left;font-family:Arial,sans-serif;font-size:12px;letter-spacing:.4px}
  .dx-table td{border-bottom:1px solid #cbd5e1;padding:6px 10px}
  .dx-table tr:nth-child(even) td{background:#f8fafc}
  .dx-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:middle}
  .sig{margin-top:22px;padding-top:10px;border-top:1px solid #cbd5e1;text-align:right;font-size:12.5px;color:#475569}
  .overlay-actions{position:fixed;top:14px;right:20px;display:flex;gap:8px;z-index:9100}

  /* zebra strip helpers for report */
  .zbullet{padding:4px 10px;margin:2px 0;font-size:13px}
  .zbullet:nth-child(odd){background:#f1f5f9}
  .zbullet:nth-child(even){background:white}

  /* print */
  @media print{
    body{background:white}
    body *{visibility:hidden}
    .report-wrap,.report-wrap *{visibility:visible}
    .report-wrap{position:absolute;left:0;top:0;width:100%;box-shadow:none;border-radius:0;padding:18px 22px;margin:0}
    .overlay-actions{display:none !important}
  }
  .kbd{display:inline-block;padding:2px 7px;background:var(--bg3);border-radius:4px;border:1px solid var(--line);font-size:11px;font-family:monospace;color:var(--txt2)}
  .side-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg2);padding:4px;border-radius:10px;border:1px solid var(--line)}
  .side-tab{flex:1;padding:9px 12px;border-radius:7px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--txt2);transition:all .15s}
  .side-tab.active{background:linear-gradient(135deg,var(--accent),var(--amber));color:#062028}
  .sticker{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;background:var(--bg3);border:1px solid var(--line);font-size:11.5px;color:var(--txt2);font-weight:600}
  .sticker b{color:var(--accent2)}
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useRef,useEffect} = React;

/* ====================================================================
   OMUZ MRG — KARAR DESTEK SİSTEMİ v1.0
   Mimari: Çok-lezyonlu loop, else-if ağırlıklı skorlama,
           finalize()→idx=-1 reset, DOM overlay export,
           Zebra + kutulu rapor formatı (diz/dirsek/el-bilek ile uyumlu)
   ==================================================================== */

/* Sabit listeler */
const SIDE = ["Sağ","Sol"];
const SEX = ["Kadın","Erkek"];
const RC_TENDONS = [
  {id:"supra", name:"Supraspinatus"},
  {id:"infra", name:"İnfraspinatus"},
  {id:"subsc", name:"Subskapularis"},
  {id:"teres", name:"Teres minor"},
];
const BIGLIANI = [
  {id:"t1", label:"Tip I — Düz",      txt:"Düz akromion (Tip I)"},
  {id:"t2", label:"Tip II — Kurvilineer", txt:"Kurvilineer akromion (Tip II)"},
  {id:"t3", label:"Tip III — Kancamsı", txt:"Kanca şeklinde akromion (Tip III) — subakromial sıkışmaya predispoze"},
  {id:"t4", label:"Tip IV — Konveks", txt:"Konveks akromion (Tip IV)"},
];
const GOUTALLIER = [
  {id:0, label:"Grade 0", txt:"normal kas (yağlı infiltrasyon yok)"},
  {id:1, label:"Grade 1", txt:"seyrek yağ çizgileri"},
  {id:2, label:"Grade 2", txt:"yağ < kas hacmi"},
  {id:3, label:"Grade 3", txt:"yağ = kas hacmi"},
  {id:4, label:"Grade 4", txt:"yağ > kas hacmi"},
];
const PATTE = [
  {id:1, label:"Patte I",  txt:"tendon ucu humerus başı seviyesinde (retraksiyon yok/minimal)"},
  {id:2, label:"Patte II", txt:"tendon ucu humerus başı ile glenoid arasında"},
  {id:3, label:"Patte III",txt:"tendon ucu glenoid seviyesinde veya medialinde (belirgin retraksiyon)"},
];
const LABRAL_QUADRANTS = [
  {id:"sup", name:"Süperior"},
  {id:"ant-sup", name:"Anterosuperior"},
  {id:"ant", name:"Anterior"},
  {id:"ant-inf", name:"Anteroinferior"},
  {id:"inf", name:"İnferior"},
  {id:"post-inf", name:"Posteroinferior"},
  {id:"post", name:"Posterior"},
  {id:"post-sup", name:"Posterosuperior"},
];
const SLAP_TYPES = [
  {id:"s1", name:"SLAP Tip I", txt:"süperior labrumda dejeneratif fibrilasyon; biseps ankoru sağlam"},
  {id:"s2", name:"SLAP Tip II", txt:"süperior labrum ve biseps ankorunun glenoidden ayrılması (en sık)"},
  {id:"s3", name:"SLAP Tip III", txt:"süperior labrumun kova sapı yırtığı; biseps ankoru intakt"},
  {id:"s4", name:"SLAP Tip IV", txt:"süperior labrumun kova sapı yırtığı + biseps tendonuna uzanım"},
  {id:"s5", name:"SLAP Tip V", txt:"SLAP II + anteroinferior Bankart lezyonu"},
  {id:"s6", name:"SLAP Tip VI", txt:"süperior labrumda flep yırtığı"},
  {id:"s7", name:"SLAP Tip VII", txt:"SLAP II + MGHL'ye uzanım"},
];
const ANT_LABRAL_VARIANTS = [
  {id:"bankart",   name:"Bankart (klasik)",     txt:"anteroinferior labroligamentöz kompleksin glenoidden soyulması (periost YIRTIK)"},
  {id:"bony",      name:"Bony Bankart",         txt:"anteroinferior glenoid kırığı ile birlikte labroligamentöz avülsiyon"},
  {id:"alpsa",     name:"ALPSA",                txt:"anterior labroligamentöz periosteal sleeve avülsiyonu (periost İNTAKT; labrum mediale deplase)"},
  {id:"perthes",   name:"Perthes",              txt:"anterior labrum glenoidden ayrılmış ancak periost intakt; anatomik pozisyonda (MR artrografi ile belirgin)"},
  {id:"glad",      name:"GLAD",                 txt:"anteroinferior labrum yırtığı + bitişik glenoid kıkırdak defekti"},
  {id:"hagl",      name:"HAGL",                 txt:"inferior glenohumeral ligamanın humeral avülsiyonu (J-sign)"},
];
const POST_LABRAL_VARIANTS = [
  {id:"rev-bankart", name:"Reverse Bankart",    txt:"posteroinferior labral yırtık (posterior instabilite)"},
  {id:"kim",         name:"Kim lezyonu",        txt:"posteroinferior labrumda inkomplet, gizli yırtık"},
  {id:"post-alpsa",  name:"Posterior ALPSA",    txt:"posterior labroligamentöz periosteal sleeve avülsiyonu"},
];

/* ====== Patoloji veri tabanı ve ağırlıklı skorlama ====== */
/* Anahtar: key, isim, kategori, feature üretici fonksiyon */

const PATHO = [
  {key:"supra_tendinop", name:"Supraspinatus tendinopati", cat:"manşet"},
  {key:"supra_partial",  name:"Supraspinatus parsiyel yırtığı", cat:"manşet"},
  {key:"supra_full",     name:"Supraspinatus tam kat yırtığı", cat:"manşet"},
  {key:"infra_tear",     name:"İnfraspinatus yırtığı", cat:"manşet"},
  {key:"subsc_tear",     name:"Subskapularis yırtığı", cat:"manşet"},
  {key:"massive_rct",    name:"Masif rotator manşet yırtığı", cat:"manşet"},
  {key:"calc_tendinit",  name:"Kalsifik tendinit", cat:"manşet"},
  {key:"impingement",    name:"Subakromial sıkışma sendromu", cat:"sıkışma"},
  {key:"biceps_tendinop",name:"Biceps tendinopatisi / tenosinovit", cat:"biceps"},
  {key:"biceps_tear",    name:"Biceps uzun başı yırtığı", cat:"biceps"},
  {key:"biceps_instab",  name:"Biceps tendon subluksasyonu/dislokasyonu", cat:"biceps"},
  {key:"slap",           name:"SLAP lezyonu", cat:"labrum"},
  {key:"bankart",        name:"Bankart lezyonu (anterior instabilite)", cat:"labrum"},
  {key:"bony_bankart",   name:"Kemik Bankart / glenoid kemik kaybı", cat:"labrum"},
  {key:"alpsa",          name:"ALPSA lezyonu", cat:"labrum"},
  {key:"hill_sachs",     name:"Hill-Sachs lezyonu", cat:"labrum"},
  {key:"rev_bankart",    name:"Reverse Bankart (posterior instabilite)", cat:"labrum"},
  {key:"rev_hill_sachs", name:"Reverse Hill-Sachs (McLaughlin)", cat:"labrum"},
  {key:"frozen",         name:"Adeziv kapsülit (donuk omuz)", cat:"kapsül"},
  {key:"gh_oa",          name:"Glenohumeral osteoartrit", cat:"dejeneratif"},
  {key:"ac_oa",          name:"Akromioklaviküler eklem osteoartriti", cat:"dejeneratif"},
  {key:"bursit",         name:"Subakromial-subdeltoid bursit", cat:"bursa"},
  {key:"paralab_cyst",   name:"Paralabral kist / spinoglenoid çentik kisti", cat:"diğer"},
  {key:"avn",            name:"Humerus başı avasküler nekrozu", cat:"kemik"},
  {key:"septic",         name:"Septik artrit", cat:"inflamatuar"},
  {key:"pvns",           name:"Pigmente villonodüler sinovit (PVNS)", cat:"sinoviyal"},
];

const CAT_COLOR = {
  "manşet":"#14b8a6","sıkışma":"#f59e0b","biceps":"#8b5cf6",
  "labrum":"#ef4444","kapsül":"#3b82f6","dejeneratif":"#64748b",
  "bursa":"#10b981","diğer":"#94a3b8","kemik":"#d97706",
  "inflamatuar":"#dc2626","sinoviyal":"#7c3aed"
};

/* ================================================================== */
/* Skorlama motoru:                                                     */
/*  - Her patoloji için feature listesi {feat, w, label, present}       */
/*  - Toplam skor = Σ(present ? w : 0)                                  */
/*  - max olası = Σ(w)                                                  */
/*  - % = Math.min(100, round(100 * skor / max))                        */
/*  - else if zinciri ile signal karakterizasyonu                        */
/* ================================================================== */

function buildFeatureMap(data, lesions) {
  // lesions: rotator cuff lezyonları array
  const F = {};

  // Hangi tendonda ne var?
  const tendonState = {};
  RC_TENDONS.forEach(t => tendonState[t.id] = { any:false, tendinop:false, partial:false, full:false, size:null, retrac:null, goutallier:null, calcific:false });
  (lesions||[]).forEach(L => {
    if (!L || !L.tendon) return;
    const st = tendonState[L.tendon];
    if (!st) return;
    st.any = true;
    if (L.continuity === "tendinop") st.tendinop = true;
    else if (L.continuity === "partial") st.partial = true;
    else if (L.continuity === "full")    st.full = true;
    if (L.full_size)   st.size      = L.full_size;
    if (L.retraction)  st.retrac    = L.retraction;
    if (L.goutallier !== undefined && L.goutallier !== "") st.goutallier = Number(L.goutallier);

  F.biceps_instab = [

  // === BURSİT ===

  // === PARALABRAL KİST ===

    { w: 15, label:"Subkondral kollaps (ilerlemiş evre)", present: data.avn_collapse === "evet" },

    { w: 15, label:"Eklem kıkırdağı ve subkondral kemikte erken erozyon", present: data.septic_erosion === "evet" },
  ];

  // === PVNS ===
  F.pvns = [
    { w: 45, label:"Sinoviyal kalınlaşma içinde hemosiderin kaynaklı düşük T1/T2 sinyal", present: data.synovial_hemosiderin === "evet" },
    { w: 20, label:"Gradyan ekoda belirgin blooming artefaktı", present: data.blooming === "evet" },
    { w: 15, label:"Kronik tekrarlayan hemartroz", present: data.hemarthros === "evet" },
    { w: 10, label:"Kemik erozyonu / subkondral kist", present: data.septic_erosion === "evet" || data.subchondral_change === "evet" },
  ];

  return F;
}

function computeScores(F) {
  const out = [];
  Object.keys(F).forEach(k => {
    const feats = F[k];
    let score = 0, max = 0;
    feats.forEach(f => { max += f.w; if (f.present) score += f.w; });
    const raw = max ? Math.min(100, Math.round(100 * score / max)) : 0;
    out.push({ key:k, score: raw, features: feats.filter(f => f.present) });
  });
  return out;
}

/* ========== Yardımcı UI bileşenleri ========== */

function OptBox({selected, onClick, children, small, amber}) {
  return <div className={`opt ${selected?"sel":""} ${amber?"amber-sel":""}`} onClick={onClick}>
    <div className="dot"></div>
    <div className="opt-label">{children}</div>
  </div>;
}
function ChkBox({selected, onClick, children}) {
  return <div className={`opt ${selected?"sel":""}`} onClick={onClick}>
    <div className="chk"></div>
    <div className="opt-label">{children}</div>
  </div>;
}
function Radio({value, onChange, options, cols}) {
  return <div className={`grid grid-${cols||2}`}>
    {options.map(o => <OptBox key={o.id} selected={value===o.id} onClick={()=>onChange(o.id)}>
      <b>{o.label}</b>
      {o.hint && <small>{o.hint}</small>}
    </OptBox>)}
  </div>;
}

/* ========== Rapor oluşturucu ========== */

function generateReport(data, lesions, labralTears, scores) {
  const d = data;
  const sides = d.side || "Sağ";
  const today = new Date().toLocaleDateString("tr-TR");

  // Teknik
  const seq = [];
  if (d.seq_t1) seq.push("Aksiyel, koronal oblik, sagital oblik T1A");
  if (d.seq_t2) seq.push("Aksiyel, koronal oblik, sagital oblik T2A");
  if (d.seq_pd) seq.push("PD yağ baskılı");
  if (d.seq_stir) seq.push("STIR");
  if (d.seq_fs) seq.push("Yağ baskılı T2A");
  if (d.seq_artro) seq.push("MR artrografi (direkt intraartiküler gadolinyum)");
  if (d.seq_post) seq.push("Kontrast sonrası yağ baskılı T1A");

  // Kemik bulguları
  const bone = [];
  if (d.greater_tub_edema === "evet") bone.push("Büyük tüberkülde kemik iliği ödemi izlenmektedir.");
  if (d.lesser_tub_edema === "evet")  bone.push("Küçük tüberkülde kemik iliği ödemi izlenmektedir.");
  if (d.hill_sachs === "evet") {
    const sz = d.hill_sachs_size === "buyuk" ? "(defekt boyutu >12 mm, engage-edici nitelikte olabilir)" : "";
    bone.push(`Humerus başı posterolateralinde kompresyon defekti (Hill-Sachs lezyonu) ${sz}.`);
  }
  if (d.rev_hill_sachs === "evet") bone.push("Humerus başı anteromedial yüzeyinde kompresyon defekti (reverse Hill-Sachs / McLaughlin lezyonu) izlenmektedir.");
  if (d.glenoid_bone_loss === "evet") {
    const sev = d.glenoid_bone_loss_severity === "ciddi" ? "ciddi (>20%)" : (d.glenoid_bone_loss_severity === "orta" ? "orta" : "hafif");
    bone.push(`Anteroinferior glenoid kenarında ${sev} boyutta kemik kaybı (kemik Bankart lezyonu ile uyumlu) izlenmektedir.`);
  }
  if (d.avn_marrow_change === "evet" || d.avn_double_line === "evet") {
    bone.push("Humerus başında avasküler nekroz ile uyumlu subkondral kemik iliği sinyal değişikliği" + (d.avn_double_line==="evet" ? " (çift çizgi işareti pozitif)" : "") + (d.avn_collapse==="evet" ? " ve subkondral kollaps" : "") + " izlenmektedir.");
  }
  if (bone.length === 0) bone.push("Kemik yapılarda sinyal ve morfoloji normal sınırlardadır.");

  // Akromion & AC
  const acromion = [];
  const acrType = BIGLIANI.find(b => b.id === d.acromion_type);
  if (acrType) acromion.push(acrType.txt + ".");
  if (d.os_acromiale === "evet") acromion.push("Os akromiale varyasyonu izlenmektedir.");
  if (d.acromio_humeral === "daralmis") acromion.push("Akromiohumeral mesafe daralmıştır (<7 mm); manşet artropatisi/üst humeral migrasyon ile uyumludur.");
  else if (d.acromio_humeral === "normal") acromion.push("Akromiohumeral mesafe korunmuştur.");
  if (d.ac_osteofit === "evet" || d.ac_arthrosis === "evet") acromion.push("Akromioklaviküler eklemde dejeneratif değişiklikler mevcuttur.");
  if (d.ac_hypertrophy === "evet") acromion.push("AC eklem kapsüler hipertrofisi izlenmektedir.");
  if (d.ac_osteophyte === "evet") acromion.push("AC ekleminden inferiora uzanan osteofit; subakromial alana basınç oluşturmaktadır.");
  if (d.ac_edema === "evet") acromion.push("AC eklem civarı kemik iliği ödemi izlenmektedir.");
  if (acromion.length === 0) acromion.push("Akromion morfolojisi ve AC eklem normal sınırlardadır.");

  // Rotator manşet (her tendon)
  const rcSections = RC_TENDONS.map(t => {
    const tL = (lesions||[]).filter(L => L.tendon === t.id);
    if (tL.length === 0) {
      return {name: t.name, lines: ["Tendonda sinyal ve morfoloji doğaldır."]};
    }
    const lines = [];
    tL.forEach(L => {
      const locMap = {"kritik":"kritik zon (insersiyonun 1-2 cm proksimali)","footprint":"footprint (insersiyonel bölge)","mtj":"muskulotendinöz bileşke","tum":"difüz"};
      const loc = locMap[L.location] || "tendon gövdesi";
      if (L.continuity === "tendinop") {
        lines.push(`${t.name} tendonu ${loc}de sinyal artışı ve kalınlaşma (tendinopati) izlenmektedir.`);
      } else if (L.continuity === "partial") {
        const faceMap = {"artikuler":"artiküler yüzeyinde","bursal":"bursal yüzeyinde","intratendinoz":"intratendinöz"};
        const face = faceMap[L.partial_face] || "bir yüzünde";
        const pctTxt = L.partial_thickness ? ` (tendon kalınlığının yaklaşık %${L.partial_thickness}'i)` : "";
        lines.push(`${t.name} tendonunun ${loc}de, ${face} parsiyel kat yırtık${pctTxt} izlenmektedir.`);
      } else if (L.continuity === "full") {
        const sizeMap = {"small":"küçük (<1 cm)","medium":"orta (1–3 cm)","large":"geniş (3–5 cm)","massive":"masif (>5 cm)"};
        const sz = sizeMap[L.full_size] || "";
        const retracMap = {1:"Patte I (minimal retraksiyon)", 2:"Patte II (humerus başı–glenoid arası retraksiyon)", 3:"Patte III (glenoid seviyesinde retraksiyon)"};
        const retrac = L.retraction ? `, ${retracMap[L.retraction]}` : "";
        lines.push(`${t.name} tendonunda ${loc}de tam kat yırtık (${sz} boyutlu${retrac}) izlenmektedir.`);
      }
      if (L.calcific) lines.push(`${t.name} tendonu lifleri içinde kalsifik fokus izlenmektedir.`);
      if (L.goutallier !== undefined && L.goutallier !== "" && Number(L.goutallier) > 0) {
        const g = GOUTALLIER.find(x => x.id === Number(L.goutallier));
        if (g) lines.push(`${t.name} kasında yağlı dejenerasyon (${g.label}: ${g.txt}).`);
      }
    });
    return {name: t.name, lines};
  });

  // Biceps
  const biceps = [];
  if (d.biceps_continuity === "intakt" && d.biceps_signal === "normal" && d.biceps_sheath === "yok" && (d.biceps_position==="normal" || !d.biceps_position)) {
    biceps.push("Biceps uzun başı tendonu bicipital olukta normal lokalizasyonda, sinyal ve konturu korunmuştur.");
  } else {
    if (d.biceps_signal === "artmis") biceps.push("Biceps uzun başı tendonunda sinyal artışı ve kalınlaşma (tendinopati) izlenmektedir.");
    if (d.biceps_sheath === "minimal") biceps.push("Biceps kılıfında minimal sıvı.");
    else if (d.biceps_sheath === "belirgin") biceps.push("Biceps kılıfında belirgin sıvı (tenosinovit ile uyumlu).");
    if (d.biceps_continuity === "parsiyel") biceps.push("Biceps uzun başı tendonunda parsiyel yırtık alanları seçilmektedir.");
    else if (d.biceps_continuity === "tam") {
      biceps.push("Biceps uzun başı tendonunda tam kat yırtık; tendon bicipital oluktan kaybolmuştur.");
      if (d.biceps_popeye === "evet") biceps.push("Distalde kas karnında retraksiyon (Popeye işareti) izlenmektedir.");
    }
    if (d.biceps_position === "sublukse") biceps.push("Biceps uzun başı tendonu bicipital olukta medial subluksasyon göstermektedir.");
    else if (d.biceps_position === "dislok_med") biceps.push("Biceps uzun başı tendonu medial dislokasyon göstermiş; bicipital oluk boş izlenmektedir.");
  }

  // Labrum
  const labrum = [];
  if (!labralTears || labralTears.length === 0) {
    labrum.push("Glenoid labrumda sinyal ve morfoloji tüm kadranlarda korunmuştur.");
  } else {
    labralTears.forEach(L => {
      const q = LABRAL_QUADRANTS.find(x => x.id === L.quadrant);
      const qn = q ? q.name.toLowerCase() : "lokalize";
      if (L.category === "slap") {
        const t = SLAP_TYPES.find(x => x.id === L.subtype);
        labrum.push(`Süperior labrumda ${t ? `${t.name} (${t.txt})` : "SLAP lezyonu"} izlenmektedir.`);
      } else if (L.category === "ant") {
        const t = ANT_LABRAL_VARIANTS.find(x => x.id === L.subtype);
        labrum.push(`Anteroinferior labrumda ${t ? `${t.name}: ${t.txt}` : "anterior labral yırtık"} izlenmektedir.`);
      } else if (L.category === "post") {
        const t = POST_LABRAL_VARIANTS.find(x => x.id === L.subtype);
        labrum.push(`Posterior labrumda ${t ? `${t.name}: ${t.txt}` : "posterior labral yırtık"} izlenmektedir.`);
      } else if (L.category === "simple") {
        labrum.push(`${q ? q.name : "İlgili"} kadranda labral yırtık/dejenerasyon sinyali izlenmektedir.`);
      }
      if (L.paralabralCyst) {
        labrum.push(`Eşlik eden paralabral kist (${qn} yerleşimli) izlenmektedir.`);
      }
    });
  }

  // Ligamanlar
  const lig = [];
  if (d.ighl_torn === "evet") lig.push("İnferior glenohumeral ligaman (IGHL) devamlılığında bozulma izlenmektedir.");
  if (d.mghl_abn === "evet") lig.push("Orta glenohumeral ligaman (MGHL) sinyal değişikliği göstermektedir.");
  if (d.sghl_abn === "evet") lig.push("Süperior glenohumeral ligaman (SGHL) anormalliği izlenmektedir.");
  if (d.chl_thickening === "evet") lig.push("Korakohumeral ligaman kalınlaşmıştır (>4 mm); adeziv kapsülit bulgusu.");
  if (d.rotator_interval === "silinmis") lig.push("Rotator interval yağ dokusu silinmiş ve T2 sinyal artışı izlenmektedir.");
  if (d.post_capsule_lax === "evet") lig.push("Posterior kapsül laksitesi mevcuttur.");
  if (lig.length === 0) lig.push("Glenohumeral ligamanlar ve kapsüler yapılar normal sınırlardadır.");

  // Kıkırdak
  const cart = [];
  if (d.cartilage_gh === "normal" || !d.cartilage_gh) cart.push("Glenohumeral eklem kıkırdağı korunmuştur.");
  else if (d.cartilage_gh === "hafif") cart.push("Glenohumeral eklem kıkırdağında hafif incelme/fibrilasyon.");
  else if (d.cartilage_gh === "orta") cart.push("Glenohumeral eklem kıkırdağında orta derecede kayıp.");
  else if (d.cartilage_gh === "belirgin") cart.push("Glenohumeral eklem kıkırdağında belirgin kayıp.");
  if (d.subchondral_change === "evet") cart.push("Subkondral kemikte skleroz ve kistik değişiklikler izlenmektedir.");
  if (d.gh_osteofit === "evet") cart.push("Glenohumeral eklem kenarlarında osteofitler mevcuttur.");
  if (d.gh_narrow === "evet") cart.push("Glenohumeral eklem aralığında daralma izlenmektedir.");

  // Efüzyon & bursa
  const fluidLines = [];
  const effMap = {"yok":"Glenohumeral eklemde efüzyon izlenmemektedir.",
    "minimal":"Glenohumeral eklemde minimal miktarda efüzyon.",
    "orta":"Glenohumeral eklemde orta miktarda efüzyon.",
    "belirgin":"Glenohumeral eklemde belirgin miktarda efüzyon."};
  fluidLines.push(effMap[d.effusion_amount] || effMap["yok"]);
  if (d.axillary_thickening === "evet") fluidLines.push("Aksiller reseste kapsüler kalınlaşma (>4 mm) izlenmektedir.");
  const bursaMap = {"yok":"Subakromial-subdeltoid bursada sıvı izlenmemektedir.",
    "minimal":"Subakromial-subdeltoid bursada minimal sıvı.",
    "orta":"Subakromial-subdeltoid bursada orta miktarda sıvı (bursit ile uyumlu).",
    "belirgin":"Subakromial-subdeltoid bursada belirgin sıvı (bursit)."};
  fluidLines.push(bursaMap[d.bursa_effusion] || bursaMap["yok"]);
  if (d.bursa_wall === "kalin") fluidLines.push("Bursal duvarda kalınlaşma.");
  if (d.post_contrast_enh === "sinovit") fluidLines.push("Kontrast sonrası yaygın sinoviyal boyanma (sinovit).");
  else if (d.post_contrast_enh === "bursal") fluidLines.push("Kontrast sonrası bursal duvarsal boyanma.");
  else if (d.post_contrast_enh === "fokal") fluidLines.push("Kontrast sonrası fokal boyanma izlenmektedir.");

  // Kas & diğer
  const muscle = [];
  RC_TENDONS.forEach(t => {
    const L = (lesions||[]).filter(l => l.tendon === t.id && l.goutallier !== undefined && l.goutallier !== "" && Number(l.goutallier)>0)[0];
    if (L) {
      const g = GOUTALLIER.find(x => x.id === Number(L.goutallier));
      muscle.push(`${t.name} kası: ${g.label} (${g.txt}).`);
    }
  });
  if (d.deltoid_abn === "evet") muscle.push("Deltoid kasında sinyal değişikliği izlenmektedir.");
  if (d.quadrilateral_space === "evet") muscle.push("Kuadrilateral bölgede teres minor kası denervasyon bulguları (ödem/atrofi); kuadrilateral bölge sendromu düşünülmelidir.");
  if (d.infraspinatus_denerv === "evet") muscle.push("İnfraspinatus kasında denervasyon paterni (ödem ve/veya atrofi); suprascapular nöropati açısından değerlendirilmelidir.");
  if (muscle.length === 0) muscle.push("Rotator manşet kas kompleksinde sinyal ve volüm doğaldır.");

  // Paralabral kist
  const cyst = [];
  if (d.paralabral_cyst === "spinoglenoid") cyst.push("Spinoglenoid çentikte paralabral kist; suprascapular sinire bası yapabilir.");
  else if (d.paralabral_cyst === "suprascapular") cyst.push("Suprascapular çentikte paralabral kist.");
  else if (d.paralabral_cyst === "diger") cyst.push("Labrum komşuluğunda paralabral kist izlenmektedir.");

  // Diğer
  const other = [];
  if (d.synovial_hemosiderin === "evet") other.push("Sinoviyal kalınlaşma içinde tüm sekanslarda hipointens alanlar (hemosiderin); PVNS açısından düşündürücüdür.");
  if (d.blooming === "evet") other.push("GRE sekansta belirgin blooming artefaktı.");
  if (d.calcification_present === "evet" && !(lesions||[]).some(l=>l.calcific)) other.push("Manşet tendonunda kalsifik fokus izlenmektedir.");
  if (d.mass_present === "evet") other.push("Periartiküler/eklem içi yer kaplayıcı lezyon izlenmekte olup ileri değerlendirme önerilir.");
  if (d.periarticular_edema === "evet") other.push("Periartiküler yumuşak doku ödemi/inflamatuar değişiklikler mevcuttur.");
  if (d.freetext && d.freetext.trim()) other.push(d.freetext.trim());

  /* ====== YORUM ====== */
  const topScores = [...scores].sort((a,b) => b.score - a.score).filter(s => s.score >= 15);
  let yorum = "";
  if (topScores.length === 0) {
    yorum = `${sides} omuz MRG incelemede belirgin patoloji saptanmamıştır. Klinik bulgular eşliğinde değerlendirilmesi önerilir.`;
  } else {
    const top = topScores[0];
    const name = PATHO.find(p => p.key === top.key)?.name || top.key;
    const parts = [];
    parts.push(`${sides} omuz MRG'de en olası tanı: ${name} (uyum %${top.score}).`);
    if (topScores.length >= 2) {
      const others = topScores.slice(1,3).map(s => `${PATHO.find(p=>p.key===s.key)?.name} (%${s.score})`).join(", ");
      parts.push(`Ayırıcı tanıda ayrıca ${others} göz önünde bulundurulmalıdır.`);
    }
    // Patoloji özgü yorum cümleleri
    if (top.key === "massive_rct") parts.push("Masif rotator manşet yırtığı mevcut olup cerrahi değerlendirme (tendon transferi veya ters omuz artroplastisi) planı açısından MSK ortopedi konsültasyonu önerilir.");
    else if (top.key === "supra_full") parts.push("Supraspinatus tam kat yırtığı mevcut olup kas yağlı dejenerasyon durumu ve retraksiyon derecesi cerrahi onarılabilirlik açısından önemlidir.");
    else if (top.key === "frozen") parts.push("Adeziv kapsülit bulguları mevcuttur. Aktif hareket kısıtlılığı ve ağrı ile birlikte klinik korelasyon önerilir.");
    else if (top.key === "bankart" || top.key === "bony_bankart" || top.key === "alpsa") parts.push("Anterior glenohumeral instabilite bulguları mevcuttur. Glenoid kemik kaybı oranı ve Hill-Sachs lezyonu boyutu, artroskopik Bankart onarımı ile kemik augmentasyonu (Latarjet) arasında seçim yapılmasında belirleyicidir.");
    else if (top.key === "slap") parts.push("SLAP lezyonu bulguları mevcuttur. Biseps ankoru ile ilişki ve paralabral kist varlığı operatif planı etkileyebilir.");
    else if (top.key === "calc_tendinit") parts.push("Kalsifik tendinit bulguları mevcuttur. Tedavi (barbotaj, perkütan aspirasyon) planlaması için klinik evre değerlendirilmelidir.");
    else if (top.key === "avn") parts.push("Humerus başı avasküler nekrozu açısından ileri evreleme (Ficat-Arlet), risk faktörü sorgulaması ve erken ortopedi konsültasyonu önerilir.");
    else if (top.key === "septic") parts.push("Septik artrit şüphesi acil değerlendirme gerektirir; eklem aspirasyonu ve kültür planlanmalıdır.");
    else if (top.key === "paralab_cyst") parts.push("Paralabral kist, altta yatan labral yırtığa sekonder olup nöropatik semptomların (suprascapular sinir) değerlendirilmesi gerekir.");
    yorum = parts.join(" ");
  }

  return {
    headerInfo: {
      side: sides,
      age: d.age || "",
      sex: d.sex || "",
      date: today,
      clinical: d.clinical || "",
    },
    seq,
    bone, acromion, rcSections, biceps, labrum, lig, cart, fluidLines, muscle, cyst, other,
    yorum,
    topScores,
  };
}

/* ============ ANA UYGULAMA ============ */

function App() {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    side:"", age:"", sex:"", clinical:"", trauma:"",
    seq_t1:true, seq_t2:true, seq_pd:true, seq_stir:false, seq_fs:true, seq_artro:false, seq_post:false,
    acromion_type:"", os_acromiale:"", acromio_humeral:"",
    ac_osteofit:"", ac_arthrosis:"", ac_hypertrophy:"", ac_osteophyte:"", ac_edema:"", ac_narrow:"",
    greater_tub_edema:"", lesser_tub_edema:"", hill_sachs:"", hill_sachs_size:"",
    rev_hill_sachs:"", glenoid_bone_loss:"", glenoid_bone_loss_severity:"",
    avn_marrow_change:"", avn_double_line:"", avn_collapse:"", avn_risk:"",
    supra_thick:"", supra_thin:"", supra_location:"",
    calcification_present:"", calcific_edema:"",
    biceps_signal:"", biceps_sheath:"", biceps_continuity:"intakt", biceps_popeye:"", biceps_position:"normal",
    sghl_abn:"", mghl_abn:"", ighl_torn:"", chl_thickening:"", rotator_interval:"",
    cartilage_gh:"", subchondral_change:"", gh_osteofit:"", gh_narrow:"",
    effusion_amount:"", bursa_effusion:"", bursa_wall:"", post_contrast_enh:"",
    axillary_thickening:"",
    dislocation_hx:"", post_dislocation_hx:"", post_capsule_lax:"",
    labral_degen:"",
    paralabral_cyst:"", infraspinatus_denerv:"", deltoid_abn:"", quadrilateral_space:"",
    synovial_hemosiderin:"", blooming:"", hemarthros:"", septic_erosion:"", periarticular_edema:"",
    clinical_frozen:"", clinical_septic:"",
    cuff_arthropathy:"",
    mass_present:"",
    freetext:"",
    // loops
    labralTears: [],
  });
  const [lesions, setLesions] = useState([]);      // rotator cuff
  const [lesionIdx, setLesionIdx] = useState(-1);
  const [lesionSub, setLesionSub] = useState(0);
  const [labralIdx, setLabralIdx] = useState(-1);
  const [labralSub, setLabralSub] = useState(0);
  const [showReport, setShowReport] = useState(false);

  const TOTAL_STEPS = 22;
  const update = (k,v) => setData(d => ({...d, [k]:v}));

  /* ==== Lezyon loop yardımcıları ==== */
  const RC_SUBSTEPS = 5; // 0:tendon,1:konum,2:kontinüite,3:parsiyel/tam detay,4:goutallier+kalsifik
  const LAB_SUBSTEPS = 3; // 0:kadran,1:kategori,2:subtype+cyst

  function startRCLesion() {
    const L = { id: Date.now(), tendon:"", location:"", continuity:"", partial_face:"", partial_thickness:"", full_size:"", retraction:null, goutallier:"", calcific:false };
    setLesions(ls => [...ls, L]);
    setLesionIdx(lesions.length);
    setLesionSub(0);
  }
  function updateCurrentLesion(patch) {
    setLesions(ls => ls.map((L,i) => i===lesionIdx ? {...L, ...patch} : L));
  }
  function finalizeRCLesion() {
    setLesionIdx(-1);
    setLesionSub(0);
  }
  function removeLesion(i) {
    setLesions(ls => ls.filter((_,j) => j!==i));
  }

  function startLabralTear() {
    const L = { id: Date.now(), quadrant:"", category:"", subtype:"", paralabralCyst:false };
    const newArr = [...(data.labralTears||[]), L];
    update("labralTears", newArr);
    setLabralIdx(newArr.length - 1);
    setLabralSub(0);
  }
  function updateCurrentLabral(patch) {
    update("labralTears", (data.labralTears||[]).map((L,i)=> i===labralIdx ? {...L, ...patch} : L));
  }
  function finalizeLabralTear() {
    setLabralIdx(-1);
    setLabralSub(0);
  }
  function removeLabral(i) {
    update("labralTears", (data.labralTears||[]).filter((_,j)=> j!==i));
  }

  /* ==== Skorlama ==== */
  const scores = useMemo(() => {
    const F = buildFeatureMap(data, lesions);
    return computeScores(F);
  }, [data, lesions]);

  /* ==== Navigasyon ==== */
  function canNext() {
    if (step === 0) return !!data.side && !!data.age && !!data.sex;
    if (step === 7 && lesionIdx !== -1) {
      const L = lesions[lesionIdx];
      if (!L) return false;
      if (lesionSub === 0) return !!L.tendon;
      if (lesionSub === 1) return !!L.location;
      if (lesionSub === 2) return !!L.continuity;
      if (lesionSub === 3) {
        if (L.continuity === "partial") return !!L.partial_face;
        if (L.continuity === "full")    return !!L.full_size && L.retraction !== null;
        return true;
      }
      if (lesionSub === 4) return true;
    }
    if (step === 9 && labralIdx !== -1) {
      const L = (data.labralTears||[])[labralIdx];
      if (!L) return false;
      if (labralSub === 0) return !!L.quadrant;
      if (labralSub === 1) return !!L.category;
      if (labralSub === 2) {
        if (L.category === "simple") return true;
        return !!L.subtype;
      }
    }
    return true;
  }

  function goNext() {
    // Rotator cuff lezyon loop
    if (step === 7 && lesionIdx !== -1) {
      if (lesionSub < RC_SUBSTEPS - 1) { setLesionSub(s => s+1); return; }
      // son altstep — bitir
      finalizeRCLesion();
      return;
    }
    // Labral tear loop
    if (step === 9 && labralIdx !== -1) {
      if (labralSub < LAB_SUBSTEPS - 1) { setLabralSub(s => s+1); return; }
      finalizeLabralTear();
      return;
    }
    if (step < TOTAL_STEPS - 1) setStep(s => s+1);
    else setShowReport(true);
  }

  function goPrev() {
    // Lezyon loop içindeyken
    if (step === 7 && lesionIdx !== -1) {
      if (lesionSub > 0) { setLesionSub(s => s-1); return; }
      // en baş altstepteyiz — lezyon kaldırılmış sayılır
      setLesions(ls => ls.filter((_,i)=> i!==lesionIdx));
      setLesionIdx(-1);
      setLesionSub(0);
      return;
    }
    if (step === 9 && labralIdx !== -1) {
      if (labralSub > 0) { setLabralSub(s => s-1); return; }
      update("labralTears", (data.labralTears||[]).filter((_,i)=> i!==labralIdx));
      setLabralIdx(-1);
      setLabralSub(0);
      return;
    }
    if (step > 0) setStep(s => s-1);
  }

  /* ==== Export ==== */
  function copyReportText() {
    const el = document.getElementById("report-text-content");
    if (!el) return;
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try { document.execCommand("copy"); alert("Rapor panoya kopyalandı."); }
    catch(e) { alert("Kopyalama başarısız."); }
    sel.removeAllRanges();
  }
  function downloadHTML() {
    const el = document.querySelector(".report-wrap");
    if (!el) return;
    const html = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Omuz MRG Raporu</title><style>
      body{font-family:"Times New Roman",serif;max-width:800px;margin:20px auto;padding:20px;color:#111;background:white}
      .rbox{border:1.5px solid #0f172a;border-radius:6px;margin:10px 0}
      .rbox-head{background:#0f172a;color:white;padding:5px 12px;font-weight:700;font-size:13px;letter-spacing:.5px;font-family:Arial,sans-serif;border-radius:5px 5px 0 0}
      .rbox-head.teal{background:#0f766e} .rbox-head.amber{background:#b45309} .rbox-head.slate{background:#334155}
      .rbox-body{padding:8px 14px}
      .zrow{display:grid;grid-template-columns:170px 1fr;padding:5px 10px;font-size:13px}
      .zrow:nth-child(odd){background:#f1f5f9} .zrow:nth-child(even){background:white}
      .zrow .zk{font-weight:700;color:#0f172a;font-family:Arial,sans-serif;font-size:12.5px}
      .zbullet{padding:4px 10px;margin:2px 0;font-size:13px}
      .zbullet:nth-child(odd){background:#f1f5f9} .zbullet:nth-child(even){background:white}
      .yorum{background:#fef3c7;border-left:5px solid #f59e0b;border-radius:0 6px 6px 0;padding:12px 18px;margin:14px 0}
      .yorum b{display:block;margin-bottom:6px;color:#78350f;text-transform:uppercase;font-family:Arial,sans-serif;font-size:13px}
      h2{text-align:center;border-bottom:3px double #0f172a;padding-bottom:10px}
      .sig{margin-top:22px;text-align:right;font-size:12.5px;color:#475569;border-top:1px solid #cbd5e1;padding-top:10px}
    </style></head><body>${el.innerHTML}</body></html>`;
    const blob = new Blob([html], {type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `omuz-mrg-raporu-${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 100);
  }
  function printReport() { window.print(); }

    // Step 2 — Akromion & AC
    if (step === 2) return <>
      <h3 className="sec">Akromion Morfolojisi</h3>

        </div>
      </div>
      <h3 className="sec amber">Akromioklaviküler Eklem</h3>
      <div className="grid grid-2">
        <ChkBox selected={d.ac_osteofit==="evet"} onClick={()=>update("ac_osteofit", d.ac_osteofit==="evet" ? "yok":"evet")}>Osteofit formasyonu</ChkBox>
        <ChkBox selected={d.ac_arthrosis==="evet"} onClick={()=>update("ac_arthrosis", d.ac_arthrosis==="evet" ? "yok":"evet")}>Eklem içi dejeneratif değişiklik</ChkBox>

        <ChkBox selected={d.ac_osteophyte==="evet"} onClick={()=>update("ac_osteophyte", d.ac_osteophyte==="evet" ? "yok":"evet")}>İnferior osteofit uzanımı</ChkBox>
        <ChkBox selected={d.ac_edema==="evet"} onClick={()=>update("ac_edema", d.ac_edema==="evet" ? "yok":"evet")}>AC eklemde kemik iliği ödemi</ChkBox>
        <ChkBox selected={d.ac_narrow==="evet"} onClick={()=>update("ac_narrow", d.ac_narrow==="evet" ? "yok":"evet")}>Eklem aralığında daralma</ChkBox>
      </div>
    </>;

    // Step 3 — Kemik
    if (step === 3) return <>
      <h3 className="sec">Kemik İliği ve Morfoloji</h3>
      <div className="grid grid-2">
        <div className="field"><label>Büyük tüberkül kemik iliği ödemi</label>

            <OptBox selected={d.greater_tub_edema==="yok"} onClick={()=>update("greater_tub_edema","yok")}>Yok</OptBox>

          </div>
        </div>

          <div className="grid grid-2">
            <OptBox selected={d.lesser_tub_edema==="yok"} onClick={()=>update("lesser_tub_edema","yok")}>Yok</OptBox>
            <OptBox selected={d.lesser_tub_edema==="evet"} onClick={()=>update("lesser_tub_edema","evet")}>Var</OptBox>
          </div>
        </div>
      </div>
      <h3 className="sec amber">Humerus Başı Avasküler Nekroz Değerlendirmesi</h3>
      <div className="grid grid-2">
        <div className="field"><label>Subkondral kemik iliği sinyal değişikliği</label>
          <div className="grid grid-2">
            <OptBox selected={d.avn_marrow_change==="yok"} onClick={()=>update("avn_marrow_change","yok")}>Yok</OptBox>
            <OptBox selected={d.avn_marrow_change==="evet"} onClick={()=>update("avn_marrow_change","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Çift çizgi işareti (T2)</label>
          <div className="grid grid-2">
            <OptBox selected={d.avn_double_line==="yok"} onClick={()=>update("avn_double_line","yok")}>Yok</OptBox>
            <OptBox selected={d.avn_double_line==="evet"} onClick={()=>update("avn_double_line","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Subkondral kollaps</label>
          <div className="grid grid-2">
            <OptBox selected={d.avn_collapse==="yok"} onClick={()=>update("avn_collapse","yok")}>Yok</OptBox>
            <OptBox selected={d.avn_collapse==="evet"} onClick={()=>update("avn_collapse","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>AVN için risk faktörü (steroid/alkol/vs.)</label>
          <div className="grid grid-2">
            <OptBox selected={d.avn_risk==="yok"} onClick={()=>update("avn_risk","yok")}>Yok</OptBox>
            <OptBox selected={d.avn_risk==="evet"} onClick={()=>update("avn_risk","evet")}>Var</OptBox>
          </div>
        </div>
      </div>
    </>;

    // Step 4 — Hill-Sachs / Bony Bankart / Reverse
    if (step === 4) return <>
      <h3 className="sec">Hill-Sachs Lezyonu</h3>
      <div className="field"><label>Humerus başı posterolateralinde kompresyon defekti</label>
        <div className="grid grid-2">
          <OptBox selected={d.hill_sachs==="yok"} onClick={()=>update("hill_sachs","yok")}>Yok</OptBox>
          <OptBox selected={d.hill_sachs==="evet"} onClick={()=>update("hill_sachs","evet")} amber>Var</OptBox>
        </div>
      </div>
      {d.hill_sachs==="evet" && <div className="field"><label>Defekt boyutu</label>
        <div className="grid grid-2">
          <OptBox selected={d.hill_sachs_size==="kucuk"} onClick={()=>update("hill_sachs_size","kucuk")}>Küçük (&lt;12 mm)</OptBox>
          <OptBox selected={d.hill_sachs_size==="buyuk"} onClick={()=>update("hill_sachs_size","buyuk")} amber>Büyük (≥12 mm, engage edici olabilir)</OptBox>
        </div>
      </div>}

      <h3 className="sec">Glenoid Kemik Kaybı (Bony Bankart)</h3>
      <div className="field"><label>Anteroinferior glenoid kemik kaybı / fraktür</label>
        <div className="grid grid-2">
          <OptBox selected={d.glenoid_bone_loss==="yok"} onClick={()=>update("glenoid_bone_loss","yok")}>Yok</OptBox>
          <OptBox selected={d.glenoid_bone_loss==="evet"} onClick={()=>update("glenoid_bone_loss","evet")} amber>Var</OptBox>
        </div>
      </div>
      {d.glenoid_bone_loss==="evet" && <div className="field"><label>Kemik kaybı şiddeti</label>
        <div className="grid grid-3">
          <OptBox selected={d.glenoid_bone_loss_severity==="hafif"} onClick={()=>update("glenoid_bone_loss_severity","hafif")}>Hafif (&lt;10%)</OptBox>
          <OptBox selected={d.glenoid_bone_loss_severity==="orta"} onClick={()=>update("glenoid_bone_loss_severity","orta")}>Orta (10-20%)</OptBox>
          <OptBox selected={d.glenoid_bone_loss_severity==="ciddi"} onClick={()=>update("glenoid_bone_loss_severity","ciddi")} amber>Ciddi (&gt;20%)</OptBox>
        </div>
      </div>}

      <h3 className="sec amber">Reverse Hill-Sachs (McLaughlin)</h3>
      <div className="field"><label>Humerus başı anteromedialinde kompresyon defekti</label>
        <div className="grid grid-2">
          <OptBox selected={d.rev_hill_sachs==="yok"} onClick={()=>update("rev_hill_sachs","yok")}>Yok</OptBox>
          <OptBox selected={d.rev_hill_sachs==="evet"} onClick={()=>update("rev_hill_sachs","evet")} amber>Var (konvülziyon/elektrik şok öyküsü sorgulanır)</OptBox>

    // Step 5 — Supraspinatus ön değerlendirme + kalsifikasyon
    if (step === 5) return <>
      <h3 className="sec">Supraspinatus Genel Değerlendirme</h3>
      <div className="hint">Sonraki adımda her tendon için ayrı ayrı lezyon ekleyeceksiniz. Bu adım genel morfolojik ön değerlendirmedir.</div>
      <div className="grid grid-2">
        <div className="field"><label>Tendon kalınlaşması / heterojenite</label>
          <div className="grid grid-2">
            <OptBox selected={d.supra_thick==="yok"} onClick={()=>update("supra_thick","yok")}>Yok</OptBox>
            <OptBox selected={d.supra_thick==="evet"} onClick={()=>update("supra_thick","evet")}>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Tendon yüksekliğinde azalma</label>
          <div className="grid grid-2">
            <OptBox selected={d.supra_thin==="yok"} onClick={()=>update("supra_thin","yok")}>Yok</OptBox>
            <OptBox selected={d.supra_thin==="evet"} onClick={()=>update("supra_thin","evet")}>Var</OptBox>
          </div>
        </div>
      </div>

      <h3 className="sec amber">Kalsifik Tendinit Değerlendirmesi</h3>
      <div className="grid grid-2">
        <div className="field"><label>Tendonda kalsifik fokus</label>
          <div className="grid grid-2">
            <OptBox selected={d.calcification_present==="yok"} onClick={()=>update("calcification_present","yok")}>Yok</OptBox>
            <OptBox selected={d.calcification_present==="evet"} onClick={()=>update("calcification_present","evet")} amber>Var</OptBox>
          </div>
        </div>
        <div className="field"><label>Kalsifikasyon çevresi ödem (rezorpsiyon fazı)</label>
          <div className="grid grid-2">
            <OptBox selected={d.calcific_edema==="yok"} onClick={()=>update("calcific_edema","yok")}>Yok</OptBox>
            <OptBox selected={d.calcific_edema==="evet"} onClick={()=>update("calcific_edema","evet")}>Var</OptBox>
          </div>
        </div>
      </div>
      <div className="field"><label>Manşet artropatisi bulguları (süperior humeral migrasyon, kronik yırtık)</label>
        <div className="grid grid-2">
          <OptBox selected={d.cuff_arthropathy==="yok"} onClick={()=>update("cuff_arthropathy","yok")}>Yok</OptBox>
          <OptBox selected={d.cuff_arthropathy==="evet"} onClick={()=>update("cuff_arthropathy","evet")}>Var</OptBox>
        </div>
      </div>
    </>;

    // Step 6 — Manşet loop girişi
    if (step === 6) return <>
      <h3 className="sec">Rotator Manşet Lezyonları</h3>
      <div className="hint">Her patolojik bulgu için ayrı lezyon ekleyin (aynı tendon içinde birden fazla yerleşim varsa ayrı lezyon olarak kaydedebilirsiniz). Sonrasında &quot;Tendondan başka lezyon yok&quot; seçeneği ile devam edin.</div>
      {lesions.length > 0 && <div>
        <h3 className="sec amber">Kaydedilen Lezyonlar</h3>
        {lesions.map((L,i) => {
          const t = RC_TENDONS.find(x => x.id === L.tendon);
          return <div key={L.id} className="lesion-card">
            <div className="lesion-head">
              <div className="lesion-title">Lezyon #{i+1} — {t ? t.name : "(tendon seçilmedi)"}</div>
              <button className="btn btn-sm" onClick={()=>removeLesion(i)}>Sil</button>
            </div>
            <div>
              {L.continuity === "tendinop" && <span className="chip chip-teal">Tendinopati</span>}
              {L.continuity === "partial" && <span className="chip chip-amber">Parsiyel yırtık</span>}
              {L.continuity === "full" && <span className="chip chip-red">Tam kat yırtık</span>}
              {L.calcific && <span className="chip chip-amber">Kalsifik</span>}
              {L.goutallier > 0 && <span className="chip chip-amber">Goutallier {L.goutallier}</span>}
            </div>
          </div>;
        })}
      </div>}
      <button className="btn btn-primary" onClick={()=>{setStep(7); startRCLesion();}}>+ Yeni Rotator Manşet Lezyonu Ekle</button>
