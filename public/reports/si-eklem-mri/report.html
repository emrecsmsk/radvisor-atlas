<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakroiliak Eklem MRI</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f14;--surf:#111820;--surf2:#192130;--surf3:#1e2a3a;
  --acc:#00c9e0;--acc2:#7ee8f5;--acc3:#c8f5fb;
  --txt:#e8f0fe;--txt2:#7a90a8;
  --suc:#22d9a0;--warn:#f5a623;--dan:#f05565;
  --brd:#1e2e42;
}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:20px 16px 48px}

/* Header */
.hdr{text-align:center;margin-bottom:28px;padding:24px 0 8px}
.hdr-icon{font-size:2rem;margin-bottom:8px}
.hdr h1{font-size:1.4rem;font-weight:800;letter-spacing:.4px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:.8rem;color:var(--txt2);margin-top:5px;letter-spacing:.3px}

/* Progress */
.prog-wrap{margin-bottom:22px}
.prog-bar-bg{background:var(--surf2);border-radius:8px;height:5px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:8px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-title{font-size:.75rem;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.8px}
.prog-pct{font-size:.75rem;color:var(--txt2)}

/* Card */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:24px;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-step{font-size:.7rem;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.card-step::after{content:'';flex:1;height:1px;background:var(--brd)}
.card h3{font-size:1.1rem;font-weight:700;color:var(--txt);margin-bottom:4px}
.card-sub{font-size:.82rem;color:var(--txt2);margin-bottom:18px;line-height:1.5}

/* Options */
.opts{display:flex;flex-direction:column;gap:7px}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.opt{background:var(--surf2);border:1.5px solid var(--brd);border-radius:9px;padding:11px 14px;cursor:pointer;transition:.18s;display:flex;align-items:flex-start;gap:10px;text-align:left;width:100%}
.opt:hover{border-color:var(--acc);background:var(--surf3)}
.opt.sel{border-color:var(--acc);background:rgba(0,201,224,.1)}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--txt2);flex-shrink:0;margin-top:1px;transition:.18s;position:relative}
.opt.sel .dot{border-color:var(--acc);background:var(--acc)}
.opt.sel .dot::after{content:'';position:absolute;top:3px;left:3px;width:6px;height:6px;border-radius:50%;background:#fff}
.opt-l{font-size:.9rem;font-weight:600;color:var(--txt)}
.opt-s{font-size:.75rem;color:var(--txt2);margin-top:2px}
.opt.sel .opt-l{color:var(--acc3)}

/* Grid layout for klinik step */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field-label{font-size:.75rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}

/* Buttons */
.btns{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:9px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;transition:.18s;letter-spacing:.2px}
.btn-pri{background:var(--acc);color:#0b0f14}
.btn-pri:hover{background:var(--acc2);transform:translateY(-1px)}
.btn-sec{background:var(--surf2);color:var(--txt);border:1.5px solid var(--brd)}
.btn-sec:hover{border-color:var(--acc);color:var(--acc)}
.btn-suc{background:var(--suc);color:#0b0f14}
.btn-suc:hover{filter:brightness(1.1)}
.btn-dan{background:rgba(240,85,101,.15);color:var(--dan);border:1px solid var(--dan)}

/* Side badges */
.sbadge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.7rem;font-weight:800;letter-spacing:.3px;vertical-align:middle;margin-left:4px}
.sb-sag{background:rgba(0,201,224,.18);color:var(--acc2)}
.sb-sol{background:rgba(34,217,160,.18);color:var(--suc)}
.sb-bil{background:rgba(245,166,35,.18);color:var(--warn)}

/* Report section headers */
.sec-hdr{font-size:.7rem;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:6px}

/* Report table */
.rep-tbl{width:100%;border-collapse:collapse;font-size:.86rem;border-radius:8px;overflow:hidden}
.rep-tbl td{padding:8px 12px;vertical-align:top;line-height:1.45}
.rep-tbl tr:nth-child(odd) td{background:var(--surf2)}
.rep-tbl tr:nth-child(even) td{background:var(--surf3)}
.rep-tbl td:first-child{font-weight:600;color:var(--txt2);width:42%;white-space:nowrap;font-size:.82rem}
.rep-tbl td:last-child{color:var(--txt)}

/* Differential */
.diff-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;margin-bottom:6px;background:var(--surf2);border:1px solid var(--brd)}
.diff-rank{font-size:.75rem;color:var(--txt2);width:18px;text-align:center;flex-shrink:0}
.diff-info{min-width:190px;flex-shrink:0}
.diff-name{font-size:.88rem;font-weight:700;color:var(--txt)}
.diff-bar-wrap{flex:1;background:var(--surf3);border-radius:4px;height:7px;overflow:hidden}
.diff-bar{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:4px;transition:width .7s .1s}
.diff-pct{font-size:.88rem;font-weight:800;color:var(--acc2);min-width:40px;text-align:right}
.kat-tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:.68rem;font-weight:700;margin-top:3px}
.kt-inf{background:rgba(0,201,224,.15);color:var(--acc2)}
.kt-enf{background:rgba(240,85,101,.15);color:var(--dan)}
.kt-dej{background:rgba(245,166,35,.15);color:var(--warn)}
.kt-onk{background:rgba(34,217,160,.15);color:var(--suc)}
.kt-trv{background:rgba(122,144,168,.15);color:var(--txt2)}
.kt-met{background:rgba(245,166,35,.12);color:var(--warn)}

/* YORUM */
.yorum{background:linear-gradient(135deg,rgba(0,201,224,.07),rgba(0,201,224,.03));border-left:3px solid var(--acc);border-radius:0 10px 10px 0;padding:14px 16px;margin-top:14px;font-size:.88rem;line-height:1.65;color:var(--txt)}
.yorum strong{color:var(--acc2)}

/* Lezyon list */
.lez-list{margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
.lez-card{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:10px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.lez-body h4{font-size:.82rem;font-weight:700;color:var(--acc2);margin-bottom:3px}
.lez-body p{font-size:.78rem;color:var(--txt2);line-height:1.4}
.lez-del{background:none;border:none;color:var(--dan);cursor:pointer;font-size:.8rem;flex-shrink:0;padding:2px 6px;opacity:.7}
.lez-del:hover{opacity:1}

/* Export row */
.exp-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;padding-top:18px;border-top:1px solid var(--brd)}

/* Print overlay */
#printOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9999;overflow:auto;padding:32px;color:#000}
@media print{body>*{display:none}#printOverlay{display:block !important;position:static}}
</style>
</head>

const RAPOR_STEP = 21;
const LEZ_STEPS_COUNT = 6;

function scoreAll(d){
  return PATHO_DB.map(p=>({
    ...p,
    ad: T.patho[p.id].ad,
    kat: T.patho[p.id].kat,
    s: p.puan(d)
  })).filter(p=>p.s>0).sort((a,b)=>b.s-a.s).slice(0,8);
}

function Opt({label, sub, sel, onClick}){
  return <div className={'opt'+(sel?' sel':'')} onClick={onClick}>
    <div className="dot"/>
    <div style={{flex:1}}>
      <div className="opt-l">{label}</div>
      {sub && <div className="opt-s">{sub}</div>}
    </div>
  </div>;
}

function ProgBar({v}){
  return <div style={{flex:1,background:'var(--surf3)',borderRadius:4,height:7,overflow:'hidden'}}>
    <div style={{width:v+'%',height:'100%',background:'linear-gradient(90deg,var(--acc),var(--acc2))',borderRadius:4,transition:'width .7s .1s'}}/>
  </div>;
}

/* ═══════════════════════════════════════════════════
   REPORT TEXT BUILDER
═══════════════════════════════════════════════════ */
function buildReportText(d, lez, results){
  const Lk = (map,k) => map[k]||k||'—';
  const m = T.txtMaps;

  let lines = [];
  lines.push(T.txtReportHeader);
  lines.push('─'.repeat(48));
  lines.push(`${T.txtSide}: ${d.taraf==='bilateral'?T.txtSideBilateral:d.taraf==='sag'?T.txtSideRight:T.txtSideLeft}`);
  if(d.taraf==='bilateral'||d.taraf==='sag') lines.push(`${T.txtRightJoint}: ${Lk(m.eklem,d.sagEklemAraligi)}`);
  if(d.taraf==='bilateral'||d.taraf==='sol') lines.push(`${T.txtLeftJoint}: ${Lk(m.eklem,d.solEklemAraligi)}`);
  lines.push(`${T.txtBme}: ${Lk(m.oem,d.kemikOdem)}${m.oemS[d.kemikOdemSiddet]||''}`);
  lines.push(`${T.txtT1}: ${Lk(m.t1,d.t1Sinyal)}`);
  lines.push(`${T.txtErozyon}: ${Lk(m.er,d.erozyon)}`);
  lines.push(`${T.txtSkleroz}: ${Lk(m.skl,d.skleroz)}`);
  lines.push(`${T.txtKontrast}: ${Lk(m.knt,d.kontrast)}`);
  lines.push(`${T.txtSinoviyal}: ${Lk(m.siv,d.sinovyalSivi)}`);
  lines.push(`${T.txtAnkiloz}: ${Lk(m.ank,d.ankiloz)}`);
  lines.push(`${T.txtYumusak}: ${Lk(m.ys,d.yumusak)}`);
  lines.push(`DWI: ${Lk(m.dwi,d.dwi)}`);
  if(lez.length>0){
    lines.push('');
    lines.push(T.txtFokalLezyonlar);
    lez.forEach((l,i)=>{ lines.push(T.txtLezLine(i, l)); });
  }
  lines.push('');
  lines.push('─'.repeat(48));
  lines.push(T.txtDiffTitle);
  results.forEach((r,i)=>lines.push(`  ${i+1}. ${r.ad} [${r.kat}]  ${r.s}%`));
  return lines.join('\n');
}

function App(){
  const [step, setStep] = useState(0);
  const [d, setD] = useState({
    yasGrubu:'',cinsiyet:'',klinik:'',hlab27:'',
    taraf:'bilateral',lateralite:'bilateral',
    sagEklemAraligi:'',solEklemAraligi:'',
    kemikOdem:'',kemikOdemSiddet:'',
    t1Sinyal:'',erozyon:'',skleroz:'',
    kontrast:'',sinovyalSivi:'',ankiloz:'',
    yumusak:'',dwi:'',fokalLezyon:'',
  });
  const [lezyonlar, setLezyonlar] = useState([]);
  const [curLez, setCurLez] = useState(null);
  const [lezStep, setLezStep] = useState(-1);

  const set = (k,v) => setD(p=>({...p,[k]:v}));
  const inLez = lezStep >= 0;

  useEffect(()=>{
    set('lateralite', d.taraf==='bilateral'?'bilateral':'tek');
  },[d.taraf]);

  function skipCheck(s){
    if(s===2 && d.taraf==='sol') return true;
    if(s===3 && d.taraf==='sag') return true;
    return false;
  }

  function goNext(){
    if(inLez){
      if(lezStep < LEZ_STEPS_COUNT-1){ setLezStep(s=>s+1); }
      else {
        setLezyonlar(p=>[...p,curLez]);
        setCurLez(null); setLezStep(-1);
        setStep(13);
      }
      return;
    }
    let nxt = step+1;
    while(nxt < RAPOR_STEP && skipCheck(nxt)) nxt++;
    setStep(nxt);
  }

  function goPrev(){
    if(inLez){
      if(lezStep > 0){ setLezStep(s=>s-1); }
      else { setCurLez(null); setLezStep(-1); setStep(13); }
      return;
    }
    let prv = step-1;
    while(prv > 0 && skipCheck(prv)) prv--;
    setStep(Math.max(0,prv));
  }

  function startLez(){
    setCurLez({lokalizasyon:'',boyut:'',t1t2:'',lezDwi:'',lezKontrast:'',komsuyapi:''});
    setLezStep(0);
    set('fokalLezyon','evet');
  }

  function setLez(k,v){ setCurLez(p=>({...p,[k]:v})); }

  const results = step>=RAPOR_STEP ? scoreAll(d) : [];

  const pct = inLez
    ? Math.round(((13+(lezStep+1)/LEZ_STEPS_COUNT)/RAPOR_STEP)*100)
    : Math.round((step/RAPOR_STEP)*100);

  const curStepName = inLez
    ? `${T.lezNames[0].replace(T.lezNames[0], T.lezNames[0])} ${lezyonlar.length+1} – ${T.lezNames[lezStep]}`
    : (T.stepNames[step]||T.reportLabel);

  // Simpler step name for lesion steps:
  const curStepNameFinal = inLez
    ? `${RV_LOCALE==='tr'?'Lezyon':'Lesion'} ${lezyonlar.length+1} – ${T.lezNames[lezStep]}`
    : (T.stepNames[step]||T.reportLabel);

  /* ─── RENDER ─── */
  function render(){
    if(step===RAPOR_STEP) return renderRapor();
    if(inLez) return renderLezStep();
    switch(step){
      case 0: return renderKlinik();
      case 1: return renderTaraf();
      case 2: return renderSagEklem();
      case 3: return renderSolEklem();
      case 4: return renderKemikOdem();
      case 5: return renderT1();
      case 6: return renderErozyon();
      case 7: return renderSkleroz();
      case 8: return renderKontrast();
      case 9: return renderSinoviyal();
      case 10: return renderAnkiloz();
      case 11: return renderYumusak();
      case 12: return renderDwi();
      case 13: return renderLezCheck();
      default: return null;
    }
  }

  /* ── Step 0 ── */
  function renderKlinik(){
    return <div className="card">
      <div className="card-step">{T.stepNames[0]}</div>
      <h3>{T.s0Title}</h3>
      <div className="card-sub">{T.s0Sub}</div>
      <div className="grid2">
        <div>
          <div className="field-label">{T.s0AgeLabel}</div>
          <div className="opts">
            {T.s0Age.map(([v,l,s])=>
              <Opt key={v} label={l} sub={s} sel={d.yasGrubu===v} onClick={()=>set('yasGrubu',v)}/>
            )}
          </div>
        </div>
        <div>
          <div className="field-label">{T.s0GenderLabel}</div>
          <div className="opts">
            {T.s0Gender.map(([v,l])=>
              <Opt key={v} label={l} sel={d.cinsiyet===v} onClick={()=>set('cinsiyet',v)}/>
            )}
          </div>
          <div className="field-label" style={{marginTop:14}}>{T.s0HlaLabel}</div>
          <div className="opts">
            {T.s0Hla.map(([v,l])=>
              <Opt key={v} label={l} sel={d.hlab27===v} onClick={()=>set('hlab27',v)}/>
            )}
          </div>
        </div>
        <div style={{gridColumn:'1/-1'}}>
          <div className="field-label">{T.s0KlinikLabel}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:7}}>
            {T.s0Klinik.map(([v,l,s])=>
              <Opt key={v} label={l} sub={s} sel={d.klinik===v} onClick={()=>set('klinik',v)}/>
            )}
          </div>
        </div>
      </div>
      <div className="btns">
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 1 ── */
  function renderTaraf(){
    return <div className="card">
      <div className="card-step">{T.stepNames[1]}</div>
      <h3>{T.s1Title}</h3>
      <div className="opts">
        <Opt label={<>{T.s1Bilateral} <span className="sbadge sb-bil">{T.badgeBilateral}</span></>} sub={T.s1BilateralSub} sel={d.taraf==='bilateral'} onClick={()=>set('taraf','bilateral')}/>
        <Opt label={<>{T.s1Right} <span className="sbadge sb-sag">{T.badgeRight}</span></>} sub={T.s1RightSub} sel={d.taraf==='sag'} onClick={()=>set('taraf','sag')}/>
        <Opt label={<>{T.s1Left} <span className="sbadge sb-sol">{T.badgeLeft}</span></>} sub={T.s1LeftSub} sel={d.taraf==='sol'} onClick={()=>set('taraf','sol')}/>
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 2 ── */
  function renderSagEklem(){
    return <div className="card">
      <div className="card-step">{T.stepNames[2]} — <span className="sbadge sb-sag">{T.s2StepLabel}</span></div>
      <h3>{T.s2Title}</h3>
      <div className="opts">
        {T.s2Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.sagEklemAraligi===v} onClick={()=>set('sagEklemAraligi',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 3 ── */
  function renderSolEklem(){
    return <div className="card">
      <div className="card-step">{T.stepNames[3]} — <span className="sbadge sb-sol">{T.s3StepLabel}</span></div>
      <h3>{T.s3Title}</h3>
      <div className="opts">
        {T.s3Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.solEklemAraligi===v} onClick={()=>set('solEklemAraligi',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 4 ── */
  function renderKemikOdem(){
    return <div className="card">
      <div className="card-step">{T.stepNames[4]}</div>
      <h3>{T.s4Title}</h3>
      <div className="card-sub">{T.s4Sub}</div>
      <div className="field-label">{T.s4LatLabel}</div>
      <div className="opts">
        {T.s4Lat.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.kemikOdem===v} onClick={()=>{set('kemikOdem',v);if(v==='yok')set('kemikOdemSiddet','');}}/>
        )}
      </div>
      {d.kemikOdem && d.kemikOdem!=='yok' && <>
        <div className="field-label" style={{marginTop:14}}>{T.s4SevLabel}</div>
        <div className="opts">
          {T.s4Sev.map(([v,l,s])=>
            <Opt key={v} label={l} sub={s} sel={d.kemikOdemSiddet===v} onClick={()=>set('kemikOdemSiddet',v)}/>
          )}
        </div>
      </>}
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 5 ── */
  function renderT1(){
    return <div className="card">
      <div className="card-step">{T.stepNames[5]}</div>
      <h3>{T.s5Title}</h3>
      <div className="opts">
        {T.s5Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.t1Sinyal===v} onClick={()=>set('t1Sinyal',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 6 ── */
  function renderErozyon(){
    return <div className="card">
      <div className="card-step">{T.stepNames[6]}</div>
      <h3>{T.s6Title}</h3>
      <div className="card-sub">{T.s6Sub}</div>
      <div className="opts">
        {T.s6Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.erozyon===v} onClick={()=>set('erozyon',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 7 ── */
  function renderSkleroz(){
    return <div className="card">
      <div className="card-step">{T.stepNames[7]}</div>
      <h3>{T.s7Title}</h3>
      <div className="opts">
        {T.s7Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.skleroz===v} onClick={()=>set('skleroz',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 8 ── */
  function renderKontrast(){
    return <div className="card">
      <div className="card-step">{T.stepNames[8]}</div>
      <h3>{T.s8Title}</h3>
      <div className="opts">
        {T.s8Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.kontrast===v} onClick={()=>set('kontrast',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 9 ── */
  function renderSinoviyal(){
    return <div className="card">
      <div className="card-step">{T.stepNames[9]}</div>
      <h3>{T.s9Title}</h3>
      <div className="opts">
        {T.s9Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.sinovyalSivi===v} onClick={()=>set('sinovyalSivi',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 10 ── */
  function renderAnkiloz(){
    return <div className="card">
      <div className="card-step">{T.stepNames[10]}</div>
      <h3>{T.s10Title}</h3>
      <div className="opts">
        {T.s10Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.ankiloz===v} onClick={()=>set('ankiloz',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 11 ── */
  function renderYumusak(){
    return <div className="card">
      <div className="card-step">{T.stepNames[11]}</div>
      <h3>{T.s11Title}</h3>
      <div className="opts">
        {T.s11Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.yumusak===v} onClick={()=>set('yumusak',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 12 ── */
  function renderDwi(){
    return <div className="card">
      <div className="card-step">{T.stepNames[12]}</div>
      <h3>{T.s12Title}</h3>
      <div className="opts">
        {T.s12Opts.map(([v,l,s])=>
          <Opt key={v} label={l} sub={s} sel={d.dwi===v} onClick={()=>set('dwi',v)}/>
        )}
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{T.btnNext}</button>
      </div>
    </div>;
  }

  /* ── Step 13 ── */
  function renderLezCheck(){
    return <div className="card">
      <div className="card-step">{T.stepNames[13]}</div>
      <h3>{T.s13Title}</h3>
      <div className="card-sub">{T.s13Sub}</div>
      {lezyonlar.length>0 && <div className="lez-list">
        {lezyonlar.map((l,i)=><div key={i} className="lez-card">
          <div className="lez-body">
            <h4>{T.s13LezLabel(i+1, l.lokalizasyon||T.s13NotSpecified)}</h4>
            <p>{[l.boyut&&`${T.rptSize}: `+l.boyut, l.t1t2, l.lezKontrast&&`${T.rptContrast}: `+l.lezKontrast].filter(Boolean).join(' · ')}</p>
          </div>
          <button className="lez-del" onClick={()=>setLezyonlar(p=>p.filter((_,j)=>j!==i))}>{T.btnDelete}</button>
        </div>)}
      </div>}
      <div className="opts">
        <Opt label={T.btnAddLesion} sub={T.s13AddLesionSub} sel={false} onClick={startLez}/>
        <Opt label={lezyonlar.length>0?T.btnDone:T.btnNoLesion} sub={lezyonlar.length>0?T.s13DoneSub(lezyonlar.length):T.s13NoLesionSub} sel={d.fokalLezyon==='hayir'} onClick={()=>{set('fokalLezyon','hayir');}}/>
      </div>
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        {(d.fokalLezyon==='hayir'||lezyonlar.length>0) && <button className="btn btn-suc" onClick={()=>setStep(RAPOR_STEP)}>{T.btnGoReport}</button>}
      </div>
    </div>;
  }

  /* ── Lesion Loop ── */
  function renderLezStep(){
    const lezWord = RV_LOCALE==='tr' ? 'Lezyon' : 'Lesion';
    const stepWord = RV_LOCALE==='tr' ? 'Adım' : 'Step';
    return <div className="card">
      <div className="card-step">{lezWord} {lezyonlar.length+1} · {stepWord} {lezStep+1}/6 – {T.lezNames[lezStep]}</div>
      <h3>{T.lezNames[lezStep]}</h3>
      {renderLezContent()}
      <div className="btns">
        <button className="btn btn-sec" onClick={goPrev}>{T.btnBack}</button>
        <button className="btn btn-pri" onClick={goNext}>{lezStep<LEZ_STEPS_COUNT-1?T.btnNext:T.btnSaveLesion}</button>
      </div>
    </div>;
  }

  function renderLezContent(){
    switch(lezStep){
      case 0: return <div className="opts">
        {T.lezLoc.map(([v,s])=>
          <Opt key={v} label={v} sub={s} sel={curLez?.lokalizasyon===v} onClick={()=>setLez('lokalizasyon',v)}/>
        )}
      </div>;
      case 1: return <div className="opts">
        {T.lezSize.map(([v,s])=>
          <Opt key={v} label={v} sub={s} sel={curLez?.boyut===v} onClick={()=>setLez('boyut',v)}/>
        )}
      </div>;
      case 2: return <div className="opts">
        {T.lezSignal.map(([v,s])=>
          <Opt key={v} label={v} sub={s} sel={curLez?.t1t2===v} onClick={()=>setLez('t1t2',v)}/>
        )}
      </div>;
      case 3: return <div className="opts">
        {T.lezDwi.map(([v,s])=>
          <Opt key={v} label={v} sub={s} sel={curLez?.lezDwi===v} onClick={()=>setLez('lezDwi',v)}/>
        )}
      </div>;
      case 4: return <div className="opts">
        {T.lezContrast.map(([v,s])=>
          <Opt key={v} label={v} sub={s} sel={curLez?.lezKontrast===v} onClick={()=>setLez('lezKontrast',v)}/>
        )}
      </div>;
      case 5: return <div className="opts">
        {T.lezNeighbor.map(([v,s])=>
          <Opt key={v} label={v} sub={s} sel={curLez?.komsuyapi===v} onClick={()=>setLez('komsuyapi',v)}/>
        )}
      </div>;
      default: return null;
    }
  }

  /* ── RAPOR ── */
  function renderRapor(){
    const R = (k) => (T.maps[k]&&T.maps[k][d[k]])||d[k]||'—';

    const top = results[0];
    function yorum(){
      if(!top) return T.yorum.noResult;
      if(T.yorum[top.id]) return T.yorum[top.id];
      return T.yorum.default(top.ad, top.s);
    }

    function copyRep(){
      const txt = buildReportText(d,lezyonlar,results);
      if(navigator.clipboard){navigator.clipboard.writeText(txt);}
      else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
      alert(T.alertCopied);
    }
    function printRep(){
      const el=document.getElementById('printOverlay');
      el.innerHTML=`<pre style="font-family:monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;color:#000">${buildReportText(d,lezyonlar,results)}</pre>`;
      el.style.display='block'; window.print(); el.style.display='none';
    }
    function downloadRep(){
      const txt=buildReportText(d,lezyonlar,results);
      const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=T.txtDownloadName;
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    }

    return <div>
      {/* Header */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:'.7rem',fontWeight:800,color:'var(--acc)',textTransform:'uppercase',letterSpacing:'1px'}}>{T.reportLabel}</div>
            <div style={{fontSize:'1.15rem',fontWeight:800,color:'var(--txt)'}}>{T.rptTitle}</div>
            <div style={{fontSize:'.78rem',color:'var(--txt2)',marginTop:2}}>
              {d.taraf==='bilateral'?<><span className="sbadge sb-bil">{T.s1Bilateral}</span></>:d.taraf==='sag'?<span className="sbadge sb-sag">{T.rptSideRight}</span>:<span className="sbadge sb-sol">{T.rptSideLeft}</span>}
              {d.yasGrubu && <> · {T.ageLabel[d.yasGrubu]}</>}
              {d.cinsiyet && <> · {T.genderLabel[d.cinsiyet]}</>}
              {d.hlab27==='pozitif' && <> · <span style={{color:'var(--warn)'}}>HLA-B27 +</span></>}
            </div>
          </div>
          <button className="btn btn-sec" onClick={()=>{setStep(0);setLezyonlar([]);setLezStep(-1);setCurLez(null);setD({yasGrubu:'',cinsiyet:'',klinik:'',hlab27:'',taraf:'bilateral',lateralite:'bilateral',sagEklemAraligi:'',solEklemAraligi:'',kemikOdem:'',kemikOdemSiddet:'',t1Sinyal:'',erozyon:'',skleroz:'',kontrast:'',sinovyalSivi:'',ankiloz:'',yumusak:'',dwi:'',fokalLezyon:''});}}>{T.btnRestart}</button>
        </div>
      </div>

      {/* Findings */}
      <div className="card" style={{marginBottom:12}}>
        <div className="sec-hdr">{T.rptMriBulgular}</div>
        <table className="rep-tbl">
          <tbody>
            {(d.taraf==='bilateral'||d.taraf==='sag')&&<tr><td>{T.tblRightJoint}</td><td>{R('sagEklemAraligi')}</td></tr>}
            {(d.taraf==='bilateral'||d.taraf==='sol')&&<tr><td>{T.tblLeftJoint}</td><td>{R('solEklemAraligi')}</td></tr>}
            <tr><td>{T.tblBme}</td><td>{R('kemikOdem')}{d.kemikOdem!=='yok'&&d.kemikOdemSiddet?(T.maps.kemikOdemSiddet[d.kemikOdemSiddet]||''):''}</td></tr>
            <tr><td>{T.tblT1}</td><td>{R('t1Sinyal')}</td></tr>
            <tr><td>{T.tblErozyon}</td><td>{R('erozyon')}</td></tr>
            <tr><td>{T.tblSkleroz}</td><td>{R('skleroz')}</td></tr>
            <tr><td>{T.tblKontrast}</td><td>{R('kontrast')}</td></tr>
            <tr><td>{T.tblSinoviyal}</td><td>{R('sinovyalSivi')}</td></tr>
            <tr><td>{T.tblAnkiloz}</td><td>{R('ankiloz')}</td></tr>
            <tr><td>{T.tblYumusak}</td><td>{R('yumusak')}</td></tr>
            <tr><td>{T.tblDwi}</td><td>{R('dwi')}</td></tr>
          </tbody>
        </table>
      </div>

      {/* Lesions */}
      {lezyonlar.length>0 && <div className="card" style={{marginBottom:12}}>
        <div className="sec-hdr">{T.rptFokalLezyonlar}</div>
        {lezyonlar.map((l,i)=><div key={i} style={{background:'var(--surf2)',borderRadius:9,padding:'10px 14px',marginBottom:7,border:'1px solid var(--brd)'}}>
          <div style={{fontWeight:700,fontSize:'.85rem',color:'var(--acc2)',marginBottom:4}}>{T.rptLezLabel(i+1, l.lokalizasyon||T.rptLezNotSpec)}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'2px 16px',fontSize:'.8rem',color:'var(--txt2)'}}>
            {l.boyut&&<div>{T.rptSize}: {l.boyut}</div>}
            {l.t1t2&&<div>{T.rptSignal}: {l.t1t2}</div>}
            {l.lezDwi&&<div>{T.rptDwi}: {l.lezDwi}</div>}
            {l.lezKontrast&&<div>{T.rptContrast}: {l.lezKontrast}</div>}
            {l.komsuyapi&&<div style={{gridColumn:'1/-1'}}>{T.rptNeighbor}: {l.komsuyapi}</div>}
          </div>
        </div>)}
      </div>}

      {/* Differential Diagnosis */}
      <div className="card" style={{marginBottom:12}}>
        <div className="sec-hdr">{T.rptDiffTitle}</div>
        {results.map((r,i)=><div key={r.id} className="diff-item">
          <div className="diff-rank">{i+1}</div>
          <div className="diff-info">
            <div className="diff-name">{r.ad}</div>
            <span className={`kat-tag ${r.cls}`}>{r.kat}</span>
          </div>
          <ProgBar v={r.s}/>
          <div className="diff-pct">{r.s}%</div>
        </div>)}
        <div className="yorum"><strong>{T.rptYorumLabel}</strong>{yorum()}</div>
      </div>

      {/* Export */}
      <div className="exp-row">
        <button className="btn btn-sec" onClick={copyRep}>{T.btnCopy}</button>
        <button className="btn btn-sec" onClick={printRep}>{T.btnPrint}</button>
        <button className="btn btn-sec" onClick={downloadRep}>{T.btnDownload}</button>
      </div>
    </div>;
  }

  return <div className="app">
    <div className="hdr">
      <div className="hdr-icon">🦴</div>
      <h1>{T.appTitle}</h1>
      <p>{T.appSub}</p>
    </div>
    <div className="prog-wrap">
      <div className="prog-label">
        <span className="prog-title">{curStepNameFinal}</span>
        <span className="prog-pct">{pct}%</span>
      </div>
      <div className="prog-bar-bg"><div className="prog-bar" style={{width:pct+'%'}}/></div>
    </div>
    {render()}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>
</body>
</html>
