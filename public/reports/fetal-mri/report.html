<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fetal MRI Değerlendirme Modülü</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg-0: #0b0a0f;
    --bg-1: #141218;
    --bg-2: #1c1922;
    --bg-3: #262230;
    --border: #332d3d;
    --border-strong: #45394f;
    --text: #f4eef7;
    --text-dim: #b8aec2;
    --text-muted: #796d85;
    --accent: #e11d63;          /* rose/pink-red primary */
    --accent-2: #fb7185;         /* rose-400 */
    --accent-soft: #4a1330;
    --accent-glow: rgba(225, 29, 99, 0.25);
    --ok: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --info: #38bdf8;
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(1200px 800px at 10% -10%, #1c0f18 0%, var(--bg-0) 55%) fixed;
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }

  /* Layout */
  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 24px 80px;
  }
  header.topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
  }
  .brand .mark {
    width: 42px; height: 42px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 8px 20px var(--accent-glow);
    display: grid; place-items: center;
    font-weight: 800; color: white; font-size: 18px; letter-spacing: 0.5px;
  }
  .brand h1 {
    margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.2px;
  }
  .brand small {
    display: block; color: var(--text-muted); font-size: 12px; margin-top: 2px;
  }
  .topbar-actions { display: flex; gap: 8px; }

  /* Stepper */
  .stepper {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 10px 12px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 18px;
  }
  .step-chip {
    font-size: 11.5px;
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--bg-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    white-space: nowrap;
    cursor: default;
  }
  .step-chip.active {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: white;
    border-color: transparent;
    font-weight: 600;
    box-shadow: 0 4px 12px var(--accent-glow);
  }
  .step-chip.done {
    background: var(--accent-soft);
    color: #f9c4d6;
    border-color: var(--accent);
  }

  /* Cards */
  .card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 22px;
    box-shadow: var(--shadow-lg);
  }
  .card + .card { margin-top: 14px; }
  .card h2 {
    margin: 0 0 6px 0; font-size: 17px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  .card .subtitle {
    color: var(--text-muted); font-size: 13px; margin-bottom: 18px;
  }
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--accent-2);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin: 18px 0 10px;
  }

  /* Forms */
  label.fld { display: block; margin-bottom: 12px; }
  label.fld > .lbl {
    display: block; font-size: 12.5px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500;
  }
  input[type="text"], input[type="number"], textarea, select {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border .15s, box-shadow .15s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  textarea { resize: vertical; min-height: 70px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 760px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  .chips {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .chip {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.on {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white; border-color: transparent;
    box-shadow: 0 4px 12px var(--accent-glow);
    font-weight: 600;
  }
  .chip.small { padding: 6px 10px; font-size: 12px; }

  .radios {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .radio-card {
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text-dim);
    transition: all .15s;
    min-width: 110px;
    text-align: center;
  }
  .radio-card:hover { border-color: var(--border-strong); color: var(--text); }
  .radio-card.on {
    background: var(--accent-soft);
    color: var(--text);
    border-color: var(--accent);
    font-weight: 600;
  }

  /* Buttons */
  .btn {
    appearance: none; -webkit-appearance: none;
    border: 1px solid var(--border-strong);
    background: var(--bg-2);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    transition: all .15s;
    font-family: inherit;
  }
  .btn:hover { background: var(--bg-3); border-color: var(--accent); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 14px var(--accent-glow);
  }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn.ghost { background: transparent; }
  .btn.danger { border-color: var(--danger); color: #fca5a5; }
  .btn.danger:hover { background: rgba(239,68,68,0.1); }
  .btn.sm { padding: 6px 10px; font-size: 12.5px; }

  .nav {
    display: flex; justify-content: space-between; gap: 10px;
    margin-top: 22px;
  }

  /* Lesion list items */
  .lesion-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .lesion-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .lesion-row .idx {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent-2);
    display: grid; place-items: center; font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .lesion-row .meta { flex: 1; }
  .lesion-row .meta .name { font-weight: 600; font-size: 14px; }
  .lesion-row .meta .sub { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }

  /* Differential table */
  .ddx-table {
    width: 100%; border-collapse: collapse;
    font-size: 13.5px;
    background: var(--bg-2);
    border-radius: 10px;
    overflow: hidden;
  }
  .ddx-table th, .ddx-table td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .ddx-table th {
    background: var(--bg-3); font-weight: 700; color: var(--accent-2);
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .ddx-table tr:last-child td { border-bottom: none; }
  .bar-cell { width: 200px; }
  .bar {
    height: 8px; width: 100%; background: var(--bg-3); border-radius: 4px; overflow: hidden;
  }
  .bar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 4px;
  }
  .pct { font-weight: 700; color: var(--accent-2); width: 60px; }

  /* Report */
  pre.report {
    white-space: pre-wrap;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    line-height: 1.65;
    color: var(--text);
    max-height: 600px; overflow: auto;
  }

  /* Print overlay */
  #print-overlay {
    position: fixed; inset: 0;
    background: white; color: black;
    padding: 30px; overflow: auto;
    display: none; z-index: 9999;
  }
  #print-overlay pre {
    white-space: pre-wrap;
    font-family: 'Courier New', monospace;
    font-size: 12pt;
    color: black;
  }
  @media print {
    body > #root { display: none !important; }
    #print-overlay { display: block !important; padding: 0; }
  }

  .tag {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--accent-soft); color: var(--accent-2); font-weight: 600;
    margin-left: 6px;
  }
  .tag.ok { background: rgba(34,197,94,0.15); color: #6ee7b7; }
  .tag.warn { background: rgba(245,158,11,0.15); color: #fcd34d; }

  .hint {
    font-size: 12px; color: var(--text-muted);
    background: var(--bg-2);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 8px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-1); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
<!-- radvisor-atlas bridge -->
<script src="/bridge.js"></script>

    /* Pathology names & notes */
    pVentriculomegaly_name: 'Ventrikülomegali (izole)',
    pVentriculomegaly_notes: 'İzole ventrikülomegali (atrial çap ≥10 mm). Hafif: 10–12 mm, orta: 12–15 mm, ileri: >15 mm (hidrosefali). Eşlik eden yapısal/kromozomal anomaliler açısından detaylı inceleme gereklidir.',
    pCorpusCallosum_name: 'Korpus Kallozum Agenezisi/Disgenezisi',
    pCorpusCallosum_notes: 'Kolposefali (oksipital hornların orantısız dilatasyonu), 3. ventrikül yükselmesi, radyal/paralel giral patern, falx persistansı. Kromozomal ve sendromik (Aicardi vb.) ilişki sorgulanmalıdır.',
    pChiariII_name: 'Chiari II Malformasyonu',
    pChiariII_notes: 'Açık spinal disrafizm ile birlikte küçük posterior fossa, tonsiller/vermiyan herniasyon, serebellum "banana sign", frontal kemik "lemon sign", supratentoryal ventrikülomegali.',
    pDandyWalker_name: 'Dandy-Walker Malformasyonu',
    pDandyWalker_notes: 'Serebellar vermis agenezi/hipoplazisi, 4. ventrikül ile devamlılık gösteren posterior fossa kistik dilatasyonu, tentoryum/torkula yükselmesi. DW varyantı ve mega sisterna magna ayırıcı tanıya alınmalıdır.',
    pArachnoidCyst_name: 'Araknoid Kist',
    pArachnoidCyst_notes: 'BOS sinyal özelliklerinde, ekstraaksiyel yerleşimli, keskin sınırlı kistik lezyon. Kütle etkisine göre prognoz değişir. En sık orta fossa, posterior fossa ve suprasellar yerleşim.',
    pAqueductalStenosis_name: 'Akuaduktus Stenozu (Konjenital)',
    pAqueductalStenosis_notes: 'Lateral ve 3. ventriküller genişlemiş, 4. ventrikül normal kalibrede (triventriküler hidrosefali). Korpus kallozum incelme, makrokrani gelişebilir. X-linked (L1CAM) form erkek fetuslarda sorgulanmalıdır.',
    pHoloprosencephaly_name: 'Holoprozensefali',
    pHoloprosencephaly_notes: 'Alobar: tek ventrikül, füzyone talami, falx/interhemisferik fissür yokluğu. Semilobar/lobar tiplerde bulgular daha hafif. Yüz orta hat anomalileri (siklopia, proboscis vs.) sıklıkla eşlikçidir. Trizomi 13 ilişkisi güçlüdür.',
    pICH_name: 'Fetal İntrakranial Hemoraji',
    pICH_notes: 'T2*/SWI (mümkünse) duyarlılık önemli. Germinal matriks, intraventriküler veya parankimal hemoraji. IUGR, alloimmün trombositopenik ilişki, TTTS sorgulanmalıdır. Hemoraji evresine göre sinyal değişkendir.',
    pCorticalMalform_name: 'Kortikal Gelişim Malformasyonu',
    pCorticalMalform_notes: 'Lissensefali (giri yokluğu/azalması), polimikrogiri (çok sayıda küçük giri), şizensefali (pia-ependim arası yarık) spektrumu. GA uyumlu kortikal gelişim eğrisi ile karşılaştırılmalıdır. CMV enfeksiyonu taraması önerilir.',
    pICTeratoma_name: 'İntrakranial Teratom',
    pICTeratoma_notes: 'Heterojen solid-kistik, yağ ve/veya kalsifikasyon komponenti barındıran kitle. Hızlı büyüme, makrokrani ve distosi riski. Prognoz genellikle kötüdür.',
    pCPAM_name: 'Konjenital Pulmoner Havayolu Malformasyonu (CPAM/CCAM)',
    pCPAM_notes: 'Stocker sınıflaması: Tip 1 (büyük kistler, >2 cm), Tip 2 (küçük kistler), Tip 3 (mikrokistik/solid görünüm). CVR (CPAM Volume Ratio) prognostik öneme sahiptir (>1.6 hidrops riski artar).',
    pCDH_name: 'Konjenital Diyafragma Hernisi (CDH)',
    pCDH_notes: 'Sol taraflı %85. Mide/bağırsak/karaciğer torasik kavitede izlenebilir. O/E LHR (observed/expected lung-to-head ratio), total fetal akciğer volümü (TFLV) ve karaciğer herniasyonu prognostik göstergelerdir.',
    pBPS_name: 'Pulmoner Sekestrasyon (BPS)',
    pBPS_notes: 'Sistemik (sıklıkla torasik ya da abdominal aortadan) beslenir. Homojen hiperintens üçgen/yuvarlak kitle; sıklıkla sol alt lob ya da subdiyafragmatik. Ekstralober/intralober ayırımı önemlidir. Hybrid lezyon (CPAM+BPS) ayırıcı tanıda akılda tutulmalıdır.',
    pHydrothorax_name: 'Fetal Hidrotoraks / Plevral Efüzyon',
    pHydrothorax_notes: 'İzole (primer şilotoraks) veya sendromik/hidropik. Akciğer hipoplazisi ve hidrops riski. Torakoamniyotik şant endikasyonu tartışılabilir.',
    pBronchogenicCyst_name: 'Bronkogenik Kist',
    pBronchogenicCyst_notes: 'Genellikle tek, unilokuler, keskin sınırlı kist. Paratrakeal/subkarinal mediasten yerleşimi tipik. Hava yolu basısı yapabilir.',
    pOmphalocele_name: 'Omfalosel',
    pOmphalocele_notes: 'Orta hat karın duvarı defekti; umbilikal kord insersiyonu defekt üzerinde. Perito/amnion membranla örtülü. Karaciğeri içeren büyük omfaloseller kromozomal/sendromik ilişkili. Beckwith-Wiedemann, trizomi 13/18 taraması.',
    pGastroschisis_name: 'Gastroşizis',
    pGastroschisis_notes: 'Umbilikusun sağında, tam kat karın duvarı defekti. Koruyucu membran yok, bağırsak ansları serbest olarak amniyon içinde. Genellikle izole anomali; kromozomal ilişki zayıf.',
    pMeconiumCyst_name: 'Mekonyum Psödokisti / Peritonit',
    pMeconiumCyst_notes: 'Intrauterin bağırsak perforasyonu sonucu, periton/psödokist duvarında kalsifikasyon, asit, dilate bağırsak ansları. Kistik fibrozis ilişkisi sorgulanmalıdır.',
    pBowelObstruction_name: 'Fetal Barsak Obstrüksiyonu',
    pBowelObstruction_notes: 'Proksimal obstrüksiyon (duodenal atrezi): "double-bubble" + polihidramnios. Distal obstrüksiyon: mekonyum sinyal değişimi (T1 artar, kolon kalibresi azalır). Duodenal/jejunal/ileal atrezi, Hirschsprung, mekonyum ileusu ayırıcı tanıları.',
    pHydronephrosis_name: 'İleri Hidronefroz / Pelvikaliektazi',
    pHydronephrosis_notes: 'APD (anteroposterior pelvik çap) ≥10 mm 3. trimesterde anlamlı. UPJ obstrüksiyonu, vezikoüreteral reflü, megaüreter, duplike toplayıcı sistem (ektopik üreterosel) ayırıcı tanıya alınır.',
    pMCDK_name: 'Multikistik Displastik Böbrek (MCDK)',
    pMCDK_notes: 'Birbirine bağlanmayan, değişken boyutlu multipl kist; aralarda normal parankim yok veya displastik. Nonfonksiyone böbrek. Kontralateral böbrek anomalisi (agenezi, VUR) sorgulanmalıdır.',
    pARPKD_name: 'Otozomal Resesif Polikistik Böbrek Hastalığı (ARPKD)',
    pARPKD_notes: 'Bilateral simetrik büyük, T2 hiperintens böbrekler; kortikomedüller ayrım silikleşmiş. Belirgin oligohidramnios/anhidramnios ve buna sekonder akciğer hipoplazisi (Potter sekansı) eşlik eder.',
    pLUTO_name: 'Alt Üriner Sistem Obstrüksiyonu (LUTO / PUV)',
    pLUTO_notes: 'Tipik olarak erkek fetusta, masif distandü mesane, "keyhole" bulgusu (dilate posterior üretra). Bilateral hidroüreteronefroz ve oligohidramnios/anhidramnios. Posterior üretral valv en sık etyoloji. Vezikoamniyotik şant endikasyonu değerlendirilir.',
    pOvarianCyst_name: 'Fetal Over Kisti',
    pOvarianCyst_notes: 'Kız fetusta, alt batın/pelviste tek, unilokuler kist. Komplike (hemoraji/torsiyon) olursa debris seviyelenmesi ve mikst sinyal. Genellikle basit kistler spontan regrese olur.',
    pCysticHygroma_name: 'Kistik Higroma / Lenfatik Malformasyon',
    pCysticHygroma_notes: 'Multiseptalı, multilokuler kistik lezyon; özellikle boyun posterior yerleşim tipiktir. Turner sendromu, trizomi 21/18/13, kalp anomalileri ve hidrops ile birlikteliği güçlüdür.',
    pCervicalTeratoma_name: 'Servikal Teratom',
    pCervicalTeratoma_notes: 'Heterojen solid-kistik yapıda, yağ ve kalsifikasyon komponenti içeren büyük boyun kitlesi. Hava yolu basısı nedeniyle doğumda EXIT (ex utero intrapartum treatment) prosedürü planlaması gerekebilir.',
    pSCT_name: 'Sakrokoksigeal Teratom (SCT)',
    pSCT_notes: 'Altman sınıflaması (Tip I–IV) eksternal/intrapelvik komponent oranına göre. Heterojen solid-kistik yapı. Yüksek-volümlü/vaskülarize lezyonlarda yüksek-output kalp yetmezliği ve hidrops riski mevcuttur.',
    pMyelomeningocele_name: 'Meningomiyelosel / Spina Bifida',
    pMyelomeningocele_notes: 'Açık spinal disrafizm; arka vertebral kemer defekti, meningosel/miyelomeningosel kesesi. Chiari II malformasyonu ve ventrikülomegali neredeyse tüm olgularda eşlik eder. Açılı kifotik postür görülebilir.',
    pPAS_name: 'Plasenta Akreata Spektrumu (PAS)',
    pPAS_notes: 'Başlıca MR bulguları: intraplasental T2 koyu bantlar, miyometrial incelme (<1 mm), uterin dış kontur bulging, heterojen plasenta sinyali, anormal vaskülarite, komşu organ invazyonu (mesane vb.). Önceki sezeryan öyküsü ve plasenta previa güçlü risk faktörleridir.',
  },

    pVentriculomegaly_name: 'Ventriculomegaly (isolated)',
    pVentriculomegaly_notes: 'Isolated ventriculomegaly (atrial diameter ≥10 mm). Mild: 10–12 mm, moderate: 12–15 mm, severe: >15 mm (hydrocephalus). Detailed evaluation for associated structural/chromosomal anomalies is required.',
    pCorpusCallosum_name: 'Corpus Callosum Agenesis/Dysgenesis',
    pCorpusCallosum_notes: 'Colpocephaly (disproportionate dilatation of occipital horns), 3rd ventricle elevation, radial/parallel gyral pattern, falx persistence. Chromosomal and syndromic associations (Aicardi, etc.) should be investigated.',
    pChiariII_name: 'Chiari II Malformation',
    pChiariII_notes: 'Open spinal dysraphism with small posterior fossa, tonsillar/vermian herniation, cerebellar "banana sign", frontal bone "lemon sign", supratentorial ventriculomegaly.',
    pDandyWalker_name: 'Dandy-Walker Malformation',
    pDandyWalker_notes: 'Cerebellar vermis agenesis/hypoplasia, cystic dilation of posterior fossa in continuity with the 4th ventricle, tentorium/torcula elevation. Dandy-Walker variant and mega cisterna magna should be included in the differential.',
    pArachnoidCyst_name: 'Arachnoid Cyst',
    pArachnoidCyst_notes: 'Extra-axial, sharply marginated cystic lesion with CSF signal characteristics. Prognosis varies with mass effect. Most common locations: middle fossa, posterior fossa, suprasellar.',
    pAqueductalStenosis_name: 'Aqueductal Stenosis (Congenital)',
    pAqueductalStenosis_notes: 'Lateral and 3rd ventricles enlarged, 4th ventricle normal caliber (triventricular hydrocephalus). Corpus callosum thinning, macrocephaly may develop. X-linked form (L1CAM) should be considered in male fetuses.',
    pHoloprosencephaly_name: 'Holoprosencephaly',
    pHoloprosencephaly_notes: 'Alobar: single ventricle, fused thalami, absence of falx/interhemispheric fissure. Semilobar/lobar types show milder findings. Facial midline anomalies (cyclopia, proboscis, etc.) frequently accompany. Strong association with trisomy 13.',
    pICH_name: 'Fetal Intracranial Hemorrhage',
    pICH_notes: 'T2*/SWI sensitivity is important (when available). Germinal matrix, intraventricular or parenchymal hemorrhage. IUGR, alloimmune thrombocytopenia, TTTS should be investigated. Signal varies with stage of hemorrhage.',
    pCorticalMalform_name: 'Cortical Development Malformation',
    pCorticalMalform_notes: 'Spectrum of lissencephaly (absent/reduced gyri), polymicrogyria (multiple small gyri), schizencephaly (pia-ependymal cleft). Comparison with GA-appropriate cortical development curve is required. CMV infection screening is recommended.',
    pICTeratoma_name: 'Intracranial Teratoma',
    pICTeratoma_notes: 'Heterogeneous solid-cystic mass containing fat and/or calcification components. Risk of rapid growth, macrocephaly, and dystocia. Prognosis is generally poor.',
    pCPAM_name: 'Congenital Pulmonary Airway Malformation (CPAM/CCAM)',
    pCPAM_notes: 'Stocker classification: Type 1 (large cysts, >2 cm), Type 2 (small cysts), Type 3 (microcystic/solid appearance). CVR (CPAM Volume Ratio) is prognostically important (>1.6 increases hydrops risk).',
    pCDH_name: 'Congenital Diaphragmatic Hernia (CDH)',
    pCDH_notes: 'Left-sided in 85%. Stomach/bowel/liver may be visible in the thoracic cavity. O/E LHR (observed/expected lung-to-head ratio), total fetal lung volume (TFLV), and liver herniation are prognostic indicators.',
    pBPS_name: 'Pulmonary Sequestration (BPS)',
    pBPS_notes: 'Supplied by systemic (usually thoracic or abdominal aortic) arteries. Homogeneously hyperintense triangular/rounded mass; most often left lower lobe or subdiaphragmatic. Extralobar/intralobar distinction is important. Hybrid lesion (CPAM+BPS) should be kept in mind.',
    pHydrothorax_name: 'Fetal Hydrothorax / Pleural Effusion',
    pHydrothorax_notes: 'Isolated (primary chylothorax) or syndromic/hydropic. Risk of lung hypoplasia and hydrops. Thoracoamniotic shunting may be considered.',
    pBronchogenicCyst_name: 'Bronchogenic Cyst',
    pBronchogenicCyst_notes: 'Usually solitary, unilocular, sharply marginated cyst. Paratracheal/subcarinal mediastinal location is typical. May cause airway compression.',
    pOmphalocele_name: 'Omphalocele',
    pOmphalocele_notes: 'Midline abdominal wall defect; umbilical cord insertion is at the defect. Covered by peritoneal/amniotic membrane. Large omphaloceles containing liver are associated with chromosomal/syndromic conditions. Beckwith-Wiedemann, trisomy 13/18 screening.',
    pGastroschisis_name: 'Gastroschisis',
    pGastroschisis_notes: 'Full-thickness abdominal wall defect to the right of the umbilicus. No protective membrane; bowel loops float freely in amniotic fluid. Usually an isolated anomaly; chromosomal association is weak.',
    pMeconiumCyst_name: 'Meconium Pseudocyst / Peritonitis',
    pMeconiumCyst_notes: 'Result of intrauterine bowel perforation; calcification in peritoneum/pseudocyst wall, ascites, dilated bowel loops. Cystic fibrosis association should be investigated.',
    pBowelObstruction_name: 'Fetal Bowel Obstruction',
    pBowelObstruction_notes: 'Proximal obstruction (duodenal atresia): "double-bubble" + polyhydramnios. Distal obstruction: meconium signal change (T1 increases, colon caliber decreases). Differentials: duodenal/jejunal/ileal atresia, Hirschsprung, meconium ileus.',
    pHydronephrosis_name: 'Severe Hydronephrosis / Pelvicaliectasis',
    pHydronephrosis_notes: 'APD (anteroposterior pelvic diameter) ≥10 mm is significant in the 3rd trimester. UPJ obstruction, vesicoureteral reflux, megaureter, duplicated collecting system (ectopic ureterocele) are included in the differential.',
    pMCDK_name: 'Multicystic Dysplastic Kidney (MCDK)',
    pMCDK_notes: 'Multiple non-communicating cysts of variable size; no normal parenchyma in between, or dysplastic. Non-functional kidney. Contralateral kidney anomaly (agenesis, VUR) should be investigated.',
    pARPKD_name: 'Autosomal Recessive Polycystic Kidney Disease (ARPKD)',
    pARPKD_notes: 'Bilaterally symmetrically enlarged, T2 hyperintense kidneys; corticomedullary differentiation is lost. Marked oligohydramnios/anhydramnios and secondary lung hypoplasia (Potter sequence) accompany.',
    pLUTO_name: 'Lower Urinary Tract Obstruction (LUTO / PUV)',
    pLUTO_notes: 'Typically in male fetus; massively distended bladder, "keyhole" sign (dilated posterior urethra). Bilateral hydroureteronephrosis and oligohydramnios/anhydramnios. Posterior urethral valve is the most common etiology. Vesicoamniotic shunting may be considered.',
    pOvarianCyst_name: 'Fetal Ovarian Cyst',
    pOvarianCyst_notes: 'Solitary unilocular cyst in the lower abdomen/pelvis of a female fetus. Complicated (hemorrhage/torsion) lesions show debris layering and mixed signal. Simple cysts usually regress spontaneously.',
    pCysticHygroma_name: 'Cystic Hygroma / Lymphatic Malformation',
    pCysticHygroma_notes: 'Multiseptated, multilocular cystic lesion; posterior neck location is typical. Strong associations with Turner syndrome, trisomy 21/18/13, cardiac anomalies, and hydrops.',
    pCervicalTeratoma_name: 'Cervical Teratoma',
    pCervicalTeratoma_notes: 'Large neck mass of heterogeneous solid-cystic structure with fat and calcification components. Airway compression may necessitate EXIT (ex utero intrapartum treatment) procedure planning at delivery.',
    pSCT_name: 'Sacrococcygeal Teratoma (SCT)',
    pSCT_notes: 'Altman classification (Type I–IV) based on external/intrapelvic component ratio. Heterogeneous solid-cystic structure. High-volume/vascularized lesions carry risk of high-output cardiac failure and hydrops.',
    pMyelomeningocele_name: 'Myelomeningocele / Spina Bifida',
    pMyelomeningocele_notes: 'Open spinal dysraphism; posterior vertebral arch defect, meningocele/myelomeningocele sac. Chiari II malformation and ventriculomegaly accompany in nearly all cases. Angular kyphotic posture may be seen.',
    pPAS_name: 'Placenta Accreta Spectrum (PAS)',
    pPAS_notes: 'Key MRI findings: intraplacental T2 dark bands, myometrial thinning (<1 mm), uterine outer contour bulging, heterogeneous placental signal, abnormal vascularity, adjacent organ invasion (bladder, etc.). Prior cesarean and placenta previa are strong risk factors.',

/* --------------------------------------------------------------------------
   SCORING ENGINE — Her lezyon için her patolojiye puan verir, yüzde döndürür
   -------------------------------------------------------------------------- */
function scoreLesion(path, lesion) {
  let score = 0;

  // Organ eşleşmesi — birincil (50 pt)
  if (path.organs && path.organs.includes(lesion.organ)) {
    score += 50;
  } else {
    // Organ eşleşmezse patoloji büyük oranda elenmiş sayılır
    return 0;
  }

  // Alt-lokalizasyon (her eşleşme 10 pt, max 20)
  if (path.locations && lesion.locations) {
    let locMatches = 0;
    lesion.locations.forEach(l => { if (path.locations.includes(l)) locMatches++; });
    score += Math.min(20, locMatches * 10);
  }

  // T2 sinyal (10 pt)
  if (path.t2 && lesion.t2 && path.t2.includes(lesion.t2)) score += 10;

  // T1 sinyal (8 pt)
  if (path.t1 && lesion.t1 && path.t1.includes(lesion.t1)) score += 8;

  // İçerik (15 pt)
  if (path.contents && lesion.content && path.contents.includes(lesion.content)) score += 15;

  // Sınır (8 pt)
  if (path.borders && lesion.border && path.borders.includes(lesion.border)) score += 8;

  // DWI (8 pt)
  if (path.dwi && lesion.dwi && path.dwi.includes(lesion.dwi)) score += 8;

  // Eşlik eden bulgular (her eşleşme 6 pt, max 30)
  if (path.associated && lesion.associated) {
    let assocMatches = 0;
    lesion.associated.forEach(a => { if (path.associated.includes(a)) assocMatches++; });
    score += Math.min(30, assocMatches * 6);
  }

  return score;
}

function differentialsFor(lesion) {
  const MAX = 149; // 50+20+10+8+15+8+8+30
  const scored = LESION_DB.map(p => ({
    id: p.id,
    name: p.name,
    notes: p.notes,
    raw: scoreLesion(p, lesion)
  })).filter(x => x.raw > 0);

  // Normalizasyon: organ eşleşmesi baseline (50 pt), geri kalan 99 ek puan
  // En yüksek ham puan 100% olmayabilir; göreli max ile normalize edelim:
  const maxRaw = Math.max(...scored.map(s => s.raw), 1);
  const normalized = scored.map(s => ({
    ...s,
    pct: Math.min(100, Math.round((s.raw / maxRaw) * 100))
  })).sort((a, b) => b.pct - a.pct);

  return normalized;
}

/* --------------------------------------------------------------------------
   WIZARD ADIMLARI
   0: Klinik bilgi
   1: Fetal biyometri & durum
   2: Amniyotik mayi & Plasenta
   3: Anatomik sistem taraması (özet)
   4: Lezyon var mı?  (pre-loop)
   5–10: LEZYON DÖNGÜSÜ (6 adım)
       5: Organ / lokalizasyon
       6: Boyut & morfoloji
       7: Sinyal özellikleri (T1, T2)
       8: İçerik / sınır / DWI
       9: Eşlik eden bulgular
       10: Lezyon ön tanı özeti (devam / yeni lezyon / bitir)
   11: Global özet ve ayırıcı tanılar
   12: Rapor
   -------------------------------------------------------------------------- */
const STEPS = T.steps.map((label, id) => ({ id, label }));

const LOOP_START = 5;
const LOOP_END   = 10;
const POST_LOOP  = 11;
const PRE_LOOP   = 4;

function Radios({ value, onChange, options }) {

}

function ChipMulti({ values = [], onToggle, options }) {

}

function ChipSingle({ value, onChange, options }) {

}

/* --------------------------------------------------------------------------
   LEZYON (boş şablon)
   -------------------------------------------------------------------------- */
const emptyLesion = () => ({
  organ: '',
  locations: [],     // [id,...]
  sizeX: '', sizeY: '', sizeZ: '',
  shape: '',
  t1: '', t2: '',
  content: '',
  border: '',
  dwi: '',
  associated: [],
  note: ''
});

/* --------------------------------------------------------------------------
   MAIN APP
   -------------------------------------------------------------------------- */
function App() {
  const [step, setStep] = useState(0);

  // Step 0: Klinik bilgi
  const [clinical, setClinical] = useState({
    hastaAdi: '',
    protokolNo: '',
    maternalYas: '',
    gestasyonelHafta: '',
    gravidaParite: '',
    endikasyon: '',
    usBulgular: '',
    oncekiCesaryen: false
  });

  // Step 1: Biyometri & fetal durum
  const [biometry, setBiometry] = useState({
    fetusSayisi: '1',
    prezentasyon: '',
    bpd: '', hc: '', ac: '', fl: '',
    efw: '',
    persentilNotu: ''
  });

  // Step 2: AF & Plasenta
  const [afPlasenta, setAfPlasenta] = useState({
    afVolume: 'normal',     // oligo / normal / poly
    afiMvp: '',
    plasentaLokalizasyon: '',
    plasentaGrade: '',
    plasentaPreviaVarMi: false,
    umbilikalDamar: ''       // 3 damar / 2 damar / diğer
  });

  // Step 3: Anatomik sistem tarama (normal/anormal)
  // Her sistem: status (normal/anormal/degerlendirilemedi) + not
  const SISTEMLER = [
    { id: 'ssm', label: T.sysSSM },
    { id: 'spinal', label: T.sysSpinal },
    { id: 'yuz-boyun', label: T.sysFaceNeck },
    { id: 'toraks', label: T.sysThorax },
    { id: 'abdomen', label: T.sysAbdomen },
    { id: 'genitouriner', label: T.sysGU },
    { id: 'iskelet', label: T.sysSkeleton }
  ];
  const initialSistemler = () => {
    const o = {};
    SISTEMLER.forEach(s => o[s.id] = { status: 'normal', note: '' });
    return o;
  };
  const [sistemler, setSistemler] = useState(initialSistemler);

  // Lezyon yönetimi
  const [hasLesion, setHasLesion] = useState(null); // null | true | false
  const [lesions, setLesions] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(-1);

  // Mevcut lezyon (düzenlenen)
  const currentLesion = currentIdx >= 0 ? lesions[currentIdx] : null;

  // Bir lezyon alanı güncelle
  const updateLesion = (patch) => {
    if (currentIdx < 0) return;
    const copy = [...lesions];
    copy[currentIdx] = { ...copy[currentIdx], ...patch };
    setLesions(copy);
  };

  const toggleArray = (arrField, id) => {
    if (!currentLesion) return;
    const arr = currentLesion[arrField] || [];
    const next = arr.includes(id) ? arr.filter(x => x !== id) : [...arr, id];
    updateLesion({ [arrField]: next });
  };

  // Yeni lezyon ekle
  const addNewLesion = () => {
    const next = [...lesions, emptyLesion()];
    setLesions(next);
    setCurrentIdx(next.length - 1);
    setStep(LOOP_START);
  };

  // Mevcut lezyonun düzenlemesini bitir
  const finishLesion = (deleteCurrent) => {
    if (deleteCurrent && currentIdx >= 0) {
      const copy = lesions.filter((_, i) => i !== currentIdx);
      setLesions(copy);
    }
    setCurrentIdx(-1);
    setStep(POST_LOOP);
  };

  // Lezyon listesinden bir lezyonu düzenlemeye aç
  const editLesion = (idx) => {
    setCurrentIdx(idx);
    setStep(LOOP_START);
  };

  const deleteLesion = (idx) => {
    const copy = lesions.filter((_, i) => i !== idx);
    setLesions(copy);
  };

  /* ---------- NAVIGATION (3-parça bug-fix pattern) ---------- */
  const goNext = () => {
    // Lezyon yoksa ve loop'a geldiyse atla
    if (step === PRE_LOOP && hasLesion === false) {
      setStep(POST_LOOP);
      return;
    }
    // Post-loop'a doğru ilerlerken currentIdx=-1 ise loop'u atla
    if (step >= LOOP_START && step < LOOP_END && currentIdx === -1) {
      setStep(POST_LOOP);
      return;
    }
    // Lezyon döngüsü sonunda (step 10) — özel: kullanıcı Bitir/Yeni kararını versin diye
    // bu step içindeki butonlar navigate eder; burada sadece son step korumasi:
    if (step < STEPS.length - 1) setStep(step + 1);
  };

  const goPrev = () => {
    // Post-loop'tan geri giderken lezyon yoksa loop'u atla
    if (step === POST_LOOP) {
      if (lesions.length === 0) {
        setStep(PRE_LOOP);
      } else {
        // Son lezyonu düzenlemeye aç
        setCurrentIdx(lesions.length - 1);
        setStep(LOOP_END);
      }
      return;
    }
    if (step > 0) setStep(step - 1);
  };

  /* ---------- ADIM DOĞRULAMA ---------- */
  const canGoNext = () => {
    if (step === 0) {
      return clinical.gestasyonelHafta && clinical.endikasyon;
    }
    if (step === PRE_LOOP) return hasLesion !== null;
    if (step === LOOP_START) return currentLesion && currentLesion.organ;
    return true;
  };

  /* ---------- DIFFERENTIALS (tüm lezyonlar) ---------- */
  const allDdx = useMemo(() => {
    return lesions.map(l => ({
      lesion: l,
      ddx: differentialsFor(l).slice(0, 5) // top 5
    }));
  }, [lesions]);

  /* ---------- STEPPER CHIP RENDERER ---------- */
  const stepLabel = (s) => {
    // Loop içindeki adımda lezyon index'i göster
    if (s.id >= LOOP_START && s.id <= LOOP_END && currentIdx >= 0) {
      return `L${currentIdx + 1} · ${s.label.replace(T.loopPrefix, '')}`;
    }
    return s.label;
  };

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <div className="mark">F</div>
          <div>
            <h1>{T.appTitle}</h1>
            <small>{T.appSubtitle}</small>
          </div>
        </div>
        <div className="topbar-actions">
          <button className="btn sm ghost" onClick={() => {
            if (confirm(T.resetConfirm)) location.reload();
          }}>{T.reset}</button>
        </div>
      </header>

      {/* Stepper */}
      <div className="stepper">
        {STEPS.map(s => (
          <div key={s.id}
               className={'step-chip' + (s.id === step ? ' active' : (s.id < step ? ' done' : ''))}>
            {s.id + 1}. {stepLabel(s)}
          </div>
        ))}
      </div>

      {/* Step içeriği */}
      {step === 0   && <Step0_Clinical   v={clinical} set={setClinical} />}
      {step === 1   && <Step1_Biometry   v={biometry} set={setBiometry} />}
      {step === 2   && <Step2_AFPlasenta v={afPlasenta} set={setAfPlasenta} />}
      {step === 3   && <Step3_Sistemler  v={sistemler} set={setSistemler} systems={SISTEMLER} />}
      {step === 4   && <Step4_LesionGate
                         hasLesion={hasLesion}
                         setHasLesion={setHasLesion}
                         lesions={lesions}
                         onAddNew={addNewLesion}
                         onEdit={editLesion}
                         onDelete={deleteLesion}
                       />}
      {step === 5   && <Step5_Organ      lesion={currentLesion} update={updateLesion} idx={currentIdx} />}
      {step === 6   && <Step6_Morfoloji  lesion={currentLesion} update={updateLesion} idx={currentIdx} />}
      {step === 7   && <Step7_Sinyal     lesion={currentLesion} update={updateLesion} idx={currentIdx} />}
      {step === 8   && <Step8_Icerik     lesion={currentLesion} update={updateLesion} idx={currentIdx} />}
      {step === 9   && <Step9_Eslik      lesion={currentLesion} update={updateLesion} idx={currentIdx} toggleArray={toggleArray} />}
      {step === 10  && <Step10_LezOzet
                         lesion={currentLesion}
                         idx={currentIdx}
                         ddx={currentLesion ? differentialsFor(currentLesion).slice(0, 5) : []}
                         onAddAnother={addNewLesion}
                         onFinish={() => finishLesion(false)}
                         onDelete={() => finishLesion(true)}
                       />}
      {step === 11  && <Step11_GenelOzet
                         lesions={lesions}
                         allDdx={allDdx}
                         onEdit={editLesion}
                         onDelete={deleteLesion}
                         onAddNew={addNewLesion}
                       />}
      {step === 12  && <Step12_Rapor
                         clinical={clinical}
                         biometry={biometry}
                         afPlasenta={afPlasenta}
                         sistemler={sistemler}
                         systems={SISTEMLER}
                         lesions={lesions}
                         allDdx={allDdx}
                         onBack={goPrev}
                       />}

      {/* Navigasyon */}
      {step !== 10 && step !== 12 && (
        <div className="nav">
          <button className="btn" onClick={goPrev} disabled={step === 0}>{T.back}</button>
          <button className="btn primary" onClick={goNext} disabled={!canGoNext()}>
            {step === STEPS.length - 2 ? T.toReport : T.next}
          </button>
        </div>
      )}
    </div>
  );
}

/* ==========================================================================
   STEP 3 — Anatomik sistem tarama
   ========================================================================== */
function Step3_Sistemler({ v, set, systems }) {
  const updateStatus = (sid, status) => {
    set({ ...v, [sid]: { ...v[sid], status } });
  };
  const updateNote = (sid, note) => {
    set({ ...v, [sid]: { ...v[sid], note } });
  };
  return (
    <div className="card">
      <h2>{T.s3Title}</h2>
      <div className="subtitle">{T.s3Sub}</div>

      {systems.map(s => (
        <div key={s.id} style={{ marginBottom: '16px', paddingBottom: '14px', borderBottom: '1px solid var(--border)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
            <div style={{ fontWeight: 600, fontSize: '14px' }}>{s.label}</div>
            <ChipSingle value={v[s.id].status}
              onChange={(x) => updateStatus(s.id, x)}
              options={[
                { id: 'normal', label: T.s3StatusNormal },
                { id: 'anormal', label: T.s3StatusAbnormal },
                { id: 'degerlendirilemedi', label: T.s3StatusNE }
              ]} />
          </div>
          {v[s.id].status !== 'normal' && (
            <input type="text" value={v[s.id].note}

  );
}

/* ==========================================================================

             onClick={() => setHasLesion(false)}>

/* ==========================================================================
   STEP 5 — Lezyon: Organ / Lokalizasyon
   ========================================================================== */
function Step5_Organ({ lesion, update, idx }) {
  if (!lesion) return <div className="card"><div className="hint">{T.s5NoLesion}</div></div>;
  const locOpts = LOCATION_OPTIONS[lesion.organ] || [];
  const toggleLoc = (id) => {
    const arr = lesion.locations || [];
    update({ locations: arr.includes(id) ? arr.filter(x => x !== id) : [...arr, id] });
  };
  return (
    <div className="card">
      <h2>{T.s5Title.replace('#{n}', idx + 1)}</h2>
      <div className="subtitle">{T.s5Sub}</div>

      <div className="section-title">{T.s5OrganSystem}</div>
      <ChipSingle value={lesion.organ}
        onChange={(x) => update({ organ: x, locations: [] })}
        options={ORGAN_OPTIONS} />

      {lesion.organ && (
        <>
          <div className="section-title">{T.s5SubLocation}</div>
          {locOpts.length > 0 ? (
            <ChipMulti values={lesion.locations} onToggle={toggleLoc} options={locOpts} />
          ) : (
            <div className="hint">{T.s5NoSubLoc}</div>
          )}
        </>
      )}
    </div>
  );
}

  ASSOCIATED_OPTIONS.forEach(o => {

    <div className="card">

        <div key={g} style={{ marginBottom: '14px' }}>
          <div className="section-title">{g}</div>
          <ChipMulti
            values={lesion.associated || []}
            onToggle={(id) => toggleArray('associated', id)}
            options={groups[g]}

/* ==========================================================================
   RAPOR OLUŞTURMA
   ========================================================================== */
function generateReport(ctx) {
  const { clinical, biometry, afPlasenta, sistemler, systems, lesions, allDdx } = ctx;
  const L = [];
  L.push(T.rTitle);
  L.push('═'.repeat(72));
  L.push('');

  // Klinik başlık
  L.push(T.rClinical);
  L.push('─'.repeat(72));
  if (clinical.hastaAdi) L.push(`${T.rPatient}            : ${clinical.hastaAdi}`);
  if (clinical.protokolNo) L.push(`${T.rProtocol}      : ${clinical.protokolNo}`);
  if (clinical.maternalYas) L.push(`${T.rMaternalAge}     : ${clinical.maternalYas}`);
  if (clinical.gestasyonelHafta) L.push(`${T.rGA}: ${clinical.gestasyonelHafta}`);
  if (clinical.gravidaParite) L.push(`${T.rGravPar}   : ${clinical.gravidaParite}`);
  if (clinical.oncekiCesaryen) L.push(`${T.rPrevCS}  : ${T.rPrevCSYes}`);
  if (clinical.endikasyon) L.push(`${T.rIndication}       : ${clinical.endikasyon}`);
  if (clinical.usBulgular) L.push(`${T.rUSFindings}  : ${clinical.usBulgular}`);
  L.push('');

  // Teknik
  L.push(T.rExamination);
  L.push('─'.repeat(72));
  L.push(T.rExamText);
  L.push('');

  // Biyometri
  L.push(T.rBiometry);
  L.push('─'.repeat(72));
  const gebTur = biometry.fetusSayisi === '1' ? T.rSingleton
                : biometry.fetusSayisi === '2' ? T.rTwin
                : biometry.fetusSayisi === '3+' ? T.rMultiple : '';
  const satirlar = [];
  if (gebTur) satirlar.push(gebTur);
  if (biometry.prezentasyon) satirlar.push(T.rPresentation.replace('{type}', biometry.prezentasyon));
  if (satirlar.length) L.push(satirlar.join(', ') + '.');

  const biom = [];
  if (biometry.bpd) biom.push(`BPD: ${biometry.bpd} mm`);
  if (biometry.hc) biom.push(`HC: ${biometry.hc} mm`);
  if (biometry.ac) biom.push(`AC: ${biometry.ac} mm`);
  if (biometry.fl) biom.push(`FL: ${biometry.fl} mm`);
  if (biometry.efw) biom.push(`EFW: ${biometry.efw} g`);
  if (biom.length) L.push(T.rBiometryLine + ': ' + biom.join(', ') + '.');
  if (biometry.persentilNotu) L.push(biometry.persentilNotu);
  L.push('');

  // AF & Plasenta
  L.push(T.rAFPlacenta);
  L.push('─'.repeat(72));
  L.push((T.rAFMap[afPlasenta.afVolume] || T.rAFDefault) + (afPlasenta.afiMvp ? ` (${afPlasenta.afiMvp})` : '') + '.');
  const pPart = [];
  if (afPlasenta.plasentaLokalizasyon) pPart.push(T.rPlacentaLocation.replace('{loc}', afPlasenta.plasentaLokalizasyon));
  if (afPlasenta.plasentaGrade) pPart.push(`Grade ${afPlasenta.plasentaGrade}`);
  if (pPart.length) L.push(T.rPlacentaLine + ': ' + pPart.join(', ') + '.');
  if (afPlasenta.plasentaPreviaVarMi) L.push(T.rPlacentaPrevia);
  if (afPlasenta.umbilikalDamar) {
    L.push(T.rUDMap[afPlasenta.umbilikalDamar] + '.');
  }
  L.push('');

  // Sistem tarama
  L.push(T.rSystems);
  L.push('─'.repeat(72));
  systems.forEach(s => {
    const st = sistemler[s.id];
    if (!st) return;
    if (st.status === 'normal') {
      L.push(`${s.label}: ${T.rSysNormal}`);
    } else if (st.status === 'anormal') {
      L.push(`${s.label}: ${T.rSysAbnormal}${st.note ? ' ' + st.note : ''}${(lesions || []).some(l => l.organ && s.id === mapOrganToSystem(l.organ)) ? T.rSysAbnormalDetail : ''}`);
    } else {
      L.push(`${s.label}: ${T.rSysNE}${st.note ? ' ' + st.note : ''}`);
    }
  });
  L.push('');

  // Lezyonlar
  if (lesions && lesions.length > 0) {
    L.push(T.rLesionSection);
    L.push('─'.repeat(72));
    lesions.forEach((l, i) => {
      L.push(T.rLesionHeader.replace('#{n}', i + 1));
      const organLbl = labelOf(ORGAN_OPTIONS, l.organ);
      const locs = (l.locations || []).map(loc => labelOf(LOCATION_OPTIONS[l.organ] || [], loc)).join(', ');
      const sizes = [l.sizeX, l.sizeY, l.sizeZ].filter(Boolean).join(' × ');

      const segments = [];
      segments.push(`${organLbl}`);
      if (locs) segments.push(locs);
      segments.push(`${sizes ? sizes + T.rLesionSizeSuffix : T.rLesionSizeNA}`);
      if (l.shape) segments.push(`${l.shape} ${T.rShapeSuffix}`);
      if (l.border) segments.push(`${labelOf(BORDER_OPTIONS, l.border).toLowerCase()} ${T.rBorderSuffix}`);
      L.push('  • ' + segments.join(', ') + ' ' + T.rLesionInText);

      const sinyal = [];
      if (l.t2) sinyal.push(`${T.rT2prefix} ${labelOf(T2_OPTIONS, l.t2).toLowerCase()}`);
      if (l.t1) sinyal.push(`${T.rT1prefix} ${labelOf(T1_OPTIONS, l.t1).toLowerCase()}`);
      if (sinyal.length) L.push(`    ${T.rLesionSignal}: ` + sinyal.join(', ') + '.');

      if (l.content) L.push(`    ${T.rLesionContent}: ${labelOf(CONTENT_OPTIONS, l.content)}.`);
      if (l.dwi) L.push(`    ${T.rLesionDWI}: ${labelOf(DWI_OPTIONS, l.dwi)}.`);

      if (l.associated && l.associated.length > 0) {
        const assocLbls = l.associated.map(id => labelOf(ASSOCIATED_OPTIONS, id));
        L.push(`    ${T.rLesionAssoc}: ` + assocLbls.join(', ') + '.');
      }
      if (l.note) L.push(`    ${T.rLesionNote}: ${l.note}`);
      L.push('');
    });
  }

  // YORUM
  L.push(T.rComment);
  L.push('═'.repeat(72));
  const gw = clinical.gestasyonelHafta ? T.rCommentGW.replace('{ga}', clinical.gestasyonelHafta) : '';
  L.push(T.rCommentSummary.replace('{gw}', gw));
  L.push('');

  if (allDdx && allDdx.length > 0) {
    allDdx.forEach((entry, i) => {
      const l = entry.lesion;
      const organLbl = labelOf(ORGAN_OPTIONS, l.organ);
      L.push(T.rDDXHeader.replace('#{n}', i + 1).replace('{organ}', organLbl));
      if (entry.ddx.length === 0) {
        L.push(T.rDDXNone);
      } else {
        entry.ddx.forEach((d, di) => {
          L.push(`  ${di + 1}. ${d.name} — ${d.pct}${T.rDDXMatch}`);
        });
        // En yüksek uyumlu patolojinin notu
        const top = entry.ddx[0];
        const topFull = LESION_DB.find(p => p.id === top.id);
        if (topFull && topFull.notes) {
          L.push('');
          L.push(`  ${T.rDDXTopNote.replace('{name}', top.name)}: ${topFull.notes}`);
        }
      }
      L.push('');
    });
  } else {
    L.push(T.rNoLesionFound);
    L.push('');
  }

  L.push(T.rClosing);
  L.push('');
  L.push('─'.repeat(72));
  L.push(T.rFooter);

  return L.join('\n');
}

// Yardımcı: lezyon organını sistem tarama başlıklarına maple
function mapOrganToSystem(organId) {
  const map = {
    'ssm': 'ssm',
    'spinal': 'spinal',
    'boyun': 'yuz-boyun',
    'toraks': 'toraks',
    'abdomen-duvari': 'abdomen',
    'abdomen-gi': 'abdomen',
    'genitouriner': 'genitouriner',
    'plasenta': null
  };
  return map[organId] || null;
}

/* ==========================================================================
   STEP 12 — Rapor (önizleme + kopyala/indir/yazdır)
   ========================================================================== */
function Step12_Rapor(ctx) {
  const report = useMemo(() => generateReport(ctx), [ctx]);
  const [copied, setCopied] = useState(false);

  const copyToClipboard = async () => {
    try {
      await navigator.clipboard.writeText(report);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (e) {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = report;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }
  };

  const downloadHtml = () => {
    const title = T.rTitle;
    const html =
      '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + title + '</title>' +
      '<style>body{font-family:Courier New,monospace;background:white;color:black;padding:30px;line-height:1.6;font-size:12pt}pre{white-space:pre-wrap}</style>' +
      '</head><body><pre>' +
      report.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') +
      '</pre></body></html>';
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = T.s12FileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const printReport = () => {
    const el = document.getElementById('print-content');
    if (el) el.textContent = report;
    window.print();
  };

  return (
    <div className="card">
      <h2>{T.s12Title}</h2>
      <div className="subtitle">{T.s12Sub}</div>

      <div style={{ display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'14px' }}>
        <button className="btn primary" onClick={copyToClipboard}>
          {copied ? T.s12Copied : T.s12Copy}
        </button>
        <button className="btn" onClick={downloadHtml}>{T.s12DownloadHTML}</button>
        <button className="btn" onClick={printReport}>{T.s12Print}</button>
        <button className="btn ghost" onClick={() => ctx.onBack && ctx.onBack()}>
          {T.s12BackToSummary}
        </button>
      </div>

      <pre className="report">{report}</pre>
    </div>
  );
}

   RENDER
   -------------------------------------------------------------------------- */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
