<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0f1117;--card:#1a1d27;--card2:#232736;--border:#2e3348;--text:#e2e4ed;--text2:#9498ae;--accent:#e07a2f;--accent2:#c46820;--accentGlow:rgba(224,122,47,.15);--danger:#ef4444;--success:#22c55e;--warn:#f59e0b;--purple:#a78bfa}html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}input,select,textarea,button{font-family:inherit;font-size:inherit}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}.app-wrap{max-width:960px;margin:0 auto;padding:16px}.app-header{text-align:center;padding:20px 0 10px}.app-header h1{font-size:1.5rem;color:var(--accent);font-weight:700}.app-header p{color:var(--text2);font-size:.85rem;margin-top:4px}.progress-bar{display:flex;gap:3px;margin:12px 0 18px;flex-wrap:wrap}.progress-bar .seg{flex:1;height:5px;border-radius:3px;background:var(--border);min-width:18px;transition:background .3s}.progress-bar .seg.done{background:var(--accent)}.progress-bar .seg.active{background:var(--accent);box-shadow:0 0 8px var(--accent)}.step-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}.step-title{font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:4px}.step-desc{color:var(--text2);font-size:.82rem;margin-bottom:16px}.field-group{margin-bottom:14px}.field-label{font-weight:600;font-size:.88rem;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:6px}.field-label .badge{font-size:.7rem;background:var(--accent);color:#fff;padding:1px 7px;border-radius:10px;font-weight:600}.radio-group{display:flex;flex-wrap:wrap;gap:6px}.radio-opt{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:.84rem;transition:all .2s;color:var(--text2);user-select:none}.radio-opt:hover{border-color:var(--accent);color:va round:rgba(224,122,47,.06);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 8px 8px 0;margin:8px 0;font-size:.85rem}.yorum-block strong{color:var(--accent)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:flex;justify-content:center;overflow-y:auto;padding:20px}.overlay-content{background:#fff;color:#1a1a2e;width:210mm;min-height:297mm;padding:20mm 18mm;font-size:10.5pt;line-height:1.6;border-radius:4px}.overlay-toolbar{position:sticky;top:0;z-index:9999;display:flex;gap:8px;justify-content:center;padding:10px;background:rgba(0,0,0,.8);border-radius:0 0 8px 8px}.overlay-toolbar .btn{font-size:.82rem;padding:8px 16px}@media print{.overlay-toolbar{display:none!important}.overlay{position:static;background:none}.overlay-content{box-shadow:none;padding:15mm}}</style><!-- radvisor-atlas bridge -->

const renderOv=()=>{if(!showOv)return null;return<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowOv(false)}}><div><div className="overlay-toolbar"><button className="btn btn-primary" onClick={()=>{try{window.print()}catch(e){alert('HTML indirin')}}}>Yazdır</button><button className="btn btn-success" onClick={hCopy}>Kopyala</button><button className="btn btn-warn" onClick={hDL}>HTML İndir</button><button className="btn btn-danger" onClick={()=>setShowOv(false)}>Kapat</button></div><div className="overlay-content" ref={ovRef} dangerouslySetInnerHTML={{__html:bPH().replace(/<!DOCTYPE.*?<body>/s,'').replace(/<\/body>.*$/s,'')}}/></div></div>};
