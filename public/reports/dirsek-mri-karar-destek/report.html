const mkD=()=>({yas:'',cinsiyet:'',taraf:'',sure:'',travma:'',cerrahiOyku:'',dominant:'',effuzyon:'yok',sinovit:'yok',dizilim:'normal',serbCisim:'yok',serbCisimDetay:'',plika:'yok',bmeVar:'yok',bmeLok:[],bmeDesen:'',kirik:'yok',kirikLok:'',kirikTip:'',kirikDetay:'',avnVar:'yok',avnLok:'',kemikLezyonVar:'yok',kemikLezList:[],kemikLezIdx:-1,uclDurum:'intakt',uclBand:'',uclLok:'',uclSublux:'yok',uclKalsif:'yok',cftDurum:'normal',cftDetay:'',medEpikondil:'normal',medEpikondilDetay:'',medEkNot:'',lclDurum:'intakt',luclDurum:'intakt',annularDurum:'intakt',cetDurum:'normal',cetDetay:'',latEpikondil:'normal',latEpikondilDetay:'',plri:'yok',latEkNot:'',bisepsDurum:'normal',bisepsDetay:'',bisepsRet:'',brakiyalis:'normal',brakDet:'',antKapsul:'normal',antKapDet:'',antEk:'',trisepsDurum:'normal',triDet:'',olekSpurs:'yok',postImp:'yok',postImpDet:'',olekStres:'yok',postEk:'',cartKap:'0',cartTro:'0',cartRH:'0',cartOle:'0',ocdVar:'yok',ocdLok:'',ocdStab:'',ocdEvre:'',cartEk:'',ulnarSin:'normal',ulnarDet:'',ulnarSub:'yok',kubital:'yok',radSin:'normal',radDet:'',pinSend:'yok',medSin:'normal',medDet:'',pronator:'yok',sinEk:'',olekBursa:'normal',olekBurDet:'',bicBursa:'normal',bicBurDet:'',bursaEk:'',ydKitleVar:'yok',ydKitleList:[],ydKitleIdx:-1,brakArt:'normal',brakVen:'normal',vasDet:'',ekBulgu:''});

const renderLoop=(list,idx,pfx,label,addF,remF,updF,lF,bF,rF)=>{if(!list.length)return<div><div className="info-box">Henüz {label.toLowerCase()} eklenmedi.</div><button className="btn btn-primary" onClick={addF}>+ Yeni {label}</button></div>;const c=list[idx]||{};return<><div className="lesion-tabs">{list.map((x,i)=><div key={i} className={`lesion-tab${i===idx?' active':''}`} onClick={()=>setD(p=>({...p,[pfx+'Idx']:i}))}>{label} {i+1}{x[lF[0]]?` (${x[lF[0]].substring(0,12)})`:''}<span className="x" onClick={e=>{e.stopPropagation();remF(i)}}>×</span></div>)}<div className="lesion-tab" onClick={addF} style={{color:'var(--accent)',borderColor:'var(--accent)'}}>+</div></div>{idx>=0&&idx<list.length&&<><div className="field-group"><div className="field-label">{lF[1]}</div><input className="text-input" value={c[lF[0]]||''} onChange={e=>updF(idx,lF[0],e.target.value)} placeholder={lF[2]}/></div><div className="field-group"><div className="field-label">{bF[1]}</div><input className="text-input" value={c[bF[0]]||''} onChange={e=>updF(idx,bF[0],e.target.value)} placeholder={bF[2]}/></div>{rF.map(([k,lb,opts])=><RC key={k} l={lb} val={c[k]} o={opts} fn={v=>updF(idx,k,v)}/>)}<div className="field-group"><div className="field-label">Ek Not</div><textarea className="text-input" rows={2} value={c.not||''} onChange={e=>updF(idx,'not',e.target.value)} placeholder="Ek bulgular..."/></div></>}</>};

const sM={kalin:'Kalın',hiperintens:'T2↑',komprese:'Komprese'};let sR=[];sR.push(['Ulnar',d.ulnarSin==='normal'?'Normal':sM[d.ulnarSin]||d.ulnarSin,d.ulnarSin==='normal'?'normal':'patolojik']);if(d.ulnarSub==='var')sR.push(['Ulnar sublux.','Var','patolojik']);if(d.kubital==='var')sR.push(['Kubital tünel','Var','patolojik']);sR.push(['Radyal',d.radSin==='normal'?'Normal':sM[d.radSin]||d.radSin,d.radSin==='normal'?'normal':'patolojik']);if(d.pinSend==='var')sR.push(['PIN','Var','patolojik']);sR.push(['Median',d.medSin==='normal'?'Normal':sM[d.medSin]||d.medSin,d.medSin==='normal'?'normal':'patolojik']);if(d.pronator==='var')sR.push(['Pronator','Var','patolojik']);S.push({i:'⚡',t:'SİNİRLER',r:sR});
let bR=[];bR.push(['Olek. bursa',d.olekBursa==='normal'?'Normal':d.olekBursa+(d.olekBurDet?' — '+d.olekBurDet:''),d.olekBursa==='normal'?'normal':d.olekBursa==='komplike'?'kritik':'patolojik']);bR.push(['Bikipitoradyal',d.bicBursa==='normal'?'Normal':d.bicBursa,d.bicBursa==='normal'?'normal':'patolojik']);S.push({i:'💊',t:'BURSALAR',r:bR});
if(d.ydKitleList.length){let yR=[];d.ydKitleList.forEach((k,i)=>{yR.push(['Kitle '+(i+1),(k.lok||'?')+' T1:'+(k.t1||'?')+' T2:'+(k.t2||'?'),'patolojik'])});S.push({i:'🔴',t:'YD KİTLELERİ',r:yR})}
let vR=[];vR.push(['Brak. arter',d.brakArt==='normal'?'Normal':d.brakArt,d.brakArt==='normal'?'normal':'kritik']);vR.push(['Venöz',d.brakVen==='normal'?'Normal':d.brakVen,d.brakVen==='normal'?'normal':'kritik']);if(d.ekBulgu)vR.push(['Ek',d.ekBulgu,'']);S.push({i:'🩸',t:'VASKÜLER',r:vR});return S};
/* ==================== RENDER REPORT ==================== */
const RBox=({s})=><div className="rbox"><div className="rbox-hdr"><span>{s.i}</span> {s.t}</div><div className="rbox-body">{s.r.map(([l,v,c],i)=><div className="rrow" key={i}><span className="rrow-label">{l}</span><span className={`rrow-val${c?' '+c:''}`}>{v}</span></div>)}</div></div>;
const DBox=({cat,di})=>{const so=Object.entries(di).sort((a,b)=>b[1]-a[1]);return<div className="diff-box"><div className="diff-box-hdr">{cat}</div><div>{so.map(([n,p],i)=>{const c=Math.min(100,p);const col=c>=80?'var(--danger)':c>=60?'var(--warn)':'var(--success)';const rc=c>=80?'r1':c>=60?'r2':'r3';return<div className="diff-row" key={i}><span className={`diff-rank ${rc}`}>{i+1}</span><span className="diff-name">{n}</span><span className="diff-pct" style={{color:col}}>%{c}</span><div className="diff-bar-bg"><div className="diff-bar-fg" style={{width:c+'%',background:col}}/></div></div>})}</div></div>};
const renderRapor=()=>{const secs=buildSections();const cats=Object.entries(computeScores);return<>{secs.map((s,i)=><RBox key={i} s={s}/>)}<div style={{marginTop:20,marginBottom:8,fontSize:'1.05rem',fontWeight:700,color:'var(--purple)'}}>📊 AYIRICI TANI</div>{cats.map(([c,di])=>{if(typeof di!=='object'||!Object.keys(di).length)return null;return<DBox key={c} cat={c} di={di}/>})}<div className="yorum-block" style={{marginTop:16}}><strong>YORUM:</strong><pre style={{whiteSpace:'pre-wrap',fontFamily:'inherit',margin:'6px 0 0'}}>{genYorum()}</pre></div><div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:16}}><button className="btn btn-primary" onClick={()=>setShowOv(true)}>Baskı Önizleme</button><button className="btn btn-success" onClick={hCopy}>Panoya Kopyala</button><button className="btn btn-warn" onClick={hDL}>HTML İndir</button></div></>};
/* ==================== EXPORTS ==================== */
const hCopy=()=>{const secs=buildSections();const plain='DİRSEK MRI RAPORU\n'+'═'.repeat(40)+'\n'+secs.map(s=>'\n'+s.t+'\n'+'─'.repeat(30)+'\n'+s.r.map(([l,v])=>'  '+l+': '+v).join('\n')).join('\n')+'\n\nYORUM:\n'+genYorum();try{const el=document.createElement('div');let h='<h2 style="color:#e07a2f">Dirsek MRI Raporu</h2>';secs.forEach(s=>{h+='<h3 style="color:#e07a2f;border-bottom:2px solid #e07a2f;padding-bottom:3px;margin-top:14px">'+s.i+' '+s.t+'</h3><table style="width:100%;border-collapse:collapse;font-size:10pt">';s.r.forEach(([l,v,cls],i)=>{const bg=i%2===0?'#f8f9fa':'#fdf0e4';const vc=cls==='kritik'?'color:#ef4444;font-weight:700':cls==='patolojik'?'color:#d97706':cls==='normal'?'color:#16a34a':'';h+='<tr style="background:'+bg+'"><td style="padding:5px 10px;font-weight:600;width:190px;border:1px solid #ddd">'+l+'</td><td style="padding:5px 10px;border:1px solid #ddd;'+vc+'">'+v+'</td></tr>'});h+='</table>'});h+='<div style="background:#fdf0e4;border-left:3px solid #e07a2f;padding:10px 14px;margin:12px 0"><strong>YORUM:</strong><pre style="white-space:pre-wrap;font-family:inherit">'+genYorum()+'</pre></div>';el.innerHTML=h;el.style.cssText='position:fixed;left:-9999px';document.body.appendChild(el);const r=document.createRange();r.selectNodeContents(el);const s=window.getSelection();s.removeAllRanges();s.addRange(r);document.execCommand('copy');s.removeAllRanges();document.body.removeChild(el);alert('Kopyalandı!')}catch(e){navigator.clipboard?.writeText(plain).then(()=>alert('Kopyalandı!')).catch(()=>alert('Başarısız'))}};
const hDL=()=>{const c=bPH();const b=new Blob([c],{type:'text/html;charset=utf-8'});const url=URL.createObjectURL(b);const a=document.createElement('a');a.href=url;a.download='Dirsek_MRI_'+new Date().toISOString().slice(0,10)+'.html';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)};
const bPH=()=>{const secs=buildSections();let body='';secs.forEach(s=>{body+='<div style="border:1px solid #d1d5db;border-radius:8px;overflow:hidden;margin-bottom:12px"><div style="background:linear-gradient(135deg,#fdf0e4,#fef8f0);padding:8px 14px;font-weight:700;font-size:11pt;color:#c46820;border-bottom:1px solid #d1d5db">'+s.i+' '+s.t+'</div>';s.r.forEach(([l,v,cls],i)=>{const bg=i%2===0?'#f8f9fa':'#fdf0e4';const vc=cls==='kritik'?'color:#ef4444;font-weight:700':cls==='patolojik'?'color:#d97706':cls==='normal'?'color:#16a34a':'';body+='<div style="display:flex;padding:5px 14px;align-items:baseline;gap:8px;background:'+bg+'"><span style="min-width:180px;font-weight:600;font-size:9.5pt;color:#555">'+l+'</span><span style="flex:1;font-size:10pt;'+vc+'">'+v+'</span></div>'});body+='</div>'});body+='<div style="background:#fdf0e4;border-left:3px solid #e07a2f;padding:10px 14px;margin:16px 0;border-radius:0 8px 8px 0"><strong>YORUM:</strong><pre style="white-space:pre-wrap;font-family:inherit;margin:6px 0 0">'+genYorum()+'</pre></div>';return'<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><title>Dirsek MRI</title><style>body{font-family:Segoe UI,sans-serif;font-size:10.5pt;line-height:1.6;color:#1a1a2e;max-width:210mm;margin:15mm auto;padding:0 15mm}h2{color:#e07a2f;border-bottom:2px solid #e07a2f;padding-bottom:4px;margin:18px 0 10px;font-size:13pt}@media print{body{margin:10mm;padding:0}}</style></head><body><h2>💪 Dirsek Eklemi MRI Raporu</h2><p style="color:#666;font-size:9.5pt">Tarih: '+new Date().toLocaleDateString('tr-TR')+'</p>'+body+'</body></html>'};
const renderOv=()=>{if(!showOv)return null;return<div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowOv(false)}}><div><div className="overlay-toolbar"><button className="btn btn-primary" onClick={()=>{try{window.print()}catch(e){alert('HTML indirin')}}}>Yazdır</button><button className="btn btn-success" onClick={hCopy}>Kopyala</button><button className="btn btn-warn" onClick={hDL}>HTML İndir</button><button className="btn btn-danger" onClick={()=>setShowOv(false)}>Kapat</button></div><div className="overlay-content" ref={ovRef} dangerouslySetInnerHTML={{__html:bPH().replace(/<!DOCTYPE.*?<body>/s,'').replace(/<\/body>.*$/s,'')}}/></div></div>};
return<div className="app-wrap"><div className="app-header"><h1>💪 Dirsek Eklemi MRI Karar Destek</h1><p>Kapsamlı değerlendirme • Ayırıcı tanı • Yapılandırılmış rapor</p></div><div className="progress-bar">{STEPS.map((s,i)=><div key={i} className={`seg${i<step?' done':''}${i===step?' active':''}`} title={s.title} onClick={()=>setStep(i)} style={{cursor:'pointer'}}/>)}</div><div className="step-card"><div className="step-title">{step+1}/{T} — {STEPS[step].title}</div><div className="step-desc">{STEPS[step].desc}</div>{renderStep()}</div><div className="nav-row"><button className="btn btn-secondary" onClick={goP} disabled={step===0}>← Geri</button><div style={{fontSize:'.8rem',color:'var(--text2)',alignSelf:'center'}}>{STEPS[step].title}</div>{step<T-1?<button className="btn btn-primary" onClick={goN}>İleri →</button>:<button className="btn btn-success" onClick={()=>setShowOv(true)}>Raporu Görüntüle</button>}</div>{renderOv()}</div>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
